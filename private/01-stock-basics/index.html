:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:T3fa7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e주식 투자를 시작하고 싶은데 뭔가 복잡하고 어렵게 느껴진다면, 이 시리즈가 딱 맞다. 용어 하나하나를 외울 필요는 없다. 흐름을 이해하는 게 먼저다. 친구한테 설명해주듯 쉽게 풀어볼 테니 편하게 읽어보자.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 주식이란 — 회사의 소유권 한 조각\u003c/h2\u003e\n\u003cp\u003e주식(Stock)은 단순하게 말하면 \u003cstrong\u003e회사의 소유권 증서\u003c/strong\u003e다.\u003c/p\u003e\n\u003cp\u003e삼성전자를 예로 들어보자. 삼성전자의 총 주식 수는 약 59억 주다. 내가 그 중 1주를 가지고 있다면, 나는 삼성전자의 59억 분의 1을 소유한 주주다. 물론 경영에 직접 참여하거나 회의실에 들어갈 수 있는 건 아니지만, 법적으로는 회사의 공동 소유자다.\u003c/p\u003e\n\u003cp\u003e왜 회사는 주식을 발행할까? 간단하다. \u003cstrong\u003e돈이 필요하기 때문이다.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e회사가 새로운 공장을 짓거나 연구개발(R\u0026#x26;D)에 투자하려면 막대한 자금이 필요하다. 이 돈을 조달하는 방법은 크게 두 가지다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e방법\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003cth\u003e단점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e은행 대출 (부채)\u003c/td\u003e\n\u003ctd\u003e은행에서 빌리고 이자를 내는 방식\u003c/td\u003e\n\u003ctd\u003e매달 이자 부담, 만기 상환 의무\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 발행 (자본)\u003c/td\u003e\n\u003ctd\u003e투자자에게 소유권을 나눠주고 자금을 받는 방식\u003c/td\u003e\n\u003ctd\u003e이익을 나눠야 함, 경영권 희석\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e주식을 발행하면 회사는 이자 부담 없이 자금을 마련할 수 있다. 대신 투자자에게 배당이나 주가 상승의 형태로 보상을 돌려줘야 한다.\u003c/p\u003e\n\u003ch3\u003e상장이란?\u003c/h3\u003e\n\u003cp\u003e처음엔 비상장 회사였다가 주식시장에 올라오는 걸 \u003cstrong\u003e기업공개(IPO, Initial Public Offering)\u003c/strong\u003e 라고 한다. 카카오나 크래프톤처럼 유망한 스타트업이 어느 날 갑자기 주식시장에 등장하는 게 바로 IPO다.\u003c/p\u003e\n\u003cp\u003e상장 이후엔 누구나 증권사 앱을 통해 그 회사 주식을 사고팔 수 있게 된다. 이게 바로 \u003cstrong\u003e2차 시장(유통시장)\u003c/strong\u003e 이다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e핵심 요약: 주식 = 회사의 소유권 조각. 내가 주식을 사면 그 회사의 주주가 된다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 주식시장 구조 — 거래소, 호가, 체결의 원리\u003c/h2\u003e\n\u003ch3\u003e한국의 주식시장\u003c/h3\u003e\n\u003cp\u003e한국엔 크게 두 개의 주식시장이 있다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시장\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e대표 종목\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e코스피(KOSPI)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e대형 우량 기업 중심\u003c/td\u003e\n\u003ctd\u003e삼성전자, SK하이닉스, LG화학\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e코스닥(KOSDAQ)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e중소·벤처·IT 기업 중심\u003c/td\u003e\n\u003ctd\u003e카카오게임즈, 셀트리온헬스케어\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e코스피는 뉴욕증권거래소(NYSE)와 비슷하고, 코스닥은 나스닥(NASDAQ)과 비슷하다고 생각하면 된다.\u003c/p\u003e\n\u003ch3\u003e거래 시간\u003c/h3\u003e\n\u003cp\u003e한국 주식시장의 정규 거래 시간은 다음과 같다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e정규장:    오전 9:00 ~ 오후 3:30\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e동시호가:  오전 8:30 ~ 9:00 (시가 결정)\u003c/span\u003e\n           오후 3:20 ~ 3:30 (종가 결정)\n\u003cspan class=\"hljs-section\"\u003e시간외:    오전 8:00 ~ 8:30 / 오후 3:40 ~ 6:00\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e오전 9시가 되면 시장이 열리고, 오후 3시 30분에 닫힌다. 시간 외 거래도 가능하지만 거래량이 적고 가격 왜곡이 생길 수 있어서 초보자는 정규장에서만 거래하는 걸 권장한다.\u003c/p\u003e\n\u003ch3\u003e호가와 체결의 원리\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e호가\u003c/strong\u003e란 매수자가 사겠다고 제시하는 가격(매수 호가)과 매도자가 팔겠다고 제시하는 가격(매도 호가)의 목록이다.\u003c/p\u003e\n\u003cp\u003e예를 들어 어떤 주식의 호가창이 이렇다고 해보자.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[매도 호가]\u003c/span\u003e\n\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e만\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e원 → \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e주\n\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e만\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e원 → \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e주\n\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e만\u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e원 → \u003cspan class=\"hljs-number\"\u003e800\u003c/span\u003e주\n─────────────────────\n\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e만\u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e원 → \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e주  ← 매수 호가 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e순위\n\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e만\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e원 → \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e주\n\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e만\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e원 → \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e주\n\u003cspan class=\"hljs-selector-attr\"\u003e[매수 호가]\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e매수자가 제시한 최고가(5만4,000원)와 매도자가 제시한 최저가(5만4,500원) 사이에는 500원의 차이가 있다. 이 차이를 \u003cstrong\u003e스프레드(Spread)\u003c/strong\u003e 라고 한다.\u003c/p\u003e\n\u003cp\u003e누군가 5만4,500원에 사겠다고 주문을 넣으면 매도 호가 1순위인 800주와 즉시 \u003cstrong\u003e체결\u003c/strong\u003e된다. 이렇게 매수·매도 주문이 만나면 거래가 성사된다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 투자 vs 투기 — 마인드셋 정립\u003c/h2\u003e\n\u003cp\u003e주식을 시작하기 전에 가장 먼저 정리해야 할 게 있다. 바로 \u003cstrong\u003e내가 무엇을 하려는가\u003c/strong\u003e다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e투자(Investment)\u003c/th\u003e\n\u003cth\u003e투기(Speculation)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시간\u003c/td\u003e\n\u003ctd\u003e중장기 (1년 이상)\u003c/td\u003e\n\u003ctd\u003e단기 (며칠~몇 주)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e기준\u003c/td\u003e\n\u003ctd\u003e기업의 본질 가치\u003c/td\u003e\n\u003ctd\u003e가격 변동, 수급\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e정보\u003c/td\u003e\n\u003ctd\u003e재무제표, 사업 분석\u003c/td\u003e\n\u003ctd\u003e차트, 뉴스, 루머\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e리스크\u003c/td\u003e\n\u003ctd\u003e상대적으로 낮음\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e대표 인물\u003c/td\u003e\n\u003ctd\u003e워런 버핏, 피터 린치\u003c/td\u003e\n\u003ctd\u003e단타 트레이더\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e투자는 좋은 회사를 싸게 사서 오랫동안 보유하는 것이다. 투기는 내일 오를 것 같은 종목을 사서 빠르게 차익을 취하는 것이다.\u003c/p\u003e\n\u003cp\u003e둘 다 방법이 있고, 둘 다 돈을 벌 수 있다. 하지만 \u003cstrong\u003e초보자에게 투기는 거의 확실하게 돈을 잃는 방법\u003c/strong\u003e이다. 단타 매매로 수익을 내는 개인투자자는 전체의 5%도 안 된다는 연구 결과가 많다.\u003c/p\u003e\n\u003ch3\u003e가장 흔한 실수들\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e뉴스 보고 따라 사기\u003c/strong\u003e — 뉴스가 나올 때쯤엔 이미 주가에 반영된 경우가 많다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주가가 올랐다고 사기, 내렸다고 팔기\u003c/strong\u003e — 추격 매수, 공포 매도는 손실을 키운다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e손실 종목 물타기 남용\u003c/strong\u003e — 근거 없이 평단가를 낮추는 건 위험하다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e레버리지(빚투) 사용\u003c/strong\u003e — 수익을 극대화하려다 파산하는 지름길이다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e조언: 주식은 단거리 달리기가 아니라 마라톤이다. 빨리 부자가 되려는 마음이 크면 클수록 손실도 커진다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 증권 계좌 개설과 주문 방법\u003c/h2\u003e\n\u003ch3\u003e증권 계좌 개설\u003c/h3\u003e\n\u003cp\u003e주식을 사려면 먼저 \u003cstrong\u003e증권 계좌\u003c/strong\u003e가 필요하다. 은행 앱처럼 증권사 앱을 설치하고 계좌를 개설하면 된다. 신분증만 있으면 10분 내로 비대면 개설이 가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e국내 주요 증권사\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e증권사\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e키움증권\u003c/td\u003e\n\u003ctd\u003e수수료 저렴, HTS 강자, 거래량 1위\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e삼성증권\u003c/td\u003e\n\u003ctd\u003e대형사, 리서치 자료 풍부\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e미래에셋증권\u003c/td\u003e\n\u003ctd\u003e해외주식 강세\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e토스증권\u003c/td\u003e\n\u003ctd\u003eUI 깔끔, 초보자 친화적\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e카카오페이증권\u003c/td\u003e\n\u003ctd\u003e소수점 매매 가능\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e초보자라면 \u003cstrong\u003e토스증권\u003c/strong\u003e이나 \u003cstrong\u003e카카오페이증권\u003c/strong\u003e이 접근하기 쉽다. 수익을 본격적으로 노린다면 \u003cstrong\u003e키움증권\u003c/strong\u003e으로 넘어가는 사람이 많다.\u003c/p\u003e\n\u003ch3\u003e주문 방법\u003c/h3\u003e\n\u003cp\u003e계좌를 개설했다면 이제 주문을 넣어보자. 주문 방식은 크게 두 가지다.\u003c/p\u003e\n\u003ch4\u003e시장가 주문 (Market Order)\u003c/h4\u003e\n\u003cp\u003e현재 형성된 시장 가격으로 즉시 사고파는 주문이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e예시:\u003c/span\u003e\n삼성전자를 시장가로 10주 매수 주문\n→ 현재 최저 매도 호가인 78,000원에 즉시 체결\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e장점: 빠르게 체결된다.\n단점: 내가 원하는 가격을 보장할 수 없다. 급등·급락 상황에서 생각보다 비싸거나 싸게 체결될 수 있다.\u003c/p\u003e\n\u003ch4\u003e지정가 주문 (Limit Order)\u003c/h4\u003e\n\u003cp\u003e내가 원하는 가격을 직접 지정해서 주문하는 방식이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e예시:\u003c/span\u003e\n삼성전자를 77,500원에 10주 매수 지정가 주문\n→ 주가가 77,500원 이하로 내려올 때 체결\n   그 전까지는 주문이 대기 상태\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e장점: 원하는 가격에 매수·매도할 수 있다.\n단점: 가격에 도달하지 않으면 체결이 안 된다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e초보자 팁: 처음엔 지정가 주문을 사용해라. 시장가로 매수했다가 생각보다 훨씬 비싼 가격에 체결되는 경우가 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e매도 주문도 똑같이\u003c/h3\u003e\n\u003cp\u003e사는 것과 반대로 팔 때도 시장가 또는 지정가를 선택할 수 있다. 지정가로 팔 때는 내가 원하는 가격보다 \u003cstrong\u003e낮은 가격엔 팔지 않겠다\u003c/strong\u003e는 의미다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 수익의 두 원천 — 시세차익과 배당\u003c/h2\u003e\n\u003cp\u003e주식으로 돈을 버는 방법은 두 가지다.\u003c/p\u003e\n\u003ch3\u003e1) 시세차익 (Capital Gain)\u003c/h3\u003e\n\u003cp\u003e싸게 사서 비싸게 파는 것이다. 가장 직관적인 수익 방식이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e예시:\u003c/span\u003e\n삼성전자 1주를 70,000원에 매수\n이후 80,000원이 됐을 때 매도\n→ 시세차익 = 10,000원 (약 14.3% 수익)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e주가는 회사의 실적, 경기, 금리, 외국인 수급 등 수많은 요인에 의해 움직인다.\u003c/p\u003e\n\u003ch3\u003e2) 배당 (Dividend)\u003c/h3\u003e\n\u003cp\u003e회사가 번 돈의 일부를 주주에게 나눠주는 것이다. 내 계좌에 현금이 그냥 들어온다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e예시:\u003c/span\u003e\n삼성전자를 1,000주 보유\n삼성전자 배당금: 주당 1,444원 (2023년 기준)\n→ 내 배당금 = 1,444원 × 1,000주 = 1,444,000원\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e배당을 많이 주는 회사를 \u003cstrong\u003e배당주\u003c/strong\u003e라고 한다. 배당 수익률이 3~5% 이상인 종목도 많다. 예금 금리가 낮은 시기엔 배당주에 눈이 가게 된다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e배당 관련 중요 개념\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e용어\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당수익률\u003c/td\u003e\n\u003ctd\u003e주가 대비 배당금 비율 (배당금 ÷ 주가 × 100)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당성향\u003c/td\u003e\n\u003ctd\u003e순이익 중 배당으로 지급하는 비율\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당락일\u003c/td\u003e\n\u003ctd\u003e이 날 이후 주식을 사면 배당을 못 받는 기준일\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당 기준일\u003c/td\u003e\n\u003ctd\u003e이 날까지 주식을 보유해야 배당을 받을 수 있는 날\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e주의: 배당락일 이후엔 주가가 배당금만큼 하락하는 경향이 있다. 배당만 받고 팔면 결국 비슷하거나 손해일 수 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 세금과 수수료 — 양도세, 배당소득세, 거래세 기초\u003c/h2\u003e\n\u003cp\u003e투자 수익에는 세금이 따라온다. 미리 알아두면 당황하지 않는다.\u003c/p\u003e\n\u003ch3\u003e국내 주식 세금 구조 (2025년 기준)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e세금 종류\u003c/th\u003e\n\u003cth\u003e대상\u003c/th\u003e\n\u003cth\u003e세율\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e증권거래세\u003c/td\u003e\n\u003ctd\u003e주식 매도 시\u003c/td\u003e\n\u003ctd\u003e코스피 0.03%, 코스닥 0.18%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당소득세\u003c/td\u003e\n\u003ctd\u003e배당금 수령 시\u003c/td\u003e\n\u003ctd\u003e14% (지방세 포함 15.4%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e양도소득세\u003c/td\u003e\n\u003ctd\u003e대주주 기준 초과 시\u003c/td\u003e\n\u003ctd\u003e22~27.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e증권거래세\u003c/strong\u003e는 팔 때마다 자동으로 빠져나간다. 크진 않지만 자주 사고팔수록 누적된다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e배당소득세\u003c/strong\u003e는 배당금이 내 계좌에 들어올 때 이미 원천징수된 금액이 들어온다. 배당금 100만 원을 받으면 실제로는 84만6,000원이 들어온다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e양도소득세\u003c/strong\u003e는 대주주 요건(종목당 10억 원 이상 보유 또는 지분 1% 이상)에 해당하지 않으면 개인은 안 낸다. 하지만 해외주식은 250만 원 초과 수익에 대해 22%를 낸다.\u003c/p\u003e\n\u003ch3\u003e금융투자소득세 (금투세)\u003c/h3\u003e\n\u003cp\u003e원래 2025년부터 시행 예정이었으나 \u003cstrong\u003e2025년 1월 폐지\u003c/strong\u003e가 확정됐다. 연 5,000만 원 이상 수익에 과세하는 제도였는데, 개인 투자자 저변 확대를 위해 없애기로 했다.\u003c/p\u003e\n\u003ch3\u003e수수료\u003c/h3\u003e\n\u003cp\u003e증권사마다 다르지만, 키움증권 기준 온라인 거래 수수료는 약 \u003cstrong\u003e0.015%\u003c/strong\u003e 수준이다. 100만 원어치를 사면 수수료는 150원 정도다. 예전에 비해 많이 낮아졌다.\u003c/p\u003e\n\u003ch3\u003eISA 계좌 활용\u003c/h3\u003e\n\u003cp\u003eISA(개인종합자산관리계좌)를 활용하면 세금을 아낄 수 있다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e일반형\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eISA:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e연\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e만\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e원\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e비과세,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e초과분은\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e9.9\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e분리과세\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e서민형\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eISA:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e연\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e400\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e만\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e원\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e비과세\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e의무\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e가입\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e기간:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e년\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e장기 투자자라면 ISA 계좌를 꼭 활용해볼 것. 배당소득세와 매매차익에 대한 절세 효과가 크다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리 — 이것만 기억하자\u003c/h2\u003e\n\u003cp\u003e이번 포스트에서 다룬 핵심 내용을 정리해보면:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e주식 = 회사의 소유권 조각\u003c/strong\u003e. 주주가 되면 법적으로 회사의 일부를 소유한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e코스피·코스닥\u003c/strong\u003e이 한국의 주요 주식시장이고, 거래는 오전 9시~오후 3시 30분에 이루어진다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e투자와 투기를 구분\u003c/strong\u003e하고, 초보자는 장기 투자 관점을 먼저 익혀야 한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e지정가 주문\u003c/strong\u003e을 습관으로 삼아라. 시장가는 급할 때만 쓰자.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e수익 = 시세차익 + 배당\u003c/strong\u003e. 두 가지를 모두 이해하고 전략을 세우자.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e세금은 미리 파악\u003c/strong\u003e해두자. 특히 ISA 계좌는 장기 투자자에게 큰 도움이 된다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e다음 포스트에서는 어떤 주식을 고를지, 관심종목을 만드는 방법을 알아보자.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-25\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"주식 투자 입문 (1) — 주식이란 무엇인가\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"주식 투자 입문 (1) — 주식이란 무엇인가 | midasworld (Private)\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"서버 개발 학습 블로그\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/favicon.ico?favicon.0b3bf435.ico\",\"sizes\":\"256x256\",\"type\":\"image/x-icon\"}],[\"$\",\"$L16\",\"3\",{}]]\n"])</script></body></html>
