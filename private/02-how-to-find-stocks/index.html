03c/strong\u003e 좁혀가는 방식이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e거시경제 분석\n\u003cspan class=\"hljs-code\"\u003e    ↓\n유망 섹터(업종) 선택\n    ↓\n섹터 내 대표 기업 선택\n    ↓\n개별 종목 분석\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e예를 들어 이런 사고 흐름이다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"미국이 금리를 내리기 시작했다. 금리 인하 시기에는 성장주가 좋다. 성장주 중에서도 AI 인프라 수요가 늘어나니까 반도체 섹터가 유망하다. 국내 반도체 중에서 시장점유율과 기술력이 높은 SK하이닉스를 주목해보자.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e이 접근법은 \u003cstrong\u003e거시경제 흐름을 읽는 안목\u003c/strong\u003e이 중요하다. 경기 사이클, 금리, 환율, 정부 정책 등을 공부해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e탑다운이 유용한 상황\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e특정 섹터나 테마가 뜨고 있을 때 (AI, 전기차, 바이오 등)\u003c/li\u003e\n\u003cli\u003e거시경제 변화가 뚜렷할 때 (금리 인하, 환율 급등락 등)\u003c/li\u003e\n\u003cli\u003e섹터 ETF 투자를 검토할 때\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e바텀업 (Bottom-Up) 접근\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e개별 기업부터\u003c/strong\u003e 시작해서 그 기업이 속한 산업으로 올라가는 방식이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e개별 기업 발굴\n\u003cspan class=\"hljs-code\"\u003e    ↓\n비즈니스 모델 이해\n    ↓\n재무 상태 확인\n    ↓\n적정 주가 계산\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e예를 들어 이런 식이다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"내가 자주 쓰는 카카오페이가 수수료 수익 모델인데, 사용자 수가 급증하고 있다. 실제로 사업을 분석해보니 아직 흑자 전환 전인데 주가가 많이 빠져 있다. 향후 수익성 개선 여지가 있어 보인다.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e이 접근법은 \u003cstrong\u003e기업을 깊이 이해하는 능력\u003c/strong\u003e이 필요하다. 재무제표를 읽고, 산업 구조를 파악하고, 경쟁 관계를 분석해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e바텀업이 유용한 상황\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e일상에서 발견한 서비스나 제품이 좋다고 느낄 때\u003c/li\u003e\n\u003cli\u003e특정 산업에 대한 지식이 깊을 때\u003c/li\u003e\n\u003cli\u003e저평가된 가치주를 찾을 때\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e피터 린치의 명언: \"소비자로서 좋은 제품을 발견하면, 그 회사 주식을 먼저 찾아봐라.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e두 접근법 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e탑다운\u003c/th\u003e\n\u003cth\u003e바텀업\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시작점\u003c/td\u003e\n\u003ctd\u003e거시경제, 금리, 환율\u003c/td\u003e\n\u003ctd\u003e개별 기업, 제품\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e강점\u003c/td\u003e\n\u003ctd\u003e시장 전반 흐름 포착\u003c/td\u003e\n\u003ctd\u003e저평가 기업 발굴\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e약점\u003c/td\u003e\n\u003ctd\u003e개별 기업 리스크 간과 가능\u003c/td\u003e\n\u003ctd\u003e거시 흐름 역행 위험\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e적합 투자자\u003c/td\u003e\n\u003ctd\u003e경제 공부를 좋아하는 사람\u003c/td\u003e\n\u003ctd\u003e특정 산업 전문가, 관찰력 있는 소비자\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 스크리너 활용법 — 네이버증권, KRX, Finviz 실습\u003c/h2\u003e\n\u003cp\u003e수천 개의 종목을 하나하나 볼 순 없다. 스크리너(Screener)를 활용해서 조건에 맞는 종목만 걸러내자.\u003c/p\u003e\n\u003ch3\u003e네이버 증권 스크리너\u003c/h3\u003e\n\u003cp\u003e국내 주식 검색에 가장 편리한 무료 도구다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e접속 방법\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-arduino\"\u003e네이버 금융 (finance.naver.com)\n→ 상단 메뉴 \u003cspan class=\"hljs-string\"\u003e'국내증시'\u003c/span\u003e\n→ 왼쪽 사이드바 \u003cspan class=\"hljs-string\"\u003e'종목검색 (스크리너)'\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e또는 직접 접속: \u003ccode\u003ehttps://finance.naver.com/sise/finder_main.naver\u003c/code\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e사용법\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e왼쪽에 조건을 설정하면 오른쪽에 해당 종목 목록이 나온다. 예를 들어 이런 조건을 설정해볼 수 있다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e시가총액: 3,000억 원 이상\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003ePER: 5 이상 ~ 15 이하\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003eROE: 10% 이상\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e부채비율: 100% 이하\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e처음엔 너무 많은 조건을 걸지 말고, 2~3개 조건으로 시작해서 나온 종목들을 살펴보는 게 좋다.\u003c/p\u003e\n\u003ch3\u003eKRX 정보데이터시스템\u003c/h3\u003e\n\u003cp\u003e한국거래소(KRX)에서 운영하는 공식 데이터 플랫폼이다. 더 정확한 데이터를 제공하고 엑셀 다운로드도 가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e접속 방법\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-kotlin\"\u003eKRX 정보데이터시스템: \u003cspan class=\"hljs-keyword\"\u003edata\u003c/span\u003e.krx.co.kr\n→ 주식 → 종목 → 전종목 기본정보\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e여기서 전체 종목의 시가총액, PER, PBR, ROE 등을 엑셀로 내려받아서 자신만의 필터링 작업을 할 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e활용 팁\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매일 장 마감 후 업데이트되므로 주기적으로 다운로드해두면 좋다.\u003c/li\u003e\n\u003cli\u003e엑셀에서 조건부 서식이나 필터 기능을 쓰면 빠르게 정렬할 수 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eFinviz (해외주식용)\u003c/h3\u003e\n\u003cp\u003e미국 주식에 관심이 있다면 \u003cstrong\u003eFinviz\u003c/strong\u003e가 필수 도구다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-arduino\"\u003e접속: finviz.com → 상단 메뉴 \u003cspan class=\"hljs-string\"\u003e'Screener'\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eFinviz는 무료로 매우 강력한 스크리닝 기능을 제공한다. 200개 이상의 필터 조건을 설정할 수 있고, 시각화 도구도 제공한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e기본 필터 예시 (성장주 탐색)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-attr\"\u003eCountry:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eUSA\u003c/span\u003e\n\u003cspan class=\"hljs-attr\"\u003eMarket Cap:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eMid\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e($2bln\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eto\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e$10bln)\u003c/span\u003e\n\u003cspan class=\"hljs-attr\"\u003eP/E:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eUnder\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e\n\u003cspan class=\"hljs-attr\"\u003eEPS growth next 5 years:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ePositive\u003c/span\u003e\n\u003cspan class=\"hljs-attr\"\u003eDebt/Equity:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eUnder\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.5\u003c/span\u003e\n\u003cspan class=\"hljs-attr\"\u003eAverage Volume:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eOver\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e500K\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 필터 조건 설정 — 시가총액, 섹터, 기본 지표\u003c/h2\u003e\n\u003cp\u003e스크리너에서 자주 쓰는 조건들을 이해해두자. 숫자를 외울 필요는 없다. 의미만 알면 된다.\u003c/p\u003e\n\u003ch3\u003e시가총액 (Market Cap)\u003c/h3\u003e\n\u003cp\u003e회사의 총 가치. \u003cstrong\u003e주가 × 발행 주식 수\u003c/strong\u003e로 계산된다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e시가총액\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e대형주\u003c/td\u003e\n\u003ctd\u003e1조 원 이상\u003c/td\u003e\n\u003ctd\u003e안정적, 변동성 낮음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e중형주\u003c/td\u003e\n\u003ctd\u003e3,000억~1조 원\u003c/td\u003e\n\u003ctd\u003e성장 여지와 안정성 균형\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소형주\u003c/td\u003e\n\u003ctd\u003e300억~3,000억 원\u003c/td\u003e\n\u003ctd\u003e높은 성장 가능성, 높은 리스크\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e마이크로캡\u003c/td\u003e\n\u003ctd\u003e300억 원 미만\u003c/td\u003e\n\u003ctd\u003e정보 부족, 조작 위험\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e초보자는 \u003cstrong\u003e대형주나 중형주\u003c/strong\u003e에서 시작하는 걸 권장한다. 정보도 많고 분석 자료도 풍부하다.\u003c/p\u003e\n\u003ch3\u003ePER (Price-Earnings Ratio, 주가수익비율)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e주가 ÷ 주당순이익(EPS)\u003c/strong\u003e. \"이 주식이 이익 대비 얼마나 비싼가\"를 나타낸다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003ePER \u003cspan class=\"hljs-attr\"\u003e10\u003c/span\u003e = 지금 이익 수준을 유지한다면 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년치 이익이 현재 주가에 반영됐다는 뜻\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003ePER이 낮으면 → 상대적으로 저평가(or 성장 기대가 낮음)\u003c/li\u003e\n\u003cli\u003ePER이 높으면 → 상대적으로 고평가(or 미래 성장에 대한 기대가 높음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e업종마다 평균 PER이 다르다. 반도체·IT는 30~50도 많고, 금융·에너지는 10 이하인 경우도 흔하다. 같은 업종 내에서 비교해야 의미가 있다.\u003c/p\u003e\n\u003ch3\u003ePBR (Price-to-Book Ratio, 주가순자산비율)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e주가 ÷ 주당순자산\u003c/strong\u003e. \"회사를 청산했을 때 돌려받는 자산 대비 주가가 얼마나 높은가\"를 나타낸다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePBR 1 미만 → 장부 가치보다 주가가 낮음 (저평가 가능성)\u003c/li\u003e\n\u003cli\u003ePBR 1 이상 → 장부 가치보다 주가가 높음 (성장 프리미엄)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eROE (Return on Equity, 자기자본이익률)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e순이익 ÷ 자기자본 × 100\u003c/strong\u003e. \"내 돈 100원을 넣었을 때 얼마의 이익을 냈는가\"를 나타낸다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eROE 15% 이상 → 좋은 편\u003c/li\u003e\n\u003cli\u003eROE 10% 미만 → 자본 효율성이 낮음\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eROE는 \u003cstrong\u003e지속성\u003c/strong\u003e이 중요하다. 일시적으로 높은 ROE보다, 5년 이상 꾸준히 15% 이상을 유지하는 회사가 진짜 강한 회사다.\u003c/p\u003e\n\u003ch3\u003e부채비율\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e총부채 ÷ 자기자본 × 100\u003c/strong\u003e. 회사가 얼마나 빚을 지고 있는지 나타낸다.\u003c/p\u003e\n\u003cp\u003e일반적으로 \u003cstrong\u003e100~200% 이하\u003c/strong\u003e면 안정적으로 본다. 업종마다 다르긴 한데 (금융업은 특성상 높다), 제조업·IT에서 부채비율이 400%를 넘으면 주의가 필요하다.\u003c/p\u003e\n\u003ch3\u003e섹터 분류\u003c/h3\u003e\n\u003cp\u003e섹터별로 나눠서 보면 산업 트렌드를 파악하는 데 도움이 된다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e섹터\u003c/th\u003e\n\u003cth\u003e대표 업종\u003c/th\u003e\n\u003cth\u003e경기 민감도\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eIT/기술\u003c/td\u003e\n\u003ctd\u003e반도체, 소프트웨어\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e헬스케어\u003c/td\u003e\n\u003ctd\u003e제약, 바이오\u003c/td\u003e\n\u003ctd\u003e낮음 (방어주)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융\u003c/td\u003e\n\u003ctd\u003e은행, 증권, 보험\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소비재\u003c/td\u003e\n\u003ctd\u003e음식료, 화장품\u003c/td\u003e\n\u003ctd\u003e낮음 (경기방어)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e에너지\u003c/td\u003e\n\u003ctd\u003e정유, 신재생에너지\u003c/td\u003e\n\u003ctd\u003e매우 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유틸리티\u003c/td\u003e\n\u003ctd\u003e전기, 가스\u003c/td\u003e\n\u003ctd\u003e낮음 (방어주)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e경기 침체가 예상될 때는 방어주(헬스케어, 유틸리티)로 이동하고, 경기 회복 초기엔 경기민감주(IT, 에너지)를 주목하는 게 기본 전략이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 관심종목 리스트 관리법\u003c/h2\u003e\n\u003cp\u003e스크리너를 돌리면 수십 개의 종목이 걸려 나온다. 이걸 어떻게 관리할까?\u003c/p\u003e\n\u003ch3\u003e3단계 분류법\u003c/h3\u003e\n\u003cp\u003e관심종목을 3개 버킷으로 나눠서 관리하는 걸 권장한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e[관심 버킷 A] — 지금 당장 살 수 있다\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 충분히 분석했고, 가격만 맞으면 매수\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 3~5종목 이하로 유지\n\n[관심 버킷 B] — 더 공부가 필요하다\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 기본 분석은 했지만 재무나 비즈니스 모델 파악 중\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 10~15종목\n\n[관심 버킷 C] — 일단 눈에 띈 종목\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 스크리너에서 걸렸거나 뉴스에서 본 종목\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 언제든 삭제 가능, 50종목도 괜찮음\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e관심종목에 메모하기\u003c/h3\u003e\n\u003cp\u003e증권사 앱의 관심종목에는 메모 기능이 있다. 아니면 노션이나 엑셀을 활용해도 된다. 관심종목을 추가할 때 반드시 이유를 적어두자.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e종목명: SK하이닉스\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e추가일: 2026-03-25\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e이유: HBM(고대역폭메모리) 수요 급증, AI 인프라 확장 수혜\u003c/span\u003e\n목표 매수가: 150,000원 이하\n\u003cspan class=\"hljs-section\"\u003e주의사항: 반도체 업황 사이클 주의, 중국 수출 규제 리스크\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e6개월 뒤에 다시 보면, 당시 판단이 맞았는지 틀렸는지 복기가 가능하다. 이 과정이 쌓이면 분석 능력이 빠르게 늘어난다.\u003c/p\u003e\n\u003ch3\u003e정기적인 리뷰\u003c/h3\u003e\n\u003cp\u003e관심종목 리스트는 분기에 한 번씩은 정리하자.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e버킷 C에서 3개월이 지나도 공부를 안 했다면 삭제\u003c/li\u003e\n\u003cli\u003e투자 논리가 무너진 종목은 과감하게 제거\u003c/li\u003e\n\u003cli\u003e새로 발굴한 종목은 이유를 달아서 C 버킷에 추가\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 정보 소스 정리 — DART 공시, 뉴스, 애널리스트 리포트\u003c/h2\u003e\n\u003cp\u003e좋은 종목을 찾았다면 이제 더 깊이 파야 한다. 어디서 정보를 찾을까?\u003c/p\u003e\n\u003ch3\u003eDART (전자공시시스템)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003edart.fss.or.kr\u003c/strong\u003e — 금융감독원이 운영하는 공시 시스템이다. 상장 기업은 의무적으로 여기에 각종 보고서를 공시해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e꼭 챙겨봐야 할 공시 종류\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e공시 종류\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003cth\u003e제출 주기\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e사업보고서\u003c/td\u003e\n\u003ctd\u003e연간 사업 현황, 재무제표 전체\u003c/td\u003e\n\u003ctd\u003e연 1회 (3월)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e분기보고서\u003c/td\u003e\n\u003ctd\u003e분기 실적, 재무 현황\u003c/td\u003e\n\u003ctd\u003e분기별 (5, 8, 11월)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반기보고서\u003c/td\u003e\n\u003ctd\u003e상반기 결산\u003c/td\u003e\n\u003ctd\u003e연 1회 (8월)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주요사항보고\u003c/td\u003e\n\u003ctd\u003e유상증자, 합병, 대규모 투자 등\u003c/td\u003e\n\u003ctd\u003e수시\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e처음엔 \u003cstrong\u003e사업보고서의 '사업의 내용'\u003c/strong\u003e 섹션만 읽어도 충분하다. 회사가 무슨 사업을 하고, 어떤 제품이 주력이고, 어떤 위험 요인이 있는지 나온다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDART 검색 방법\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-python\"\u003edart.fss.\u003cspan class=\"hljs-keyword\"\u003eor\u003c/span\u003e.kr 접속\n→ 검색창에 회사명 입력\n→ 검색 결과에서 \u003cspan class=\"hljs-string\"\u003e'사업보고서'\u003c/span\u003e 클릭\n→ \u003cspan class=\"hljs-string\"\u003e'사업의 내용'\u003c/span\u003e → \u003cspan class=\"hljs-string\"\u003e'재무에 관한 사항'\u003c/span\u003e 순서로 읽기\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e뉴스 활용\u003c/h3\u003e\n\u003cp\u003e뉴스는 투자 판단의 \u003cstrong\u003e보조 수단\u003c/strong\u003e으로만 써야 한다. 뉴스 헤드라인만 보고 매수하는 건 위험하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e좋은 뉴스 활용법\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e이미 보유 중인 종목의 실적 발표, 계약 체결 뉴스 확인용\u003c/li\u003e\n\u003cli\u003e관심 섹터의 산업 동향 파악용\u003c/li\u003e\n\u003cli\u003e규제 변화, 글로벌 공급망 이슈 모니터링용\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e추천 뉴스 소스\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e국내:\n\u003cspan class=\"hljs-deletion\"\u003e- 한국경제 (hankyung.com)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 매일경제 (mk.co.kr)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 머니투데이 (mt.co.kr)\u003c/span\u003e\n\n해외:\n\u003cspan class=\"hljs-deletion\"\u003e- Bloomberg (bloomberg.com)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- Financial Times (ft.com)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- Wall Street Journal (wsj.com) — 유료지만 가치 있음\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e주의: 이런 뉴스는 무시해라\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"○○주식, 오를 종목 TOP 5\"\u003c/li\u003e\n\u003cli\u003e\"전문가 추천 급등주\"\u003c/li\u003e\n\u003cli\u003e유튜브 주식 채널의 종목 추천 (특히 수익 인증 강조하는 채널)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이런 콘텐츠는 정보 제공이 아니라 마케팅이거나 심각한 경우 불법 주가 조작과 연루되기도 한다.\u003c/p\u003e\n\u003ch3\u003e애널리스트 리포트\u003c/h3\u003e\n\u003cp\u003e국내 증권사에는 각 업종과 종목을 전담으로 분석하는 애널리스트(Analyst)들이 있다. 이들이 작성하는 리포트는 재무 분석, 목표 주가, 투자 의견 등을 담고 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e무료로 리포트 보는 방법\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-arduino\"\u003e네이버 증권 (finance.naver.com)\n→ 종목 검색\n→ \u003cspan class=\"hljs-string\"\u003e'리서치'\u003c/span\u003e 탭\n→ 최신 리포트 확인\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e또는 \u003cstrong\u003e에프앤가이드(fnguide.com)\u003c/strong\u003e, \u003cstrong\u003e인포스탁(infostock.co.kr)\u003c/strong\u003e 등에서도 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e리포트를 읽는 방법\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e애널리스트 리포트는 무조건 믿어서는 안 된다. 몇 가지 편향이 있다.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e매수 편향\u003c/strong\u003e: 증권사는 기업과 관계가 있어서 '매도' 의견을 잘 안 낸다. 대부분 '매수' 또는 '중립'이다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e목표주가 따라가기\u003c/strong\u003e: 주가가 오르면 목표주가도 올리고, 떨어지면 내린다. 후행적인 경우가 많다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e정보 활용 포인트\u003c/strong\u003e: 리포트의 \u003cstrong\u003e숫자와 논리\u003c/strong\u003e를 참고하되, 투자 판단은 스스로 내려야 한다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e애널리스트 리포트에서 가장 유용한 부분은 \u003cstrong\u003e업황 분석\u003c/strong\u003e과 \u003cstrong\u003e실적 추정치\u003c/strong\u003e다. 회사가 앞으로 얼마나 벌 것 같은지, 산업 내 경쟁 구도가 어떻게 변화하는지에 대한 전문적인 시각을 참고할 수 있다.\u003c/p\u003e\n\u003ch3\u003e기업 IR 자료\u003c/h3\u003e\n\u003cp\u003e많은 기업이 홈페이지나 DART에 \u003cstrong\u003eIR(Investor Relations)\u003c/strong\u003e 자료를 올린다. 회사 스스로 투자자에게 자신을 설명하는 자료다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e예시:\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e삼성전자\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eIR:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eir.samsung.com\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003eSK하이닉스\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eIR:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ewww.skhynix.com\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eIR\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eIR자료실\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eIR 자료에는 사업 전략, 중장기 목표, 시장 전망 등이 잘 정리되어 있다. 사업보고서보다 읽기 쉬운 편이다. 단, 회사 입장에서 유리하게 작성된 자료라는 점을 감안해야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리 — 이것만 기억하자\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e**탑다운(거시 → 섹터 → 종목)**과 \u003cstrong\u003e바텀업(종목 → 산업)\u003c/strong\u003e 두 가지 접근을 상황에 맞게 섞어 써라.\u003c/li\u003e\n\u003cli\u003e스크리너(네이버증권, KRX, Finviz)로 일차 필터링하고, 통과한 종목만 깊이 파보자.\u003c/li\u003e\n\u003cli\u003e관심종목은 \u003cstrong\u003eA/B/C 버킷\u003c/strong\u003e으로 나눠서 관리하고, 추가 이유와 주의사항을 반드시 메모해라.\u003c/li\u003e\n\u003cli\u003eDART 공시는 \u003cstrong\u003e가장 신뢰할 수 있는 1차 소스\u003c/strong\u003e다. 애널리스트 리포트는 참고용으로만.\u003c/li\u003e\n\u003cli\u003e뉴스와 유튜브 종목 추천은 \u003cstrong\u003e필터링해서\u003c/strong\u003e 봐야 한다. 정보와 소음을 구별하는 능력이 투자의 핵심이다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e다음 포스트에서는 관심종목이 생겼을 때 그 회사의 비즈니스 모델을 어떻게 분석하는지 알아보자.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Pr
