버는지는 완전히 다를 수 있다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e회사\u003c/th\u003e\n\u003cth\u003e수익 모델\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e삼성전자\u003c/td\u003e\n\u003ctd\u003e반도체·스마트폰 판매 (제품 판매)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e카카오\u003c/td\u003e\n\u003ctd\u003e광고, 게임, 커머스 수수료 (플랫폼)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e네이버웹툰\u003c/td\u003e\n\u003ctd\u003e웹툰 열람권, 쿠키 판매 (콘텐츠 구독)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e크래프톤\u003c/td\u003e\n\u003ctd\u003e게임 인게임 아이템 판매 (마이크로트랜잭션)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e비즈니스 모델을 분석할 때 확인해야 할 7가지 요소가 있다.\u003c/p\u003e\n\u003ch3\u003e비즈니스 모델 7문항\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 고객이 누구인가? (B2B, B2C, 둘 다?)\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 어떤 문제를 해결해주는가?\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 수익이 어디서 나는가? (제품, 서비스, 구독, 광고, 수수료?)\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e 비용의 대부분은 어디서 발생하는가?\n\u003cspan class=\"hljs-bullet\"\u003e5.\u003c/span\u003e 핵심 자원은 무엇인가? (기술, 사람, 특허, 네트워크?)\n\u003cspan class=\"hljs-bullet\"\u003e6.\u003c/span\u003e 경쟁자가 쉽게 따라 할 수 있는가?\n\u003cspan class=\"hljs-bullet\"\u003e7.\u003c/span\u003e 규모가 커질수록 단위 비용이 줄어드는가? (규모의 경제)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이 질문들에 대한 답을 스스로 적어보면, 기업을 이해하는 속도가 확 달라진다.\u003c/p\u003e\n\u003ch3\u003e수익 모델의 종류\u003c/h3\u003e\n\u003cp\u003e수익 모델은 크게 다음과 같이 나뉜다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e제품 판매형\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e물건을 만들어서 판다. 가장 고전적인 모델이다.\u003c/li\u003e\n\u003cli\u003e예: 삼성전자(스마트폰), 포스코(철강), 현대차(자동차)\u003c/li\u003e\n\u003cli\u003e장점: 이해하기 쉽다.\u003c/li\u003e\n\u003cli\u003e단점: 재고 리스크, 원자재 가격 변동에 취약하다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e서비스형 (SaaS 포함)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e사용한 만큼 요금을 내거나, 구독으로 주기적 결제를 받는다.\u003c/li\u003e\n\u003cli\u003e예: AWS, 에이블리(패션 플랫폼), 더존비즈온(B2B SaaS)\u003c/li\u003e\n\u003cli\u003e장점: 수익이 안정적이고 예측 가능하다. 이탈률(Churn Rate)이 낮으면 매우 강력하다.\u003c/li\u003e\n\u003cli\u003e단점: 초기 고객 유치 비용이 높다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e플랫폼형 (양면 시장)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e판매자와 구매자를 연결하고 수수료를 받는다.\u003c/li\u003e\n\u003cli\u003e예: 쿠팡, 카카오, 배달의민족, 무신사\u003c/li\u003e\n\u003cli\u003e장점: 네트워크 효과. 사용자가 늘수록 플랫폼 가치가 올라간다.\u003c/li\u003e\n\u003cli\u003e단점: 초기 양면 부트스트래핑이 어렵고, 규제 리스크가 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e광고형\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e서비스를 무료로 제공하고, 광고주에게 돈을 받는다.\u003c/li\u003e\n\u003cli\u003e예: 네이버, 카카오, 구글\u003c/li\u003e\n\u003cli\u003e장점: 사용자 확보가 빠르다.\u003c/li\u003e\n\u003cli\u003e단점: 광고 시장 경기에 민감하고, 사용자 프라이버시 규제 위험이 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e구독형\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매월 또는 매년 정기 결제를 받는다.\u003c/li\u003e\n\u003cli\u003e예: 넷플릭스, 스포티파이, 유료 앱 서비스\u003c/li\u003e\n\u003cli\u003e장점: 수익 예측이 가능하고 고객 생애 가치(LTV)가 높다.\u003c/li\u003e\n\u003cli\u003e단점: 구독자 유지(Retention)에 지속적인 투자가 필요하다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e워런 버핏의 \"경제적 해자(Economic Moat)\"\u003c/h3\u003e\n\u003cp\u003e버핏이 투자할 때 가장 중요하게 보는 게 있다. 바로 경쟁자가 쉽게 따라올 수 없는 \u003cstrong\u003e경제적 해자(Economic Moat)\u003c/strong\u003e 다. 성(castle)을 외부 적으로부터 보호하는 해자(moat)처럼, 기업을 경쟁자로부터 보호하는 강점이다.\u003c/p\u003e\n\u003cp\u003e해자의 종류는 크게 다섯 가지다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e해자 종류\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003cth\u003e예시\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e브랜드 파워\u003c/td\u003e\n\u003ctd\u003e프리미엄을 받을 수 있는 강력한 브랜드\u003c/td\u003e\n\u003ctd\u003e애플, 루이비통\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e전환 비용\u003c/td\u003e\n\u003ctd\u003e다른 서비스로 갈아타기 어렵게 만드는 비용\u003c/td\u003e\n\u003ctd\u003eSAP ERP, 어도비\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e네트워크 효과\u003c/td\u003e\n\u003ctd\u003e사용자가 많을수록 더 가치가 높아지는 구조\u003c/td\u003e\n\u003ctd\u003e카카오, 링크드인\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e비용 우위\u003c/td\u003e\n\u003ctd\u003e경쟁자보다 훨씬 싸게 만들 수 있는 능력\u003c/td\u003e\n\u003ctd\u003e쿠팡(물류 효율화), 코스트코\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e허가·특허\u003c/td\u003e\n\u003ctd\u003e규제나 특허로 진입장벽이 높음\u003c/td\u003e\n\u003ctd\u003e제약사, 방위산업\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e투자하려는 기업의 해자가 무엇인지 반드시 찾아봐야 한다. 해자가 없는 기업은 경쟁이 심해지면 수익성이 급격히 악화된다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 산업 생애주기 — 도입기, 성장기, 성숙기, 쇠퇴기\u003c/h2\u003e\n\u003cp\u003e기업만 봐서는 안 된다. 그 기업이 속한 \u003cstrong\u003e산업 자체가 어느 단계에 있는지\u003c/strong\u003e도 봐야 한다.\u003c/p\u003e\n\u003ch3\u003e4단계 생애주기\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e도입기 → 성장기 → 성숙기 → 쇠퇴기\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e도입기 (Introduction)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e새로운 기술이나 제품이 처음 시장에 나온 시기다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e시장 규모 작고, 인지도 낮음\u003c/li\u003e\n\u003cli\u003e수익보다 투자가 훨씬 많다 (적자가 당연)\u003c/li\u003e\n\u003cli\u003e기술 표준이 아직 정해지지 않아 경쟁자 다수\u003c/li\u003e\n\u003cli\u003e예시: AI 에이전트(2024~2025), 자율주행(2020년대 초)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 단계에서 투자하면 대박 or 쪽박이다. 표준을 장악하는 기업 하나가 시장을 독식한다. 위험이 높지만 수익 잠재력도 크다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e성장기 (Growth)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e시장 표준이 결정되고, 수요가 폭발적으로 증가하는 시기다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매출 고성장 (연 20~30% 이상)\u003c/li\u003e\n\u003cli\u003e경쟁자가 늘어나지만 파이 자체가 빠르게 커져서 다들 성장\u003c/li\u003e\n\u003cli\u003e수익성 개선 시작\u003c/li\u003e\n\u003cli\u003e예시: 클라우드(2015\u003cdel\u003e2020), 전기차(2019\u003c/del\u003e2022), OTT(2015~2020)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 단계가 투자하기 가장 좋은 시기다. 성장이 확실하고, 아직 주가에 과도하게 반영되지 않은 경우가 많다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e성숙기 (Maturity)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e성장이 둔화되고 시장 점유율 싸움이 치열해지는 시기다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매출 성장률 낮아짐 (연 5~10%)\u003c/li\u003e\n\u003cli\u003eM\u0026#x26;A, 구조조정, 원가절감 중심\u003c/li\u003e\n\u003cli\u003e배당이나 자사주 매입으로 주주에게 현금 환원\u003c/li\u003e\n\u003cli\u003e예시: 철강(포스코), 통신사(KT, SKT), 대형마트\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 단계에서는 성장 기대보다 \u003cstrong\u003e안정적인 현금흐름\u003c/strong\u003e과 \u003cstrong\u003e배당\u003c/strong\u003e에 주목한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e쇠퇴기 (Decline)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e산업 자체가 줄어드는 시기다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매출 감소, 구조적 적자 기업 증가\u003c/li\u003e\n\u003cli\u003e도태되는 기업과 살아남는 기업 갈림\u003c/li\u003e\n\u003cli\u003e예시: 인쇄신문, 필름카메라, 오프라인 DVD 대여\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e쇠퇴기 산업이라도 살아남는 기업은 큰 수익을 낼 수 있다. (마지막 남은 경쟁자가 시장 전체를 가져가기 때문)\u003c/p\u003e\n\u003ch3\u003e단계별 투자 전략 요약\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e단계\u003c/th\u003e\n\u003cth\u003e투자 포인트\u003c/th\u003e\n\u003cth\u003e위험도\u003c/th\u003e\n\u003cth\u003e수익 잠재력\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e도입기\u003c/td\u003e\n\u003ctd\u003e기술 우위 기업 선별\u003c/td\u003e\n\u003ctd\u003e매우 높음\u003c/td\u003e\n\u003ctd\u003e매우 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e성장기\u003c/td\u003e\n\u003ctd\u003e점유율 1~2위 기업\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e성숙기\u003c/td\u003e\n\u003ctd\u003e배당·현금흐름 안정 기업\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e쇠퇴기\u003c/td\u003e\n\u003ctd\u003e살아남는 1등 기업\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 경쟁 구조 분석 — 포터의 5 Forces 실전 적용\u003c/h2\u003e\n\u003cp\u003e마이클 포터(Michael Porter)가 개발한 \u003cstrong\u003e5 Forces 모델\u003c/strong\u003e은 산업의 경쟁 강도와 수익성을 체계적으로 분석하는 프레임워크다. 전략 컨설팅과 투자 분석에서 모두 널리 쓰인다.\u003c/p\u003e\n\u003ch3\u003e5가지 힘(Forces)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e                   \u003cspan class=\"hljs-selector-attr\"\u003e[신규 진입자 위협]\u003c/span\u003e\n                          ↓\n\u003cspan class=\"hljs-selector-attr\"\u003e[공급자 교섭력]\u003c/span\u003e ← \u003cspan class=\"hljs-selector-attr\"\u003e[산업 내 경쟁]\u003c/span\u003e → \u003cspan class=\"hljs-selector-attr\"\u003e[구매자 교섭력]\u003c/span\u003e\n                          ↑\n                   \u003cspan class=\"hljs-selector-attr\"\u003e[대체재 위협]\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e각 힘이 강할수록 해당 산업의 수익성은 낮아진다. 반대로 5가지 힘이 모두 약하면, 그 산업의 기업들은 높은 수익성을 오래 유지할 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eForce 1: 산업 내 경쟁 강도 (Rivalry Among Existing Competitors)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e현재 경쟁자들이 얼마나 치열하게 싸우는가?\u003c/p\u003e\n\u003cp\u003e강도를 높이는 요인:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e경쟁자가 많고 비슷한 크기\u003c/li\u003e\n\u003cli\u003e성장이 둔화된 산업 (파이가 안 커지니 빼앗아야 함)\u003c/li\u003e\n\u003cli\u003e차별화가 어려운 제품 (가격 경쟁 심화)\u003c/li\u003e\n\u003cli\u003e퇴출 장벽이 높음 (나가고 싶어도 못 나감)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eForce 2: 신규 진입자 위협 (Threat of New Entrants)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e새로운 경쟁자가 얼마나 쉽게 들어올 수 있는가?\u003c/p\u003e\n\u003cp\u003e진입장벽이 높을수록 기존 기업에게 유리하다. 장벽의 종류:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e막대한 초기 투자 자본 필요\u003c/li\u003e\n\u003cli\u003e특허·라이선스·규제\u003c/li\u003e\n\u003cli\u003e브랜드 충성도\u003c/li\u003e\n\u003cli\u003e대규모 유통망\u003c/li\u003e\n\u003cli\u003e규모의 경제 (기존 기업이 훨씬 싸게 생산)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eForce 3: 대체재 위협 (Threat of Substitute Products)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e우리 제품을 다른 방법으로 대신할 수 있는가?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e카카오택시 → 대중교통, 자전거, 도보\u003c/li\u003e\n\u003cli\u003e오프라인 서점 → 전자책, 유튜브 강의\u003c/li\u003e\n\u003cli\u003e호텔 → 에어비앤비\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e대체재가 많고 전환 비용이 낮으면, 기업이 가격을 함부로 올리지 못한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eForce 4: 구매자 교섭력 (Bargaining Power of Buyers)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e고객이 얼마나 강한 협상력을 갖고 있는가?\u003c/p\u003e\n\u003cp\u003e구매자 교섭력이 강해지는 경우:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e구매자 수가 적고 구매량이 크다 (대형 거래처)\u003c/li\u003e\n\u003cli\u003e제품 차별화가 없어서 쉽게 다른 공급자로 변경\u003c/li\u003e\n\u003cli\u003e구매자가 직접 만들 수 있는 능력이 있다 (후방 통합)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eForce 5: 공급자 교섭력 (Bargaining Power of Suppliers)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e원자재·부품 공급자가 얼마나 강한 협상력을 갖는가?\u003c/p\u003e\n\u003cp\u003e공급자 교섭력이 강해지는 경우:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e공급자 수가 적다 (희귀 원자재, 독점 기술)\u003c/li\u003e\n\u003cli\u003e대체 공급자 찾기 어렵다\u003c/li\u003e\n\u003cli\u003e공급자가 직접 판매도 가능하다 (전방 통합)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e예시: TSMC(파운드리)는 애플, 엔비디아 등 수많은 반도체 설계 기업에 부품을 납품하는데, 대체할 수 있는 파운드리가 없어서 교섭력이 매우 강하다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 실전 예시 — 삼성전자(하드웨어)와 네이버(플랫폼) 비교\u003c/h2\u003e\n\u003cp\u003e이론을 직접 적용해보자. 삼성전자와 네이버를 비교하면서 두 회사의 본질적인 차이를 이해해보겠다.\u003c/p\u003e\n\u003ch3\u003e삼성전자 분석\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e비즈니스 모델\u003c/strong\u003e\n삼성전자는 반도체(DS부문)와 스마트폰·가전(MX·VD부문)이 양대 축이다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e반도체: DRAM, NAND 플래시, 파운드리(위탁 생산) → 기업 대상 B2B\u003c/li\u003e\n\u003cli\u003e스마트폰(갤럭시): 소비자 대상 B2C, 프리미엄과 중저가 라인 병행\u003c/li\u003e\n\u003cli\u003e가전: TV, 세탁기, 에어컨 등\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e매출 구성 비중은 반도체가 약 40~50%를 차지하며, 반도체 업황이 삼성전자 전체 실적을 좌우한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e해자\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e반도체 기술 우위: DRAM 세계 시장점유율 1위 (~45%)\u003c/li\u003e\n\u003cli\u003e수직 계열화: 반도체 설계→생산→패키징까지 자체 수행\u003c/li\u003e\n\u003cli\u003e브랜드: 갤럭시 브랜드 파워 (프리미엄 스마트폰 시장에서 애플과 2강 구도)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e5 Forces 요약\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eForces\u003c/th\u003e\n\u003cth\u003e강도\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e산업 내 경쟁\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003eSK하이닉스, 마이크론과 치열한 점유율 경쟁\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e신규 진입자 위협\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e반도체 팹 구축에 수십조 원 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e대체재 위협\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003eAI·클라우드 확산으로 메모리 수요 꾸준히 증가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e구매자 교섭력\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e애플·엔비디아 같은 대형 고객은 협상력 강함\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e공급자 교섭력\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e장비(ASML 등)는 독점이지만 삼성 구매량이 워낙 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e리스크 요인\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e반도체 업황 사이클: 2022년처럼 공급 과잉이 오면 실적이 폭락한다.\u003c/li\u003e\n\u003cli\u003e중국 수출 규제: 미국의 대중국 반도체 수출 제재가 강화될수록 타격.\u003c/li\u003e\n\u003cli\u003eTSMC와의 파운드리 격차: 최첨단 공정에서 TSMC가 여전히 앞서 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e네이버 분석\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e비즈니스 모델\u003c/strong\u003e\n네이버는 검색 기반 광고에서 시작해 플랫폼 제국을 만들었다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e사업부문\u003c/th\u003e\n\u003cth\u003e수익원\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e서치플랫폼\u003c/td\u003e\n\u003ctd\u003e검색 광고, 디스플레이 광고\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e커머스\u003c/td\u003e\n\u003ctd\u003e스마트스토어 거래수수료, 브랜드스토어, 쇼핑라이브\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e핀테크\u003c/td\u003e\n\u003ctd\u003e네이버페이 결제 수수료, 대출 이자 수익\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e콘텐츠\u003c/td\u003e\n\u003ctd\u003e웹툰(네이버웹툰), 제페토(메타버스)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e클라우드\u003c/td\u003e\n\u003ctd\u003e네이버클라우드 플랫폼(NCP)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e해자\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e검색 지배력: 국내 검색 시장 점유율 약 60% (구글이 추격 중이지만 여전히 1위)\u003c/li\u003e\n\u003cli\u003e네트워크 효과: 쇼핑·콘텐츠·페이가 하나의 생태계를 이루어 이탈 어려움\u003c/li\u003e\n\u003cli\u003e데이터 우위: 수십억 건의 검색 데이터로 광고 타겟팅 정밀도 높음\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e5 Forces 요약\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eForces\u003c/th\u003e\n\u003cth\u003e강도\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e산업 내 경쟁\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003e구글(검색), 쿠팡(커머스), 카카오(모든 분야)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e신규 진입자 위협\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e검색 플랫폼은 네트워크 효과 때문에 신규 진입 어려움\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e대체재 위협\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003eAI 검색(ChatGPT, 제미나이)이 기존 검색을 대체 중\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e구매자 교섭력\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e광고주는 구글·카카오 등 대안 있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e공급자 교섭력\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e콘텐츠 공급자(웹툰 작가 등)는 다수 존재\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 리스크\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAI 검색으로의 전환: 생성형 AI가 기존 검색을 대체하면 광고 수익 모델이 흔들린다. 네이버가 가장 경계하는 리스크다.\u003c/li\u003e\n\u003cli\u003e쿠팡의 커머스 잠식: 스마트스토어 거래량이 쿠팡에 밀릴 경우 수수료 수익 감소.\u003c/li\u003e\n\u003cli\u003e라인야후 사태: 일본 정부의 자본 구조 변경 요구로 글로벌 전략에 불확실성 추가.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e두 회사 비교 요약\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e삼성전자\u003c/th\u003e\n\u003cth\u003e네이버\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e사업 유형\u003c/td\u003e\n\u003ctd\u003e자본집약적 제조업\u003c/td\u003e\n\u003ctd\u003e자본경량적 플랫폼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e수익 안정성\u003c/td\u003e\n\u003ctd\u003e사이클 영향 큼 (변동성 높음)\u003c/td\u003e\n\u003ctd\u003e광고·수수료 기반으로 비교적 안정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e성장 동력\u003c/td\u003e\n\u003ctd\u003eHBM·AI 반도체 수요\u003c/td\u003e\n\u003ctd\u003e커머스·핀테크·AI 전환\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당 성향\u003c/td\u003e\n\u003ctd\u003e적극적 주주환원\u003c/td\u003e\n\u003ctd\u003e성장 투자 우선\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePER 수준\u003c/td\u003e\n\u003ctd\u003e낮음 (사이클주 특성)\u003c/td\u003e\n\u003ctd\u003e상대적으로 높음 (플랫폼 프리미엄)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e어떤 회사가 더 좋고 나쁜 게 아니다. 둘은 \u003cstrong\u003e완전히 다른 유형의 기업\u003c/strong\u003e이고, 그에 따라 분석 방법과 투자 접근도 달라져야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 분석 템플릿\u003c/h2\u003e\n\u003cp\u003e관심 종목을 분석할 때 이 템플릿을 채워보자. 빈 칸을 채우다 보면 모르는 부분이 어디인지 자연스럽게 드러난다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e\u003cspan class=\"hljs-section\"\u003e## 기업명: [회사명]\u003c/span\u003e\n\n\u003cspan class=\"hljs-section\"\u003e### 1. 비즈니스 모델\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 주요 고객: (B2B / B2C)\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 수익 발생 방식: (제품판매 / 구독 / 광고 / 수수료)\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 매출 구성 비율: (사업부문별 %)\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 핵심 비용 항목:\n\n\u003cspan class=\"hljs-section\"\u003e### 2. 경제적 해자\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 해자 유형: (브랜드 / 전환비용 / 네트워크효과 / 비용우위 / 허가·특허)\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 해자의 지속 가능성: (강함 / 중간 / 약함)\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 이유:\n\n\u003cspan class=\"hljs-section\"\u003e### 3. 산업 생애주기\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 현재 단계: (도입기 / 성장기 / 성숙기 / 쇠퇴기)\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 근거:\n\n\u003cspan class=\"hljs-section\"\u003e### 4. 5 Forces 요약\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 산업 내 경쟁: (강 / 중 / 약) — 이유:\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 신규 진입자 위협: (강 / 중 / 약) — 이유:\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 대체재 위협: (강 / 중 / 약) — 이유:\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 구매자 교섭력: (강 / 중 / 약) — 이유:\n\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e 공급자 교섭력: (강 / 중 / 약) — 이유:\n\n\u003cspan class=\"hljs-section\"\u003e### 5. 핵심 리스크\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e\n\n\u003cspan class=\"hljs-section\"\u003e### 6. 투자 논리 (한 문장 요약)\u003c/span\u003e\n\"이 회사는 \u003cspan class=\"hljs-strong\"\u003e____\u003c/span\u003e 때문에 좋고, \u003cspan class=\"hljs-strong\"\u003e____\u003c/span\u003e 리스크가 있어서 \u003cspan class=\"hljs-strong\"\u003e____\u003c/span\u003e 조건이 되면 매수한다.\"\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이 문서를 채울 수 없다면 아직 그 기업에 대한 이해가 충분하지 않은 것이다. 이해가 안 되는 기업에 투자하면 주가가 떨어질 때 버티지 못하고 손절하게 된다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리 — 이것만 기억하자\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e수익 모델부터 이해해라\u003c/strong\u003e. 숫자(재무제표) 전에 이야기(비즈니스 모델)를 먼저 알아야 한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e경제적 해자를 찾아라\u003c/strong\u003e. 해자가 없는 기업은 경쟁 심화에 수익성이 급락한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e산업 생애주기를 파악해라\u003c/strong\u003e. 성장기 산업에서 1~2위 기업은 가장 좋은 투자 대상이다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e포터의 5 Forces로 경쟁 구조를 체계적으로 보자\u003c/strong\u003e. 5개 힘이 모두 약한 산업이 장기적으로 높은 수익성을 유지한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e분석 템플릿을 채워라\u003c/strong\u003e. 빈 칸이 많다면 아직 그 기업을 모르는 것이다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e다음 포스트에서는 재무제표(손익계산서, 재무상태표, 현금흐름표)를 읽는 방법을 다룰 예정이다. 비즈니스 모델을 이해했다면, 이제 숫자로 그 이야기를 검증할 차례다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-25\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"주식 투자 입문 (3) — 기업의 본질 이해하기\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gr
