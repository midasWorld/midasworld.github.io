y\"]\n11:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:T3385,"])</script><script>self.__next_f.push([1,"\u003ch1\u003e주식 투자 입문 (4) — 재무제표 읽기 1편: 손익계산서\u003c/h1\u003e\n\u003cp\u003e지금까지 주식이 뭔지, 시장이 어떻게 돌아가는지 감을 잡았다면, 이제 본론으로 들어갈 차례다. \u003cstrong\u003e\"이 회사가 진짜 돈을 잘 버는 회사인가?\"\u003c/strong\u003e 를 판단하는 능력. 이걸 익히는 게 주식 투자의 핵심이다.\u003c/p\u003e\n\u003cp\u003e그리고 그 판단의 근거가 되는 게 바로 \u003cstrong\u003e재무제표\u003c/strong\u003e다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 왜 재무제표를 봐야 하는가\u003c/h2\u003e\n\u003cp\u003e솔직히 말하자. 재무제표 안 보고 주식 사는 사람이 훨씬 많다. 뉴스 보고, 커뮤니티 보고, 유튜브 보고 산다. 그게 나쁜 건 아닌데, 문제는 그게 \u003cstrong\u003e남의 판단을 그대로 빌려오는 것\u003c/strong\u003e이라는 거다.\u003c/p\u003e\n\u003cp\u003e남이 \"이 회사 좋다\"고 하면 왜 좋은지 스스로 검증할 수가 없다. 주가가 떨어지면 버텨야 할지 팔아야 할지 판단할 근거가 없다. 그냥 불안해서 팔거나, 근거 없이 믿으면서 버티거나, 둘 중 하나가 된다.\u003c/p\u003e\n\u003cp\u003e재무제표를 읽는다는 건 \u003cstrong\u003e회사의 실제 성적표를 직접 보는 것\u003c/strong\u003e이다. 어떤 애널리스트의 해석도 아니고, 회사가 직접 금융감독원에 제출한 숫자들을 내가 직접 읽는 것. 그 숫자를 해석하는 눈이 생기면, 투자 판단이 훨씬 단단해진다.\u003c/p\u003e\n\u003cp\u003e재무제표는 크게 세 가지다:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e재무제표\u003c/th\u003e\n\u003cth\u003e핵심 질문\u003c/th\u003e\n\u003cth\u003e비유\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e손익계산서\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e이 회사가 돈을 얼마나 벌었나?\u003c/td\u003e\n\u003ctd\u003e성적표\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e재무상태표\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e이 회사의 재산과 빚은 얼마나 되나?\u003c/td\u003e\n\u003ctd\u003e현재 자산 현황\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e현금흐름표\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e실제로 현금이 얼마나 들어오고 나갔나?\u003c/td\u003e\n\u003ctd\u003e통장 내역\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e이번 편에서는 그 첫 번째, \u003cstrong\u003e손익계산서\u003c/strong\u003e를 제대로 읽어보자.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 손익계산서 구조 — 매출 → 영업이익 → 순이익\u003c/h2\u003e\n\u003cp\u003e손익계산서는 일정 기간(보통 1년 또는 분기) 동안 회사가 얼마를 벌고, 얼마를 쓰고, 결국 얼마가 남았는지를 보여주는 표다.\u003c/p\u003e\n\u003cp\u003e구조는 이렇다:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e매출액 (Revenue)\n  - 매출원가 (Cost of Goods Sold)\n= 매출총이익 (Gross Profit)\n  - 판매비와 관리비 (SG\u0026#x26;A)\n= 영업이익 (Operating Income)\n  + 영업외수익 - 영업외비용\n= 세전이익 (Pre-tax Income)\n  - 법인세\n= 당기순이익 (Net Income)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e하나씩 풀어보자.\u003c/p\u003e\n\u003ch3\u003e매출액\u003c/h3\u003e\n\u003cp\u003e회사가 물건이나 서비스를 팔아서 번 돈이다. 이걸 \u003cstrong\u003e\"탑라인(Top Line)\"\u003c/strong\u003e 이라고도 부른다. 손익계산서의 가장 위에 있어서.\u003c/p\u003e\n\u003cp\u003e주의할 점: 매출액은 실제로 돈이 들어온 게 아닐 수도 있다. 외상으로 팔아도 매출로 잡힌다. 그래서 뒤에 현금흐름표를 같이 봐야 한다.\u003c/p\u003e\n\u003ch3\u003e매출원가\u003c/h3\u003e\n\u003cp\u003e물건을 만드는 데 직접 들어간 비용이다. 제조업이라면 원재료, 직접 인건비 등. 서비스업이라면 서비스 제공에 직접 든 비용.\u003c/p\u003e\n\u003ch3\u003e매출총이익\u003c/h3\u003e\n\u003cp\u003e매출액에서 매출원가를 뺀 것. \"물건을 팔아서 기본적으로 얼마 남겼나\"를 보여준다.\u003c/p\u003e\n\u003ch3\u003e판매비와 관리비 (판관비)\u003c/h3\u003e\n\u003cp\u003e마케팅비, 광고비, 임원 급여, 사무실 임대료 등 회사 운영에 드는 간접 비용들.\u003c/p\u003e\n\u003ch3\u003e영업이익\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e가장 중요한 숫자다.\u003c/strong\u003e 회사가 본업을 통해서 얼마나 벌었는지를 보여준다. 영업외적인 요소(이자, 투자 수익, 환차익 등)를 제외한 순수한 사업 능력의 척도다.\u003c/p\u003e\n\u003cp\u003e영업이익이 꾸준히 늘어나는 회사가 좋은 회사다.\u003c/p\u003e\n\u003ch3\u003e당기순이익\u003c/h3\u003e\n\u003cp\u003e세금까지 다 내고 최종적으로 남은 돈. \u003cstrong\u003e\"바텀라인(Bottom Line)\"\u003c/strong\u003e 이라고도 한다. 이 돈이 주주들에게 배당으로 나가거나 회사에 재투자된다.\u003c/p\u003e\n\u003cp\u003e순이익은 영업이익보다 변동이 클 수 있다. 자산을 팔거나 소송에서 이기면 영업이익은 별로여도 순이익이 크게 나올 수 있다. 반대로 환율이 불리하게 움직이면 영업이익은 좋아도 순이익이 줄 수 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 핵심 마진 지표 — 매출총이익률, 영업이익률, 순이익률\u003c/h2\u003e\n\u003cp\u003e숫자 자체보다 \u003cstrong\u003e비율\u003c/strong\u003e이 중요할 때가 많다. 영업이익 100억이 많은 건지 적은 건지는 매출이 얼마냐에 따라 다르니까.\u003c/p\u003e\n\u003ch3\u003e매출총이익률 (Gross Margin)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e매출총이익률 = 매출총이익 / 매출액 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e제품 자체의 수익성을 보여준다. 이 수치가 높을수록 제품의 가격 경쟁력이나 원가 효율이 좋다는 뜻.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e소프트웨어 기업: 60~80% (원가가 거의 없음)\u003c/li\u003e\n\u003cli\u003e제약·바이오: 60~70%\u003c/li\u003e\n\u003cli\u003e일반 제조업: 20~40%\u003c/li\u003e\n\u003cli\u003e유통·식품: 10~30%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e업종마다 차이가 크다. 그래서 \u003cstrong\u003e같은 업종끼리 비교\u003c/strong\u003e하는 게 기본이다.\u003c/p\u003e\n\u003ch3\u003e영업이익률 (Operating Margin)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e영업이익률 = 영업이익 / 매출액 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e회사의 \u003cstrong\u003e본업 수익성\u003c/strong\u003e을 가장 잘 보여주는 지표. 이 수치가 높고 안정적인 회사가 진짜 강한 회사다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e10% 이상: 꽤 좋음\u003c/li\u003e\n\u003cli\u003e15% 이상: 우수\u003c/li\u003e\n\u003cli\u003e20% 이상: 탁월 (해자가 있는 기업)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e삼성전자 반도체 호황기엔 영업이익률이 30%를 넘기도 했다. 반도체 불황기엔 5% 미만으로 떨어지기도 한다. 이렇게 변동이 심한 업종은 \u003cstrong\u003e사이클\u003c/strong\u003e을 같이 이해해야 한다.\u003c/p\u003e\n\u003ch3\u003e순이익률 (Net Margin)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e순이익률 = 당기순이익 / 매출액 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e최종 수익성 지표. 영업이익률과 비교해서:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e순이익률 \u003e 영업이익률: 영업외 이익이 크다 (이자 수입, 지분 매각 등)\u003c/li\u003e\n\u003cli\u003e순이익률 \u0026#x3C; 영업이익률: 영업외 비용이 크다 (이자 부담, 환손실 등)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e일시적인 요인으로 크게 차이 나는 경우도 많다. 그래서 영업이익률을 더 중시한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 연도별 추이 읽기 — 성장·정체·감소 판단\u003c/h2\u003e\n\u003cp\u003e재무제표에서 숫자 하나보다 \u003cstrong\u003e방향과 트렌드\u003c/strong\u003e가 더 중요하다.\u003c/p\u003e\n\u003cp\u003e아래 예시를 보자. (가상의 A사)\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e연도\u003c/th\u003e\n\u003cth\u003e매출액\u003c/th\u003e\n\u003cth\u003e영업이익\u003c/th\u003e\n\u003cth\u003e영업이익률\u003c/th\u003e\n\u003cth\u003e순이익\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2021\u003c/td\u003e\n\u003ctd\u003e1,000억\u003c/td\u003e\n\u003ctd\u003e80억\u003c/td\u003e\n\u003ctd\u003e8%\u003c/td\u003e\n\u003ctd\u003e60억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022\u003c/td\u003e\n\u003ctd\u003e1,200억\u003c/td\u003e\n\u003ctd\u003e120억\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e90억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023\u003c/td\u003e\n\u003ctd\u003e1,500억\u003c/td\u003e\n\u003ctd\u003e180억\u003c/td\u003e\n\u003ctd\u003e12%\u003c/td\u003e\n\u003ctd\u003e140억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2024\u003c/td\u003e\n\u003ctd\u003e1,800억\u003c/td\u003e\n\u003ctd\u003e250억\u003c/td\u003e\n\u003ctd\u003e14%\u003c/td\u003e\n\u003ctd\u003e190억\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e이 회사 어떻게 보이나? 매출도 늘고, 영업이익도 늘고, 심지어 영업이익률도 해마다 올라가고 있다. \u003cstrong\u003e규모의 경제가 작동하면서 수익성이 개선되는 이상적인 패턴\u003c/strong\u003e이다.\u003c/p\u003e\n\u003cp\u003e이번엔 다른 예시. B사:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e연도\u003c/th\u003e\n\u003cth\u003e매출액\u003c/th\u003e\n\u003cth\u003e영업이익\u003c/th\u003e\n\u003cth\u003e영업이익률\u003c/th\u003e\n\u003cth\u003e순이익\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2021\u003c/td\u003e\n\u003ctd\u003e2,000억\u003c/td\u003e\n\u003ctd\u003e200억\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e180억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022\u003c/td\u003e\n\u003ctd\u003e1,800억\u003c/td\u003e\n\u003ctd\u003e140억\u003c/td\u003e\n\u003ctd\u003e7.8%\u003c/td\u003e\n\u003ctd\u003e120억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023\u003c/td\u003e\n\u003ctd\u003e1,600억\u003c/td\u003e\n\u003ctd\u003e80억\u003c/td\u003e\n\u003ctd\u003e5%\u003c/td\u003e\n\u003ctd\u003e50억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2024\u003c/td\u003e\n\u003ctd\u003e1,500억\u003c/td\u003e\n\u003ctd\u003e30억\u003c/td\u003e\n\u003ctd\u003e2%\u003c/td\u003e\n\u003ctd\u003e-10억\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e매출도 줄고, 이익률도 계속 떨어지고, 결국 적자 전환. 이건 \u003cstrong\u003e구조적 위기\u003c/strong\u003e다. 이런 회사를 \"싸졌다\"고 사면 안 된다. 싼 게 아니라 이유가 있는 것이다.\u003c/p\u003e\n\u003ch3\u003e추이를 볼 때 체크리스트\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출이 꾸준히 성장하고 있나?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익이 매출보다 빠르게 성장하고 있나? (레버리지 효과)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익률이 안정적이거나 개선되고 있나?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익과 순이익의 방향이 일치하나? (불일치하면 이유 파악 필요)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 일시적 요인(자산 매각, 보상금 등)이 결과를 왜곡하고 있지는 않나?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e최소 3년, 가능하면 5년치를 봐야 패턴이 보인다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. DART에서 실제 손익계산서 찾아 읽기 실습\u003c/h2\u003e\n\u003cp\u003e이론은 충분하다. 이제 실제로 해보자.\u003c/p\u003e\n\u003ch3\u003eDART란?\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eDART(Data Analysis, Retrieval and Transfer System)\u003c/strong\u003e 는 금융감독원이 운영하는 전자공시 시스템이다. 국내 모든 상장회사는 분기마다, 반기마다, 연간으로 재무제표를 여기에 공시해야 한다. 무료로, 누구나 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e주소: \u003cstrong\u003e\u003ca href=\"https://dart.fss.or.kr\"\u003ehttps://dart.fss.or.kr\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003ch3\u003e실습: 삼성전자 손익계산서 찾기\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eStep 1: DART 접속\u003c/strong\u003e\ndart.fss.or.kr 에 접속한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStep 2: 회사명 검색\u003c/strong\u003e\n상단 검색창에 \"삼성전자\" 입력 후 검색.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStep 3: 사업보고서 선택\u003c/strong\u003e\n공시 목록에서 \"사업보고서\" (연간) 또는 \"분기보고서\"를 클릭. 가장 최근 것을 본다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStep 4: 재무제표 찾기\u003c/strong\u003e\n보고서 목차에서 \u003cstrong\u003e\"재무에 관한 사항\"\u003c/strong\u003e → \u003cstrong\u003e\"재무제표\"\u003c/strong\u003e 로 이동.\u003c/p\u003e\n\u003cp\u003e연결재무제표(그룹 전체)와 별도재무제표(지주사 단독)가 있다. \u003cstrong\u003e보통 연결재무제표를 본다.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStep 5: 손익계산서 확인\u003c/strong\u003e\n\"연결 손익계산서\" 또는 \"포괄손익계산서\"를 찾아본다.\u003c/p\u003e\n\u003ch3\u003e실제로 마주치는 용어들\u003c/h3\u003e\n\u003cp\u003e처음 보면 당황스러운 용어들이 있다. 미리 알아두자:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e공시 용어\u003c/th\u003e\n\u003cth\u003e쉬운 말\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e매출액\u003c/td\u003e\n\u003ctd\u003e판매해서 번 돈\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e매출원가\u003c/td\u003e\n\u003ctd\u003e물건 만드는 데 든 비용\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e매출총이익\u003c/td\u003e\n\u003ctd\u003e매출 - 원가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e판매비와관리비\u003c/td\u003e\n\u003ctd\u003e운영에 드는 간접 비용\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영업이익\u003c/td\u003e\n\u003ctd\u003e본업으로 번 돈\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융수익\u003c/td\u003e\n\u003ctd\u003e이자 수익, 배당 수익 등\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융비용\u003c/td\u003e\n\u003ctd\u003e이자 비용 등\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e법인세비용차감전순이익\u003c/td\u003e\n\u003ctd\u003e세전이익\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e당기순이익\u003c/td\u003e\n\u003ctd\u003e세후 최종 이익\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e지배기업 소유주 귀속\u003c/td\u003e\n\u003ctd\u003e최대주주 몫\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e비지배지분 귀속\u003c/td\u003e\n\u003ctd\u003e소수주주 몫\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e네이버 증권으로 간단히 보기\u003c/h3\u003e\n\u003cp\u003eDART가 너무 복잡하면 \u003cstrong\u003e네이버 증권\u003c/strong\u003e을 쓰는 것도 좋다.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003efinance.naver.com 접속\u003c/li\u003e\n\u003cli\u003e종목 검색 (예: 삼성전자)\u003c/li\u003e\n\u003cli\u003e종목 페이지에서 \u003cstrong\u003e\"재무분석\"\u003c/strong\u003e 탭 클릭\u003c/li\u003e\n\u003cli\u003e연간/분기 손익계산서를 깔끔하게 볼 수 있다\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e숫자가 정리되어 있고 추이도 볼 수 있어서 처음에는 네이버 증권이 더 편하다. DART는 원본 자료를 직접 확인할 때 쓰면 된다.\u003c/p\u003e\n\u003ch3\u003e연습 과제\u003c/h3\u003e\n\u003cp\u003e오늘 하나만 해보자:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e네이버 증권에서 관심 있는 기업 하나 선택\u003c/li\u003e\n\u003cli\u003e재무분석 탭에서 최근 5년 연간 손익계산서 확인\u003c/li\u003e\n\u003cli\u003e매출, 영업이익, 영업이익률 추이를 직접 적어보기\u003c/li\u003e\n\u003cli\u003e\"이 회사는 성장하고 있나? 이익이 늘고 있나?\" 스스로 판단해보기\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e처음엔 뭐가 뭔지 모르는 게 정상이다. 10개 회사 보면 눈이 트이기 시작한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e정리\u003c/h2\u003e\n\u003cp\u003e이번 편에서 배운 것:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e손익계산서\u003c/strong\u003e는 일정 기간 동안의 수익과 비용을 보여주는 성적표다\u003c/li\u003e\n\u003cli\u003e핵심 구조: 매출 → 매출총이익 → 영업이익 → 순이익\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e영업이익률\u003c/strong\u003e이 회사의 본업 경쟁력을 가장 잘 보여준다\u003c/li\u003e\n\u003cli\u003e숫자 하나보다 **추이(트렌드)**가 더 중요하다\u003c/li\u003e\n\u003cli\u003eDART나 네이버 증권에서 실제 재무제표를 직접 찾아볼 수 있다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e다음 편에서는 재무상태표와 현금흐름표를 다룬다. 손익은 좋아 보이는데 사실 속은 곪아 있는 회사를 어떻게 걸러내는지 배울 것이다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-25\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"주식 투자 입문 (4) — 재무제표 읽기 1편: 손익계산서\"}]]}],[\"$\",\"articl
