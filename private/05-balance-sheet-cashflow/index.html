wportBoundary\"]\n11:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:T3809,"])</script><script>self.__next_f.push([1,"\u003ch1\u003e주식 투자 입문 (5) — 재무제표 읽기 2편: 재무상태표와 현금흐름표\u003c/h1\u003e\n\u003cp\u003e지난 편에서 손익계산서로 회사가 돈을 얼마나 버는지 봤다. 근데 돈을 잘 번다고 해서 무조건 안전한 회사일까?\u003c/p\u003e\n\u003cp\u003e아니다. 세상에는 \u003cstrong\u003e매출은 1조인데 부채가 5조인 회사\u003c/strong\u003e도 있다. 영업이익은 흑자인데 \u003cstrong\u003e통장에 현금이 없어서 부도난 회사\u003c/strong\u003e도 있다.\u003c/p\u003e\n\u003cp\u003e이번 편에서는 회사의 \u003cstrong\u003e재정 건전성\u003c/strong\u003e을 보는 방법을 배운다. 재무상태표와 현금흐름표가 그 도구다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 재무상태표 — 자산, 부채, 자본의 관계\u003c/h2\u003e\n\u003cp\u003e재무상태표(Balance Sheet)는 \u003cstrong\u003e특정 시점\u003c/strong\u003e에 회사의 재산이 얼마고, 빚이 얼마고, 주주 몫이 얼마인지를 보여준다. 손익계산서가 \"1년 동안의 흐름\"이라면, 재무상태표는 \"12월 31일 현재의 스냅샷\"이다.\u003c/p\u003e\n\u003cp\u003e핵심 구조는 딱 한 줄이다:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e자산 = 부채 + 자본\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e자산(Assets):\u003c/strong\u003e 회사가 보유한 모든 것. 현금, 재고, 건물, 설비, 지적재산권, 투자 자산 등.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e부채(Liabilities):\u003c/strong\u003e 회사가 갚아야 할 빚. 은행 대출, 회사채, 매입채무 등.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e자본(Equity):\u003c/strong\u003e 자산에서 부채를 뺀 나머지. 주주의 몫이다. \"순자산\"이라고도 한다.\u003c/p\u003e\n\u003ch3\u003e유동과 비유동의 구분\u003c/h3\u003e\n\u003cp\u003e자산과 부채는 각각 **유동(1년 이내)**과 **비유동(1년 초과)**으로 나뉜다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e유동자산\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e현금, 단기 예금, 매출채권, 재고자산 (1년 안에 현금화 가능)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e비유동자산\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e건물, 기계, 무형자산, 장기 투자 (1년 이상 보유)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e유동부채\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e단기 차입금, 매입채무, 1년 안에 갚아야 할 빚\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e비유동부채\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e장기 차입금, 사채, 장기 충당금\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e이 구분이 왜 중요하냐면, \u003cstrong\u003e단기 부채는 곧 갚아야 하니까\u003c/strong\u003e 유동자산이 얼마나 있는지가 생존에 직결된다.\u003c/p\u003e\n\u003ch3\u003e재무상태표 실제 예시\u003c/h3\u003e\n\u003cp\u003e가상의 C사 재무상태표(단위: 억원):\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e금액\u003c/th\u003e\n\u003cth\u003e부채·자본\u003c/th\u003e\n\u003cth\u003e금액\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e유동자산\u003c/td\u003e\n\u003ctd\u003e500\u003c/td\u003e\n\u003ctd\u003e유동부채\u003c/td\u003e\n\u003ctd\u003e300\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- 현금\u003c/td\u003e\n\u003ctd\u003e200\u003c/td\u003e\n\u003ctd\u003e비유동부채\u003c/td\u003e\n\u003ctd\u003e400\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- 매출채권\u003c/td\u003e\n\u003ctd\u003e150\u003c/td\u003e\n\u003ctd\u003e부채 합계\u003c/td\u003e\n\u003ctd\u003e700\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- 재고자산\u003c/td\u003e\n\u003ctd\u003e150\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e비유동자산\u003c/td\u003e\n\u003ctd\u003e800\u003c/td\u003e\n\u003ctd\u003e자본 합계\u003c/td\u003e\n\u003ctd\u003e600\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e자산 합계\u003c/td\u003e\n\u003ctd\u003e1,300\u003c/td\u003e\n\u003ctd\u003e부채+자본 합계\u003c/td\u003e\n\u003ctd\u003e1,300\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e양쪽 합계가 같다 — 이게 \"Balance Sheet\"인 이유다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 안전성 지표 — 부채비율, 유동비율, 이자보상배율\u003c/h2\u003e\n\u003ch3\u003e부채비율 (Debt to Equity Ratio)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e부채비율 = 총부채 / 자기자본 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e빚이 자기 자본 대비 얼마나 되는지를 보여준다.\u003c/p\u003e\n\u003cp\u003e위 C사 예시:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e부채비율 = 700 / 600 × \u003cspan class=\"hljs-attr\"\u003e100\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e116.7\u003c/span\u003e%\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e일반적인 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e100% 미만: 양호\u003c/li\u003e\n\u003cli\u003e100~200%: 업종에 따라 다름, 주의 필요\u003c/li\u003e\n\u003cli\u003e200% 초과: 고위험 (업종 특성 확인 필요)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e단, 업종마다 기준이 다르다. \u003cstrong\u003e건설사나 금융회사는 구조적으로 부채비율이 높다.\u003c/strong\u003e 건설사는 프로젝트 선금을 받아 선수금(부채)이 많고, 은행은 예금 자체가 부채다. 그래서 은행의 부채비율은 수천 %가 넘어도 정상이다.\u003c/p\u003e\n\u003cp\u003e비교는 항상 \u003cstrong\u003e같은 업종 내에서\u003c/strong\u003e 해야 한다.\u003c/p\u003e\n\u003ch3\u003e유동비율 (Current Ratio)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e유동비율 = 유동자산 / 유동부채 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\"단기 빚을 갚을 능력이 있는가\"를 본다.\u003c/p\u003e\n\u003cp\u003eC사 예시:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e유동비율 = 500 / 300 × \u003cspan class=\"hljs-attr\"\u003e100\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e166.7\u003c/span\u003e%\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e200% 이상: 이상적\u003c/li\u003e\n\u003cli\u003e150% 이상: 양호\u003c/li\u003e\n\u003cli\u003e100% 미만: 주의 (단기 유동성 위기 가능성)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e유동비율이 100% 미만이라는 건, 1년 안에 갚아야 할 빚이 1년 안에 현금화할 수 있는 자산보다 많다는 뜻이다. 경기가 나빠지거나 매출이 갑자기 줄면 유동성 위기가 올 수 있다.\u003c/p\u003e\n\u003ch3\u003e이자보상배율 (Interest Coverage Ratio)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e이자보상배율 = 영업이익 / 이자비용\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e영업이익이 이자를 몇 배나 감당할 수 있는지를 본다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e3배 이상: 양호\u003c/li\u003e\n\u003cli\u003e1~3배: 주의\u003c/li\u003e\n\u003cli\u003e1배 미만: 위험 (영업이익으로 이자도 못 갚는 상황)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이자보상배율이 1배 미만인 회사가 \"좀비기업\"이다. 한국에는 이런 회사들이 생각보다 많다. 영업이익 내는 척하지만 이자 갚기도 빠듯한 곳들. 이런 회사는 금리가 오르거나 경기가 나빠지면 순식간에 무너진다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 현금흐름표 — 영업/투자/재무 활동 현금흐름\u003c/h2\u003e\n\u003cp\u003e이제 세 번째 재무제표, 현금흐름표다.\u003c/p\u003e\n\u003cp\u003e현금흐름표는 손익계산서가 놓치는 핵심을 잡아준다. \u003cstrong\u003e\"이익이 났다고 해서 현금이 있는 건 아니다.\"\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e왜냐면 손익계산서의 이익은 \u003cstrong\u003e발생주의\u003c/strong\u003e 회계를 따른다. 외상으로 팔아도 매출로 잡힌다. 아직 현금을 못 받았어도. 그래서 이익이 나도 통장이 빌 수 있다.\u003c/p\u003e\n\u003cp\u003e현금흐름표는 \u003cstrong\u003e실제 현금의 이동\u003c/strong\u003e을 보여준다. 세 파트로 나뉜다:\u003c/p\u003e\n\u003ch3\u003e영업활동 현금흐름 (Operating Cash Flow, OCF)\u003c/h3\u003e\n\u003cp\u003e본업에서 실제로 얼마의 현금이 들어왔나.\u003c/p\u003e\n\u003cp\u003e당기순이익에서 시작해서:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e비현금 비용(감가상각 등) 더하기\u003c/li\u003e\n\u003cli\u003e운전자본 변동(매출채권, 재고, 매입채무 등) 반영\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e이게 플러스(+)여야 정상이다.\u003c/strong\u003e 사업을 통해 현금이 들어오고 있다는 뜻이니까.\u003c/p\u003e\n\u003ch3\u003e투자활동 현금흐름 (Investing Cash Flow, ICF)\u003c/h3\u003e\n\u003cp\u003e설비 투자, 자산 매각, 타사 지분 취득/처분 등에서 생기는 현금 흐름.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e성장하는 회사는 보통 이게 마이너스(-)다.\u003c/strong\u003e 공장 짓고 설비 사고 투자하는 데 돈을 쓰니까. 마이너스가 나쁜 게 아니라, 미래를 위해 투자하고 있다는 신호일 수 있다.\u003c/p\u003e\n\u003cp\u003e반대로 이게 플러스면? 자산을 팔고 있다는 뜻이다. 자금 사정이 어려워서 자산을 팔아 현금 마련하는 경우가 많다.\u003c/p\u003e\n\u003ch3\u003e재무활동 현금흐름 (Financing Cash Flow, FCF)\u003c/h3\u003e\n\u003cp\u003e차입, 상환, 배당, 유상증자 등 자금 조달과 관련된 현금 흐름.\u003c/p\u003e\n\u003cp\u003e은행에서 돈 빌리면 플러스, 갚으면 마이너스.\n유상증자하면 플러스, 자사주 매입이나 배당 지급하면 마이너스.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 현금흐름 패턴으로 기업 상태 진단\u003c/h2\u003e\n\u003cp\u003e세 가지 현금흐름의 조합으로 기업 상태를 진단할 수 있다. (+: 현금 유입, -: 현금 유출)\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e패턴\u003c/th\u003e\n\u003cth\u003e영업\u003c/th\u003e\n\u003cth\u003e투자\u003c/th\u003e\n\u003cth\u003e재무\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e우량 성장 기업\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e+\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003ctd\u003e본업에서 벌어서, 투자도 하고, 빚도 갚는다\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e성숙 배당 기업\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e+\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003ctd\u003e- (배당)\u003c/td\u003e\n\u003ctd\u003e본업 현금 충분, 투자 유지, 주주 환원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e공격적 확장 기업\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e+\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003ctd\u003e+\u003c/td\u003e\n\u003ctd\u003e본업에서 벌지만 투자가 커서 외부 자금 조달\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e자산 매각 기업\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003ctd\u003e+\u003c/td\u003e\n\u003ctd\u003e+\u003c/td\u003e\n\u003ctd\u003e본업 부진, 자산 팔아 생존 중 (위험)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e위험 기업\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003ctd\u003e+\u003c/td\u003e\n\u003ctd\u003e본업 안 되고, 빚만 늘어나는 중 (매우 위험)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e가장 건강한 패턴은 \u003cstrong\u003e영업 +, 투자 -, 재무 -\u003c/strong\u003e 조합이다. 이걸 \"캐시 카우\" 상태라고 한다.\u003c/p\u003e\n\u003cp\u003e가장 위험한 패턴은 \u003cstrong\u003e영업 -, 투자 -, 재무 +\u003c/strong\u003e 다. 사업도 안 되고 투자도 계속하면서 빚만 늘어나는 구조. 이런 회사는 언젠가 한계에 부딪힌다.\u003c/p\u003e\n\u003ch3\u003e잉여현금흐름 (Free Cash Flow, FCF)\u003c/h3\u003e\n\u003cp\u003e투자자들이 가장 많이 쓰는 개념 중 하나다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-objectivec\"\u003e잉여현금흐름 = 영업활동 현금흐름 - 설비투자(\u003cspan class=\"hljs-built_in\"\u003eCAPEX\u003c/span\u003e)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e영업으로 벌어서 설비 유지에 쓰고 \u003cstrong\u003e남은 현금\u003c/strong\u003e이다. 이 돈이 배당으로 나가거나, 자사주 매입에 쓰이거나, 신규 투자에 쓰이거나, 부채 상환에 쓰인다.\u003c/p\u003e\n\u003cp\u003e잉여현금흐름이 꾸준히 플러스이고 증가하는 회사가 장기 투자에 좋다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 실전 사례 — 손익은 좋은데 현금이 나쁜 기업\u003c/h2\u003e\n\u003cp\u003e이제 가장 중요한 사례를 보자. 재무제표를 겉만 보면 놓치는 함정이다.\u003c/p\u003e\n\u003ch3\u003e사례: 가상의 D사\u003c/h3\u003e\n\u003cp\u003eD사의 최근 5년 손익계산서:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e연도\u003c/th\u003e\n\u003cth\u003e매출액\u003c/th\u003e\n\u003cth\u003e영업이익\u003c/th\u003e\n\u003cth\u003e순이익\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2020\u003c/td\u003e\n\u003ctd\u003e500억\u003c/td\u003e\n\u003ctd\u003e50억\u003c/td\u003e\n\u003ctd\u003e40억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2021\u003c/td\u003e\n\u003ctd\u003e700억\u003c/td\u003e\n\u003ctd\u003e70억\u003c/td\u003e\n\u003ctd\u003e55억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022\u003c/td\u003e\n\u003ctd\u003e900억\u003c/td\u003e\n\u003ctd\u003e90억\u003c/td\u003e\n\u003ctd\u003e72억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023\u003c/td\u003e\n\u003ctd\u003e1,200억\u003c/td\u003e\n\u003ctd\u003e120억\u003c/td\u003e\n\u003ctd\u003e95억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2024\u003c/td\u003e\n\u003ctd\u003e1,500억\u003c/td\u003e\n\u003ctd\u003e150억\u003c/td\u003e\n\u003ctd\u003e120억\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e매출도 매년 30% 이상 성장, 영업이익률도 10%로 안정적. 순이익도 계속 늘고 있다. 완벽해 보인다.\u003c/p\u003e\n\u003cp\u003e근데 현금흐름표를 보면:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e연도\u003c/th\u003e\n\u003cth\u003e영업 현금흐름\u003c/th\u003e\n\u003cth\u003e투자 현금흐름\u003c/th\u003e\n\u003cth\u003e재무 현금흐름\u003c/th\u003e\n\u003cth\u003e현금 잔액\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2020\u003c/td\u003e\n\u003ctd\u003e+30억\u003c/td\u003e\n\u003ctd\u003e-20억\u003c/td\u003e\n\u003ctd\u003e-5억\u003c/td\u003e\n\u003ctd\u003e100억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2021\u003c/td\u003e\n\u003ctd\u003e+20억\u003c/td\u003e\n\u003ctd\u003e-50억\u003c/td\u003e\n\u003ctd\u003e+40억\u003c/td\u003e\n\u003ctd\u003e110억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022\u003c/td\u003e\n\u003ctd\u003e+10억\u003c/td\u003e\n\u003ctd\u003e-80억\u003c/td\u003e\n\u003ctd\u003e+90억\u003c/td\u003e\n\u003ctd\u003e130억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023\u003c/td\u003e\n\u003ctd\u003e-15억\u003c/td\u003e\n\u003ctd\u003e-100억\u003c/td\u003e\n\u003ctd\u003e+120억\u003c/td\u003e\n\u003ctd\u003e135억\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2024\u003c/td\u003e\n\u003ctd\u003e-40억\u003c/td\u003e\n\u003ctd\u003e-80억\u003c/td\u003e\n\u003ctd\u003e+150억\u003c/td\u003e\n\u003ctd\u003e165억\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e뭔가 이상하다.\u003c/p\u003e\n\u003cp\u003e영업이익은 계속 느는데 영업 현금흐름은 오히려 마이너스가 되고 있다. 이유가 뭘까?\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e가능한 원인들:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e매출채권이 폭발적으로 증가\u003c/strong\u003e — 외상으로 팔기만 하고 실제 현금 회수가 안 되고 있다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e재고가 계속 쌓임\u003c/strong\u003e — 팔리지 않는 재고에 현금이 묶여 있다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e이익이 과대 계상\u003c/strong\u003e — 분식 회계 가능성 (극단적 케이스)\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e현금 잔액은 늘어나 보이지만, 그게 다 \u003cstrong\u003e빚을 내서 (재무 현금흐름 +)\u003c/strong\u003e 채워진 것이다.\u003c/p\u003e\n\u003cp\u003e이 회사는 지금 매출 성장을 위해 외상을 마구 줘서 매출채권이 쌓이고, 현금이 안 돌아서 계속 은행에서 빌리는 상태다. 당장은 괜찮아 보여도, 매출채권 회수가 안 되거나 은행이 대출을 조이면 순식간에 위기가 온다.\u003c/p\u003e\n\u003ch3\u003e이걸 어떻게 포착하나?\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e매출채권 회전일수\u003c/strong\u003e를 계산해보면 된다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e매출채권 회전일수 = 매출채권 / (매출액 / \u003cspan class=\"hljs-number\"\u003e365\u003c/span\u003e)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이 수치가 매년 늘어나고 있다면, 외상 기간이 길어지고 있다는 뜻이다. 경쟁이 심해져서 외상 조건을 완화했거나, 부실 채권이 쌓이고 있거나.\u003c/p\u003e\n\u003ch3\u003e결론: 세 가지 재무제표는 세트다\u003c/h3\u003e\n\u003cp\u003e손익계산서만 보지 말고, 반드시 현금흐름표와 함께 봐야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e체크리스트:\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업 현금흐름이 순이익과 비슷한 방향으로 움직이나?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업 현금흐름이 꾸준히 플러스인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 잉여현금흐름(FCF)이 플러스인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 재무활동 현금흐름이 플러스인 이유가 무엇인가? (성장 투자? 유동성 문제?)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출채권, 재고가 매출보다 빠르게 늘지는 않나?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e정리\u003c/h2\u003e\n\u003cp\u003e이번 편에서 배운 것:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e재무상태표\u003c/strong\u003e: 자산 = 부채 + 자본. 부채비율과 유동비율로 안전성을 판단한다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e이자보상배율 1배 미만\u003c/strong\u003e 기업은 영업이익으로 이자도 못 내는 좀비 기업\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e현금흐름표\u003c/strong\u003e: 영업/투자/재무 세 부분으로 나뉘며, 세 조합의 패턴으로 기업 상태를 진단한다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e손익이 좋아도 현금흐름이 나쁜 기업\u003c/strong\u003e은 위험하다. 세 재무제표를 반드시 같이 봐야 한다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e다음 편에서는 가치평가로 넘어간다. 재무가 좋은 회사를 찾았다면, 그 회사 주식이 지금 비싼지 싼지를 판단하는 방법을 배울 것이다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"
