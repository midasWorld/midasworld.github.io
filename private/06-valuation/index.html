67,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:T3fbe,"])</script><script>self.__next_f.push([1,"\u003ch1\u003e주식 투자 입문 (6) — 기업 가치 평가: 이 주가는 비싼가 싼가\u003c/h1\u003e\n\u003cp\u003e재무제표 읽는 법을 배웠다. 이제 마지막 퍼즐 조각이다. \u003cstrong\u003e\"좋은 회사를 찾았다. 근데 지금 사는 게 맞는가?\"\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e주식 가격은 단순히 회사가 얼마나 좋은지로만 결정되지 않는다. \u003cstrong\u003e지금 그 가격에 사는 게 합리적인가\u003c/strong\u003e가 별개의 문제다. 이걸 따지는 게 \u003cstrong\u003e밸류에이션(Valuation)\u003c/strong\u003e, 즉 기업 가치 평가다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 밸류에이션이 필요한 이유 — 좋은 기업 ≠ 좋은 투자\u003c/h2\u003e\n\u003cp\u003e예를 들어 생각해보자.\u003c/p\u003e\n\u003cp\u003e삼성전자는 누가 봐도 좋은 회사다. 반도체, 스마트폰, 디스플레이... 한국 1등 기업. 근데 2021년 초에 삼성전자를 96,000원에 샀다면? 2024년 말 기준으로 아직도 원금 복구를 못 했다.\u003c/p\u003e\n\u003cp\u003e회사가 나빠진 게 아니다. 그냥 \u003cstrong\u003e너무 비쌀 때 샀던 것\u003c/strong\u003e이다.\u003c/p\u003e\n\u003cp\u003e반대로, 별로 유명하지 않은 회사인데 실적 대비 주가가 말도 안 되게 싼 경우가 있다. 이런 회사를 찾아서 사면 큰 수익이 난다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e좋은 투자 = 좋은 회사 × 합리적인 가격\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e밸류에이션은 \"합리적인 가격\"을 따지는 도구다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. PER (주가수익비율) — 의미, 계산, 업종별 비교\u003c/h2\u003e\n\u003ch3\u003e개념\u003c/h3\u003e\n\u003cp\u003ePER(Price to Earnings Ratio)는 가장 기본적이고 가장 많이 쓰이는 밸류에이션 지표다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePER\u003c/span\u003e = 주가 / 주당순이익(EPS)\n    = 시가총액 / 당기순이익\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e쉽게 말하면: \u003cstrong\u003e이 회사의 1년치 이익을 사는 데 몇 년치 이익을 내야 하는가.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e예시:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가 50,000원\u003c/li\u003e\n\u003cli\u003e주당순이익(EPS) 5,000원\u003c/li\u003e\n\u003cli\u003ePER = 50,000 / 5,000 = \u003cstrong\u003e10배\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePER 10배라는 건, 지금 주가가 연간 이익의 10년치라는 뜻이다. 즉 이 회사가 지금처럼 계속 돈을 번다고 가정할 때, 10년 후에 투자원금을 회수한다는 의미다.\u003c/p\u003e\n\u003ch3\u003ePER이 높으면 비싼가?\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e꼭 그런 건 아니다.\u003c/strong\u003e PER 해석은 맥락이 중요하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePER이 높아도 합리적인 경우:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e빠르게 성장하는 기업 (미래 이익이 크게 늘 것으로 기대)\u003c/li\u003e\n\u003cli\u003e경기 회복 초기 (이익이 바닥이라 PER이 높게 보임)\u003c/li\u003e\n\u003cli\u003e업종 자체의 특성 (소프트웨어, 플랫폼 기업은 구조적으로 PER이 높다)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePER이 낮아도 위험한 경우:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e이익이 일시적으로 좋았던 것 (내년엔 급감 가능)\u003c/li\u003e\n\u003cli\u003e성장이 없는 사양 산업\u003c/li\u003e\n\u003cli\u003e구조적 문제가 있는 기업\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e업종별 평균 PER 기준 (대략적 참고)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e업종\u003c/th\u003e\n\u003cth\u003e일반적인 PER 범위\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eIT/소프트웨어\u003c/td\u003e\n\u003ctd\u003e20~50배\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e바이오/제약\u003c/td\u003e\n\u003ctd\u003e30~100배 (적자 기업은 N/A)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체\u003c/td\u003e\n\u003ctd\u003e10~30배 (사이클에 따라 변동 큼)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융/은행\u003c/td\u003e\n\u003ctd\u003e5~10배\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유틸리티\u003c/td\u003e\n\u003ctd\u003e10~15배\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소비재/유통\u003c/td\u003e\n\u003ctd\u003e10~20배\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e건설\u003c/td\u003e\n\u003ctd\u003e5~10배\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e이 숫자들은 고정된 게 아니다. 금리가 높으면 전반적으로 PER이 낮아지고, 금리가 낮으면 높아진다.\u003c/p\u003e\n\u003ch3\u003e포워드 PER vs. 트레일링 PER\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e트레일링 PER (Trailing PER):\u003c/strong\u003e 과거 12개월 이익 기준. 이미 실현된 이익.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e포워드 PER (Forward PER):\u003c/strong\u003e 향후 12개월 예상 이익 기준. 애널리스트 추정치 반영.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e주가는 미래를 반영하므로 포워드 PER이 더 의미 있다. 하지만 추정치는 틀릴 수 있으니 주의.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. PBR (주가순자산비율) — 자산 대비 가격 판단\u003c/h2\u003e\n\u003ch3\u003e개념\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePBR\u003c/span\u003e = 주가 / 주당순자산(BPS)\n    = 시가총액 / 자기자본(장부가)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e회사의 장부상 자산 가치 대비 주가가 몇 배인지를 보여준다.\u003c/p\u003e\n\u003cp\u003ePBR 1배 = 주가가 장부가 자산과 같다.\nPBR 0.5배 = 주가가 장부가의 절반이다. 이론적으로 회사를 청산하면 주주가 주가의 2배를 받는다.\nPBR 3배 = 주가가 장부가의 3배다. 브랜드, 기술력, 수익성에 프리미엄을 지불하는 것.\u003c/p\u003e\n\u003ch3\u003ePBR 해석\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003ePBR 1배 미만:\u003c/strong\u003e 자산 대비 싸다. 하지만 왜 싼지를 봐야 한다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e수익성이 낮은 기업이라 시장에서 할인 (합리적)\u003c/li\u003e\n\u003cli\u003e일시적 악재로 과매도 (기회)\u003c/li\u003e\n\u003cli\u003e자산 가치가 과대 계상 (함정)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePBR이 높아도 정당화되는 경우:\u003c/strong\u003e\n고 ROE 기업. 자산을 잘 활용해서 높은 수익을 내는 기업은 장부가보다 높이 평가받는 게 맞다. 코카콜라, 애플 같은 회사들이 PBR 10~30배가 넘어도 고평가가 아닌 이유가 이것이다.\u003c/p\u003e\n\u003ch3\u003e어떤 업종에 PBR이 유용한가?\u003c/h3\u003e\n\u003cp\u003ePBR은 \u003cstrong\u003e자산 중심 업종\u003c/strong\u003e에서 특히 유용하다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e은행 (대출 자산이 주요 자산)\u003c/li\u003e\n\u003cli\u003e보험\u003c/li\u003e\n\u003cli\u003e부동산 회사\u003c/li\u003e\n\u003cli\u003e지주사\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e반면 소프트웨어, 플랫폼 회사처럼 무형자산이 중요한 업종은 PBR이 별로 의미 없다. 인스타그램이나 유튜브의 장부 가치는 사실 별로 없지만 실제 가치는 수십조원이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. ROE (자기자본이익률) — 경영 효율성 측정\u003c/h2\u003e\n\u003ch3\u003e개념\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eROE\u003c/span\u003e = 당기순이익 / 자기자본 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e주주가 맡긴 돈으로 경영진이 얼마나 효율적으로 돈을 버는지를 보여준다.\u003c/p\u003e\n\u003cp\u003eROE 20%라면? 자기 자본 100억으로 20억을 벌었다는 뜻. 은행 예금이 3~4%인 세상에서 ROE 20%는 훌륭하다.\u003c/p\u003e\n\u003ch3\u003ePBR과 ROE의 관계\u003c/h3\u003e\n\u003cp\u003e이 두 지표는 함께 봐야 한다. 핵심 관계식:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e정당한 PBR ≈ ROE / 요구수익률\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e만약 ROE가 20%이고 투자자의 요구수익률이 10%라면, PBR 2배는 합리적이다.\u003c/p\u003e\n\u003cp\u003e반대로 ROE가 5%인데 PBR이 2배라면? 비싼 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePBR이 낮아도 ROE가 낮으면 싼 게 아니다.\u003c/strong\u003e 자산을 가지고 있어도 돈을 못 버는 회사는 그 자산이 무의미하다.\u003c/p\u003e\n\u003cp\u003e워런 버핏이 ROE를 가장 중요하게 보는 이유가 이것이다. 그는 \u003cstrong\u003eROE 15% 이상, 꾸준히 유지\u003c/strong\u003e하는 기업을 좋아한다.\u003c/p\u003e\n\u003ch3\u003eROE 높은 기업이 무조건 좋은 건 아니다\u003c/h3\u003e\n\u003cp\u003eROE = 순이익 / 자기자본 이니까, 자기자본을 줄이면 ROE가 올라간다.\u003c/p\u003e\n\u003cp\u003e어떻게? \u003cstrong\u003e빚을 내서 자사주 매입\u003c/strong\u003e 하면 된다. 자기자본이 줄어드니까 ROE가 올라가 보인다.\u003c/p\u003e\n\u003cp\u003e이걸 \u003cstrong\u003e레버리지 효과\u003c/strong\u003e라고 한다. 부채로 ROE를 높이는 것. 이 경우엔 부채비율을 같이 확인해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e듀퐁 분석 (DuPont Analysis):\u003c/strong\u003e ROE를 세 요소로 분해한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eROE = 순이익률 × 자산회전율 × 재무레버리지\n    = (순이익/매출) × (매출/자산) × (자산/자기자본)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eROE가 높은 이유가:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e순이익률이 높아서 → 좋은 이유 (브랜드, 기술력)\u003c/li\u003e\n\u003cli\u003e자산을 효율적으로 활용해서 → 좋은 이유 (운영 효율성)\u003c/li\u003e\n\u003cli\u003e빚을 많이 써서 → 주의 필요\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. EV/EBITDA, PSR 등 보조 지표\u003c/h2\u003e\n\u003ch3\u003eEV/EBITDA\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003eEV (기업가치) = 시가총액 + 순부채 (총부채 - 현금)\n\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = 영업이익 + 감가상각비\nEV/\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = EV / EBITDA\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003ePER보다 더 정확한 기업 가치 비교 도구로 쓰인다.\u003c/p\u003e\n\u003cp\u003ePER의 문제점: 세금, 금융비용 등 비교 기준이 나라마다 다르다. 부채가 많은 회사는 이자 비용 때문에 순이익이 낮아서 PER이 높게 나온다.\u003c/p\u003e\n\u003cp\u003eEV/EBITDA는 이런 왜곡을 없앤다. \u003cstrong\u003eM\u0026#x26;A(인수합병)\u003c/strong\u003e 에서 기업 가치를 평가할 때 가장 많이 쓰이는 지표이기도 하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e일반적인 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e10배 미만: 저평가 가능성\u003c/li\u003e\n\u003cli\u003e10~15배: 적정\u003c/li\u003e\n\u003cli\u003e15배 이상: 고평가 또는 성장주 프리미엄\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003ePSR (주가매출비율)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePSR\u003c/span\u003e = 시가총액 / 매출액\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e순이익이 없는 성장 초기 기업 (스타트업, 적자 성장주)을 평가할 때 쓴다.\u003c/p\u003e\n\u003cp\u003e쿠팡이 뉴욕 증시에 상장할 때 PSR이 수십 배였다. 적자 기업이라 PER은 산출 자체가 안 되니까.\u003c/p\u003e\n\u003cp\u003ePSR은 \u003cstrong\u003e매출 성장률\u003c/strong\u003e과 같이 봐야 한다. 매출이 연 50% 성장하는 회사의 PSR 20배와, 매출이 정체된 회사의 PSR 5배를 단순 비교하면 안 된다.\u003c/p\u003e\n\u003ch3\u003e배당수익률\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e배당수익률 = 주당 배당금 / 주가 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e배당 투자자에게 중요한 지표. 고배당주(배당수익률 4~6%)는 마치 채권처럼 안정적인 수익을 준다.\u003c/p\u003e\n\u003cp\u003e단, 배당수익률이 지나치게 높으면 (10% 이상) 주가가 너무 떨어졌거나, 배당이 지속 가능하지 않은 수준일 수 있다. \"배당 함정\"에 빠지지 않으려면 배당 성향(순이익 대비 배당 비율)도 확인해야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 밸류에이션 함정 — 저PER 함정, 고PBR이 합리적인 경우\u003c/h2\u003e\n\u003ch3\u003e저PER 함정 (Value Trap)\u003c/h3\u003e\n\u003cp\u003e\"PER이 낮으니까 싸다\"는 논리가 가장 많이 틀리는 함정이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e사례: 가상의 E사\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e연도\u003c/th\u003e\n\u003cth\u003eEPS\u003c/th\u003e\n\u003cth\u003ePER (당시)\u003c/th\u003e\n\u003cth\u003e주가\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022\u003c/td\u003e\n\u003ctd\u003e5,000원\u003c/td\u003e\n\u003ctd\u003e8배\u003c/td\u003e\n\u003ctd\u003e40,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023\u003c/td\u003e\n\u003ctd\u003e3,000원\u003c/td\u003e\n\u003ctd\u003e10배\u003c/td\u003e\n\u003ctd\u003e30,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2024\u003c/td\u003e\n\u003ctd\u003e1,000원\u003c/td\u003e\n\u003ctd\u003e15배\u003c/td\u003e\n\u003ctd\u003e15,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2025 예상\u003c/td\u003e\n\u003ctd\u003e-2,000원\u003c/td\u003e\n\u003ctd\u003eN/A\u003c/td\u003e\n\u003ctd\u003e10,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e2022년에 \"PER 8배면 싸다\"고 샀다가 3년 만에 주가가 75% 떨어졌다. PER이 낮았던 이유는 이익이 계속 감소하는 \u003cstrong\u003e구조적 하락세\u003c/strong\u003e였기 때문이다.\u003c/p\u003e\n\u003cp\u003e저PER이 함정인 경우:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e이익이 피크를 지나 감소하기 시작하는 사이클 기업\u003c/li\u003e\n\u003cli\u003e업황이 구조적으로 악화되는 업종 (예: 오프라인 유통, 레거시 미디어)\u003c/li\u003e\n\u003cli\u003e실적 추정치가 과대 계상된 경우\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e체크 방법:\u003c/strong\u003e \"이 이익이 지속 가능한가?\"를 항상 물어봐야 한다.\u003c/p\u003e\n\u003ch3\u003e고PBR이 합리적인 경우\u003c/h3\u003e\n\u003cp\u003ePBR 5배, 10배짜리 회사도 적정 가격일 수 있다.\u003c/p\u003e\n\u003cp\u003e예시: ROE가 꾸준히 25%인 회사. 투자자 요구수익률이 10%라면?\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e정당 \u003cspan class=\"hljs-attr\"\u003ePBR\u003c/span\u003e = ROE / 요구수익률 = \u003cspan class=\"hljs-number\"\u003e25\u003c/span\u003e% / \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e% = \u003cspan class=\"hljs-number\"\u003e2.5\u003c/span\u003e배\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e사실 ROE 25%짜리 회사라면 PBR 2.5배도 싸다고 볼 수 있다. 1년에 자기자본의 25%를 번다면, 4년이면 원금이 두 배가 된다.\u003c/p\u003e\n\u003ch3\u003e\"PER이 낮으면 싸다\"에서 \"왜 싼지를 봐야 한다\"로 업그레이드\u003c/h3\u003e\n\u003cp\u003e밸류에이션 지표를 처음 배우면 \"낮으면 사자\"의 단계에서 시작한다. 더 성장하면 \u003cstrong\u003e\"왜 싼지\"를 파고드는 단계\u003c/strong\u003e로 넘어가야 한다.\u003c/p\u003e\n\u003cp\u003e낮은 이유가:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e시장이 일시적으로 과매도한 것\u003c/strong\u003e → 기회\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e구조적 문제가 있는 것\u003c/strong\u003e → 함정\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e이 둘을 구별하는 게 실력이다. 재무제표, 업황, 경쟁 환경을 종합적으로 봐야 한다.\u003c/p\u003e\n\u003ch3\u003ePER/PBR 비교할 때의 실전 원칙\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e1. 반드시 같은 업종 내에서 비교한다\u003c/strong\u003e\n은행 PER 8배와 IT 기업 PER 30배를 직접 비교하는 건 의미 없다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. 과거 밴드와 비교한다\u003c/strong\u003e\n현재 PER이 해당 기업의 과거 5년 평균 PER 대비 높은지 낮은지를 본다. 평소 PER 15배 기업이 지금 10배라면 싸다는 신호일 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. 업종 평균 PER 대비 비교한다 (상대 PER)\u003c/strong\u003e\n동종 업계 평균이 PER 20배인데 이 기업은 12배라면, 왜 할인받고 있는지를 파악한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. 성장률을 고려한다 (PEG 비율)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePEG\u003c/span\u003e = PER / EPS 성장률\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003ePEG 1 이하면 성장 대비 저평가로 본다. PER 30배라도 이익 성장률이 연 30%라면 PEG는 1이다. 나쁘지 않다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e종합 체크리스트\u003c/h2\u003e\n\u003cp\u003e주식을 사기 전에 이것들을 확인하자:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e수익성 확인 (손익계산서)\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출이 성장하고 있나?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익률이 안정적이거나 개선 중인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익과 순이익 방향이 일치하나?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e안전성 확인 (재무상태표)\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 부채비율이 업종 평균 대비 적정한가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 유동비율이 100% 이상인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 이자보상배율이 3배 이상인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e현금 건전성 확인 (현금흐름표)\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업 현금흐름이 플러스인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업 현금흐름이 순이익과 비슷한 수준인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 잉여현금흐름(FCF)이 플러스인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e밸류에이션 확인\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e PER이 업종 평균 및 과거 밴드 대비 적정한가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e ROE가 꾸준히 높은가? (15% 이상이면 좋음)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e PBR이 ROE 수준에 비해 합리적인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 저평가된 이유가 일시적인가, 구조적인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e정리\u003c/h2\u003e\n\u003cp\u003e이번 편에서 배운 것:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e좋은 기업 ≠ 좋은 투자\u003c/strong\u003e. 가격이 중요하다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePER\u003c/strong\u003e: 이익 대비 주가. 성장률, 업종과 함께 봐야 한다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePBR\u003c/strong\u003e: 자산 대비 주가. ROE와 함께 봐야 의미 있다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eROE\u003c/strong\u003e: 경영 효율성. 꾸준히 높은 ROE가 좋은 기업의 핵심 특성이다\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEV/EBITDA, PSR\u003c/strong\u003e: PER을 보완하는 보조 지표\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e저PER 함정\u003c/strong\u003e: 싸 보여도 이익 감소 트렌드라면 더 떨어질 수 있다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e재무제표 3개(손익계산서, 재무상태표, 현금흐름표)와 밸류에이션 지표들을 함께 보는 습관이 생기면, 투자 판단의 질이 완전히 달라진다. 처음엔 어렵지만 10~20개 기업만 직접 분석해보면 눈이 트인다.\u003c/p\u003e\n\u003cp\u003e투자는 정보가 아니라 \u003cstrong\u003e이해에서 나오는 확신\u003c/strong\u003e으로 하는 것이다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-25\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"주식 투자 입문 (6) — 기업 가치 평가: 이 주가는 비싼가 싼가\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"주식 투자 입문 (6) — 기업 가치 평가: 이 주가는 비싼가 싼가 | midasworld (Private)\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"서버 개발 학습 블로그\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/favicon.ico?favicon.0b3bf435.ico\",\"sizes\":\"256x256\",\"type\":\"image/x-icon\"}],[\"$\",\"$L16\",\"3\",{}]]\n"])</script></body></html>
