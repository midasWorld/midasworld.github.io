"]\n11:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:T49d3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e지금까지 우리는 재무제표, 밸류에이션, 리스크 같은 현재와 과거 데이터를 중심으로 기업을 분석하는 방법을 배웠다. 근데 솔직히 말하면, 주식 투자에서 진짜 돈을 버는 건 \u003cstrong\u003e미래\u003c/strong\u003e를 잘 보는 사람이다.\u003c/p\u003e\n\u003cp\u003e애플이 아이폰을 처음 출시했을 때, 아마존이 책 배달 사업에서 클라우드로 피벗하려 할 때, 그 시점에 \"이 회사 10년 후에 어마어마해질 것 같은데?\"라고 생각하고 산 사람들은 어마어마한 수익을 거뒀다.\u003c/p\u003e\n\u003cp\u003e이번 포스트에서는 \u003cstrong\u003e미래 성장성을 분석하는 두 가지 핵심 프레임워크\u003c/strong\u003e를 배운다. 하나는 시장 규모를 보는 TAM/SAM/SOM이고, 다른 하나는 그 회사가 경쟁에서 살아남을 수 있는가를 판단하는 \u003cstrong\u003e경제적 해자(Moat)\u003c/strong\u003e 개념이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 과거 실적 vs 미래 성장 — 왜 둘 다 봐야 하는가\u003c/h2\u003e\n\u003ch3\u003e과거만 보면 놓치는 것\u003c/h3\u003e\n\u003cp\u003e재무제표는 과거 기록이다. PER, PBR, ROE — 전부 지나간 데이터를 바탕으로 계산한다. 과거 실적이 좋다는 건 분명히 좋은 신호지만, 그게 미래도 좋을 거라는 보장은 아니다.\u003c/p\u003e\n\u003cp\u003e예시를 들어보자. 2000년대 초반에 코닥(Kodak)은 필름 카메라 시장에서 압도적인 1위였다. 재무제표도 탄탄했고, 배당도 꾸박꾸박 줬다. 근데 디지털 카메라와 스마트폰이 등장하면서 2012년에 파산 신청을 했다. 과거 실적이 좋다고 해서 미래가 안전한 게 아니다.\u003c/p\u003e\n\u003cp\u003e반대로, 아마존은 오랫동안 영업이익이 거의 없었다. 벌면 다 재투자했으니까. 과거 실적만 보고 \"이 회사 돈을 못 버네\"라고 판단했다면 어마어마한 기회를 놓쳤을 것이다.\u003c/p\u003e\n\u003ch3\u003e미래만 보면 놓치는 것\u003c/h3\u003e\n\u003cp\u003e그렇다고 미래 전망만 믿다가는 사기에 당하거나 과대평가된 기업에 물릴 수 있다. 2021년 메타버스 열풍 때 관련 기업들 주가가 뻥튀기됐다가 이후 반토막 이상 난 경우가 많다. \"미래가 밝다\"는 이유만으로 현재 가치 대비 터무니없이 비싸게 사면 손해 보기 쉽다.\u003c/p\u003e\n\u003ch3\u003e결론: 현재 재무 건전성 + 미래 성장 잠재력\u003c/h3\u003e\n\u003cp\u003e좋은 투자는 \u003cstrong\u003e지금 버티고 있는 회사\u003c/strong\u003e이면서 \u003cstrong\u003e미래에 더 크게 성장할 수 있는 회사\u003c/strong\u003e를 적절한 가격에 사는 것이다. 이 두 가지를 동시에 보는 것이 핵심이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. TAM/SAM/SOM — 시장 규모 추정 프레임워크\u003c/h2\u003e\n\u003cp\u003e어떤 회사가 \"우리 시장은 무한히 크다\"고 말하면 반은 맞고 반은 틀리다. 중요한 건 그 회사가 \u003cstrong\u003e실제로 먹을 수 있는 시장\u003c/strong\u003e이 얼마나 되는가다. 여기서 TAM, SAM, SOM이라는 세 개의 원 모양 프레임워크가 등장한다.\u003c/p\u003e\n\u003ch3\u003eTAM (Total Addressable Market) — 전체 시장 규모\u003c/h3\u003e\n\u003cp\u003eTAM은 해당 제품이나 서비스가 이론적으로 공략할 수 있는 \u003cstrong\u003e최대 시장 규모\u003c/strong\u003e다.\u003c/p\u003e\n\u003cp\u003e예를 들어 배달 앱을 만든다고 하면, TAM은 \"전 세계 외식 시장 전체\"가 될 수 있다. 수백조 원 규모다.\u003c/p\u003e\n\u003cp\u003eTAM이 크다는 건 \u003cstrong\u003e성장 가능성이 높다\u003c/strong\u003e는 의미다. 파이가 클수록 조각을 크게 먹을 수 있으니까. 반대로 TAM이 너무 작은 시장은 아무리 1등을 해도 회사 규모가 한계가 있다.\u003c/p\u003e\n\u003cp\u003e투자자가 TAM을 볼 때 주의할 점은, 회사가 TAM을 과장해서 발표하는 경우가 많다는 것이다. \"글로벌 X 시장은 1000조 원 규모입니다\"라고 하는데, 그 중에서 자기들이 실제로 접근 가능한 시장은 훨씬 작을 수 있다.\u003c/p\u003e\n\u003ch3\u003eSAM (Serviceable Addressable Market) — 실제 공략 가능한 시장\u003c/h3\u003e\n\u003cp\u003eSAM은 TAM 중에서 회사의 제품/서비스로 \u003cstrong\u003e실제로 공략 가능한 시장\u003c/strong\u003e이다.\u003c/p\u003e\n\u003cp\u003e같은 배달 앱 예시에서, 한국 회사라면 실제로 공략 가능한 시장은 \"한국 배달 음식 시장\"이다. 수십조 원 규모로 좁혀진다.\u003c/p\u003e\n\u003cp\u003eSAM은 TAM보다 현실적이다. 지역적 제약, 규제, 언어 장벽, 기술적 한계 등을 고려해서 좁혀진 시장이다.\u003c/p\u003e\n\u003ch3\u003eSOM (Serviceable Obtainable Market) — 현실적으로 점유 가능한 시장\u003c/h3\u003e\n\u003cp\u003eSOM은 SAM 중에서 \u003cstrong\u003e지금 현재 기술력과 영업력으로 실제로 점유할 수 있는 시장\u003c/strong\u003e이다.\u003c/p\u003e\n\u003cp\u003e배달 앱이 한국에서 론칭한 첫해에 \"우리는 한국 배달 시장의 5%를 목표로 한다\"라고 하면, 그게 SOM이다. 조 단위의 수치가 될 수 있다.\u003c/p\u003e\n\u003cp\u003eSOM이 중요한 이유는 \u003cstrong\u003e단기 성장 목표\u003c/strong\u003e를 현실적으로 세울 수 있기 때문이다. 투자자는 \"이 회사가 SOM을 달성하고 있는가?\"로 실행력을 평가할 수 있다.\u003c/p\u003e\n\u003ch3\u003e실전 적용 예시: 쿠팡\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003cth\u003e규모 (추정)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eTAM\u003c/td\u003e\n\u003ctd\u003e전 세계 이커머스 시장\u003c/td\u003e\n\u003ctd\u003e수천조 원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSAM\u003c/td\u003e\n\u003ctd\u003e한국 이커머스 시장\u003c/td\u003e\n\u003ctd\u003e약 200조 원+\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSOM\u003c/td\u003e\n\u003ctd\u003e쿠팡이 현재 점유하는 시장\u003c/td\u003e\n\u003ctd\u003e약 60~80조 원\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e쿠팡의 경우 이미 SAM 대비 상당한 점유율을 가지고 있다. 그래서 투자자들이 볼 때는 \"한국 내 성장 여력이 얼마나 남았나\"와 함께 \"해외(일본, 동남아)로 SAM을 확장할 수 있는가\"를 같이 봐야 한다.\u003c/p\u003e\n\u003ch3\u003eTAM 분석 시 체크리스트\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e시장이 충분히 큰가? (최소 조 단위 이상의 SAM)\u003c/li\u003e\n\u003cli\u003e시장이 성장하고 있는가, 수축하고 있는가?\u003c/li\u003e\n\u003cli\u003e회사가 발표한 TAM이 현실적으로 계산된 것인가?\u003c/li\u003e\n\u003cli\u003eSOM 달성 속도가 기대에 부합하는가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 경제적 해자(Moat)의 5가지 유형\u003c/h2\u003e\n\u003cp\u003eTAM이 크다는 걸 확인했다면, 다음 질문은 \"그 큰 시장에서 이 회사가 살아남을 수 있는가?\"다. 여기서 등장하는 개념이 **경제적 해자(Economic Moat)**다.\u003c/p\u003e\n\u003cp\u003e해자(Moat)는 중세 성 주위를 둘러싼 물길이다. 적이 침입하기 어렵게 만드는 방어 수단. 주식 투자에서 경제적 해자는 \u003cstrong\u003e경쟁자가 쉽게 침입하지 못하게 하는 비즈니스 방어막\u003c/strong\u003e을 의미한다.\u003c/p\u003e\n\u003cp\u003e워런 버핏이 이 개념을 유명하게 만들었다. 그는 \"좋은 기업은 견고한 해자를 가지고 있다\"고 수십 년간 강조했다. 해자가 없는 기업은 경쟁자가 들어오면 순식간에 수익성이 망가진다.\u003c/p\u003e\n\u003cp\u003e해자의 유형은 크게 5가지다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e해자 유형 1: 브랜드 파워 (Brand Power)\u003c/h3\u003e\n\u003cp\u003e단순히 유명한 게 아니다. 소비자가 비슷한 제품이 있어도 \u003cstrong\u003e이 브랜드 제품을 더 사려는 심리적 장벽\u003c/strong\u003e이 있는 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 코카콜라\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e코카콜라와 펩시를 블라인드 테스트하면 많은 사람이 펩시가 더 달고 맛있다고 한다. 그런데 레이블을 보여주면 코카콜라를 선택하는 사람이 훨씬 많다. 이게 브랜드 파워다.\u003c/p\u003e\n\u003cp\u003e코카콜라는 브랜드 덕분에 마트에서도 프리미엄 가격을 받고, 식당에서도 대체재 없이 코카콜라만 취급하는 경우가 많다. 누군가 \"저도 탄산음료 만들게요\"라고 해도 130년 넘게 쌓인 브랜드 자산은 복제가 불가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e국내 사례: 삼성전자\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e갤럭시 폰은 기술 스펙이 비슷한 중국 폰 대비 두 배 이상 비싸도 팔린다. 한국에서 \"삼성폰\"이라는 브랜드가 주는 신뢰감은 가격 프리미엄을 정당화한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e브랜드 해자의 한계\u003c/strong\u003e: 브랜드는 관리하지 않으면 약해진다. 제품 품질이 지속적으로 떨어지거나, 대형 스캔들이 생기면 브랜드 파워가 급격히 하락할 수 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e해자 유형 2: 전환비용 (Switching Costs)\u003c/h3\u003e\n\u003cp\u003e한번 쓰기 시작하면 \u003cstrong\u003e다른 제품으로 바꾸기 너무 귀찮거나 비싼 상황\u003c/strong\u003e을 만드는 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 마이크로소프트 오피스\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e회사에서 엑셀, 파워포인트를 수십 년째 쓰고 있는데, 갑자기 구글 스프레드시트로 바꾸면? 직원들 다시 교육해야 하고, 기존 파일들 호환성 문제 생기고, 업무 방식 전체를 바꿔야 한다. 그 비용과 불편함이 \"그냥 계속 마이크로소프트 쓰자\"를 선택하게 만든다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 세일즈포스 (Salesforce)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e기업이 CRM 솔루션으로 세일즈포스를 도입하면, 영업팀 데이터가 다 거기 쌓인다. 몇 년 후에 다른 CRM으로 바꾸려면 데이터 마이그레이션, 직원 재교육, 연동 시스템 교체 등 엄청난 비용이 든다. 이런 구조 덕분에 세일즈포스는 한번 고객을 잡으면 오래 유지된다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e국내 사례: 카카오페이, 토스\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e결제 정보, 은행 계좌 연동, 포인트 적립 — 한 앱에 다 묶여 있으면 다른 앱으로 옮기기 귀찮다. 이게 핀테크 앱의 전환비용 해자다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e해자 유형 3: 네트워크 효과 (Network Effects)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e사용자가 많아질수록 제품의 가치가 올라가는 구조\u003c/strong\u003e다. 이건 해자 중에서도 가장 강력한 유형 중 하나다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 카카오톡\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e카카오톡이 가치 있는 이유는 \"내 지인 대부분이 카카오톡을 쓰기 때문\"이다. 만약 내 주변 사람이 아무도 카카오톡을 안 쓰면 카카오톡은 아무 쓸모가 없다. 사용자가 늘수록 더 가치 있어지는 구조, 이게 네트워크 효과다.\u003c/p\u003e\n\u003cp\u003e지금 카카오톡 대신 다른 메신저가 나와도 \"내 가족, 친구, 동료 모두가 카카오톡 쓰는데 나 혼자 다른 거 쓰면 불편하잖아\"라는 생각 때문에 이탈이 어렵다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 비자(Visa), 마스터카드\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e카드사의 네트워크 효과는 두 방향으로 작동한다. 가맹점이 많으면 소비자가 그 카드를 더 쓰고, 소비자가 많으면 가맹점이 그 카드를 더 받으려 한다. 서로가 서로를 강화하는 양방향 네트워크 효과다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e국내 사례: 배달의민족\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e음식점이 많을수록 소비자가 오고, 소비자가 많을수록 음식점이 입점하려 한다. 플랫폼 비즈니스의 전형적인 네트워크 효과다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e네트워크 효과의 함정\u003c/strong\u003e: 초기에 사용자를 확보하는 게 극도로 어렵다. 닭이 먼저냐 달걀이 먼저냐 문제. 또한 더 강력한 네트워크를 가진 경쟁자가 나타나면 급격히 무너질 수 있다. 싸이월드가 페이스북에 밀린 것처럼.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e해자 유형 4: 원가 우위 (Cost Advantage)\u003c/h3\u003e\n\u003cp\u003e경쟁자보다 \u003cstrong\u003e더 싸게 만들 수 있는 구조\u003c/strong\u003e를 가지고 있는 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 코스트코(Costco)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e코스트코는 멤버십 모델로 연간 수천억 원의 회비를 받는다. 이 덕분에 제품 자체에서는 거의 이익 없이 팔 수 있다. 경쟁사 입장에서는 코스트코만큼 싸게 파는 게 구조적으로 불가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 아마존 AWS\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e아마존은 자체 데이터센터 운영을 통해 규모의 경제를 극한까지 끌어올렸다. 서버 구매 단가부터 전력 비용까지 경쟁사 대비 압도적으로 낮다. 이 원가 우위가 클라우드 시장에서 지속적인 가격 경쟁력으로 이어진다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e국내 사례: 현대제철\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e철강 원자재 조달 네트워크와 대규모 생산 설비에서 오는 규모의 경제가 중소 철강사가 따라오기 어려운 원가 구조를 만든다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e해자 유형 5: 무형자산 (Intangible Assets)\u003c/h3\u003e\n\u003cp\u003e특허, 라이선스, 정부 허가, 독점 데이터 등 \u003cstrong\u003e눈에 보이지 않지만 복제하기 극도로 어려운 자산\u003c/strong\u003e이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 제약회사의 특허\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e신약 하나를 개발하는 데 평균 10년, 1조 원 이상이 든다. 그리고 특허가 나오면 20년간 독점 판매권을 가진다. 특허 기간 동안은 경쟁사가 같은 성분으로 약을 만들 수 없다. 화이자, 존슨앤존슨 같은 회사가 높은 수익성을 유지하는 핵심 이유다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e대표 사례: 신용평가사 (무디스, S\u0026#x26;P)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e금융 시장에서 채권 신용등급은 무디스, S\u0026#x26;P, 피치 세 곳이 사실상 독점하고 있다. 이 지위는 수십 년간 쌓인 신뢰와 규제기관의 공인에서 온다. 새로운 신용평가사가 같은 신뢰를 얻으려면 수십 년이 필요하다. 버핏이 무디스 주식을 오랫동안 보유한 이유다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e국내 사례: KT\u0026#x26;G\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e담배 사업은 진입하려면 복잡한 정부 규제와 허가가 필요하다. 기존 사업자의 영업망, 브랜드, 규제 허가가 결합된 무형자산 해자다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 경쟁우위 지속 가능성 판단 기준\u003c/h2\u003e\n\u003cp\u003e해자가 있다는 걸 확인했다면, 그 다음은 \"이 해자가 얼마나 오래 지속될 것인가?\"를 봐야 한다.\u003c/p\u003e\n\u003ch3\u003e해자가 강해지는 신호\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e신호\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시장 점유율이 꾸준히 증가\u003c/td\u003e\n\u003ctd\u003e경쟁자가 깎지 못하고 있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e마진이 유지되거나 올라감\u003c/td\u003e\n\u003ctd\u003e가격 결정력이 있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e고객 이탈률(Churn Rate)이 낮음\u003c/td\u003e\n\u003ctd\u003e전환비용이나 충성도가 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eR\u0026#x26;D 투자 대비 특허 출원 증가\u003c/td\u003e\n\u003ctd\u003e무형자산 해자가 쌓이는 중\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e해자가 약해지는 신호\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e신호\u003c/th\u003e\n\u003cth\u003e위험 요인\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시장 점유율 하락\u003c/td\u003e\n\u003ctd\u003e경쟁자가 잠식 중\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e마진이 지속적으로 하락\u003c/td\u003e\n\u003ctd\u003e가격 경쟁이 심해짐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e신기술/신규 진입자 등장\u003c/td\u003e\n\u003ctd\u003e기존 해자가 우회될 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e핵심 고객들의 이탈 증가\u003c/td\u003e\n\u003ctd\u003e충성도 또는 전환비용 약화\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e실전 체크 방법\u003c/h3\u003e\n\u003cp\u003e분기 실적 발표자료(IR 자료)에서 확인할 수 있는 것들:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매출 중 기존 고객에서 오는 비율 (재구매율)\u003c/li\u003e\n\u003cli\u003e고객당 평균 매출 (ARPU) 추이\u003c/li\u003e\n\u003cli\u003e시장 점유율 변화\u003c/li\u003e\n\u003cli\u003e영업이익률 추이\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 성장주 vs 가치주 — 투자 스타일에 따른 관점 차이\u003c/h2\u003e\n\u003ch3\u003e성장주 투자란?\u003c/h3\u003e\n\u003cp\u003e성장주는 \u003cstrong\u003e현재 실적보다 미래 성장 가능성\u003c/strong\u003e에 베팅하는 것이다. 지금은 PER이 높거나 심지어 적자여도, 몇 년 후에 훨씬 커질 것이라 기대하고 사는 것.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e대표 예시: 테슬라, 엔비디아, 쿠팡 (초기)\u003c/li\u003e\n\u003cli\u003e성공하면: 수십 배 수익\u003c/li\u003e\n\u003cli\u003e실패하면: 전액 손실도 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e성장주 투자를 잘 하려면 TAM/SAM/SOM 분석과 해자 분석이 특히 중요하다. \"이 시장이 충분히 크고, 이 회사가 계속 지배할 수 있는가\"가 핵심 질문이다.\u003c/p\u003e\n\u003ch3\u003e가치주 투자란?\u003c/h3\u003e\n\u003cp\u003e가치주는 \u003cstrong\u003e현재 가치 대비 싸게 팔리고 있는 주식\u003c/strong\u003e에 베팅하는 것이다. 재무제표상 탄탄하고, PER/PBR이 낮으며, 배당도 꾸박꾸박 주는데 시장이 이 회사를 과도하게 저평가하고 있다는 판단.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e대표 예시: 버핏이 오랫동안 투자한 기업들 (코카콜라, 아메리칸 익스프레스)\u003c/li\u003e\n\u003cli\u003e성공하면: 꾸준한 수익, 낮은 리스크\u003c/li\u003e\n\u003cli\u003e실패하면: 저평가가 아니라 그냥 나쁜 회사였을 경우\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e가치주도 해자가 중요하다. 싸게 샀지만 해자가 없어서 경쟁자에게 무너지면 손해다.\u003c/p\u003e\n\u003ch3\u003e성장주 vs 가치주 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e성장주\u003c/th\u003e\n\u003cth\u003e가치주\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주요 지표\u003c/td\u003e\n\u003ctd\u003eTAM, 성장률, 사용자 증가\u003c/td\u003e\n\u003ctd\u003ePER, PBR, 배당수익률\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e현재 밸류에이션\u003c/td\u003e\n\u003ctd\u003e높음 (종종 적자)\u003c/td\u003e\n\u003ctd\u003e낮음 (시장 평균 이하)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e기대 수익\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e리스크\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 기간\u003c/td\u003e\n\u003ctd\u003e장기 (5년 이상)\u003c/td\u003e\n\u003ctd\u003e중장기\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e대표 투자자\u003c/td\u003e\n\u003ctd\u003e피터 린치, 캐시 우드\u003c/td\u003e\n\u003ctd\u003e워런 버핏, 벤저민 그레이엄\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e어떤 스타일이 맞을까?\u003c/h3\u003e\n\u003cp\u003e정답은 없다. 자신의 성격, 투자 기간, 리스크 허용도에 따라 다르다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e변동성을 못 견디겠다 → 가치주 + 배당주 위주\u003c/li\u003e\n\u003cli\u003e장기 투자할 수 있고 변동성을 참을 수 있다 → 성장주 일부 포함\u003c/li\u003e\n\u003cli\u003e둘 다 싫다 → 다음 편에 나올 ETF 투자가 답\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e실제로 많은 투자자들은 \u003cstrong\u003e코어-새틀라이트 전략\u003c/strong\u003e을 쓴다. 자산의 70\u003cdel\u003e80%는 안정적인 가치주/ETF로 구성하고(코어), 나머지 20\u003c/del\u003e30%는 성장주 베팅(새틀라이트)으로 가져가는 방식이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리 정리\u003c/h2\u003e\n\u003cp\u003e이번 편에서 배운 것:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e과거 실적과 미래 성장을 동시에 봐야 한다.\u003c/strong\u003e 어느 하나만 보면 코닥이 되거나, 고평가 성장주 함정에 빠진다.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eTAM/SAM/SOM\u003c/strong\u003e으로 시장 규모를 현실적으로 추정한다. TAM은 크지만 SOM은 아직 작은 회사가 성장주 투자의 타깃이다.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e경제적 해자 5가지\u003c/strong\u003e를 기억하자: 브랜드, 전환비용, 네트워크효과, 원가우위, 무형자산. 이 중 하나라도 강하게 가진 회사는 장기 보유하기 좋다.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e해자는 변할 수 있다.\u003c/strong\u003e 분기마다 점유율, 마진, 고객 이탈률을 체크해서 해자가 강해지는지 약해지는지 모니터링하자.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e성장주와 가치주는 스타일의 차이\u003c/strong\u003e다. 어느 쪽이 옳고 그름이 아니라, 자신에게 맞는 스타일을 찾는 것이 중요하다.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e다음 편에서는 복잡한 기업 분석 없이도 시장 전체를 살 수 있는 방법, \u003cstrong\u003eETF\u003c/strong\u003e에 대해 알아본다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-25\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"주식 투자 입문 (7) — 미래 성장성 분석: TAM과 경제적 해자\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-40
