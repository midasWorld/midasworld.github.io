67,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:T46b4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e지금까지 재무제표 읽는 법, PER/PBR 계산, 성장성 분석까지 배웠는데, 솔직히 느끼지 않았나? \"이거 한 종목 분석하는 것도 이렇게 공들여야 하는데, 나는 언제 투자 시작하지?\" 라고.\u003c/p\u003e\n\u003cp\u003e맞다. 개별 종목 분석은 시간도 많이 걸리고, 틀릴 위험도 있다. 그래서 \u003cstrong\u003eETF\u003c/strong\u003e라는 게 등장했다. 개별 주식 분석 없이도, 시장 전체의 수익률을 가져갈 수 있는 방법이다.\u003c/p\u003e\n\u003cp\u003e이번 편에서는 ETF가 뭔지, 어떤 종류가 있는지, 어떻게 고르는지, 그리고 국내에서 살 수 있는 주요 상품까지 싹 정리해준다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. ETF란 무엇인가 — 펀드와의 차이, 구조 이해\u003c/h2\u003e\n\u003ch3\u003e기본 개념: 바구니를 사는 것\u003c/h3\u003e\n\u003cp\u003eETF는 \u003cstrong\u003eExchange Traded Fund\u003c/strong\u003e, 우리말로는 \u003cstrong\u003e상장지수펀드\u003c/strong\u003e다.\u003c/p\u003e\n\u003cp\u003e쉽게 설명하면 이렇다. 삼성전자, SK하이닉스, 현대차, LG에너지솔루션 — 이 주식들을 하나하나 사려면 돈도 많이 들고 관리도 복잡하다. 그런데 이걸 한 바구니에 다 담아서 주식처럼 거래할 수 있게 만들면? 그게 ETF다.\u003c/p\u003e\n\u003cp\u003e코스피200 ETF를 한 주 사면, 한국 대표 200개 기업에 동시에 투자하는 효과가 생긴다. 삼성전자 주가가 오르든 현대차가 오르든 전체 평균적인 수익을 가져가는 것이다.\u003c/p\u003e\n\u003ch3\u003e일반 펀드와의 차이\u003c/h3\u003e\n\u003cp\u003e많은 사람이 ETF와 펀드를 혼동한다. 둘 다 여러 종목을 묶어서 투자하는 건 같지만 중요한 차이가 있다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e일반 펀드\u003c/th\u003e\n\u003cth\u003eETF\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e거래 방식\u003c/td\u003e\n\u003ctd\u003e운용사에 신청, 하루 1번 가격 결정\u003c/td\u003e\n\u003ctd\u003e주식처럼 장 중 실시간 매매\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e수수료\u003c/td\u003e\n\u003ctd\u003e선취판매수수료 + 운용보수 (연 1~3%)\u003c/td\u003e\n\u003ctd\u003e운용보수만 (연 0.01~0.5%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e최소 투자금\u003c/td\u003e\n\u003ctd\u003e펀드마다 다름 (보통 1만원~)\u003c/td\u003e\n\u003ctd\u003e1주 단위 (수천 원~수만 원)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e투명성\u003c/td\u003e\n\u003ctd\u003e포트폴리오 공시 주기 다양\u003c/td\u003e\n\u003ctd\u003e매일 구성 종목 공시\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e환매 기간\u003c/td\u003e\n\u003ctd\u003e영업일 기준 2~3일\u003c/td\u003e\n\u003ctd\u003e즉시 매도 가능\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e가장 큰 차이는 \u003cstrong\u003e수수료\u003c/strong\u003e와 \u003cstrong\u003e투명성\u003c/strong\u003e이다. ETF는 운용보수가 극도로 낮다. 연 0.05% 운용보수 상품은 1000만 원 투자 시 연간 수수료가 5000원이다. 반면 일반 펀드는 1~2%씩 떼어가는 경우도 많다.\u003c/p\u003e\n\u003ch3\u003eETF의 구조: AP와 괴리율\u003c/h3\u003e\n\u003cp\u003eETF가 어떻게 주식처럼 거래되면서도 기초자산의 가격을 따라갈 수 있을까? 여기에 **AP(Authorized Participant, 지정참가회사)**라는 존재가 중요하다.\u003c/p\u003e\n\u003cp\u003eAP는 큰 기관투자자(주로 증권사)로, ETF 운용사와 계약을 맺고 ETF의 실제 가격(순자산가치, NAV)과 시장 거래가격 사이의 차이가 크게 벌어지면 이를 중재하는 역할을 한다.\u003c/p\u003e\n\u003cp\u003e예를 들어 ETF 시장 가격이 NAV보다 높으면, AP가 기초자산을 사서 ETF 새 유닛을 만들어 팔면서 가격을 내린다. 반대로 ETF 가격이 NAV보다 낮으면 ETF를 사서 기초자산으로 분해해 수익을 낸다. 이 과정에서 ETF 시장가격과 NAV가 거의 비슷하게 유지된다.\u003c/p\u003e\n\u003cp\u003e이 차이를 \u003cstrong\u003e괴리율\u003c/strong\u003e이라고 하는데, 대부분의 ETF는 괴리율이 0.1% 미만이다. 유동성이 낮은 ETF는 괴리율이 커질 수 있어서 주의가 필요하다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. ETF의 종류 — 인덱스, 섹터, 테마, 레버리지/인버스\u003c/h2\u003e\n\u003cp\u003eETF는 크게 4가지 종류로 나눌 수 있다.\u003c/p\u003e\n\u003ch3\u003e인덱스 ETF (Index ETF)\u003c/h3\u003e\n\u003cp\u003e특정 지수를 추종하는 ETF다. 가장 기본적이고 일반 투자자에게 가장 추천되는 유형이다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e코스피200 ETF: 한국 시총 상위 200개 기업\u003c/li\u003e\n\u003cli\u003eS\u0026#x26;P500 ETF: 미국 대형주 500개\u003c/li\u003e\n\u003cli\u003e나스닥100 ETF: 미국 나스닥 상위 100개 (테크 중심)\u003c/li\u003e\n\u003cli\u003e전 세계 주식 ETF: 선진국 + 신흥국 포함한 글로벌 분산\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e인덱스 ETF의 핵심 논리\u003c/strong\u003e: 장기적으로 시장 평균을 이기는 펀드매니저는 극소수다. 전문가도 시장을 이기기 어렵다면, 그냥 시장 평균을 사는 게 낫지 않을까? 이 논리로 인덱스 투자를 주장한 사람이 뱅가드 창업자 **존 보글(John Bogle)**이다.\u003c/p\u003e\n\u003ch3\u003e섹터 ETF (Sector ETF)\u003c/h3\u003e\n\u003cp\u003e특정 산업 분야에만 집중 투자하는 ETF다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e반도체 ETF (KODEX 반도체, TIGER 미국필라델피아반도체)\u003c/li\u003e\n\u003cli\u003e헬스케어 ETF\u003c/li\u003e\n\u003cli\u003e금융 ETF\u003c/li\u003e\n\u003cli\u003e에너지 ETF\u003c/li\u003e\n\u003cli\u003eIT ETF\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e섹터 ETF는 \"앞으로 반도체 업황이 좋아질 것 같아\"라고 생각할 때, 특정 종목 리스크 없이 섹터 전체에 베팅하는 방법이다.\u003c/p\u003e\n\u003ch3\u003e테마 ETF (Thematic ETF)\u003c/h3\u003e\n\u003cp\u003e특정 테마나 트렌드에 투자하는 ETF다. 섹터보다 더 좁고 특수한 분야다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e인공지능 ETF\u003c/li\u003e\n\u003cli\u003e전기차 ETF (KODEX 2차전지산업)\u003c/li\u003e\n\u003cli\u003e클린에너지 ETF\u003c/li\u003e\n\u003cli\u003e사이버보안 ETF\u003c/li\u003e\n\u003cli\u003e리츠(REITs) ETF — 부동산 간접투자\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e테마 ETF는 성장 잠재력이 크지만, 테마가 실제로 성장하지 않으면 손실도 크다. 투자 전에 테마의 실현 가능성을 신중하게 검토해야 한다.\u003c/p\u003e\n\u003ch3\u003e레버리지/인버스 ETF\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e레버리지 ETF\u003c/strong\u003e: 지수 수익률의 2배, 3배를 추구한다. 코스피가 1% 오르면 2% 수익.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e인버스 ETF\u003c/strong\u003e: 지수 수익률의 반대 방향. 코스피가 1% 내리면 1% 수익.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e레버리지 인버스 ETF\u003c/strong\u003e: 지수가 1% 내리면 2% 수익.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e주의\u003c/strong\u003e: 레버리지/인버스 ETF는 초보 투자자에게 비추천한다. 변동성이 높은 데다, 장기 보유 시 \"변동성 손실(Volatility Decay)\" 때문에 예상과 다르게 손실이 발생하는 경우가 많다. 단기 트레이딩 목적으로 사용하는 도구지, 장기 투자 수단이 아니다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. ETF 고르는 기준 — 운용보수, 추적오차, 거래량, 괴리율\u003c/h2\u003e\n\u003cp\u003eETF가 수백 개다. 어떤 걸 골라야 할까? 4가지 기준으로 판단한다.\u003c/p\u003e\n\u003ch3\u003e기준 1: 운용보수 (Total Expense Ratio, TER)\u003c/h3\u003e\n\u003cp\u003eETF를 보유하는 동안 매년 지불하는 비용이다. 작아 보여도 장기 복리로 쌓이면 차이가 크다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e운용보수\u003c/th\u003e\n\u003cth\u003e1000만 원 투자 시 연간 비용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e0.01%\u003c/td\u003e\n\u003ctd\u003e1,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e0.05%\u003c/td\u003e\n\u003ctd\u003e5,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e0.30%\u003c/td\u003e\n\u003ctd\u003e30,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1.00%\u003c/td\u003e\n\u003ctd\u003e100,000원\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e같은 지수를 추종하는 ETF가 여러 개 있다면 운용보수가 낮은 것을 선택하는 게 기본이다. 예를 들어 코스피200을 추종하는 KODEX 200(운용보수 0.15%)과 TIGER 200(운용보수 0.05%)이 있다면, 장기 투자자에겐 TIGER 200이 유리하다.\u003c/p\u003e\n\u003ch3\u003e기준 2: 추적오차 (Tracking Error)\u003c/h3\u003e\n\u003cp\u003eETF가 따라가야 하는 기초지수와 실제 ETF 수익률 사이의 차이다. 낮을수록 좋다.\u003c/p\u003e\n\u003cp\u003e추적오차가 생기는 이유:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e운용보수로 인한 비용\u003c/li\u003e\n\u003cli\u003e주식 거래 타이밍의 미묘한 차이\u003c/li\u003e\n\u003cli\u003e배당금 재투자 시점 차이\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e보통 ETF 상품 설명서에 연간 추적오차가 공시된다. 0.5% 이하면 양호, 1% 이상이면 확인이 필요하다.\u003c/p\u003e\n\u003ch3\u003e기준 3: 거래량 (Volume)\u003c/h3\u003e\n\u003cp\u003eETF의 하루 평균 거래량이 중요하다. 거래량이 낮으면 두 가지 문제가 생긴다.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e유동성 위험\u003c/strong\u003e: 팔고 싶을 때 원하는 가격에 팔기 어렵다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e스프레드 확대\u003c/strong\u003e: 매수-매도 호가 차이가 커져서 숨은 비용이 증가한다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e일반적으로 하루 거래량이 \u003cstrong\u003e1억 원 이상\u003c/strong\u003e이면 유동성이 충분하다고 본다. 국내 주요 ETF (KODEX 200, TIGER 미국S\u0026#x26;P500 등)는 수백억~수천억 원대 거래량을 기록한다.\u003c/p\u003e\n\u003ch3\u003e기준 4: 괴리율 (Premium/Discount)\u003c/h3\u003e\n\u003cp\u003e앞서 설명한 것처럼, ETF 시장 가격과 순자산가치(NAV) 사이의 차이다.\u003c/p\u003e\n\u003cp\u003e괴리율이 +2%라는 건 ETF가 실제 가치보다 2% 비싸게 거래되고 있다는 뜻이다. 이때 사면 손해다. 반대로 -2%라면 2% 싸게 살 수 있는 기회다.\u003c/p\u003e\n\u003cp\u003e대부분의 주요 ETF는 괴리율이 거의 0에 가깝다. 하지만 해외자산 ETF는 시장이 닫혀 있는 시간에 국내 ETF가 거래되므로 괴리율이 일시적으로 커질 수 있다.\u003c/p\u003e\n\u003ch3\u003e실전 ETF 선택 체크리스트\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 내가 원하는 지수/섹터를 제대로 추종하는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 운용보수가 유사 상품 대비 낮은가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 추적오차가 0.5% 이하인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 하루 거래량이 충분한가 (1억 원 이상)?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 괴리율이 과도하게 벌어져 있지 않은가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 국내 vs 해외 ETF — 실제 상품 비교\u003c/h2\u003e\n\u003ch3\u003e국내 코스피/코스닥 ETF\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상품명\u003c/th\u003e\n\u003cth\u003e추종지수\u003c/th\u003e\n\u003cth\u003e운용사\u003c/th\u003e\n\u003cth\u003e운용보수\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 200\u003c/td\u003e\n\u003ctd\u003e코스피200\u003c/td\u003e\n\u003ctd\u003e삼성자산운용\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003ctd\u003e국내 최대 규모 ETF\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 200\u003c/td\u003e\n\u003ctd\u003e코스피200\u003c/td\u003e\n\u003ctd\u003e미래에셋자산운용\u003c/td\u003e\n\u003ctd\u003e0.05%\u003c/td\u003e\n\u003ctd\u003e저보수 코스피 ETF\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 코스닥150\u003c/td\u003e\n\u003ctd\u003e코스닥150\u003c/td\u003e\n\u003ctd\u003e삼성자산운용\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003ctd\u003e국내 중소형 성장주\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 코스닥150\u003c/td\u003e\n\u003ctd\u003e코스닥150\u003c/td\u003e\n\u003ctd\u003e미래에셋자산운용\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003ctd\u003e코스닥150 추종\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eKODEX 200과 TIGER 200은 같은 지수를 추종하지만 운용보수가 3배 차이난다. 장기 보유라면 TIGER 200이 유리하다. 그러나 KODEX 200의 거래량이 압도적으로 많아 유동성은 더 좋다.\u003c/p\u003e\n\u003ch3\u003e미국 주식 ETF (국내 상장)\u003c/h3\u003e\n\u003cp\u003e국내 증권계좌에서 원화로 살 수 있지만, 미국 주식에 투자하는 ETF들이다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상품명\u003c/th\u003e\n\u003cth\u003e추종지수\u003c/th\u003e\n\u003cth\u003e운용보수\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 미국S\u0026#x26;P500\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500\u003c/td\u003e\n\u003ctd\u003e0.07%\u003c/td\u003e\n\u003ctd\u003e미국 대형주 500개\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 미국S\u0026#x26;P500TR\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500 (TR)\u003c/td\u003e\n\u003ctd\u003e0.05%\u003c/td\u003e\n\u003ctd\u003e배당 재투자 포함\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 미국나스닥100\u003c/td\u003e\n\u003ctd\u003e나스닥100\u003c/td\u003e\n\u003ctd\u003e0.07%\u003c/td\u003e\n\u003ctd\u003e미국 테크 중심 100개\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 미국나스닥100TR\u003c/td\u003e\n\u003ctd\u003e나스닥100 (TR)\u003c/td\u003e\n\u003ctd\u003e0.05%\u003c/td\u003e\n\u003ctd\u003e배당 재투자 포함\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 미국배당다우존스\u003c/td\u003e\n\u003ctd\u003eDow Jones US Dividend 100\u003c/td\u003e\n\u003ctd\u003e0.01%\u003c/td\u003e\n\u003ctd\u003e고배당 미국주 100개, 초저보수\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eTR(Total Return)의 의미\u003c/strong\u003e: TR이 붙으면 배당금을 분배하지 않고 자동으로 재투자한다. 장기 복리 효과를 극대화하고 싶다면 TR형이 유리하다.\u003c/p\u003e\n\u003ch3\u003e미국 ETF (미국 직접 투자)\u003c/h3\u003e\n\u003cp\u003e미국 거래소에 상장된 ETF를 해외주식 계좌로 직접 사는 것이다. 국내 상장 ETF보다 운용보수가 더 낮은 경우가 많다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상품명\u003c/th\u003e\n\u003cth\u003e추종지수\u003c/th\u003e\n\u003cth\u003e운용보수\u003c/th\u003e\n\u003cth\u003e운용사\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eVOO\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500\u003c/td\u003e\n\u003ctd\u003e0.03%\u003c/td\u003e\n\u003ctd\u003e뱅가드\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eIVV\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500\u003c/td\u003e\n\u003ctd\u003e0.03%\u003c/td\u003e\n\u003ctd\u003e블랙록(iShares)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSPY\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500\u003c/td\u003e\n\u003ctd\u003e0.0945%\u003c/td\u003e\n\u003ctd\u003eSPDR\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eQQQ\u003c/td\u003e\n\u003ctd\u003e나스닥100\u003c/td\u003e\n\u003ctd\u003e0.20%\u003c/td\u003e\n\u003ctd\u003e인베스코\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eVTI\u003c/td\u003e\n\u003ctd\u003e미국 전체주식시장\u003c/td\u003e\n\u003ctd\u003e0.03%\u003c/td\u003e\n\u003ctd\u003e뱅가드\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e국내 상장 vs 미국 직접 상장 ETF 비교\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e국내 상장 ETF\u003c/th\u003e\n\u003cth\u003e미국 직접 ETF\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e거래 통화\u003c/td\u003e\n\u003ctd\u003e원화\u003c/td\u003e\n\u003ctd\u003e달러\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e세금\u003c/td\u003e\n\u003ctd\u003e매매차익 15.4% 분리과세 (연 250만원 공제)\u003c/td\u003e\n\u003ctd\u003e동일\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당 세금\u003c/td\u003e\n\u003ctd\u003e배당소득세 15.4%\u003c/td\u003e\n\u003ctd\u003e동일\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e환헤지\u003c/td\u003e\n\u003ctd\u003e상품에 따라 다름 (H 붙으면 헤지)\u003c/td\u003e\n\u003ctd\u003e없음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e운용보수\u003c/td\u003e\n\u003ctd\u003e상대적으로 높음 (0.05~0.2%)\u003c/td\u003e\n\u003ctd\u003e아주 낮음 (0.03~0.1%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e편의성\u003c/td\u003e\n\u003ctd\u003e국내 앱에서 쉽게 거래\u003c/td\u003e\n\u003ctd\u003e해외주식 계좌 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e장기 투자에서 운용보수 0.03% vs 0.07%의 차이는 30년 복리 기준으로 상당한 차이를 만든다. 편의성 vs 보수 절감을 비교해서 선택하면 된다.\u003c/p\u003e\n\u003ch3\u003e섹터/테마 ETF 주요 상품\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상품명\u003c/th\u003e\n\u003cth\u003e분야\u003c/th\u003e\n\u003cth\u003e운용보수\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 반도체\u003c/td\u003e\n\u003ctd\u003e국내 반도체\u003c/td\u003e\n\u003ctd\u003e0.45%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 미국필라델피아반도체나스닥\u003c/td\u003e\n\u003ctd\u003e미국 반도체 (SOX)\u003c/td\u003e\n\u003ctd\u003e0.49%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 2차전지산업\u003c/td\u003e\n\u003ctd\u003e국내 2차전지\u003c/td\u003e\n\u003ctd\u003e0.45%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER KRX BBIG K-뉴딜\u003c/td\u003e\n\u003ctd\u003e배터리·바이오·인터넷·게임\u003c/td\u003e\n\u003ctd\u003e0.40%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 미국S\u0026#x26;P500IT섹터\u003c/td\u003e\n\u003ctd\u003e미국 IT 섹터\u003c/td\u003e\n\u003ctd\u003e0.30%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 리츠부동산인프라\u003c/td\u003e\n\u003ctd\u003e국내 리츠\u003c/td\u003e\n\u003ctd\u003e0.29%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e섹터/테마 ETF는 운용보수가 높다. 성장 기대감에 투자하는 거라면 그 비용을 감당할 만한 기대수익률이 있어야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. ETF만으로 포트폴리오 만들기\u003c/h2\u003e\n\u003cp\u003eETF는 개별 종목 분석 없이도 \u003cstrong\u003e분산 투자된 포트폴리오\u003c/strong\u003e를 만들 수 있다는 게 가장 큰 장점이다.\u003c/p\u003e\n\u003ch3\u003e초간단 포트폴리오: 미국 주식 100%\u003c/h3\u003e\n\u003cp\u003e투자 초보에게 가장 많이 추천되는 방법이다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTIGER 미국S\u0026#x26;P500\u003c/strong\u003e 또는 \u003cstrong\u003eKODEX 미국S\u0026#x26;P500TR\u003c/strong\u003e 100%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e매월 일정금액을 꾸준히 사는 정액 적립식(달러 코스트 애버리징)으로 10년 이상 가져가면, 역사적으로 연 7~10% 수익률을 기록했다.\u003c/p\u003e\n\u003ch3\u003e기초 분산 포트폴리오\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e상품\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e미국 주식\u003c/td\u003e\n\u003ctd\u003eTIGER 미국S\u0026#x26;P500\u003c/td\u003e\n\u003ctd\u003e60%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e국내 주식\u003c/td\u003e\n\u003ctd\u003eTIGER 200\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e채권\u003c/td\u003e\n\u003ctd\u003eKODEX 국고채3년\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e주식 80% + 채권 20%의 기본 분산 포트폴리오. 주식 부분은 미국과 국내를 나눠서 리스크를 분산한다.\u003c/p\u003e\n\u003ch3\u003e코어-새틀라이트 포트폴리오\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e분류\u003c/th\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e상품\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e코어\u003c/td\u003e\n\u003ctd\u003e미국 주식\u003c/td\u003e\n\u003ctd\u003eTIGER 미국S\u0026#x26;P500\u003c/td\u003e\n\u003ctd\u003e50%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e코어\u003c/td\u003e\n\u003ctd\u003e국내 주식\u003c/td\u003e\n\u003ctd\u003eTIGER 200\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e코어\u003c/td\u003e\n\u003ctd\u003e채권\u003c/td\u003e\n\u003ctd\u003eKODEX 국고채3년\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e새틀라이트\u003c/td\u003e\n\u003ctd\u003e반도체\u003c/td\u003e\n\u003ctd\u003eTIGER 미국필라델피아반도체\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e새틀라이트\u003c/td\u003e\n\u003ctd\u003e테마\u003c/td\u003e\n\u003ctd\u003e본인 관심 섹터\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e안정적인 코어(80%)에 성장 기대 새틀라이트(20%)를 얹는 방식이다.\u003c/p\u003e\n\u003ch3\u003e실전 팁\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e정액 적립식이 진리다\u003c/strong\u003e: 매달 일정 금액을 기계적으로 사는 것. 주가가 오르면 적게 사고, 내리면 많이 사는 효과가 자동으로 생긴다. 타이밍을 맞추려다 실패하는 것보다 훨씬 효과적이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e리밸런싱\u003c/strong\u003e: 6개월 또는 1년마다 목표 비중이 틀어졌으면 다시 맞춰준다. 주식이 많이 올라서 70%가 됐다면, 조금 팔아서 채권을 더 사는 것이다. 이 과정에서 자연스럽게 비싸게 팔고 싸게 사는 효과가 생긴다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e세금을 잊지 말자\u003c/strong\u003e: 국내 ETF 매매차익은 금융투자소득세(예정) 또는 현행 15.4% 분리과세 대상이다. 연간 250만 원 공제 한도를 활용한 절세 전략을 미리 파악해두자.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리 정리\u003c/h2\u003e\n\u003cp\u003e이번 편에서 배운 것:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eETF는 바구니다.\u003c/strong\u003e 여러 주식을 묶어서 주식처럼 거래하는 것. 낮은 수수료와 높은 투명성이 장점이다.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e4가지 종류\u003c/strong\u003e: 인덱스(추천), 섹터, 테마, 레버리지/인버스(비추). 처음엔 인덱스 ETF부터 시작하자.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eETF 고르는 기준\u003c/strong\u003e: 운용보수, 추적오차, 거래량, 괴리율 순으로 체크한다.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e주요 상품\u003c/strong\u003e: 국내는 KODEX 200/TIGER 200, 미국 주식은 TIGER 미국S\u0026#x26;P500/KODEX 미국S\u0026#x26;P500TR이 대표적이다.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e포트폴리오는 단순하게\u003c/strong\u003e: 미국 S\u0026#x26;P500 ETF 하나에 꾸준히 적립하는 것만으로도 훌륭한 장기 투자 전략이 된다.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e다음 편에서는 주식 외에 또 다른 핵심 자산인 \u003cstrong\u003e채권\u003c/strong\u003e에 대해 알아본다. 금리가 오르면 왜 채권 가격이 내리는지, 그 신기한 반비례 관계를 쉽게 설명해준다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-
