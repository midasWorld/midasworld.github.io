"]\n11:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:T4a75,"])</script><script>self.__next_f.push([1,"\u003cp\u003e여기까지 잘 따라왔다면 이제 기업을 어떻게 분석하는지는 어느 정도 감이 잡혔을 거야. 재무제표도 읽을 줄 알고, 밸류에이션도 해봤고, 산업 사이클도 공부했지. 그런데 막상 \"그래서 지금 사야 해? 말아야 해?\" 하는 순간이 오면 손이 떨리는 게 당연해.\u003c/p\u003e\n\u003cp\u003e이번 편은 바로 그 질문에 답하는 시간이야. \u003cstrong\u003e언제 사고, 언제 파는가.\u003c/strong\u003e 기술적 분석의 핵심 도구들을 실용적으로 정리해줄게.\u003c/p\u003e\n\u003cp\u003e단, 먼저 경고부터 하나 해둘게. \u003cstrong\u003e기술적 분석은 만능이 아니야.\u003c/strong\u003e 차트가 예쁘게 올라간다고 해서 기업이 좋은 게 아니고, 차트가 무너진다고 해서 기업이 망하는 것도 아니야. 기술적 분석은 어디까지나 \u003cstrong\u003e진입 타이밍을 다듬는 도구\u003c/strong\u003e야. 1편부터 9편까지 배운 펀더멘털 분석이 \"무엇을 살지\"를 알려준다면, 기술적 분석은 \"언제 살지\"를 보조해주는 역할이야. 이 두 가지를 함께 써야 비로소 제대로 된 투자가 된다는 걸 꼭 기억해.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 기술적 분석이란 — 차트를 보는 이유와 한계\u003c/h2\u003e\n\u003cp\u003e기술적 분석(Technical Analysis)이란 \u003cstrong\u003e과거의 주가와 거래량 데이터를 이용해 미래의 주가 방향을 예측하려는 방법론\u003c/strong\u003e이야. 쉽게 말하면 \"지금까지의 패턴을 보고 앞으로도 비슷하게 움직일 거라고 가정하는 것\"이지.\u003c/p\u003e\n\u003ch3\u003e왜 차트를 보는가\u003c/h3\u003e\n\u003cp\u003e주가는 단기적으로 수많은 사람의 심리가 반영된 결과야. 공포, 탐욕, 기대, 실망… 이런 감정들이 모여서 하루하루의 주가를 만들어내. 기술적 분석은 이런 심리의 흔적을 차트에서 읽어내려는 시도야.\u003c/p\u003e\n\u003cp\u003e실제로 투자자들이 차트를 쓰는 이유는 세 가지야.\u003c/p\u003e\n\u003cp\u003e첫째, \u003cstrong\u003e진입과 청산 타이밍 조율.\u003c/strong\u003e 아무리 좋은 주식도 너무 비싸게 사면 손해야. 기술적 분석은 상대적으로 저점에서 매수하고 고점에서 매도하는 타이밍을 잡는 데 도움을 줘.\u003c/p\u003e\n\u003cp\u003e둘째, \u003cstrong\u003e위험 관리.\u003c/strong\u003e 손절 기준을 어디에 둘지, 어디까지 떨어지면 추가 매수를 할지 등을 수치로 정할 수 있어.\u003c/p\u003e\n\u003cp\u003e셋째, \u003cstrong\u003e군중 심리 파악.\u003c/strong\u003e 시장 참여자들이 특정 지점을 중요하게 생각하면, 실제로 그 지점에서 매매가 몰리게 돼. 차트는 이런 집단적 심리를 시각화해줘.\u003c/p\u003e\n\u003ch3\u003e기술적 분석의 한계\u003c/h3\u003e\n\u003cp\u003e솔직하게 말할게. \u003cstrong\u003e기술적 분석만으로 주식 투자에 성공하기는 매우 어려워.\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e과거 패턴이 미래에도 반복된다는 보장이 없어.\u003c/li\u003e\n\u003cli\u003e기업의 실제 가치와 무관하게 움직일 수 있어.\u003c/li\u003e\n\u003cli\u003e같은 차트를 보고 전혀 다른 해석을 내릴 수 있어.\u003c/li\u003e\n\u003cli\u003e개인 투자자가 기관·외인의 자금 흐름을 이기기 어려워.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e그래서 이 편에서 배울 내용은 **\"펀더멘털로 좋은 종목을 찾은 뒤, 기술적 분석으로 타이밍을 잡는다\"**는 프레임으로 이해해줘. 차트만 믿고 투자하는 건 추천하지 않아.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 핵심 지표 3가지 — 이동평균선, 거래량, RSI\u003c/h2\u003e\n\u003cp\u003e수십 가지 보조지표가 있지만, 처음에는 이 세 가지만 확실하게 이해해도 충분해.\u003c/p\u003e\n\u003ch3\u003e이동평균선 (Moving Average, MA)\u003c/h3\u003e\n\u003cp\u003e이동평균선은 \u003cstrong\u003e일정 기간의 종가 평균을 연결한 선\u003c/strong\u003e이야. 예를 들어 20일 이동평균선은 최근 20거래일의 종가 평균을 매일 계산해서 이은 거야.\u003c/p\u003e\n\u003cp\u003e자주 쓰는 이동평균선:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e기간\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e단기\u003c/td\u003e\n\u003ctd\u003e5일, 20일\u003c/td\u003e\n\u003ctd\u003e단기 트렌드, 모멘텀\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e중기\u003c/td\u003e\n\u003ctd\u003e60일\u003c/td\u003e\n\u003ctd\u003e중기 추세 판단\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기\u003c/td\u003e\n\u003ctd\u003e120일, 200일\u003c/td\u003e\n\u003ctd\u003e장기 추세, 기관 기준선\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e골든크로스(Golden Cross):\u003c/strong\u003e 단기 이동평균선이 장기 이동평균선을 아래에서 위로 뚫고 올라올 때. 보통 매수 신호로 해석해. 예를 들어 20일선이 60일선을 상향 돌파하는 경우야.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e데드크로스(Dead Cross):\u003c/strong\u003e 반대로 단기 이동평균선이 장기 이동평균선을 위에서 아래로 뚫고 내려올 때. 매도 신호로 해석해.\u003c/p\u003e\n\u003cp\u003e이동평균선 활용 팁:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가가 이동평균선 위에 있으면 상승 추세, 아래면 하락 추세로 판단해.\u003c/li\u003e\n\u003cli\u003e이동평균선들이 모두 정배열(단기 \u003e 중기 \u003e 장기 순서)이면 강한 상승 추세야.\u003c/li\u003e\n\u003cli\u003e역배열(장기 \u003e 중기 \u003e 단기)이면 하락 추세가 지속되고 있다는 신호야.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e거래량 (Volume)\u003c/h3\u003e\n\u003cp\u003e주가만큼 중요한 게 거래량이야. \u003cstrong\u003e거래량은 주가 움직임의 신뢰도를 확인하는 지표\u003c/strong\u003e야.\u003c/p\u003e\n\u003cp\u003e핵심 원칙 두 가지를 외워둬.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e거래량 증가 + 주가 상승 = 신뢰할 수 있는 상승\u003c/strong\u003e\n: 많은 사람이 참여해서 가격이 올라간 거니까 추세가 지속될 가능성이 높아.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e거래량 감소 + 주가 상승 = 약한 상승\u003c/strong\u003e\n: 소수가 참여해서 올린 것이라 언제든 꺾일 수 있어. 조심해야 해.\u003c/p\u003e\n\u003cp\u003e반대로 하락할 때도 마찬가지야. 거래량이 폭발하면서 급락하면 패닉 셀링이 나오는 거고, 거래량이 적은 채로 흘러내리면 점진적 이탈이야.\u003c/p\u003e\n\u003cp\u003e특히 주목해야 할 패턴:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e주가가 횡보하다 거래량이 갑자기 급증하면서 상승\u003c/strong\u003e → 세력 진입이나 대형 호재 가능성\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e상승하다 거래량이 급감\u003c/strong\u003e → 추세 약화, 조정 임박 가능성\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e바닥권에서 거래량 급증 후 주가 반등\u003c/strong\u003e → 매집 완료 신호일 수 있어\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eRSI (Relative Strength Index, 상대강도지수)\u003c/h3\u003e\n\u003cp\u003eRSI는 \u003cstrong\u003e주가의 상승 속도와 하락 속도를 비교해 현재 주가가 과매수인지 과매도인지 판단하는 지표\u003c/strong\u003e야. 0~100 사이 숫자로 표현돼.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eRSI 수치\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e70 이상\u003c/td\u003e\n\u003ctd\u003e과매수 구간 — 조정 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e30 이하\u003c/td\u003e\n\u003ctd\u003e과매도 구간 — 반등 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50 기준\u003c/td\u003e\n\u003ctd\u003e50 이상이면 상승 모멘텀, 이하면 하락 모멘텀\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e주의할 점: RSI가 70을 넘었다고 해서 무조건 팔아야 하는 건 아니야. 강한 상승장에서는 RSI가 70 이상을 오랫동안 유지하기도 해. 반대로 하락장에서는 30 이하에서도 계속 떨어지기도 하고. RSI는 방향을 확인하는 보조 신호로만 써야 해.\u003c/p\u003e\n\u003cp\u003e실전 활용법:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRSI 30 이하에서 반등 시작 + 거래량 증가 → 매수 검토\u003c/li\u003e\n\u003cli\u003eRSI 70 이상에서 둔화 + 거래량 감소 → 매도 검토\u003c/li\u003e\n\u003cli\u003e주가는 신고가인데 RSI는 이전 고점보다 낮은 경우(다이버전스) → 상승 동력 약화 신호\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 지지선과 저항선 — 매수 타이밍 잡기\u003c/h2\u003e\n\u003cp\u003e기술적 분석에서 가장 많이 쓰이는 개념이 바로 지지선과 저항선이야.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e지지선(Support):\u003c/strong\u003e 주가가 하락하다 반등하는 가격대. 과거에 여러 번 반등한 가격은 앞으로도 지지 역할을 할 가능성이 높아. 투자자들이 \"이 가격이면 싸다\"고 느끼는 심리적 라인이기도 해.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e저항선(Resistance):\u003c/strong\u003e 주가가 상승하다 막히는 가격대. 과거에 여러 번 고점을 찍은 가격은 앞으로도 저항 역할을 할 가능성이 높아. \"이 가격이면 팔겠다\"는 사람이 많은 구간이야.\u003c/p\u003e\n\u003ch3\u003e지지/저항 전환의 법칙\u003c/h3\u003e\n\u003cp\u003e중요한 패턴 하나를 알려줄게. \u003cstrong\u003e저항선을 상향 돌파하면 그 선이 새로운 지지선이 되는 경우가 많아.\u003c/strong\u003e 반대로 지지선이 무너지면 그 선이 새로운 저항선으로 바뀌는 경향이 있어.\u003c/p\u003e\n\u003cp\u003e예를 들어, 어떤 주식이 50,000원에서 여러 번 막혔다가 마침내 돌파했어. 그 이후에 주가가 조정을 받을 때 50,000원 근처에서 다시 지지를 받으면, 그걸 \"지지/저항 전환\"이라고 해. 이 시점이 비교적 안전한 매수 타이밍이 될 수 있어.\u003c/p\u003e\n\u003ch3\u003e매수 타이밍 체크리스트\u003c/h3\u003e\n\u003cp\u003e기술적으로 매수를 검토할 때 확인할 항목들이야.\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 펀더멘털이 좋은 종목인가? (선행 조건)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 주가가 주요 지지선 근처인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 이동평균선이 정배열이거나 골든크로스 진행 중인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e RSI가 30~50 구간에서 반등하고 있는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 거래량이 증가하면서 상승하는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 전반적인 시장(코스피/코스닥/S\u0026#x26;P500) 분위기는 어떤가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 중 4개 이상이 맞아떨어지면 비교적 좋은 타이밍으로 볼 수 있어. 단, 모든 조건이 맞아도 틀릴 수 있어. 투자는 확률 게임이야.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 매도 전략 — 목표가 매도, 트레일링 스탑, 분할 매도\u003c/h2\u003e\n\u003cp\u003e사는 것보다 파는 게 훨씬 어렵다는 말 들어봤어? 진심이야. 주식을 살 때는 기대감이 있어서 결정이 비교적 쉬운데, 팔 때는 더 오를 것 같은 미련, 이미 손실이 난 경우의 자존심, 세금 문제 등 여러 심리적 장벽이 생겨.\u003c/p\u003e\n\u003cp\u003e그래서 \u003cstrong\u003e매도 전략은 매수 전에 미리 정해둬야 해.\u003c/strong\u003e 사기 전부터 \"어디서 팔 것인가\"를 결정해둬야 흔들리지 않아.\u003c/p\u003e\n\u003ch3\u003e목표가 매도\u003c/h3\u003e\n\u003cp\u003e가장 단순하고 확실한 방법이야. 매수할 때 목표 주가를 정하고, 그 가격에 도달하면 파는 거야.\u003c/p\u003e\n\u003cp\u003e목표가 설정 방법:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e밸류에이션 기반:\u003c/strong\u003e 적정 PER, PBR, DCF로 계산한 적정가를 목표가로 설정\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e기술적 저항선 기반:\u003c/strong\u003e 다음 주요 저항선을 목표가로 설정\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e수익률 기반:\u003c/strong\u003e \"30% 수익이 나면 판다\"는 식으로 사전에 결정\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e목표가에 도달했을 때 \"더 오를 것 같은데...\"라는 마음이 생기면 위험해. 원래 계획대로 팔거나, 아니면 목표가를 조정할 합리적 근거가 있어야 해. 근거 없는 욕심은 수익을 반납하게 만들어.\u003c/p\u003e\n\u003ch3\u003e트레일링 스탑 (Trailing Stop)\u003c/h3\u003e\n\u003cp\u003e트레일링 스탑은 \u003cstrong\u003e주가가 오를수록 손절 기준도 같이 올라가는 동적 손절 방법\u003c/strong\u003e이야.\u003c/p\u003e\n\u003cp\u003e예를 들어, 10만 원에 주식을 샀고 트레일링 스탑을 -10%로 설정했다고 해보자.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가가 12만 원까지 오르면 → 손절 기준이 10만 8천 원으로 올라와\u003c/li\u003e\n\u003cli\u003e주가가 15만 원까지 오르면 → 손절 기준이 13만 5천 원으로 올라와\u003c/li\u003e\n\u003cli\u003e주가가 13만 5천 원 이하로 떨어지면 → 매도\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 방법의 장점은 상승 추세가 이어지는 동안에는 계속 보유할 수 있고, 추세가 꺾일 때 자동으로 이익을 실현한다는 점이야. 단, 단기 변동성이 클 경우 너무 이르게 팔릴 수도 있어.\u003c/p\u003e\n\u003ch3\u003e분할 매도\u003c/h3\u003e\n\u003cp\u003e한 번에 다 파는 게 불안하다면 분할 매도를 써봐.\u003c/p\u003e\n\u003cp\u003e예시:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e목표가 30% 상승 시 → 보유 수량의 30% 매도\u003c/li\u003e\n\u003cli\u003e목표가 50% 상승 시 → 추가 30% 매도\u003c/li\u003e\n\u003cli\u003e나머지 40%는 장기 보유\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e분할 매도의 심리적 장점은 일부를 팔아서 이익을 실현했기 때문에, 나머지 물량이 조정을 받아도 덜 불안하다는 거야. 반대로 더 올라가도 일부는 계속 들고 있으니 기회를 완전히 놓치지 않아.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 손절의 기술 — 손절 기준 설정과 심리 관리\u003c/h2\u003e\n\u003cp\u003e투자에서 가장 중요하면서도 가장 하기 어려운 행동이 바로 \u003cstrong\u003e손절\u003c/strong\u003e이야. 많은 개인 투자자가 손절을 못 해서 작은 손실을 큰 손실로 키우는 실수를 해.\u003c/p\u003e\n\u003ch3\u003e손절이 왜 어려운가\u003c/h3\u003e\n\u003cp\u003e우리 뇌는 손실을 이익보다 약 2배 더 크게 느끼도록 설계되어 있어. 이걸 행동경제학에서 **손실 회피 편향(Loss Aversion)**이라고 해. -10% 손실의 고통이 +10% 이익의 기쁨보다 훨씬 크게 느껴지는 거야.\u003c/p\u003e\n\u003cp\u003e그래서 많은 사람이 이런 생각을 해:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"조금만 더 기다리면 오르겠지...\"\u003c/li\u003e\n\u003cli\u003e\"손절하면 확정 손실이 되니까 안 팔고 버티자\"\u003c/li\u003e\n\u003cli\u003e\"내가 틀린 게 아니야, 시장이 잘못된 거야\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이런 생각들이 -10% 손실을 -30%, -50% 손실로 만들어.\u003c/p\u003e\n\u003ch3\u003e손절 기준 설정법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e원칙:\u003c/strong\u003e 손절 기준은 매수 전에 반드시 미리 정해라.\u003c/p\u003e\n\u003cp\u003e일반적으로 쓰이는 방법들이야:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e방법\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003cth\u003e장단점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e비율 기반\u003c/td\u003e\n\u003ctd\u003e매수가 대비 -8~-10% 하락 시 손절\u003c/td\u003e\n\u003ctd\u003e단순하고 명확\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e지지선 기반\u003c/td\u003e\n\u003ctd\u003e주요 지지선 이탈 시 손절\u003c/td\u003e\n\u003ctd\u003e기술적으로 근거 있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e이동평균선 기반\u003c/td\u003e\n\u003ctd\u003e20일선 또는 60일선 이탈 시 손절\u003c/td\u003e\n\u003ctd\u003e추세 추종에 적합\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e리스크 금액 기반\u003c/td\u003e\n\u003ctd\u003e포트폴리오의 X% 이상 손실 시 손절\u003c/td\u003e\n\u003ctd\u003e전체 포트폴리오 관리에 좋음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e예시: 100만 원을 투자했고 포트폴리오의 1% 이상 손실을 허용하지 않기로 했다면, 최대 손실액은 1만 원이야. 이 경우 매수 후 1만 원(=1%) 하락 시 손절. 포트폴리오 규모에 따라 달라지지만 이런 식으로 구체적으로 정해두는 게 좋아.\u003c/p\u003e\n\u003ch3\u003e손절 후 심리 관리\u003c/h3\u003e\n\u003cp\u003e손절 후에 \"내가 팔았더니 올랐어\"라는 상황이 생길 수 있어. 이게 반복되면 다음번엔 손절 못 하게 돼. 이렇게 생각해.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"손절은 내가 틀렸다는 증거가 아니야. 리스크를 관리했다는 증거야.\"\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e100번 중 60번 맞고 40번 손절하더라도, 이익이 손실보다 크면 결국 돈을 버는 거야. 투자는 승률보다 손익비(Risk/Reward Ratio)가 중요해.\u003c/p\u003e\n\u003cp\u003e손익비 3:1의 의미: 목표 수익이 +30%이고 손절 기준이 -10%라면, 세 번 중 한 번만 성공해도 본전이야. 두 번 성공하면 확실한 수익이지.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 분할 매수 전략 — 리스크를 줄이는 진입법\u003c/h2\u003e\n\u003cp\u003e주식을 살 때 한 번에 전부 사는 게 아니라 여러 번에 나눠서 사는 전략이야. 비슷한 개념으로 \"물타기\"라는 말을 들어봤을 텐데, 전략적인 분할 매수와 무계획한 물타기는 달라.\u003c/p\u003e\n\u003ch3\u003e분할 매수가 필요한 이유\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e내가 정확한 저점을 잡을 수 없어. 아무도 못 해.\u003c/li\u003e\n\u003cli\u003e한 번에 올인했다가 추가 하락하면 심리적으로 엄청난 부담이 돼.\u003c/li\u003e\n\u003cli\u003e분할 매수를 하면 평균 매수가를 낮출 기회가 생겨.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e분할 매수 방법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e3분할 진입 전략 (입문자 추천):\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e1차 매수 — 관심 종목이 지지선 근처에 오면 목표 수량의 30~40% 매수\u003c/li\u003e\n\u003cli\u003e2차 매수 — 추가 하락(예: -5~-10%)하면 30~40% 추가 매수\u003c/li\u003e\n\u003cli\u003e3차 매수 — 반등 시작이 확인되면 나머지 매수\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e이렇게 하면 평균 매수가가 낮아져서 조금만 반등해도 수익이 나기 시작해.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDCA (Dollar Cost Averaging, 정기 매수):\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e매달 일정 금액을 정해서 고정적으로 매수하는 방법이야. 주가가 높을 때는 적은 수량, 낮을 때는 많은 수량이 자동으로 사지는 효과가 있어. ETF 투자에서 특히 효과적이야.\u003c/p\u003e\n\u003ch3\u003e물타기와 분할 매수의 차이\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e전략적 분할 매수\u003c/th\u003e\n\u003cth\u003e무계획 물타기\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e매수 기준\u003c/td\u003e\n\u003ctd\u003e사전에 정한 가격대나 비율\u003c/td\u003e\n\u003ctd\u003e손실이 커질수록 충동적으로 추가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e손절 계획\u003c/td\u003e\n\u003ctd\u003e있음\u003c/td\u003e\n\u003ctd\u003e없음 (버티는 전략)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e목적\u003c/td\u003e\n\u003ctd\u003e평균 단가 최적화\u003c/td\u003e\n\u003ctd\u003e손실 만회\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e위험도\u003c/td\u003e\n\u003ctd\u003e관리 가능\u003c/td\u003e\n\u003ctd\u003e매우 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e물타기가 위험한 이유는 근본적인 문제가 있는 주식을 계속 사면서 손실이 눈덩이처럼 커질 수 있기 때문이야. 추가 매수를 결정하기 전에 반드시 \"왜 하락했는가? 펀더멘털에 변화가 있는가?\"를 먼저 확인해.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리 — 기술적 분석을 제대로 쓰는 법\u003c/h2\u003e\n\u003cp\u003e이번 편에서 배운 내용을 정리해볼게.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 체크리스트:\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 이동평균선으로 추세 방향 확인\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 거래량으로 신호의 신뢰도 확인\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e RSI로 과매수/과매도 구간 확인\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 지지선/저항선으로 매수 타이밍 조율\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매수 전에 목표가와 손절가 미리 결정\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 분할 매수로 평균 단가 관리\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e그리고 가장 중요한 것:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e기술적 분석은 펀더멘털 분석의 보조 도구야.\u003c/strong\u003e 좋은 기업을 제대로 분석하고, 그다음에 타이밍을 잡기 위해 차트를 보는 거야. 차트만 보고 투자하는 건 \"그림\"을 보고 복권을 사는 것과 비슷해.\u003c/p\u003e\n\u003cp\u003e1편부터 9편까지 배운 내용들 — 재무제표, PER/PBR, DCF, 산업 분석, 경제 사이클 — 이 모든 것들이 바탕에 있어야 기술적 분석이 의미 있어. 이 두 가지를 병행하면 훨씬 더 좋은 투자 결정을 내릴 수 있을 거야.\u003c/p\u003e\n\u003cp\u003e다음 편(11편)은 이 시리즈의 마지막으로, 지금까지 배운 모든 내용을 통합해서 나만의 포트폴리오를 구성하는 방법을 다룰 거야. 드디어 실전 자산배분 설계를 해보자.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs fon
