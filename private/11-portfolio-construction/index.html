003e투자 자금을 여러 자산군에 나누어 투자하는 전략\u003c/strong\u003e이야. 여기서 자산군이란 주식, 채권, 부동산(리츠), 금, 현금 등을 말해.\u003c/p\u003e\n\u003ch3\u003e왜 자산배분이 중요한가\u003c/h3\u003e\n\u003cp\u003e노벨 경제학상을 받은 해리 마코위츠(Harry Markowitz)는 1952년에 논문 하나를 발표했어. 핵심은 이거야.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"서로 낮은 상관관계를 가진 자산들을 조합하면, 개별 자산보다 높은 수익률을 낮은 위험으로 달성할 수 있다.\"\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e쉽게 말하면, 주식이 폭락할 때 채권이 오르는 경향이 있어. 채권이 약세일 때 금이 상대적으로 강해지기도 해. 이런 자산들을 섞어두면, 어느 하나가 망해도 전체 포트폴리오가 무너지지 않아.\u003c/p\u003e\n\u003ch3\u003e상관관계를 이해하자\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산 조합\u003c/th\u003e\n\u003cth\u003e상관관계\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 + 채권\u003c/td\u003e\n\u003ctd\u003e일반적으로 낮음 (음의 상관)\u003c/td\u003e\n\u003ctd\u003e주가 하락 시 채권 상승 경향\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 + 금\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e위기 시 금이 안전자산 역할\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e국내주식 + 해외주식\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e분산 효과 있지만 글로벌 위기엔 동반 하락\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 + 리츠\u003c/td\u003e\n\u003ctd\u003e중간~높음\u003c/td\u003e\n\u003ctd\u003e비슷한 방향성, 분산 효과 제한적\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e핵심은 \u003cstrong\u003e상관관계가 낮거나 반대인 자산끼리 섞는 것\u003c/strong\u003e이야. 그래야 진짜 분산 효과가 생겨.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 클래식 전략 소개 — 60/40, 올웨더, 영구 포트폴리오\u003c/h2\u003e\n\u003cp\u003e수십 년간 실전에서 검증된 대표적인 포트폴리오 전략 세 가지를 소개할게. 이걸 그대로 따라 해도 되고, 나에게 맞게 변형해서 써도 돼.\u003c/p\u003e\n\u003ch3\u003e전략 1: 60/40 포트폴리오\u003c/h3\u003e\n\u003cp\u003e가장 오래되고 널리 알려진 전략이야. 이름 그대로 **주식 60%, 채권 40%**로 구성해.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e대표 상품\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식\u003c/td\u003e\n\u003ctd\u003e60%\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500 ETF (VOO, IVV), 코스피 ETF\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e채권\u003c/td\u003e\n\u003ctd\u003e40%\u003c/td\u003e\n\u003ctd\u003e미국 장기채 ETF (TLT), 국채 ETF\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e단순하고 이해하기 쉬워\u003c/li\u003e\n\u003cli\u003e수십 년간 실증 데이터가 있어\u003c/li\u003e\n\u003cli\u003e주식의 성장성 + 채권의 안정성을 균형 있게 결합\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e단점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e인플레이션이 높은 시기에는 주식과 채권이 동시에 하락하는 경우가 있어 (2022년이 대표적)\u003c/li\u003e\n\u003cli\u003e채권 금리가 낮은 시대에는 채권의 역할이 약화됨\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e전략 2: 올웨더 포트폴리오 (All Weather Portfolio)\u003c/h3\u003e\n\u003cp\u003e레이 달리오(Ray Dalio)가 브리지워터를 통해 개발한 전략이야. 이름처럼 \u003cstrong\u003e어떤 경제 환경(날씨)에서도 버틸 수 있도록\u003c/strong\u003e 설계됐어.\u003c/p\u003e\n\u003cp\u003e달리오는 경제 사이클을 네 가지 시나리오로 나눠: 성장기, 침체기, 인플레이션기, 디플레이션기. 각 시나리오에서 잘 버티는 자산을 골고루 담은 거야.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e대표 상품\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식\u003c/td\u003e\n\u003ctd\u003e30%\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500 ETF\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기채 (20년 이상)\u003c/td\u003e\n\u003ctd\u003e40%\u003c/td\u003e\n\u003ctd\u003eTLT\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e중기채 (7~10년)\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003ctd\u003eIEF\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e7.5%\u003c/td\u003e\n\u003ctd\u003eGLD, IAU\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e원자재\u003c/td\u003e\n\u003ctd\u003e7.5%\u003c/td\u003e\n\u003ctd\u003eDJP, PDBC\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e어떤 경제 환경에서도 비교적 안정적인 성과\u003c/li\u003e\n\u003cli\u003e2008년 금융위기, 2020년 코로나 폭락 때도 상대적으로 방어가 잘 됐어\u003c/li\u003e\n\u003cli\u003e심리적 안정감이 높아 장기 투자에 적합\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e단점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e강한 상승장(2010년대 미국 주식 불마켓)에서는 주식 100% 포트폴리오보다 수익률이 낮아\u003c/li\u003e\n\u003cli\u003e채권 비중이 높아서 금리 상승기에 채권 손실이 발생할 수 있어\u003c/li\u003e\n\u003cli\u003e원자재 투자가 초보자에게 다소 낯설 수 있어\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e전략 3: 영구 포트폴리오 (Permanent Portfolio)\u003c/h3\u003e\n\u003cp\u003e해리 브라운(Harry Browne)이 1980년대에 만든 전략이야. 콘셉트가 정말 단순해.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e주식, 채권, 금, 현금을 각각 25%씩.\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e역할\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e성장기 수익\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기채\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e디플레이션·침체기 방어\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e인플레이션 방어\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e현금(단기채)\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e위기 시 현금 확보\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e극도로 단순하고 관리하기 쉬워\u003c/li\u003e\n\u003cli\u003e어떤 경제 환경에도 한 가지 자산이 포트폴리오를 지탱해줘\u003c/li\u003e\n\u003cli\u003e역사적으로 큰 손실 없이 꾸준한 성과를 냈어\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e단점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e현금 비중이 높아 인플레이션이 지속되는 환경에서 실질 수익률이 낮을 수 있어\u003c/li\u003e\n\u003cli\u003e강한 상승장 수익률이 상대적으로 낮아\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e세 전략 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e60/40\u003c/th\u003e\n\u003cth\u003e올웨더\u003c/th\u003e\n\u003cth\u003e영구 포트폴리오\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e복잡도\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e매우 낮음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e상승장 수익\u003c/td\u003e\n\u003ctd\u003e중간~높음\u003c/td\u003e\n\u003ctd\u003e낮음~중간\u003c/td\u003e\n\u003ctd\u003e낮음~중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e하락장 방어\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e인플레이션 방어\u003c/td\u003e\n\u003ctd\u003e약함\u003c/td\u003e\n\u003ctd\u003e강함\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e초보자 적합도\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e매우 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 나이·목표에 따른 배분 조절 — 공격형, 균형형, 안정형\u003c/h2\u003e\n\u003cp\u003e\"나는 어떤 포트폴리오를 써야 할까?\"\u003c/p\u003e\n\u003cp\u003e이 질문의 답은 세 가지 요소에 달려 있어: \u003cstrong\u003e나이(투자 기간), 목표(언제 얼마나), 성향(손실을 얼마나 견딜 수 있는가).\u003c/strong\u003e\u003c/p\u003e\n\u003ch3\u003e나이와 투자 기간\u003c/h3\u003e\n\u003cp\u003e투자에서 시간은 강력한 무기야. 남은 투자 기간이 길수록 더 공격적으로 투자할 수 있어. 이유는 두 가지야.\u003c/p\u003e\n\u003cp\u003e첫째, 시간이 있으면 손실을 회복할 기회가 있어. 단기 폭락이 와도 기다리면 결국 회복되는 경우가 많아.\u003c/p\u003e\n\u003cp\u003e둘째, 복리의 효과가 극대화돼. 연 8% 수익을 내면 10년 후에는 약 2.16배, 20년 후에는 약 4.66배, 30년 후에는 약 10배가 돼. 시간이 길수록 이 효과가 폭발적이야.\u003c/p\u003e\n\u003cp\u003e일반적인 가이드라인:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e나이\u003c/th\u003e\n\u003cth\u003e투자 성향 권장\u003c/th\u003e\n\u003cth\u003e주식 비중\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e20~30대\u003c/td\u003e\n\u003ctd\u003e공격형\u003c/td\u003e\n\u003ctd\u003e70~90%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e40대\u003c/td\u003e\n\u003ctd\u003e균형형\u003c/td\u003e\n\u003ctd\u003e50~70%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50대\u003c/td\u003e\n\u003ctd\u003e안정형 전환\u003c/td\u003e\n\u003ctd\u003e40~60%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e60대 이상\u003c/td\u003e\n\u003ctd\u003e안정형\u003c/td\u003e\n\u003ctd\u003e20~40%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e물론 나이만이 기준은 아니야. 50대라도 사업 소득이 충분하고 위험 감수 성향이 높다면 공격형으로 가도 돼. 반대로 30대라도 전업투자라 당장 생활비가 필요하다면 안정형이 맞아.\u003c/p\u003e\n\u003ch3\u003e목표 설정\u003c/h3\u003e\n\u003cp\u003e투자 목적에 따라 배분이 달라져야 해.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e노후 준비 (20~30년 후):\u003c/strong\u003e 공격형으로 시작해서 은퇴 시점이 가까워질수록 안정형으로 전환\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e집 구매 자금 (5~10년 후):\u003c/strong\u003e 균형형 유지\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e결혼 자금 (3~5년 후):\u003c/strong\u003e 안정형에 가깝게\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e단기 목돈 (1~3년):\u003c/strong\u003e 주식 비중 최소화, 정기예금·채권 중심\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e성향 파악\u003c/h3\u003e\n\u003cp\u003e자신의 위험 감수 성향을 솔직하게 파악하는 게 중요해. 이 질문에 답해봐:\u003c/p\u003e\n\u003cp\u003e\"내 포트폴리오가 3개월 만에 -30% 손실을 냈다. 나는?\"\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e(a) 침착하게 추가 매수한다 → 공격형\u003c/li\u003e\n\u003cli\u003e(b) 걱정되지만 기다린다 → 균형형\u003c/li\u003e\n\u003cli\u003e(c) 잠을 못 자고 모두 팔아버린다 → 안정형\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 성향을 무시하면 안 돼. 자신이 감당 못 할 수준의 위험을 지면, 정작 가장 중요한 폭락 순간에 팔아버리게 되거든. 그게 최악의 결과야.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 리밸런싱 — 주기, 방법, 세금 고려\u003c/h2\u003e\n\u003cp\u003e포트폴리오를 한 번 구성하면 끝이 아니야. 시간이 지나면 자산별 수익률 차이로 인해 처음 설정한 비율이 무너져. 이걸 원래 비율로 되돌리는 게 **리밸런싱(Rebalancing)**이야.\u003c/p\u003e\n\u003ch3\u003e왜 리밸런싱이 필요한가\u003c/h3\u003e\n\u003cp\u003e예를 들어, 처음에 주식 60% / 채권 40%로 시작했어. 1년 후 주식이 30% 올랐고 채권은 그대로라면?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e초기 1,000만 원 포트폴리오 → 주식 600만 원 + 채권 400만 원\u003c/li\u003e\n\u003cli\u003e1년 후 → 주식 780만 원 + 채권 400만 원 = 1,180만 원\u003c/li\u003e\n\u003cli\u003e현재 비율 → 주식 66% / 채권 34%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이제 주식 비중이 너무 높아졌어. 리밸런싱을 통해 다시 60/40으로 맞춰줘야 해. 주식 일부를 팔고 채권을 사는 거지.\u003c/p\u003e\n\u003cp\u003e리밸런싱의 또 다른 효과: \u003cstrong\u003e자동으로 고점 매도, 저점 매수가 돼.\u003c/strong\u003e 오른 자산을 팔고 덜 오른 자산을 사는 거니까 자연스럽게 수익을 실현하고 상대적으로 저평가된 자산을 늘리게 돼.\u003c/p\u003e\n\u003ch3\u003e리밸런싱 주기\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e방법\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003cth\u003e장단점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e정기 리밸런싱\u003c/td\u003e\n\u003ctd\u003e분기 또는 연 1회 정해진 날짜에\u003c/td\u003e\n\u003ctd\u003e단순하고 감정 개입 적음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e임계값 리밸런싱\u003c/td\u003e\n\u003ctd\u003e목표 비율에서 ±5% 이상 벗어나면\u003c/td\u003e\n\u003ctd\u003e필요할 때만 해서 거래비용 절감\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e혼합형\u003c/td\u003e\n\u003ctd\u003e연 1회 정기 + 큰 편차 발생 시 추가\u003c/td\u003e\n\u003ctd\u003e가장 효율적이지만 관리 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e대부분의 개인 투자자에게는 \u003cstrong\u003e연 1~2회 정기 리밸런싱\u003c/strong\u003e이 현실적이야.\u003c/p\u003e\n\u003ch3\u003e세금 고려사항\u003c/h3\u003e\n\u003cp\u003e한국에서 주식 투자 시 세금:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e국내 주식:\u003c/strong\u003e 금융투자소득세(2025년 이후 적용 예정, 연 5,000만 원 초과 수익에 22%) → 최신 세법 확인 필요\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e해외 주식/ETF:\u003c/strong\u003e 연 250만 원 초과 수익에 22% 양도소득세 (분리과세)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e국내 ETF:\u003c/strong\u003e 매매차익에 배당소득세 15.4% 적용 (펀드 구조상)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e리밸런싱을 할 때 수익이 난 자산을 팔면 세금이 발생해. 이를 최소화하는 방법:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e연금저축펀드·IRP 계좌 내에서 리밸런싱 → 과세이연 (가장 효율적)\u003c/li\u003e\n\u003cli\u003e새로운 투자금을 비중이 낮은 자산에 집중 → 매도 없이 비율 조정\u003c/li\u003e\n\u003cli\u003e연말에 손실 종목 정리로 이익과 상계\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 나만의 포트폴리오 설계 실습\u003c/h2\u003e\n\u003cp\u003e이론은 충분히 했어. 이제 직접 설계해보자. 세 가지 유형별 예시 포트폴리오를 만들었어. 참고해서 자신에게 맞는 형태로 수정해봐.\u003c/p\u003e\n\u003ch3\u003e공격형 포트폴리오 (20~30대, 장기 투자)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e콘셉트:\u003c/strong\u003e 성장 자산 중심, 단기 변동성은 감수하고 장기 수익률 극대화\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산군\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e구체적 상품 예시\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e미국 주식 ETF\u003c/td\u003e\n\u003ctd\u003e40%\u003c/td\u003e\n\u003ctd\u003eVOO (S\u0026#x26;P500), QQQ (나스닥100)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e국내 주식 ETF\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003ctd\u003eKODEX 200, TIGER 200\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e선진국 주식 ETF\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003ctd\u003eVEA (미국 제외 선진국)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e신흥국 주식 ETF\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003eVWO (신흥국 전체)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e채권 ETF\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003eTLT (미국 장기채)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금 ETF\u003c/td\u003e\n c/td\u003e\n\u003ctd\u003e+906%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e30년이면 1,000만 원이 1억이 돼. 비결은 없어. 그냥 시간이야.\u003c/p\u003e\n\u003ch3\u003e시간이 가장 중요한 자산\u003c/h3\u003e\n\u003cp\u003e20살에 월 10만 원씩 투자 시작한 사람과 35살에 월 30만 원씩 투자 시작한 사람. 65살에 누가 더 많은 돈을 가지고 있을까?\u003c/p\u003e\n\u003cp\u003e연 8% 수익률 가정:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e20살 시작, 45년간 월 10만 원 → 약 4억 5천만 원\u003c/li\u003e\n\u003cli\u003e35살 시작, 30년간 월 30만 원 → 약 4억 1천만 원\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e30만 원씩 더 내도 15년 늦게 시작하면 뒤처져. \u003cstrong\u003e투자에서 가장 값진 자원은 시간이야.\u003c/strong\u003e\u003c/p\u003e\n\u003ch3\u003e시장 폭락을 버티는 법\u003c/h3\u003e\n\u003cp\u003e장기 투자의 최대 적은 시장 폭락 그 자체가 아니야. \u003cstrong\u003e폭락할 때 팔아버리는 행동\u003c/strong\u003e이야.\u003c/p\u003e\n\u003cp\u003e역사를 보면:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2000년 닷컴 버블 붕괴: S\u0026#x26;P500 -49%\u003c/li\u003e\n\u003cli\u003e2008년 금융위기: S\u0026#x26;P500 -57%\u003c/li\u003e\n\u003cli\u003e2020년 코로나 폭락: S\u0026#x26;P500 -34%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 세 번의 위기를 모두 버티고 그냥 들고 있었다면? 2024년 기준으로 엄청난 수익을 거뒀을 거야. 반면 폭락에 팔고 반등을 놓친 사람들은 큰 손해를 봤어.\u003c/p\u003e\n\u003cp\u003e폭락을 버티기 위한 실용적 방법:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e비상금은 별도로 유지:\u003c/strong\u003e 투자금과 생활비를 절대 섞지 않아야 폭락 때 팔지 않아도 돼.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e자산배분으로 충격 완화:\u003c/strong\u003e 채권, 금이 섞여 있으면 -50%가 -25%로 줄어들어. 버티기 훨씬 쉬워져.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e포트폴리오를 자주 확인하지 않기:\u003c/strong\u003e 매일 보면 감정이 개입돼. 월 1회가 적당해.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e시장 전망을 예측하지 않기:\u003c/strong\u003e 아무도 내일을 몰라. 타이밍 잡으려다 기회를 다 놓치는 경우가 많아.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e이 시리즈를 마치며\u003c/h3\u003e\n\u003cp\u003e1편부터 11편까지 함께했어. 각 편에서 배운 핵심을 간단히 정리해볼게.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e편\u003c/th\u003e\n\u003cth\u003e핵심 내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1편\u003c/td\u003e\n\u003ctd\u003e주식이란 무엇인가, 기업의 공동 소유\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2편\u003c/td\u003e\n\u003ctd\u003e재무제표 읽기 — 손익계산서, 재무상태표\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3편\u003c/td\u003e\n\u003ctd\u003e현금흐름표와 실질 수익 파악\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4편\u003c/td\u003e\n\u003ctd\u003ePER, PBR, ROE — 밸류에이션 기초\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5편\u003c/td\u003e\n\u003ctd\u003eDCF와 내재가치 계산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e6편\u003c/td\u003e\n\u003ctd\u003e산업 분석과 경쟁 우위 파악\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e7편\u003c/td\u003e\n\u003ctd\u003e경제 사이클과 주식 시장의 관계\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e8편\u003c/td\u003e\n\u003ctd\u003e거시 경제 지표 해석\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e9편\u003c/td\u003e\n\u003ctd\u003e투자 심리와 행동 편향 극복\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e10편\u003c/td\u003e\n\u003ctd\u003e기술적 분석 — 매수·매도 타이밍\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e11편\u003c/td\u003e\n\u003ctd\u003e포트폴리오 구성과 자산배분 (현재)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e이 시리즈에서 배운 것들을 한 문장으로 요약하면:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"좋은 기업을 적절한 가격에 사서, 분산된 포트폴리오로 오랫동안 보유하라.\"\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e워런 버핏이 수십 년간 해온 것도 결국 이거야. 특별한 비밀이 없어. 그냥 기본을 제대로, 오래 하는 거야.\u003c/p\u003e\n\u003cp\u003e이제 진짜 시작이야. 이론은 충분히 배웠어. 작은 금액으로라도 실제로 투자해보면서 배우는 게 남아 있어. 처음엔 실수도 하고 손실도 볼 거야. 그게 정상이야. 중요한 건 그 과정에서 배우고 더 나은 투자자가 되는 거야.\u003c/p\u003e\n\u003cp\u003e행운을 빌어.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500
