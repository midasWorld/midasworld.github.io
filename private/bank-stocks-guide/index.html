\n11:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:Ta989,"])</script><script>self.__next_f.push([1,"\u003ch1\u003e은행주에 관한 모든 것\u003c/h1\u003e\n\u003cp\u003e은행주는 한국 코스피에서 가장 저평가된 섹터로 꼽히면서도, 동시에 가장 많은 배당을 지급하는 섹터 중 하나다. PBR 0.3~0.5배라는 전 세계적으로 유례없는 저평가 상태가 수십 년째 지속되고 있다. 왜 그런지, 어떻게 투자해야 하는지, 이 글에서 처음부터 끝까지 정리한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 은행의 사업 모델: 다른 업종과 무엇이 다른가\u003c/h2\u003e\n\u003ch3\u003e핵심 구조: 예금 받아 대출하기\u003c/h3\u003e\n\u003cp\u003e은행의 본질은 단순하다. 예금자로부터 낮은 금리(예: 3%)로 자금을 받고, 대출자에게 높은 금리(예: 5%)로 빌려준다. 이 2%의 차이가 \u003cstrong\u003e예대마진(NIM, Net Interest Margin)\u003c/strong\u003e 이며 은행의 핵심 수익원이다.\u003c/p\u003e\n\u003cp\u003e삼성전자는 반도체를 팔아 수익을 낸다. 카카오는 광고와 커머스로 돈을 번다. 그런데 은행은 \u003cstrong\u003e돈 자체를 상품으로 팔아서\u003c/strong\u003e 돈을 번다. 이것이 은행 사업모델의 가장 큰 특징이다.\u003c/p\u003e\n\u003ch3\u003e레버리지 구조: 자기자본 10%로 100% 운용\u003c/h3\u003e\n\u003cp\u003e은행이 일반 기업과 근본적으로 다른 점은 \u003cstrong\u003e극단적인 레버리지\u003c/strong\u003e 에 있다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e일반 제조업\u003c/th\u003e\n\u003cth\u003e은행\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e자기자본\u003c/td\u003e\n\u003ctd\u003e50%\u003c/td\u003e\n\u003ctd\u003e8~10%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부채(차입)\u003c/td\u003e\n\u003ctd\u003e50%\u003c/td\u003e\n\u003ctd\u003e90~92%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e레버리지 배율\u003c/td\u003e\n\u003ctd\u003e2배\u003c/td\u003e\n\u003ctd\u003e10~12배\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e예를 들어 KB국민은행의 총자산이 약 500조 원이라면, 자기자본은 약 50조 원 수준이다. 나머지 450조 원은 예금, 채권 발행, 콜머니 등으로 조달한 부채다. 자기자본 10%로 500조 원 규모의 자산을 굴리는 구조다.\u003c/p\u003e\n\u003cp\u003e이 레버리지가 은행 투자의 핵심 리스크이자 기회다. 자산이 1%만 부실화되어도 자기자본의 10%가 날아간다. 반대로 수익이 조금만 개선되어도 ROE는 크게 뛴다.\u003c/p\u003e\n\u003ch3\u003e4대 수익원\u003c/h3\u003e\n\u003cp\u003e은행의 수익은 크게 네 가지로 나뉜다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e① 이자수익 (가장 중요, 전체 수익의 60~70%)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e대출 이자, 유가증권 이자, 콜론 이자 등 이자 관련 모든 수익. NIM이 0.1%p만 변해도 수천억 원의 이익 차이가 난다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e② 수수료 수익 (비이자수익의 핵심)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e송금 수수료, 외환 수수료, 펀드 판매 수수료, 신탁 보수 등. 최근 인터넷뱅킹 확산으로 수수료 수익은 감소 추세. 그러나 자산관리(WM) 비즈니스는 성장 중.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e③ 투자 수익\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e보유 채권, 주식, 파생상품에서 발생하는 유가증권 관련 손익. 금리 변화에 따라 변동성이 큰 항목.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e④ 비은행 자회사 이익\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e4대 금융지주는 은행 외에도 증권(KB증권, 신한투자증권), 보험(KB손보, 신한라이프), 카드(KB카드, 신한카드), 캐피탈 등 다양한 자회사를 보유. 최근에는 비은행 부문 비중 확대가 트렌드.\u003c/p\u003e\n\u003ch3\u003e은행 고유의 리스크\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e신용 리스크\u003c/strong\u003e: 대출자가 원금이나 이자를 갚지 못할 리스크. 은행 리스크의 가장 큰 부분을 차지한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e금리 리스크\u003c/strong\u003e: 예금과 대출의 금리 구조가 달라서 발생하는 리스크. 예금은 단기, 대출은 장기인 경우 금리가 급등하면 비용이 수익보다 빨리 오를 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e유동성 리스크\u003c/strong\u003e: 예금자들이 한꺼번에 돈을 빼가는 뱅크런 리스크. 은행이 보유한 자산은 대부분 장기 대출이라 갑자기 현금화하기 어렵다. 2023년 SVB 사태의 핵심 원인.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 은행 전용 핵심 지표 완전 정복\u003c/h2\u003e\n\u003cp\u003e일반 기업을 볼 때는 PER, EPS, 매출액 성장률을 본다. 은행은 다르다. 은행만의 고유 지표를 이해하지 못하면 실적 보고서를 읽어도 무슨 말인지 모른다.\u003c/p\u003e\n\u003ch3\u003eNIM (순이자마진, Net Interest Margin) — 가장 중요한 지표\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e정의\u003c/strong\u003e: 이자발생자산(대출, 유가증권 등)에서 얻은 이자수익과 이자비용의 차이를 이자발생자산 총액으로 나눈 비율\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e계산식\u003c/strong\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eNIM\u003c/span\u003e = (이자수익 - 이자비용) / 평균 이자발생자산 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e왜 중요한가\u003c/strong\u003e: NIM이 0.1%p 오르면 자산 500조 원 은행 기준으로 연간 5,000억 원의 추가 이익이 발생한다. 이자이익이 전체 이익의 60~70%를 차지하기 때문에 NIM 변화는 주가에 직결된다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e한국 주요 은행 NIM 수준 (2023년 기준)\u003c/strong\u003e:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e은행\u003c/th\u003e\n\u003cth\u003eNIM (%)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eKB국민은행\u003c/td\u003e\n\u003ctd\u003e1.85~1.90\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e신한은행\u003c/td\u003e\n\u003ctd\u003e1.65~1.70\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e하나은행\u003c/td\u003e\n\u003ctd\u003e1.55~1.60\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e우리은행\u003c/td\u003e\n\u003ctd\u003e1.60~1.65\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e미국 JP모건\u003c/td\u003e\n\u003ctd\u003e2.60~2.80\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e미국 대형 은행 대비 한국 은행의 NIM이 낮은 이유는 한국 대출 시장의 경쟁 심화와 예금금리 경쟁 때문이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNIM에 영향을 주는 요소\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e기준금리 변화 (인상 시 단기적으로 NIM 상승)\u003c/li\u003e\n\u003cli\u003e장단기 금리차\u003c/li\u003e\n\u003cli\u003e대출 포트폴리오 구성 (변동금리 vs 고정금리 비중)\u003c/li\u003e\n\u003cli\u003e경쟁 심화로 인한 예금금리 인상 압박\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eROA (총자산이익률, Return on Assets)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e계산식\u003c/strong\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eROA\u003c/span\u003e = 당기순이익 / 평균 총자산 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e기준\u003c/strong\u003e: 일반 기업은 5\u003cdel\u003e10%가 보통이지만, 은행은 레버리지가 높아 0.5\u003c/del\u003e1.0%가 일반적. 1% 이상이면 우수한 수준이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e왜 낮은가\u003c/strong\u003e: 총자산이 수백 조 원에 달하기 때문. 분자인 이익은 수조 원이지만 분모가 워낙 크다. 그래서 ROA가 낮아도 ROE는 높을 수 있다.\u003c/p\u003e\n\u003cp\u003e한국 4대 은행 ROA는 대략 0.6\u003cdel\u003e0.8% 수준이며, 미국 JP모건은 1.2\u003c/del\u003e1.4%로 높다. 이 차이가 한국 은행주 저평가의 근본 원인 중 하나다.\u003c/p\u003e\n\u003ch3\u003eROE (자기자본이익률, Return on Equity)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e계산식\u003c/strong\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eROE\u003c/span\u003e = 당기순이익 / 평균 자기자본 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e기준\u003c/strong\u003e: 은행은 최소 10% 이상을 목표로 한다. 10% 미만이면 자기자본비용(COE)을 넘기기 어려워 본질적으로 가치를 파괴하는 것으로 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eROE와 PBR의 관계\u003c/strong\u003e: ROE가 높을수록 적정 PBR도 높아진다. 이는 뒤에서 자세히 설명한다.\u003c/p\u003e\n\u003cp\u003e한국 4대 금융지주 ROE:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eKB금융: 10~11%\u003c/li\u003e\n\u003cli\u003e신한지주: 9~10%\u003c/li\u003e\n\u003cli\u003e하나금융: 9~10%\u003c/li\u003e\n\u003cli\u003e우리금융: 8~9%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e미국 JP모건 ROE는 15~18%에 달한다. 이 ROE 격차가 PBR 격차로 이어진다.\u003c/p\u003e\n\u003ch3\u003eBIS 자기자본비율\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e정의\u003c/strong\u003e: 은행이 위험가중자산(대출, 투자자산에 리스크 가중치를 적용한 금액) 대비 얼마나 많은 자본을 쌓고 있는지를 나타내는 지표. 은행 건전성의 핵심.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e규제 기준\u003c/strong\u003e:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e비율 구분\u003c/th\u003e\n\u003cth\u003e최저 기준\u003c/th\u003e\n\u003cth\u003e권고 기준\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eTotal Capital (BIS비율)\u003c/td\u003e\n\u003ctd\u003e8.0%\u003c/td\u003e\n\u003ctd\u003e10.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTier 1 비율\u003c/td\u003e\n\u003ctd\u003e6.0%\u003c/td\u003e\n\u003ctd\u003e8.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eCET1 (보통주자본비율)\u003c/td\u003e\n\u003ctd\u003e4.5%\u003c/td\u003e\n\u003ctd\u003e7.0%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eCET1, Tier1, Total Capital 차이\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCET1 (Common Equity Tier 1)\u003c/strong\u003e: 가장 질 높은 자본. 보통주, 이익잉여금 등 손실 흡수력이 가장 높은 자본. 규제 당국이 가장 중시한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTier 1\u003c/strong\u003e: CET1 + 조건부자본증권(코코본드) 등 추가기본자본\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTotal Capital (BIS비율)\u003c/strong\u003e: Tier 1 + Tier 2 (후순위채 등 보완자본)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e현실적 기준\u003c/strong\u003e: 한국 금융당국은 실제로는 CET1 13% 이상을 권장한다. 이 기준을 넘어야 충분한 자본 여력이 있다고 보고, 이를 초과하는 자본은 주주환원(배당+자사주 소각)에 사용할 수 있다.\u003c/p\u003e\n\u003cp\u003e2023년 기준 한국 4대 금융지주 CET1:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eKB금융: 13.5%\u003c/li\u003e\n\u003cli\u003e신한지주: 12.9%\u003c/li\u003e\n\u003cli\u003e하나금융: 13.0%\u003c/li\u003e\n\u003cli\u003e우리금융: 11.8% (가장 낮음 → 주주환원 여력 제한)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eNPL 비율 (고정이하여신비율, Non-Performing Loan Ratio)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e정의\u003c/strong\u003e: 전체 여신(대출) 중에서 고정, 회수의문, 추정손실로 분류된 부실 여신의 비율\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e계산식\u003c/strong\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003eNPL 비율 = 고정이하여신 / 총여신 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e기준\u003c/strong\u003e: 1% 이하면 건전, 1~2%면 주의, 2% 초과면 위험 신호\u003c/p\u003e\n\u003cp\u003e경기침체나 부동산 경기 하락 시 NPL이 급격히 상승한다. 2023~2024년 부동산 PF(프로젝트 파이낸싱) 부실이 대두되면서 한국 은행들의 NPL이 주목받았다.\u003c/p\u003e\n\u003ch3\u003e대손충당금 (Loan Loss Provision)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e정의\u003c/strong\u003e: 미래에 발생할 수 있는 대출 손실에 대비해 미리 비용으로 처리해두는 금액\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e왜 중요한가\u003c/strong\u003e: 대손충당금이 많이 쌓이면 당기이익이 줄어든다. 그러나 충당금을 충분히 쌓아둔 은행은 경기침체 때 추가 비용 없이 버틸 수 있다. 경기침체가 오기 전에 충당금을 넉넉히 쌓는 은행이 우량 은행이다.\u003c/p\u003e\n\u003cp\u003e반대로 이익을 높이기 위해 충당금을 적게 쌓으면 단기적으로 실적이 좋아보이지만, 경기 악화 시 충격이 크다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e충당금 적립률(Coverage Ratio)\u003c/strong\u003e: 고정이하여신 대비 충당금 비율. 100% 이상이어야 충분히 준비된 것. 보수적인 은행은 150~200%를 유지한다.\u003c/p\u003e\n\u003ch3\u003e예대율 (Loan-to-Deposit Ratio)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e계산식\u003c/strong\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e예대율 = 원화대출 / 원화예금 × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e기준\u003c/strong\u003e: 100% 이하가 권장된다. 100%를 초과하면 예금 외 다른 비용이 비싼 자금을 조달해야 한다는 의미.\u003c/p\u003e\n\u003cp\u003e한국 금융당국은 은행 예대율을 100% 이하로 규제하고 있다. 실제 한국 주요 은행 예대율은 95~98% 수준.\u003c/p\u003e\n\u003ch3\u003eCIR (비용효율성 비율, Cost-to-Income Ratio)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e계산식\u003c/strong\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eCIR\u003c/span\u003e = 판매비와관리비 / 총영업이익 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e기준\u003c/strong\u003e: 낮을수록 좋다. 40~50%면 효율적, 60% 이상이면 비효율적.\u003c/p\u003e\n\u003cp\u003e디지털 전환이 가속화되면서 주요 은행들은 영업점 축소, 인력 감축을 통해 CIR을 낮추려 노력하고 있다. 인터넷 전문은행인 카카오뱅크의 낮은 CIR이 기존 은행에 위협이 되는 이유이기도 하다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 금리와 은행주의 관계: 심화 분석\u003c/h2\u003e\n\u003cp\u003e금리와 은행주의 관계는 단순히 \"금리 오르면 은행주 오른다\"가 아니다. 사이클을 이해해야 한다.\u003c/p\u003e\n\u003ch3\u003e금리 인상 사이클별 은행주 주가\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e금리 인상 초기 (최적 국면)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e기준금리가 오르기 시작하면 변동금리 대출의 이자율이 즉시 상승한다. 그러나 예금금리는 만기 도래 시점에 맞춰 순차적으로 오른다. 이 시차 때문에 수익이 먼저 오르고 비용은 나중에 오른다 → NIM 확대 → 이익 급증 → 주가 상승.\u003c/p\u003e\n\u003cp\u003e2022년 한국은행이 기준금리를 0.5%에서 3.5%로 급격히 올리던 시기, 4대 금융지주 주가는 2022년 초부터 오름세를 보였다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e금리 고점 지속 (리스크 증가 국면)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e금리가 높은 수준에서 오래 지속되면 문제가 생긴다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e대출 수요 감소 (이자 부담에 새 대출 줄어듦)\u003c/li\u003e\n\u003cli\u003e기존 대출자의 이자 상환 부담 증가 → NPL 상승 우려\u003c/li\u003e\n\u003cli\u003e부동산 가격 하락 → 담보 가치 하락 → 대출 건전성 악화\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e금리 인하 시작 (혼재 국면)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eNIM 하락 우려로 주가가 약세를 보이는 경향이 있다. 그러나:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e대출 수요 회복으로 자산이 성장\u003c/li\u003e\n\u003cli\u003eNPL 우려 완화\u003c/li\u003e\n\u003cli\u003e채권 평가이익 발생\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e실제로는 NIM 하락 폭과 대출 성장 폭, 충당금 감소 폭을 종합적으로 보아야 한다. 금리 인하 초기의 은행주 하락이 과도하면 매수 기회가 될 수 있다.\u003c/p\u003e\n\u003ch3\u003e장단기 금리차와 은행 수익성\u003c/h3\u003e\n\u003cp\u003e은행은 단기로 자금을 조달(예금)해서 장기로 운용(대출)한다. 따라서 장기금리와 단기금리의 차이(장단기 스프레드)가 클수록 은행에 유리하다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e장단기 스프레드 = \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년 국채금리 - \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e개월 국채금리(또는 기준금리)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e2022~2023년 미국에서는 기준금리를 급격히 올리면서 단기금리가 장기금리보다 높아지는 \u003cstrong\u003e장단기 금리 역전\u003c/strong\u003e 현상이 발생했다. 이는 은행 수익성에 구조적 압박이 된다. SVB 파산의 배경 중 하나다.\u003c/p\u003e\n\u003cp\u003e한국은 장단기 역전이 미국만큼 심각하지 않았지만, 장단기 스프레드가 축소되면서 NIM 개선폭이 제한되었다.\u003c/p\u003e\n\u003ch3\u003e2022~2023년 한국 금리 인상 사이클 분석\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시기\u003c/th\u003e\n\u003cth\u003e기준금리\u003c/th\u003e\n\u003cth\u003e주요 사건\u003c/th\u003e\n\u003cth\u003e은행주 주가\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2021년 말\u003c/td\u003e\n\u003ctd\u003e0.75% → 1.00%\u003c/td\u003e\n\u003ctd\u003e인상 시작\u003c/td\u003e\n\u003ctd\u003e상승 시작\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022년\u003c/td\u003e\n\u003ctd\u003e1.00% → 3.25%\u003c/td\u003e\n\u003ctd\u003e6번 연속 인상\u003c/td\u003e\n\u003ctd\u003e큰 폭 상승\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023년 초\u003c/td\u003e\n\u003ctd\u003e3.25% → 3.50%\u003c/td\u003e\n\u003ctd\u003e최종 인상\u003c/td\u003e\n\u003ctd\u003e고점 형성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023년 중반\u003c/td\u003e\n\u003ctd\u003e3.50% 동결\u003c/td\u003e\n\u003ctd\u003ePF 부실 우려\u003c/td\u003e\n\u003ctd\u003e조정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2024년 하반기\u003c/td\u003e\n\u003ctd\u003e3.50% → 3.00%\u003c/td\u003e\n\u003ctd\u003e인하 시작\u003c/td\u003e\n\u003ctd\u003e혼조세\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eKB금융 주가는 2021년 초 4만 원대에서 2023년 초 약 6만 5,000원대까지 상승했다가 2023년 하반기 조정을 받았다. 이 패턴이 전형적인 금리 사이클에 따른 은행주 움직임이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 은행주 특유의 리스크\u003c/h2\u003e\n\u003ch3\u003e신용 리스크: PF 부실과 부동산 연동\u003c/h3\u003e\n\u003cp\u003e한국 은행들의 최대 리스크는 \u003cstrong\u003e부동산 PF(프로젝트 파이낸싱)\u003c/strong\u003e 부실이다. PF 대출은 개발 사업 완공 전에 시공사, 시행사를 담보로 하는 대출인데, 부동산 경기가 하락하면 사업성이 떨어지고 대출이 부실화된다.\u003c/p\u003e\n\u003cp\u003e2023~2024년 한국 부동산 PF 시장:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e고금리로 분양 미달 사태 속출\u003c/li\u003e\n\u003cli\u003e일부 건설사 부도 → PF 연쇄 부실 우려\u003c/li\u003e\n\u003cli\u003e은행 외에 증권사, 저축은행 PF 리스크가 더 컸음\u003c/li\u003e\n\u003cli\u003e4대 은행은 PF 익스포저가 상대적으로 낮아 직접 충격은 제한적\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e그러나 부동산 경기 하락 → 가계 대출 담보 가치 하락 → 주담대(주택담보대출) NPL 상승으로 이어질 수 있는 간접 리스크는 상존한다.\u003c/p\u003e\n\u003ch3\u003e규제 리스크: 배당 제한과 DSR\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e2020년 코로나 사례\u003c/strong\u003e: 금융당국이 코로나 위기 대응 명목으로 은행들의 배당성향을 강제로 20% 이하로 제한했다. 평소 25~30% 배당성향을 유지하던 은행들이 갑자기 배당을 반토막 냈다. 주가에 상당한 충격을 주었다.\u003c/p\u003e\n\u003cp\u003e이처럼 한국 금융당국은 위기 시 배당을 제한하는 규제권을 갖고 있다. 이는 한국 은행주 밸류에이션 할인 요인이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDSR(총부채원리금상환비율) 규제\u003c/strong\u003e: 차주의 소득 대비 모든 부채 상환액 비율을 제한하는 규제. DSR 규제가 강화될수록 가계 대출 성장이 억제된다. 대출 자산 성장이 제한되면 NIM이 유지되어도 이익 성장에 한계가 생긴다.\u003c/p\u003e\n\u003ch3\u003e시스템 리스크: 뱅크런과 SVB 사태 교훈\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e2023년 3월 SVB(실리콘밸리은행) 파산\u003c/strong\u003e은 은행 투자자에게 중요한 교훈을 남겼다.\u003c/p\u003e\n\u003cp\u003eSVB 파산 원인:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e스타트업 예금을 장기 미국 국채에 투자\u003c/li\u003e\n\u003cli\u003e2022년 급격한 금리 인상으로 보유 채권 평가손실 급증\u003c/li\u003e\n\u003cli\u003e이 사실이 알려지자 SNS를 통해 뱅크런 발생\u003c/li\u003e\n\u003cli\u003e단 48시간 만에 약 420억 달러 인출 요청 → 파산\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003eSVB 파산의 교훈\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e자산-부채 만기 불일치(ALM 리스크)의 위험성\u003c/li\u003e\n\u003cli\u003eSNS 시대 뱅크런 속도의 변화 (과거보다 훨씬 빠름)\u003c/li\u003e\n\u003cli\u003e집중된 예금자 구조(스타트업)의 리스크\u003c/li\u003e\n\u003cli\u003e금리 상승 시 보유 채권 평가손실을 재무제표에 어떻게 처리하는지의 중요성\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e한국 은행들은 SVB와 달리:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e예금자가 다변화되어 있음\u003c/li\u003e\n\u003cli\u003e예금보험 한도(5,000만 원) 내 소액 예금 비중이 높음\u003c/li\u003e\n\u003cli\u003e자산이 장기 채권보다 변동금리 대출 위주\u003c/li\u003e\n\u003cli\u003e당국의 규제 감독이 더 촘촘함\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e따라서 SVB식 뱅크런 리스크는 상대적으로 낮다.\u003c/p\u003e\n\u003ch3\u003e플랫폼 경쟁: 인터넷 은행의 위협\u003c/h3\u003e\n\u003cp\u003e카카오뱅크와 토스뱅크의 등장은 기존 은행들에 구조적 위협이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e카카오뱅크 경쟁력\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e카카오 플랫폼을 통한 고객 획득 비용(CAC) 절감\u003c/li\u003e\n\u003cli\u003e영업점 없는 완전 비대면으로 낮은 CIR\u003c/li\u003e\n\u003cli\u003e2030 세대 MZ 고객 점유율 높음\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e기존 은행의 대응\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e자체 모바일 앱 고도화 (KB스타뱅킹, 쏠 등)\u003c/li\u003e\n\u003cli\u003e영업점 통폐합으로 비용 절감\u003c/li\u003e\n\u003cli\u003e기업·고액자산가 대상 WM 비즈니스 강화 (인터넷 은행이 침투하기 어려운 영역)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e중장기적으로 수수료 수익은 인터넷 은행에 잠식될 수 있지만, 대규모 기업 대출, 무역금융, 프라이빗뱅킹 등은 기존 은행의 영역이 유지될 것으로 보인다.\u003c/p\u003e\n\u003ch3\u003e환율 리스크\u003c/h3\u003e\n\u003cp\u003e원달러 환율 상승(원화 약세) 시:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e외화 조달 비용 증가 (달러 차입 비용 상승)\u003c/li\u003e\n\u003cli\u003e해외 법인 자산의 원화 환산 이익 증가 (양면성)\u003c/li\u003e\n\u003cli\u003e수출기업 대출자의 경쟁력 개선 → 건전성 긍정적\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e하나금융과 KB금융은 해외 사업 비중이 상대적으로 높아 환율 영향을 더 받는다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 한국 4대 금융지주 심층 분석\u003c/h2\u003e\n\u003ch3\u003eKB금융그룹 (105560)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e사업 구조\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e은행: KB국민은행 (리테일 최강자, 총자산 1위)\u003c/li\u003e\n\u003cli\u003e증권: KB증권\u003c/li\u003e\n\u003cli\u003e보험: KB손해보험, KB생명보험\u003c/li\u003e\n\u003cli\u003e카드: KB국민카드\u003c/li\u003e\n\u003cli\u003e비은행 비중 약 35%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 지표 (2023년 기준)\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eROE: 10.5~11.0%\u003c/li\u003e\n\u003cli\u003eNIM: 1.85~1.90%\u003c/li\u003e\n\u003cli\u003eBIS비율: 16.5%, CET1: 13.5%\u003c/li\u003e\n\u003cli\u003eNPL 비율: 0.55%\u003c/li\u003e\n\u003cli\u003e배당수익률: 약 5~6%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e투자 포인트\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e시가총액 1위 (금융지주 중 가장 큰 유동성)\u003c/li\u003e\n\u003cli\u003e리테일 뱅킹 최강 → NIM 방어력 우수\u003c/li\u003e\n\u003cli\u003eCET1 13.5%로 충분한 자본 여력 → 배당 증가, 자사주 소각 지속 가능\u003c/li\u003e\n\u003cli\u003e밸류업 프로그램 적극 참여\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e밸류에이션 (2024년 기준)\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePBR: 0.55~0.65배\u003c/li\u003e\n\u003cli\u003ePER: 6~7배\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e신한지주 (055550)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e사업 구조\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e은행: 신한은행 (기업금융, 외환 부문 강점)\u003c/li\u003e\n\u003cli\u003e증권: 신한투자증권\u003c/li\u003e\n\u003cli\u003e보험: 신한라이프\u003c/li\u003e\n\u003cli\u003e카드: 신한카드 (업계 1위)\u003c/li\u003e\n\u003cli\u003e비은행 비중 약 40% (4대 지주 중 가장 높음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 지표 (2023년 기준)\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eROE: 9.5~10.0%\u003c/li\u003e\n\u003cli\u003eNIM: 1.65~1.70%\u003c/li\u003e\n\u003cli\u003eBIS비율: 16.0%, CET1: 12.9%\u003c/li\u003e\n\u003cli\u003eNPL 비율: 0.62%\u003c/li\u003e\n\u003cli\u003e배당수익률: 약 5~6%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e투자 포인트\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e비은행 자회사 다각화가 가장 잘 된 지주사\u003c/li\u003e\n\u003cli\u003e신한카드 1위 지위 → 수수료 수익 안정적\u003c/li\u003e\n\u003cli\u003e베트남 등 동남아 해외사업 성장 중\u003c/li\u003e\n\u003cli\u003e다만 NIM은 KB보다 낮음\u003c/li\u003e\n\u n\u003ctd\u003e비은행 다각화\u003c/td\u003e\n\u003ctd\u003e★★★★\u003c/td\u003e\n\u003ctd\u003e★★★★★\u003c/td\u003e\n\u003ctd\u003e★★★\u003c/td\u003e\n\u003ctd\u003e★★\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당수익률\u003c/td\u003e\n\u003ctd\u003e★★★★\u003c/td\u003e\n\u003ctd\u003e★★★★\u003c/td\u003e\n\u003ctd\u003e★★★★\u003c/td\u003e\n\u003ctd\u003e★★★★★\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePBR 할인율\u003c/td\u003e\n\u003ctd\u003e보통\u003c/td\u003e\n\u003ctd\u003e보통\u003c/td\u003e\n\u003ctd\u003e약간 큼\u003c/td\u003e\n\u003ctd\u003e가장 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 은행주 밸류에이션: PBR이 핵심이다\u003c/h2\u003e\n\u003ch3\u003e왜 은행은 PER보다 PBR인가\u003c/h3\u003e\n\u003cp\u003e일반 기업은 미래 이익 성장성을 반영해 PER(주가/EPS)을 주로 사용한다. 그러나 은행은 이익의 변동성이 커서 PER만으로는 부족하다. 은행의 가치는 결국 \u003cstrong\u003e쌓아놓은 자본(순자산)\u003c/strong\u003e 에 기반하기 때문에 PBR(주가/순자산)이 더 적합하다.\u003c/p\u003e\n\u003cp\u003e또한 은행의 자산은 대출채권, 유가증권 등 금융자산으로 구성되어 있어 순자산(자기자본)이 청산 시 실제 돌려받을 수 있는 금액에 가깝다. 반면 제조업의 순자산은 공장, 기계 등으로 청산 시 장부가치보다 훨씬 낮게 받을 수 있다.\u003c/p\u003e\n\u003ch3\u003ePBR의 이론적 적정 수준\u003c/h3\u003e\n\u003cp\u003e적정 PBR을 계산하는 공식:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e적정 \u003cspan class=\"hljs-attr\"\u003ePBR\u003c/span\u003e = ROE / COE (자기자본비용)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e예시 계산\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eKB금융 ROE = 11%\u003c/li\u003e\n\u003cli\u003eCOE (자기자본비용, 투자자의 기대수익률) = 10%\u003c/li\u003e\n\u003cli\u003e적정 PBR = 11% / 10% = 1.1배\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e즉, ROE가 COE보다 높으면 PBR이 1배를 넘어야 정상이다.\u003c/p\u003e\n\u003cp\u003e그런데 현실에서 KB금융 PBR은 0.5~0.6배다. 왜 이렇게 낮은가?\u003c/p\u003e\n\u003ch3\u003e코리아 디스카운트: 한국 은행주 저평가의 3가지 원인\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e① 주주환원 미흡의 역사\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e미국 은행들은 이익의 70~80%를 배당과 자사주 매입으로 주주에게 돌려준다. JP모건은 자사주 매입 규모만 연간 수조 원에 달한다.\u003c/p\u003e\n\u003cp\u003e한국 은행들은 역사적으로 배당성향이 20~25% 수준에 그쳤다. 이익을 유보해 자본비율을 높이는 데 집중했다. 주주에게 돌아오는 몫이 적으니 주가도 낮다.\u003c/p\u003e\n\u003cp\u003e2023년 이후 밸류업 프로그램과 주주환원 강화 기조로 배당성향이 30~35%까지 올라오고 있지만, 미국과의 격차는 여전하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e② 금융당국의 배당 개입\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e코로나 시기(2020년) 금융당국이 배당성향 20% 이하 제한을 지시한 사례처럼, 한국에서는 정부가 언제든지 배당에 개입할 수 있다. 이것이 은행주 밸류에이션에 불확실성을 더한다.\u003c/p\u003e\n\u003cp\u003e외국인 투자자들은 이 리스크를 반영해 할인율을 높이고, 따라서 적정 PBR을 낮게 본다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e③ 지배구조 이슈\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e한국 대형 금융지주 CEO는 정부(금융위원회)의 영향을 강하게 받는다. 경영진이 주주가치 극대화보다 정치적 판단에 흔들릴 수 있다는 우려가 있다.\u003c/p\u003e\n\u003cp\u003e또한 과거 우리금융처럼 공적자금을 받은 역사가 있는 은행들은 투자자 신뢰 회복에 시간이 걸린다.\u003c/p\u003e\n\u003ch3\u003e글로벌 은행주 PBR 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e은행\u003c/th\u003e\n\u003cth\u003e국가\u003c/th\u003e\n\u003cth\u003ePBR (2024년)\u003c/th\u003e\n\u003cth\u003eROE\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eJP모건\u003c/td\u003e\n\u003ctd\u003e미국\u003c/td\u003e\n\u003ctd\u003e1.8~2.0배\u003c/td\u003e\n\u003ctd\u003e17~18%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e뱅크오브아메리카\u003c/td\u003e\n\u003ctd\u003e미국\u003c/td\u003e\n\u003ctd\u003e1.1~1.3배\u003c/td\u003e\n\u003ctd\u003e11~12%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eHSBC\u003c/td\u003e\n\u003ctd\u003e영국\u003c/td\u003e\n\u003ctd\u003e1.0~1.2배\u003c/td\u003e\n\u003ctd\u003e12~14%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKB금융\u003c/td\u003e\n\u003ctd\u003e한국\u003c/td\u003e\n\u003ctd\u003e0.55~0.65배\u003c/td\u003e\n\u003ctd\u003e10~11%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e신한지주\u003c/td\u003e\n\u003ctd\u003e한국\u003c/td\u003e\n\u003ctd\u003e0.50~0.60배\u003c/td\u003e\n\u003ctd\u003e9~10%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSMBC그룹\u003c/td\u003e\n\u003ctd\u003e일본\u003c/td\u003e\n\u003ctd\u003e0.7~0.9배\u003c/td\u003e\n\u003ctd\u003e7~8%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e일본도 장기간 저PBR에 시달렸지만 도쿄증권거래소의 PBR 1배 이하 기업 개선 요구와 함께 금융주 PBR이 크게 상승했다. 한국도 유사한 경로를 밟을 가능성이 있다.\u003c/p\u003e\n\u003ch3\u003e밸류업 프로그램과 은행주\u003c/h3\u003e\n\u003cp\u003e2024년 한국 정부가 추진한 \u003cstrong\u003e코리아 밸류업 프로그램\u003c/strong\u003e은 기업가치 제고 계획 공시를 독려하는 정책이다.\u003c/p\u003e\n\u003cp\u003e은행주에 미치는 영향:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e배당성향 목표 공시 → 주주환원 확실성 증가\u003c/li\u003e\n\u003cli\u003e자사주 소각 목표 공시 → PBR 상승 기대\u003c/li\u003e\n\u003cli\u003eKB금융은 2024년 중장기 주주환원율 50% 목표 공시\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e밸류업 정책이 지속된다면 한국 은행주 PBR이 0.5배에서 0.7\u003cdel\u003e0.8배로 상승하는 것이 중장기 시나리오다. 이 경우 주가는 40\u003c/del\u003e60% 상승 여력이 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e7. 미국 은행주 비교 분석\u003c/h2\u003e\n\u003ch3\u003eJP모건 (JPM): 세계 최우량 은행\u003c/h3\u003e\n\u003cp\u003eJP모건은 글로벌 투자은행, 상업은행, 카드 사업을 모두 보유한 세계 최대 은행이다. 2024년 총자산 약 3.9조 달러.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e강점\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e제이미 다이먼(Jamie Dimon) CEO의 탁월한 리더십 (2005년부터 장기 재임)\u003c/li\u003e\n\u003cli\u003e리테일, 기업, 투자은행, WM 전 사업 균형 포트폴리오\u003c/li\u003e\n\u003cli\u003e2008년 금융위기, 코로나 등 위기마다 경쟁사 인수로 오히려 강해짐\u003c/li\u003e\n\u003cli\u003eROE 15\u003cdel\u003e18%, ROA 1.2\u003c/del\u003e1.4%로 한국 은행 대비 압도적으로 높음\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e한국 은행과의 차이점\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e투자은행 부문(M\u0026#x26;A 자문, IPO 주관) 수익이 전체의 30~40%\u003c/li\u003e\n\u003cli\u003e신용카드 사업(Chase 카드) 규모가 막대\u003c/li\u003e\n\u003cli\u003e미국 경제 전반과 연동된 다각화된 수익 구조\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e뱅크오브아메리카 (BAC)\u003c/h3\u003e\n\u003cp\u003e워렌 버핏이 대량 보유하기로 유명한 은행. 미국 내 가장 넓은 리테일 지점망 보유.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e특징\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e미국 리테일 뱅킹의 상징\u003c/li\u003e\n\u003cli\u003e머릴린치 인수(2008년)로 증권 부문 강화\u003c/li\u003e\n\u003cli\u003e2022~2023년 금리 인상기에 장기 국채 보유 평가손실 이슈 (SVB와 유사한 문제)\u003c/li\u003e\n\u003cli\u003e버핏이 매집한 이유: 미국 경제 성장에 베팅한 매크로 투자\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e웰스파고 (WFC)\u003c/h3\u003e\n\u003cp\u003e리테일 뱅킹 중심 은행. 2016년 허위 계좌 개설 스캔들로 연준의 자산 성장 제한 조치를 받았다 (2018년~현재 진행 중 → 2024년 해제 기대).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e특징\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e자산 성장 규제로 몇 년간 수익 성장 제한\u003c/li\u003e\n\u003cli\u003e비용 절감 노력 지속\u003c/li\u003e\n\u003cli\u003e규제 해제 시 성장 여력 존재 → 잠재적 턴어라운드 투자 대상\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e2023년 SVB 파산 사태 전말과 교훈\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eSVB 파산 경위\u003c/strong\u003e:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eSVB는 스타트업과 VC를 주 고객으로 하는 특화 은행\u003c/li\u003e\n\u003cli\u003e2020~2021년 스타트업 붐으로 예금이 급증 → 1,900억 달러 규모\u003c/li\u003e\n\u003cli\u003e넘쳐나는 예금을 장기 미국 국채와 MBS에 투자\u003c/li\u003e\n\u003cli\u003e2022년 연준의 급격한 금리 인상으로 장기 채권 가격 폭락\u003c/li\u003e\n\u003cli\u003e2023년 3월, 자본 확충을 위한 유상증자 발표 → 패닉 야기\u003c/li\u003e\n\u003cli\u003eSVB 주주이자 고객인 VC들이 포트폴리오 스타트업에게 즉시 인출 권고\u003c/li\u003e\n\u003cli\u003e48시간 내 420억 달러 인출 요청 → FDIC 강제 폐쇄\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e교훈\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e집중된 고객 기반(스타트업/VC 생태계)의 위험성\u003c/li\u003e\n\u003cli\u003e예금이 FDIC 한도(25만 달러) 초과 대형 계좌 중심 → 예금자가 빨리 움직임\u003c/li\u003e\n\u003cli\u003eSNS/디지털 시대의 뱅크런 속도는 1929년과 비교 불가\u003c/li\u003e\n\u003cli\u003e자산-부채 만기 불일치(ALM) 관리의 중요성\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e도드-프랭크법과 바젤 III\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e도드-프랭크법 (2010년)\u003c/strong\u003e: 2008년 금융위기 이후 제정. 대형 은행의 스트레스 테스트 의무화, 볼커룰(자기자본 투기적 거래 금지), SIFI(시스템적으로 중요한 금융기관) 지정 등 포함.\u003c/p\u003e\n\u003cp\u003eSVB는 자산 규모가 기준 이하라는 이유로 도드-프랭크법의 일부 규제에서 제외되어 있었다. 이것이 파산의 규제적 원인 중 하나.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e바젤 III\u003c/strong\u003e: 국제결제은행(BIS)이 제정한 은행 자본 및 유동성 규제. LCR(유동성커버리지비율), NSFR(순안정자금조달비율) 도입. 한국 은행들도 바젤 III 기준을 준수한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 은행주 투자 전략\u003c/h2\u003e\n\u003ch3\u003e금리 사이클 기반 투자 타이밍\u003c/h3\u003e\n\u003cp\u003e가장 효과적인 은행주 투자 전략은 \u003cstrong\u003e금리 사이클을 이해하고 그에 맞춰 매수·매도 타이밍을 잡는 것\u003c/strong\u003e이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e최적 매수 시점\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리 인상 직전 또는 인상 초기\u003c/li\u003e\n\u003cli\u003e시장이 NIM 개선을 아직 반영하지 않은 시점\u003c/li\u003e\n\u003cli\u003ePBR이 역사적 저점(0.3~0.4배) 부근\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e매도 또는 비중 축소 시점\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리 고점 인식이 확산되는 시점\u003c/li\u003e\n\u003cli\u003eNPL 우려가 뉴스에 등장하기 시작할 때\u003c/li\u003e\n\u003cli\u003ePBR이 역사적 평균(0.5~0.6배) 상단에 근접할 때\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e구체적 예시 (2021~2022년)\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2021년 8월 한국은행 첫 금리 인상 전후 → 은행주 매수\u003c/li\u003e\n\u003cli\u003e2022년 말~2023년 초 금리 고점 예상 시점 → 비중 축소 고려\u003c/li\u003e\n\u003cli\u003e2023~2024년 금리 인하 사이클 중 PBR 재저점 → 재진입 검토\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003ePBR 저점 구간 역사적 성과\u003c/h3\u003e\n\u003cp\u003e한국 주요 은행주의 PBR 0.3~0.4배 구간은 역사적으로 장기 투자 시 높은 수익률을 제공했다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e사례 1: 2020년 코로나 쇼크\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2020년 3월 KB금융 PBR → 0.32배\u003c/li\u003e\n\u003cli\u003e2021년 말 PBR → 0.55배\u003c/li\u003e\n\u003cli\u003e주가 수익률: 약 70% (배당 포함 시 더 높음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e사례 2: 2016년 금리 저점기\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2016년 신한지주 PBR → 0.45배\u003c/li\u003e\n\u003cli\u003e2018년 PBR → 0.65배\u003c/li\u003e\n\u003cli\u003e주가 수익률: 약 45%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e단, PBR 저점이 더 낮아질 수 있음을 염두에 두어야 한다. 손절 기준을 설정하거나 분할 매수로 평균단가를 낮추는 것이 중요하다.\u003c/p\u003e\n\u003ch3\u003e배당 목적 장기 보유 전략\u003c/h3\u003e\n\u003cp\u003e4대 금융지주의 배당수익률은 연 5~7% 수준으로, 장기 국채나 예금금리 대비 상당한 프리미엄이 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e배당 투자 체크리스트\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e배당성향: 25~35%이면 지속가능 (과도하게 높으면 자본 소진 우려)\u003c/li\u003e\n\u003cli\u003e배당 증가 추세: 최근 3~5년 배당이 꾸준히 늘었는지\u003c/li\u003e\n\u003cli\u003eCET1 여력: 13% 이상이면 배당 지속 가능성 높음\u003c/li\u003e\n\u003cli\u003e규제 리스크: 금융당국 배당 제한 가능성\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e배당금 예시 (KB금융, 연간)\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2020년: 약 1,770원 (코로나 배당 제한)\u003c/li\u003e\n\u003cli\u003e2021년: 2,210원\u003c/li\u003e\n\u003cli\u003e2022년: 2,950원\u003c/li\u003e\n\u003cli\u003e2023년: 3,060원\u003c/li\u003e\n\u003cli\u003e2024년: 3,200원 (예상)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e주가 6만 원 기준 배당수익률 약 5.3%. 10년 보유 시 투자원금의 절반 이상이 배당으로 회수된다.\u003c/p\u003e\n\u003ch3\u003e은행주 + 성장주 조합 포트폴리오\u003c/h3\u003e\n\u003cp\u003e은행주는 경기방어적 특성(높은 배당, 낮은 변동성)을 가지면서도 금리 사이클에 따라 성과가 달라진다. 성장주(IT, 바이오)와 조합 시 포트폴리오 변동성을 낮출 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e예시 포트폴리오\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e은행주 30% (KB금융, 신한지주 각 15%)\u003c/li\u003e\n\u003cli\u003e성장주 40% (삼성전자, 국내외 IT 주식)\u003c/li\u003e\n\u003cli\u003e배당ETF 20%\u003c/li\u003e\n\u003cli\u003e채권 10%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e금리 인상기: 은행주 성과 좋음, 성장주 부진 → 자동 균형\n금리 인하기: 성장주 성과 좋음, 은행주 부진 → 자동 균형\u003c/p\u003e\n\u003cp\u003e이런 상관관계 역전 특성이 포트폴리오 다각화 효과를 제공한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 스크리닝과 분석 방법\u003c/h2\u003e\n\u003ch3\u003eDART에서 분기보고서 NIM 추출\u003c/h3\u003e\n\u003cp\u003eDART(금융감독원 전자공시시스템, dart.fss.or.kr)에서 분기보고서를 열고:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e사업보고서 → 재무에 관한 사항 → 주요 경영지표 이동\u003c/li\u003e\n\u003cli\u003e\"순이자마진\" 또는 \"NIM\" 검색\u003c/li\u003e\n\u003cli\u003e분기별 NIM 추이 확인\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e또는 영업보고서의 \u003cstrong\u003e이자수익 및 이자비용 명세\u003c/strong\u003e 를 직접 확인:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e이자수익 합계 - 이자비용 합계 = 순이자이익\u003c/li\u003e\n\u003cli\u003e순이자이익 / 이자발생자산 = NIM\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e분기별로 NIM을 추적하면 금리 변화에 따른 수익성 변화를 선행적으로 파악할 수 있다.\u003c/p\u003e\n\u003ch3\u003e금융감독원 금융통계정보시스템\u003c/h3\u003e\n\u003cp\u003efisis.fss.or.kr에서는 은행권 전체 및 개별 은행의 다양한 통계를 제공한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e활용 방법\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e은행 → 경영현황 → 수익성 지표: 전 은행 NIM, ROA, ROE 비교\u003c/li\u003e\n\u003cli\u003e은행 → 경영현황 → 건전성 지표: NPL, 대손충당금, BIS비율\u003c/li\u003e\n\u003cli\u003e시계열 데이터 다운로드 → 엑셀로 추이 분석\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e전 은행 평균 대비 특정 은행의 포지셔닝을 파악하기 좋다.\u003c/p\u003e\n\u003ch3\u003e은행연합회 공시 포털\u003c/h3\u003e\n\u003cp\u003ekfb.or.kr (전국은행연합회)에서는 은행들이 의무 공시하는 정보를 모아서 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e주요 공시 항목\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e예금금리, 대출금리 현황 (실시간에 가까운 금리 데이터)\u003c/li\u003e\n\u003cli\u003e금리산정체계 공시 (은행별 가산금리 구조)\u003c/li\u003e\n\u003cli\u003e주요 경영지표 공시\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e예대금리차를 은행별로 비교하면 어느 은행이 마진 관리를 잘 하는지 파악할 수 있다.\u003c/p\u003e\n\u003ch3\u003e컨센서스 추정치 확인 (에프앤가이드)\u003c/h3\u003e\n\u003cp\u003efn.fnguide.com에서 증권사 애널리스트들의 추정치 컨센서스를 확인할 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e확인 항목\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eNII(순이자이익) 추정치 vs 실제\u003c/li\u003e\n\u003cli\u003e영업이익, 당기순이익 추정치\u003c/li\u003e\n\u003cli\u003eNIM 전망치\u003c/li\u003e\n\u003cli\u003eEPS 추정치 변화 추이 (추정치가 올라가면 주가에 긍정적)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e어닝 서프라이즈(실제 \u003e 추정치) 여부를 판단하는 기준으로 활용한다.\u003c/p\u003e\n\u003ch3\u003e주요 증권사 리포트 활용\u003c/h3\u003e\n\u003cp\u003eKB금융, 신한지주를 커버하는 주요 증권사 애널리스트:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e이베스트투자증권 금융팀\u003c/li\u003e\n\u003cli\u003e대신증권 금융팀\u003c/li\u003e\n\u003cli\u003e신한투자증권 (단, 신한지주 분석 시 이해상충 주의)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e분기 실적 발표 직후 1~2주 내 발행되는 리포트를 주의깊게 읽으면 된다. 특히 NIM 전망, 충당금 전망, 주주환원 계획 변화에 대한 분석이 핵심이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e10. 실전 체크리스트: 분기 실적 발표 시 확인 항목\u003c/h2\u003e\n\u003cp\u003e4대 금융지주는 매년 2월(연간 결산), 5월(1분기), 8월(2분기), 11월(3분기)에 실적을 발표한다.\u003c/p\u003e\n\u003ch3\u003e실적 발표 당일 즉시 확인\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e① NIM 전분기 대비 변화\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003eQ: 이번 분기 NIM이 전분기 대비 올랐나 내렸나?\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e판단: +0.02%p 이상 상승이면 긍정적 서프라이즈\u003c/span\u003e\n     -0.03%p 이상 하락이면 부정적 서프라이즈\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e② 대출 성장률 (가계/기업 분리)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003eQ: 원화대출이 전분기 대비 몇 % 증가했나?\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e판단: 연 5~7% 성장은 안정적\u003c/span\u003e\n      가계대출 규제로 감소 시 기업대출로 보완 가능한지 확인\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e③ 충당금 추가 적립 여부\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003eQ: 대손충당금전입액이 전분기 대비 얼마나 늘었나?\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e판단: 급격한 증가는 특정 부문 부실 징후일 수 있음\u003c/span\u003e\n      PF 관련 충당금인지 일반 대출인지 구분 필요\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e④ NPL 비율 변화\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003eQ: NPL 비율이 전분기 대비 상승했나?\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e판단: 0.1%p 이상 상승 시 주의 필요\u003c/span\u003e\n     계속 상승 추세라면 리스크 프리미엄 재평가 필요\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e⑤ CET1 비율 변화\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003eQ: CET1이 13% 이상 유지되고 있나?\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e판단: 13% 상회 → 주주환원 확대 여력 있음\u003c/span\u003e\n     13% 하회 → 배당 증가 어려울 수 있음\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e⑥ 배당 가이던스\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003eQ: 연간 배당 목표나 주주환원율 목표를 변경했나?\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e판단: 상향 시 주가 호재, 하향 시 주가 악재\u003c/span\u003e\n     특히 자사주 소각 계획 여부 체크\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e실적 발표 후 1주일 내 심층 분석\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e경쟁사 대비 NIM 상대적 위치 확인\u003c/li\u003e\n\u003cli\u003e컨센서스 대비 서프라이즈/미스 폭 확인\u003c/li\u003e\n\u003cli\u003eCEO 및 CFO 컨퍼런스콜(IR) 핵심 발언 확인\u003c/li\u003e\n\u003cli\u003e해외 익스포저 및 환율 영향 확인\u003c/li\u003e\n\u003cli\u003e다음 분기 가이던스 확인\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e연간 실적 발표 시 추가 확인\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e자본관리 계획 (배당, 자사주 매입/소각 규모)\u003c/li\u003e\n\u003cli\u003e중장기 ROE 목표 제시 여부\u003c/li\u003e\n\u003cli\u003e디지털 전환 투자 계획 및 성과\u003c/li\u003e\n\u003cli\u003e해외 사업 성장 현황\u003c/li\u003e\n\u003cli\u003e비은행 자회사 실적 기여도 변화\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e결론: 은행주 투자의 핵심 요약\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003e언제 사야 하나\u003c/strong\u003e:\n금리 인상 사이클 초기 + PBR 0.3~0.4배 구간 + CET1 13% 이상 + 배당수익률 5% 이상이 겹치는 시점이 최적 매수 구간이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e무엇을 사야 하나\u003c/strong\u003e:\nROE와 NIM이 가장 높고 CET1 여력이 충분한 KB금융이 가장 안전한 선택이다. 고배당을 원한다면 PBR이 낮은 우리금융도 고려할 수 있지만, CET1 리스크를 감안해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e얼마나 들고 있어야 하나\u003c/strong\u003e:\n배당 재투자 전략으로 5~10년 장기 보유 시 원금 대비 배당금이 50% 이상 누적된다. 동시에 한국 밸류업 정책 지속 시 PBR 재평가로 추가 수익이 가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e무엇을 조심해야 하나\u003c/strong\u003e:\n부동산 PF 부실 확대, 금융당국 배당 제한, 인터넷 은행의 수익성 잠식, 급격한 경기침체로 인한 NPL 급증이 주요 리스크다. 분기마다 NPL과 CET1을 체크하며 이상 징후를 조기에 포착하는 것이 핵심이다.\u003c/p\u003e\n\u003cp\u003e은행주는 화려한 성장주가 아니다. 그러나 수십 년간 저평가된 우량 자산에서 꾸준한 배당을 받으면서 밸류에이션 재평가라는 보너스를 기다리는 것이야말로, 가장 전형적인 가치투자 스타일이다.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e참고 자료: DART 전자공시, 금융감독원 금융통계정보시스템, 각 금융지주 IR 자료, 한국은행 금융안정보고서\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-14\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"은행주에 관한 모든 것\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"은행주에 관한 모든 것 | midasworld (Private)\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"서버 개발 학습 블로그\"}],[\
