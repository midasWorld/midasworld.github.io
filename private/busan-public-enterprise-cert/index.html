n  → 한국사능력검정시험\n  → 취업지원대상자 (보훈)\n  → 장애인 고용 우대\n  → 지역인재 (부산 소재 대학 졸업)\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 어학 점수 (토익 기준)\u003c/h2\u003e\n\u003ch3\u003e기관별 토익 요구 수준\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기관\u003c/th\u003e\n\u003cth\u003e사무직 권장\u003c/th\u003e\n\u003cth\u003e최소 기준\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산항만공사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e900점 이상\u003c/td\u003e\n\u003ctd\u003e800점\u003c/td\u003e\n\u003ctd\u003e영어 비중 매우 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산교통공사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e800점 이상\u003c/td\u003e\n\u003ctd\u003e700점\u003c/td\u003e\n\u003ctd\u003eNCS 점수로 환산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산도시공사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e800점 이상\u003c/td\u003e\n\u003ctd\u003e700점\u003c/td\u003e\n\u003ctd\u003e가산점 3~5점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산환경공단\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e750점 이상\u003c/td\u003e\n\u003ctd\u003e650점\u003c/td\u003e\n\u003ctd\u003e기술직은 650 이하도 가능\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산시설공단\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e750점 이상\u003c/td\u003e\n\u003ctd\u003e600점\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e점수대별 전략\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e600점 미만\u003c/strong\u003e: 기술직 지원 시 토익 비중이 낮아 부담 적음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e700~750점\u003c/strong\u003e: 대부분 기관 지원 가능한 최소선\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e800점 이상\u003c/strong\u003e: 사무직 경쟁력 확보\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e850점 이상\u003c/strong\u003e: 부산항만공사·대형 공기업 사무직 유리\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e900점 이상\u003c/strong\u003e: 영어 관련 가산점 만점 처리 기관 多\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e유효기간\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e2년 → 5년으로 확대 추세\u003c/li\u003e\n\u003cli\u003e부산 통합채용: 원서 접수 마감일 기준 \u003cstrong\u003e2년 이내\u003c/strong\u003e 성적 (기관별 상이, 공고 확인 필수)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e토익 외 인정 어학 시험\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시험\u003c/th\u003e\n\u003cth\u003e인정 기준 (토익 700 환산)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eTOEFL IBT\u003c/td\u003e\n\u003ctd\u003e71점 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eIELTS\u003c/td\u003e\n\u003ctd\u003e5.5점 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTOEIC Speaking\u003c/td\u003e\n\u003ctd\u003e110점 이상 (IM2)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eOPIc\u003c/td\u003e\n\u003ctd\u003eIM2 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 한국사능력검정시험 (필수!)\u003c/h2\u003e\n\u003cp\u003e거의 모든 공기업에서 \u003cstrong\u003e가산점 부여 또는 응시 자격 요건\u003c/strong\u003e으로 요구합니다.\u003c/p\u003e\n\u003ch3\u003e급수별 가산점 예시\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e급수\u003c/th\u003e\n\u003cth\u003e한국전력\u003c/th\u003e\n\u003cth\u003e코레일\u003c/th\u003e\n\u003cth\u003e인천공항\u003c/th\u003e\n\u003cth\u003e부산 기관\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e1급\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e5점\u003c/td\u003e\n\u003ctd\u003e5점\u003c/td\u003e\n\u003ctd\u003e5점\u003c/td\u003e\n\u003ctd\u003e3~5점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e2급\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e3점\u003c/td\u003e\n\u003ctd\u003e5점\u003c/td\u003e\n\u003ctd\u003e3점\u003c/td\u003e\n\u003ctd\u003e3점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e3급\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1점\u003c/td\u003e\n\u003ctd\u003e3점\u003c/td\u003e\n\u003ctd\u003e1점\u003c/td\u003e\n\u003ctd\u003e0~1점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e4급 이하\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e0점\u003c/td\u003e\n\u003ctd\u003e0점\u003c/td\u003e\n\u003ctd\u003e0점\u003c/td\u003e\n\u003ctd\u003e0점\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e→ 최소 2급은 취득해야 가산점 의미 있음\u003c/strong\u003e\u003c/p\u003e\n\u003ch3\u003e시험 일정 (연 6회 시행)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e회차\u003c/th\u003e\n\u003cth\u003e시험일 (2026 예상)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e68회\u003c/td\u003e\n\u003ctd\u003e2026년 2월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e69회\u003c/td\u003e\n\u003ctd\u003e2026년 4월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e70회\u003c/td\u003e\n\u003ctd\u003e2026년 6월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e71회\u003c/td\u003e\n\u003ctd\u003e2026년 8월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e72회\u003c/td\u003e\n\u003ctd\u003e2026년 10월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e73회\u003c/td\u003e\n\u003ctd\u003e2026년 12월\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e상반기 채용 준비 중이라면 \u003cstrong\u003e4월 시험\u003c/strong\u003e 응시가 마지막 기회일 수 있음.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 사무직 핵심 자격증\u003c/h2\u003e\n\u003ch3\u003e컴퓨터활용능력 (컴활)\u003c/h3\u003e\n\u003cp\u003e거의 모든 공기업에서 인정하는 기본 자격증\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e등급\u003c/th\u003e\n\u003cth\u003e가산점 수준\u003c/th\u003e\n\u003cth\u003e취득 난이도\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e1급\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e3~5점\u003c/td\u003e\n\u003ctd\u003e중상 (필기+실기)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e2급\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1~3점\u003c/td\u003e\n\u003ctd\u003e중 (필기+실기)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e수험생 조언\u003c/strong\u003e: 컴활 2급은 꼭 취득하세요.\n공부 시간 대비 가산점 효율이 가장 좋습니다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e기타 사무직 우대 자격증\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자격증\u003c/th\u003e\n\u003cth\u003e주관처\u003c/th\u003e\n\u003cth\u003e가산점 여부\u003c/th\u003e\n\u003cth\u003e취득 난이도\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMOS (마스터)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e마이크로소프트\u003c/td\u003e\n\u003ctd\u003e일부 기관 인정\u003c/td\u003e\n\u003ctd\u003e중\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eERP정보관리사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e한국생산성본부\u003c/td\u003e\n\u003ctd\u003e일부 인정\u003c/td\u003e\n\u003ctd\u003e중상\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e사회조사분석사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e한국산업인력공단\u003c/td\u003e\n\u003ctd\u003e일부 인정\u003c/td\u003e\n\u003ctd\u003e중\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e재경관리사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e삼일회계법인\u003c/td\u003e\n\u003ctd\u003e일부 인정\u003c/td\u003e\n\u003ctd\u003e중\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSQLD\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e한국데이터산업진흥원\u003c/td\u003e\n\u003ctd\u003eIT 직렬 인정\u003c/td\u003e\n\u003ctd\u003e중\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 기술직 필수 자격증 (직렬별)\u003c/h2\u003e\n\u003cp\u003e기술직은 \u003cstrong\u003e기사 이상 자격증이 지원 요건\u003c/strong\u003e인 경우가 많습니다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e직렬\u003c/th\u003e\n\u003cth\u003e필수 자격증\u003c/th\u003e\n\u003cth\u003e우대 자격증\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e토목\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e토목기사\u003c/td\u003e\n\u003ctd\u003e토목시공기술사, 측량기사\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e건축\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e건축기사\u003c/td\u003e\n\u003ctd\u003e건축사, 실내건축기사\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e전기\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e전기기사\u003c/td\u003e\n\u003ctd\u003e전기공사기사, 전기안전기사\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e기계\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e일반기계기사\u003c/td\u003e\n\u003ctd\u003e기계설비기사, 에너지관리기사\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e전산\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e정보처리기사\u003c/td\u003e\n\u003ctd\u003e네트워크관리사, SQLD\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e환경\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e환경기사\u003c/td\u003e\n\u003ctd\u003e수질환경기사, 대기환경기사\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e화학\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e화학분석기사\u003c/td\u003e\n\u003ctd\u003e위험물산업기사\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e안전\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e산업안전기사\u003c/td\u003e\n\u003ctd\u003e건설안전기사\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cs
