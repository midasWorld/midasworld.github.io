th\u003e예시\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e공기업\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e한국전력, 코레일, 부산교통공사\u003c/td\u003e\n\u003ctd\u003e자체 수입 50% 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e준정부기관\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e국민건강보험공단, 근로복지공단\u003c/td\u003e\n\u003ctd\u003e정부 의존도 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e기타공공기관\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e부산도시공사, 부산시설공단\u003c/td\u003e\n\u003ctd\u003e지방공기업 포함\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e부산 주요 공기업 목록\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기관명\u003c/th\u003e\n\u003cth\u003e주요 업무\u003c/th\u003e\n\u003cth\u003e직원 규모\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산교통공사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e도시철도(지하철) 운영\u003c/td\u003e\n\u003ctd\u003e약 4,000명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산도시공사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e도시개발·주택공급·임대\u003c/td\u003e\n\u003ctd\u003e약 900명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산항만공사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e항만 개발·운영\u003c/td\u003e\n\u003ctd\u003e약 300명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산환경공단\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e환경시설 운영·관리\u003c/td\u003e\n\u003ctd\u003e약 1,200명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산시설공단\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e공공시설 관리·운영\u003c/td\u003e\n\u003ctd\u003e약 2,200명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산관광공사\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e관광 마케팅·MICE\u003c/td\u003e\n\u003ctd\u003e약 200명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산신용보증재단\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e중소기업 보증 지원\u003c/td\u003e\n\u003ctd\u003e약 300명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e부산경제진흥원\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e창업·기업 지원\u003c/td\u003e\n\u003ctd\u003e약 200명\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 공기업 취업이 매력적인 이유\u003c/h2\u003e\n\u003ch3\u003e직장인 선배 관점 (도시공사 5년차)\u003c/h3\u003e\n\u003cp\u003e실제로 다녀보니 이런 점이 좋았습니다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e정년 보장\u003c/strong\u003e: 60세까지 안정적 근무\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e복지 수준\u003c/strong\u003e: 건강검진, 경조사비, 학자금 지원 등 대기업 못지않음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e워라밸\u003c/strong\u003e: 야근 강요 문화 없음, 초과근무수당 정산\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e연금\u003c/strong\u003e: 공무원 연금이 아닌 국민연금이지만 퇴직금 수준이 좋음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e사회적 인식\u003c/strong\u003e: 안정적인 직장이라는 인식\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e단점은 연봉 상승 속도가 사기업 대비 느리고,\n성과 보상 개념이 약해 능력 있어도 크게 튀기 어렵습니다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 채용 전형 흐름 (공통)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e공고 확인\n    ↓\n서류전형 (입사지원서 + 자격요건 확인)\n    ↓\n필기전형 (NCS 직업기초능력 + 직무수행능력)\n    ↓\n면접전형 (실무면접 + 임원면접)\n    ↓\n신체검사 + 신원조회\n    ↓\n최종합격 → 수습기간 → 정규직\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e부산 지역 공공기관은 \u003cstrong\u003e부산광역시 통합채용\u003c/strong\u003e 시스템을 통해 1년에 2회(상반기·하반기) 공동으로 채용합니다.\n즉, 한 번 원서 접수로 여러 기관에 동시 지원할 수 있습니다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. NCS란 무엇인가? (가장 중요)\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eNCS(National Competency Standards)\u003c/strong\u003e = 국가직무능력표준\u003c/p\u003e\n\u003cp\u003e쉽게 말하면: \"이 직무를 잘하려면 어떤 능력이 필요한지\"를 국가가 정해놓은 기준.\n공기업 필기시험의 80% 이상이 NCS 기반으로 출제됩니다.\u003c/p\u003e\n\u003ch3\u003eNCS 10대 직업기초능력\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e영역\u003c/th\u003e\n\u003cth\u003e무엇을 평가하나\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e의사소통능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e문서 읽기·쓰기·이해력\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e수리능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e기본 수학, 통계, 도표 해석\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e문제해결능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e상황 판단, 논리적 사고\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e자기개발능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e자기 이해와 경력 설계\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e자원관리능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e시간·예산·인력 관리\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e대인관계능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e팀워크, 갈등 해결\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e조직이해능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e조직 구조 이해, 경영 기초\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e직업윤리\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e근로윤리, 공직자 자세\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e정보능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e컴퓨터·정보 활용\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e기술능력\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e장비·기술 이해 (기술직 필수)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e부산 통합채용 기준 NCS 필기: \u003cstrong\u003e5개 영역 × 10문항 = 50문항\u003c/strong\u003e (의사소통·수리·문제해결·자원관리·조직이해)\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 처음 준비 시작하는 로드맵\u003c/h2\u003e\n\u003ch3\u003e학원 강사 추천 6개월 플랜\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e1~2개월: 기초 다지기\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e NCS 기본서 1권 처음부터 끝까지 정독\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 10개 영역 개념 파악\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 하루 1~2시간 투자\n\n3~4개월: 본격 문제풀이\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 영역별 기출문제 풀이\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 약점 영역 집중 보완\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 부산 통합채용 기출 모의고사 풀기\n\n5~6개월: 실전 대비\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 실제 시험 시간 맞춰 모의고사\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 자소서·면접 준비 병행\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 자격증 취득 (한국사, 컴활 등)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e수험생 관점에서 현실적인 조언\u003c/h3\u003e\n\u003cp\u003e수험 기간 1년 이상이 많습니다. 중간에 포기하지 않으려면:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e목표 기관 1~2개로 좁히기\u003c/strong\u003e: 모든 공기업을 다 준비하려면 방향이 흐려짐\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e커뮤니티 활용\u003c/strong\u003e: 블라인드, 네이버카페 \"공기업취업\"에서 최신 정보 공유\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e기출 분석이 핵심\u003c/strong\u003e: NCS는 유형이 반복되므로 기출 풀이가 가장 효율적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e자격증 미리 따기\u003c/strong\u003e: 서류 마감 전에 취득 완료 상태여야 가산점 인정\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 지원 직렬 이해하기\u003c/h2\u003e\n\u003ch3\u003e사무직 vs 기술직\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e주요 업무\u003c/th\u003e\n\u003cth\u003e요구 자격\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e사무직\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e경영·회계·인사·기획\u003c/td\u003e\n\u003ctd\u003e어학 점수 중시\u003c/td\u003e\n\u003c/tr\u003e\n\u0
