 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항\n  자원관리능력    \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항\n  조직이해능력    \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항\n  ─────────────────────\n  소계            \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e문항 (\u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e분)\n\n직무수행능력평가 (직렬별 다름)\n  전공/직무 지식  \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e문항 (\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e분)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e사무직\u003c/strong\u003e: 직무수행능력이 경영학·법학·회계 개념 문제\n\u003cstrong\u003e기술직\u003c/strong\u003e: 전공 기사 수준 전공 문제 출제\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. NCS 직업기초능력 영역별 완전 분석\u003c/h2\u003e\n\u003ch3\u003e2-1. 의사소통능력 (10문항)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e무엇을 테스트하나\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e긴 지문 읽고 핵심 파악\u003c/li\u003e\n\u003cli\u003e공문서·보고서·기안문 이해\u003c/li\u003e\n\u003cli\u003e올바른 한국어 문장 고르기\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e출제 유형\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e① 지문 독해: 500~800자 지문 읽고 핵심 내용 파악\n② 문서 이해: 공문서, 안내문, 보도자료 내용 파악\n③ 맞춤법: 틀린 문장 찾기, 올바른 표현 선택\n④ 내용 일치: 지문과 일치/불일치 선지 고르기\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e시간 배분\u003c/strong\u003e: 문항당 1.5~2분\n\u003cstrong\u003e공부 포인트\u003c/strong\u003e: 긴 지문을 빠르게 읽는 연습이 핵심. 맞춤법은 자주 나오는 유형 암기.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e2-2. 수리능력 (10문항)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e무엇을 테스트하나\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e기초 수학 계산 능력\u003c/li\u003e\n\u003cli\u003e통계 자료(표, 그래프) 해석\u003c/li\u003e\n\u003cli\u003e응용 수리 문제\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e출제 유형\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-swift\"\u003e① 기초 연산: 분수, 소수, 비율 계산\n② 도표 분석: 막대그래프, 원형그래프, 꺾은선 그래프 해석\n③ 응용 수리: 거리\u003cspan class=\"hljs-regexp\"\u003e/속도/\u003c/span\u003e시간, 농도, 경우의 수\n④ 자료 해석: 통계 수치 비교·분석\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e시간 배분\u003c/strong\u003e: 문항당 1~1.5분 (계산 문제는 오래 걸릴 수 있음)\n\u003cstrong\u003e공부 포인트\u003c/strong\u003e: 계산기 없이 빠른 암산 연습. 그래프 해석 문제가 시간을 많이 잡아먹으므로 유형 익히기.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e2-3. 문제해결능력 (10문항)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e무엇을 테스트하나\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주어진 조건으로 결론 도출\u003c/li\u003e\n\u003cli\u003e업무 상황에서 최선의 선택\u003c/li\u003e\n\u003cli\u003e논리적 추론\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e출제 유형\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e① 상황 판단: 민원 처리, 업무 우선순위 결정\n② 조건 추론: \u003cspan class=\"hljs-selector-tag\"\u003eA\u003c/span\u003e, \u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e, \u003cspan class=\"hljs-selector-tag\"\u003eC\u003c/span\u003e 조건 주고 결론 유추\n③ \u003cspan class=\"hljs-selector-tag\"\u003eSWOT\u003c/span\u003e 분석 등 경영 도구 활용 문제\n④ 명제 논리: \"~이면 ~이다\" 형식 추론\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e시간 배분\u003c/strong\u003e: 문항당 1.5\u003cdel\u003e2분\n\u003cstrong\u003e공부 포인트\u003c/strong\u003e: 조건 추론 유형은 빠른 논리 회로가 필요. 매일 5\u003c/del\u003e10문제 반복 훈련 추천.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e2-4. 자원관리능력 (10문항)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e무엇을 테스트하나\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e시간·예산·인력·물적 자원 관리\u003c/li\u003e\n\u003cli\u003e비용 최소화, 효율 극대화 선택\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e출제 유형\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e① 예산 배분: 주어진 예산으로 최적 선택\n② 일정 관리: 업무 순서·시간 배치\n③ 자원 최적화: 인력 배치, 물자 배분\n④ 비용 계산: 가장 저렴한 방법 선택\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e시간 배분\u003c/strong\u003e: 문항당 1~2분\n\u003cstrong\u003e공부 포인트\u003c/strong\u003e: 계산이 포함된 문제가 많으므로 수리능력과 함께 준비. 표 해석 능력 중요.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e2-5. 조직이해능력 (10문항)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e무엇을 테스트하나\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e조직의 구조와 문화 이해\u003c/li\u003e\n\u003cli\u003e경영학 기초 개념\u003c/li\u003e\n\u003cli\u003e공기업 특성 이해\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e출제 유형\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e① 조직 구조: 라인 조직, 매트릭스 조직 등 유형\n② 경영 개념: 기획, 조직화, 지휘, 통제 (PDCA 등)\n③ 업무 처리: 공문서 작성법, 결재 라인\n④ 직업윤리: 공직자 행동강령, 청렴 관련\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e시간 배분\u003c/strong\u003e: 문항당 1~1.5분\n\u003cstrong\u003e공부 포인트\u003c/strong\u003e: 경영학 입문서 1권 가볍게 읽으면 도움. 공직자 청렴 관련 출제 빈도 높음.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 시간 배분 전략\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003e60분 50문항 → 문항당 평균 1.2분\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[권장 시간 배분]\u003c/span\u003e\n\n의사소통 (\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항): \u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e18\u003c/span\u003e분\n  → 긴 지문이 많아 시간 소요\n\n수리능력 (\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항): \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e분\n  → 계산 포함 문제에 주의\n\n문제해결 (\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항): \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e분\n  → 조건 추론 문제 시간 집중 투자\n\n자원관리 (\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항): \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e분\n  → 계산 빠르게 처리\n\n조직이해 (\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e문항): \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e분\n  → 개념 위주라 비교적 빠름\n\n총계: \u003cspan class=\"hljs-number\"\u003e57\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e분 → \u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e분 내 완료 목표\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e현직자 팁\u003c/strong\u003e: 모르는 문제는 2분 넘기지 말고 일단 표시 후 넘어가기. 전체 문제를 1번 다 푼 후 남은 시간에 재검토.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 필기 합격선 분석\u003c/h2\u003e\n\u003ch3\u003e부산 통합채용 기준 (비공식 데이터)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기관\u003c/th\u003e\n\u003cth\u003e직렬\u003c/th\u003e\n\u003cth\u003e합격선 (NCS 50점 만점)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e부산교통공사\u003c/td\u003e\n\u003ctd\u003e사무\u003c/td\u003e\n\u003ctd\u003e38~42점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부산교통공사\u003c/td\u003e\n\u003ctd\u003e기술\u003c/td\u003e\n\u003ctd\u003e32~36점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부산도시공사\u003c/td\u003e\n\u003ctd\u003e사무\u003c/td\u003e\n\u003ctd\u003e36~40점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부산도시공사\u003c/td\u003e\n\u003ctd\u003e기술\u003c/td\u003e\n\u003ctd\u003e30~34점\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부산시설공단\u003c/td\u003e\n\u003ctd\u003e사무\u003c/td\u003e\n\u003ctd\u003e34~38점\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e이 수치는 수험생 커뮤니티 기반 비공식 추정치입니다.\n매년 경쟁률과 응시자 수준에 따라 변동됩니다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003e→ 목표: NCS 50문항 중 80% 이상 (40문항) 정답\u003c/strong\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 효율적인 공부 방법\u003c/h2\u003e\n\u003ch3\u003e단계별 접근\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e1단계: 개념 이해 (2~3주)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eNCS 기본서 1권을 처음부터 끝까지 정독합니다.\n10개 영역의 개념과 문제 유형을 파악하는 단계입니다.\u003c/p\u003e\n\u003cp\u003e추천 교재:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e해커스공기업 NCS 통합 기본서\u003c/li\u003e\n\u003cli\u003e고시넷 NCS 직업기초능력 기본서\u003c/li\u003e\n\u003cli\u003e에듀윌 NCS 직업기초능력\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2단계: 기출 풀이 (4~6주)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e실제 시험과 유사한 기출 문제를 풀면서 유형을 익힙니다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e고시넷 부산교통공사/부산시 공공기관 통합채용 기출예상문제집\u003c/li\u003e\n\u003cli\u003e부산 통합채용 전용 모의고사 책 활용\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e3단계: 실전 모의고사 (2~4주)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e실제 시험과 동일한 60분 타이머 설정\u003c/li\u003e\n\u003cli\u003e약점 영역 집중 보완\u003c/li\u003e\n\u003cli\u003e틀린 문제 반드시 오답 노트 작성\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 직무수행능력 (사무직 경영 과목)\u003c/h2\u003e\n\u003cp\u003e사무직의 경우 NCS 외에 \u003cstrong\u003e직무수행능력 시험\u003c/strong\u003e이 있습니다.\n기관에 따라 다르지만 대표적인 출제 범위:\u003c/p\u003e\n\u003ch3\u003e경영학 영역\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e파트\u003c/th\u003e\n\u003cth\u003e주요 내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e경영전략\u003c/td\u003e\n\u003ctd\u003eSWOT, BCG 매트릭스, 포터의 5 forces\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e조직론\u003c/td\u003e\n\u003ctd\u003e조직 구조, 리더십, 동기부여 이론\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e인사관리\u003c/td\u003e\n\u003ctd\u003e채용, 평가, 보상, 교육훈련\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e마케팅\u003c/td\u003e\n\u003ctd\u003e4P, STP, 소비자 행동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e회계\u003c/td\u003e\n\u003ctd\u003e재무제표, 비율 분석 기초\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e법학 영역 (법정직 지원 시)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e민법 기초 (계약, 불법행위)\u003c/li\u003e\n\u003cli\u003e행정법 기초 (행정행위, 처분)\u003c/li\u003e\n\u003cli\u003e상법 기초 (회사법)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e7. 면접 준비 (필기 합격 후)\u003c/h2\u003e\n\u003ch3\u003e면접 유형\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e1단계: 실무 면접 (PT 면접 + 토론 면접)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePT 면접: 주어진 주제로 5~10분 발표\u003c/li\u003e\n\u003cli\u003e토론 면접: 4~6명이 특정 주제 토론\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2단계: 임원 면접 (인성 면접)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e지원 동기\u003c/li\u003e\n\u003cli\u003e입사 후 포부\u003c/li\u003e\n\u003cli\u003e직무 관련 경험\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e자주 나오는 면접 질문 (부산 공기업)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 부산 공기업에 지원한 이유가 무엇인가요?\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 공기업과 사기업의 차이점을 설명해보세요.\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 마지막으로 일했거나 팀 프로젝트에서 갈등을 해결한 경험을 말씀해주세요.\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e 지원하신 직렬에서 가장 중요한 역량은 무엇이라고 생각하시나요?\n\u003cspan class=\"hljs-bullet\"\u003e5.\u003c/span\u003e 청렴한 공직자가 갖춰야 할 자세에 대해 말씀해주세요.\n\u003cspan class=\"hljs-bullet\"\u003e6.\u003c/span\u003e 상사의 부당한 지시를 받았을 때 어떻게 하겠습니까?\n\u003cspan class=\"hljs-bullet\"\u003e7.\u003c/span\u003e 부산의 현안 문제와 공기업의 역할을 연결해서 설명해보세요.\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 수험생이 자주 하는 실수\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e공고 확인 늦게 함\u003c/strong\u003e: 원서 접수가 1주일밖에 안 되는 경우 많음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e자격증 마감 전에 미취득\u003c/strong\u003e: 공고 나오고 나서 자격증 딸 시간 없음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e특정 기관만 준비\u003c/strong\u003e: 부산 통합채용은 여러 기관이 같은 날 필기 → 여러 기관 동시 지원 전략\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNCS만 준비, 전공 소홀\u003c/strong\u003e: 직무수행능력에서 많이 떨어짐\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e면접 준비 늦게 시작\u003c/strong\u003e: 필기 발표 후 면접까지 2~3주밖에 안 됨\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 합격자 조언 요약\u003c/h2\u003e\n\u003ch3\u003e현직자(부산도시공사 3년차)\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"저는 NCS 3개월, 전공(경영) 1개월 집중했어요. 부산 통합채용 기출문제집 1권을 3번 반복했는데 그게 제일 도움됐습니다. 자격증은 한국사 1급이랑 컴활 1급 미리 따놨고요. 면접에서 부산 지역 이슈 파악이 중요했습니다.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e수험생(2회 도전 후 합격)\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"처음엔 NCS만 보다가 실패했어요. 두 번째엔 경영학 전공 공부도 같이 했고, 가산점 자격증도 챙겼습니다. 합격선이 생각보다 높아서 NCS 실수 0개를 목표로 잡고 연습했어요.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e강사 조언\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"지금 당장 뭐 해야 하냐고요? 한국사 시험 신청하세요. 그다음 컴활 2급. 이거 두 개만 해도 가산점 기반이 생깁니다. NCS는 기본서 한 권 사서 하루 2시간씩 3개월 하면 됩니다. 뭔가 완벽하게 준비하려다 시작을 못하는 분들이 너무 많아요.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003cp\u003e다음 포스트: 기관별 합격 후기와 실제 현장 이야기\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"job\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-15\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"부산 공기업 NCS 필기시험 완전 분석 — 합격 전략과 공부법\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:fo
