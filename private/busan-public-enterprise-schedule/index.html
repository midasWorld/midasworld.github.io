\u003c/li\u003e\n\u003cli\u003eNCS 필기시험 날짜·장소 통일\u003c/li\u003e\n\u003cli\u003e지원자 부담 감소, 기관 채용 효율 향상\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e통합채용 참여 기관 (2025년 기준, 17개 기관)\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e부산교통공사, 부산도시공사, 부산관광공사, 부산시설공단, 부산환경공단,\n부산연구원, 부산신용보증재단, 부산경제진흥원, 부산문화회관, 부산항만공사,\n부산테크노파크, 부산디자인진흥원 등\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 2024년 채용 일정 (실제 진행)\u003c/h2\u003e\n\u003ch3\u003e2024 상반기\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e단계\u003c/th\u003e\n\u003cth\u003e일정\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e공고 게시\u003c/td\u003e\n\u003ctd\u003e2024년 4월 22일 (월)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e원서 접수\u003c/td\u003e\n\u003ctd\u003e2024년 4월 22일 ~ 4월 29일 (17:00)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e서류전형 발표\u003c/td\u003e\n\u003ctd\u003e2024년 5월 중\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eNCS 필기시험\u003c/td\u003e\n\u003ctd\u003e2024년 6월 (토요일)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e면접전형\u003c/td\u003e\n\u003ctd\u003e2024년 7~8월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e최종 합격 발표\u003c/td\u003e\n\u003ctd\u003e2024년 8월 말 ~ 9월 초\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e2024 하반기\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e단계\u003c/th\u003e\n\u003cth\u003e일정\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e공고 게시\u003c/td\u003e\n\u003ctd\u003e2024년 9월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e원서 접수\u003c/td\u003e\n\u003ctd\u003e2024년 9월 중\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eNCS 필기시험\u003c/td\u003e\n\u003ctd\u003e2024년 10~11월\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e 3c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 기관별 주요 채용 현황\u003c/h2\u003e\n\u003ch3\u003e부산교통공사\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e주요 직렬\u003c/strong\u003e: 운전·차량, 전기, 기계, 토목, 건축, 사무(경영/법정)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e채용 규모\u003c/strong\u003e: 연간 100~200명 내외\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e특이사항\u003c/strong\u003e: 운전직은 별도 채용 (필기 + 체력검정 + 운전적성검사)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e필기 구성\u003c/strong\u003e: NCS 50문항 + 직렬 전공 50문항 (90분)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e합격선\u003c/strong\u003e: 사무직 NCS 70점 이상 / 기술직 60점 이상 (기준 연도별 변동)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e부산도시공사\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e주요 직렬\u003c/strong\u003e: 사무(경영/법정/회계), 토목, 건축, 기계, 전기, 전산\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e채용 규모\u003c/strong\u003e: 연간 30~80명 내외\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e특이사항\u003c/strong\u003e: 주택·도시개발 업무 특성상 토목·건축직 비중 높음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e필기 구성\u003c/strong\u003e: NCS 50문항 + 직무수행능력 (직렬별)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e경쟁률\u003c/strong\u003e: 사무직 30:1 이상, 기술직 5~15:1\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e부산항만공사\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e주요 직렬\u003c/strong\u003e: 항만물류, 경영, IT, 안전관리\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e채용 규모\u003c/strong\u003e: 연간 20~40명 (소규모)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e특이사항\u003c/strong\u003e: 영어 비중 매우 높음 (항만 국제업무)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e토익 기준\u003c/strong\u003e: 800점 이상 권장, 900점이면 가산점\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e부산환경공단\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e주요 직렬\u003c/strong\u003e: 환경, 기계, 전기, 사무\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e채용 규모\u003c/strong\u003e: 연간 30~60명\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e특이사항\u003c/strong\u003e: 환경기사, 수질관리기술사 등 환경 자격증 우대\u003c/li\u003e\n\u003c/u
