3e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e파란 캔들 (음봉)\u003c/td\u003e\n\u003ctd\u003e종가 \u0026#x3C; 시가 (하락)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e국내 vs 해외 색상 주의\u003c/strong\u003e: 한국과 중국은 빨강=상승, 파랑=하락이지만, 미국·유럽은 초록=상승, 빨강=하락이다. 해외 차트를 볼 때 색상 혼동에 주의할 것.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e주요 캔들 패턴\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e장대 양봉\u003c/strong\u003e — 몸통이 크고 꼬리가 짧음. 강한 매수세. 거래량이 평소의 2~3배 이상 동반되면 신뢰도 대폭 상승. 코스피 대형주에서 장대 양봉이 나올 때는 외국인·기관의 동시 매수인지 확인할 것.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e장대 음봉\u003c/strong\u003e — 몸통이 크고 꼬리가 짧음. 강한 매도세. 이전 지지선 아래에서 출현하면 추가 하락 가능성이 높다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e도지\u003c/strong\u003e — 시가 ≈ 종가. 몸통이 거의 없음. 방향 전환 신호 가능성. 단독으로는 의미 없으며, 직전 추세의 방향과 다음 캔들의 방향으로 확인한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e망치형(Hammer)\u003c/strong\u003e — 아랫꼬리가 몸통의 2배 이상, 윗꼬리가 거의 없음. 하락 추세 말미에 출현 시 매수세 유입 신호. 아랫꼬리가 길수록 강한 지지를 의미한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e역망치형(Inverted Hammer)\u003c/strong\u003e — 윗꼬리가 길고 몸통이 작음. 하락 후 바닥권에서 출현. 다음 캔들이 양봉으로 확인되어야 의미가 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e슈팅스타(Shooting Star)\u003c/strong\u003e — 윗꼬리가 길고 몸통이 작음. 상승 추세 고점 부근에서 출현 시 매도 신호. 망치형의 반대 개념.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e복합 캔들 패턴 (반전 신호)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e샛별형(Morning Star)\u003c/strong\u003e — 3개 캔들로 구성된 강력한 상승 반전 패턴.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e① 하락 추세 중 장대 음봉\n② 갭 하락 후 작은 몸통 (도지 또는 소형 캔들)\n③ 갭 상승 후 장대 양봉 (①의 몸통 절반 이상 회복)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e코스피에서 대형 조정 이후 외국인 매수가 유입되는 시점에 자주 포착된다. 2020년 3월 코로나 폭락 이후 반등 초기에 여러 종목에서 샛별형이 출현했다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e저녁별형(Evening Star)\u003c/strong\u003e — 샛별형의 반대. 3개 캔들로 구성된 하락 반전 패턴.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e① 상승 추세 중 장대 양봉\n② 갭 상승 후 작은 몸통\n③ 갭 하락 후 장대 음봉 (①의 몸통 절반 이상 잠식)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e잉걸핌(Engulfing Pattern)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e강세 잉걸핌(Bullish Engulfing)\u003c/strong\u003e: 음봉 다음에 전날 음봉 전체를 감싸는 큰 양봉 출현. 하락세 종료 신호.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e약세 잉걸핌(Bearish Engulfing)\u003c/strong\u003e: 양봉 다음에 전날 양봉 전체를 감싸는 큰 음봉 출현. 상승세 종료 신호.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e잉걸핌은 거래량 폭증을 동반할수록 신뢰도가 높다. 특히 코스닥 소형주에서 세력이 물량을 소화하는 시점에 강세 잉걸핌이 자주 나타난다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e하라미(Harami)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e큰 몸통 캔들 다음에 그 몸통 안에 쏙 들어가는 작은 캔들이 출현.\u003c/li\u003e\n\u003cli\u003e\"하라미\"는 일본어로 \"임산부\"를 의미. 큰 캔들이 작은 캔들을 품은 모습.\u003c/li\u003e\n\u003cli\u003e추세 전환 가능성을 암시하지만 잉걸핌보다 약한 신호. 다음 봉으로 반드시 확인 필요.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e관통형(Piercing Line)\u003c/strong\u003e — 하락 추세에서 음봉 다음 날 갭 하락 시작 후 음봉 몸통의 50% 이상을 회복하는 양봉. 강세 반전 신호.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e먹구름형(Dark Cloud Cover)\u003c/strong\u003e — 상승 추세에서 양봉 다음 날 갭 상승 시작 후 양봉 몸통의 50% 이상을 잠식하는 음봉. 약세 반전 신호.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e패턴 활용 시 핵심 원칙\u003c/strong\u003e: 패턴 하나만으로 매매 결정을 내리지 말 것. 반드시 (1) 추세 방향, (2) 지지·저항 위치, (3) 거래량으로 교차 확인한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e지지선과 저항선\u003c/h2\u003e\n\u003cp\u003e차트 분석의 가장 기본이자 실전에서 가장 자주 쓰이는 개념이다.\u003c/p\u003e\n\u003ch3\u003e개념 정의\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e지지선(Support)\u003c/strong\u003e: 주가가 하락하다가 멈추고 반등하는 가격대. 매수세가 집중되는 구간.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e저항선(Resistance)\u003c/strong\u003e: 주가가 상승하다가 멈추고 하락하는 가격대. 매도세가 집중되는 구간.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e지지·저항이 형성되는 이유\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e전고점·전저점\u003c/strong\u003e: 과거에 큰 거래량을 동반한 가격대는 많은 투자자의 매수·매도 기준점이 된다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e이동평균선\u003c/strong\u003e: 20일선, 60일선은 기관·외국인이 매수 기준으로 자주 활용하기 때문에 지지·저항으로 작동한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e심리적 가격대\u003c/strong\u003e: 1만원, 5만원, 10만원 등 둥근 숫자(Round Number). 삼성전자 6만원, 7만원 등이 대표적.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e갭(Gap) 구간\u003c/strong\u003e: 가격이 급등 또는 급락하며 생긴 공백 구간.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e돌파의 의미\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e저항선 돌파 (상향 돌파)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e저항선을 거래량 동반하며 돌파 → 이전 저항선이 새로운 지지선으로 전환\u003c/li\u003e\n\u003cli\u003e돌파 후 눌림목(돌파한 저항선 근처로 되돌아옴)이 발생하면 진입 기회\u003c/li\u003e\n\u003cli\u003e거래량 없이 저항선을 살짝 넘는 것은 \u003cstrong\u003e가짜 돌파(Fake Breakout)\u003c/strong\u003e 가능성이 높다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e지지선 이탈 (하향 이탈)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e지지선을 거래량 동반하며 이탈 → 이전 지지선이 새로운 저항선으로 전환\u003c/li\u003e\n\u003cli\u003e이탈 후 반등 시 이전 지지선 근처에서 매도 압력이 강해진다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 팁\u003c/strong\u003e: 종목의 52주 신고가 돌파는 특히 강력한 신호다. 오버행(대규모 물량 부담)이 사라지고 진정한 가격 발견이 시작된다. 코스피 대형주에서 52주 신고가 돌파 후 상승 지속 확률은 역사적으로 60~65% 수준이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e가짜 돌파 구별법\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e진짜 돌파\u003c/th\u003e\n\u003cth\u003e가짜 돌파\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e거래량\u003c/td\u003e\n\u003ctd\u003e평소의 2배 이상\u003c/td\u003e\n\u003ctd\u003e평소와 비슷하거나 적음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e종가\u003c/td\u003e\n\u003ctd\u003e저항선 위에서 마감\u003c/td\u003e\n\u003ctd\u003e저항선 아래로 되돌아옴\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e연속성\u003c/td\u003e\n\u003ctd\u003e이후 1~2일 유지\u003c/td\u003e\n\u003ctd\u003e당일 또는 다음 날 되돌림\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e이동평균선 (MA)\u003c/h2\u003e\n\u003cp\u003e과거 N일간 종가의 평균을 이은 선. 추세 방향과 지지/저항 확인에 사용.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e선\u003c/th\u003e\n\u003cth\u003e기간\u003c/th\u003e\n\u003cth\u003e용도\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e단기선\u003c/td\u003e\n\u003ctd\u003e5일, 20일\u003c/td\u003e\n\u003ctd\u003e단기 추세\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e중기선\u003c/td\u003e\n\u003ctd\u003e60일\u003c/td\u003e\n\u003ctd\u003e중기 추세\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기선\u003c/td\u003e\n\u003ctd\u003e120일, 200일\u003c/td\u003e\n\u003ctd\u003e장기 추세\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e한국 시장 특성\u003c/strong\u003e: 국내 증권사 HTS는 주로 5·20·60·120일선을 기본 세팅으로 제공한다. 미국 시장에서는 50일·200일선을 더 많이 사용한다는 점을 알아두자.\u003c/p\u003e\n\u003ch3\u003e이동평균선의 정배열과 역배열\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e정배열\u003c/strong\u003e: 5일 \u003e 20일 \u003e 60일 \u003e 120일 순서로 위에서 아래로 배치. 강한 상승 추세.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e역배열\u003c/strong\u003e: 120일 \u003e 60일 \u003e 20일 \u003e 5일 순서. 강한 하락 추세.\u003c/li\u003e\n\u003cli\u003e정배열에서 눌림목(단기선이 중기선에 닿는 시점)은 추가 매수 기회로 활용한다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e골든크로스 / 데드크로스\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e골든크로스\u003c/strong\u003e: 단기선이 장기선을 \u003cstrong\u003e위로\u003c/strong\u003e 돌파 → 매수 신호\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e데드크로스\u003c/strong\u003e: 단기선이 장기선을 \u003cstrong\u003e아래로\u003c/strong\u003e 돌파 → 매도 신호\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e실전 수치 예시\u003c/strong\u003e: 20일선이 60일선을 상향 돌파하는 골든크로스가 발생하면, 통계적으로 이후 20거래일 내 추가 상승 확률이 약 55~60%다. 하지만 횡보장에서는 골든크로스와 데드크로스가 반복되며 \u003cstrong\u003e휩소(Whipsaw)\u003c/strong\u003e 현상이 잦다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e이동평균선은 후행 지표라 실제 전환점보다 늦게 신호가 온다. 다른 지표와 함께 사용할 것.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e이동평균선의 한계\u003c/h3\u003e\n\u003cp\u003e이동평균선만으로 매매하면 횡보 구간에서 지속적인 손실이 발생한다. 상승 추세가 확립된 종목에서만 골든크로스를 매수 신호로 활용하고, 횡보 구간에서는 다른 전략을 사용할 것.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e거래량\u003c/h2\u003e\n\u003cp\u003e가격 움직임의 신뢰도를 확인하는 핵심 지표. \"거래량은 주가에 선행한다\"는 격언이 있을 만큼 중요하다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e가격 상승 + 거래량 증가\u003c/strong\u003e → 신뢰도 높은 상승 (매수세 강함)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가격 상승 + 거래량 감소\u003c/strong\u003e → 상승 모멘텀 약화 가능성\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가격 하락 + 거래량 폭증\u003c/strong\u003e → 투매. 이후 반등 가능성 있음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가격 하락 + 거래량 감소\u003c/strong\u003e → 눌림목일 수 있음 (추세 유지)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e거래량 분석의 심화\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eOBV(On-Balance Volume)\u003c/strong\u003e: 상승일의 거래량은 더하고 하락일의 거래량은 빼서 누적한 지표. 주가가 횡보해도 OBV가 꾸준히 상승하면 세력 매집 중일 가능성이 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e거래량 이상 급증 주의\u003c/strong\u003e: 일평균 거래량의 5배 이상이 단 하루 터지는 경우, 세력의 고점 물량 소화(매도)일 수 있다. 이후 주가가 당일 종가 아래로 내려오면 추가 하락 가능성이 높다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e코스닥 거래량 왜곡 주의\u003c/strong\u003e: 코스닥 소형주는 시장조성자나 세력이 거래량을 인위적으로 만드는 경우가 있다. 거래량이 갑자기 급증해도 매수 주체(외국인·기관·개인)를 반드시 확인할 것.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eRSI (상대강도지수)\u003c/h2\u003e\n\u003cp\u003e0~100 범위의 모멘텀 지표. 과매수/과매도 판단.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eRSI\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e - (\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e / (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e + RS))\n\u003cspan class=\"hljs-attr\"\u003eRS\u003c/span\u003e = N일간 평균 상승 종가 / N일간 평균 하락 종가 (기본값: N=\u003cspan class=\"hljs-number\"\u003e14\u003c/span\u003e)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구간\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e70 이상\u003c/td\u003e\n\u003ctd\u003e과매수 → 조정 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e30 이하\u003c/td\u003e\n\u003ctd\u003e과매도 → 반등 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50 기준선\u003c/td\u003e\n\u003ctd\u003e추세 방향 판단\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e실전 활용 심화\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRSI 50을 중심선으로 상승 추세에서는 40\u003cdel\u003e80 범위에서 진동하고, 하락 추세에서는 20\u003c/del\u003e60 범위에서 진동하는 경향이 있다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e강한 상승 추세\u003c/strong\u003e에서는 RSI가 70을 넘어도 하락하지 않고 80~90까지 올라가는 경우가 있다. 과매수라고 무조건 매도하지 말 것.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e강한 하락 추세\u003c/strong\u003e에서는 RSI 30 이하가 지속될 수 있다. \"바닥인 줄 알고 샀다가 더 떨어지는\" 함정.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003eRSI 다이버전스 (Divergence)\u003c/h3\u003e\n\u003cp\u003e차트 분석에서 가장 강력한 신호 중 하나. 주가와 RSI가 서로 다른 방향을 가리킬 때 발생한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e강세 다이버전스(Bullish Divergence)\u003c/strong\u003e — 하락 반전 예고\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e주가:  저점1 → (더 낮은) 저점2  ↘ (주가는 계속 하락)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003eRSI:   저점1 → (더 높은) 저점2  ↗ (RSI는 올라감)\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003e주가는 더 낮은 저점을 만드는데 RSI는 더 높은 저점을 형성\u003c/li\u003e\n\u003cli\u003e매도세가 약화되고 있다는 신호. 바닥 확인 후 매수 기회.\u003c/li\u003e\n\u003cli\u003e예시: 2022년 하반기 코스피 저점 구간에서 다수 종목에 강세 다이버전스 출현.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e약세 다이버전스(Bearish Divergence)\u003c/strong\u003e — 상승 반전 예고\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e주가:  고점1 → (더 높은) 고점2  ↗ (주가는 계속 상승)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003eRSI:   고점1 → (더 낮은) 고점2  ↘ (RSI는 내려감)\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003e주가는 더 높은 고점을 만드는데 RSI는 더 낮은 고점을 형성\u003c/li\u003e\n\u003cli\u003e매수 모멘텀이 약화되고 있다는 신호. 고점 매도 후보.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e다이버전스 주의사항\u003c/strong\u003e: 다이버전스 신호가 발생해도 즉시 반전하지 않고 1~2주 더 기존 추세가 지속될 수 있다. 다이버전스는 \"언젠가 반전한다\"는 경고이지 \"지금 당장 반전한다\"는 신호가 아니다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003eMACD (이동평균 수렴·확산 지수)\u003c/h2\u003e\n\u003cp\u003e기술적 분석에서 RSI와 함께 가장 널리 쓰이는 모멘텀 지표. 단기 이동평균과 장기 이동평균의 차이로 추세의 강도와 방향을 동시에 파악한다.\u003c/p\u003e\n\u003ch3\u003e계산 공식\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eMACD 선     = \u003cspan class=\"hljs-built_in\"\u003eEMA\u003c/span\u003e(\u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e) - \u003cspan class=\"hljs-built_in\"\u003eEMA\u003c/span\u003e(\u003cspan class=\"hljs-number\"\u003e26\u003c/span\u003e)   ← 단기 - 장기 지수이동평균\n시그널 선   = MACD 선의 \u003cspan class=\"hljs-built_in\"\u003eEMA\u003c/span\u003e(\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e)    ← MACD의 \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e일 이동평균\n히스토그램  = MACD 선 - 시그널 선 ← 막대그래프로 표시\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eEMA(Exponential Moving Average)는 최근 값에 더 많은 가중치를 주는 이동평균이다.\u003c/p\u003e\n\u003ch3\u003eMACD 매매 신호\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e신호\u003c/th\u003e\n\u003cth\u003e조건\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e매수 신호\u003c/td\u003e\n\u003ctd\u003eMACD 선이 시그널 선을 상향 돌파\u003c/td\u003e\n\u003ctd\u003e단기 모멘텀이 장기보다 강해짐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e매도 신호\u003c/td\u003e\n\u003ctd\u003eMACD 선이 시그널 선을 하향 이탈\u003c/td\u003e\n\u003ctd\u003e단기 모멘텀이 장기보다 약해짐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e강세\u003c/td\u003e\n\u003ctd\u003eMACD 선과 시그널 선이 모두 0선 위\u003c/td\u003e\n\u003ctd\u003e중장기 상승 추세 유지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e약세\u003c/td\u003e\n\u003ctd\u003eMACD 선과 시그널 선이 모두 0선 아래\u003c/td\u003e\n\u003ctd\u003e중장기 하락 추세 유지\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e히스토그램 활용\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e히스토그램이 0선 위에서 점점 커짐 → 상승 모멘텀 강화\u003c/li\u003e\n\u003cli\u003e히스토그램이 0선 위에서 점점 작아짐 → 상승 모멘텀 약화 (고점 경고)\u003c/li\u003e\n\u003cli\u003e히스토그램이 0선 아래에서 점점 작아짐 (음수값이 줄어듦) → 하락 모멘텀 약화 (바닥 경고)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eMACD 다이버전스\u003c/h3\u003e\n\u003cp\u003eRSI와 마찬가지로 MACD도 다이버전스를 활용할 수 있다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e강세 다이버전스\u003c/strong\u003e: 주가는 더 낮은 저점인데 MACD 히스토그램은 더 높은 저점 → 하락 추세 약화\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e약세 다이버전스\u003c/strong\u003e: 주가는 더 높은 고점인데 MACD 히스토그램은 더 낮은 고점 → 상승 추세 약화\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003eMACD의 한계\u003c/strong\u003e: MACD도 후행 지표다. 횡보 구간에서는 신호가 자주 바뀌며 휩소가 발생한다. 일봉 MACD보다 주봉 MACD 신호가 더 신뢰도가 높다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e볼린저 밴드\u003c/h2\u003e\n\u003cp\u003e이동평균선(중심선) ± 표준편차 2배로 상·하단 밴드 형성.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e중심선 = \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e일 단순이동평균(SMA)\n상단 밴드 = 중심선 + (표준편차 × \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e)\n하단 밴드 = 중심선 - (표준편차 × \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e통계적으로 주가의 약 95%가 밴드 안에 위치한다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e밴드 수축(스퀴즈)\u003c/strong\u003e → 변동성 감소, 곧 큰 움직임 예고 (방향은 알 수 없음)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e밴드 확장\u003c/strong\u003e → 변동성 증가\u003c/li\u003e\n\u003cli\u003e주가가 \u003cstrong\u003e상단 밴드 터치\u003c/strong\u003e → 과매수 구간 (단, 강한 추세장에서는 밴드를 타고 계속 상승 가능)\u003c/li\u003e\n\u003cli\u003e주가가 \u003cstrong\u003e하단 밴드 터치\u003c/strong\u003e → 과매도 구간, 반등 주목\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e볼린저 밴드 밴드워크(Bandwalk)\u003c/h3\u003e\n\u003cp\u003e강한 상승 추세에서 주가가 상단 밴드를 타고 계속 올라가는 현상. 이때 상단 밴드 터치를 매도 신호로 오해하면 큰 수익을 놓친다. 반대로 강한 하락 추세에서는 하단 밴드를 타고 계속 하락하는 밴드워크가 발생한다.\u003c/p\u003e\n\u003ch3\u003e%B와 밴드폭(Bandwidth) 지표\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e%B\u003c/strong\u003e: 현재 주가가 밴드 내 어느 위치에 있는지 0~1로 수치화. 1 이상이면 상단 밴드 돌파, 0 이하면 하단 밴드 이탈.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e밴드폭\u003c/strong\u003e: (상단 - 하단) / 중심선. 이 값이 역대 최저 수준에 도달하면 대형 이벤트(급등 또는 급락) 임박 신호.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e멀티 타임프레임(MTF) 분석\u003c/h2\u003e\n\u003cp\u003e같은 종목을 여러 시간 단위 차트로 보는 것. 단일 시간 단위만 보면 \"숲을 보지 못하고 나무만 보는\" 실수를 한다.\u003c/p\u003e\n\u003ch3\u003e타임프레임 계층 구조\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e타임프레임\u003c/th\u003e\n\u003cth\u003e역할\u003c/th\u003e\n\u003cth\u003e대상\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e월봉\u003c/td\u003e\n\u003ctd\u003e초장기 추세 파악, 대세 상승/하락 판단\u003c/td\u003e\n\u003ctd\u003e장기 투자자\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주봉\u003c/td\u003e\n\u003ctd\u003e중기 추세 파악, 매수·매도 구간 설정\u003c/td\u003e\n\u003ctd\u003e스윙 트레이더\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e일봉\u003c/td\u003e\n\u003ctd\u003e단기 추세, 구체적 진입·청산 시점\u003c/td\u003e\n\u003ctd\u003e대부분의 투자자\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e60분봉\u003c/td\u003e\n\u003ctd\u003e단기 매매 타이밍\u003c/td\u003e\n\u003ctd\u003e단기 트레이더\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003eMTF 분석 실전 절차\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e월봉으로 대세 확인\u003c/strong\u003e: 장기 이동평균선(120개월선) 위에 있는가? 장기 상승 추세인가?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주봉으로 중기 추세 확인\u003c/strong\u003e: 주봉 20주선 방향은? 지지·저항 구간은 어디인가?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e일봉으로 매수 시점 포착\u003c/strong\u003e: 주봉에서 지지 구간으로 확인된 가격대에서 일봉 반전 패턴(망치형, 잉걸핌 등)이 나오는가?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e타임프레임 충돌\u003c/h3\u003e\n\u003cp\u003e일봉이 매수 신호인데 주봉이 하락 추세라면 → \u003cstrong\u003e주봉(상위 프레임)을 우선\u003c/strong\u003e한다. 상위 타임프레임의 추세에 역행하는 단기 매수는 반등 매매에 그칠 가능성이 높다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 예시\u003c/strong\u003e: 2022년 하락장에서 일봉으로는 매수 신호가 수십 번 발생했지만, 주봉·월봉이 역배열 상태였기 때문에 단기 반등 후 재하락이 반복됐다. MTF 분석 없이 일봉만 보고 매수했다면 물리기 쉬운 환경이었다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e기술적 분석의 한계와 유의사항\u003c/h2\u003e\n\u003ch3\u003e자기실현적 예언(Self-Fulfilling Prophecy)\u003c/h3\u003e\n\u003cp\u003e기술적 분석이 어느 정도 작동하는 이유 중 하나는 많은 투자자가 같은 차트를 보고 같은 시점에 매수·매도하기 때문이다. 골든크로스에서 다수가 매수하면 실제로 가격이 오르고, 이것이 패턴의 유효성을 강화하는 순환 구조다.\u003c/p\u003e\n\u003cp\u003e역으로, 이 성질 때문에 세력(큰 자금)은 기술적 분석 투자자를 역이용하기도 한다. 지지선을 살짝 이탈시켜 개인 투자자의 손절을 유발한 후 다시 올리는 \"흔들기\" 전략이 대표적이다.\u003c/p\u003e\n\u003ch3\u003e차트 분석이 효과 있는 조건\u003c/h3\u003e\n\u003cp\u003e기술적 분석은 모든 종목에 동일하게 적용되지 않는다. 다음 조건이 충족된 종목에서 신뢰도가 높다:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e조건\u003c/th\u003e\n\u003cth\u003e기준\u003c/th\u003e\n\u003cth\u003e이유\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e충분한 거래량\u003c/td\u003e\n\u003ctd\u003e일평균 거래대금 10억원 이상\u003c/td\u003e\n\u003ctd\u003e거래량이 적으면 패턴이 쉽게 왜곡됨\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e시가총액\u003c/td\u003e\n\u003ctd\u003e코스피 1,000억원 이상 권장\u003c/td\u003e\n\u003ctd\u003e세력에 의한 인위적 패턴 형성 가능성 낮음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e분석 기간\u003c/td\u003e\n\u003ctd\u003e최소 1~2년 이상 데이터\u003c/td\u003e\n\u003ctd\u003e통계적 유효성 확보\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유동주식 비율\u003c/td\u003e\n\u003ctd\u003e30% 이상\u003c/td\u003e\n\u003ctd\u003e대주주 지분이 지나치게 높으면 유통 물량 부족\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e코스닥 소형주(시가총액 300억원 미만)는 거래량이 적고 세력의 영향이 크기 때문에, 기술적 분석 신뢰도가 대형주 대비 현저히 낮다.\u003c/p\u003e\n\u003ch3\u003e시장 전체 상황 우선\u003c/h3\u003e\n\u003cp\u003e개별 종목이 아무리 좋은 차트를 보여도, 코스피가 전면적 하락장일 때는 대부분의 종목이 같이 떨어진다. 기술적 분석 전에 반드시 시장 전체의 방향(코스피 지수 차트, 공포탐욕지수, VIX 변동성 지수)을 먼저 확인할 것.\u003c/p\u003e\n\u003ch3\u003e뉴스·공시의 차트 무력화\u003c/h3\u003e\n\u003cp\u003e실적 서프라이즈, 대규모 유상증자, 임원 횡령, 최대주주 변경 등 기업의 근본을 바꾸는 이벤트는 차트 패턴을 하루아침에 무력화한다. 차트는 기업 내부 정보가 시장에 반영되는 속도를 따라가지 못한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 체크리스트\u003c/h2\u003e\n\u003cp\u003e차트 분석 시 순서:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e시장 전체 방향 확인\u003c/strong\u003e — 코스피/코스닥 지수 일봉·주봉 추세\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e멀티 타임프레임 확인\u003c/strong\u003e — 월봉 → 주봉 → 일봉 순서로 추세 파악\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e추세 확인\u003c/strong\u003e — 장기선(120일) 기준 상승/하락/횡보. 정배열/역배열 여부\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e지지·저항 확인\u003c/strong\u003e — 전고점·전저점, 이동평균선, 52주 신고가 여부\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e거래량 확인\u003c/strong\u003e — 가격 움직임과 거래량 방향 일치 여부. 평소 대비 몇 배인가\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e모멘텀 확인\u003c/strong\u003e — RSI 위치 및 다이버전스 여부, MACD 골든/데드크로스, 0선 위치\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e변동성 확인\u003c/strong\u003e — 볼린저 밴드 수축·확장 구간. 스퀴즈 발생 여부\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e캔들 패턴 확인\u003c/strong\u003e — 지지·저항 구간에서 반전 패턴(잉걸핌, 샛별, 도지 등) 출현 여부\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e차트는 과거 데이터 기반이므로 미래를 보장하지 않는다. 기업 펀더멘털 분석과 반드시 병행해야 한다. 기술적 분석은 진입 타이밍을 잡는 도구이지, 어떤 종목을 살지 결정하는 도구가 아니다.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3x
