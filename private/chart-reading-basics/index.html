p\u003e\n\u003cp\u003e\u003cstrong\u003e도지\u003c/strong\u003e — 시가 ≈ 종가. 몸통이 거의 없음. 방향 전환 신호 가능성.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e망치형\u003c/strong\u003e — 아랫꼬리가 길고 몸통이 작음. 하락 후 지지 신호.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e이동평균선 (MA)\u003c/h2\u003e\n\u003cp\u003e과거 N일간 종가의 평균을 이은 선. 추세 방향과 지지/저항 확인에 사용.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e선\u003c/th\u003e\n\u003cth\u003e기간\u003c/th\u003e\n\u003cth\u003e용도\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e단기선\u003c/td\u003e\n\u003ctd\u003e5일, 20일\u003c/td\u003e\n\u003ctd\u003e단기 추세\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e중기선\u003c/td\u003e\n\u003ctd\u003e60일\u003c/td\u003e\n\u003ctd\u003e중기 추세\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기선\u003c/td\u003e\n\u003ctd\u003e120일, 200일\u003c/td\u003e\n\u003ctd\u003e장기 추세\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e골든크로스 / 데드크로스\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e골든크로스\u003c/strong\u003e: 단기선이 장기선을 \u003cstrong\u003e위로\u003c/strong\u003e 돌파 → 매수 신호\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e데드크로스\u003c/strong\u003e: 단기선이 장기선을 \u003cstrong\u003e아래로\u003c/strong\u003e 돌파 → 매도 신호\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e이동평균선은 후행 지표라 실제 전환점보다 늦게 신호가 온다. 다른 지표와 함께 사용할 것.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e거래량\u003c/h2\u003e\n\u003cp\u003e가격 움직임의 신뢰도를 확인하는 핵심 지표.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e가격 상승 + 거래량 증가\u003c/strong\u003e → 신뢰도 높은 상승 (매수세 강함)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가격 상승 + 거래량 감소\u003c/strong\u003e → 상승 모멘텀 약화 가능성\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가격 하락 + 거래량 폭증\u003c/strong\u003e → 투매. 이후 반등 가능성 있음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가격 하락 + 거래량 감소\u003c/strong\u003e → 눌림목일 수 있음 (추세 유지)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003eRSI (상대강도지수)\u003c/h2\u003e\n\u003cp\u003e0~100 범위의 모멘텀 지표. 과매수/과매도 판단.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eRSI\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e - (\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e / (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e + RS))\n\u003cspan class=\"hljs-attr\"\u003eRS\u003c/span\u003e = 평균 상승폭 / 평균 하락폭\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구간\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e70 이상\u003c/td\u003e\n\u003ctd\u003e과매수 → 조정 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e30 이하\u003c/td\u003e\n\u003ctd\u003e과매도 → 반등 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50 기준선\u003c/td\u003e\n\u003ctd\u003e추세 방향 판단\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e볼린저 밴드\u003c/h2\u003e\n\u003cp\u003e이동평균선(중심선) ± 표준편차 2배로 상·하단 밴드 형성.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e밴드 수축 (스퀴즈)\u003c/strong\u003e → 변동성 감소, 곧 큰 움직임 예고\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e밴드 확장\u003c/strong\u003e → 변동성 증가\u003c/li\u003e\n\u003cli\u003e주가가 \u003cstrong\u003e상단 밴드 터치\u003c/strong\u003e → 과매수 구간\u003c/li\u003e\n\u003cli\u003e주가가 \u003cstrong\u003e하단 밴드 터치\u003c/strong\u003e → 과매도 구간, 반등 주목\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 체크리스트\u003c/h2\u003e\n\u003cp\u003e차트 분석 시 순서:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e추세 확인\u003c/strong\u003e — 장기선(120일) 기준 상승/하락/횡보\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e지지·저항 확인\u003c/strong\u003e — 전고점·전저점, 이동평균선\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e거래량 확인\u003c/strong\u003e — 가격 움직임과 거래량 방향 일치 여부\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e모멘텀 확인\u003c/strong\u003e — RSI 위치, 골든/데드크로스 여부\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e변동성 확인\u003c/strong\u003e — 볼린저 밴드 수축·확장 구간\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e차트는 과거 데이터 기반이므로 미래를 보장하지 않는다. 기업 펀더멘털 분석과 병행해야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$L10\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L11\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"주식 차트 보는 법 기초\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$12\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"13:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\na:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"주식 차트 보는 법 기초 | midasworld (Private)\"}],[\"$\",\"meta\",\
