\u003e\n\u003ctd\u003e적정. 성장과 배당 균형\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50~70%\u003c/td\u003e\n\u003ctd\u003e높은 편. 성숙 기업\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e70% 이상\u003c/td\u003e\n\u003ctd\u003e과도. 이익 감소 시 배당 삭감 위험\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e100% 초과\u003c/td\u003e\n\u003ctd\u003e이익보다 많은 배당 → 지속 불가능\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e배당 커버리지\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e배당 커버리지 = EPS / DPS (주당배당금)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e2배 이상이면 배당이 안정적이라고 볼 수 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e배당 관련 날짜\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e날짜\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당락일\u003c/td\u003e\n\u003ctd\u003e이 날 이후 매수하면 이번 배당 못 받음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e기준일\u003c/td\u003e\n\u003ctd\u003e배당 받을 주주 확정 날짜\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e지급일\u003c/td\u003e\n\u003ctd\u003e실제 배당금이 계좌에 들어오는 날\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e배당락일 전날까지\u003c/strong\u003e 매수해야 배당을 받을 수 있다.\n한국은 보통 12월 결산법인 기준 12월 말이 배당락.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e배당주 고르는 기준\u003c/h2\u003e\n\u003ch3\u003e1단계: 배당 지속성 확인\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e최근 5~10년간 배당을 꾸준히 지급했는가?\u003c/li\u003e\n\u003cli\u003e배당을 삭감하거나 중단한 적이 있는가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e2단계: 재무 안정성 확인\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e부채비율 100% 이하\u003c/li\u003e\n\u003cli\u003e영업이익이 안정적으로 나오는 기업\u003c/li\u003e\n\u003cli\u003e배당성향 70% 이하\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e3단계: 배당성장 확인\u003c/h3\u003e\n\u003cp\u003e단순히 배당이 높은 것보다 \u003cstrong\u003e배당이 매년 늘어나는\u003c/strong\u003e 기업이 더 좋다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e5년 전 배당금: 500원\n현재 배당금: 800원\n→ 5년간 60% 성장, 연평균 약 10% 성장\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e4단계: 고배당의 함정 주의\u003c/h3\u003e\n\u003cp\u003e배당수익률이 비정상적으로 높으면 (8% 이상) 의심해야 한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e배당수익률이 높은 이유\n① 배당금을 많이 준다 (좋음)\n② 주가가 많이 떨어졌다 (나쁨)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e주가가 폭락해서 배당수익률이 올라간 경우가 많다. 배당을 받아도 주가 손실이 더 클 수 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e한국 배당주 특징\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e대부분 \u003cstrong\u003e연 1회\u003c/strong\u003e 배당 (12월 결산)\u003c/li\u003e\n\u003cli\u003e배당금이 \u003cstrong\u003e미국에 비해 낮은\u003c/strong\u003e 편 (코스피 평균 2~3%)\u003c/li\u003e\n\u003cli\u003e금융주(은행, 보험)와 통신주(KT, SKT)가 상대적 고배당\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2\u003e미국 배당주 특징\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e분기 배당\u003c/strong\u003e (3개월마다) 일반적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e배당 귀족주\u003c/strong\u003e: 25년 이상 연속 배당 증가 기업\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e배당 킹\u003c/strong\u003e: 50년 이상 연속 배당 증가 기업\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e미국 배당 귀족주 예시\n\u003cspan class=\"hljs-deletion\"\u003e- 코카콜라 (KO): 60년 이상 배당 증가\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 존슨앤존슨 (JNJ): 60년 이상\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 3M (MMM): 60년 이상\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e배당 재투자 (DRIP) 효과\u003c/h2\u003e\n\u003cp\u003e받은 배당금으로 같은 주식을 계속 매수하면 복리 효과 발생.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e만원 투자, 배당수익률 \u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e, \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년간 배당 재투자\n\n단순 보유 (주가 변동 없음): \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년 후 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e만원\n배당 재투자:  \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년 후 약 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e480\u003c/span\u003e만원 (\u003cspan class=\"hljs-number\"\u003e48%\u003c/span\u003e 증가)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e기간이 길어질수록 복리 효과가 극적으로 커진다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e배당소득세\u003c/h2\u003e\n\u003cp\u003e한국 기준으로 배당소득에는 \u003cstrong\u003e15.4% 원천징수\u003c/strong\u003e (지방세 포함).\u003c/p\u003e\n\u003cp\u003e금융소득(이자+배당)이 연 2,000만원을 초과하면 \u003cstrong\u003e금융소득 종합과세\u003c/strong\u003e 대상이 된다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$L10\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L11\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"배당주 투자 기초\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$12\
