\n→ 기업 투자·소비 증가\n→ 주식 상대적 매력 증가\n→ 주가에 긍정적\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e장단기 금리차 (Yield Curve)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e장기금리(\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년) - 단기금리(\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e년)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상태\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e플러스 (정상)\u003c/td\u003e\n\u003ctd\u003e경제 성장 기대\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e역전 (마이너스)\u003c/td\u003e\n\u003ctd\u003e경기침체 예고 신호\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e미국에서 장단기 금리차 역전 후 평균 12~18개월 내 경기침체가 온 역사적 패턴.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e환율과 주식\u003c/h2\u003e\n\u003ch3\u003e원/달러 환율 상승 (원화 약세)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e수출주 유리\u003c/strong\u003e: 삼성전자, 현대차 등 수출 기업은 달러 수입이 원화로 환산 시 더 많아짐\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e수입주 불리\u003c/strong\u003e: 원자재를 달러로 수입하는 기업은 원가 상승\u003c/li\u003e\n\u003cli\u003e외국인 투자자는 원화 자산 가치 하락으로 매도 경향\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e원/달러 환율 하락 (원화 강세)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e수출주 불리\u003c/strong\u003e: 환산 이익 감소\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e내수주 유리\u003c/strong\u003e: 수입 물가 하락\u003c/li\u003e\n\u003cli\u003e외국인 자금 유입 경향\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e경기 사이클과 업종\u003c/h2\u003e\n\u003cp\u003e경제는 \u003cstrong\u003e회복 → 호황 → 후퇴 → 침체\u003c/strong\u003e 의 사이클을 반복.\n각 국면에서 유리한 업종이 다르다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e사이클\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e유리한 업종\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e회복기\u003c/td\u003e\n\u003ctd\u003e금리 낮음, 소비 시작\u003c/td\u003e\n\u003ctd\u003e금융, 소재, IT\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e호황기\u003c/td\u003e\n\u003ctd\u003e고성장, 고물가\u003c/td\u003e\n\u003ctd\u003e에너지, 원자재, 산업재\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e후퇴기\u003c/td\u003e\n\u003ctd\u003e성장 둔화, 긴축\u003c/td\u003e\n\u003ctd\u003e필수소비재, 헬스케어\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e침체기\u003c/td\u003e\n\u003ctd\u003e경기 악화, 금리 하락\u003c/td\u003e\n\u003ctd\u003e채권, 유틸리티, 금\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e주요 경제 지표\u003c/h2\u003e\n\u003ch3\u003e미국 지표 (글로벌 영향 큼)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지표\u003c/th\u003e\n\u003cth\u003e발표 주기\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eCPI (소비자물가지수)\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e인플레이션 수준 → 금리 방향 결정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e실업률\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e노동시장 건강도\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGDP 성장률\u003c/td\u003e\n\u003ctd\u003e분기\u003c/td\u003e\n\u003ctd\u003e경제 성장 속도\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eISM 제조업 PMI\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e50 이상이면 확장, 이하면 수축\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFOMC 회의\u003c/td\u003e\n\u003ctd\u003e연 8회\u003c/td\u003e\n\u003ctd\u003e기준금리 결정\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e한국 지표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지표\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e한국은행 기준금리\u003c/td\u003e\n\u003ctd\u003e국내 금리 기준\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e수출 증감률\u003c/td\u003e\n\u003ctd\u003e한국 경제 바로미터 (수출주도형)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e외국인 순매수/순매도\u003c/td\u003e\n\u003ctd\u003e코스피 방향성 영향 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e공포·탐욕 지수\u003c/h2\u003e\n\u003cp\u003e시장 심리를 나타내는 지표들.\u003c/p\u003e\n\u003ch3\u003eVIX (변동성 지수, 공포 지수)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eS\u0026#x26;P 500 옵션의 내재 변동성을 나타냄\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e20 이하\u003c/strong\u003e: 시장 안정, 낙관적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e30 이상\u003c/strong\u003e: 시장 불안, 공포\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e40 이상\u003c/strong\u003e: 극단적 공포 → 역발상 매수 기회일 수 있음\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e버핏 지수\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e버핏 지수 = 전체 주식시장 시가총액 / GDP × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e수준\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e75% 이하\u003c/td\u003e\n\u003ctd\u003e저평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e75~100%\u003c/td\u003e\n\u003ctd\u003e적정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e100~125%\u003c/td\u003e\n\u003ctd\u003e고평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e125% 이상\u003c/td\u003e\n\u003ctd\u003e매우 고평가 (버블 경고)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e거시 환경 체크 순서\u003c/h2\u003e\n\u003cp\u003e주식 투자 전 거시 환경 파악 순서:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e금리 방향\u003c/strong\u003e — 인상 사이클인가, 인하 사이클인가?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e경기 국면\u003c/strong\u003e — 회복/호황/후퇴/침체 중 어디인가?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e환율\u003c/strong\u003e — 원화 강세/약세 추세?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e외국인 수급\u003c/strong\u003e — 최근 외국인이 사는가, 파는가?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e시장 심리\u003c/strong\u003e — VIX, 공포탐욕 지수 수준?\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e거시 분석은 투자 시기와 업종 선택에 참고하되, 개별 기업 분석을 대체하지는 않는다.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"경제 지표와 주식시장\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"경제 지표와 주식시장 | midaswo
