치는 거시 변수.\u003c/p\u003e\n\u003ch3\u003e금리 인상의 영향\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e금리 인상\n→ 예금·채권 매력 상승\n→ 주식 매력 상대적 감소\n→ 기업 대출 이자 부담 증가 → 이익 감소\n→ 주가에 부정적\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e특히 \u003cstrong\u003e성장주(고PER)\u003c/strong\u003e 에 타격이 크다. 성장주의 가치는 먼 미래 이익의 현재가치인데, 금리 상승 시 할인율이 올라가 현재가치가 줄어들기 때문.\u003c/p\u003e\n\u003ch3\u003e금리 인하의 영향\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e금리 인하\n→ 대출 이자 부담 완화\n→ 기업 투자·소비 증가\n→ 주식 상대적 매력 증가\n→ 주가에 긍정적\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e장단기 금리차 (Yield Curve)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e장기금리(\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년) - 단기금리(\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e년)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상태\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e플러스 (정상)\u003c/td\u003e\n\u003ctd\u003e경제 성장 기대\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e역전 (마이너스)\u003c/td\u003e\n\u003ctd\u003e경기침체 예고 신호\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e미국에서 장단기 금리차 역전 후 평균 12~18개월 내 경기침체가 온 역사적 패턴.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e연준(Fed) 금리 결정 메커니즘과 점도표\u003c/h2\u003e\n\u003ch3\u003eFOMC 구조\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e연방공개시장위원회(FOMC): 연 8회 개최 (1월·3월·5월·6월·7월·9월·10월·12월)\u003c/li\u003e\n\u003cli\u003e투표권: Fed 의장 + 부의장 + 이사회 5인 + 지역 연방준비은행 총재 순환 12명\u003c/li\u003e\n\u003cli\u003e결정 방식: 다수결. 만장일치가 아닌 경우 소수 의견이 향후 방향 힌트\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e금리 결정 기준\u003c/h3\u003e\n\u003cp\u003e연준의 이중 책무(Dual Mandate):\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e물가 안정\u003c/strong\u003e: PCE 물가 2% 목표\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e완전고용\u003c/strong\u003e: 실업률 4~4.5% 목표\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e인플레이션 고(高) + 고용 강(强) → 금리 인상 압력\n인플레이션 저(低) + 고용 약(弱) → 금리 인하 압력\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e점도표(Dot Plot) 읽는 법\u003c/h3\u003e\n\u003cp\u003e점도표는 FOMC 위원 각자가 향후 금리를 어느 수준으로 예상하는지를 점으로 표시한 차트. 분기(3·6·9·12월 FOMC)에 공개.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e읽는 순서:\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 올해 연말 점의 중앙값 → 현재 사이클의 최종 금리 방향\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 내년·후년 점의 분포 → 인하/동결 시기 컨센서스\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 점의 분산도 → 위원 간 견해 차이 (분산 클수록 불확실성 高)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e활용법:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e시장 금리 선물(Fed Funds Futures)과 점도표의 괴리를 비교\u003c/li\u003e\n\u003cli\u003e시장이 점도표보다 더 많은 인하를 기대한다면 → 실망 리스크 존재\u003c/li\u003e\n\u003cli\u003e시장이 점도표보다 인하를 덜 기대한다면 → 서프라이즈 가능성\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e주의:\u003c/strong\u003e 점도표는 예측이 아니라 현재 시점의 전망이다. 경제 데이터에 따라 3개월 만에 완전히 뒤집히는 경우가 빈번하다. 2021~2022년 연준의 \"인플레이션은 일시적(Transitory)\" 발언 후 50년 만에 가장 빠른 금리 인상이 이어진 것이 대표적 사례.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e인플레이션의 종류와 주가 영향\u003c/h2\u003e\n\u003ch3\u003e수요 인플레이션 (Demand-Pull Inflation)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e경제 과열 → 수요 급증 → 물가 상승\n→ 기업 매출/이익 증가 (가격 전가 가능)\n→ 초기에는 주가에 긍정적\n→ 금리 인상으로 대응 → 중기에는 부정적\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e대표 시기:\u003c/strong\u003e 2021년 코로나 이후 보복 소비 + 재정 부양 결합\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e유리한 섹터:\u003c/strong\u003e 에너지, 원자재, 금융 (초기 단계)\u003c/p\u003e\n\u003ch3\u003e비용 인플레이션 (Cost-Push Inflation)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e공급망 충격, 원자재 가격 급등 → 기업 원가 상승\n→ 가격 전가 어려우면 이익 감소\n→ 스태그플레이션(저성장+고물가) 우려\n→ 주가에 매우 부정적\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e대표 시기:\u003c/strong\u003e 2022년 러시아-우크라이나 전쟁 → 에너지·식료품 급등\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e유리한 섹터:\u003c/strong\u003e 에너지, 원자재 생산업체 (원가 수혜자)\n\u003cstrong\u003e불리한 섹터:\u003c/strong\u003e 항공, 화학, 식품, 소비재 (원가 피해자)\u003c/p\u003e\n\u003ch3\u003e구조적 인플레이션 vs 일시적 인플레이션\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e원인\u003c/th\u003e\n\u003cth\u003e지속성\u003c/th\u003e\n\u003cth\u003e대응\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e일시적\u003c/td\u003e\n\u003ctd\u003e공급망 병목, 기저효과\u003c/td\u003e\n\u003ctd\u003e6~18개월\u003c/td\u003e\n\u003ctd\u003e관망\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e구조적\u003c/td\u003e\n\u003ctd\u003e임금-물가 악순환, 에너지 전환 비용\u003c/td\u003e\n\u003ctd\u003e수년\u003c/td\u003e\n\u003ctd\u003e금리 인상 지속\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e투자 함의:\u003c/strong\u003e 인플레이션이 수요에서 왔는지 비용에서 왔는지에 따라 섹터 배분 전략이 완전히 달라진다. 같은 \"물가 상승\"이라도 원인 진단 없이 투자 결정을 내리는 것은 금물이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003ePCE 물가지수 vs CPI\u003c/h2\u003e\n\u003ch3\u003eCPI (Consumer Price Index, 소비자물가지수)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e산정 기관:\u003c/strong\u003e 노동통계국(BLS)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가중치 고정:\u003c/strong\u003e 고정 바스켓 → 소비자 행동 변화 반영 느림\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주거비 비중:\u003c/strong\u003e 약 33% → 주거비가 높으면 CPI가 높게 나옴\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e발표:\u003c/strong\u003e 매월 중순\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003ePCE (Personal Consumption Expenditure, 개인소비지출 물가지수)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e산정 기관:\u003c/strong\u003e 상무부(BEA)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가중치 변동:\u003c/strong\u003e 소비자 행동 변화를 실시간 반영 (예: 소고기가 비싸지면 닭고기로 대체 반영)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주거비 비중:\u003c/strong\u003e 약 15% → CPI보다 낮음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e발표:\u003c/strong\u003e 매월 말\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e연준이 PCE를 선호하는 이유\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e같은 시기 측정 예시:\n\u003cspan class=\"hljs-attr\"\u003eCPI\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e3.5\u003c/span\u003e%  vs  PCE = \u003cspan class=\"hljs-number\"\u003e2.8\u003c/span\u003e%\n\n→ PCE가 더 낮게 나오는 경향\n→ 연준의 2% 목표 달성이 PCE 기준으로 더 빨리 가능\n→ 따라서 금리 인하 시점 판단 시 PCE가 더 중요한 지표\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e실전 활용:\u003c/strong\u003e FOMC 성명서에서 \"물가\"라고 언급할 때 기준은 PCE. 시장은 CPI에 단기 반응하지만 연준의 정책 방향은 PCE로 결정된다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심:\u003c/strong\u003e CPI 헤드라인이 높아도 PCE Core(에너지·식품 제외)가 안정적이라면 연준은 덜 공격적으로 반응할 수 있다. 반대로 CPI가 낮아도 PCE가 끈적하면(Sticky) 금리 인하 기대를 낮춰야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e환율과 주식\u003c/h2\u003e\n\u003ch3\u003e원/달러 환율 상승 (원화 약세)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e수출주 유리\u003c/strong\u003e: 삼성전자, 현대차 등 수출 기업은 달러 수입이 원화로 환산 시 더 많아짐\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e수입주 불리\u003c/strong\u003e: 원자재를 달러로 수입하는 기업은 원가 상승\u003c/li\u003e\n\u003cli\u003e외국인 투자자는 원화 자산 가치 하락으로 매도 경향\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e원/달러 환율 하락 (원화 강세)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e수출주 불리\u003c/strong\u003e: 환산 이익 감소\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e내수주 유리\u003c/strong\u003e: 수입 물가 하락\u003c/li\u003e\n\u003cli\u003e외국인 자금 유입 경향\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e달러 인덱스(DXY)와 신흥국 주식시장\u003c/h2\u003e\n\u003ch3\u003eDXY란?\u003c/h3\u003e\n\u003cp\u003e미국 달러 대비 6개 주요 통화(유로 57.6%, 엔 13.6%, 파운드 11.9%, 캐나다달러 9.1%, 크로나 4.2%, 스위스프랑 3.6%)의 가중 평균 환율 지수.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003eDXY 상승 = 달러 강세\nDXY 하락 = 달러 약세\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e신흥국 주식과의 관계\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e달러 강세(DXY 상승)\n→ 신흥국 통화 약세\n→ 외채 부담 증가 (달러 표시 부채 多)\n→ 외국인 자금 달러로 환류\n→ 신흥국 주식 및 채권 매도 압력\n→ 코스피, 이머징 인덱스 하락 경향\n\n달러 약세(DXY 하락)\n→ 신흥국 자산 매력 상승\n→ 외국인 자금 유입\n→ 신흥국 주가 상승 경향\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e한국 코스피와 DXY 상관관계\u003c/h3\u003e\n\u003cp\u003e역사적으로 DXY와 코스피는 \u003cstrong\u003e음(-)의 상관관계\u003c/strong\u003e를 보인다. 즉, 달러가 강해질수록 코스피는 약해지는 경향.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e실전 활용:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDXY가 100을 상회하고 상승 추세 → 외국인 매도 경계\u003c/li\u003e\n\u003cli\u003eDXY가 하락 전환 신호 → 이머징 비중 확대 검토\u003c/li\u003e\n\u003cli\u003e단, 달러 강세의 원인이 미국 경제 강세인지, 글로벌 위기 회피인지에 따라 해석이 달라짐\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e함정 주의:\u003c/strong\u003e \"달러 약세 = 무조건 신흥국 매수\"는 틀렸다. 달러 약세가 미국 경기 둔화에서 온다면 글로벌 수요도 줄어들어 신흥국 수출이 타격받는다. 달러 약세의 원인을 먼저 파악해야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e경기 사이클과 업종\u003c/h2\u003e\n\u003cp\u003e경제는 \u003cstrong\u003e회복 → 호황 → 후퇴 → 침체\u003c/strong\u003e 의 사이클을 반복.\n각 국면에서 유리한 업종이 다르다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e사이클\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e유리한 업종\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e회복기\u003c/td\u003e\n\u003ctd\u003e금리 낮음, 소비 시작\u003c/td\u003e\n\u003ctd\u003e금융, 소재, IT\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e호황기\u003c/td\u003e\n\u003ctd\u003e고성장, 고물가\u003c/td\u003e\n\u003ctd\u003e에너지, 원자재, 산업재\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e후퇴기\u003c/td\u003e\n\u003ctd\u003e성장 둔화, 긴축\u003c/td\u003e\n\u003ctd\u003e필수소비재, 헬스케어\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e침체기\u003c/td\u003e\n\u003ctd\u003e경기 악화, 금리 하락\u003c/td\u003e\n\u003ctd\u003e채권, 유틸리티, 금\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e원자재 가격과 경기 선행성\u003c/h2\u003e\n\u003ch3\u003e구리(Copper) — \"닥터 코퍼\"\u003c/h3\u003e\n\u003cp\u003e구리는 전기, 건설, 자동차, 가전 등 산업 전반에 사용되어 경기 선행지표로 불린다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e구리 가격 상승 → 산업 수요 증가 기대 → 경기 확장 신호\n구리 가격 하락 → 산업 수요 감소 우려 → 경기 둔화 신호\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e실전 활용:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e구리/금 비율(Copper/Gold Ratio): 상승 시 성장 기대, 하락 시 안전자산 선호\u003c/li\u003e\n\u003cli\u003e국내 관련주: 현대제철, LS, 풍산 등 소재/비철금속 업종\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e유가(WTI, 브렌트)\u003c/h3\u003e\n\u003cp\u003e유가는 단방향 지표가 아니라 원인을 먼저 봐야 한다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e유가 상승 원인\u003c/th\u003e\n\u003cth\u003e주식시장 영향\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e수요 증가 (경기 호황)\u003c/td\u003e\n\u003ctd\u003e에너지·경기민감주 긍정적\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e공급 감소 (OPEC 감산)\u003c/td\u003e\n\u003ctd\u003e에너지 긍정, 다른 업종 비용 부담\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e지정학적 위기\u003c/td\u003e\n\u003ctd\u003e불확실성 증폭, 위험자산 전반 부정적\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e한국 시장 특성:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e한국은 원유 수입국 → 유가 급등은 무역수지 악화, 원화 약세 → 코스피 부정적\u003c/li\u003e\n\u003cli\u003e정유사(SK이노베이션, S-Oil) → 재고 평가이익으로 단기 수혜\u003c/li\u003e\n\u003cli\u003e항공사(대한항공, 아시아나) → 유가 상승 시 비용 급증\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e한국 수출 데이터와 반도체 선행성\u003c/h2\u003e\n\u003ch3\u003e수출 데이터 확인 방법\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e발표:\u003c/strong\u003e 매월 1일(전월 수출 잠정치), 약 15일(확정치)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e출처:\u003c/strong\u003e 산업통상자원부 → \"수출입 동향\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e핵심 항목:\u003c/strong\u003e 반도체, 자동차, 석유화학, 선박, 디스플레이, 배터리\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e반도체 수출이 선행지표인 이유\u003c/h3\u003e\n\u003cp\u003e한국 전체 수출에서 반도체가 차지하는 비중은 약 18\u003cdel\u003e22%. 반도체 수출 증감은 코스피 방향성을 3\u003c/del\u003e6개월 선행하는 경향이 있다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e반도체 수출 회복 신호:\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 반도체 수출 YoY 증가 전환\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 메모리 현물 가격 반등 (D램, NAND)\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 글로벌 IT 수요 회복 (PC 출하량, 데이터센터 투자)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e실전 체크:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매월 1일 오전 9시 발표 → 당일 코스피 반도체 업종 방향성 결정\u003c/li\u003e\n\u003cli\u003eD램 현물가(DRAMeXchange)를 월별로 추적하면 삼성전자·SK하이닉스 실적 추세 선행 파악 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e수출 데이터 해석 주의사항\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e조업일수 효과:\u003c/strong\u003e 해당 월 근무일이 많으면 수출 증가, 적으면 감소. 단순 YoY 비교 시 오판 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e기저효과:\u003c/strong\u003e 전년 동기 수출이 매우 높거나 낮았다면 증감률이 왜곡됨\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e단가 vs 물량:\u003c/strong\u003e 수출 금액이 늘어도 단가 하락+물량 증가인지, 단가 상승인지에 따라 기업 이익에 미치는 영향이 다름\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e외국인 선물 포지션과 코스피 방향성\u003c/h2\u003e\n\u003ch3\u003e선물 포지션 확인 방법\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e출처:\u003c/strong\u003e 한국거래소(KRX) → 파생상품 → 투자자별 매매동향\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e확인 지표:\u003c/strong\u003e 외국인 코스피200 선물 누적 순매수/순매도\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e해석 원리\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-python\"\u003e외국인 선물 대규모 순매수 → 코스피 상승 배팅\n외국인 선물 대규모 순매도 → 코스피 하락 헤지 \u003cspan class=\"hljs-keyword\"\u003eor\u003c/span\u003e 공매도 포지션\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e선물 vs 현물의 차이:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e현물 매수: 장기 투자 자금 유입 → 더 의미 있음\u003c/li\u003e\n\u003cli\u003e선물 매수: 단기 방향성 배팅 → 빠르게 청산 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e베이시스(Basis)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e베이시스 = 선물가격 - 현물가격\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003e베이시스 플러스(Contango): 정상, 시장 안정적\u003c/li\u003e\n\u003cli\u003e베이시스 마이너스(Backwardation): 비정상, 하락 헤지 포지션 증가 신호\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e함정 주의:\u003c/strong\u003e 외국인 선물 포지션은 단기 노이즈가 많다. 1\u003cdel\u003e2일 움직임보다 2\u003c/del\u003e4주 누적 추세를 봐야 의미 있는 신호를 얻을 수 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003eOECD 경기선행지수(CLI) 활용법\u003c/h2\u003e\n\u003ch3\u003eCLI(Composite Leading Indicator)란?\u003c/h3\u003e\n\u003cp\u003eOECD가 매월 발표하는 경기 선행 지수. 향후 6~9개월 경기 방향을 예측하는 데 활용.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-objectivec\"\u003e\u003cspan class=\"hljs-built_in\"\u003eCLI\u003c/span\u003e \u003e \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e + 상승 추세: 경기 확장 예상\n\u003cspan class=\"hljs-built_in\"\u003eCLI\u003c/span\u003e \u003e \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e + 하락 추세: 확장 후 둔화 조짐\n\u003cspan class=\"hljs-built_in\"\u003eCLI\u003c/span\u003e \u0026#x3C; \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e + 하락 추세: 경기 수축 예상\n\u003cspan class=\"hljs-built_in\"\u003eCLI\u003c/span\u003e \u0026#x3C; \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e + 상승 추세: 바닥 통과, 회복 신호\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e실전 활용\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e한국 CLI:\u003c/strong\u003e 반도체 수출 연동성 높음. 코스피 선행지표로 활용\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e미국 CLI:\u003c/strong\u003e S\u0026#x26;P500 방향성과 높은 상관관계\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e중국 CLI:\u003c/strong\u003e 한국 수출의 중국 의존도 감안 시 추가 확인 필요\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e확인처:\u003c/strong\u003e OECD.stat → Leading Indicators 메뉴, 매월 초 공개\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e주요 경제 지표\u003c/h2\u003e\n\u003ch3\u003e미국 지표 (글로벌 영향 큼)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지표\u003c/th\u003e\n\u003cth\u003e발표 주기\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eCPI (소비자물가지수)\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e인플레이션 수준 → 금리 방향 결정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePCE 물가지수\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e연준의 실질 기준 물가 지표\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e실업률 / 비농업고용 (NFP)\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e노동시장 건강도, 첫째 주 금요일 발표\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGDP 성장률\u003c/td\u003e\n\u003ctd\u003e분기\u003c/td\u003e\n\u003ctd\u003e경제 성장 속도 (속보치→수정치→확정치)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eISM 제조업 PMI\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e50 이상이면 확장, 이하면 수축\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFOMC 회의\u003c/td\u003e\n\u003ctd\u003e연 8회\u003c/td\u003e\n\u003ctd\u003e기준금리 결정 + 점도표(분기)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소매판매\u003c/td\u003e\n\u003ctd\u003e월간\u003c/td\u003e\n\u003ctd\u003e소비 동향, GDP의 70%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e한국 지표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지표\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e한국은행 기준금리\u003c/td\u003e\n\u003ctd\u003e국내 금리 기준 (연 8회 금통위)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e수출 증감률\u003c/td\u003e\n\u003ctd\u003e한국 경제 바로미터 (수출주도형)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e외국인 순매수/순매도\u003c/td\u003e\n\u003ctd\u003e코스피 방향성 영향 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소비자물가지수 (CPI)\u003c/td\u003e\n\u003ctd\u003e한국은행 금리 결정 핵심 변수\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e경상수지\u003c/td\u003e\n\u003ctd\u003e외화 유입/유출 구조\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e공포·탐욕 지수\u003c/h2\u003e\n\u003cp\u003e시장 심리를 나타내는 지표들.\u003c/p\u003e\n\u003ch3\u003eVIX (변동성 지수, 공포 지수)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eS\u0026#x26;P 500 옵션의 내재 변동성을 나타냄\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e20 이하\u003c/strong\u003e: 시장 안정, 낙관적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e30 이상\u003c/strong\u003e: 시장 불안, 공포\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e40 이상\u003c/strong\u003e: 극단적 공포 → 역발상 매수 기회일 수 있음\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e주의:\u003c/strong\u003e VIX가 높다고 무조건 매수 신호가 아니다. 금융위기(2008년), 코로나(2020년) 당시 VIX는 80을 초과하며 수개월간 고공행진했다. \"VIX 40 이상 = 역발상 매수\" 공식은 시스템 리스크가 없는 일반적 변동성 국면에서만 적용된다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e버핏 지수\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e버핏 지수 = 전체 주식시장 시가총액 / GDP × 100\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e수준\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e75% 이하\u003c/td\u003e\n\u003ctd\u003e저평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e75~100%\u003c/td\u003e\n\u003ctd\u003e적정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e100~125%\u003c/td\u003e\n\u003ctd\u003e고평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e125% 이상\u003c/td\u003e\n\u003ctd\u003e매우 고평가 (버블 경고)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e컨트롤러블 리스크 vs 언컨트롤러블 리스크\u003c/h2\u003e\n\u003ch3\u003e컨트롤러블 리스크 (관리 가능)\u003c/h3\u003e\n\u003cp\u003e투자자가 포트폴리오 구성으로 줄일 수 있는 위험.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e리스크\u003c/th\u003e\n\u003cth\u003e대응 방법\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e개별 기업 리스크\u003c/td\u003e\n\u003ctd\u003e분산 투자 (종목 수 늘리기)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e섹터 집중 리스크\u003c/td\u003e\n\u003ctd\u003e섹터 분산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e환율 리스크\u003c/td\u003e\n\u003ctd\u003e헤지 상품, 통화 분산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유동성 리스크\u003c/td\u003e\n\u003ctd\u003e대형주 중심, 거래량 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e언컨트롤러블 리스크 (관리 불가)\u003c/h3\u003e\n\u003cp\u003e어떤 포트폴리오로도 피할 수 없는 시장 전체의 위험.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e리스크\u003c/th\u003e\n\u003cth\u003e사례\u003c/th\u003e\n\u003cth\u003e대응 방법\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시스템 리스크\u003c/td\u003e\n\u003ctd\u003e금융위기, 코로나 충격\u003c/td\u003e\n\u003ctd\u003e현금 비중 유지, 손실 한도 설정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e지정학적 리스크\u003c/td\u003e\n\u003ctd\u003e전쟁, 무역 분쟁\u003c/td\u003e\n\u003ctd\u003e지역 분산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e정책 리스크\u003c/td\u003e\n\u003ctd\u003e금리 급변, 세법 개정\u003c/td\u003e\n\u003ctd\u003e모니터링 + 시나리오 준비\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e블랙스완\u003c/td\u003e\n\u003ctd\u003e9/11, 코로나\u003c/td\u003e\n\u003ctd\u003e예측 불가, 포지션 크기 관리\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 원칙:\u003c/strong\u003e 언컨트롤러블 리스크는 예측할 수 없으므로, 언제 발생해도 치명타를 입지 않도록 포지션 크기를 관리하는 것이 유일한 대응이다. 레버리지를 낮게 유지하는 이유가 바로 이것이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e거시 환경 체크 순서\u003c/h2\u003e\n\u003cp\u003e주식 투자 전 거시 환경 파악 순서:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e금리 방향\u003c/strong\u003e — 인상 사이클인가, 인하 사이클인가? 점도표 최신 확인\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e인플레이션 성격\u003c/strong\u003e — 수요인플레이션인가, 비용인플레이션인가?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e경기 국면\u003c/strong\u003e — 회복/호황/후퇴/침체 중 어디인가? CLI 확인\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e달러 방향\u003c/strong\u003e — DXY 추세, 신흥국 자금 흐름\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e환율\u003c/strong\u003e — 원화 강세/약세 추세, 수출입 기업 영향\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e원자재\u003c/strong\u003e — 구리 가격 추세, 유가 방향 및 원인\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e한국 수출\u003c/strong\u003e — 반도체 수출 YoY, 선물 포지션\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e시장 심리\u003c/strong\u003e — VIX, 버핏 지수, 공포탐욕 지수\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e거시 분석은 투자 시기와 업종 선택에 참고하되, 개별 기업 분석을 대체하지는 않는다. Top-down(거시→업종→기업)과 Bottom-up(기업→업종→거시)을 병행할 때 가장 강력한 투자 판단이 나온다.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"chil
