고서 vs 연간보고서\u003c/h2\u003e\n\u003ch3\u003e공시 일정\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e보고서\u003c/th\u003e\n\u003cth\u003e대상 기간\u003c/th\u003e\n\u003cth\u003e공시 마감\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1분기 보고서 (3개월)\u003c/td\u003e\n\u003ctd\u003e1~3월\u003c/td\u003e\n\u003ctd\u003e5월 15일\u003c/td\u003e\n\u003ctd\u003e연초 모멘텀 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반기 보고서 (6개월)\u003c/td\u003e\n\u003ctd\u003e1~6월\u003c/td\u003e\n\u003ctd\u003e8월 14일\u003c/td\u003e\n\u003ctd\u003e감사 반기검토 포함\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3분기 보고서 (9개월)\u003c/td\u003e\n\u003ctd\u003e1~9월\u003c/td\u003e\n\u003ctd\u003e11월 14일\u003c/td\u003e\n\u003ctd\u003e연간 실적 방향성 가늠\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e사업보고서 (연간)\u003c/td\u003e\n\u003ctd\u003e1~12월\u003c/td\u003e\n\u003ctd\u003e3월 31일\u003c/td\u003e\n\u003ctd\u003e외부감사 완료, 가장 신뢰도 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e실전 활용법\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e분기 보고서\u003c/strong\u003e: 모멘텀 플레이에 핵심. 어닝 시즌(분기 결산 전후 2~3주)에 주가 변동성이 극대화됨\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e연간 보고서\u003c/strong\u003e: 장기 투자 판단의 기준. 주석(각주)까지 꼼꼼히 읽어야 함. 주석에 실질적 위험 정보가 숨어있음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eYoY(전년 동기 대비) vs QoQ(전 분기 대비)\u003c/strong\u003e: 계절성이 강한 업종(유통, 농식품)은 YoY로, 모멘텀 확인은 QoQ로\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e함정 주의:\u003c/strong\u003e 분기 실적이 좋아 보여도 전년 동기 기저가 낮았던 것일 수 있다. 항상 2년치 이상의 분기 데이터를 비교할 것.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 손익계산서 (Income Statement)\u003c/h2\u003e\n\u003cp\u003e일정 기간(분기/연간) 동안 얼마나 벌고 썼는지 보여줌.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e매출액\n\u003cspan class=\"hljs-deletion\"\u003e- 매출원가\u003c/span\u003e\n─────────────────\n= 매출총이익 (Gross Profit)\n\n\u003cspan class=\"hljs-deletion\"\u003e- 판매비·관리비 (판관비)\u003c/span\u003e\n─────────────────\n= 영업이익 (Operating Income)  ← 핵심\n\n\u003cspan class=\"hljs-addition\"\u003e+ 영업외수익 - 영업외비용\u003c/span\u003e\n─────────────────\n= 세전순이익\n\n\u003cspan class=\"hljs-deletion\"\u003e- 법인세\u003c/span\u003e\n─────────────────\n= 당기순이익 (Net Income)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e체크 포인트\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e영업이익률(OPM)\u003c/strong\u003e = 영업이익 / 매출액 × 100 → 본업 경쟁력\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e순이익률\u003c/strong\u003e = 당기순이익 / 매출액 × 100\u003c/li\u003e\n\u003cli\u003e영업이익은 흑자인데 순이익이 적자 → 영업외 손실(환율손실, 이자비용) 확인\u003c/li\u003e\n\u003cli\u003e3년치 추세를 봐야 한다. 1년치만 보면 오판 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003eGPM(매출총이익률)과 OPM(영업이익률) 업종별 기준\u003c/h2\u003e\n\u003ch3\u003e매출총이익률 (GPM = Gross Profit Margin)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eGPM\u003c/span\u003e = 매출총이익 / 매출액 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGPM은 기업의 핵심 경쟁력을 가장 직접적으로 보여주는 지표다. 판관비나 금융비용에 영향받지 않아 순수한 제품/서비스 경쟁력을 반영한다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e업종\u003c/th\u003e\n\u003cth\u003eGPM 기준\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e소프트웨어/SaaS\u003c/td\u003e\n\u003ctd\u003e70~80%+\u003c/td\u003e\n\u003ctd\u003e한계비용 거의 0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e제약/바이오\u003c/td\u003e\n\u003ctd\u003e60~80%\u003c/td\u003e\n\u003ctd\u003e특허 기반 고마진\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체 팹리스\u003c/td\u003e\n\u003ctd\u003e50~65%\u003c/td\u003e\n\u003ctd\u003e설계만, 제조 아웃소싱\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체 종합(삼성, SK하이닉스)\u003c/td\u003e\n\u003ctd\u003e30~50%\u003c/td\u003e\n\u003ctd\u003e사이클 영향 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e자동차\u003c/td\u003e\n\u003ctd\u003e15~25%\u003c/td\u003e\n\u003ctd\u003e소재·부품 원가 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유통/이커머스\u003c/td\u003e\n\u003ctd\u003e20~35%\u003c/td\u003e\n\u003ctd\u003e박리다매 구조\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e정유\u003c/td\u003e\n\u003ctd\u003e3~8%\u003c/td\u003e\n\u003ctd\u003e원유 가격 연동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e건설\u003c/td\u003e\n\u003ctd\u003e10~15%\u003c/td\u003e\n\u003ctd\u003e프로젝트별 편차 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e영업이익률 (OPM = Operating Profit Margin)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e업종\u003c/th\u003e\n\u003cth\u003eOPM 기준\u003c/th\u003e\n\u003cth\u003e주의사항\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e소프트웨어\u003c/td\u003e\n\u003ctd\u003e20~35%\u003c/td\u003e\n\u003ctd\u003eR\u0026#x26;D 비용 처리 방식 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체\u003c/td\u003e\n\u003ctd\u003e15~30%\u003c/td\u003e\n\u003ctd\u003e업사이클 vs 다운사이클 차이 극심\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융(은행)\u003c/td\u003e\n\u003ctd\u003eNIM 기준 별도\u003c/td\u003e\n\u003ctd\u003e이자이익 구조 달라 직접 비교 불가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e제조업(일반)\u003c/td\u003e\n\u003ctd\u003e5~15%\u003c/td\u003e\n\u003ctd\u003e10% 이상이면 양호\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유통\u003c/td\u003e\n\u003ctd\u003e1~5%\u003c/td\u003e\n\u003ctd\u003e쿠팡은 오랫동안 적자 허용 (성장전략)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e항공\u003c/td\u003e\n\u003ctd\u003e-5~10%\u003c/td\u003e\n\u003ctd\u003e유가·환율에 극도로 민감\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e애널리스트 팁:\u003c/strong\u003e OPM이 GPM과 크게 차이나는 경우(예: GPM 50%인데 OPM 5%), 판관비 구조를 집중 분석해야 한다. 마케팅비 급증, 인건비 폭증 등 구조적 문제일 수 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e영업레버리지와 재무레버리지\u003c/h2\u003e\n\u003ch3\u003e영업레버리지 (Operating Leverage)\u003c/h3\u003e\n\u003cp\u003e고정비가 높을수록 영업레버리지가 크다. 매출이 조금만 늘어도 영업이익이 폭발적으로 증가하지만, 반대로 매출 감소 시 영업이익이 급격히 줄어드는 구조.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e영업레버리지 도 = 매출 증가율 대비 영업이익 증가율\n\n\u003cspan class=\"hljs-section\"\u003e예시: 매출 10% 증가 → 영업이익 30% 증가 → 영업레버리지 = 3배\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e고정비 높은 업종:\u003c/strong\u003e 반도체(삼성전자 팹), 항공사, 조선, 철강\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e업사이클에 수익이 폭발적으로 증가 → 주가 상승 폭도 큼\u003c/li\u003e\n\u003cli\u003e다운사이클에 손실이 극대화됨 → 경기민감주 투자 시 이 점을 반드시 인지\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e변동비 높은 업종:\u003c/strong\u003e 유통, 정유\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매출 변화에 이익이 선형적으로 반응\u003c/li\u003e\n\u003cli\u003e안정적이지만 폭발적 성장도 제한적\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e재무레버리지 (Financial Leverage)\u003c/h3\u003e\n\u003cp\u003e부채를 활용해 자기자본 수익률을 높이는 구조.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e재무레버리지 = 총자산 / 자기자본\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003e재무레버리지가 높으면 ROE가 높게 나타날 수 있지만, 이는 부채 덕분이지 순수한 경쟁력이 아님\u003c/li\u003e\n\u003cli\u003e금리가 오르면 이자 부담이 급증해 이익이 급감 → 고레버리지 기업은 금리 상승기에 특히 위험\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e듀폰 분석(후술)에서 핵심:\u003c/strong\u003e ROE가 높은 기업이라도 재무레버리지가 주된 이유라면, 실제 경쟁력보다 부채 의존도를 먼저 확인해야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003eEBITDA와 영업이익 차이 실전 활용\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = 영업이익 + 감가상각비(D\u0026#x26;A)\n       = Earnings Before Interest, Tax, Depreciation, Amortization\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e왜 EBITDA를 쓰는가\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e설비투자 부담 제거:\u003c/strong\u003e 감가상각비는 실제 현금 유출이 없는 비용. 자본집약 업종(통신, 제조)에서 영업이익은 낮아 보이지만 실제 현금창출력은 더 높을 수 있음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e국제 비교 용이:\u003c/strong\u003e 세율, 이자율이 다른 국가 간 기업 비교 시 유용\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eM\u0026#x26;A 가치 평가:\u003c/strong\u003e EV/EBITDA 배수로 인수 가격 적정성 판단\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eEV/EBITDA 업종별 기준\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e업종\u003c/th\u003e\n\u003cth\u003e적정 EV/EBITDA\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e통신\u003c/td\u003e\n\u003ctd\u003e5~8배\u003c/td\u003e\n\u003ctd\u003e안정적 현금흐름\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유통/이커머스\u003c/td\u003e\n\u003ctd\u003e8~15배\u003c/td\u003e\n\u003ctd\u003e성장성 프리미엄\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체\u003c/td\u003e\n\u003ctd\u003e10~20배\u003c/td\u003e\n\u003ctd\u003e사이클 고점/저점 차이 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소프트웨어\u003c/td\u003e\n\u003ctd\u003e20~40배\u003c/td\u003e\n\u003ctd\u003e성장주 프리미엄\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e바이오\u003c/td\u003e\n\u003ctd\u003eN/A\u003c/td\u003e\n\u003ctd\u003eEBITDA 의미 없음 (적자 기업 多)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003eEBITDA의 함정\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e중요:\u003c/strong\u003e EBITDA를 맹신하면 안 된다. Warren Buffett은 \"감가상각비를 치아 妖精(tooth fairy)이 낸다고 생각하냐\"며 EBITDA 남용을 비판했다. 실제로 설비 교체는 반드시 현금이 나간다. 자본집약 업종에서 EBITDA로만 평가하면 기업 가치를 과대평가할 수 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003eEPS(주당순이익)와 희석 EPS\u003c/h2\u003e\n\u003ch3\u003e기본 EPS\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eEPS\u003c/span\u003e = 당기순이익 / 발행주식수\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e예시: 삼성전자 당기순이익 30조 원 / 발행주식수 약 60억 주 = EPS 약 5,000원\u003c/p\u003e\n\u003ch3\u003e희석 EPS (Diluted EPS)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e희석 \u003cspan class=\"hljs-attr\"\u003eEPS\u003c/span\u003e = 당기순이익 / (발행주식수 + 잠재적 희석 주식수)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e잠재적 희석 요인:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e스톡옵션(Stock Option):\u003c/strong\u003e 임직원이 보유한 주식 매수 선택권\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e전환사채(CB):\u003c/strong\u003e 채권이 주식으로 전환될 경우\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e신주인수권부사채(BW):\u003c/strong\u003e 새 주식을 살 수 있는 권리\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e함정 주의:\u003c/strong\u003e 기본 EPS가 높아 보여도 희석 EPS가 크게 낮다면, 향후 주식 희석 가능성이 높다는 뜻. 스타트업이나 성장주에서 특히 확인 필수. 전환가능한 부채가 많은 기업은 주가 상승 시 오히려 희석 리스크가 커진다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003eEPS와 PER의 관계\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePER\u003c/span\u003e = 주가 / EPS\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003ePER이 낮다고 무조건 저평가가 아니다. 이익의 질(영업이익 vs 일회성 이익)을 반드시 확인해야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e어닝 서프라이즈 / 어닝 쇼크와 주가 영향\u003c/h2\u003e\n\u003ch3\u003e컨센서스(Consensus)란?\u003c/h3\u003e\n\u003cp\u003e증권사 애널리스트들이 추정한 실적 전망치의 평균값. Bloomberg, FnGuide, Quantiwise에서 확인 가능.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e서프라이즈/쇼크 정도 = (실제 EPS - 컨센서스 EPS) / 컨센서스 EPS × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e시장 반응 패턴\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상황\u003c/th\u003e\n\u003cth\u003e일반적 주가 반응\u003c/th\u003e\n\u003cth\u003e실전 고려사항\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e어닝 서프라이즈 (+5% 이상)\u003c/td\u003e\n\u003ctd\u003e갭 상승\u003c/td\u003e\n\u003ctd\u003e이미 주가에 반영됐을 수도 있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e어닝 쇼크 (-5% 이상)\u003c/td\u003e\n\u003ctd\u003e갭 하락\u003c/td\u003e\n\u003ctd\u003e일회성인지 구조적인지 판단 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e컨센서스 부합\u003c/td\u003e\n\u003ctd\u003e소폭 변동\u003c/td\u003e\n\u003ctd\u003e가이던스(향후 전망)가 더 중요\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e\"Buy the rumor, Sell the news\"\u003c/h3\u003e\n\u003cp\u003e호실적이 예상되는 기업의 주가는 발표 전에 이미 오른 경우가 많다. 실제 호실적 발표 시 \"뉴스에 팔아라\" 현상이 나타남.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심:\u003c/strong\u003e 절대 실적보다 \u003cstrong\u003e컨센서스 대비 실적\u003c/strong\u003e 이 중요하다. 적자 기업도 예상보다 적자가 적으면 주가가 오른다. 흑자 기업도 컨센서스 하회 시 급락한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e가이던스(Guidance)가 더 중요한 이유\u003c/h3\u003e\n\u003cp\u003e실적 발표 시 경영진이 제시하는 다음 분기/연간 전망치. 현재 실적이 좋아도 가이던스가 낮으면 주가는 하락할 수 있다. 특히 미국 기업들은 가이던스를 상세히 제공하므로, 미국주 투자 시 필수 확인 요소.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 재무상태표 (Balance Sheet)\u003c/h2\u003e\n\u003cp\u003e특정 시점의 자산, 부채, 자본 현황. \"지금 이 회사의 살림살이\"\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e자산 = 부채 + 자본\n\n자산\n├── 유동자산 (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e년 내 현금화 가능)\n│   ├── 현금 및 현금성자산\n│   ├── 매출채권\n│   └── 재고자산\n└── 비유동자산\n    ├── 유형자산 (건물, 기계)\n    └── 무형자산 (특허, 브랜드)\n\n부채\n├── 유동부채 (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e년 내 상환)\n└── 비유동부채 (장기차입금)\n\n자본\n├── 자본금\n├── 이익잉여금\n└── 기타포괄손익\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e핵심 지표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지표\u003c/th\u003e\n\u003cth\u003e공식\u003c/th\u003e\n\u003cth\u003e기준\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e부채비율\u003c/td\u003e\n\u003ctd\u003e총부채 / 자본 × 100\u003c/td\u003e\n\u003ctd\u003e100% 이하 선호\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유동비율\u003c/td\u003e\n\u003ctd\u003e유동자산 / 유동부채 × 100\u003c/td\u003e\n\u003ctd\u003e150% 이상 선호\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e당좌비율\u003c/td\u003e\n\u003ctd\u003e(유동자산-재고) / 유동부채 × 100\u003c/td\u003e\n\u003ctd\u003e100% 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e부채비율이 높아도 이자를 충분히 감당하면 괜찮다. 이자보상배율(영업이익/이자비용)이 3배 이상이면 안전.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e무형자산 처리와 투자자 관점\u003c/h2\u003e\n\u003ch3\u003e무형자산의 종류\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e무형자산\n├── 영업권 (\u003cspan class=\"hljs-selector-tag\"\u003eGoodwill\u003c/span\u003e): \u003cspan class=\"hljs-selector-tag\"\u003eM\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eA\u003c/span\u003e 시 웃돈 지불한 부분\n├── 개발비: \u003cspan class=\"hljs-selector-tag\"\u003eR\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eD\u003c/span\u003e 중 개발단계 비용 자산화\n├── 특허권/지식재산권\n├── 고객 관계 (Customer Relationship)\n└── 브랜드 가치\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e영업권(Goodwill)의 함정\u003c/h3\u003e\n\u003cp\u003eM\u0026#x26;A 시 순자산가치 이상으로 지불한 프리미엄이 영업권으로 재무상태표에 잡힌다.\u003c/p\u003e\n\u003cp\u003e예시: A사가 B사를 1조 원에 인수. B사 순자산이 6,000억 원이면 영업권 4,000억 원 계상.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e위험 시나리오:\u003c/strong\u003e 인수한 사업이 기대만큼 성과를 못 내면 영업권 손상차손(Impairment)이 발생해 한 번에 수천억 원의 손실이 인식된다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e영업권이 자기자본의 30% 이상인 기업은 M\u0026#x26;A 리스크에 주의. 영업권 손상은 일회성이라 해도 이익의 질을 크게 훼손한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e개발비 자산화 주의\u003c/h3\u003e\n\u003cp\u003e연구비(Research)는 비용 처리, 개발비(Development)는 일정 요건 충족 시 자산으로 인식 가능.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e분식회계 우려:\u003c/strong\u003e 비용을 자산으로 전환하면 단기 이익이 부풀려진다. 개발비가 갑자기 증가하거나 자산화 기준이 느슨해 보이면 의심해야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 현금흐름표 (Cash Flow Statement)\u003c/h2\u003e\n\u003cp\u003e실제 현금이 어떻게 움직였는지. \u003cstrong\u003e\"이익은 의견, 현금은 사실\"\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e영업활동 현금흐름  ← 가장 중요\n투자활동 현금흐름\n재무활동 현금흐름\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e영업활동 현금흐름\u003c/h3\u003e\n\u003cp\u003e본업에서 실제로 들어온 현금.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e영업이익 \u003e 0인데 영업현금흐름 \u0026#x3C; 0\u003c/strong\u003e → 매출채권 급증, 재고 쌓임. 위험 신호\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e순이익보다 영업현금흐름이 크면\u003c/strong\u003e → 이익의 질이 높음 (실제 현금 창출력 좋음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e자유현금흐름 (FCF)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eFCF\u003c/span\u003e = 영업활동 현금흐름 - 자본적 지출(CapEx)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e기업이 자유롭게 쓸 수 있는 현금. FCF가 꾸준히 플러스인 기업이 투자하기 좋다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e분식회계 징후 체크리스트\u003c/h2\u003e\n\u003cp\u003e실전에서 가장 중요하지만 많은 개인투자자가 놓치는 부분이다.\u003c/p\u003e\n\u003ch3\u003e1. 매출채권 이상 증가\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e매출채권 회전일수 = 매출채권 / (매출액 / \u003cspan class=\"hljs-number\"\u003e365\u003c/span\u003e)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e매출은 증가하는데 매출채권이 그보다 더 빠르게 늘어난다면, 실제로 현금을 받지 못하고 있거나 가공 매출을 계상했을 가능성이 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e경고 신호:\u003c/strong\u003e 매출채권 회전일수가 전년 대비 20일 이상 증가, 또는 업종 평균의 2배 이상\u003c/p\u003e\n\u003ch3\u003e2. 재고자산 이상 증가\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e재고자산 회전일수 = 재고자산 / (매출원가 / \u003cspan class=\"hljs-number\"\u003e365\u003c/span\u003e)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e재고가 쌓인다는 것은 제품이 팔리지 않는다는 신호. 향후 재고평가손실 또는 매출원가 급등으로 이어질 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e경고 신호:\u003c/strong\u003e 매출 증가율보다 재고 증가율이 높은 경우, 특히 제조업·유통업에서\u003c/p\u003e\n\u003ch3\u003e3. 영업현금흐름 마이너스 (적자 아닌 기업)\u003c/h3\u003e\n\u003cp\u003e영업이익이 흑자인데 영업현금흐름이 마이너스라면, 이익의 상당 부분이 실제 현금으로 들어오지 않고 있다는 의미. 2~3분기 연속 이런 패턴이면 고위험.\u003c/p\u003e\n\u003ch3\u003e4. 특수관계인 거래 급증\u003c/h3\u003e\n\u003cp\u003e사업보고서 주석의 \"특수관계자 거래\" 항목 확인. 오너 일가나 관계회사와의 거래가 급증하면 이익 이전이나 매출 부풀리기 가능성.\u003c/p\u003e\n\u003ch3\u003e5. 감사인 의견 확인\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e적정 의견:\u003c/strong\u003e 정상\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e한정 의견:\u003c/strong\u003e 특정 항목에 문제. 주의 필요\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e부적정/의견거절:\u003c/strong\u003e 즉시 투자 재검토\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e6. 영업이익과 EBIT 불일치\u003c/h3\u003e\n\u003cp\u003e한국 GAAP과 IFRS 간 영업이익 분류 기준이 다를 수 있다. 동일 기업이라도 회계 기준 변경 시 영업이익이 급변해 보일 수 있음.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 사례 교훈:\u003c/strong\u003e 코스닥 기업 중 매출채권 급증 + 영업현금흐름 마이너스 + 특수관계인 거래 증가가 동시에 나타나는 패턴은 과거 여러 분식회계 사건에서 공통적으로 발견됐다. 세 가지 중 두 가지만 충족해도 반드시 추가 검증을 권한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 체크리스트\u003c/h2\u003e\n\u003ch3\u003e성장성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출액이 3년간 꾸준히 증가하는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익률이 개선되는 추세인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e YoY 및 QoQ 성장률이 동종 업계 대비 우위인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e수익성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e ROE(자기자본이익률) 10% 이상 지속되는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e ROA(총자산이익률) 5% 이상인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e GPM이 업종 평균 이상인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e OPM 추세가 개선 또는 유지되는가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e안정성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 부채비율 100% 이하인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 유동비율 150% 이상인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 이자보상배율 3배 이상인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업권이 자기자본의 30% 미만인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e현금흐름\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업현금흐름이 3년간 플러스인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e FCF가 플러스인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 순이익 대비 영업현금흐름 비율이 80% 이상인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e분식회계 위험\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출채권 회전일수가 안정적인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 재고자산 증가율이 매출 증가율 이하인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 감사의견이 적정인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 특수관계인 거래가 과도하지 않은가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003eROE 심화: 듀폰 분석\u003c/h2\u003e\n\u003cp\u003eROE를 3가지로 분해해 어디서 수익이 나는지 파악.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eROE = 순이익률 × 자산회전율 × 재무레버리지\n    = (순이익/매출) × (매출/자산) × (자산/자본)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e원인\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003cth\u003e대표 업종\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e순이익률이 높아서\u003c/td\u003e\n\u003ctd\u003e진짜 좋은 기업, 가격 결정력 있음\u003c/td\u003e\n\u003ctd\u003e소프트웨어, 제약, 명품\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e자산회전율이 높아서\u003c/td\u003e\n\u003ctd\u003e효율적 운영, 박리다매 모델\u003c/td\u003e\n\u003ctd\u003e유통, 패스트푸드\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e레버리지가 높아서\u003c/td\u003e\n\u003ctd\u003e부채로 수익률 올린 것 → 위험 동반\u003c/td\u003e\n\u003ctd\u003e금융, 부동산\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e실전 해석 예시\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e삼성전자 (반도체 호황기):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e순이익률: 20%+ → 가격 경쟁력\u003c/li\u003e\n\u003cli\u003e자산회전율: 0.7~0.9 → 자본집약적\u003c/li\u003e\n\u003cli\u003e레버리지: 1.3배 이하 → 안정적 부채 구조\u003c/li\u003e\n\u003cli\u003eROE: \u003cdel\u003e15\u003c/del\u003e20%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e롯데쇼핑 (유통):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e순이익률: 1~3% → 낮음\u003c/li\u003e\n\u003cli\u003e자산회전율: 0.5~0.8 → 부동산 자산 많아 낮음\u003c/li\u003e\n\u003cli\u003e레버리지: 2~3배 → 부채 의존\u003c/li\u003e\n\u003cli\u003eROE: 낮거나 불안정\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e결론:\u003c/strong\u003e 같은 ROE 10%라도, 순이익률에서 나온 것과 레버리지에서 나온 것은 전혀 다른 퀄리티다. 듀폰 분해 없이 ROE 숫자만 보면 절반만 본 것이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e종합: 재무제표 분석 순서\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e3개년 손익계산서\u003c/strong\u003e → 매출/영업이익 추세, OPM/GPM 변화\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e현금흐름표\u003c/strong\u003e → 영업현금흐름 vs 순이익 비교, FCF 확인\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e재무상태표\u003c/strong\u003e → 부채비율, 유동비율, 영업권 비중\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e분기 데이터\u003c/strong\u003e → YoY 성장률, 컨센서스 대비 실적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주석(각주)\u003c/strong\u003e → 특수관계인 거래, 우발부채, 감사 의견\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e듀폰 분석\u003c/strong\u003e → ROE의 원천 파악\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e재무제표는 기업이 직접 작성한 서류다. 독립적 외부감사를 거쳤다고 해도 경영진의 회계 판단이 상당 부분 개입된다. 숫자를 믿되, 동시에 의심하는 균형 잡힌 시각이 필요하다.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"재무제표 보는 법\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"재무제표 보는 법 | midasworld (Private)\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"서버 개발 학습 블로그\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/favicon.ico?favicon.0b3bf435.ico\",\"sizes\":\"256x256\",\"type\":\"image/x-icon\"}],[\"$\",\"$L16\",\"3\",{}]]\n"])</script></body></html>
