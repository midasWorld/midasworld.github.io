u003c/span\u003e\n─────────────────\n= 매출총이익 (Gross Profit)\n\n\u003cspan class=\"hljs-deletion\"\u003e- 판매비·관리비 (판관비)\u003c/span\u003e\n─────────────────\n= 영업이익 (Operating Income)  ← 핵심\n\n\u003cspan class=\"hljs-addition\"\u003e+ 영업외수익 - 영업외비용\u003c/span\u003e\n─────────────────\n= 세전순이익\n\n\u003cspan class=\"hljs-deletion\"\u003e- 법인세\u003c/span\u003e\n─────────────────\n= 당기순이익 (Net Income)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e체크 포인트\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e영업이익률\u003c/strong\u003e = 영업이익 / 매출액 × 100 → 본업 경쟁력\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e순이익률\u003c/strong\u003e = 당기순이익 / 매출액 × 100\u003c/li\u003e\n\u003cli\u003e영업이익은 흑자인데 순이익이 적자 → 영업외 손실(환율손실, 이자비용) 확인\u003c/li\u003e\n\u003cli\u003e3년치 추세를 봐야 한다. 1년치만 보면 오판 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 재무상태표 (Balance Sheet)\u003c/h2\u003e\n\u003cp\u003e특정 시점의 자산, 부채, 자본 현황. \"지금 이 회사의 살림살이\"\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e자산 = 부채 + 자본\n\n자산\n├── 유동자산 (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e년 내 현금화 가능)\n│   ├── 현금 및 현금성자산\n│   ├── 매출채권\n│   └── 재고자산\n└── 비유동자산\n    ├── 유형자산 (건물, 기계)\n    └── 무형자산 (특허, 브랜드)\n\n부채\n├── 유동부채 (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e년 내 상환)\n└── 비유동부채 (장기차입금)\n\n자본\n├── 자본금\n├── 이익잉여금\n└── 기타포괄손익\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e핵심 지표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지표\u003c/th\u003e\n\u003cth\u003e공식\u003c/th\u003e\n\u003cth\u003e기준\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e부채비율\u003c/td\u003e\n\u003ctd\u003e총부채 / 자본 × 100\u003c/td\u003e\n\u003ctd\u003e100% 이하 선호\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유동비율\u003c/td\u003e\n\u003ctd\u003e유동자산 / 유동부채 × 100\u003c/td\u003e\n\u003ctd\u003e150% 이상 선호\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e당좌비율\u003c/td\u003e\n\u003ctd\u003e(유동자산-재고) / 유동부채 × 100\u003c/td\u003e\n\u003ctd\u003e100% 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e부채비율이 높아도 이자를 충분히 감당하면 괜찮다. 이자보상배율(영업이익/이자비용)이 3배 이상이면 안전.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 현금흐름표 (Cash Flow Statement)\u003c/h2\u003e\n\u003cp\u003e실제 현금이 어떻게 움직였는지. \u003cstrong\u003e\"이익은 의견, 현금은 사실\"\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e영업활동 현금흐름  ← 가장 중요\n투자활동 현금흐름\n재무활동 현금흐름\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e영업활동 현금흐름\u003c/h3\u003e\n\u003cp\u003e본업에서 실제로 들어온 현금.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e영업이익 \u003e 0인데 영업현금흐름 \u0026#x3C; 0\u003c/strong\u003e → 매출채권 급증, 재고 쌓임. 위험 신호\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e순이익보다 영업현금흐름이 크면\u003c/strong\u003e → 이익의 질이 높음 (실제 현금 창출력 좋음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e자유현금흐름 (FCF)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eFCF\u003c/span\u003e = 영업활동 현금흐름 - 자본적 지출(CapEx)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e기업이 자유롭게 쓸 수 있는 현금. FCF가 꾸준히 플러스인 기업이 투자하기 좋다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 체크리스트\u003c/h2\u003e\n\u003ch3\u003e성장성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출액이 3년간 꾸준히 증가하는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익률이 개선되는 추세인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e수익성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e ROE(자기자본이익률) 10% 이상 지속되는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e ROA(총자산이익률) 5% 이상인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e안정성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 부채비율 100% 이하인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 유동비율 150% 이상인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 이자보상배율 3배 이상인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e현금흐름\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업현금흐름이 3년간 플러스인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e FCF가 플러스인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003eROE 심화: 듀폰 분석\u003c/h2\u003e\n\u003cp\u003eROE를 3가지로 분해해 어디서 수익이 나는지 파악.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eROE = 순이익률 × 자산회전율 × 재무레버리지\n    = (순이익/매출) × (매출/자산) × (자산/자본)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e원인\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e순이익률이 높아서\u003c/td\u003e\n\u003ctd\u003e진짜 좋은 기업\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e자산회전율이 높아서\u003c/td\u003e\n\u003ctd\u003e효율적 운영\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e레버리지가 높아서\u003c/td\u003e\n\u003ctd\u003e부채로 수익률 올린 것 → 위험 동반\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb
