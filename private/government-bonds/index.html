11:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:Tc2d3,"])</script><script>self.__next_f.push([1,"\u003ch1\u003e국채란 무엇인가, 왜 사야 하는가\u003c/h1\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"채권은 지루하다. 하지만 부자들은 채권을 산다.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e주식 투자자 대부분은 채권, 특히 국채를 낯설게 느낀다. 수익률이 낮아 보이고, 가격이 왜 움직이는지 이해하기 어렵고, 직접 사는 방법도 막막하다. 하지만 워런 버핏의 스승 벤저민 그레이엄은 \"투자 포트폴리오에서 채권 비중이 25% 미만이 되어서는 안 된다\"고 했다. 세계 최대 헤지펀드 브리지워터의 레이 달리오는 올웨더 포트폴리오에서 채권에 55%를 배분했다.\u003c/p\u003e\n\u003cp\u003e왜 이 고수들은 채권을 그토록 중요하게 여길까? 이 글을 읽고 나면 그 이유를 완전히 이해하게 될 것이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 국채 기초 개념\u003c/h2\u003e\n\u003ch3\u003e국채란 무엇인가\u003c/h3\u003e\n\u003cp\u003e국채(Government Bond)는 \u003cstrong\u003e정부가 돈을 빌리면서 발행하는 차용증\u003c/strong\u003e이다. 정부가 재정 적자를 메우거나 대규모 인프라 사업을 위해 자금이 필요할 때, 시장에서 돈을 빌리는 수단이다.\u003c/p\u003e\n\u003cp\u003e투자자 입장에서는:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e정해진 기간(만기) 동안 일정한 이자(쿠폰)를 받는다\u003c/li\u003e\n\u003cli\u003e만기가 되면 빌려준 원금(액면가)을 돌려받는다\u003c/li\u003e\n\u003cli\u003e국가가 파산하지 않는 한 원금 손실이 없다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e예를 들어, 한국 정부가 발행한 \u003cstrong\u003e10년 만기 국고채 3.5% 표면금리\u003c/strong\u003e를 1억 원어치 매수했다면:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매년 350만 원(1억 × 3.5%)의 이자를 수령한다\u003c/li\u003e\n\u003cli\u003e10년 후 원금 1억 원을 돌려받는다\u003c/li\u003e\n\u003cli\u003e총 수령액 = 3,500만 원(이자) + 1억 원(원금) = 1억 3,500만 원\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e회사채, 지방채, 국채 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e발행주체\u003c/th\u003e\n\u003cth\u003e신용등급\u003c/th\u003e\n\u003cth\u003e금리 수준\u003c/th\u003e\n\u003cth\u003e유동성\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e국채\u003c/td\u003e\n\u003ctd\u003e중앙정부\u003c/td\u003e\n\u003ctd\u003e최고 (AAA 수준)\u003c/td\u003e\n\u003ctd\u003e가장 낮음 (기준)\u003c/td\u003e\n\u003ctd\u003e매우 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e지방채\u003c/td\u003e\n\u003ctd\u003e지방자치단체\u003c/td\u003e\n\u003ctd\u003e국채보다 낮음\u003c/td\u003e\n\u003ctd\u003e국채 + α\u003c/td\u003e\n\u003ctd\u003e보통\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e공사채\u003c/td\u003e\n\u003ctd\u003e공기업 (KDB, 도로공사 등)\u003c/td\u003e\n\u003ctd\u003e준정부 수준\u003c/td\u003e\n\u003ctd\u003e국채 + 0.2~0.5%\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e회사채\u003c/td\u003e\n\u003ctd\u003e민간기업\u003c/td\u003e\n\u003ctd\u003e기업별 상이\u003c/td\u003e\n\u003ctd\u003e신용등급에 따라 크게 다름\u003c/td\u003e\n\u003ctd\u003e낮음~높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e스프레드(Spread)\u003c/strong\u003e 개념: 회사채 금리 - 국채 금리 = 신용 스프레드. 이 숫자가 클수록 해당 기업의 신용 리스크가 높다는 의미다. 경제 위기 시 스프레드가 급등하며 회사채는 폭락하지만, 국채는 안전자산으로 오히려 상승하는 경향이 있다.\u003c/p\u003e\n\u003ch3\u003e핵심 용어 완벽 정리\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e액면가(Face Value / Par Value)\u003c/strong\u003e\n채권에 표시된 금액. 한국 국고채는 10,000원, 미국 국채는 $1,000이 액면가다. 만기 시 이 금액을 돌려받는다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e표면금리 / 쿠폰금리(Coupon Rate)\u003c/strong\u003e\n액면가에 대해 지급하는 연간 이자율. 채권 발행 시 확정되며 변하지 않는다. 6개월마다 쿠폰금리의 절반을 지급하는 경우가 많다(미국 국채 기준).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e시장금리(Yield to Maturity, YTM)\u003c/strong\u003e\n현재 시장에서 해당 채권을 매수했을 때 만기까지 보유하면 얻을 수 있는 실질 수익률. 채권 가격에 따라 매일 변한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e만기(Maturity)\u003c/strong\u003e\n국가가 원금을 상환하는 날짜. 3개월~50년까지 다양하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e채권 가격\u003c/strong\u003e\n시장에서 거래되는 가격. 액면가와 다를 수 있다. 액면가보다 비싸게 거래되면 \"프리미엄(할증)\", 싸게 거래되면 \"디스카운트(할인)\"라고 한다.\u003c/p\u003e\n\u003ch3\u003e국채 가격과 금리의 역관계 - 가장 중요한 개념\u003c/h3\u003e\n\u003cp\u003e이것이 채권을 이해하는 핵심이다:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e금리(수익률) 상승 → 채권 가격 하락\u003c/strong\u003e\n\u003cstrong\u003e금리(수익률) 하락 → 채권 가격 상승\u003c/strong\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e왜 그럴까? 구체적인 예시로 이해하자.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e상황 1 (기준)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e1년 전 발행: 액면가 10,000원, 쿠폰 3%, 10년 만기\u003c/li\u003e\n\u003cli\u003e매년 300원의 이자 지급\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e상황 2 (현재 시장금리 5%로 상승)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e새로 발행되는 채권은 쿠폰 5%, 매년 500원 지급\u003c/li\u003e\n\u003cli\u003e기존 채권(쿠폰 3%)을 왜 10,000원에 사겠는가?\u003c/li\u003e\n\u003cli\u003e새 채권보다 불리하므로 기존 채권 가격은 하락해야 한다\u003c/li\u003e\n\u003cli\u003e기존 채권 가격이 하락하면 → 그 가격에 사는 사람의 실질 수익률(YTM)이 올라간다\u003c/li\u003e\n\u003cli\u003e결국 시장은 기존 채권 가격을 낮춰서 실질 수익률을 새 채권과 비슷하게 맞춘다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이것이 채권 가격과 금리의 역관계다. 직관적으로:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리가 오르면 기존 채권이 매력 없어진다 → 가격 하락\u003c/li\u003e\n\u003cli\u003e금리가 내리면 기존 채권이 매력적이 된다 → 가격 상승\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e실전 숫자로 보기:\u003c/strong\u003e\n2022년 초 미국 기준금리는 0.25%였다. 2022년 말 4.5%로 급등했다. 이 기간 20년+ 장기 국채 ETF인 TLT는 \u003cstrong\u003e-34%\u003c/strong\u003e 하락했다. 주식 못지않은 폭락이었다.\u003c/p\u003e\n\u003cp\u003e반대로, 2019년 초 금리 하락기에 TLT는 1년간 \u003cstrong\u003e+22%\u003c/strong\u003e 상승했다. 채권도 주식처럼 강한 수익을 낼 수 있다는 뜻이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 국채의 종류\u003c/h2\u003e\n\u003ch3\u003e한국 국채\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e국고채(KTB, Korea Treasury Bond)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e한국 정부가 발행하는 가장 대표적인 채권이다. 기획재정부가 발행하고 한국은행이 결제를 담당한다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e만기\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e활용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2년물\u003c/td\u003e\n\u003ctd\u003e단기 기준금리 영향 大\u003c/td\u003e\n\u003ctd\u003e단기 금리 예측\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3년물\u003c/td\u003e\n\u003ctd\u003e가장 거래량 많음, 유동성 최고\u003c/td\u003e\n\u003ctd\u003e국내 채권 벤치마크\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5년물\u003c/td\u003e\n\u003ctd\u003e중기 경제 전망 반영\u003c/td\u003e\n\u003ctd\u003e균형 투자\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e10년물\u003c/td\u003e\n\u003ctd\u003e장기 경제/인플레이션 반영\u003c/td\u003e\n\u003ctd\u003e포트폴리오 헤지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e20년물\u003c/td\u003e\n\u003ctd\u003e연기금 주요 투자 대상\u003c/td\u003e\n\u003ctd\u003e자산부채 매칭\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e30년물\u003c/td\u003e\n\u003ctd\u003e2012년부터 발행\u003c/td\u003e\n\u003ctd\u003e초장기 투자\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50년물\u003c/td\u003e\n\u003ctd\u003e2016년부터 발행, 유동성 낮음\u003c/td\u003e\n\u003ctd\u003e극장기 수요\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e한국 국고채의 장단점:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e원화 자산이므로 환율 리스크 없음\u003c/li\u003e\n\u003cli\u003e이자소득세 15.4% 과세 (예금과 동일)\u003c/li\u003e\n\u003cli\u003e매매차익도 양도소득세 대상 (2025년부터 금융투자소득세로 전환 예정이었으나 논의 중)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e물가연동국채(KTBi, Korea Treasury Bond Inflation-indexed)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e원금이 소비자물가지수(CPI)에 연동되는 채권이다. 인플레이션 헤지 목적으로 사용된다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e구조: 물가 상승 시 원금이 증가 → 이자도 함께 증가\u003c/li\u003e\n\u003cli\u003e예시: 10,000원 매수 후 물가가 3% 오르면 원금이 10,300원으로 증가\u003c/li\u003e\n\u003cli\u003e단점: 기본 쿠폰금리는 일반 국고채보다 낮음\u003c/li\u003e\n\u003cli\u003e인플레이션이 예상보다 높을 때 유리, 디플레이션 시 불리\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e국민주택채권\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e주택 구매, 자동차 등록, 건설업 면허 취득 시 의무적으로 매입해야 하는 채권이다. 실질적으로 준조세 성격이 강하다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2종 국민주택채권: 주택 매매 시 부동산 가격의 일정 비율 의무 매입\u003c/li\u003e\n\u003cli\u003e만기 5년, 표면금리 낮음\u003c/li\u003e\n\u003cli\u003e대부분 즉시 시장에서 할인 매도 (할인율 약 2~5%)\u003c/li\u003e\n\u003cli\u003e투자 목적보다는 비용으로 이해하는 것이 맞음\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e미국 국채\u003c/h3\u003e\n\u003cp\u003e미국 국채(US Treasury)는 세계에서 가장 안전하고 유동성이 높은 자산이다. 전 세계 중앙은행과 국부펀드의 핵심 보유 자산이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eT-Bill (Treasury Bill) - 단기\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e만기: 4주, 8주, 13주, 26주, 52주 (1년 이내)\u003c/li\u003e\n\u003cli\u003e쿠폰 없음. 액면가 이하로 발행 후 만기 시 액면가 지급 (할인발행)\u003c/li\u003e\n\u003cli\u003e예시: $970에 매수 → 1년 후 $1,000 수령 → 수익률 3.09%\u003c/li\u003e\n\u003cli\u003e가장 안전한 단기 투자처. 달러 현금 대안으로 사용\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eT-Note (Treasury Note) - 중기\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e만기: 2년, 3년, 5년, 7년, 10년\u003c/li\u003e\n\u003cli\u003e6개월마다 이자 지급\u003c/li\u003e\n\u003cli\u003e2년물과 10년물은 가장 활발히 거래되며 수익률 곡선의 핵심\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eT-Bond (Treasury Bond) - 장기\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e만기: 20년, 30년\u003c/li\u003e\n\u003cli\u003e6개월마다 이자 지급\u003c/li\u003e\n\u003cli\u003e금리 변동에 가장 민감 → 금리 인하 기대 시 큰 수익 가능\u003c/li\u003e\n\u003cli\u003eTLT ETF의 기초자산\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eTIPS (Treasury Inflation-Protected Securities)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e물가연동채권. 한국의 KTBi와 동일한 개념\u003c/li\u003e\n\u003cli\u003e원금이 CPI에 연동, 인플레이션 보호\u003c/li\u003e\n\u003cli\u003e실질금리(Real Yield)가 양수이면 매력적\u003c/li\u003e\n\u003cli\u003eETF: TIP (iShares TIPS Bond ETF)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eI-Bond (Series I Savings Bond)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e개인 투자자 전용 (기관 매수 불가)\u003c/li\u003e\n\u003cli\u003e금리 = 고정금리 + 변동 인플레이션 조정 (6개월마다 재설정)\u003c/li\u003e\n\u003cli\u003e연간 $10,000 한도\u003c/li\u003e\n\u003cli\u003e1년 내 환매 불가, 5년 내 환매 시 최근 3개월 이자 페널티\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e한국인은 SSN(사회보장번호)이 없어 직접 매수 불가\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eSeries EE Bond\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e개인 전용 저축 채권\u003c/li\u003e\n\u003cli\u003e20년 보유 시 원금의 2배 보장 (명목 수익률 약 3.5%)\u003c/li\u003e\n\u003cli\u003e시장 거래 불가, 환금성 낮음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e한국인도 직접 매수 불가\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 국채를 사야 하는 이유\u003c/h2\u003e\n\u003ch3\u003e안전자산으로서의 역할\u003c/h3\u003e\n\u003cp\u003e국채는 왜 안전할까? 정부는 세금 징수권과 화폐 발행권을 갖기 때문이다. 달러를 발행하는 미국 정부가 달러 표시 채권을 못 갚을 이유는 이론적으로 없다. 한국도 마찬가지다.\u003c/p\u003e\n\u003cp\u003e역사적으로 선진국 국채의 신용 부도 사례는 극히 드물다. 반면 기업은 매년 수천 개가 파산한다. 이 차이가 국채에 \"무위험 자산(Risk-free Asset)\"이라는 지위를 부여한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e실제 신용 리스크 비교:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e미국 국채: 디폴트 위험 사실상 0%\u003c/li\u003e\n\u003cli\u003e한국 국채: 1997년 외환위기에도 디폴트 없었음 (IMF 구제금융은 외화 부족이지 원화 국채 문제가 아님)\u003c/li\u003e\n\u003cli\u003e회사채 AA등급: 연간 디폴트율 약 0.01~0.05%\u003c/li\u003e\n\u003cli\u003e회사채 BB등급(투기): 연간 디폴트율 약 1~2%\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e주식과의 음(-)의 상관관계 - 포트폴리오의 마법\u003c/h3\u003e\n\u003cp\u003e이것이 국채 투자의 핵심 이유다.\u003c/p\u003e\n\u003cp\u003e주식과 국채는 경제 환경에서 반대로 움직이는 경향이 있다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e경기 좋음 → 주식 상승, 채권 하락 (금리 상승)\u003c/li\u003e\n\u003cli\u003e경기 나쁨 → 주식 하락, 채권 상승 (안전자산 수요, 금리 인하 기대)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2008년 금융위기 사례:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eS\u0026#x26;P 500: -37% (2008년)\u003c/li\u003e\n\u003cli\u003e미국 20년+ 장기 국채: \u003cstrong\u003e+25.9%\u003c/strong\u003e 상승\u003c/li\u003e\n\u003cli\u003e60/40 포트폴리오(주식60%+채권40%): 약 -22% (순수 주식 대비 손실 절반)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2020년 코로나 폭락 사례 (3월 기준):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eS\u0026#x26;P 500: -34% (고점 대비)\u003c/li\u003e\n\u003cli\u003e미국 장기 국채: \u003cstrong\u003e+20~25%\u003c/strong\u003e 상승\u003c/li\u003e\n\u003cli\u003e국채를 보유한 투자자는 이 자금으로 주식 저점 매수 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e역상관관계의 수치화:\u003c/strong\u003e\n주식과 미국 장기 국채의 상관계수(1990~2020년 평균): 약 \u003cstrong\u003e-0.3 ~ -0.4\u003c/strong\u003e\n완전한 역상관은 -1.0이므로, 완벽하진 않지만 포트폴리오 위험을 크게 줄여준다.\u003c/p\u003e\n\u003ch3\u003e경기침체 헤지 효과\u003c/h3\u003e\n\u003cp\u003e경기침체가 오면 무슨 일이 일어날까:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e기업 실적 악화 → 주식 하락\u003c/li\u003e\n\u003cli\u003e실업 증가, 소비 감소\u003c/li\u003e\n\u003cli\u003e중앙은행이 금리 인하 (경기 부양)\u003c/li\u003e\n\u003cli\u003e금리 인하 → 기존 채권 가격 상승\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e국채는 경기침체 시나리오에서 두 가지 이유로 오른다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e안전자산 수요\u003c/strong\u003e: 위험 회피 심리로 자금이 국채로 몰림\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e금리 인하 기대\u003c/strong\u003e: 침체 대응을 위한 금리 인하 → 채권 가격 상승\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e역사적으로 미국이 경기침체에 진입한 해마다 장기 국채는 강세를 보였다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2001년(IT버블): 장기 국채 +5~8%\u003c/li\u003e\n\u003cli\u003e2008~2009년: 장기 국채 +25%+\u003c/li\u003e\n\u003cli\u003e2020년: 장기 국채 +20%+\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e확정 이자 수입의 장점\u003c/h3\u003e\n\u003cp\u003e주식 배당과 달리 채권 이자는 계약으로 보장된다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e예금 대비 장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e예금은 금리 인하 시 만기 후 낮은 금리로 재예치 → 수익률 하락\u003c/li\u003e\n\u003cli\u003e장기 채권(10~30년물)은 지금 금리를 장기간 고정 가능\u003c/li\u003e\n\u003cli\u003e예시: 2023년 한국 국고채 10년물이 4.2%일 때 매수하면, 이후 금리가 2%로 떨어져도 10년간 4.2% 이자 수령\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e현금흐름 예측 가능성:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e은퇴자나 정기적 현금흐름이 필요한 투자자에게 이상적\u003c/li\u003e\n\u003cli\u003e반기 또는 연간 이자 지급 일정이 확정되어 있음\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e포트폴리오 변동성 감소와 샤프비율 개선\u003c/h3\u003e\n\u003cp\u003e샤프비율(Sharpe Ratio) = (포트폴리오 수익률 - 무위험 수익률) / 포트폴리오 표준편차\u003c/p\u003e\n\u003cp\u003e이 비율이 높을수록 위험 대비 수익이 좋다는 의미다.\u003c/p\u003e\n\u003cp\u003e역사적 데이터 (미국 시장 기준, 1970~2020):\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e포트폴리오\u003c/th\u003e\n\u003cth\u003e연평균 수익률\u003c/th\u003e\n\u003cth\u003e연간 변동성\u003c/th\u003e\n\u003cth\u003e샤프비율\u003c/th\u003e\n\u003cth\u003e최대 낙폭\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 100%\u003c/td\u003e\n\u003ctd\u003e10.2%\u003c/td\u003e\n\u003ctd\u003e15.5%\u003c/td\u003e\n\u003ctd\u003e0.41\u003c/td\u003e\n\u003ctd\u003e-50.9%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 80/채권 20\u003c/td\u003e\n\u003ctd\u003e9.7%\u003c/td\u003e\n\u003ctd\u003e12.3%\u003c/td\u003e\n\u003ctd\u003e0.47\u003c/td\u003e\n\u003ctd\u003e-40.6%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 60/채권 40\u003c/td\u003e\n\u003ctd\u003e9.1%\u003c/td\u003e\n\u003ctd\u003e9.8%\u003c/td\u003e\n\u003ctd\u003e0.54\u003c/td\u003e\n\u003ctd\u003e-30.7%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 40/채권 60\u003c/td\u003e\n\u003ctd\u003e8.2%\u003c/td\u003e\n\u003ctd\u003e7.5%\u003c/td\u003e\n\u003ctd\u003e0.58\u003c/td\u003e\n\u003ctd\u003e-20.4%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e흥미롭게도 채권을 추가할수록 수익률은 약간 줄지만 샤프비율은 개선된다. 즉, \u003cstrong\u003e단위 위험당 수익이 더 좋아진다\u003c/strong\u003e.\u003c/p\u003e\n\u003ch3\u003e2022년 예외 사례와 교훈\u003c/h3\u003e\n\u003cp\u003e2022년은 채권 투자자들에게 충격적인 해였다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e무슨 일이 있었나:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e코로나 이후 급등한 인플레이션 (미국 CPI 9.1%, 40년 만의 최고치)\u003c/li\u003e\n\u003cli\u003e연준이 0.25%에서 4.5%까지 기준금리를 1년 만에 급격히 인상\u003c/li\u003e\n\u003cli\u003e결과: S\u0026#x26;P 500 -19.4%, TLT(장기 국채 ETF) -31.2%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e역사상 처음으로 주식과 채권이 동시에 대폭락했다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e왜 이런 일이 발생했나:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e인플레이션이 너무 높으면 국채의 실질 가치가 훼손됨\u003c/li\u003e\n\u003cli\u003e금리를 급격히 올릴 때는 채권 가격이 강하게 하락\u003c/li\u003e\n\u003cli\u003e\"주식-채권 역상관관계\"는 경기침체 시에는 작동하지만, \u003cstrong\u003e인플레이션 충격 시에는 작동하지 않음\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e교훈:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e국채도 단기적으로 큰 손실이 가능하다 (특히 장기채)\u003c/li\u003e\n\u003cli\u003e인플레이션 환경에서는 TIPS(물가연동채)나 단기채를 활용해야 한다\u003c/li\u003e\n\u003cli\u003e채권은 주식을 완벽하게 대체할 수 없다 - 분산투자의 한 축일 뿐이다\u003c/li\u003e\n\u003cli\u003e금리 상승기에는 채권 비중과 듀레이션을 줄여야 한다\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 금리와 채권 가격의 관계 - 심화\u003c/h2\u003e\n\u003ch3\u003e듀레이션(Duration) 개념\u003c/h3\u003e\n\u003cp\u003e듀레이션은 채권 투자자라면 반드시 이해해야 하는 개념이다. 두 가지 의미가 있다:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. 맥컬레이 듀레이션(Macaulay Duration)\u003c/strong\u003e\n채권에서 발생하는 모든 현금흐름의 현재가치 가중평균 회수기간. 단위는 \"년(Year)\".\u003c/p\u003e\n\u003cp\u003e직관적으로: 내가 투자한 돈을 평균적으로 몇 년 만에 돌려받느냐?\u003c/p\u003e\n\u003cp\u003e제로쿠폰채권(이자 없이 만기에 원금만 지급): 듀레이션 = 만기\n쿠폰을 지급하는 채권: 듀레이션 \u0026#x3C; 만기 (이자를 중간에 받으므로)\u003c/p\u003e\n\u003cp\u003e예시 계산 (간략화):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e3년 만기, 쿠폰 5%, 액면가 1,000원\u003c/li\u003e\n\u003cli\u003e1년 후 현금흐름: 50원, 2년 후: 50원, 3년 후: 1,050원\u003c/li\u003e\n\u003cli\u003e현재가치 가중평균 → 듀레이션 ≈ 2.72년\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2. 수정듀레이션(Modified Duration) - 실전에서 더 중요\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e수정듀레이션 = 맥컬레이 듀레이션 / (1 + YTM)\u003c/p\u003e\n\u003cp\u003e의미: \u003cstrong\u003e금리 1% 변화 시 채권 가격 변화율(%)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e공식: \u003cstrong\u003e채권 가격 변화율 ≈ -수정듀레이션 × 금리 변화폭\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e실전 예시:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e10년 만기 미국 국채, 수정듀레이션 = 8.5년\u003c/li\u003e\n\u003cli\u003e금리가 1% 상승하면 → 채권 가격 약 \u003cstrong\u003e-8.5%\u003c/strong\u003e 변화\u003c/li\u003e\n\u003cli\u003e금리가 1% 하락하면 → 채권 가격 약 \u003cstrong\u003e+8.5%\u003c/strong\u003e 변화\u003c/li\u003e\n\u003cli\u003e금리가 0.5% 하락하면 → 채권 가격 약 \u003cstrong\u003e+4.25%\u003c/strong\u003e 변화\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 숫자가 왜 중요한가? 내가 보유한 채권이 금리 변화에 얼마나 민감한지 즉시 계산할 수 있기 때문이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e만기별 수정듀레이션 참고값 (쿠폰 4% 기준):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e만기\u003c/th\u003e\n\u003cth\u003e수정듀레이션\u003c/th\u003e\n\u003cth\u003e금리 1% 상승 시 가격 변화\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2년\u003c/td\u003e\n\u003ctd\u003e~1.9년\u003c/td\u003e\n\u003ctd\u003e약 -1.9%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5년\u003c/td\u003e\n\u003ctd\u003e~4.4년\u003c/td\u003e\n\u003ctd\u003e약 -4.4%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e10년\u003c/td\u003e\n\u003ctd\u003e~8.0년\u003c/td\u003e\n\u003ctd\u003e약 -8.0%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e20년\u003c/td\u003e\n\u003ctd\u003e~13.5년\u003c/td\u003e\n\u003ctd\u003e약 -13.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e30년\u003c/td\u003e\n\u003ctd\u003e~17.0년\u003c/td\u003e\n\u003ctd\u003e약 -17.0%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e장기채일수록 금리 변화에 훨씬 민감하다는 것을 알 수 있다.\u003c/p\u003e\n\u003ch3\u003e컨벡시티(Convexity) - 비선형 관계\u003c/h3\u003e\n\u003cp\u003e수정듀레이션은 금리 변화에 대한 가격 변화를 선형으로 근사하지만, 실제 채권 가격은 비선형(곡선)으로 움직인다. 이 비선형성을 \u003cstrong\u003e컨벡시티\u003c/strong\u003e라고 한다.\u003c/p\u003e\n\u003cp\u003e컨벡시티의 효과:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리가 하락할 때: 실제 가격 상승폭이 듀레이션 예측보다 \u003cstrong\u003e크다\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e금리가 상승할 때: 실제 가격 하락폭이 듀레이션 예측보다 \u003cstrong\u003e작다\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e즉, 컨벡시티가 높은 채권은 투자자에게 유리하다. 좋은 방향으로는 더 오르고, 나쁜 방향으로는 덜 떨어진다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e보다 정확한 가격 변화 계산:\u003c/strong\u003e\n가격 변화율 ≈ (-수정듀레이션 × Δy) + (1/2 × 컨벡시티 × Δy²)\u003c/p\u003e\n\u003cp\u003e금리 변화폭(Δy)이 크면 클수록 컨벡시티 항이 중요해진다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e실전 적용:\u003c/strong\u003e\n금리 하락기에 장기채에 투자하는 이유 중 하나가 바로 높은 컨벡시티다. 같은 금리 하락에도 컨벡시티가 높은 장기채는 예상보다 더 큰 가격 상승을 제공한다.\u003c/p\u003e\n\u003ch3\u003e실전 계산: 10년물 미국 국채, 금리 1% 상승 시\u003c/h3\u003e\n\u003cp\u003e2024년 기준 10년 미국 국채:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e쿠폰금리: 4.5%\u003c/li\u003e\n\u003cli\u003e수정듀레이션: 약 8.0\u003c/li\u003e\n\u003cli\u003e컨벡시티: 약 75\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e금리가 4.5% → 5.5%로 1% 상승 시:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e듀레이션만 고려: -8.0%\u003c/li\u003e\n\u003cli\u003e컨벡시티 조정: +0.5 × 75 × (0.01)² × 100 = +0.038%\u003c/li\u003e\n\u003cli\u003e실제 가격 변화 ≈ \u003cstrong\u003e-7.96%\u003c/strong\u003e (컨벡시티로 손실 약간 완충)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e금리가 4.5% → 3.5%로 1% 하락 시:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e듀레이션만 고려: +8.0%\u003c/li\u003e\n\u003cli\u003e컨벡시티 조정: +0.038%\u003c/li\u003e\n\u003cli\u003e실제 가격 변화 ≈ \u003cstrong\u003e+8.04%\u003c/strong\u003e (컨벡시티로 이익 약간 확대)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e$100,000 투자 시 금리 1% 상승이면 약 $7,960 손실, 금리 1% 하락이면 약 $8,040 이익이다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 수익률 곡선(Yield Curve) 완전 해설\u003c/h2\u003e\n\u003ch3\u003e수익률 곡선이란\u003c/h3\u003e\n\u003cp\u003e수익률 곡선은 X축에 만기, Y축에 수익률(금리)을 표시한 그래프다. 시장이 미래 금리와 경제를 어떻게 예상하는지를 한눈에 보여주는 가장 중요한 금융 지표 중 하나다.\u003c/p\u003e\n\u003ch3\u003e정상 수익률 곡선 (Normal Yield Curve)\u003c/h3\u003e\n\u003cp\u003e단기금리 \u0026#x3C; 장기금리. 가장 흔한 형태.\u003c/p\u003e\n\u003cp\u003e왜 이런 형태인가:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장기 투자는 불확실성이 크므로 추가 보상(기간 프리미엄)을 요구\u003c/li\u003e\n\u003cli\u003e시장이 미래 경제 성장과 인플레이션을 긍정적으로 전망\u003c/li\u003e\n\u003cli\u003e중앙은행이 현재 낮은 단기금리를 유지 중\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e예시 (정상 곡선):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e3개월물: 3.5%\u003c/li\u003e\n\u003cli\u003e2년물: 4.0%\u003c/li\u003e\n\u003cli\u003e5년물: 4.3%\u003c/li\u003e\n\u003cli\u003e10년물: 4.6%\u003c/li\u003e\n\u003cli\u003e30년물: 4.9%\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e역전 수익률 곡선 (Inverted Yield Curve)\u003c/h3\u003e\n\u003cp\u003e단기금리 \u003e 장기금리. 비정상적 상황.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e가장 중요한 신호: 2년물-10년물 금리 역전 (2s10s)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e이 역전이 발생하면 역사적으로 경기침체가 뒤따랐다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e역사적 사례:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e역전 시기\u003c/th\u003e\n\u003cth\u003e이후 경기침체\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1978년\u003c/td\u003e\n\u003ctd\u003e1980년 침체\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1988년\u003c/td\u003e\n\u003ctd\u003e1990~1991년 침체\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2000년\u003c/td\u003e\n\u003ctd\u003e2001년 IT버블 침체\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2006년\u003c/td\u003e\n\u003ctd\u003e2007~2009년 금융위기\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2019년\u003c/td\u003e\n\u003ctd\u003e2020년 코로나 침체\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022~2023년\u003c/td\u003e\n\u003ctd\u003e2024~2025년 ?\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e역전이 침체를 예측하는 이유:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e시장이 단기적으로 금리가 높지만(중앙은행 긴축) 장기적으로는 낮아질 것이라고 예상\u003c/li\u003e\n\u003cli\u003e즉, 미래 경제 둔화와 금리 인하를 선반영\u003c/li\u003e\n\u003cli\u003e역전 후 평균 12~18개월 뒤 침체 시작\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e주의사항:\u003c/strong\u003e 2022년 역전이 발생했지만 2024년까지 침체가 오지 않았다. 예측 도구이지만 100% 정확하지는 않으며, 시차가 길 수 있다.\u003c/p\u003e\n\u003ch3\u003e플랫(Flat) 수익률 곡선\u003c/h3\u003e\n\u003cp\u003e단기와 장기 금리 차이가 거의 없는 상태. 정상에서 역전으로 가는 과도기에 나타남.\u003c/p\u003e\n\u003ch3\u003e수익률 곡선의 변화 패턴\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e스티프닝(Steepening): 장단기 금리차 확대\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e불 스티프닝(Bull Steepening): 단기금리가 더 크게 하락 → 경기침체 이후 완화 시기에 발생. 채권 전반 강세.\u003c/li\u003e\n\u003cli\u003e베어 스티프닝(Bear Steepening): 장기금리가 더 크게 상승 → 인플레이션 우려, 재정 적자 확대 시. 장기채 약세.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e플래트닝(Flattening): 장단기 금리차 축소\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e불 플래트닝(Bull Flattening): 장기금리가 더 크게 하락 → 안전자산 수요, 경기침체 우려. 장기채 강세.\u003c/li\u003e\n\u003cli\u003e베어 플래트닝(Bear Flattening): 단기금리가 더 크게 상승 → 중앙은행 긴축. 채권 전반 약세.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e투자 시사점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e불 스티프닝 → 장기채 투자 유리\u003c/li\u003e\n\u003cli\u003e베어 플래트닝 → 단기채나 현금 보유 유리\u003c/li\u003e\n\u003cli\u003e불 플래트닝 → 장기채 비중 확대\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e한국 국고채 수익률 곡선 읽는 법\u003c/h3\u003e\n\u003cp\u003e한국은행 경제통계시스템(ECOS, ecos.bok.or.kr)에서 실시간 수익률 곡선 확인 가능.\u003c/p\u003e\n\u003cp\u003e금융투자협회(KOFIA, kofiabond.or.kr)에서도 국고채 금리 확인 가능.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e한국 수익률 곡선 해석 시 주의사항:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e미국 수익률 곡선과 연동성 높음 (한미 금리 정책 차이 반영)\u003c/li\u003e\n\u003cli\u003e외국인 국채 투자 비중(약 20~25%)이 크므로 환율과 연관성 있음\u003c/li\u003e\n\u003cli\u003e국내 경기 사이클과 한국은행 기준금리 경로가 핵심 변수\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 국채 투자 방법 - 실전\u003c/h2\u003e\n\u003ch3\u003e한국 국채 직접 매수\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e증권사 HTS/MTS에서 장내 매매:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e증권사 계좌 개설\u003c/li\u003e\n\u003cli\u003e채권 메뉴 → 국채/국고채 선택\u003c/li\u003e\n\u003cli\u003e종목 검색 (예: \"국고채 03250-3403\" = 표면금리 3.25%, 2034년 3월 만기)\u003c/li\u003e\n\u003cli\u003e매수 단가 입력 (액면가 10,000원 기준, 시장가 또는 지정가)\u003c/li\u003e\n\u003cli\u003e최소 거래단위는 증권사마다 다르나 1만 원~10만 원 수준\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e유의사항:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매수 시점의 YTM이 실질 수익률 (현재 시장가 기준)\u003c/li\u003e\n\u003cli\u003e중도 매도 시 시장 가격에 팔아야 하므로 금리 상승기에는 손실 가능\u003c/li\u003e\n\u003cli\u003e만기까지 보유하면 표면금리의 이자 수령 + 원금 회수 확정\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e기획재정부 국채통합계좌 (개인 투자자 맞춤 서비스):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e소액(1만 원 단위) 국채 직접 매수 가능\u003c/li\u003e\n\u003cli\u003e2023년부터 서비스 시작\u003c/li\u003e\n\u003cli\u003e만기까지 보유 목적의 개인 투자자에게 적합\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e한국 국채 ETF\u003c/h3\u003e\n\u003cp\u003e직접 매수가 복잡하면 03c/td\u003e\n\u003ctd\u003e30년 선물 기반, 환헤지\u003c/td\u003e\n\u003ctd\u003e있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 미국채10년선물\u003c/td\u003e\n\u003ctd\u003e10년물 선물 기반, 환노출\u003c/td\u003e\n\u003ctd\u003e없음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eACE 미국30년국채액티브(H)\u003c/td\u003e\n\u003ctd\u003e30년물 현물 기반, 환헤지\u003c/td\u003e\n\u003ctd\u003e있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eRISE 미국30년국채(H)\u003c/td\u003e\n\u003ctd\u003e30년물 환헤지\u003c/td\u003e\n\u003ctd\u003e있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e미국 상장 ETF (달러로 매수):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eETF\u003c/th\u003e\n\u003cth\u003e기초자산\u003c/th\u003e\n\u003cth\u003e수정듀레이션\u003c/th\u003e\n\u003cth\u003e연보수\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eBIL\u003c/td\u003e\n\u003ctd\u003eT-Bill 1-3개월\u003c/td\u003e\n\u003ctd\u003e~0.1년\u003c/td\u003e\n\u003ctd\u003e0.14%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSHY\u003c/td\u003e\n\u003ctd\u003eT-Note 1-3년\u003c/td\u003e\n\u003ctd\u003e~1.9년\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eIEF\u003c/td\u003e\n\u003ctd\u003eT-Note 7-10년\u003c/td\u003e\n\u003ctd\u003e~7.5년\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTLT\u003c/td\u003e\n\u003ctd\u003eT-Bond 20년+\u003c/td\u003e\n\u003ctd\u003e~17년\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eEDV\u003c/td\u003e\n\u003ctd\u003eZero-coupon 25년+\u003c/td\u003e\n\u003ctd\u003e~25년\u003c/td\u003e\n\u003ctd\u003e0.06%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e환헤지 ETF vs 환노출 ETF 선택 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cp td\u003e0.06%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e운용자산(AUM)\u003c/td\u003e\n\u003ctd\u003e~$35B\u003c/td\u003e\n\u003ctd\u003e~$22B\u003c/td\u003e\n\u003ctd\u003e~$25B\u003c/td\u003e\n\u003ctd\u003e~$40B\u003c/td\u003e\n\u003ctd\u003e~$3B\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금리 1% 상승 시\u003c/td\u003e\n\u003ctd\u003e-0.1%\u003c/td\u003e\n\u003ctd\u003e-1.9%\u003c/td\u003e\n\u003ctd\u003e-7.5%\u003c/td\u003e\n\u003ctd\u003e-17%\u003c/td\u003e\n\u003ctd\u003e-25%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금리 1% 하락 시\u003c/td\u003e\n\u003ctd\u003e+0.1%\u003c/td\u003e\n\u003ctd\u003e+1.9%\u003c/td\u003e\n\u003ctd\u003e+7.5%\u003c/td\u003e\n\u003ctd\u003e+17%\u003c/td\u003e\n\u003ctd\u003e+25%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e활용도\u003c/td\u003e\n\u003ctd\u003e현금 대안\u003c/td\u003e\n\u003ctd\u003e단기 안정\u003c/td\u003e\n\u003ctd\u003e균형\u003c/td\u003e\n\u003ctd\u003e금리 인하 베팅\u003c/td\u003e\n\u003ctd\u003e레버리지급 베팅\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e실전 투자 가이드:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e현금을 잠시 보관하고 싶다면:\u003c/em\u003e BIL (거의 수익률 변동 없음)\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e단기 안전자산을 원한다면:\u003c/em\u003e SHY (소폭의 금리 민감도)\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e균형 잡힌 채권 투자를 원한다면:\u003c/em\u003e IEF (7-10년 중기채)\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e금리 인하에 적극 베팅하고 싶다면:\u003c/em\u003e TLT 또는 EDV (높은 듀레이션, 금리 인하 시 큰 수익)\u003c/p\u003e\n\u003ch3\u003e금리 인하 기대 시 어떤 ETF를 사야 하는가\u003c/h3\u003e\n\u003cp\u003e금리가 1% 하락할 것으로 예상할 때:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBIL: +0.1% 수익\u003c/li\u003e\n\u003cli\u003eSHY: +1.9% 수익\u003c/li\u003e\n\u003cli\u003eIEF: +7.5% 수익\u003c/li\u003e\n\u003cli\u003eTLT: +17% 수익 (+ 쿠폰 수익 약 4%)\u003c/li\u003e\n\u003cli\u003eEDV: +25% 수익 (쿠폰 없이 가격 상승만)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e분명히 TLT나 EDV가 유리해 보이지만, 예상이 틀렸을 때 리스크도 그만큼 크다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e금리 인하 시나리오에서 단계적 접근 전략:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e금리 인하 가능성 50%: IEF (중간 정도의 리스크)\u003c/li\u003e\n\u003cli\u003e금리 인하 확률 70%+: TLT 비중 확대\u003c/li\u003e\n\u003cli\u003e금리 인하 확실시: TLT + EDV 혼합\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e국내 상장 미국 채권 ETF 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eETF명\u003c/th\u003e\n\u003cth\u003e기초지수\u003c/th\u003e\n\u003cth\u003e환헤지\u003c/th\u003e\n\u003cth\u003e총보수\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eACE 미국30년국채액티브(H)\u003c/td\u003e\n\u003ctd\u003e30년 국채\u003c/td\u003e\n\u003ctd\u003e있음\u003c/td\u003e\n\u003ctd\u003e0.05%\u003c/td\u003e\n\u003ctd\u003e가장 낮은 보수\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKODEX 미국채울트라30년선물H\u003c/td\u003e\n\u003ctd\u003e30년 선물\u003c/td\u003e\n\u003ctd\u003e있음\u003c/td\u003e\n\u003ctd\u003e0.30%\u003c/td\u003e\n\u003ctd\u003e선물 기반\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIGER 미국채10년선물\u003c/td\u003e\n\u003ctd\u003e10년 선물\u003c/td\u003e\n\u003ctd\u003e없음\u003c/td\u003e\n\u003ctd\u003e0.29%\u003c/td\u003e\n\u003ctd\u003e환노출\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eRISE 미국30년국채(H)\u003c/td\u003e\n\u003ctd\u003e30년 국채\u003c/td\u003e\n\u003ctd\u003e있음\u003c/td\u003e\n\u003ctd\u003e0.05%\u003c/td\u003e\n\u003ctd\u003e현물 기반\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e환헤지 상품의 경우 달러 금리가 원화 금리보다 높을 때(현재 상황) 헤지 비용이 연 1.5~2% 발생할 수 있다. 이를 감안하면 순수 채권 ETF 보수보다 실질 비용이 높아진다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 국채 투자 전략\u003c/h2\u003e\n\u003ch3\u003e래더링(Laddering) 전략\u003c/h3\u003e\n\u003cp\u003e만기를 계단식으로 분산하는 전략이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e예시: 1억 원을 5개 구간으로 분산\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2,000만 원: 2년 국고채\u003c/li\u003e\n\u003cli\u003e2,000만 원: 4년 국고채\u003c/li\u003e\n\u003cli\u003e2,000만 원: 6년 국고채\u003c/li\u003e\n\u003cli\u003e2,000만 원: 8년 국고채\u003c/li\u003e\n\u003cli\u003e2,000만 원: 10년 국고채\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e2년마다 만기가 도래하고, 그 자금으로 다시 10년물을 매수한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리 변화에 대한 리스크 분산\u003c/li\u003e\n\u003cli\u003e정기적인 현금흐름 확보\u003c/li\u003e\n\u003cli\u003e금리 상승기에는 만기된 자금을 높은 금리로 재투자 가능\u003c/li\u003e\n\u003cli\u003e유동성 확보 (가장 단기 채권이 곧 만기)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e적합한 투자자:\u003c/strong\u003e 정기적인 현금흐름이 필요한 은퇴자, 금리 예측이 어려운 상황\u003c/p\u003e\n\u003ch3\u003e바벨(Barbell) 전략\u003c/h3\u003e\n\u003cp\u003e단기와 장기 채권에만 집중, 중기는 보유하지 않는 전략이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e예시: 1억 원을 두 극단으로 분산\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e5,000만 원: 1~2년 단기 국채 (금리 상승 리스크 최소화)\u003c/li\u003e\n\u003cli\u003e5,000만 원: 20~30년 장기 국채 (금리 인하 수익 극대화)\u003c/li\u003e\n\u003cli\u003e중기(5~10년): 0%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e단기채로 유동성과 안정성 확보\u003c/li\u003e\n\u003cli\u003e장기채로 금리 인하 시 큰 수익 기회\u003c/li\u003e\n\u003cli\u003e포트폴리오의 유연성\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e단점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리가 중기 구간에서만 하락하면 수익 놓침\u003c/li\u003e\n\u003cli\u003e장기채 변동성이 크므로 심리적 부담\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e적합한 투자자:\u003c/strong\u003e 금리 인하를 예상하지만 불확실성도 감안하고 싶은 투자자\u003c/p\u003e\n\u003ch3\u003e불릿(Bullet) 전략\u003c/h3\u003e\n\u003cp\u003e특정 만기에 집중하는 전략이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e예시: 5년 후 자금이 필요한 경우\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e모든 채권을 5년 만기 근처에 집중\u003c/li\u003e\n\u003cli\u003e은퇴, 자녀 교육비, 주택 구입 등 특정 시점 자금 목적에 활용\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e특정 시점의 자금 필요에 정확히 대응\u003c/li\u003e\n\u003cli\u003e금리 예측이 맞으면 수익 극대화\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e단점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리 변화에 집중 노출\u003c/li\u003e\n\u003cli\u003e유동성 분산 불가\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e적합한 투자자:\u003c/strong\u003e 명확한 자금 사용 시점이 있는 투자자\u003c/p\u003e\n\u003ch3\u003e금리 사이클별 최적 전략\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e금리 인상기 (예: 2022~2023년)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장기채 비중 최소화 (듀레이션 축소)\u003c/li\u003e\n\u003cli\u003e단기채(T-Bill, SHY) 또는 변동금리채 선호\u003c/li\u003e\n\u003cli\u003e현금 비중 확대\u003c/li\u003e\n\u003cli\u003eTIPS로 인플레이션 헤지\u003c/li\u003e\n\u003cli\u003e채권 매수보다 주식 조정 시 바닥 탐색이 더 중요\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e금리 정점 / 인하 시작 전 (예: 2023년 말 ~ 현재)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장기채 비중 단계적 확대 (금리 인하 선반영)\u003c/li\u003e\n\u003cli\u003eTLT, EDV 등 고듀레이션 ETF 적립식 매수\u003c/li\u003e\n\u003cli\u003e개별 채권이라면 10년물 이상 국고채 비중 늘림\u003c/li\u003e\n\u003cli\u003e바벨 전략으로 단기/장기 균형 유지\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e금리 인하기 (확실한 인하 사이클)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장기채 비중 최대화\u003c/li\u003e\n\u003cli\u003e금리 인하 기대 이미 반영될수록 추가 매수는 신중하게\u003c/li\u003e\n\u003cli\u003e인하가 완료되면 수익 실현 후 단기채로 이동\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e금리 안정기 (낮은 금리 지속)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e래더링으로 안정적 현금흐름 확보\u003c/li\u003e\n\u003cli\u003e회사채 스프레드 매력도 비교 검토\u003c/li\u003e\n\u003cli\u003e배당주와 혼합하여 소득 포트폴리오 구성\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 실전 포트폴리오에서 국채 비중\u003c/h2\u003e\n\u003ch3\u003e연령별/리스크 성향별 적정 비중\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e전통적 법칙: \"100 - 나이 = 주식 비중\"\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e30세: 주식 70%, 채권 30%\u003c/li\u003e\n\u003cli\u003e40세: 주식 60%, 채권 40%\u003c/li\u003e\n\u003cli\u003e50세: 주식 50%, 채권 50%\u003c/li\u003e\n\u003cli\u003e60세: 주식 40%, 채권 60%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e하지만 현대적 관점에서 이 법칙은 너무 보수적이라는 의견도 있다. 기대수명이 늘었고, 저금리 시대에는 채권 비중이 높으면 수익률이 크게 낮아지기 때문이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e현대적 접근:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e투자자 유형\u003c/th\u003e\n\u003cth\u003e주식\u003c/th\u003e\n\u003cth\u003e국채\u003c/th\u003e\n\u003cth\u003e현금/단기채\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e공격형 (30대)\u003c/td\u003e\n\u003ctd\u003e80%\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003ctd\u003e5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e성장형 (40대)\u003c/td\u003e\n\u003ctd\u003e70%\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e균형형 (50대)\u003c/td\u003e\n\u003ctd\u003e55%\u003c/td\u003e\n\u003ctd\u003e35%\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e안정형 (60대)\u003c/td\u003e\n\u003ctd\u003e40%\u003c/td\u003e\n\u003ctd\u003e45%\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e보수형 (70대+)\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e55%\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e주식 60% + 채권 40% 포트폴리오의 역사적 성과\u003c/h3\u003e\n\u003cp\u003e\"60/40 포트폴리오\"는 기관 투자자들의 표준 포트폴리오다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e미국 60/40 포트폴리오 성과 (1926~2023년):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e연평균 수익률: 약 8.8%\u003c/li\u003e\n\u003cli\u003e연간 표준편차: 약 11%\u003c/li\u003e\n\u003cli\u003e최대 낙폭(MDD): 약 -27% (순수 주식 -50.9% 대비 양호)\u003c/li\u003e\n\u003cli\u003e샤프비율: 0.50~0.55\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e10년 단위 성과:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기간\u003c/th\u003e\n\u003cth\u003e주식100%\u003c/th\u003e\n\u003cth\u003e60/40\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1990~1999\u003c/td\u003e\n\u003ctd\u003e+18.2%/년\u003c/td\u003e\n\u003ctd\u003e+14.9%/년\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2000~2009\u003c/td\u003e\n\u003ctd\u003e-1.0%/년\u003c/td\u003e\n\u003ctd\u003e+2.9%/년\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2010~2019\u003c/td\u003e\n\u003ctd\u003e+13.6%/년\u003c/td\u003e\n\u003ctd\u003e+9.7%/년\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2020~2022\u003c/td\u003e\n\u003ctd\u003e혼조\u003c/td\u003e\n\u003ctd\u003e혼조\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e2000년대(닷컴버블+금융위기)에서는 60/40이 순수 주식을 크게 앞섰다. 하지만 2010년대 강세장에서는 주식 100%가 압도했다. 최적 비중은 미래 금리 환경에 따라 다르다.\u003c/p\u003e\n\u003ch3\u003e올웨더 포트폴리오에서 채권 역할\u003c/h3\u003e\n\u003cp\u003e레이 달리오의 올웨더 포트폴리오는 어떤 경제 환경에서도 살아남도록 설계되었다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e올웨더 포트폴리오 구성:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주식 30%\u003c/li\u003e\n\u003cli\u003e장기채(20~30년) \u003cstrong\u003e40%\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e중기채(7~10년) \u003cstrong\u003e15%\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e금 7.5%\u003c/li\u003e\n\u003cli\u003e원자재 7.5%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e채권이 무려 55%를 차지한다. 왜 이렇게 많을까?\u003c/p\u003e\n\u003cp\u003e달리오의 논리:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e경제 환경은 성장/침체 × 인플레이션/디플레이션의 4가지 사분면\u003c/li\u003e\n\u003cli\u003e각 사분면에서 가장 좋은 자산이 다름\u003c/li\u003e\n\u003cli\u003e주식은 성장기에 강하지만 침체기에 약함\u003c/li\u003e\n\u003cli\u003e장기채는 침체/디플레이션 시 강하고 성장/인플레이션 시 약함\u003c/li\u003e\n\u003cli\u003e리스크 기여도를 균등하게 하면 채권 명목 비중이 높아질 수밖에 없음\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e올웨더 역사적 성과 (1984~2013, 백테스트):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e연평균 수익률: 9.7%\u003c/li\u003e\n\u003cli\u003e표준편차: 7.6%\u003c/li\u003e\n\u003cli\u003e샤프비율: 0.78 (60/40보다 높음)\u003c/li\u003e\n\u003cli\u003eMDD: -11.6% (순수 주식 대비 훨씬 낮음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e단, 2022년에는 주식과 채권 동시 하락으로 올웨더도 약 -20%대 손실을 기록했다. 인플레이션 시나리오에서의 취약점이다.\u003c/p\u003e\n\u003ch3\u003e금리 인하 사이클 진입 시 장기채 비중 확대 전략\u003c/h3\u003e\n\u003cp\u003e연준(Fed)이 금리 인하 사이클에 진입한 신호:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eFOMC 성명에서 \"인플레이션 목표 달성 자신감\" 표현\u003c/li\u003e\n\u003cli\u003e실업률 상승, 고용 둔화\u003c/li\u003e\n\u003cli\u003eCPI 지속적 하락 (목표 2%에 근접)\u003c/li\u003e\n\u003cli\u003e점도표(Dot Plot)에서 인하 시사\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e금리 인하 사이클 진입 시 전략:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e1단계 (인하 확실시 전):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장기채 ETF 적립식 매수 시작 (TLT, ACE 미국30년국채액티브 등)\u003c/li\u003e\n\u003cli\u003e기존 단기채 비중 유지하되 만기 도래 자금 장기채로 전환\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e2단계 (첫 번째 인하 발표 후):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장기채 비중 목표치 달성\u003c/li\u003e\n\u003cli\u003e이미 시장에 선반영되었으므로 추격 매수 자제\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e3단계 (인하 사이클 진행 중):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e보유 후 수익 관리\u003c/li\u003e\n\u003cli\u003e수익률이 목표에 달하면 단계적 이익 실현\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e4단계 (금리 인하 완료/저금리 정착):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장기채 비중 점차 축소\u003c/li\u003e\n\u003cli\u003e주식, 리츠 등 성장 자산으로 전환\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e역사적 사례 (2019년 금리 인하 사이클):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2019년 7월 첫 인하 → 12월까지 3차례 인하 (2.5% → 1.75%)\u003c/li\u003e\n\u003cli\u003eTLT: 2019년 한 해 +22.8% 수익\u003c/li\u003e\n\u003cli\u003e2019년 초에 TLT에 1억 투자 → 연말 1억 2,280만 원\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e10. 주의사항과 리스크\u003c/h2\u003e\n\u003ch3\u003e인플레이션 리스크 - 가장 큰 적\u003c/h3\u003e\n\u003cp\u003e채권의 최대 적은 인플레이션이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e실질 수익률 계산:\u003c/strong\u003e\n실질 수익률 = 명목 수익률 - 기대 인플레이션\u003c/p\u003e\n\u003cp\u003e예시:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e국고채 10년물 수익률: 3.5%\u003c/li\u003e\n\u003cli\u003e기대 인플레이션: 3.0%\u003c/li\u003e\n\u003cli\u003e실질 수익률: \u003cstrong\u003e0.5%\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e인플레이션이 채권 수익률을 초과하면 실질 구매력이 감소한다. 1980년대 이전 고인플레이션 시대에 채권 보유자들은 실질 자산 가치를 크게 잃었다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e인플레이션 리스크 관리 방법:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTIPS(물가연동채) 또는 KTBi(한국 물가연동국채) 활용\u003c/li\u003e\n\u003cli\u003e채권 만기를 단기로 유지 (인플레이션 상승 시 더 빠르게 재투자)\u003c/li\u003e\n\u003cli\u003e원자재, 리츠, 주식 등 인플레이션 헤지 자산과 혼합\u003c/li\u003e\n\u003cli\u003e브레이크이븐 인플레이션율(BEI) 모니터링\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e브레이크이븐 인플레이션율 활용:\u003c/strong\u003e\nBEI = 일반 국채 수익률 - TIPS 수익률\u003c/p\u003e\n\u003cp\u003eBEI가 현재 기대 인플레이션보다 낮으면 TIPS가 유리, 높으면 일반 국채가 유리.\u003c/p\u003e\n\u003ch3\u003e금리(이자율) 리스크\u003c/h3\u003e\n\u003cp\u003e이미 상세히 설명했지만, 핵심만 다시 정리한다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e보유 채권의 듀레이션이 길수록 금리 변화에 더 민감\u003c/li\u003e\n\u003cli\u003e만기까지 보유하면 금리 리스크가 없음 (원금 + 이자 확정)\u003c/li\u003e\n\u003cli\u003e중도 매도 시 시장 가격으로 팔아야 하므로 손실 발생 가능\u003c/li\u003e\n\u003cli\u003eETF는 만기가 없어 금리 상승기에 지속 손실\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e금리 리스크 관리:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e투자 기간 = 채권 듀레이션에 맞추기 (금리 리스크 면역화)\u003c/li\u003e\n\u003cli\u003e금리 상승 예상 시 듀레이션 축소\u003c/li\u003e\n\u003cli\u003e금리 인하 예상 시 듀레이션 확대\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e유동성 리스크 (개별 채권)\u003c/h3\u003e\n\u003cp\u003e국고채 ETF는 거래소에서 실시간 매매 가능하므로 유동성 문제가 없다. 하지만 개별 채권을 직접 매수할 때는 유동성 문제가 발생할 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e유동성 높은 채권:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e한국 국고채 3년물 (가장 활발히 거래)\u003c/li\u003e\n\u003cli\u003e한국 국고채 10년물\u003c/li\u003e\n\u003cli\u003e미국 T-Bill, T-Note, T-Bond (세계에서 가장 유동성 높음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e유동성 낮은 채권:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e발행규모 소액인 채권\u003c/li\u003e\n\u003cli\u003e한국 50년물 국고채\u003c/li\u003e\n\u003cli\u003e일부 공사채, 지방채\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e유동성이 낮으면:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e사고 싶을 때 살 수 없음\u003c/li\u003e\n\u003cli\u003e팔고 싶을 때 원하는 가격에 못 팔 수 있음\u003c/li\u003e\n\u003cli\u003e매수호가-매도호가 스프레드가 넓어 거래비용 증가\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e개인 투자자 권고:\u003c/strong\u003e 개별 채권 직접 매수보다는 유동성 높은 ETF 활용 권장\u003c/p\u003e\n\u003ch3\u003e환율 리스크 (미국 국채 투자 시)\u003c/h3\u003e\n\u003cp\u003e미국 국채 ETF(달러 표시)에 투자할 때는 환율 변동이 수익률에 큰 영향을 미친다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e영향 계산 예시:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTLT가 달러로 +10% 상승\u003c/li\u003e\n\u003cli\u003e동기간 달러/원 환율이 1,300원 → 1,200원으로 하락 (-7.7%)\u003c/li\u003e\n\u003cli\u003e원화 기준 실제 수익률 ≈ +10% - 7.7% = \u003cstrong\u003e+2.3%\u003c/strong\u003e (기대보다 크게 낮음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e반대 시나리오:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTLT가 +10% 상승\u003c/li\u003e\n\u003cli\u003e달러/원 환율이 1,300원 → 1,400원으로 상승 (+7.7%)\u003c/li\u003e\n\u003cli\u003e원화 기준 실제 수익률 ≈ +10% + 7.7% = \u003cstrong\u003e+17.7%\u003c/strong\u003e (기대보다 크게 높음)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e환율 리스크 대응:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e환헤지 ETF 사용: 환율 변동 제거, 헤지 비용(현재 약 1.5~2%/년) 부담\u003c/li\u003e\n\u003cli\u003e환노출 ETF 유지: 경기침체 시 달러 강세 효과로 추가 수익 가능\u003c/li\u003e\n\u003cli\u003e분산: 환헤지 50% + 환노출 50%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e달러 보유의 자체적 가치:\u003c/strong\u003e\n달러는 기축통화로 위기 시 강세를 보이는 경향이 있다. 일부 투자자는 환노출 달러 국채를 \"달러 강세 헤지 + 채권 이자\" 두 가지 혜택을 동시에 얻을 수 있다고 본다.\u003c/p\u003e\n\u003ch3\u003e2022년 채권 대폭락의 교훈\u003c/h3\u003e\n\u003cp\u003e2022년은 채권 역사상 가장 나쁜 해 중 하나였다. 자세히 분석해보자.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2022년 무슨 일이 있었나:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e배경:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2020\u003cdel\u003e2021년 코로나 대응 초저금리 (0\u003c/del\u003e0.25%) + 대규모 재정정책\u003c/li\u003e\n\u003cli\u003e2021년 하반기부터 인플레이션 급등\u003c/li\u003e\n\u003cli\u003e2022년 2월 러시아-우크라이나 전쟁으로 에너지/식품 가격 폭등\u003c/li\u003e\n\u003cli\u003e2022년 3월~12월: 연준 기준금리 0.25% → 4.5% (사상 최속 인상)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e결과:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBloomberg 미국 채권 총수익 지수: \u003cstrong\u003e-13%\u003c/strong\u003e (1926년 이후 최악)\u003c/li\u003e\n\u003cli\u003eTLT(20년+ 장기채): \u003cstrong\u003e-31%\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eIEF(7-10년 중기채): \u003cstrong\u003e-16%\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e동시에 S\u0026#x26;P 500: \u003cstrong\u003e-19.4%\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e60/40 포트폴리오: 약 -16% (주식과 채권이 동시에 빠졌으므로 헤지 효과 없음)\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e왜 2022년에는 역상관이 깨졌나:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e인플레이션 충격 → 연준이 급격한 금리 인상 → 채권 가격 폭락\n동시에 금리 인상으로 인한 경기 둔화 우려 → 주식도 하락\u003c/p\u003e\n\u003cp\u003e핵심: 인플레이션 쇼크는 주식-채권 역상관이 성립하지 않는 특수한 환경이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2022년의 교훈:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e\"안전자산\"도 시장 환경에 따라 크게 손실날 수 있다\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e특히 인플레이션 + 급격한 금리 인상 환경에서 장기채는 위험\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e인플레이션 헤지를 별도로 구성해야 한다\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTIPS, 원자재, 리츠, 일부 주식 등\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e듀레이션 관리가 핵심이다\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리 인상 사이클에서는 장기채를 줄이고 단기채로 이동해야\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e채권 ETF는 만기가 없어 회복 기간이 불명확하다\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e개별 채권은 만기까지 보유하면 원금 회수 가능하지만, ETF는 그렇지 않음\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003e분산만으로는 부족할 수 있다\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e올웨더 포트폴리오도 2022년에 -20%대 손실 기록\u003c/li\u003e\n\u003cli\u003e거시경제 리스크에 대한 동적 대응이 필요\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e결론: 국채 투자를 어떻게 시작할 것인가\u003c/h2\u003e\n\u003ch3\u003e초보자를 위한 단계별 행동 계획\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e1단계: 개념 이해 (이 글로 완료)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리와 채권 가격의 역관계\u003c/li\u003e\n\u003cli\u003e듀레이션 개념\u003c/li\u003e\n\u003cli\u003e환율 리스크\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2단계: 포트폴리오에서 국채 비중 결정\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e본인 나이와 리스크 허용도 고려\u003c/li\u003e\n\u003cli\u003e주식의 50\u003cdel\u003e70%를 기준으로 채권 30\u003c/del\u003e50% 설정\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e3단계: 금리 환경 파악\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e현재 수익률 곡선 형태는? (정상/역전/플랫)\u003c/li\u003e\n\u003cli\u003e중앙은행의 금리 방향은?\u003c/li\u003e\n\u003cli\u003eTIPS BEI는 얼마인가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e4단계: 투자 수단 선택\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e초보자라면:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e국내 투자: KODEX/TIGER 국고채 3년 ETF로 시작\u003c/li\u003e\n\u003cli\u003e해외 투자: ACE 미국30년국채액티브(H) 또는 IEF 중 선택\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e금리 환경별:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e금리 인하 기대: 장기채 ETF (TLT, ACE 미국30년국채)\u003c/li\u003e\n\u003cli\u003e금리 불확실: 중기채 ETF (IEF, TIGER 미국채10년선물)\u003c/li\u003e\n\u003cli\u003e금리 상승 우려: 단기채 (SHY, BIL)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e5단계: 정기적 리밸런싱\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e연 1~2회 목표 비중으로 리밸런싱\u003c/li\u003e\n\u003cli\u003e금리 환경 변화에 따라 듀레이션 조정\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e최종 메시지\u003c/h3\u003e\n\u003cp\u003e국채는 지루하지 않다. 2019년 TLT +22%, 2020년 장기채 +25%는 주식 못지않은 수익률이다. 2022년의 교훈처럼 리스크도 있지만, 이를 이해하고 관리하면 포트폴리오를 안정시키는 강력한 도구가 된다.\u003c/p\u003e\n\u003cp\u003e주식만으로 투자한다면, 당신의 포트폴리오는 경기침체 시 50% 이상 손실을 볼 수 있다. 하지만 국채를 적절히 배분하면 그 손실을 20~30%로 줄이고, 채권 수익으로 저점에서 주식을 저가 매수할 수 있는 여력을 확보할 수 있다.\u003c/p\u003e\n\u003cp\u003e\"채권은 수비이고, 주식은 공격이다. 수비 없이는 챔피언이 될 수 없다.\"\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e마지막 업데이트: 2026-03-14\u003c/em\u003e\n\u003cem\u003e주의: 이 글은 교육 목적의 참고자료이며, 실제 투자 결정은 개인의 상황과 전문 금융 조언을 바탕으로 해야 합니다.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-14\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"국채란 무엇인가, 왜 사야 하는가\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.p
