1).\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상관계수\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e+1\u003c/td\u003e\n\u003ctd\u003e완전히 같이 움직임 (분산 효과 없음)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003ctd\u003e독립적으로 움직임\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e-1\u003c/td\u003e\n\u003ctd\u003e완전히 반대로 움직임 (최대 분산 효과)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e서로 낮은 상관관계\u003c/strong\u003e를 가진 자산들을 묶으면 개별 자산의 변동성보다 포트폴리오 전체 변동성이 낮아진다.\u003c/p\u003e\n\u003ch3\u003e분산 효과가 있는 자산 조합 예시\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e주식 + 채권 (일반적으로 역의 관계)\u003c/li\u003e\n\u003cli\u003e국내주식 + 해외주식\u003c/li\u003e\n\u003cli\u003e성장주 + 배당주\u003c/li\u003e\n\u003cli\u003e주식 + 금\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e분산의 한계: 함께 무너지는 상관관계\u003c/h3\u003e\n\u003cp\u003e평상시에는 상관관계가 낮은 자산도 \u003cstrong\u003e위기 국면에서는 동시에 하락\u003c/strong\u003e하는 경향이 있다. 2008년 금융위기, 2020년 코로나 쇼크 당시 주식·하이일드채권·원자재가 동시에 급락한 것이 대표적 사례다. 진정한 분산은 위기 시에도 음의 상관관계를 유지하는 자산(국채, 금, 달러)을 포함해야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e리스크 측정 지표\u003c/h2\u003e\n\u003ch3\u003e샤프비율 (Sharpe Ratio): 리스크 대비 수익률의 기준\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e샤프비율 = (포트폴리오 수익률 - 무위험수익률) / 포트폴리오 표준편차\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e무위험수익률은 통상 국채 금리(한국 3년물 국채 또는 미국 T-bill)를 사용한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-section\"\u003e[예시]\u003c/span\u003e\nA 포트폴리오: 연수익률 12%, 표준편차 20%, 무위험수익률 3%\n→ 샤프비율 = (12-3) / \u003cspan class=\"hljs-attr\"\u003e20\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e0.45\u003c/span\u003e\n\nB 포트폴리오: 연수익률 8%, 표준편차 8%, 무위험수익률 3%\n→ 샤프비율 = (8-3) / \u003cspan class=\"hljs-attr\"\u003e8\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e0.625\u003c/span\u003e\n\nB가 수익률은 낮지만 리스크 대비 효율은 더 높다.\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e샤프비율\u003c/th\u003e\n\u003cth\u003e평가\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1.0 이상\u003c/td\u003e\n\u003ctd\u003e우수\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e0.5~1.0\u003c/td\u003e\n\u003ctd\u003e양호\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e0~0.5\u003c/td\u003e\n\u003ctd\u003e보통\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e0 미만\u003c/td\u003e\n\u003ctd\u003e무위험 자산보다 못함\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e실전 활용\u003c/strong\u003e: 두 펀드나 포트폴리오를 비교할 때 수익률만 보지 말고 샤프비율을 함께 봐야 한다. 수익률이 더 낮아도 샤프비율이 높은 쪽이 더 효율적인 투자다.\u003c/p\u003e\n\u003ch3\u003e최대낙폭 (MDD: Maximum Drawdown)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eMDD\u003c/span\u003e = (최고점 - 최저점) / 최고점 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e포트폴리오가 고점 대비 최대 얼마나 하락했는지를 나타내는 지표. 투자자의 심리적 고통과 실제 손실을 가장 직관적으로 보여준다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-section\"\u003e[예시]\u003c/span\u003e\n계좌 최고 잔액: 5,000만원\n이후 최저 잔액: 3,000만원\n\u003cspan class=\"hljs-attr\"\u003eMDD\u003c/span\u003e = (\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e - \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e) / \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e%\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003eMDD가 중요한 이유\u003c/strong\u003e:\u003c/p\u003e\n\u003cp\u003eMDD에서 원금 회복까지 필요한 수익률은 비대칭적이다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMDD\u003c/th\u003e\n\u003cth\u003e원금 회복에 필요한 수익률\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e-20%\u003c/td\u003e\n\u003ctd\u003e+25%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e-30%\u003c/td\u003e\n\u003ctd\u003e+43%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e-50%\u003c/td\u003e\n\u003ctd\u003e+100%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e-70%\u003c/td\u003e\n\u003ctd\u003e+233%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e50% 손실은 100% 수익이 있어야 회복된다. MDD가 클수록 회복이 기하급수적으로 어려워진다. \u003cstrong\u003eMDD를 낮추는 것이 장기 복리 수익률에 결정적 영향\u003c/strong\u003e을 미친다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e역사적 MDD 참고\u003c/strong\u003e:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지수/전략\u003c/th\u003e\n\u003cth\u003e역사적 최대 MDD\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eS\u0026#x26;P 500\u003c/td\u003e\n\u003ctd\u003e-57% (2008~2009년)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e코스피\u003c/td\u003e\n\u003ctd\u003e-71% (1997~1998년 IMF)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e나스닥\u003c/td\u003e\n\u003ctd\u003e-83% (2000~2002년 닷컴버블)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e올웨더 포트폴리오\u003c/td\u003e\n\u003ctd\u003e-13% (2008~2009년)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영구 포트폴리오\u003c/td\u003e\n\u003ctd\u003e-19% (동기간)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e자산배분 전략\u003c/h2\u003e\n\u003ch3\u003e연령 기반 배분 (고전적 방법)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e주식 비중 = 100 - 나이\n\n예) 30세 → 주식 70%, 채권 30%\n\u003cspan class=\"hljs-code\"\u003e    50세 → 주식 50%, 채권 50%\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e나이가 들수록 안전자산 비중 증가. 단순하지만 개인 상황과 맞지 않을 수 있음.\u003c/p\u003e\n\u003cp\u003e저금리 시대에는 \u003ccode\u003e110 - 나이\u003c/code\u003e 또는 \u003ccode\u003e120 - 나이\u003c/code\u003e로 조정하는 견해도 있다. 기대수명이 늘어나면서 60대에도 30~40년의 투자 기간이 남아있어 지나치게 보수적인 배분은 오히려 인플레이션 리스크를 키울 수 있다.\u003c/p\u003e\n\u003ch3\u003e영구 포트폴리오 (Permanent Portfolio)\u003c/h3\u003e\n\u003cp\u003e해리 브라운의 전략. 어떤 경제 상황에서도 견디도록 설계.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e유리한 환경\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e경제 성장기\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기채권\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e디플레이션, 불황\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e인플레이션\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e현금\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e경기침체\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e올웨더 포트폴리오 (레이 달리오)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식\u003c/td\u003e\n\u003ctd\u003e30%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기채권\u003c/td\u003e\n\u003ctd\u003e40%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e중기채권\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e7.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e원자재\u003c/td\u003e\n\u003ctd\u003e7.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e올웨더의 약점: 채권 비중이 55%로 매우 높다. 2022년처럼 금리가 급격히 오르는 국면에서는 채권과 주식이 동시에 하락해 -20% 이상 손실이 났다. 저금리 시대에 개발된 전략이므로 금리 환경에 따라 채권 비중을 조정하는 유연성이 필요하다.\u003c/p\u003e\n\u003ch3\u003e코어-새틀라이트 전략\u003c/h3\u003e\n\u003cp\u003e기관투자자와 개인 고액자산가들이 가장 많이 사용하는 현실적 전략이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e전체 포트폴리오\n\n코어 (\u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e80%\u003c/span\u003e): 저비용 ETF로 시장 수익률 확보\n├── 국내주식 ETF (코스피\u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e)\n├── 미국주식 ETF (S\u0026#x26;P500)\n├── 선진국주식 ETF\n└── 채권 ETF\n\n새틀라이트 (\u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e30%\u003c/span\u003e): 초과수익 추구\n├── 개별 성장주 (\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e)\n├── 테마 ETF (AI, 반도체, 헬스케어)\n├── 배당주 포트폴리오\n└── 원자재, 리츠, 대안투자\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e코어-새틀라이트의 장점\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e코어로 시장 수익률(베타) 확보 → 시장 대비 과도한 하락 방지\u003c/li\u003e\n\u003cli\u003e새틀라이트로 초과수익(알파) 추구\u003c/li\u003e\n\u003cli\u003e심리적 안정: 새틀라이트 종목이 하락해도 코어가 버팀\u003c/li\u003e\n\u003cli\u003e운용 효율: 코어는 리밸런싱만, 새틀라이트에만 집중 분석 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e한국 투자자를 위한 실전 자산배분\u003c/h2\u003e\n\u003ch3\u003e기본형 (30대, 중간 위험 성향)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e상품 예시\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e국내주식\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003ctd\u003eKODEX 200, TIGER 코스피\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e미국주식\u003c/td\u003e\n\u003ctd\u003e35%\u003c/td\u003e\n\u003ctd\u003eTIGER 미국S\u0026#x26;P500, KODEX 미국MSCI\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e선진국주식\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003eTIGER 선진국MSCI\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e국내채권\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003ctd\u003eKODEX 국고채10년\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e미국채권\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003eTIGER 미국채10년선물\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e7%\u003c/td\u003e\n\u003ctd\u003eKODEX 골드선물(H)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e현금성\u003c/td\u003e\n\u003ctd\u003e3%\u003c/td\u003e\n\u003ctd\u003e파킹통장, CMA\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e배당 중심형 (40~50대, 현금흐름 필요)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e상품 예시\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e국내 배당ETF\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003ctd\u003eTIGER 코스피고배당, ARIRANG 고배당\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e미국 배당ETF\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003eSCHD, VYM (해외 직접 or 국내 상장 버전)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e성장주 ETF\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P500, 나스닥100\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e국내채권\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003ctd\u003e국고채, 회사채 ETF\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금/원자재\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003eKODEX 골드선물\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e리츠\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e맥쿼리인프라, 롯데리츠\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e은퇴 준비형 (50대 이후, 자본 보전 + 인출)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e특이사항\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당주/배당ETF\u003c/td\u003e\n\u003ctd\u003e30%\u003c/td\u003e\n\u003ctd\u003e월 생활비 충당\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e채권\u003c/td\u003e\n\u003ctd\u003e35%\u003c/td\u003e\n\u003ctd\u003e물가연동채 포함\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식 ETF\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003ctd\u003e성장성 유지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e인플레이션 헤지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e현금\u003c/td\u003e\n\u003ctd\u003e5%\u003c/td\u003e\n\u003ctd\u003e1~2년 생활비 비상금\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e환헤지와 달러 자산의 역할\u003c/h2\u003e\n\u003ch3\u003e환헤지 여부 결정 기준\u003c/h3\u003e\n\u003cp\u003e해외 투자 시 환헤지(H) 상품과 환노출(unhedged) 상품 중 어느 것을 선택해야 할까?\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e환헤지 비용\u003c/strong\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e환헤지 비용 ≈ 한국 금리 - 미국 금리 (금리 차이)\n\n\u003cspan class=\"hljs-number\"\u003e2024\u003c/span\u003e년 기준: 한국 \u003cspan class=\"hljs-number\"\u003e3.5%\u003c/span\u003e - 미국 \u003cspan class=\"hljs-number\"\u003e5.25%\u003c/span\u003e = -\u003cspan class=\"hljs-number\"\u003e1.75%\u003c/span\u003e\n즉, 달러를 헤지할 때 연 약 \u003cspan class=\"hljs-number\"\u003e1.75%\u003c/span\u003e의 비용 발생\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e금리 차가 크면 클수록 헤지 비용이 커진다. 미국 금리가 한국보다 높은 현재 상황에서 달러 자산을 헤지하면 수익률 일부를 포기하는 것이다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e환헤지 유리\u003c/th\u003e\n\u003cth\u003e환노출 유리\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e환율 방향\u003c/td\u003e\n\u003ctd\u003e원화 강세 예상\u003c/td\u003e\n\u003ctd\u003e원화 약세 예상\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금리 환경\u003c/td\u003e\n\u003ctd\u003e한국 금리 \u003e 미국 금리\u003c/td\u003e\n\u003ctd\u003e미국 금리 \u003e 한국 금리\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 기간\u003c/td\u003e\n\u003ctd\u003e단기 (1~2년)\u003c/td\u003e\n\u003ctd\u003e장기 (5년 이상)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 목적\u003c/td\u003e\n\u003ctd\u003e순수 자산 수익 추구\u003c/td\u003e\n\u003ctd\u003e포트폴리오 헤지 포함\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e달러 비중 보유의 헤지 효과\u003c/h3\u003e\n\u003cp\u003e한국 투자자에게 달러 자산은 단순한 수익 추구 수단 이상의 역할을 한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e원화 약세(원/달러 환율 상승) 발생 시나리오:\n→ 경제 위기, 글로벌 리스크 OFF 국면\n→ 이 때 코스피도 동반 하락\n\n달러 자산 보유 효과:\n코스피 -\u003cspan class=\"hljs-number\"\u003e20%\u003c/span\u003e → 원화 -\u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e 약세 발생 시\n달러 자산은 달러 기준 손실이 있어도 원화 환산 손실이 줄어듦\n\n예시) 달러 자산 \u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e 하락 + 달러 \u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e 강세 = 원화 환산 손실 \u003cspan class=\"hljs-number\"\u003e0%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e역사적으로 원화 약세와 코스피 하락은 강한 양(+) 상관관계를 보인다. 달러 자산은 \u003cstrong\u003e한국 시장 하락 시 자동으로 헤지되는 효과\u003c/strong\u003e가 있다. 포트폴리오의 20~40%를 달러 자산으로 유지하는 것이 한국 투자자에게 합리적인 이유다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e인플레이션 국면 포트폴리오 조정\u003c/h2\u003e\n\u003cp\u003e2022~2023년처럼 인플레이션이 높을 때는 전통적인 주식+채권 포트폴리오가 동시에 하락하는 위험이 있다 (주가 하락 + 금리 상승으로 채권 가격도 하락).\u003c/p\u003e\n\u003ch3\u003e인플레이션 국면에서 강한 자산\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e이유\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e원자재 (원유, 금속)\u003c/td\u003e\n\u003ctd\u003e실물 자산, 인플레이션과 직접 연동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e전통적 인플레이션 헤지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e물가연동채 (TIPS)\u003c/td\u003e\n\u003ctd\u003e원금이 소비자물가와 연동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부동산/리츠\u003c/td\u003e\n\u003ctd\u003e임대료가 물가에 연동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e에너지주\u003c/td\u003e\n\u003ctd\u003e원유 가격 상승의 직접 수혜\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융주\u003c/td\u003e\n\u003ctd\u003e금리 상승 국면에서 NIM 확대\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e인플레이션 국면 포트폴리오 조정 예시\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e평상시 → 인플레이션 우려 국면으로 전환 시\n\n채권 비중 축소: 40% → 15% (금리 상승에 취약)\n물가연동채 추가: 0% → 10%\n원자재 ETF 추가: 5% → 15%\n에너지주 ETF 추가: 0% → 10%\n주식 내 섹터 조정: 성장주 → 가치주·배당주 비중 확대\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e단, 인플레이션 국면이 영원히 지속되지는 않는다. 인플레이션이 정점을 지나면 원자재 비중을 다시 줄이고 채권을 늘리는 역방향 조정이 필요하다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e리밸런싱\u003c/h2\u003e\n\u003cp\u003e시간이 지나면 자산 비중이 목표에서 벗어남. 주기적으로 원래 비중으로 되돌리는 작업.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e목표: 주식 60%, 채권 40%\u003c/span\u003e\n\n1년 후 주식이 올라서 주식 75%, 채권 25%가 됨\n→ 주식 일부 매도 + 채권 매수\n→ 다시 60:40으로 맞춤\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e리밸런싱 방법\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e방법\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e정기 리밸런싱\u003c/td\u003e\n\u003ctd\u003e6개월 or 1년마다 기계적으로 실행\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e임계값 리밸런싱\u003c/td\u003e\n\u003ctd\u003e비중이 ±5% 벗어나면 실행\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e리밸런싱은 자동으로 \"비싼 것 팔고, 싼 것 사는\" 효과. 세금·수수료 고려해서 너무 자주 하지 말 것.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e리밸런싱 세금 최적화\u003c/h3\u003e\n\u003cp\u003e리밸런싱 시 수익 난 자산을 팔면 양도소득세·배당소득세가 발생한다. 이를 줄이는 방법:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e신규 투자금 활용\u003c/strong\u003e: 비중이 줄어든 자산에 신규 자금을 추가 투자해 매도 없이 리밸런싱\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e계좌별 분리\u003c/strong\u003e: 연금저축·IRP 내에서 리밸런싱하면 세금 없이 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e손실 실현과 함께\u003c/strong\u003e: 손실 종목을 팔아 세금을 줄이면서 동시에 리밸런싱\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e연말 기준\u003c/strong\u003e: 한국 주식은 대주주 양도세 판단 기준이 연말이므로 이를 고려한 타이밍\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e개인연금(IRP)/퇴직연금(DC형)에서의 포트폴리오 구성\u003c/h2\u003e\n\u003ch3\u003e세제 혜택 활용\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e계좌\u003c/th\u003e\n\u003cth\u003e세액공제\u003c/th\u003e\n\u003cth\u003e연간 한도\u003c/th\u003e\n\u003cth\u003e수익 과세\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e연금저축펀드\u003c/td\u003e\n\u003ctd\u003e13.2~16.5%\u003c/td\u003e\n\u003ctd\u003e400만원\u003c/td\u003e\n\u003ctd\u003e연금 수령 시 3.3~5.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eIRP\u003c/td\u003e\n\u003ctd\u003e13.2~16.5%\u003c/td\u003e\n\u003ctd\u003e연금저축 합산 700만원\u003c/td\u003e\n\u003ctd\u003e연금 수령 시 3.3~5.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e300만원 납입 시 세액공제: 약 39.6만\u003cdel\u003e49.5만원. 이것 자체가 즉시 10\u003c/del\u003e16% 수익률이다.\u003c/p\u003e\n\u003ch3\u003eIRP/연금저축 운용 제한 사항\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e위험자산(주식형 ETF·펀드) 편입 한도: \u003cstrong\u003e70%\u003c/strong\u003e (안전자산 30% 이상 의무)\u003c/li\u003e\n\u003cli\u003e안전자산: 채권형 펀드, 예금, MMF, TDF(타겟데이트펀드) 등\u003c/li\u003e\n\u003cli\u003e레버리지·인버스 ETF는 편입 불가\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eIRP 실전 포트폴리오 예시 (40대, 은퇴 20년 전)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e위험자산\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(70%)\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e├──\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e미국S\u0026#x26;P500\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eETF:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e├──\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e선진국주식\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eETF:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e└──\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e국내주식\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eETF:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\n\u003cspan class=\"hljs-string\"\u003e안전자산\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(30%)\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e├──\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTDF2045\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eor\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e채권혼합형:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e└──\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e채권형\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eETF:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e은퇴 5년 전부터 주식 비중을 줄이고 안전자산 비중을 높여가는 글라이드패스 전략이 권장된다.\u003c/p\u003e\n\u003ch3\u003eTDF(타겟데이트펀드) 활용\u003c/h3\u003e\n\u003cp\u003e은퇴 목표 연도를 설정하면 자동으로 주식→채권 비중을 조정해주는 펀드. IRP 운용이 번거롭다면 TDF 단일 상품으로 간소화할 수 있다. 단, 보수가 0.3~0.7%로 ETF보다 높다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e투자 목표별 포트폴리오 유형\u003c/h2\u003e\n\u003ch3\u003e1. 노후 대비형 (20~30년 시계열)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e목표\u003c/strong\u003e: 물가상승률을 상회하는 실질 수익률 + 은퇴 후 인출 가능한 포트폴리오\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e적립 단계 (은퇴 10년 전까지):\n\u003cspan class=\"hljs-deletion\"\u003e- 주식 ETF 70~80% (성장 극대화)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 채권 + 금 20~30%\u003c/span\u003e\n\n전환 단계 (은퇴 5~10년 전):\n\u003cspan class=\"hljs-deletion\"\u003e- 주식 ETF 50~60%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 채권 30~35%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 배당주 10~15%\u003c/span\u003e\n\n인출 단계 (은퇴 후):\n\u003cspan class=\"hljs-deletion\"\u003e- 배당주/배당ETF 35%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 채권 35%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 주식 ETF 20%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 현금 10% (2년치 생활비)\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e4% 룰: 포트폴리오의 4%씩 연간 인출하면 30년간 고갈 확률이 낮다는 Trinity Study 결과. 10억 포트폴리오 → 연 4,000만원 인출 가능.\u003c/p\u003e\n\u003ch3\u003e2. 단기 목돈 마련형 (3~5년 시계열)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e목표\u003c/strong\u003e: 원금 보전 우선, 물가상승률 + α 추구\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e\u003cspan class=\"hljs-deletion\"\u003e- 채권형 ETF / 단기채: 40%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 주식 ETF (변동성 낮은 선진국): 30%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 금: 15%\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 현금성 (파킹통장, CMA): 15%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e주의: 3\u003cdel\u003e5년 내 써야 할 돈은 주식 비중을 50% 이상으로 올리지 말 것. 하락장이 3\u003c/del\u003e5년 지속될 수 있다.\u003c/p\u003e\n\u003ch3\u003e3. 월 배당(현금흐름) 형\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e목표\u003c/strong\u003e: 매월 일정 금액의 현금 수입\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e국내\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e배당ETF\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(연\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e회\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e배당):\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003eSCHD/VYM\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(분기\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e배당):\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e25\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e월배당\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eETF\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(JEPI,\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eJEPQ):\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e   \u003cspan class=\"hljs-string\"\u003e←\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e커버드콜\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e전략,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e월\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e배당\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e국내\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e리츠\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(분기\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e배당):\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e배당주\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e직접\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e투자:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e채권\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eETF:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e월배당 포트폴리오의 핵심은 \u003cstrong\u003e배당 지급 일정을 분산\u003c/strong\u003e하는 것이다. 국내 연말 배당, 미국 분기 배당, 월배당 ETF를 조합하면 매월 일정한 현금흐름을 만들 수 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e리스크 관리\u003c/h2\u003e\n\u003ch3\u003e손실 허용 범위 설정\u003c/h3\u003e\n\u003cp\u003e투자 전 \"이 정도 손실은 감당할 수 있다\"는 선을 미리 정해두는 것.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e투자금 1,000만원, 최대 손실 허용 20%\n→ 200만원 손실 시 전량 매도 또는 재검토\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e손절 vs 버티기\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상황\u003c/th\u003e\n\u003cth\u003e대응\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e내가 분석한 투자 근거가 여전히 유효\u003c/td\u003e\n\u003ctd\u003e버티거나 추가 매수\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 근거가 무너짐 (실적 악화, 구조적 문제)\u003c/td\u003e\n\u003ctd\u003e손절\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e단순히 주가가 내렸음\u003c/td\u003e\n\u003ctd\u003e근거 재검토 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"손절은 부끄러운 게 아니다. 틀렸다는 걸 인정하는 것이다.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e집중투자 vs 분산투자\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e전략\u003c/th\u003e\n\u003cth\u003e장점\u003c/th\u003e\n\u003cth\u003e단점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e집중투자 (5종목 이내)\u003c/td\u003e\n\u003ctd\u003e고수익 가능, 깊은 분석 가능\u003c/td\u003e\n\u003ctd\u003e한 종목 급락 시 타격 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e분산투자 (10~20종목)\u003c/td\u003e\n\u003ctd\u003e리스크 분산\u003c/td\u003e\n\u003ctd\u003e시장 수익률 수렴 경향\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eETF 투자\u003c/td\u003e\n\u003ctd\u003e자동 분산, 저비용\u003c/td\u003e\n\u003ctd\u003e초과수익 어려움\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e행동재무학: 투자자가 자주 저지르는 실수\u003c/h2\u003e\n\u003cp\u003e이론과 달리 실제 투자자들은 비합리적으로 행동한다. 자신의 심리적 편향을 이해하는 것이 수익률 개선의 첫 단계다.\u003c/p\u003e\n\u003ch3\u003e1. 손실 회피 편향 (Loss Aversion)\u003c/h3\u003e\n\u003cp\u003e손실의 고통이 같은 크기 이익의 기쁨보다 2~2.5배 강하게 느껴진다는 카너먼·트버스키의 연구.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e실전 증상:\n\u003cspan class=\"hljs-deletion\"\u003e- 수익 난 종목을 너무 빨리 팔고 (이익 확정 심리)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 손실 난 종목을 너무 오래 보유 (손실 회피 심리)\u003c/span\u003e\n→ 결과: 좋은 종목은 빨리 없애고 나쁜 종목만 남은 포트폴리오\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e해결책\u003c/strong\u003e: 매도 결정 시 \"이 종목이 없고 현금이 있다면 지금 살 것인가?\"를 스스로에게 물어라.\u003c/p\u003e\n\u003ch3\u003e2. 처분 효과 (Disposition Effect)\u003c/h3\u003e\n\u003cp\u003e승자는 팔고 패자는 보유하는 경향. 세금 관점에서도, 투자 성과 관점에서도 최악의 행동이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-arduino\"\u003e실전 증상:\n삼성전자 \u003cspan class=\"hljs-number\"\u003e+30\u003c/span\u003e% → 빨리 팔아서 이익 확정\n카카오 \u003cspan class=\"hljs-number\"\u003e-40\u003c/span\u003e% → \u003cspan class=\"hljs-string\"\u003e\"언젠가 오르겠지\"\u003c/span\u003e로 보유 지속\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e해결책\u003c/strong\u003e: 정기적으로 포트폴리오 전체를 점검하고, 각 종목의 투자 thesis가 여전히 유효한지 냉정하게 평가하라.\u003c/p\u003e\n\u003ch3\u003e3. 확증 편향 (Confirmation Bias)\u003c/h3\u003e\n\u003cp\u003e내가 보유한 종목에 유리한 정보만 받아들이고, 불리한 뉴스는 무시하거나 과소평가하는 경향.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e실전 증상:\n\u003cspan class=\"hljs-deletion\"\u003e- \"이건 일시적 악재야, 곧 올라\"\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 긍정적인 애널리스트 리포트만 읽음\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 부정적 시각을 가진 사람을 \"모르는 사람\"으로 치부\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e해결책\u003c/strong\u003e: 매수 전 반드시 해당 종목의 **약세론(베어 케이스)**을 적극적으로 찾아 읽어라. 투자 thesis를 반박할 수 있는 논거가 있는지 확인하라.\u003c/p\u003e\n\u003ch3\u003e4. 최근성 편향 (Recency Bias)\u003c/h3\u003e\n\u003cp\u003e최근 경험을 과도하게 미래에 투영하는 경향.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e실전 증상:\n\u003cspan class=\"hljs-deletion\"\u003e- 상승장이 계속되면 \"이번엔 다르다\"며 무리한 투자\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 하락장이 계속되면 \"더 떨어질 것\"이라며 매수 기회 놓침\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 2020년 코로나 급락 때 주식 팔고 2021년 급등 놓친 투자자\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e해결책\u003c/strong\u003e: 정기 적립식 투자(DCA)로 시장 타이밍 예측 필요성을 없애라.\u003c/p\u003e\n\u003ch3\u003e5. 과잉확신 편향 (Overconfidence Bias)\u003c/h3\u003e\n\u003cp\u003e자신의 분석과 예측 능력을 과대평가하는 경향. 초보자보다 \u003cstrong\u003e중간 수준의 지식을 가진 투자자\u003c/strong\u003e에게 더 심하게 나타난다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e실전 증상:\n\u003cspan class=\"hljs-deletion\"\u003e- 레버리지 투자 (3배 ETF, 신용거래)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 단기 매매 빈도 증가 (잦은 매매는 수수료+세금 증가)\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- \"나는 시장을 이길 수 있다\"는 과신\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e현실\u003c/strong\u003e: S\u0026#x26;P500을 15년 이상 장기 추종한 인덱스 펀드가 전문 액티브 펀드의 80~90%를 이긴다는 연구 결과가 반복적으로 나온다. 개인 투자자가 시장을 이기기는 극도로 어렵다.\u003c/p\u003e\n\u003ch3\u003e6. 군중 심리 (Herding Behavior)\u003c/h3\u003e\n\u003cp\u003e남들이 사면 사고, 남들이 팔면 파는 경향.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e증시 사이클과 개인투자자 행동 패턴:\n거품 형성 → 뉴스 도배 → 개인 투자자 유입 (고점 매수)\n하락 시작 → 공포 → 개인 투자자 매도 (저점 매도)\n→ 고점에 사서 저점에 파는 최악의 패턴\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e해결책\u003c/strong\u003e: 워런 버핏의 말: \"남들이 탐욕스러울 때 두려워하고, 남들이 두려워할 때 탐욕스러워라.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e투자 원칙\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e잃지 않는 것이 먼저다\u003c/strong\u003e — 수익률보다 원금 보존 우선. MDD를 낮추는 것이 장기 복리의 핵심\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e모르면 사지 마라\u003c/strong\u003e — 사업 이해 못 하는 기업에 투자 금지\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e여유 자금으로만 투자\u003c/strong\u003e — 빚투, 생활비 투자는 판단을 흐림. 레버리지는 MDD를 기하급수적으로 키움\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e단기 변동성에 흔들리지 마라\u003c/strong\u003e — 좋은 기업은 10년을 봐야\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e분할 매수\u003c/strong\u003e — 한 번에 전량 매수보다 여러 번 나눠 매수\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e시스템으로 투자하라\u003c/strong\u003e — 감정이 아닌 규칙(자산배분 비율, 리밸런싱 주기)에 따라 기계적으로 실행\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e비용을 최소화하라\u003c/strong\u003e — 수수료, 세금, 스프레드는 복리로 쌓이는 비용이다. ETF 보수 0.5% 차이가 30년이면 원금의 15% 이상 차이\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e포트폴리오 관리 체크리스트\u003c/h2\u003e\n\u003cp\u003e분기마다 또는 시장 급변 시 점검해야 할 항목:\u003c/p\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 자산 비중이 목표 대비 ±5% 이상 벗어났는가? (리밸런싱 필요)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 샤프비율이 0.5 이상을 유지하고 있는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e MDD가 개인 손실 허용 범위 내인가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 인플레이션/금리 환경 변화에 대응한 조정이 필요한가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 세제 혜택 계좌(IRP, 연금저축, ISA)를 최대한 활용하고 있는가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 행동 편향(확증 편향, 처분 효과)으로 잘못된 판단을 하고 있지는 않은가?\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 달러/해외자산 비중이 원화 리스크를 헤지하기에 충분한가?\u003c/li\u003e\n\u003c/ul\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"포트폴리오 구성과 리스크 관리\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"포트폴리오 구성과 리스크 관리 | midasworld (Private)\"}],[\"$\",\"meta\",\"1\",{\"name
