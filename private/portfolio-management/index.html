03e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e+1\u003c/td\u003e\n\u003ctd\u003e완전히 같이 움직임 (분산 효과 없음)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003ctd\u003e독립적으로 움직임\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e-1\u003c/td\u003e\n\u003ctd\u003e완전히 반대로 움직임 (최대 분산 효과)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e서로 낮은 상관관계\u003c/strong\u003e를 가진 자산들을 묶으면 개별 자산의 변동성보다 포트폴리오 전체 변동성이 낮아진다.\u003c/p\u003e\n\u003ch3\u003e분산 효과가 있는 자산 조합 예시\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e주식 + 채권 (일반적으로 역의 관계)\u003c/li\u003e\n\u003cli\u003e국내주식 + 해외주식\u003c/li\u003e\n\u003cli\u003e성장주 + 배당주\u003c/li\u003e\n\u003cli\u003e주식 + 금\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e자산배분 전략\u003c/h2\u003e\n\u003ch3\u003e연령 기반 배분 (고전적 방법)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e주식 비중 = 100 - 나이\n\n예) 30세 → 주식 70%, 채권 30%\n\u003cspan class=\"hljs-code\"\u003e    50세 → 주식 50%, 채권 50%\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e나이가 들수록 안전자산 비중 증가. 단순하지만 개인 상황과 맞지 않을 수 있음.\u003c/p\u003e\n\u003ch3\u003e영구 포트폴리오 (Permanent Portfolio)\u003c/h3\u003e\n\u003cp\u003e해리 브라운의 전략. 어떤 경제 상황에서도 견디도록 설계.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003cth\u003e유리한 환경\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e경제 성장기\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기채권\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e디플레이션, 불황\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e인플레이션\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e현금\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003ctd\u003e경기침체\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e올웨더 포트폴리오 (레이 달리오)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e자산\u003c/th\u003e\n\u003cth\u003e비중\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주식\u003c/td\u003e\n\u003ctd\u003e30%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기채권\u003c/td\u003e\n\u003ctd\u003e40%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e중기채권\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금\u003c/td\u003e\n\u003ctd\u003e7.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e원자재\u003c/td\u003e\n\u003ctd\u003e7.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e리밸런싱\u003c/h2\u003e\n\u003cp\u003e시간이 지나면 자산 비중이 목표에서 벗어남. 주기적으로 원래 비중으로 되돌리는 작업.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e목표: 주식 60%, 채권 40%\u003c/span\u003e\n\n1년 후 주식이 올라서 주식 75%, 채권 25%가 됨\n→ 주식 일부 매도 + 채권 매수\n→ 다시 60:40으로 맞춤\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e리밸런싱 방법\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e방법\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e정기 리밸런싱\u003c/td\u003e\n\u003ctd\u003e6개월 or 1년마다 기계적으로 실행\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e임계값 리밸런싱\u003c/td\u003e\n\u003ctd\u003e비중이 ±5% 벗어나면 실행\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e리밸런싱은 자동으로 \"비싼 것 팔고, 싼 것 사는\" 효과. 세금·수수료 고려해서 너무 자주 하지 말 것.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e리스크 관리\u003c/h2\u003e\n\u003ch3\u003e손실 허용 범위 설정\u003c/h3\u003e\n\u003cp\u003e투자 전 \"이 정도 손실은 감당할 수 있다\"는 선을 미리 정해두는 것.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e투자금 1,000만원, 최대 손실 허용 20%\n→ 200만원 손실 시 전량 매도 또는 재검토\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e손절 vs 버티기\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상황\u003c/th\u003e\n\u003cth\u003e대응\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e내가 분석한 투자 근거가 여전히 유효\u003c/td\u003e\n\u003ctd\u003e버티거나 추가 매수\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 근거가 무너짐 (실적 악화, 구조적 문제)\u003c/td\u003e\n\u003ctd\u003e손절\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e단순히 주가가 내렸음\u003c/td\u003e\n\u003ctd\u003e근거 재검토 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"손절은 부끄러운 게 아니다. 틀렸다는 걸 인정하는 것이다.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e집중투자 vs 분산투자\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e전략\u003c/th\u003e\n\u003cth\u003e장점\u003c/th\u003e\n\u003cth\u003e단점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e집중투자 (5종목 이내)\u003c/td\u003e\n\u003ctd\u003e고수익 가능, 깊은 분석 가능\u003c/td\u003e\n\u003ctd\u003e한 종목 급락 시 타격 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e분산투자 (10~20종목)\u003c/td\u003e\n\u003ctd\u003e리스크 분산\u003c/td\u003e\n\u003ctd\u003e시장 수익률 수렴 경향\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eETF 투자\u003c/td\u003e\n\u003ctd\u003e자동 분산, 저비용\u003c/td\u003e\n\u003ctd\u003e초과수익 어려움\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e투자 원칙\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e잃지 않는 것이 먼저다\u003c/strong\u003e — 수익률보다 원금 보존 우선\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e모르면 사지 마라\u003c/strong\u003e — 사업 이해 못 하는 기업에 투자 금지\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e여유 자금으로만 투자\u003c/strong\u003e — 빚투, 생활비 투자는 판단을 흐림\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e단기 변동성에 흔들리지 마라\u003c/strong\u003e — 좋은 기업은 10년을 봐야\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e분할 매수\u003c/strong\u003e — 한 번에 전량 매수보다 여러 번 나눠 매수\u003c/li\u003e\n\u003c/ol\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"포트폴리오 구성과 리스크 관리\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"포트폴리오 구성과 리스크 관리 | midasworld (Private)\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"서버 개발 학습 블로그\"}],[\"$\",\"link\",\"2\",{\
