 묻는 사람과 \"이 사업이 10년 후에도 경쟁력이 있을까?\"라고 묻는 사람은 완전히 다른 투자를 한다.\u003c/p\u003e\n\u003cp\u003e전자는 투기고, 후자가 투자다.\u003c/p\u003e\n\u003cp\u003e워런 버핏이 자주 하는 말이 있다. \"오늘 주식시장이 10년간 문을 닫는다고 해도 편하게 보유할 수 있는 기업을 사라.\" 이 기준으로 보면, 내가 지금 사려는 종목이 투기인지 투자인지 즉시 분명해진다.\u003c/p\u003e\n\u003cp\u003e기업의 주인이 된다는 관점에서 분석하면:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e이 회사의 CEO가 바보라면 내 돈을 맡길 것인가?\u003c/li\u003e\n\u003cli\u003e이 회사의 제품/서비스를 내가 직접 쓰는가, 쓴다면 왜 쓰는가?\u003c/li\u003e\n\u003cli\u003e경쟁사가 이 회사를 무너뜨리려면 무엇을 해야 하는가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e분석 없이 사는 것 vs 분석 후 사는 것의 차이\u003c/h3\u003e\n\u003cp\u003e분석 없이 주식을 사면 다음과 같은 일이 생긴다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가가 10% 빠지면 이유를 모르기 때문에 공포에 손절한다\u003c/li\u003e\n\u003cli\u003e주가가 10% 오르면 이유를 모르기 때문에 욕심에 추격 매수한다\u003c/li\u003e\n\u003cli\u003e결과적으로 \"쌀 때 팔고, 비쌀 때 산다\"는 최악의 패턴을 반복한다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e분석 후 주식을 사면:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가가 10% 빠져도 사업이 훼손되지 않았다면 오히려 추가 매수를 고려한다\u003c/li\u003e\n\u003cli\u003e주가가 50% 올라도 내재가치보다 여전히 저평가라면 계속 보유한다\u003c/li\u003e\n\u003cli\u003e투자 thesis가 틀렸을 때는 과감하게 정리한다\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e투자 thesis를 한 문장으로 쓸 수 없으면 사지 마라\u003c/h3\u003e\n\u003cp\u003e이것이 핵심이다. 내가 왜 이 기업에 투자하는지 명확하게 한 문장으로 쓸 수 있어야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e나쁜 예:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"요즘 AI가 뜨니까 엔비디아 사야겠다\"\u003c/li\u003e\n\u003cli\u003e\"삼성전자는 국민주니까\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e좋은 예:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"엔비디아는 AI 모델 학습에 필수적인 GPU 시장에서 80% 이상의 점유율과 CUDA라는 진입장벽을 보유하고 있으며, AI 투자 사이클이 3~5년 지속된다고 보면 현재 PER 30배는 성장성 대비 합리적이다\"\u003c/li\u003e\n\u003cli\u003e\"현대차는 전기차 전환 초기 시장에서 이익을 내는 몇 안 되는 완성차 업체 중 하나이며, 현재 PBR 0.7배는 자산 대비 심각한 저평가 구간이다\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e1단계: 아이디어 발굴\u003c/h2\u003e\n\u003ch3\u003e일상에서 좋은 기업 발견하는 법 (피터 린치 방식)\u003c/h3\u003e\n\u003cp\u003e피터 린치는 마젤란 펀드를 운용하던 시절, 최고의 투자 아이디어를 월스트리트 리서치가 아닌 일상에서 발견했다고 했다. 그의 철학:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"가장 좋은 투자 기회는 쇼핑몰에 있다. 사람들이 왜 그 가게 앞에 줄을 서는지 생각해보라.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e일상에서 투자 아이디어를 발굴하는 방법:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e소비자 관점\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e내가 반복적으로 구매하는 제품/서비스는 무엇인가?\u003c/li\u003e\n\u003cli\u003e주변 사람들이 공통적으로 열광하는 브랜드가 있는가?\u003c/li\u003e\n\u003cli\u003e한번 쓰기 시작하면 끊기 어려운 서비스(락인 효과)가 있는가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e직업 관점\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e내 직장/업계에서 없어서는 안 될 소프트웨어, 장비가 있는가?\u003c/li\u003e\n\u003cli\u003e경쟁사들이 모두 쓰는 플랫폼이 있는가?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e현장 관찰\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e카페에서 맥북과 에어팟을 쓰는 사람이 압도적으로 많다 → 애플 생태계 해자 확인\u003c/li\u003e\n\u003cli\u003e지인이 쿠팡을 쓰다가 경쟁사로 넘어가지 않는다 → 로켓배송 락인 효과\u003c/li\u003e\n\u003cli\u003e병원마다 같은 의료 소프트웨어를 쓴다 → B2B SaaS 해자\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e유명 투자자 포트폴리오 참고 (13F 공시)\u003c/h3\u003e\n\u003cp\u003e미국 주식 기준으로, 운용 자산 1억 달러 이상의 기관 투자자는 SEC에 분기마다 13F 보고서를 제출한다. 여기서 워런 버핏(버크셔 해서웨이), 마이클 버리, 빌 애크먼 등의 포트폴리오 변화를 확인할 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e확인 방법:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eSEC EDGAR (\u003ca href=\"https://www.sec.gov/cgi-bin/browse-edgar\"\u003ehttps://www.sec.gov/cgi-bin/browse-edgar\u003c/a\u003e) 접속\u003c/li\u003e\n\u003cli\u003e검색창에 운용사 이름 입력 (예: \"Berkshire Hathaway\")\u003c/li\u003e\n\u003cli\u003eFiling Type: 13F-HR 선택\u003c/li\u003e\n\u003cli\u003e최신 분기 보고서 열람\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e주의사항:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e13F는 분기 마감 후 45일 이내 제출이므로 최대 1.5개월 지연 정보다\u003c/li\u003e\n\u003cli\u003e공시 이후 이미 주가가 반영됐을 수 있다\u003c/li\u003e\n\u003cli\u003e대형 펀드는 포지션 진입/청산 중에 있을 수 있다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이런 한계에도 불구하고, \"이 똑똑한 사람들이 왜 이 업종에 주목하는가\"를 이해하는 출발점으로는 매우 유용하다.\u003c/p\u003e\n\u003ch3\u003e스크리닝 도구 활용\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e국내 주식 스크리닝:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e네이버 증권\u003c/strong\u003e (finance.naver.com): 시가총액, PER, PBR, 배당수익률 기준 정렬\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFnGuide\u003c/strong\u003e (comp.fnguide.com): 재무지표 상세 비교, 컨센서스 EPS\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e한국거래소 KIND\u003c/strong\u003e (kind.krx.co.kr): 공시 정보, 산업분류별 통계\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e해외 주식 스크리닝:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFinViz\u003c/strong\u003e (finviz.com): 멀티 필터 스크리닝의 최강자. PER, 매출성장률, 이익마진, 52주 최저가 근접 여부 등 20개 이상 조건 동시 적용 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSimply Wall St\u003c/strong\u003e (simplywall.st): 시각화가 훌륭하며 기업 건전성을 직관적으로 보여줌\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGurufocus\u003c/strong\u003e (gurufocus.com): DCF 기반 내재가치 자동 계산, 워런 버핏 등 유명 투자자 포트폴리오 추적\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e실용적인 스크리닝 예시 (저평가 가치주 발굴):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePER \u0026#x3C; 15 (업종 평균 이하)\u003c/li\u003e\n\u003cli\u003eROE \u003e 15% (자본 효율성 양호)\u003c/li\u003e\n\u003cli\u003e부채비율 \u0026#x3C; 50%\u003c/li\u003e\n\u003cli\u003e최근 3년 EPS 성장률 \u003e 10%\u003c/li\u003e\n\u003cli\u003e52주 최저가 대비 30% 이내 (가격 낮은 구간)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e뉴스/공시에서 저평가 힌트 찾기\u003c/h3\u003e\n\u003cp\u003e시장이 과도하게 반응하거나 무시하는 정보에서 기회가 생긴다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e과도한 하락 후 기회 탐색:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e일시적 이슈(리콜, 소송, CEO 교체)로 급락했지만 장기 사업 가치는 훼손되지 않은 경우\u003c/li\u003e\n\u003cli\u003e업종 전체가 하락할 때 함께 쓸려 내려간 우량주\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e공시에서 힌트:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e자사주 매입 공시: 경영진이 주가가 저평가됐다고 판단한다는 신호\u003c/li\u003e\n\u003cli\u003e내부자 매수: 임원들이 자사 주식을 사면 이유가 있다\u003c/li\u003e\n\u003cli\u003e배당 확대: 안정적 현금흐름의 신호\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eDART에서 확인할 공시 유형:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e사업보고서 (연 1회)\u003c/li\u003e\n\u003cli\u003e반기/분기보고서\u003c/li\u003e\n\u003cli\u003e주요사항보고서 (자사주 매입, 합병 등)\u003c/li\u003e\n\u003cli\u003e임원 주요주주 특정증권 소유 상황 보고 (내부자 거래)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e2단계: 사업 모델 이해 (가장 중요)\u003c/h2\u003e\n\u003cp\u003e이 단계가 전체 분석에서 가장 중요하다. 재무제표는 나중에 봐도 되지만, 사업 모델을 이해하지 못한 채 숫자만 보는 건 위험하다.\u003c/p\u003e\n\u003ch3\u003e\"이 회사가 어떻게 돈을 버는가?\" 한 문단으로 설명할 수 있는가\u003c/h3\u003e\n\u003cp\u003e이 질문에 명확하게 답할 수 없다면, 분석을 더 해야 한다는 신호다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e좋은 예 (명확한 비즈니스 모델):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"비자(Visa)는 신용카드 네트워크를 운영한다. 소비자가 카드를 긁을 때마다 거래 금액의 약 0.1~0.2%를 처리 수수료로 가져간다. 카드 발급은 직접 하지 않으므로 신용 위험이 없다. 네트워크 효과로 가맹점이 많을수록 카드 사용자가 늘고, 카드 사용자가 많을수록 가맹점이 늘어난다.\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e나쁜 예 (불명확한 비즈니스 모델):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"이 회사는 블록체인 기반 메타버스 플랫폼에서 NFT를 활용한 수익 모델을...\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e설명이 복잡할수록 사업이 복잡하거나, 내가 이해하지 못한 것이다. 둘 다 투자를 재고해야 할 이유다.\u003c/p\u003e\n\u003ch3\u003e제품/서비스: 고객은 누구인가, 왜 이 회사를 선택하는가\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e고객 분석 프레임워크:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e질문\u003c/th\u003e\n\u003cth\u003e확인 목적\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e주요 고객군은?\u003c/td\u003e\n\u003ctd\u003e시장 집중도, 의존성 파악\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e고객 재구매율은?\u003c/td\u003e\n\u003ctd\u003e제품/서비스 품질 검증\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e왜 경쟁사 대신 이 회사를 선택하나?\u003c/td\u003e\n\u003ctd\u003e차별화 포인트\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e고객의 지불 의사는 충분한가?\u003c/td\u003e\n\u003ctd\u003e가격 결정력(pricing power)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eB2C vs B2B의 차이:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eB2C: 브랜드, 감성, UX가 중요. 소비자 트렌드 변화에 민감\u003c/li\u003e\n\u003cli\u003eB2B: 전환 비용, 계약 기간, 의사결정자 관계가 중요. 경기 민감도 높음\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e경쟁 우위(해자): 브랜드/특허/네트워크 효과/원가 우위/전환 비용\u003c/h3\u003e\n\u003cp\u003e찰리 멍거의 표현처럼, 기업의 해자(moat)는 단순히 \"지금 잘 되는가\"가 아니라 \"10년 뒤에도 경쟁자로부터 보호받을 수 있는가\"를 의미한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e5가지 해자 유형:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. 브랜드 해자\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e고객이 프리미엄을 기꺼이 지불하게 만드는 브랜드 인식\u003c/li\u003e\n\u003cli\u003e예: 애플(스마트폰), 루이비통(명품), 코카콜라(음료)\u003c/li\u003e\n\u003cli\u003e측정 방법: 동일 스펙 경쟁사 대비 가격 프리미엄 존재 여부\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2. 특허/지식재산권 해자\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e법적으로 보호된 기술적 우위\u003c/li\u003e\n\u003cli\u003e예: 제약사의 신약 특허, 반도체 설계 IP\u003c/li\u003e\n\u003cli\u003e주의: 특허 만료 이후 전략은?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e3. 네트워크 효과 해자\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e사용자가 늘수록 서비스 가치가 높아지는 구조\u003c/li\u003e\n\u003cli\u003e예: 카카오톡(메신저), 비자(결제 네트워크), 링크드인(구직/채용)\u003c/li\u003e\n\u003cli\u003e가장 강력한 해자. 한번 형성되면 깨기 매우 어렵다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e4. 원가 우위 해자\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e경쟁사보다 낮은 비용으로 동일한 제품/서비스 제공\u003c/li\u003e\n\u003cli\u003e예: 코스트코(대량 구매력), TSMC(공정 기술 규모의 경제)\u003c/li\u003e\n\u003cli\u003e규모의 경제, 독점적 자원 접근, 효율적 프로세스 등\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e5. 전환 비용 해자\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e고객이 다른 회사로 옮기기 어렵게 만드는 구조\u003c/li\u003e\n\u003cli\u003e예: ERP 소프트웨어(SAP), 병원 EMR 시스템, AWS 클라우드\u003c/li\u003e\n\u003cli\u003e한번 도입하면 바꾸는 데 비용/시간이 너무 많이 든다\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e산업 구조 분석: 포터의 5가지 힘\u003c/h3\u003e\n\u003cp\u003e마이클 포터의 Five Forces 모델은 산업 전체의 수익성 구조를 파악하는 데 유용하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. 공급자 협상력 (Supplier Power)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e공급자가 소수이거나 독점적이면 마진 압박 위험\u003c/li\u003e\n\u003cli\u003e예: 반도체 장비는 ASML이 EUV 장비 독점 → 고객사 마진 압박\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2. 구매자 협상력 (Buyer Power)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e대형 고객 1~2개에 매출이 집중되면 마진이 낮아질 수밖에 없다\u003c/li\u003e\n\u003cli\u003e예: 월마트 납품업체들은 항상 가격 인하 압박을 받는다\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e3. 대체재 위협 (Threat of Substitutes)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e다른 방식으로 같은 니즈를 충족하는 제품/서비스\u003c/li\u003e\n\u003cli\u003e예: 스트리밍(넷플릭스)이 DVD 렌탈 업계를 대체\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e4. 신규 진입자 위협 (Threat of New Entry)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e진입 장벽이 낮으면 경쟁이 심화되어 마진 하락\u003c/li\u003e\n\u003cli\u003e진입 장벽: 자본, 규제, 특허, 브랜드, 네트워크 효과\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e5. 기존 경쟁자 간 경쟁 강도 (Competitive Rivalry)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e플레이어 수, 시장 성장률, 차별화 가능성\u003c/li\u003e\n\u003cli\u003e성장하는 시장은 경쟁이 덜 치열하다\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eTAM (전체 시장 규모) 추정\u003c/h3\u003e\n\u003cp\u003eTAM(Total Addressable Market)은 이 기업이 이론적으로 공략 가능한 최대 시장 규모다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTAM 추정 방법:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eTop-down\u003c/strong\u003e: 산업 리포트의 전체 시장 규모 × 예상 점유율\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBottom-up\u003c/strong\u003e: 단가 × 잠재 고객 수 × 구매 빈도\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e중요한 질문:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTAM이 충분히 크지 않으면, 기업이 완벽하게 실행해도 큰 기업이 되기 어렵다\u003c/li\u003e\n\u003cli\u003e반대로 TAM이 너무 커 보이면 경쟁자도 많다는 뜻이다\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3단계: 거시 환경 확인\u003c/h2\u003e\n\u003ch3\u003e이 산업의 성장성: 시장 사이클 어디에 있는가\u003c/h3\u003e\n\u003cp\u003e모든 산업은 사이클을 탄다. 어느 단계에 있는지 파악하는 것이 중요하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e산업 사이클 4단계:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e도입기\u003c/strong\u003e: 기술 초기, 성장률 높지만 적자 기업 많음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e성장기\u003c/strong\u003e: 시장 급속 확장, 선두 기업 이익 급증\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e성숙기\u003c/strong\u003e: 성장 둔화, 가격 경쟁 시작, 마진 압박\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e쇠퇴기\u003c/strong\u003e: 대체 기술/산업에 잠식, 구조적 매출 감소\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e가장 좋은 진입 시점은 성장기 초반이다. 도입기는 리스크가 너무 크고, 성숙기/쇠퇴기는 성장 프리미엄을 기대할 수 없다.\u003c/p\u003e\n\u003ch3\u003e규제 환경: 정부 정책이 도움인가 방해인가\u003c/h3\u003e\n\u003cp\u003e한국 시장에서 특히 중요하다. 정부 정책 변화가 주가에 미치는 영향이 매우 크다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e도움이 되는 규제:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e전기차 보조금 → 현대차, 배터리 업체 수혜\u003c/li\u003e\n\u003cli\u003e반도체 산업 지원 정책 → K-반도체 생태계\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e방해가 되는 규제:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e카카오페이/카카오뱅크 등 플랫폼 규제 강화\u003c/li\u003e\n\u003cli\u003e쿠팡, 배민 등 배달 플랫폼 수수료 규제\u003c/li\u003e\n\u003cli\u003e건강보험 약가 인하 → 제약사 마진 압박\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e경기 민감도: 경기침체 시 어떻게 되는가\u003c/h3\u003e\n\u003cp\u003e기업은 경기 민감도에 따라 크게 둘로 나뉜다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e경기 방어주 (Defensive):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e경기침체에도 수요 유지: 필수소비재, 헬스케어, 유틸리티\u003c/li\u003e\n\u003cli\u003e예: CJ제일제당(식품), 유한양행(제약)\u003c/li\u003e\n\u003cli\u003e특징: 안정적이지만 상승 폭도 제한적\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e경기 민감주 (Cyclical):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e경기에 따라 실적이 크게 변동: 철강, 화학, 조선, 반도체\u003c/li\u003e\n\u003cli\u003e예: 포스코, 롯데케미칼, 삼성전자 반도체\u003c/li\u003e\n\u003cli\u003e특징: 타이밍이 중요. 경기 저점에서 사야 수익률이 높다\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e환율/원자재 노출도\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e환율 영향:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e수출 기업: 달러 강세 시 환차익 (현대차, 삼성전자)\u003c/li\u003e\n\u003cli\u003e수입 의존 기업: 달러 강세 시 원가 상승 (항공사, 정유사)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e원자재 영향:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e배터리 기업: 리튬, 니켈, 코발트 가격 직결\u003c/li\u003e\n\u003cli\u003e제지/포장재: 펄프 가격\u003c/li\u003e\n\u003cli\u003e식품: 밀, 대두 등 곡물 가격\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e4단계: 재무제표 분석\u003c/h2\u003e\n\u003ch3\u003e최근 5년간 추세 분석\u003c/h3\u003e\n\u003cp\u003e숫자 하나보다 추세가 중요하다. 단년도 실적은 일회성 요인으로 왜곡될 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 지표:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지표\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003cth\u003e좋은 기준\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e매출 성장률\u003c/td\u003e\n\u003ctd\u003e사업 확장성\u003c/td\u003e\n\u003ctd\u003e연 10% 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영업이익률\u003c/td\u003e\n\u003ctd\u003e본업 수익성\u003c/td\u003e\n\u003ctd\u003e업종 평균 이상, 꾸준한 유지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e순이익률\u003c/td\u003e\n\u003ctd\u003e최종 수익성\u003c/td\u003e\n\u003ctd\u003e영업이익률과의 괴리 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eROE\u003c/td\u003e\n\u003ctd\u003e자기자본 효율성\u003c/td\u003e\n\u003ctd\u003e15% 이상 지속\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eROIC\u003c/td\u003e\n\u003ctd\u003e투하자본 효율성\u003c/td\u003e\n\u003ctd\u003eWACC 이상 (통상 10% 이상)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003eROE와 ROIC의 차이\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eROE (Return on Equity) = 순이익 / 자기자본\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e자기자본 대비 얼마나 벌었는가\u003c/li\u003e\n\u003cli\u003e부채를 많이 써도 ROE가 높아질 수 있어 왜곡 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eROIC (Return on Invested Capital) = 세후영업이익 / (자기자본 + 부채)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e실제로 투자한 자본 대비 수익률\u003c/li\u003e\n\u003cli\u003eROE보다 더 정직한 지표\u003c/li\u003e\n\u003cli\u003eWACC(자본비용)보다 높아야 기업 가치를 창출한다고 볼 수 있음\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e부채 분석\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e부채비율 = 총부채 / 자기자본\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e100% 이하: 양호\u003c/li\u003e\n\u003cli\u003e200% 이상: 주의 (업종마다 다름. 금융사/유틸리티는 높아도 됨)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e유동비율 = 유동자산 / 유동부채\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e200% 이상: 양호 (단기 채무 상환 여력)\u003c/li\u003e\n\u003cli\u003e100% 이하: 단기 유동성 위험\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e이자보상배율 = 영업이익 / 이자비용\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e3배 이상: 안전\u003c/li\u003e\n\u003cli\u003e1배 미만: 이자도 못 버는 위험 상태\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e영업현금흐름 vs 순이익 비교 (이익의 질)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 원칙:\u003c/strong\u003e 영업현금흐름이 순이익보다 크거나 비슷해야 한다.\u003c/p\u003e\n\u003cp\u003e순이익이 많은데 영업현금흐름이 낮다면:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매출채권 급증 (대금 못 받는 중)\u003c/li\u003e\n\u003cli\u003e재고 급증 (팔지 못한 제품)\u003c/li\u003e\n\u003cli\u003e공격적인 회계 처리 가능성\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e간단한 확인법:\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e영업현금흐름\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e/\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e순이익\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e=\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e현금전환율\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e현금전환율\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e\u003e\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003e1.0:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e우수\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e현금전환율\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.7\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e~1.0:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e양호\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e현금전환율\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e\u0026#x3C;\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003e0.5:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e주의\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eFCF(자유현금흐름) 계산\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eFCF = 영업현금흐름 - CAPEX(설비투자)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eFCF는 회사가 배당, 자사주 매입, 부채 상환, M\u0026#x26;A 등에 쓸 수 있는 진짜 현금이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFCF Yield = FCF / 시가총액\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e5% 이상: 매력적인 현금 창출력\u003c/li\u003e\n\u003cli\u003e업종 평균과 비교하여 판단\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e어디서 찾는가\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e국내 기업:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDART\u003c/strong\u003e (dart.fss.or.kr): 공식 전자공시. 사업보고서, 분기보고서 전문\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e네이버 증권\u003c/strong\u003e (finance.naver.com): 종목 검색 후 재무 탭. 5년치 주요 지표 한눈에\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFnGuide\u003c/strong\u003e (comp.fnguide.com): 컨센서스 EPS, 실적 예측, 업종 비교\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e증권사 HTS/리서치\u003c/strong\u003e: 키움, 미래에셋, NH 등 증권사 리서치센터 무료 리포트\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e해외 기업:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMacrotrends\u003c/strong\u003e (macrotrends.net): 10~20년 장기 재무 데이터. 차트 훌륭\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGurufocus\u003c/strong\u003e (gurufocus.com): 고급 재무 지표, DCF 계산, 내부자 거래 추적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMorningstar\u003c/strong\u003e (morningstar.com): 경쟁사 비교, 경제적 해자(moat) 평가\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSEC EDGAR\u003c/strong\u003e (sec.gov): 10-K(연간보고서), 10-Q(분기보고서) 원문\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5단계: 경쟁사 비교\u003c/h2\u003e\n\u003ch3\u003e동종 업계 주요 기업 3~5개 선정\u003c/h3\u003e\n\u003cp\u003e비교 대상을 잘못 선정하면 분석 전체가 왜곡된다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e비교 기업 선정 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e같은 지역(국내/글로벌) 시장에서 경쟁\u003c/li\u003e\n\u003cli\u003e유사한 사업 모델\u003c/li\u003e\n\u003cli\u003e시가총액 규모가 비슷하거나 업계 리더\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e경쟁사 비교표 예시 양식\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003eA사 (분석 대상)\u003c/th\u003e\n\u003cth\u003eB사\u003c/th\u003e\n\u003cth\u003eC사\u003c/th\u003e\n\u003cth\u003eD사\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시가총액\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e매출 성장률 (3년 평균)\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영업이익률\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eROE\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePER (현재)\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePBR\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당수익률\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부채비율\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e해석 방법:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eA사가 B, C, D보다 이익률이 높은데 PER이 낮다 → 저평가 가능성\u003c/li\u003e\n\u003cli\u003eA사 성장률이 경쟁사 평균보다 낮은데 PER이 높다 → 고평가 가능성\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e시장점유율 변화 추이\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e시장점유율이 꾸준히 오른다면:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e경쟁에서 이기고 있다는 증거\u003c/li\u003e\n\u003cli\u003e해자가 실제로 작동한다는 확인\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e시장점유율이 하락한다면:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e경쟁력 약화 신호\u003c/li\u003e\n\u003cli\u003e아무리 PER이 낮아도 리스크 요인\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e6단계: 밸류에이션\u003c/h2\u003e\n\u003ch3\u003e상대가치법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003ePER (주가수익비율) = 주가 / 주당순이익(EPS)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e현재 주가가 연간 이익의 몇 배인가?\u003c/li\u003e\n\u003cli\u003e업종 평균 PER과 비교하는 것이 핵심\u003c/li\u003e\n\u003cli\u003e성장주는 PER이 높아도 정당화될 수 있다 (PEG Ratio 활용)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePEG Ratio = PER / 이익 성장률\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePEG \u0026#x3C; 1: 성장 대비 저평가\u003c/li\u003e\n\u003cli\u003ePEG \u003e 2: 고평가 구간\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePBR (주가순자산비율) = 주가 / 주당순자산(BPS)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e자산 대비 주가 수준\u003c/li\u003e\n\u003cli\u003e제조업, 금융주에 특히 유용\u003c/li\u003e\n\u003cli\u003ePBR \u0026#x3C; 1: 청산가치보다 싸다는 의미 (매우 저평가)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eEV/EBITDA = 기업가치 / EBITDA\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e부채까지 포함한 기업 전체 가치 대비 현금창출력\u003c/li\u003e\n\u003cli\u003e업종 간 비교, 레버리지 차이가 큰 경우 유용\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e과거 PER 밴드 분석\u003c/h3\u003e\n\u003cp\u003e현재 PER이 역사적으로 어느 구간에 위치하는지 보는 것이 중요하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e확인 방법:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFnGuide, 네이버 증권의 PER 밴드 차트 활용\u003c/li\u003e\n\u003cli\u003e과거 10년간 PER 최저/최고/평균 파악\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e현재 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e이 역사적 최저 구간 근처 → 저평가 신호\n현재 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e이 역사적 최고 구간 근처 → 고평가 주의\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e단, 사업 모델 자체가 변했다면 (성장주로 전환, 사업 악화 등) 역사적 PER은 참고 자료일 뿐이다.\u003c/p\u003e\n\u003ch3\u003eDCF 절대가치 평가\u003c/h3\u003e\n\u003cp\u003eDCF(Discounted Cash Flow)는 미래 현금흐름을 현재가치로 환산하여 내재가치를 계산하는 방법이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e기본 공식:\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e내재가치 = Σ (FCF_t / (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e+\u003cspan class=\"hljs-attribute\"\u003er\u003c/span\u003e)^t) + 터미널 가치\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003eDCF 시나리오별 계산 예시:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시나리오\u003c/th\u003e\n\u003cth\u003eFCF 성장률 (5년)\u003c/th\u003e\n\u003cth\u003e터미널 성장률\u003c/th\u003e\n\u003cth\u003e할인율(WACC)\u003c/th\u003e\n\u003cth\u003e내재가치\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e낙관\u003c/td\u003e\n\u003ctd\u003e20%\u003c/td\u003e\n\u003ctd\u003e3%\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e기본\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e2%\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e비관\u003c/td\u003e\n\u003ctd\u003e0%\u003c/td\u003e\n\u003ctd\u003e1%\u003c/td\u003e\n\u003ctd\u003e10%\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eDCF의 한계:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e미래 가정이 조금만 바뀌어도 결과가 크게 변한다\u003c/li\u003e\n\u003cli\u003e절대적 숫자보다 \"합리적 범위\"를 구하는 데 활용하라\u003c/li\u003e\n\u003cli\u003eGurufocus, Simply Wall St에서 자동 계산 참고 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e목표주가 계산\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e가장 간단한 방법:\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e목표주가 \u003cspan class=\"hljs-operator\"\u003e=\u003c/span\u003e 적정 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e × 내년 예상 EPS\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e예) 적정 PER 20배, 내년 EPS 예상 5,000원\n→ 목표주가 = 20 × 5,000 = 100,000원\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e적정 PER 설정 방법:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e업종 평균 PER\u003c/li\u003e\n\u003cli\u003e과거 5년 평균 PER\u003c/li\u003e\n\u003cli\u003e성장률을 고려한 PEG 기반 PER\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e안전마진 (Margin of Safety)\u003c/h3\u003e\n\u003cp\u003e워런 버핏이 강조하는 핵심 개념. 내재가치보다 충분히 낮은 가격에 사야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e내재가치의 70% 이하에서 매수 → 30% 안전마진 확보\u003c/li\u003e\n\u003cli\u003e불확실성이 높을수록 더 큰 안전마진이 필요\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e예) DCF 내재가치 100,000원 → 70,000원 이하에서 매수 고려\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e7단계: 리스크 체크\u003c/h2\u003e\n\u003ch3\u003e최악의 시나리오는 무엇인가\u003c/h3\u003e\n\u003cp\u003e투자에서 가장 중요한 것은 잃지 않는 것이다. 얼마나 벌 수 있는지보다, 얼마나 잃을 수 있는지를 먼저 생각해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e최악 시나리오 체크리스트:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주력 제품이 대체된다면?\u003c/li\u003e\n\u003cli\u003e핵심 고객 1~2개를 잃는다면?\u003c/li\u003e\n\u003cli\u003e규제로 사업 모델이 불가능해진다면?\u003c/li\u003e\n\u003cli\u003e금리 급등으로 부채 부담이 커진다면?\u003c/li\u003e\n\u003cli\u003e원자재 가격이 2배 오른다면?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e이 투자가 틀릴 수 있는 이유 3가지\u003c/h3\u003e\n\u003cp\u003e매우 중요한 연습이다. 이 기업에 투자하기로 했다면, 반드시 \"내가 왜 틀릴 수 있는가\"를 3가지 이상 적어야 한다.\u003c/p\u003e\n\u003cp\u003e이 연습이 중요한 이유:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e맹목적 낙관을 방지한다\u003c/li\u003e\n\u003cli\u003e어떤 변화를 주시해야 하는지 알 수 있다\u003c/li\u003e\n\u003cli\u003e실제로 그 리스크가 현실화됐을 때 대응 방안을 미리 준비할 수 있다\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e테일 리스크: 회사가 망할 가능성 체크\u003c/h3\u003e\n\u003cp\u003e아무리 좋아 보여도, 회사가 망하면 투자금 전부를 잃는다. 특히 다음을 확인하라:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e부채 상환 능력: 이자보상배율 1배 미만이면 위험\u003c/li\u003e\n\u003cli\u003e단기 부채 만기: 내년 안에 갚아야 할 대규모 채권이 있는가\u003c/li\u003e\n\u003cli\u003e현금 소진율: 적자 기업이라면 현재 현금으로 몇 개월을 버틸 수 있는가\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e대주주 관련 리스크 (한국 기업 특유)\u003c/h3\u003e\n\u003cp\u003e한국 기업을 분석할 때 빠뜨려서는 안 되는 항목이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e체크 포인트:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e대주주 지분율과 실질 지배력 구조\u003c/li\u003e\n\u003cli\u003e지배주주 일가의 사익편취 이력 (일감 몰아주기, 편법 증여)\u003c/li\u003e\n\u003cli\u003e비상장 관계사와의 거래 조건이 불공정하지 않은가\u003c/li\u003e\n\u003cli\u003e최근 5년간 소액주주 친화적 결정을 했는가 (자사주 매입, 배당 확대 등)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e확인 방법:\u003c/strong\u003e DART 사업보고서 → \"주주에 관한 사항\", \"특수관계인 거래\" 섹션\u003c/p\u003e\n\u003ch3\u003e회계 리스크: 분식회계 징후\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e의심 신호:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e순이익이 나는데 영업현금흐름이 계속 마이너스\u003c/li\u003e\n\u003cli\u003e매출채권 회전율이 해마다 악화 (돈을 못 받고 있다)\u003c/li\u003e\n\u003cli\u003e재고자산이 매출 증가율보다 빠르게 증가\u003c/li\u003e\n\u003cli\u003e감사의견 \"한정\" 또는 감사인 자주 교체\u003c/li\u003e\n\u003cli\u003eEBITDA 외에 \"조정 EBITDA\", \"Non-GAAP\" 지표만 강조하는 IR\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e8단계: 매수 결정\u003c/h2\u003e\n\u003ch3\u003e매수 조건 정의\u003c/h3\u003e\n\u003cp\u003e매수 조건을 미리 정해두지 않으면 감정에 휘둘린다. 구체적으로 정의하라.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e조건 예시:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"주가가 X원 이하로 내려올 때\"\u003c/li\u003e\n\u003cli\u003e\"다음 분기 실적 발표 후 긍정적 신호 확인 시\"\u003c/li\u003e\n\u003cli\u003e\"CEO 신뢰도 이슈가 해소된 후\"\u003c/li\u003e\n\u003cli\u003e\"금리가 정점을 찍고 하락 전환할 때\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e분할 매수 계획\u003c/h3\u003e\n\u003cp\u003e한 번에 모든 자금을 투입하는 것은 타이밍 리스크가 크다. 분할 매수로 평균 단가를 낮춰라.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3분할 매수 예시:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e차수\u003c/th\u003e\n\u003cth\u003e매수 조건\u003c/th\u003e\n\u003cth\u003e투자 비율\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1차\u003c/td\u003e\n\u003ctd\u003e목표가 도달 (100,000원)\u003c/td\u003e\n\u003ctd\u003e40%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2차\u003c/td\u003e\n\u003ctd\u003e추가 하락 (90,000원)\u003c/td\u003e\n\u003ctd\u003e35%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3차\u003c/td\u003e\n\u003ctd\u003e바닥 확인 (80,000원)\u003c/td\u003e\n\u003ctd\u003e25%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e또는 이벤트 기반 분할:\u003c/strong\u003e\n1차: 기본 분석 완료 후 소규모 진입\n2차: 분기 실적 발표 후 thesis 재확인\n3차: 외부 충격으로 추가 하락 시\u003c/p\u003e\n\u003ch3\u003e목표주가와 손절 기준\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e목표주가:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e12~24개월 내 달성 가능한 현실적인 목표\u003c/li\u003e\n\u003cli\u003e여러 방법론(PER, DCF, PBR)의 평균 또는 보수적 추정치\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e손절 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"가격 기준 손절\"이 아니라 \"thesis 훼손 기준 손절\"을 권장\u003c/li\u003e\n\u003cli\u003e주가가 30% 빠진 게 손절 이유가 되어서는 안 된다\u003c/li\u003e\n\u003cli\u003e사업 모델이 망가졌거나, 분석 전제가 틀렸을 때 정리\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e손절해야 하는 상황 예시:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e핵심 고객을 경쟁사에 빼앗겼다\u003c/li\u003e\n\u003cli\u003e규제로 주력 사업이 불가능해졌다\u003c/li\u003e\n\u003cli\u003e회계 부정 또는 대규모 횡령 발각\u003c/li\u003e\n\u003cli\u003e내가 처음 세운 thesis 자체가 틀렸다는 걸 깨달았다\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e포지션 사이즈 결정\u003c/h3\u003e\n\u003cp\u003e켈리 기준(Kelly Criterion) 또는 간단한 리스크 기반 포지션 사이징.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e간단한 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e확신도 높은 종목: 포트폴리오의 10~15%\u003c/li\u003e\n\u003cli\u003e확신도 중간 종목: 5~10%\u003c/li\u003e\n\u003cli\u003e아이디어 단계 종목: 3~5% 이하\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 원칙:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e단일 종목에 30% 이상 집중하지 마라 (버핏급 확신이 없다면)\u003c/li\u003e\n\u003cli\u003e동일 업종/테마 종목들이 포트폴리오의 50%를 넘으면 위험\u003c/li\u003e\n\u003cli\u003e개별 종목 분석이 어렵다면 차라리 ETF가 낫다\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e9단계: 모니터링과 출구 전략\u003c/h2\u003e\n\u003ch3\u003e분기 실적 발표 시 체크 항목\u003c/h3\u003e\n\u003cp\u003e실적 발표는 분기마다 자신의 thesis를 재검증하는 기회다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e실적 발표 시 확인 사항:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e매출/이익이 컨센서스(시장 예상치) 대비 어떤가?\u003c/li\u003e\n\u003cli\u003e영업이익률이 분기 전 대비 개선됐는가 악화됐는가?\u003c/li\u003e\n\u003cli\u003e경영진의 가이던스(forward guidance)가 낙관적인가 비관적인가?\u003c/li\u003e\n\u003cli\u003e핵심 운영 지표(KPI)가 개선 중인가? (예: SaaS의 경우 ARR, 이탈률)\u003c/li\u003e\n\u003cli\u003e대형 계약 수주 또는 해지가 있었는가?\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e읽어야 할 자료:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e실적 발표 보도자료 (IR 페이지)\u003c/li\u003e\n\u003cli\u003e어닝콜 녹취록 (미국 기업) 또는 IR 설명회 자료 (국내)\u003c/li\u003e\n\u003cli\u003e주요 증권사 실적 코멘트\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e투자 thesis 훼손 신호\u003c/h3\u003e\n\u003cp\u003e다음 신호가 나타나면 포지션을 재검토해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e즉각 재검토 신호:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e연속 2~3분기 이익 성장 둔화 + 가이던스 하향\u003c/li\u003e\n\u003cli\u003e시장점유율 꾸준한 하락\u003c/li\u003e\n\u003cli\u003e핵심 임원 대거 이탈\u003c/li\u003e\n\u003cli\u003e경쟁사의 파괴적 혁신 제품 출시\u003c/li\u003e\n\u003cli\u003e대규모 회계 재조정\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e이익 실현 시점 결정\u003c/h3\u003e\n\u003cp\u003e팔기는 사기보다 어렵다. 명확한 기준을 미리 정해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e팔아야 하는 경우:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e목표주가 달성: 내재가치에 근접했거나 초과했을 때\u003c/li\u003e\n\u003cli\u003e더 좋은 기회 발견: 다른 종목이 현 종목보다 확실히 더 저평가\u003c/li\u003e\n\u003cli\u003eThesis 훼손: 위에서 설명한 신호 발생\u003c/li\u003e\n\u003cli\u003e포트폴리오 리밸런싱: 한 종목이 전체의 30% 이상이 됐을 때\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e팔지 말아야 하는 경우:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e단순히 많이 올랐다는 이유\u003c/li\u003e\n\u003cli\u003e경제 전망이 불안하다는 뉴스\u003c/li\u003e\n\u003cli\u003e주가가 단기적으로 흔들린다는 이유\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e추가 매수 vs 분할 매도 판단 기준\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e추가 매수 고려:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가 추가 하락 + thesis는 훼손되지 않음\u003c/li\u003e\n\u003cli\u003e펀더멘털이 오히려 개선됐는데 시장이 인식 못 하는 경우\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e분할 매도 고려:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e목표주가의 80% 이상 도달\u003c/li\u003e\n\u003cli\u003e포지션이 너무 커져 집중 위험 발생\u003c/li\u003e\n\u003cli\u003e성장 모멘텀이 둔화 조짐\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 예시: 엔비디아(NVDA) 단계별 분석\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e실전 분석 예시로 엔비디아를 선택했다. 2024년 기준 실제 데이터를 기반으로 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e0단계: 투자 thesis 한 문장\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"엔비디아는 AI 모델 학습 및 추론에 필수적인 GPU 시장에서 CUDA 생태계라는 강력한 해자를 통해 80% 이상의 점유율을 유지하고 있으며, AI 인프라 투자 사이클이 최소 3~5년 지속된다면 현재 밸류에이션은 성장성을 감안해 정당화된다.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e1단계: 아이디어 발굴 과정\u003c/h3\u003e\n\u003cp\u003e엔비디아에 주목하게 된 계기:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eChatGPT 출시 이후 AI 서비스가 폭발적으로 증가\u003c/li\u003e\n\u003cli\u003e구글, 마이크로소프트, 메타, 아마존이 모두 AI 인프라에 수백억 달러 투자 발표\u003c/li\u003e\n\u003cli\u003e데이터센터에서 AI 학습에 엔비디아 GPU가 표준으로 사용된다는 것을 IT 업계 지인을 통해 확인\u003c/li\u003e\n\u003cli\u003e13F 공시에서 여러 헤지펀드가 엔비디아 비중을 급격히 늘린 것 확인\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e2단계: 사업 모델 이해\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e비즈니스 모델 한 문단 설명:\u003c/strong\u003e\n엔비디아는 GPU(그래픽처리장치)를 설계하고, TSMC 등 파운드리에 위탁 생산하여 판매하는 팹리스 반도체 기업이다. 매출의 80% 이상이 데이터센터 부문에서 발생하며, AI 모델 학습과 추론에 특화된 H100, H200, B100 칩이 핵심이다. 단순 하드웨어 판매를 넘어, CUDA라는 GPU 프로그래밍 플랫폼 생태계가 진정한 해자다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e경쟁 우위 분석:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e해자 유형\u003c/th\u003e\n\u003cth\u003e엔비디아 적용 내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e네트워크 효과\u003c/td\u003e\n\u003ctd\u003eAI 개발자의 95% 이상이 CUDA로 학습. CUDA 이탈 시 모든 코드 재작성 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e전환 비용\u003c/td\u003e\n\u003ctd\u003eAI 프레임워크(PyTorch, TensorFlow)가 CUDA 최적화. 다른 GPU로 전환 시 성능 저하\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e원가 우위\u003c/td\u003e\n\u003ctd\u003e규모의 경제로 TSMC 고급 공정 선점. 경쟁사 대비 공급 물량 우선 확보\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e특허/기술\u003c/td\u003e\n\u003ctd\u003eCUDA 특허, H100 Transformer Engine 등 AI 연산 특화 기술\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e포터의 5가지 힘 분석:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e공급자 협상력\u003c/strong\u003e: TSMC 의존도 높으나, TSMC도 엔비디아를 최우선 고객으로 대우 → 협력적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e구매자 협상력\u003c/strong\u003e: 빅테크 대형 고객들이지만, GPU 수요가 공급을 초과 → 엔비디아 우위\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e대체재\u003c/strong\u003e: AMD ROCm, 구글 TPU, 아마존 트레이늄 → 있으나 성능/생태계 열세\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e신규 진입\u003c/strong\u003e: 팹리스 반도체 진입 장벽 매우 높음 (수조 원 R\u0026#x26;D, 파운드리 관계)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e경쟁 강도\u003c/strong\u003e: 현재는 수요 폭발로 경쟁보다 공급이 문제\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eTAM 추정:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAI 반도체 시장: 2024년 약 600억 달러 → 2028년 3,000억 달러 이상 예상\u003c/li\u003e\n\u003cli\u003e엔비디아 점유율 80% 유지 시: 2,400억 달러 매출 포텐셜\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e3단계: 거시 환경\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAI 산업 사이클\u003c/strong\u003e: 현재 성장기 초중반. GPT-3에서 GPT-5, 6으로 모델 규모가 기하급수적 확대 중\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e규제\u003c/strong\u003e: 미국의 반도체 대중국 수출 규제가 리스크. H20 등 다운그레이드 버전으로 대응 중\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e경기 민감도\u003c/strong\u003e: 빅테크 설비투자(CAPEX)가 핵심. 경기침체 시 IT 투자 축소 위험 있음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e지정학 리스크\u003c/strong\u003e: TSMC 의존도로 인한 대만 리스크. 美 CHIPS Act 수혜로 공급망 다각화 진행\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e4단계: 재무 분석 (FY2024 기준, NVIDIA 회계연도 1월 마감)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e5년 핵심 지표:\u003c/strong\ 4 순이익: 297억 달러\u003c/li\u003e\n\u003cli\u003eFY2024 영업현금흐름: 289억 달러\u003c/li\u003e\n\u003cli\u003e현금전환율: 0.97 → 양호. 이익이 현금으로 잘 전환됨\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e부채 현황:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e부채비율: 45% (매우 건전)\u003c/li\u003e\n\u003cli\u003e현금 및 유가증권: 260억 달러 이상 보유\u003c/li\u003e\n\u003cli\u003e사실상 무차입 경영에 가까움\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e5단계: 경쟁사 비교 (2024년 기준)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003eNVIDIA\u003c/th\u003e\n\u003cth\u003eAMD\u003c/th\u003e\n\u003cth\u003eIntel\u003c/th\u003e\n\u003cth\u003eBroadcom\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시가총액 (조 달러)\u003c/td\u003e\n\u003ctd\u003e2.0+\u003c/td\u003e\n\u003ctd\u003e0.25\u003c/td\u003e\n\u003ctd\u003e0.1\u003c/td\u003e\n\u003ctd\u003e0.7\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e매출 성장률 (YoY)\u003c/td\u003e\n\u003ctd\u003e+126%\u003c/td\u003e\n\u003ctd\u003e+10%\u003c/td\u003e\n\u003ctd\u003e-14%\u003c/td\u003e\n\u003ctd\u003e+44%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영업이익률\u003c/td\u003e\n\u003ctd\u003e55%\u003c/td\u003e\n\u003ctd\u003e5%\u003c/td\u003e\n\u003ctd\u003e-7%\u003c/td\u003e\n\u003ctd\u003e37%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eROE\u003c/td\u003e\n\u003ctd\u003e123%\u003c/td\u003e\n\u003ctd\u003e3%\u003c/td\u003e\n\u003ctd\u003e-17%\u003c/td\u003e\n\u003ctd\u003e50%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAI GPU 시장점유율\u003c/td\u003e\n\u003ctd\u003e~80%\u003c/td\u003e\n\u003ctd\u003e~10%\u003c/td\u003e\n\u003ctd\u003e~2%\u003c/td\u003e\n\u003ctd\u003eN/A\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e차별화 포인트:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAMD는 MI300X로 추격 중이나 CUDA 생태계 격차가 여전히 크다\u003
