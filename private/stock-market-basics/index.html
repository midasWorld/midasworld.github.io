장\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e발행시장\u003c/td\u003e\n\u003ctd\u003e기업이 주식을 새로 발행하는 시장 (IPO)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유통시장\u003c/td\u003e\n\u003ctd\u003e이미 발행된 주식을 투자자끼리 사고파는 시장 (거래소)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e우리가 HTS/MTS로 매매하는 것은 모두 \u003cstrong\u003e유통시장\u003c/strong\u003e이다.\u003c/p\u003e\n\u003ch3\u003e한국 거래소\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시장\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e대표 종목\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eKOSPI\u003c/td\u003e\n\u003ctd\u003e대형 우량주 중심\u003c/td\u003e\n\u003ctd\u003e삼성전자, SK하이닉스\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKOSDAQ\u003c/td\u003e\n\u003ctd\u003e중소형·성장주 중심\u003c/td\u003e\n\u003ctd\u003e셀트리온, 카카오게임즈\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKONEX\u003c/td\u003e\n\u003ctd\u003e초기 벤처기업\u003c/td\u003e\n\u003ctd\u003e소규모 스타트업\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e주문 종류\u003c/h2\u003e\n\u003ch3\u003e지정가 주문\u003c/h3\u003e\n\u003cp\u003e원하는 가격을 직접 지정. 그 가격이 될 때까지 체결 안 됨.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e삼성전자를 70,000원에 사고 싶다\n→ 70,000원 지정가 매수\n→ 주가가 70,000원 이하로 내려올 때 체결\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e시장가 주문\u003c/h3\u003e\n\u003cp\u003e현재 시장 가격으로 즉시 체결. 급하게 사거나 팔 때.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e변동성이 큰 종목은 시장가 사용 시 예상보다 불리한 가격에 체결될 수 있음 (슬리피지).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e조건부 지정가\u003c/h3\u003e\n\u003cp\u003e장 중에는 지정가, 장 마감 시 미체결이면 시장가로 전환.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e거래 시간 (한국)\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e시간\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e장 전 동시호가\u003c/td\u003e\n\u003ctd\u003e08:30 ~ 09:00\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e정규장\u003c/td\u003e\n\u003ctd\u003e09:00 ~ 15:30\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장 후 동시호가\u003c/td\u003e\n\u003ctd\u003e15:30 ~ 15:40\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e시간 외 단일가\u003c/td\u003e\n\u003ctd\u003e15:40 ~ 18:00\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e주요 용어\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e용어\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시가총액\u003c/td\u003e\n\u003ctd\u003e주가 × 발행주식수. 기업의 시장가치\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e상장 (IPO)\u003c/td\u003e\n\u003ctd\u003e거래소에 처음 주식을 공개하는 것\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e액면분할\u003c/td\u003e\n\u003ctd\u003e주가를 낮춰 거래를 활성화 (삼성전자 50:1 분할)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유상증자\u003c/td\u003e\n\u003ctd\u003e새 주식 발행해 자금 조달. 기존 주주 지분 희석\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e자사주 매입\u003c/td\u003e\n\u003ctd\u003e기업이 자기 주식 매입. 주가 방어·주주환원 효과\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e공매도\u003c/td\u003e\n\u003ctd\u003e없는 주식을 빌려서 판 뒤 낮은 가격에 사서 갚는 것. 하락 시 수익\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e수익률 계산\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e수익률(%) = (매도가 - 매수가) / 매수가 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\n예) \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e만원에 사서 \u003cspan class=\"hljs-number\"\u003e13\u003c/span\u003e만원에 팔면\n→ (\u003cspan class=\"hljs-number\"\u003e130\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e - \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e) / \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e30%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e세금·수수료 고려\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e매도 시 증권거래세\u003c/td\u003e\n\u003ctd\u003eKOSPI 0.18%, KOSDAQ 0.18%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e증권사 수수료\u003c/td\u003e\n\u003ctd\u003e0.015% 내외 (증권사마다 다름)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e양도소득세\u003c/td\u003e\n\u003ctd\u003e대주주 또는 해외주식 양도차익에 부과\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e소액 국내주식 투자자는 양도소득세 없음. 배당소득세는 15.4% 원천징수.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null
