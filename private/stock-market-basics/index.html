장\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e발행시장\u003c/td\u003e\n\u003ctd\u003e기업이 주식을 새로 발행하는 시장 (IPO, 유상증자 등)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유통시장\u003c/td\u003e\n\u003ctd\u003e이미 발행된 주식을 투자자끼리 사고파는 시장 (거래소)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e우리가 HTS/MTS로 매매하는 것은 모두 \u003cstrong\u003e유통시장\u003c/strong\u003e이다.\u003c/p\u003e\n\u003ch3\u003e한국 거래소\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시장\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e대표 종목\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eKOSPI\u003c/td\u003e\n\u003ctd\u003e대형 우량주 중심, 시총 상위 종목 집중\u003c/td\u003e\n\u003ctd\u003e삼성전자, SK하이닉스, LG에너지솔루션\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKOSDAQ\u003c/td\u003e\n\u003ctd\u003e중소형·성장주 중심, 기술·바이오주 다수\u003c/td\u003e\n\u003ctd\u003e셀트리온, 에코프로, HLB\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKONEX\u003c/td\u003e\n\u003ctd\u003e초기 벤처기업, 유동성 극히 낮음\u003c/td\u003e\n\u003ctd\u003e소규모 스타트업\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003eKONEX는 일반 투자자에게 실질적 투자 기회가 거의 없으며, 코스닥 이전 상장을 위한 징검다리 성격이 강하다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003eETF 시장\u003c/h3\u003e\n\u003cp\u003e**ETF(Exchange Traded Fund)**란 특정 지수·자산을 추종하는 펀드를 주식처럼 거래소에서 사고파는 상품이다.\u003c/p\u003e\n\u003ch4\u003e일반 주식과의 차이\u003c/h4\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e일반 주식\u003c/th\u003e\n\u003cth\u003eETF\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 대상\u003c/td\u003e\n\u003ctd\u003e단일 기업\u003c/td\u003e\n\u003ctd\u003e지수·섹터·원자재 등 묶음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e분산 효과\u003c/td\u003e\n\u003ctd\u003e없음\u003c/td\u003e\n\u003ctd\u003e있음 (내재적 분산)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e운용보수\u003c/td\u003e\n\u003ctd\u003e없음\u003c/td\u003e\n\u003ctd\u003e연 0.05~0.5% 수준\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당 처리\u003c/td\u003e\n\u003ctd\u003e직접 지급\u003c/td\u003e\n\u003ctd\u003e분배금(월/분기) 지급\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e괴리율\u003c/td\u003e\n\u003ctd\u003e해당 없음\u003c/td\u003e\n\u003ctd\u003e발생 가능\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch4\u003e괴리율 이해\u003c/h4\u003e\n\u003cp\u003eETF는 **NAV(순자산가치)**와 \u003cstrong\u003e시장가격\u003c/strong\u003e 사이에 차이가 생길 수 있다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e괴리율(%) = (ETF 시장가격 - \u003cspan class=\"hljs-selector-tag\"\u003eNAV\u003c/span\u003e) / \u003cspan class=\"hljs-selector-tag\"\u003eNAV\u003c/span\u003e × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003e괴리율이 +2% 이상이면 ETF가 고평가 → 매수 시 불리\u003c/li\u003e\n\u003cli\u003e거래량 적은 ETF일수록 괴리율 벌어지기 쉬움\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKODEX 200\u003c/strong\u003e, \u003cstrong\u003eTIGER 미국S\u0026#x26;P500\u003c/strong\u003e 등 대형 ETF는 괴리율 거의 없음\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e실전 팁: 해외지수 추종 ETF(나스닥100, S\u0026#x26;P500)는 NAV가 전날 종가 기준이라, 당일 해외시장이 크게 움직였다면 장 초반 괴리율이 일시적으로 벌어질 수 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e선물·옵션 기초 (개인투자자 필수 지식)\u003c/h3\u003e\n\u003cp\u003e직접 투자하지 않더라도 \u003cstrong\u003e선물·옵션의 만기일 효과\u003c/strong\u003e는 현물 주식에 영향을 주므로 반드시 알아야 한다.\u003c/p\u003e\n\u003ch4\u003e선물(Futures)\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e미래 특정 시점에 특정 가격으로 사고팔기로 약속하는 계약\u003c/li\u003e\n\u003cli\u003eKOSPI200 선물, 미니코스피200 선물 등\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e레버리지\u003c/strong\u003e 내재 → 증거금의 수배 손익 발생\u003c/li\u003e\n\u003cli\u003e개인이 직접 거래 시 원금 초과 손실 가능 → 초보자에게 비권장\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4\u003e옵션(Options)\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e특정 가격에 사거나(콜) 팔 수(풋) 있는 권리를 사고파는 계약\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e콜옵션\u003c/strong\u003e: 주가 상승 시 이익 / \u003cstrong\u003e풋옵션\u003c/strong\u003e: 주가 하락 시 이익\u003c/li\u003e\n\u003cli\u003e만기일에 가치가 0이 될 수 있는 소멸 상품\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4\u003e개인투자자가 알아야 할 만기일 효과\u003c/h4\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e만기일\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e선물 만기\u003c/td\u003e\n\u003ctd\u003e매월 두 번째 목요일\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e옵션 만기 (주간)\u003c/td\u003e\n\u003ctd\u003e매주 목요일\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e트리플 위칭 데이\u003c/td\u003e\n\u003ctd\u003e3·6·9·12월 두 번째 목요일 (선물+옵션+ETF 동시 만기)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e만기일 특히 트리플 위칭 데이 오후에는 프로그램 매매 대규모 청산으로 주가 변동성이 급격히 커진다. 만기일 장 마감 1~2시간 전 단기 매매는 주의 필요.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e프로그램 매매와 수급 개념\u003c/h3\u003e\n\u003ch4\u003e3대 투자 주체\u003c/h4\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e주체\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e외국인\u003c/td\u003e\n\u003ctd\u003eKOSPI 시총의 약 30% 보유. 삼성전자는 외국인 지분 50%+\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e기관\u003c/td\u003e\n\u003ctd\u003e국민연금·사모펀드·증권사 자기매매 등. 연기금은 저점 매수 성향\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e개인(개미)\u003c/td\u003e\n\u003ctd\u003e2020년 동학개미 이후 비중 급증. 하락장 역매수 성향\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch4\u003e수급 보는 법\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e외국인 순매수 지속\u003c/strong\u003e → 상승 추세 신호로 해석하는 경우 많음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e기관 매도 + 외국인 매도\u003c/strong\u003e 동시 발생 → 강한 하락 압력\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHTS 투자자별 매매동향\u003c/strong\u003e 탭에서 당일 수급 확인 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4\u003e프로그램 매매\u003c/h4\u003e\n\u003cp\u003e컴퓨터 알고리즘이 현물·선물 가격 차이(베이시스)를 이용해 자동으로 대규모 매매하는 것.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e차익 매매\u003c/strong\u003e: 선물-현물 가격차 이용 → 현물 대량 매수/매도 발생\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e비차익 매매\u003c/strong\u003e: 펀드 리밸런싱, ETF 설정/환매 시 발생\u003c/li\u003e\n\u003cli\u003eHTS에서 \u003cstrong\u003e프로그램 매매 현황\u003c/strong\u003e 탭으로 실시간 확인 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e프로그램 순매도가 3,000억 원 이상 지속되면 지수가 단기 눌릴 수 있다는 경험적 기준이 있으나, 절대 신호는 아님.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e공매도 금지·재개 이슈와 시장 영향\u003c/h3\u003e\n\u003ch4\u003e공매도란\u003c/h4\u003e\n\u003cp\u003e없는 주식을 \u003cstrong\u003e대주(빌려서)\u003c/strong\u003e 먼저 팔고, 나중에 낮은 가격에 사서 갚아 차익을 남기는 투자 기법.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e예) 삼성전자 10만원 → 공매도 100주 → 8만원에 매수해 상환\n→ 수익 = (100,000 - 80,000) × \u003cspan class=\"hljs-attr\"\u003e100\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e원\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003e하락에 베팅하는 수단이므로 시장에서 논란\u003c/li\u003e\n\u003cli\u003e기관·외국인은 가능하나 개인은 제한적 (증권사 대주서비스 이용)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4\u003e한국의 공매도 금지 역사\u003c/h4\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시기\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2008.10 ~ 2009.05\u003c/td\u003e\n\u003ctd\u003e글로벌 금융위기, 전면 금지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2020.03 ~ 2021.05\u003c/td\u003e\n\u003ctd\u003e코로나19 팬데믹, 전면 금지\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023.11 ~ 2024.06\u003c/td\u003e\n\u003ctd\u003e불법 공매도 사태로 전면 금지 후 부분 재개\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch4\u003e공매도 재개 시 시장 영향\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e**공매도 비중 높은 종목(쇼트 오버행)**은 재개 초기 매도 압력 증가\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e쇼트 커버링(숏스퀴즈)\u003c/strong\u003e: 재개 전 공매도 잔고 청산 과정에서 주가 급등 가능\u003c/li\u003e\n\u003cli\u003e코스닥 바이오·성장주 중심으로 영향 큼\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e실전 팁: 공매도 재개 발표 후 첫 1~2주는 변동성 확대 국면. 공매도 잔고 비율이 높은 종목 명단은 한국거래소(KRX) 홈페이지에서 확인 가능.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e주문 방법\u003c/h2\u003e\n\u003ch3\u003e호가창(매수호가/매도호가) 읽는 법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[매도잔량]\u003c/span\u003e  \u003cspan class=\"hljs-selector-attr\"\u003e[가격]\u003c/span\u003e  \u003cspan class=\"hljs-selector-attr\"\u003e[매수잔량]\u003c/span\u003e\n  \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e400\u003c/span\u003e\n  \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e800\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e300\u003c/span\u003e\n    \u003cspan class=\"hljs-number\"\u003e900\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e    ← 현재가 근처\n    \u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n           \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e    \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n           \u003cspan class=\"hljs-number\"\u003e69\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e900\u003c/span\u003e    \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e\n           \u003cspan class=\"hljs-number\"\u003e69\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e800\u003c/span\u003e    \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e매도호가(빨간색 위쪽)\u003c/strong\u003e: 팔려는 사람들이 제시한 가격대. 낮을수록 매수 즉시 체결 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e매수호가(파란색 아래쪽)\u003c/strong\u003e: 사려는 사람들이 제시한 가격대. 높을수록 매도 즉시 체결 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e스프레드\u003c/strong\u003e: 최우선 매도호가와 최우선 매수호가 간 차이 → 좁을수록 유동성 좋음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e잔량이 많은 호가대\u003c/strong\u003e: 심리적 지지/저항 역할. 대량 매도벽이 있으면 단기 돌파 어려움\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e실전 팁: 잔량이 갑자기 사라지는(호가 취소) 현상이 반복되면 시세 조종 가능성 주의. 실제 체결까지 이어지는 잔량이 진짜 수요/공급이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e주문 종류\u003c/h3\u003e\n\u003ch4\u003e지정가 주문\u003c/h4\u003e\n\u003cp\u003e원하는 가격을 직접 지정. 그 가격이 될 때까지 체결 안 됨.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e삼성전자를 70,000원에 사고 싶다\n→ 70,000원 지정가 매수\n→ 주가가 70,000원 이하로 내려올 때 체결\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch4\u003e시장가 주문\u003c/h4\u003e\n\u003cp\u003e현재 시장 가격으로 즉시 체결. 급하게 사거나 팔 때.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e변동성이 큰 종목은 시장가 사용 시 예상보다 불리한 가격에 체결될 수 있음 (슬리피지). 특히 KOSDAQ 소형주에서 두드러짐.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch4\u003e조건부 지정가\u003c/h4\u003e\n\u003cp\u003e장 중에는 지정가, 장 마감 시 미체결이면 시장가로 전환.\u003c/p\u003e\n\u003ch4\u003e최유리 지정가\u003c/h4\u003e\n\u003cp\u003e주문 즉시 상대방 최우선 호가로 체결. 시장가와 유사하나 한 호가 단위까지만.\u003c/p\u003e\n\u003ch4\u003e최우선 지정가\u003c/h4\u003e\n\u003cp\u003e주문 시점의 최우선 호가로 주문 자동 입력. 빠른 체결을 원하되 슬리피지를 제한하고 싶을 때 유용.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e동시호가와 단일가 결정 방식\u003c/h3\u003e\n\u003ch4\u003e동시호가 원리\u003c/h4\u003e\n\u003cp\u003e장 전(08:30\u003cdel\u003e09:00)과 장 후(15:30\u003c/del\u003e15:40) 동시호가 시간에는 가격이 움직이지 않고 주문만 쌓인다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e단일가 결정 알고리즘:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e모든 매수·매도 주문 집계\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e가장 많은 수량을 체결시킬 수 있는 가격\u003c/strong\u003e 탐색\u003c/li\u003e\n\u003cli\u003e해당 가격으로 일괄 체결 (단일가)\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e매수 주문  |  가격   | 매도 주문\n  5,000주  | 70,200\n  3,000주  | 70,100\n  2,000주  | 70,000  |  1,000주\n  1,000주  | 69,900  |  3,000주\n\u003cspan class=\"hljs-code\"\u003e           | 69,800  |  5,000주\n\u003c/span\u003e\n→ 70,000원에서 매수 2,000주 + 매도 1,000주 → 최대 체결 1,000주\n→ 가격 더 내려서... 최대 체결가 탐색\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e장 전 동시호가에서 대규모 매수 주문이 특정 가격대에 쌓이면 시초가가 그 부근에서 결정된다. 시초가 예측에 활용 가능.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch4\u003e시간외 단일가 (15:40~18:00)\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e10분 단위로 단일가 결정 (15:40, 15:50, ... 17:50)\u003c/li\u003e\n\u003cli\u003e정규장 종가의 ±10% 범위에서만 주문 가능\u003c/li\u003e\n\u003cli\u003e거래량 극히 적음 → 유동성 리스크 존재\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e스탑로스(손절) 주문 활용법\u003c/h3\u003e\n\u003ch4\u003e개념\u003c/h4\u003e\n\u003cp\u003e손실이 일정 수준을 넘으면 자동으로 매도하는 주문. 심리적 판단 실수를 방지하는 핵심 장치.\u003c/p\u003e\n\u003ch4\u003e한국 HTS/MTS에서의 구현 방법\u003c/h4\u003e\n\u003cp\u003e대부분의 증권사는 \u003cstrong\u003e\"조건부 주문\"\u003c/strong\u003e 또는 \u003cstrong\u003e\"자동주문\"\u003c/strong\u003e 기능으로 유사 기능 제공.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e키움 영웅문 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e주문 화면 → \"조건주문\" 탭\u003c/li\u003e\n\u003cli\u003e조건: \"현재가 ≤ 67,000원\"\u003c/li\u003e\n\u003cli\u003e액션: \"시장가 매도 100주\"\u003c/li\u003e\n\u003cli\u003e유효기간 설정 후 등록\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e주의: 키움 등 국내 HTS의 조건부 주문은 \u003cstrong\u003eHTS가 켜져 있을 때만 작동\u003c/strong\u003e. 서버 스탑로스가 아니므로 HTS 종료 시 무효.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003e토스증권 기준:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"가격 도달 시 매도\" 기능: 현재가 기준 하락 % 또는 절대 가격 설정\u003c/li\u003e\n\u003cli\u003e서버 사이드 작동 → HTS 꺼져도 유효 (단, 시장가 체결)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4\u003e스탑로스 설정 원칙\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e손절 기준을 \u003cstrong\u003e매수 전에\u003c/strong\u003e 미리 설정 (감정 배제)\u003c/li\u003e\n\u003cli\u003e일반적으로 매수가 대비 \u003cstrong\u003e-5% ~ -10%\u003c/strong\u003e 설정\u003c/li\u003e\n\u003cli\u003e변동성이 큰 KOSDAQ 성장주는 -10~-15%도 사용\u003c/li\u003e\n\u003cli\u003e지지선 바로 아래에 스탑을 설정하는 것이 기술적으로 유효\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e예약 주문·조건부 주문 활용\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e주문 유형\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003cth\u003e활용 사례\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e예약 주문\u003c/td\u003e\n\u003ctd\u003e다음날 장 시작 전 미리 입력\u003c/td\u003e\n\u003ctd\u003e퇴근 후 다음날 매수 예약\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e조건부 지정가\u003c/td\u003e\n\u003ctd\u003e장 중 지정가, 마감 시 시장가 전환\u003c/td\u003e\n\u003ctd\u003e당일 꼭 체결해야 할 때\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e스탑로스 조건주문\u003c/td\u003e\n\u003ctd\u003e특정 가격 하락 시 자동 매도\u003c/td\u003e\n\u003ctd\u003e리스크 관리\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e분할 매수 주문\u003c/td\u003e\n\u003ctd\u003e여러 가격대에 나눠 지정가 입력\u003c/td\u003e\n\u003ctd\u003e저점 분할 매수 전략\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e실전 팁: 장 전 예약 주문은 동시호가에 참여하므로 단일가로 체결됨. 지정가 매수 예약 시 예약가 이상이면 체결, 이하면 미체결.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e거래 시간 (한국)\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e시간\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e장 전 동시호가\u003c/td\u003e\n\u003ctd\u003e08:30 ~ 09:00\u003c/td\u003e\n\u003ctd\u003e시초가 결정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e정규장\u003c/td\u003e\n\u003ctd\u003e09:00 ~ 15:30\u003c/td\u003e\n\u003ctd\u003e연속 매매\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장 후 동시호가\u003c/td\u003e\n\u003ctd\u003e15:30 ~ 15:40\u003c/td\u003e\n\u003ctd\u003e종가 결정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e시간 외 단일가\u003c/td\u003e\n\u003ctd\u003e15:40 ~ 18:00\u003c/td\u003e\n\u003ctd\u003e10분 단위 체결, ±10% 제한\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e미국 주식(나스닥/NYSE)은 한국 시간 기준 23:30\u003cdel\u003e06:00 (서머타임 22:30\u003c/del\u003e05:00) 정규장. 프리마켓(프리장)은 한국 시간 17:00부터.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e주요 용어\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e용어\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시가총액\u003c/td\u003e\n\u003ctd\u003e주가 × 발행주식수. 기업의 시장가치\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e상장 (IPO)\u003c/td\u003e\n\u003ctd\u003e거래소에 처음 주식을 공개하는 것\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e액면분할\u003c/td\u003e\n\u003ctd\u003e주가를 낮춰 거래를 활성화 (삼성전자 50:1 분할)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유상증자\u003c/td\u003e\n\u003ctd\u003e새 주식 발행해 자금 조달. 기존 주주 지분 희석\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e무상증자\u003c/td\u003e\n\u003ctd\u003e잉여금 자본전입으로 주식 무상 배부. 주가는 희석되나 총가치 동일\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e자사주 매입\u003c/td\u003e\n\u003ctd\u003e기업이 자기 주식 매입. 주가 방어·주주환원 효과\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e공매도\u003c/td\u003e\n\u003ctd\u003e없는 주식을 빌려서 판 뒤 낮은 가격에 사서 갚는 것. 하락 시 수익\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e서킷브레이커\u003c/td\u003e\n\u003ctd\u003e주가 급락 시 거래 일시 중단. KOSPI/KOSDAQ 8%, 15%, 20% 하락 시 발동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e사이드카\u003c/td\u003e\n\u003ctd\u003e선물 급등락 시 현물 프로그램 매매 5분간 금지. 선물 ±5% 발동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e거래정지\u003c/td\u003e\n\u003ctd\u003e불성실 공시, 상장폐지 심사 등으로 거래 일시 정지\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e수익률 계산\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e수익률(%) = (매도가 - 매수가) / 매수가 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\n예) \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e만원에 사서 \u003cspan class=\"hljs-number\"\u003e13\u003c/span\u003e만원에 팔면\n→ (\u003cspan class=\"hljs-number\"\u003e130\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e - \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e) / \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e30%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e실질 수익률 (세금·수수료 반영)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e실질 수익 = 매도금액 - 매수금액 - 수수료(매수+매도) - 증권거래세 - 양도세\n\n예) 1,000만원어치 매수 → 1,300만원에 매도 (수수료 0.015% 가정)\n- 매수 수수료: 10,000,000 × \u003cspan class=\"hljs-attr\"\u003e0.00015\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e원\n- 매도 수수료: 13,000,000 × \u003cspan class=\"hljs-attr\"\u003e0.00015\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e950\u003c/span\u003e원\n- 증권거래세 (KOSPI): 13,000,000 × \u003cspan class=\"hljs-attr\"\u003e0.0018\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e23\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e400\u003c/span\u003e원\n- 총 비용: 26,850원\n- 순이익: 3,000,000 - 26,\u003cspan class=\"hljs-attr\"\u003e850\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e973\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e150\u003c/span\u003e원\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e세금·비용\u003c/h2\u003e\n\u003ch3\u003e국내 주식 세금·수수료\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e매도 시 증권거래세\u003c/td\u003e\n\u003ctd\u003eKOSPI 0.18%, KOSDAQ 0.18% (2025년 기준)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e증권사 수수료\u003c/td\u003e\n\u003ctd\u003e0원~0.015% 내외 (MTS 수수료 무료화 추세)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e양도소득세\u003c/td\u003e\n\u003ctd\u003e대주주(종목당 10억 이상) 또는 비상장주식에 부과\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e배당소득세\u003c/td\u003e\n\u003ctd\u003e15.4% 원천징수 (지방소득세 포함)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e소액 국내주식 투자자는 양도소득세 없음. 단, 금융소득(배당+이자)이 연 2,000만원 초과 시 금융소득종합과세 대상.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e해외주식 양도소득세\u003c/h3\u003e\n\u003cp\u003e해외주식은 소액이라도 양도차익에 세금이 부과된다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e과세표준 = 연간 해외주식 양도차익 합계 - \u003cspan class=\"hljs-number\"\u003e250\u003c/span\u003e만원 (기본공제)\n납부세액 = 과세표준 × \u003cspan class=\"hljs-number\"\u003e22%\u003c/span\u003e (지방소득세 포함)\n\n예) 연간 해외주식 수익 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e250\u003c/span\u003e만원\n→ (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e250\u003c/span\u003e만원 - \u003cspan class=\"hljs-number\"\u003e250\u003c/span\u003e만원) × \u003cspan class=\"hljs-number\"\u003e22%\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e220\u003c/span\u003e만원 납부\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch4\u003e절세 팁\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e손실 상계\u003c/strong\u003e: 같은 해에 발생한 해외주식 손실과 합산 가능\n\u003cul\u003e\n\u003cli\u003e예) A종목 +500만원, B종목 -300만원 → 과세표준 200만원 → 250만원 공제 내 → 세금 0\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e연말 손실 실현\u003c/strong\u003e: 12월 말 평가손실 종목을 매도해 당해 연도 이익과 상계\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e매년 250만원 이하 분산\u003c/strong\u003e: 연도별 250만원 공제 활용\u003c/li\u003e\n\u003cli\u003e신고 기한: \u003cstrong\u003e다음 해 5월 종합소득세 신고 기간\u003c/strong\u003e에 직접 신고 또는 증권사 대행 서비스 이용\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e해외주식 배당소득세\u003c/h3\u003e\n\u003cp\u003e미국 주식 배당은 \u003cstrong\u003e미국에서 15% 원천징수\u003c/strong\u003e 후 지급된다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e예) 애플(AAPL) 배당 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e 발생\n→ 미국 원천징수 \u003cspan class=\"hljs-variable\"\u003e$15\u003c/span\u003e\n→ 실수령 \u003cspan class=\"hljs-variable\"\u003e$85\u003c/span\u003e\n\n국내 배당소득세율 14% → 미국에서 이미 15% 냈으므로\n→ 추가 납부 없음 (외국납부세액공제 적용)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch4\u003e금융소득종합과세 주의\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e국내외 배당·이자 합계가 연 \u003cstrong\u003e2,000만원 초과\u003c/strong\u003e 시 종합과세 대상\u003c/li\u003e\n\u003cli\u003e최고 세율 49.5%(지방세 포함)까지 적용 가능\u003c/li\u003e\n\u003cli\u003e배당 수입이 늘어날수록 절세 계좌(ISA, 연금저축) 활용 필수\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003eISA 계좌 활용 절세\u003c/h3\u003e\n\u003cp\u003e**ISA(Individual Savings Account, 개인종합자산관리계좌)**는 하나의 계좌에서 주식·펀드·예금 등을 통합 운용하며 세금 혜택을 받는 계좌.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e일반형\u003c/th\u003e\n\u003cth\u003e서민형/농어민형\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e비과세 한도\u003c/td\u003e\n\u003ctd\u003e200만원\u003c/td\u003e\n\u003ctd\u003e400만원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e초과분 세율\u003c/td\u003e\n\u003ctd\u003e9.9% (분리과세)\u003c/td\u003e\n\u003ctd\u003e9.9% (분리과세)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e연 납입 한도\u003c/td\u003e\n\u003ctd\u003e2,000만원 (5년 최대 1억)\u003c/td\u003e\n\u003ctd\u003e동일\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e의무 보유기간\u003c/td\u003e\n\u003ctd\u003e3년\u003c/td\u003e\n\u003ctd\u003e3년\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch4\u003eISA 활용 전략\u003c/h4\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e국내 주식형 ETF를 ISA에서 운용\u003c/strong\u003e: 배당(분배금) 비과세 200만원 한도 내 완전 절세\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e해외주식 직접 투자는 ISA 불가\u003c/strong\u003e (해외주식형 ETF는 가능)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e만기 시 연금계좌로 이전\u003c/strong\u003e: 이전 금액의 10%(최대 300만원) 추가 세액공제\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e손익 통산\u003c/strong\u003e: ISA 내에서 수익과 손실을 합산해 순이익에만 과세\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e절세 계좌 우선순위: ISA \u003e 연금저축펀드 \u003e 일반 계좌\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e증권사별 수수료 비교 (MTS 기준)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e증권사\u003c/th\u003e\n\u003cth\u003e국내주식 MTS 수수료\u003c/th\u003e\n\u003cth\u003e해외주식\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e토스증권\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0원\u003c/strong\u003e (평생 무료)\u003c/td\u003e\n\u003ctd\u003e0.08~0.25%\u003c/td\u003e\n\u003ctd\u003e초보 친화 UI\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e나무증권\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0원\u003c/strong\u003e (이벤트 기간 후 0.015%)\u003c/td\u003e\n\u003ctd\u003e0.07~0.25%\u003c/td\u003e\n\u003ctd\u003e미래에셋 계열\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e카카오페이증권\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0원\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e0.1~0.25%\u003c/td\u003e\n\u003ctd\u003e카카오 연동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e키움증권 HTS\u003c/td\u003e\n\u003ctd\u003e0.015%\u003c/td\u003e\n\u003ctd\u003e0.07~0.25%\u003c/td\u003e\n\u003ctd\u003e국내 점유율 1위, 전문가 기능\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e삼성증권\u003c/td\u003e\n\u003ctd\u003e0.014%\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003ctd\u003e대형사 안정성\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e수수료 0원 이벤트는 조건부인 경우 많음. 계좌 개설 전 이벤트 기간·조건 반드시 확인.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e한국 시장 특성\u003c/h2\u003e\n\u003ch3\u003e코스피 역사적 박스권과 코리아 디스카운트\u003c/h3\u003e\n\u003cp\u003e코스피는 2011\u003cdel\u003e2020년 약 10년간 **1,800\u003c/del\u003e2,200포인트** 박스권에 갇혀 \"박스피\"라는 별명을 얻었다.\u003c/p\u003e\n\u003ch4\u003e코리아 디스카운트 원인\u003c/h4\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e요인\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e지정학적 리스크\u003c/td\u003e\n\u003ctd\u003e북한 리스크에 따른 외국인 리스크 프리미엄\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e낮은 주주환원\u003c/td\u003e\n\u003ctd\u003e배당성향·자사주 소각 선진국 대비 낮음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e재벌 지배구조\u003c/td\u003e\n\u003ctd\u003e순환출자·지주사 구조로 소액주주 이익 침해 우려\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e낮은 ROE\u003c/td\u003e\n\u003ctd\u003e자본 비효율적 운용, 현금 쌓아두기\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e회계 불투명성\u003c/td\u003e\n\u003ctd\u003e일부 기업 분식회계·공시 불성실\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch4\u003e밸류업 프로그램 (2024~)\u003c/h4\u003e\n\u003cp\u003e금융당국이 코리아 디스카운트 해소를 위해 도입한 정책.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e기업들이 자발적으로 PBR·ROE 개선 계획 공시\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e코리아 밸류업 지수\u003c/strong\u003e 신설 → 관련 ETF 출시\u003c/li\u003e\n\u003cli\u003e실질적 강제성 없어 효과에 의문부호, 그러나 중장기 방향성은 긍정적\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e외국인 보유 비중과 영향력\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e삼성전자 외국인 지분: \u003cstrong\u003e약 50~55%\u003c/strong\u003e (시기에 따라 변동)\u003c/li\u003e\n\u003cli\u003e코스피 전체 외국인 보유 비중: \u003cstrong\u003e약 30%\u003c/strong\u003e 내외\u003c/li\u003e\n\u003cli\u003e외국인은 주로 \u003cstrong\u003e달러 강세 시 이탈\u003c/strong\u003e, 달러 약세 시 신흥국 주식 매수 → 원/달러 환율과 역의 상관관계\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4\u003e실전 활용\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e외국인이 \u003cstrong\u003e3거래일 이상 순매수 + 환율 하락\u003c/strong\u003e → 상승 추세 강화 신호\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e환율 급등(원화 약세)\u003c/strong\u003e 시 외국인 이탈 우려 → 지수 하방 압력\u003c/li\u003e\n\u003cli\u003e코스피 외국인 보유 금액은 금융투자협회(KOFIA) 통계에서 확인 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e동학개미 운동 이후 개인투자자 변화\u003c/h3\u003e\n\u003cp\u003e2020년 3월 코로나 폭락장에서 개인 투자자들이 대규모 역매수에 나서며 \"동학개미 운동\" 명칭 탄생.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e변화\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e개인 비중\u003c/td\u003e\n\u003ctd\u003e코스피 거래대금 기준 개인 비중 70%+ (과거 50~60%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e계좌 수\u003c/td\u003e\n\u003ctd\u003e증권 계좌 5,000만 개 돌파 (2023년 기준)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 성향\u003c/td\u003e\n\u003ctd\u003e단타·테마주 쏠림 현상 증가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e정보화\u003c/td\u003e\n\u003ctd\u003e유튜브·SNS 기반 정보 확산, 레딧식 집단 투자도 등장\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e개인 비중 증가는 시장 변동성 확대와 테마주·급등주 장세를 동반하는 경향이 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e기업 지배구조와 지주사 구조\u003c/h3\u003e\n\u003cp\u003e한국 대기업(재벌)은 독특한 \u003cstrong\u003e지주사-자회사 구조\u003c/strong\u003e 또는 \u003cstrong\u003e순환출자 구조\u003c/strong\u003e로 운영된다.\u003c/p\u003e\n\u003ch4\u003e지주사 구조 예시 (SK그룹)\u003c/h4\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-built_in\"\u003eSK\u003c/span\u003e(주) \u003cspan class=\"hljs-selector-attr\"\u003e[지주사]\u003c/span\u003e\n├── SK텔레콤 (통신)\n│   └── SK하이닉스 (반도체)\n├── SK이노베이션 (에너지)\n│   └── SK온 (배터리)\n└── SK바이오팜 (제약)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch4\u003e투자 시 주의사항\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e지주사 할인\u003c/strong\u003e: 지주사는 자회사 가치 합산 대비 30~50% 할인된 가격에 거래되는 경우 많음\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e자회사 상장 시 지주사 영향\u003c/strong\u003e: 알짜 비상장 자회사가 상장하면 지주사 할인이 더 확대되기도 함\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e순환출자 해소\u003c/strong\u003e: 공정거래법 규제로 순환출자 해소 시 특정 종목 매각 물량 나올 수 있음\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e투자 시작하기\u003c/h2\u003e\n\u003ch3\u003e증권계좌 개설 방법 (비대면)\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e원하는 증권사 앱(MTS) 다운로드\u003c/li\u003e\n\u003cli\u003e신분증(주민등록증 또는 운전면허증) 촬영\u003c/li\u003e\n\u003cli\u003e본인 명의 휴대폰·계좌 인증\u003c/li\u003e\n\u003cli\u003e투자자 정보 설문 (위험 성향 평가)\u003c/li\u003e\n\u003cli\u003e약관 동의 → 계좌번호 발급 (보통 즉시 또는 당일)\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e증권사 앱에서 \u003cstrong\u003e은행 연결 계좌\u003c/strong\u003e 등록 후 입금하면 바로 투자 가능.\n미성년자는 법정대리인 동의 서류 필요 → 비대면 불가, 지점 방문 필요.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch3\u003e추천 HTS/MTS 특징 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e플랫폼\u003c/th\u003e\n\u003cth\u003e대상\u003c/th\u003e\n\u003cth\u003e장점\u003c/th\u003e\n\u003cth\u003e단점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e토스증권\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e입문자\u003c/td\u003e\n\u003ctd\u003e직관적 UI, 수수료 0원, 소수점 투자\u003c/td\u003e\n\u003ctd\u003e차트·기능 단순\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e나무증권(미래에셋)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e입문~중급\u003c/td\u003e\n\u003ctd\u003e해외주식 강세, UI 깔끔\u003c/td\u003e\n\u003ctd\u003e고급 기능 부족\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e카카오페이증권\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e입문자\u003c/td\u003e\n\u003ctd\u003e카카오 연동, 간편 UI\u003c/td\u003e\n\u003ctd\u003e기능 제한적\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e중급~전문가\u003c/td\u003e\n\u003ctd\u003e국내 점유율 1위, 기능 풍부, API 제공\u003c/td\u003e\n\u003ctd\u003eUI 복잡, 초보 진입장벽\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e삼성증권 mPOP\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e중급\u003c/td\u003e\n\u003ctd\u003e리서치·리포트 제공, 안정성\u003c/td\u003e\n\u003ctd\u003e수수료 상대적 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e추천 조합:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e입문자: \u003cstrong\u003e토스증권\u003c/strong\u003e (메인) + \u003cstrong\u003e키움 영웅문\u003c/strong\u003e (차트·분석용)\u003c/li\u003e\n\u003cli\u003e중급 이상: \u003cstrong\u003e키움 영웅문\u003c/strong\u003e (메인) + \u003cstrong\u003e나무증권\u003c/strong\u003e (해외주식)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e처음 투자금 규모와 시작하는 법\u003c/h3\u003e\n\u003ch4\u003e투자금 원칙\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e생활비, 비상금과 완전 분리\u003c/strong\u003e: 최소 6개월치 생활비는 예금에 유지\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e잃어도 생활에 지장 없는 금액\u003c/strong\u003e으로 시작\u003c/li\u003e\n\u003cli\u003e입문자 권장: \u003cstrong\u003e100만원 이하\u003c/strong\u003e로 시작 후 경험 쌓기\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4\u003e단계별 접근\u003c/h4\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e\u003cspan class=\"hljs-section\"\u003e1단계: 100만원 이하, ETF (KODEX 200, TIGER 미국S\u0026#x26;P500)만\u003c/span\u003e\n   → 개별 종목 없이 시장 수익률 경험\n\u003cspan class=\"hljs-section\"\u003e2단계: 300만원 이하, ETF 70% + 개별 종목 1~2개\u003c/span\u003e\n   → 종목 선정·분석 연습\n\u003cspan class=\"hljs-section\"\u003e3단계: 1,000만원 이상, 포트폴리오 구성\u003c/span\u003e\n   → 섹터 분산, 리밸런싱 전략\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch4\u003e분할 매수의 중요성\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e한 번에 전액 투자하지 말 것\u003c/li\u003e\n\u003cli\u003e3~5회 분할 매수로 평균 매수가 낮추기 (코스트 애버리징)\u003c/li\u003e\n\u003cli\u003e예: 100만원 투자 → 첫 주 30만원 + 2주 후 30만원 + 4주 후 40만원\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e모의투자 활용법\u003c/h3\u003e\n\u003cp\u003e실제 돈을 쓰지 않고 가상 자금으로 실전 연습하는 시스템.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e증권사\u003c/th\u003e\n\u003cth\u003e모의투자 지원\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e키움증권\u003c/td\u003e\n\u003ctd\u003e지원 (영웅문 별도 서버)\u003c/td\u003e\n\u003ctd\u003e실제 호가와 동일 환경\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e삼성증권\u003c/td\u003e\n\u003ctd\u003e지원\u003c/td\u003e\n\u003ctd\u003e가상 1,000만원 제공\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e한국투자증권\u003c/td\u003e\n\u003ctd\u003e지원\u003c/td\u003e\n\u003ctd\u003e대회 형식 운영\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e토스증권\u003c/td\u003e\n\u003ctd\u003e미지원\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch4\u003e모의투자 활용 전략\u003c/h4\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e최소 3개월\u003c/strong\u003e 모의투자 후 실전 진입\u003c/li\u003e\n\u003cli\u003e모의투자에서도 \u003cstrong\u003e매수 근거, 목표가, 손절가\u003c/strong\u003e 기록장 작성\u003c/li\u003e\n\u003cli\u003e수익보다 \u003cstrong\u003e의사결정 과정의 일관성\u003c/strong\u003e 검증이 목적\u003c/li\u003e\n\u003cli\u003e실전과 달리 \u003cstrong\u003e손실의 심리적 고통이 없음\u003c/strong\u003e → 과감한 베팅을 경계할 것\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e모의투자에서 수익이 났다고 실전에서도 수익이 나지는 않는다. 심리 관리가 실전의 핵심이며, 모의투자는 기계적 프로세스 훈련 도구로 사용할 것.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"주식 시장 기초 개념\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 da
