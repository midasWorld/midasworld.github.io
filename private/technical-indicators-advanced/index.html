"],\"ViewportBoundary\"]\n11:I[97367,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"MetadataBoundary\"]\n8:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n9:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lc\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/b6f08ff9efce5300.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]]}]\na:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$Lf\",null,{\"children\":\"$L10\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L11\",null,{\"children\":[\"$\",\"$3\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L12\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n"])</script><script>self.__next_f.push([1,"13:I[12613,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"PrivateGate\"]\n14:I[22016,[\"/_next/static/chunks/6616542657a424b9.js\",\"/_next/static/chunks/b6f08ff9efce5300.js\"],\"\"]\n15:Ta2b9,"])</script><script>self.__next_f.push([1,"\u003ch1\u003e차트 보조지표 심화: 일목균형표부터 피보나치까지\u003c/h1\u003e\n\u003cp\u003e캔들, 이동평균선, RSI, MACD, 볼린저 밴드를 익혔다면 이제 다음 단계다. 이 글에서는 기초 지표를 충분히 소화한 트레이더가 실전에서 실제로 사용하는 고급 지표들을 다룬다. 단순 설명이 아니라 \u003cstrong\u003e왜 이 지표가 작동하는지\u003c/strong\u003e, \u003cstrong\u003e어떤 상황에서 써야 하고 어떤 상황에서 쓰면 안 되는지\u003c/strong\u003e를 함께 정리했다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 일목균형표 (Ichimoku Cloud)\u003c/h2\u003e\n\u003cp\u003e일목균형표는 일본의 호소다 고이치(細田悟一)가 1969년에 발표한 지표다. 일목(一目)이란 \"한눈에 본다\"는 뜻으로, 추세의 방향, 강도, 지지/저항, 모멘텀을 하나의 차트에서 동시에 파악하는 것이 목표다. 5개의 선과 구름(Kumo)으로 구성되어 있으며, 처음 보면 복잡해 보이지만 이해하고 나면 단일 지표로는 가장 많은 정보를 담고 있다.\u003c/p\u003e\n\u003ch3\u003e1-1. 5개 선의 구성과 계산법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e전환선 (Tenkan-Sen, 9일)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e전환선 = (\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e일 최고가 + \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e일 최저가) / \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e단기 모멘텀을 나타낸다. 이동평균이 아니라 9일간의 중간값(Midpoint)임을 주의해야 한다. 주가가 빠르게 방향을 전환하면 전환선도 빠르게 반응한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e기준선 (Kijun-Sen, 26일)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e기준선 = (\u003cspan class=\"hljs-number\"\u003e26\u003c/span\u003e일 최고가 + \u003cspan class=\"hljs-number\"\u003e26\u003c/span\u003e일 최저가) / \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e중기 추세의 기준이 된다. 주가가 기준선 위에 있으면 중기 상승 추세, 아래에 있으면 하락 추세로 판단한다. 기관투자자들이 많이 참고하는 선이기도 하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e후행스팬 (Chikou Span)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e후행스팬 = 당일 종가를 26일 전에 표시\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e현재 주가를 과거 26일 전 위치에 그린다. 현재 후행스팬이 26일 전 주가보다 위에 있으면 강세, 아래에 있으면 약세로 해석한다. 직관적으로 \"현재가 과거보다 얼마나 강한가\"를 보여준다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e선행스팬 A (Senkou Span A, 구름 상단 또는 하단)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e선행스팬 \u003cspan class=\"hljs-attr\"\u003eA\u003c/span\u003e = (전환선 + 기준선) / \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e → \u003cspan class=\"hljs-number\"\u003e26\u003c/span\u003e일 앞에 표시\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e선행스팬 B (Senkou Span B, 구름 반대편)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e선행스팬 \u003cspan class=\"hljs-attr\"\u003eB\u003c/span\u003e = (\u003cspan class=\"hljs-number\"\u003e52\u003c/span\u003e일 최고가 + \u003cspan class=\"hljs-number\"\u003e52\u003c/span\u003e일 최저가) / \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e → \u003cspan class=\"hljs-number\"\u003e26\u003c/span\u003e일 앞에 표시\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e선행스팬 A와 B 사이의 영역이 **구름(Kumo)**이다. 구름은 26일 앞에 그려지므로 미래의 지지/저항대를 미리 시각화한다는 점이 일목균형표의 독특한 강점이다.\u003c/p\u003e\n\u003ch3\u003e1-2. 구름(Kumo)의 해석\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e구름이 두꺼울수록\u003c/strong\u003e 지지/저항의 강도가 강하다. 얇은 구름은 쉽게 돌파된다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e녹색 구름(양운)\u003c/strong\u003e: 선행스팬 A \u003e 선행스팬 B. 상승 추세의 구름.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e적색 구름(음운)\u003c/strong\u003e: 선행스팬 A \u0026#x3C; 선행스팬 B. 하락 추세의 구름.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e구름 위에서 주가 횡보\u003c/strong\u003e: 지지대로 작용. 눌림 후 재상승 기회.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e구름 아래에서 주가 횡보\u003c/strong\u003e: 저항대로 작용. 반등 후 재하락 위험.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e구름 색깔이 바뀌는 지점(선행스팬 A와 B가 교차하는 지점)을 \u003cstrong\u003e구름의 꼬임\u003c/strong\u003e이라고 하며, 이 구간에서 추세 전환이 일어나는 경우가 많다.\u003c/p\u003e\n\u003ch3\u003e1-3. 강한 매수 신호 (삼역호전)\u003c/h3\u003e\n\u003cp\u003e다음 세 가지 조건이 동시에 충족될 때를 **삼역호전(三役好転)**이라고 하며, 일목균형표에서 가장 강한 매수 신호다:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e주가가 구름 위에 있다\u003c/strong\u003e (중장기 상승 추세)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e전환선이 기준선 위에 있다\u003c/strong\u003e (단기 모멘텀 강세)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e후행스팬이 26일 전 주가 위에 있다\u003c/strong\u003e (현재 가격이 과거보다 강세)\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e세 조건 중 하나라도 빠지면 신호의 신뢰도가 낮아진다.\u003c/p\u003e\n\u003ch3\u003e1-4. 강한 매도 신호 (삼역역전)\u003c/h3\u003e\n\u003cp\u003e위 조건의 반대:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e주가가 구름 아래에 있다\u003c/li\u003e\n\u003cli\u003e전환선이 기준선 아래에 있다\u003c/li\u003e\n\u003cli\u003e후행스팬이 26일 전 주가 아래에 있다\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e1-5. HTS 설정 방법\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움증권 영웅문\u003c/strong\u003e: 차트 우클릭 → 지표 추가 → 일목균형표 → 기간 설정 (9, 26, 52)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e미래에셋 HTS\u003c/strong\u003e: 지표 → 추세 → 일목균형표\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNH투자증권\u003c/strong\u003e: 기술적지표 → 추세 → Ichimoku\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e기간 설정은 한국과 서양 모두 **(9, 26, 52)**로 동일하다. 일부 플랫폼에서 기본값이 (9, 26, 26)으로 설정된 경우가 있으니 52일을 확인하자.\u003c/p\u003e\n\u003ch3\u003e1-6. 한계와 주의사항\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e횡보장에서 무력하다\u003c/strong\u003e: 구름이 얇고 전환선/기준선이 뒤엉키면 신호가 너무 많이 발생한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e후행스팬 해석 착오\u003c/strong\u003e: 후행스팬은 과거에 찍히므로 차트 우측 끝에서 26일 뒤에 위치한다는 점을 헷갈리지 말 것.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e지연이 내재되어 있다\u003c/strong\u003e: 26일, 52일 기간을 쓰므로 빠른 단기 매매에는 적합하지 않다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e단독 사용 자제\u003c/strong\u003e: 거래량, MACD와 함께 사용할 때 신뢰도가 올라간다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 피보나치 되돌림 (Fibonacci Retracement)\u003c/h2\u003e\n\u003cp\u003e피보나치 수열(1, 1, 2, 3, 5, 8, 13, 21...)에서 인접한 두 숫자의 비율은 황금비율(0.618)에 수렴한다. 이 비율이 자연계에 편재해 있다는 관찰에서 출발해 금융시장에 적용한 것이 피보나치 되돌림이다. 논리적 근거가 약하다는 비판도 있지만, 충분히 많은 트레이더가 이 레벨을 보기 때문에 \u003cstrong\u003e자기실현적 예언\u003c/strong\u003e처럼 실제로 지지/저항이 발생하는 경향이 있다.\u003c/p\u003e\n\u003ch3\u003e2-1. 주요 레벨\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e레벨\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e23.6%\u003c/td\u003e\n\u003ctd\u003e약한 되돌림, 강한 추세에서 자주 나타남\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e38.2%\u003c/td\u003e\n\u003ctd\u003e보통 강도의 되돌림\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50.0%\u003c/td\u003e\n\u003ctd\u003e피보나치 수열은 아니지만 심리적 중간선으로 중요\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e61.8%\u003c/td\u003e\n\u003ctd\u003e황금비율, 가장 강력한 지지/저항 레벨\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e78.6%\u003c/td\u003e\n\u003ctd\u003e61.8%의 제곱근, 되돌림의 한계선. 이 이상 되돌리면 추세 전환 가능성\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e2-2. 그리는 방법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e상승 후 되돌림 분석 (하락 방향으로 그리기)\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e명확한 저점(A)에서 고점(B)까지 피보나치 도구를 드래그한다.\u003c/li\u003e\n\u003cli\u003e0%(고점)에서 100%(저점) 방향으로 되돌림 레벨이 자동 표시된다.\u003c/li\u003e\n\u003cli\u003e주가가 어느 레벨에서 반등하는지 관찰한다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e하락 후 되돌림 분석 (상승 방향으로 그리기)\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e명확한 고점(A)에서 저점(B)까지 드래그한다.\u003c/li\u003e\n\u003cli\u003e반등 시 어느 레벨에서 저항받는지 확인한다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e핵심은 \u003cstrong\u003e명확한 스윙 고점/저점\u003c/strong\u003e을 기준으로 잡는 것이다. 임의의 지점에서 그리면 의미 없는 레벨만 나온다.\u003c/p\u003e\n\u003ch3\u003e2-3. 각 레벨에서의 실전 매매\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e강한 상승 추세 중 23.6% 되돌림\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e추세가 강할수록 얕게 되돌린다.\u003c/li\u003e\n\u003cli\u003e23.6% 레벨에서 양봉 발생 + 거래량 감소 후 증가 = 강한 매수 신호.\u003c/li\u003e\n\u003cli\u003e진입 후 손절은 38.2% 레벨 이탈 시.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e일반적인 되돌림 38.2%~50%\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e가장 흔하게 나타나는 되돌림 구간.\u003c/li\u003e\n\u003cli\u003e이 구간에서 지지가 확인되면 추세 재개 가능성이 높다.\u003c/li\u003e\n\u003cli\u003e캔들 패턴(망치형, 역망치형)이나 RSI 과매도와 함께 확인하면 신뢰도 상승.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e61.8% 황금비율 되돌림\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e추세 추종 매매자들이 가장 선호하는 레벨.\u003c/li\u003e\n\u003cli\u003e이 레벨을 지켜야 추세가 살아있다고 본다.\u003c/li\u003e\n\u003cli\u003e61.8%를 하향 이탈하면 78.6%~100%까지 되돌림 가능성을 열어두어야 한다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e2-4. 피보나치 확장 (Extension): 목표가 설정\u003c/h3\u003e\n\u003cp\u003e되돌림이 끝나고 추세가 재개될 때, 얼마나 올라갈지 목표가를 설정하는 데 피보나치 확장을 사용한다.\u003c/p\u003e\n\u003cp\u003e주요 확장 레벨:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e127.2%\u003c/strong\u003e: 1차 목표가 (보수적)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e161.8%\u003c/strong\u003e: 주요 목표가 (황금비율)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e261.8%\u003c/strong\u003e: 2차 목표가 (강한 추세)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e계산 예시: 저점 10,000원 → 고점 15,000원(+5,000원) → 되돌림 후 12,000원에서 지지.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e161.8% 확장 목표 = 12,000 + (5,000 × 1.618) = 20,090원\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e2-5. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e: 차트 → 피보나치 되돌림 도구 (좌측 드로잉 툴바)\u003c/li\u003e\n\u003cli\u003e그리기: 저점 클릭 후 고점까지 드래그 (또는 그 반대)\u003c/li\u003e\n\u003cli\u003e확장선 추가는 피보나치 확장(Extension) 도구를 별도로 사용\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 스토캐스틱 (Stochastic Oscillator)\u003c/h2\u003e\n\u003cp\u003e스토캐스틱은 조지 레인(George Lane)이 1950년대에 개발한 지표로, 최근 N일간의 가격 범위에서 현재 가격이 어느 위치에 있는지를 백분율로 나타낸다. RSI가 가격 변화의 속도를 측정한다면, 스토캐스틱은 가격의 상대적 위치를 측정한다.\u003c/p\u003e\n\u003ch3\u003e3-1. 계산법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e%K (패스트 스토캐스틱)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e%\u003cspan class=\"hljs-attr\"\u003eK\u003c/span\u003e = (현재 종가 - N일 최저가) / (N일 최고가 - N일 최저가) × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eN의 기본값은 14일. %K가 80 이상이면 과매수, 20 이하이면 과매도.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e%D (시그널 선)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e%\u003cspan class=\"hljs-attr\"\u003eD\u003c/span\u003e = %K의 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e일 단순이동평균\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e%K를 부드럽게 한 선. %K가 %D를 상향 돌파하면 매수 신호, 하향 돌파하면 매도 신호.\u003c/p\u003e\n\u003ch3\u003e3-2. 패스트 vs 슬로우 스토캐스틱\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e적합한 상황\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e패스트 스토캐스틱\u003c/td\u003e\n\u003ctd\u003e반응 빠름, 노이즈 많음\u003c/td\u003e\n\u003ctd\u003e단기 스캘핑\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e슬로우 스토캐스틱\u003c/td\u003e\n\u003ctd\u003e%K를 한 번 더 평활화, 신뢰도 높음\u003c/td\u003e\n\u003ctd\u003e스윙 트레이딩\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e실전에서는 **슬로우 스토캐스틱(14, 3, 3)**이 더 많이 사용된다. 거짓 신호가 적다.\u003c/p\u003e\n\u003ch3\u003e3-3. 매매 신호 해석\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e과매도 구간(20 이하)에서 %K가 %D를 상향 돌파\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e강력한 매수 신호.\u003c/li\u003e\n\u003cli\u003e단, 강한 하락 추세에서는 과매도 상태가 오래 지속될 수 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e과매수 구간(80 이상)에서 %K가 %D를 하향 돌파\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e매도 또는 단기 차익실현 신호.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e중간 영역(50 부근)에서의 돌파\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e50을 상향 돌파하며 유지되면 상승 추세 강화.\u003c/li\u003e\n\u003cli\u003e50을 하향 돌파하면 하락 압력 증가.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e3-4. 스토캐스틱 다이버전스\u003c/h3\u003e\n\u003cp\u003e다이버전스는 RSI에서와 동일한 원리다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e강세 다이버전스\u003c/strong\u003e: 주가는 신저점 갱신, 스토캐스틱은 이전 저점보다 높은 저점 → 반등 가능성\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e약세 다이버전스\u003c/strong\u003e: 주가는 신고점 갱신, 스토캐스틱은 이전 고점보다 낮은 고점 → 하락 가능성\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e3-5. RSI vs 스토캐스틱: 어떤 상황에서 무엇을 쓸까\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상황\u003c/th\u003e\n\u003cth\u003e추천 지표\u003c/th\u003e\n\u003cth\u003e이유\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e강한 추세장\u003c/td\u003e\n\u003ctd\u003eRSI\u003c/td\u003e\n\u003ctd\u003e스토캐스틱은 추세장에서 과매수/과매도 상태가 너무 오래 지속됨\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e횡보/박스권\u003c/td\u003e\n\u003ctd\u003e스토캐스틱\u003c/td\u003e\n\u003ctd\u003e가격 범위 내에서 상대적 위치를 잘 포착\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e단기 매매(일봉 이하)\u003c/td\u003e\n\u003ctd\u003e스토캐스틱\u003c/td\u003e\n\u003ctd\u003e빠른 반응 속도\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e추세 전환 확인\u003c/td\u003e\n\u003ctd\u003eRSI\u003c/td\u003e\n\u003ctd\u003e다이버전스 신뢰도가 RSI가 더 높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e둘 다 장단점이 있으므로, 실전에서는 RSI로 추세를 확인하고 스토캐스틱으로 진입 타이밍을 잡는 방식을 많이 쓴다.\u003c/p\u003e\n\u003ch3\u003e3-6. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e: 지표 추가 → 모멘텀 → Stochastic Slow\u003c/li\u003e\n\u003cli\u003e기본 설정: (14, 3, 3) — K기간 14, D평활 3, 슬로우D 3\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e4. CCI (Commodity Channel Index)\u003c/h2\u003e\n\u003cp\u003eCCI는 도널드 램버트(Donald Lambert)가 1980년에 개발한 지표로, 이름에 \"Commodity(상품)\"가 들어가지만 주식에도 널리 사용된다. 현재 가격이 통계적 평균에서 얼마나 벗어났는지를 측정한다.\u003c/p\u003e\n\u003ch3\u003e4-1. 계산법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e전형가격(Typical Price) = (고가 + 저가 + 종가) / \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e\n평균 전형가격 = N일간 전형가격의 단순이동평균\n평균편차 = N일간 (전형가격 - 평균 전형가격)의 절대값 평균\n\nCCI = (현재 전형가격 - 평균 전형가격) / (\u003cspan class=\"hljs-number\"\u003e0.015\u003c/span\u003e × 평균편차)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e0.015는 스케일링 상수로, 대부분의 CCI 값이 ±100 구간에 들어오도록 조정한다. N의 기본값은 20일.\u003c/p\u003e\n\u003ch3\u003e4-2. 해석\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e+100 이상\u003c/strong\u003e: 과매수 구간. 단기 과열 상태.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e-100 이하\u003c/strong\u003e: 과매도 구간. 단기 침체 상태.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e0 근처\u003c/strong\u003e: 중립. 평균 수준의 가격.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e+200 이상\u003c/strong\u003e: 극단적 과매수. 매우 강한 상승 모멘텀이거나 단기 과열.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e4-3. 두 가지 활용법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e역추세 매매 (일반적)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e-100 이하에서 매수, +100 이상에서 매도.\u003c/li\u003e\n\u003cli\u003e단기 평균회귀를 노리는 방식.\u003c/li\u003e\n\u003cli\u003e횡보장에서 효과적.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e추세 추종 매매 (CCI의 다른 활용)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCCI가 0선을 상향 돌파할 때 매수.\u003c/li\u003e\n\u003cli\u003eCCI가 +100을 돌파하고 유지되면 강한 추세 진행 중.\u003c/li\u003e\n\u003cli\u003e-100 아래에서 계속 머물면 강한 하락 추세.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e4-4. RSI보다 CCI가 유리한 상황\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e급등/급락 포착\u003c/strong\u003e: CCI는 ±100을 훨씬 벗어날 수 있어, 극단적 상황을 더 민감하게 포착한다. RSI는 0~100 범위에 갇혀 극단값을 포착하는 데 한계가 있다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e상품선물 시장\u003c/strong\u003e: 원래 개발 목적이 상품시장이므로 원유, 금 등에서 더 정확하다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e다이버전스 분석\u003c/strong\u003e: CCI로도 RSI와 유사한 다이버전스 분석이 가능하며, 더 선행하는 경우가 있다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e4-5. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e: 지표 추가 → 모멘텀 → CCI\u003c/li\u003e\n\u003cli\u003e기본 설정: 기간 20, 기준선 ±100\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. Parabolic SAR (Stop and Reverse)\u003c/h2\u003e\n\u003cp\u003e웰레스 와일더(J. Welles Wilder)가 개발한 지표로, RSI와 ATR을 만든 인물이기도 하다. SAR는 추세의 방향을 따라 이동하는 스탑로스 포인트를 실시간으로 표시해준다. \"추세 추적형 스탑로스\"라고 이해하면 쉽다.\u003c/p\u003e\n\u003ch3\u003e5-1. SAR 점의 의미\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e주가 아래에 점\u003c/strong\u003e: 상승 추세 중. 점이 스탑로스 레벨이다. 주가가 점 아래로 내려오면 추세 전환.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주가 위에 점\u003c/strong\u003e: 하락 추세 중. 점이 숏 포지션의 스탑로스. 주가가 점 위로 올라가면 추세 전환.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSAR 점은 날마다 위치가 조금씩 바뀌며, 상승 추세에서는 계속 올라가고(주가를 따라가며 손실 보호), 하락 추세에서는 계속 내려간다.\u003c/p\u003e\n\u003ch3\u003e5-2. 가속인수 (Acceleration Factor, AF)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e기본\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eAF:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.02\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e최대\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eAF:\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003eAF\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e증가:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e새로운\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e고점(상승\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e중)\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e또는\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e새로운\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e저점(하락\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e중)\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e갱신\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e시마다\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.02\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e씩\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e증가\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e추세가 강해질수록 새로운 고점/저점이 자주 갱신되고 AF가 커져, SAR 점이 주가에 더 빠르게 따라붙는다. 즉, 추세가 강할수록 더 촘촘하게 수익을 보호한다.\u003c/p\u003e\n\u003ch3\u003e5-3. 매수/매도 전환 신호\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSAR이 주가 위에서 아래로 넘어올 때\u003c/strong\u003e: 하락 추세 → 상승 추세 전환 신호. 매수 진입 또는 숏 포지션 청산.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSAR이 주가 아래에서 위로 올라갈 때\u003c/strong\u003e: 상승 추세 → 하락 추세 전환 신호. 롱 포지션 청산 또는 숏 진입.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e5-4. 횡보장에서의 함정\u003c/h3\u003e\n\u003cp\u003eParabolic SAR의 가장 큰 약점은 \u003cstrong\u003e횡보장에서 빈번하게 신호가 전환\u003c/strong\u003e된다는 것이다. 방향이 없는 시장에서 SAR은 계속 상승 신호 → 하락 신호 → 상승 신호를 반복하며, 진입하고 나면 바로 역전되어 손실이 누적되는 \"채찍질(Whipsaw)\"이 발생한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSAR 사용 시 체크리스트:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e이동평균선이나 일목균형표로 추세 방향을 먼저 확인\u003c/li\u003e\n\u003cli\u003e추세가 명확할 때만 SAR 신호를 따른다\u003c/li\u003e\n\u003cli\u003eADX가 25 이상일 때 SAR 신뢰도가 높아진다 (ADX는 추세 강도를 측정)\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e5-5. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e: 지표 추가 → 추세 → Parabolic SAR\u003c/li\u003e\n\u003cli\u003e기본값: 초기 AF 0.02, 최대 AF 0.20 (이 기본값이 가장 널리 쓰임)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 엔벨로프(Envelope)와 켈트너 채널(Keltner Channel)\u003c/h2\u003e\n\u003cp\u003e볼린저 밴드를 이미 안다면 이 두 지표를 빠르게 이해할 수 있다. 셋 다 이동평균을 중심선으로 두고 상하단 밴드를 설정하지만, 밴드 폭을 계산하는 방식이 다르다.\u003c/p\u003e\n\u003ch3\u003e6-1. 엔벨로프 (Envelope)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e중심선 = N일 이동평균\n상단 밴드 = 중심선 × (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e + k%)\n하단 밴드 = 중심선 × (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e - k%)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003ek는 고정 비율로, 주로 2~5%를 사용한다. 변동성과 관계없이 항상 일정한 폭을 유지한다는 것이 볼린저 밴드와의 핵심 차이다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e활용법:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가가 상단 밴드에 닿으면 단기 과매수, 하단 밴드에 닿으면 과매도.\u003c/li\u003e\n\u003cli\u003ek% 값을 너무 좁게 설정하면 신호가 너무 자주 발생하고, 너무 넓게 설정하면 드물게 발생한다.\u003c/li\u003e\n\u003cli\u003e보통 일봉에서는 2.5\u003cdel\u003e3%, 주봉에서는 5\u003c/del\u003e8%를 사용한다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e6-2. 켈트너 채널 (Keltner Channel)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e중심선 = N일 EMA (지수이동평균)\nATR = N일 ATR (Average True Range)\n\n상단 밴드 = EMA + (\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e × ATR)\n하단 밴드 = EMA - (\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e × ATR)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e기본 설정은 20일 EMA, 10일 ATR, 배수 2를 많이 쓴다. 볼린저 밴드가 표준편차를 사용하는 반면, 켈트너 채널은 실제 가격 범위인 ATR을 사용한다. 켈트너 채널은 볼린저 밴드보다 부드럽게 움직인다.\u003c/p\u003e\n\u003ch3\u003e6-3. 볼린저 밴드 + 켈트너 채널 조합: 스퀴즈(Squeeze)\u003c/h3\u003e\n\u003cp\u003e이 조합은 래리 코너스(Larry Connors)와 존 카터(John Carter)가 대중화한 \"볼린저 밴드 스퀴즈\" 전략의 핵심이다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e스퀴즈 발생\u003c/strong\u003e: 볼린저 밴드가 켈트너 채널 \u003cstrong\u003e안쪽으로\u003c/strong\u003e 들어온 상태. 변동성이 극도로 낮아진 것을 의미한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e스퀴즈 해소\u003c/strong\u003e: 볼린저 밴드가 켈트너 채널 \u003cstrong\u003e밖으로\u003c/strong\u003e 벗어나기 시작할 때. 큰 방향성 움직임이 시작될 가능성이 높다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e스퀴즈만으로는 방향을 알 수 없다. MACD나 모멘텀 오실레이터로 방향을 함께 확인해야 한다. 스퀴즈 후 상향 돌파 + MACD 상향 = 강한 매수 신호.\u003c/p\u003e\n\u003ch3\u003e6-4. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e엔벨로프\u003c/strong\u003e: 지표 추가 → 추세 → Envelope (비율 설정 중요)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e켈트너 채널\u003c/strong\u003e: 지표 추가 → 추세 → Keltner Channel\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e7. ATR (Average True Range)\u003c/h2\u003e\n\u003cp\u003eATR은 변동성을 측정하는 지표다. 중요한 것은 \u003cstrong\u003eATR은 방향을 알려주지 않는다\u003c/strong\u003e는 것이다. 얼마나 크게 움직이는지만 알려준다. 이 특성 때문에 ATR 자체로 매수/매도 신호를 내기보다는 포지션 사이즈 계산과 손절선 설정에 활용하는 경우가 훨씬 많다.\u003c/p\u003e\n\u003ch3\u003e7-1. True Range 계산\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003eTrue \u003cspan class=\"hljs-attr\"\u003eRange\u003c/span\u003e = MAX(\n  당일 고가 - 당일 저가,\n  |당일 고가 - 전일 종가|,\n  |당일 저가 - 전일 종가|\n)\n\n\u003cspan class=\"hljs-attr\"\u003eATR\u003c/span\u003e = \u003cspan class=\"hljs-literal\"\u003eTrue\u003c/span\u003e Range의 N일 평균 (보통 \u003cspan class=\"hljs-number\"\u003e14\u003c/span\u003e일)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e갭 상승/하락이 발생하면 True Range가 크게 잡힌다. 단순한 고-저가 차이만으로는 갭을 포착하지 못하기 때문에 이 방식을 쓴다.\u003c/p\u003e\n\u003ch3\u003e7-2. 포지션 사이즈 결정\u003c/h3\u003e\n\u003cp\u003e리스크 관리의 핵심은 \"이 거래에서 얼마를 잃을 수 있는가\"를 미리 정하는 것이다. ATR이 이를 객관적으로 도와준다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-diff\"\u003e예시:\n\u003cspan class=\"hljs-deletion\"\u003e- 계좌 자금: 1,000만 원\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- 거래당 최대 손실 허용: 1% = 10만 원\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- ATR(14): 500원\u003c/span\u003e\n\u003cspan class=\"hljs-deletion\"\u003e- ATR 배수: 2배 → 손절 범위 = 2 × 500원 = 1,000원\u003c/span\u003e\n\n매수 가능 주식 수 = 10만 원 / 1,000원 = 100주\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이 방식으로 포지션 사이즈를 결정하면, 변동성이 클 때는 자동으로 작게 진입하고, 변동성이 낮을 때는 크게 진입할 수 있다.\u003c/p\u003e\n\u003ch3\u003e7-3. ATR 기반 손절 설정\u003c/h3\u003e\n\u003cp\u003e트레일링 스탑(Trailing Stop) 방식으로도 활용한다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e롱 포지션: 손절선 = 현재가 - (ATR × 배수). 주가가 올라가면 손절선도 따라 올린다.\u003c/li\u003e\n\u003cli\u003e배수는 보통 1.5~3배 사이에서 결정 (변동성이 높은 종목은 배수를 높여야 잦은 청산을 피할 수 있다).\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e7-4. ATR 급등의 의미\u003c/h3\u003e\n\u003cp\u003eATR이 갑자기 급등하면 두 가지 중 하나:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e강한 추세의 시작\u003c/strong\u003e: 강한 매수세나 매도세가 진입하며 변동성 폭발.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e추세 전환\u003c/strong\u003e: 급격한 변동으로 기존 추세가 깨지는 신호.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eATR 급등 자체는 방향을 알려주지 않으므로, 캔들과 거래량을 함께 보고 판단해야 한다.\u003c/p\u003e\n\u003ch3\u003e7-5. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e: 지표 추가 → 변동성 → ATR\u003c/li\u003e\n\u003cli\u003e기본 설정: 14일 (와일더 방식 평균 사용)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 피벗 포인트 (Pivot Point)\u003c/h2\u003e\n\u003cp\u003e피벗 포인트는 전일(또는 전주/전월)의 고가, 저가, 종가를 이용해 당일의 지지선과 저항선을 계산하는 방법이다. 데이 트레이더들이 많이 활용한다. 주관적인 추세선이나 이동평균과 달리 \u003cstrong\u003e계산식이 고정되어 있어 같은 값을 많은 트레이더가 공유한다는 점\u003c/strong\u003e에서 실제 지지/저항 역할을 한다.\u003c/p\u003e\n\u003ch3\u003e8-1. 클래식 피벗 계산법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003ePP (Pivot Point) = (전일 고가 + 전일 저가 + 전일 종가) / 3\n\n저항선:\n\u003cspan class=\"hljs-attr\"\u003eR1\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e × PP - 전일 저가\n\u003cspan class=\"hljs-attr\"\u003eR2\u003c/span\u003e = PP + (전일 고가 - 전일 저가)\n\u003cspan class=\"hljs-attr\"\u003eR3\u003c/span\u003e = 전일 고가 + \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e × (PP - 전일 저가)\n\n지지선:\n\u003cspan class=\"hljs-attr\"\u003eS1\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e × PP - 전일 고가\n\u003cspan class=\"hljs-attr\"\u003eS2\u003c/span\u003e = PP - (전일 고가 - 전일 저가)\n\u003cspan class=\"hljs-attr\"\u003eS3\u003c/span\u003e = 전일 저가 - \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e × (전일 고가 - PP)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003ePP는 당일의 기준점이다. 주가가 PP 위에서 시작하면 강세, 아래에서 시작하면 약세로 본다.\u003c/p\u003e\n\u003ch3\u003e8-2. 피벗 포인트의 종류\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e종류\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e활용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e클래식\u003c/td\u003e\n\u003ctd\u003e가장 기본적인 계산, 가장 널리 쓰임\u003c/td\u003e\n\u003ctd\u003e데이 트레이딩 일반\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e피보나치 피벗\u003c/td\u003e\n\u003ctd\u003e피보나치 비율(38.2%, 61.8%)을 적용한 지지/저항\u003c/td\u003e\n\u003ctd\u003e정밀한 레벨 탐색\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e카마릴라 피벗\u003c/td\u003e\n\u003ctd\u003e좁은 범위에 8개 레벨 설정, 단기 역추세 매매용\u003c/td\u003e\n\u003ctd\u003e당일 범위 내 단기 매매\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e8-3. 데이 트레이딩에서의 피벗 활용\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003ePP를 기준으로 한 방향 판단:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장 시작 후 PP 위에서 거래되면: R1을 목표, S1을 손절로 롱 포지션 고려\u003c/li\u003e\n\u003cli\u003ePP 아래에서 거래되면: S1을 목표, R1을 손절로 숏 포지션 고려\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eR1, S1에서의 반전:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eR1에 닿은 후 반등이 약하면 매도. 돌파하면 R2를 목표로.\u003c/li\u003e\n\u003cli\u003eS1에 닿은 후 하락이 약하면 매수. 이탈하면 S2까지 하락 가능.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e주의사항:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e갭 상승/하락 시 PP의 역할이 달라질 수 있다.\u003c/li\u003e\n\u003cli\u003e피벗은 하나의 참고 레벨일 뿐, 다른 지표와 함께 사용하면 신뢰도가 올라간다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e8-4. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e: 지표 추가 → 기타 → Pivot Points\u003c/li\u003e\n\u003cli\u003e주간/월간 피벗도 설정 가능 (스윙 트레이딩에는 주봉 피벗이 더 유용)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e9. OBV (On-Balance Volume)\u003c/h2\u003e\n\u003cp\u003e조셉 그랜빌(Joseph Granville)이 1963년에 개발한 지표로, 거래량에 방향성을 부여해 누적한다. 단순 거래량은 \"오늘 얼마나 거래됐나\"만 알려주지만, OBV는 \"주가가 오를 때와 내릴 때의 거래량 차이를 누적\"한다.\u003c/p\u003e\n\u003ch3\u003e9-1. 계산법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e당일 종가 \u003e 전일 종가: \u003cspan class=\"hljs-attr\"\u003eOBV\u003c/span\u003e = 전일 OBV + 당일 거래량 (매수세 강함)\n당일 종가 \u0026#x3C; 전일 종가: \u003cspan class=\"hljs-attr\"\u003eOBV\u003c/span\u003e = 전일 OBV - 당일 거래량 (매도세 강함)\n당일 종가 = 전일 종가: \u003cspan class=\"hljs-attr\"\u003eOBV\u003c/span\u003e = 전일 OBV (변화 없음)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eOBV의 절대값보다는 방향과 추세가 중요하다.\u003c/p\u003e\n\u003ch3\u003e9-2. OBV 다이버전스: 세력 포착\u003c/h3\u003e\n\u003cp\u003eOBV를 사용하는 가장 중요한 이유는 세력의 매집/분산을 포착하는 것이다:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e강세 다이버전스 (매집 신호):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가는 신저점을 찍는데 OBV는 이전 저점보다 높다.\u003c/li\u003e\n\u003cli\u003e해석: 주가가 하락하는 동안 거래량이 적다 = 팔 사람이 없다 = 세력이 조용히 매집 중.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e약세 다이버전스 (분산 신호):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e주가는 신고점을 찍는데 OBV는 이전 고점보다 낮다.\u003c/li\u003e\n\u003cli\u003e해석: 주가가 상승하는데 거래량이 줄어든다 = 세력이 물량을 분산 중.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e9-3. OBV 추세 분석\u003c/h3\u003e\n\u003cp\u003eOBV 자체에 이동평균선을 그려 추세를 분석할 수 있다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOBV의 20일 이동평균선을 상향 돌파: 매수세 증가.\u003c/li\u003e\n\u003cli\u003eOBV의 20일 이동평균선을 하향 돌파: 매도세 증가.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e이 방법은 주가 차트의 이동평균선 분석과 동일한 원리를 거래량에 적용하는 것이다.\u003c/p\u003e\n\u003ch3\u003e9-4. 실전 활용법\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e주가가 횡보하는 동안 OBV가 꾸준히 상승 → 상향 돌파 전 매집 중. 미리 포지션 구축.\u003c/li\u003e\n\u003cli\u003e주가가 상승하는데 OBV가 하락 또는 정체 → 상승의 동력 부족. 리스크 관리 강화.\u003c/li\u003e\n\u003cli\u003e거래량이 적은 종목에서는 OBV 신뢰도가 낮다. 하루 거래대금 30억 이상 종목에서 활용 권장.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e10. VWAP (Volume Weighted Average Price, 거래량 가중 평균 가격)\u003c/h2\u003e\n\u003cp\u003eVWAP은 데이 트레이더와 기관투자자 모두에게 중요한 기준선이다. 기관투자자들은 체결 평균가가 VWAP보다 낮으면 \"좋은 매수\"를 했다고 평가하는 경우가 많아, 시장에서 실제로 VWAP이 지지/저항 역할을 한다.\u003c/p\u003e\n\u003ch3\u003e10-1. 계산법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e각 거래의 전형가격 = (고가 + 저가 + 종가) / \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e\n누적 (전형가격 × 거래량) / 누적 거래량\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eVWAP은 하루가 시작되면서 계속 업데이트되며, 장이 끝나면 하루의 평균 체결가격을 나타낸다.\u003c/p\u003e\n\u003ch3\u003e10-2. 데이 트레이딩에서의 역할\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e주가가 VWAP 위\u003c/strong\u003e: 당일 평균 매수자들이 수익 중 = 강세. VWAP을 지지선으로 사용.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주가가 VWAP 아래\u003c/strong\u003e: 당일 평균 매수자들이 손실 중 = 약세. VWAP을 저항선으로 사용.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e장 초반 VWAP 돌파 전략:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e장 시작 30분 후 주가가 VWAP 위로 올라서며 거래량 증가: 당일 상승 가능성 높음.\u003c/li\u003e\n\u003cli\u003e반대로 VWAP 아래로 내려가며 거래량 증가: 당일 약세 가능성 높음.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e10-3. VWAP 밴드 (표준편차 밴드)\u003c/h3\u003e\n\u003cp\u003eVWAP에 표준편차 밴드를 추가하면 볼린저 밴드와 유사하게 사용할 수 있다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eVWAP ± 1 표준편차: 일반적인 가격 범위\u003c/li\u003e\n\u003cli\u003eVWAP ± 2 표준편차: 이 범위를 벗어나면 단기 과매수/과매도\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e10-4. 앵커 VWAP (Anchored VWAP)\u003c/h3\u003e\n\u003cp\u003e특정 중요한 날짜(실적 발표일, 저점 돌파일, 주요 이벤트일)를 기준점(앵커)으로 설정하고 그 이후의 VWAP을 계산하는 방법이다. 표준 VWAP이 하루 단위라면, 앵커 VWAP은 수주~수개월에 걸친 기준선을 만들 수 있다.\u003c/p\u003e\n\u003cp\u003e실전 활용: 신고가 돌파 이후 조정 시 \"저 돌파 지점부터의 VWAP\"이 지지선으로 작용하는지 확인.\u003c/p\u003e\n\u003ch3\u003e10-5. HTS 설정\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e키움 영웅문\u003c/strong\u003e: 지표 추가 → 거래량 → VWAP (5분봉, 10분봉 등 분봉 차트에서 사용)\u003c/li\u003e\n\u003cli\u003eVWAP은 분봉 차트에서 주로 사용하며, 일봉 차트에서는 의미가 없다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e11. 추세선(Trend Line) 그리는 법\u003c/h2\u003e\n\u003cp\u003e지표보다 더 기본적이지만 많은 초보자가 잘못 그리는 것이 추세선이다. 올바르게 그린 추세선은 자동으로 계산되는 이동평균보다 더 정확한 지지/저항을 보여주는 경우가 많다.\u003c/p\u003e\n\u003ch3\u003e11-1. 기본 원칙\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e상승 추세선 (Support Line):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e연속된 두 개의 저점을 연결한다.\u003c/li\u003e\n\u003cli\u003e두 번째 저점이 첫 번째 저점보다 높아야 한다.\u003c/li\u003e\n\u003cli\u003e선을 우측으로 연장하면 향후 지지 레벨을 예측할 수 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e하락 추세선 (Resistance Line):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e연속된 두 개의 고점을 연결한다.\u003c/li\u003e\n\u003cli\u003e두 번째 고점이 첫 번째 고점보다 낮아야 한다.\u003c/li\u003e\n\u003cli\u003e선을 우측으로 연장하면 향후 저항 레벨을 예측할 수 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e11-2. 유효한 추세선의 조건\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e3번 이상 접촉\u003c/strong\u003e: 2번은 단순히 선을 그은 것이고, 3번 이상 같은 선에 닿아야 유효한 추세선으로 인정된다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e기간\u003c/strong\u003e: 짧은 기간(수일)의 추세선보다 긴 기간(수주~수개월)의 추세선이 더 신뢰도가 높다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e기울기\u003c/strong\u003e: 너무 가파른 추세선(45도 이상)은 오래 유지되기 어렵다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e종가 기준\u003c/strong\u003e: 꼬리(그림자) 끝보다 종가 기준으로 그리는 것이 더 신뢰도가 높다 (유파에 따라 다름).\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003e11-3. 추세선 돌파 확인 방법\u003c/h3\u003e\n\u003cp\u003e추세선을 한 번 이탈했다고 바로 추세 전환이라고 보기 어렵다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e종가 기준 이탈\u003c/strong\u003e: 종가가 추세선을 넘어야 유효한 이탈.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2% 이상 이탈\u003c/strong\u003e: 명확하게 벗어나야 신뢰 가능.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e거래량 동반\u003c/strong\u003e: 거래량이 증가하며 이탈해야 강한 신호.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e재테스트(Retest)\u003c/strong\u003e: 이탈 후 추세선을 다시 테스트하고 방향을 확인하면 더 확실하다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e11-4. 채널 형성과 목표가\u003c/h3\u003e\n\u003cp\u003e상승 추세선과 평행하게 고점을 연결하면 \u003cstrong\u003e상승 채널\u003c/strong\u003e이 만들어진다. 채널의 폭이 목표가 계산에 활용된다:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e채널 하단에서 매수 후, 채널 상단이 1차 목표가.\u003c/li\u003e\n\u003cli\u003e채널 하단을 이탈하면 채널 폭만큼 추가 하락 가능성.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e11-5. 쐐기형(Wedge)과 삼각수렴(Triangle) 패턴\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e오르는 쐐기형 (Rising Wedge):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e상승 추세에서 고점과 저점이 모두 올라가지만, 수렴하는 형태.\u003c/li\u003e\n\u003cli\u003e역설적으로 하락 전환 신호가 많다. 추세의 힘이 약해지고 있음을 의미.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e내리는 쐐기형 (Falling Wedge):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e하락 추세에서 고점과 저점이 모두 내려가지만 수렴.\u003c/li\u003e\n\u003cli\u003e역설적으로 상승 전환 신호. 하락 압력이 점점 약해짐.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e대칭 삼각형 (Symmetrical Triangle):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e고점은 내려오고, 저점은 올라오며 수렴.\u003c/li\u003e\n\u003cli\u003e방향을 알 수 없는 패턴. 거래량이 줄어들다가 한 방향으로 터진다.\u003c/li\u003e\n\u003cli\u003e돌파 방향으로 매매 진입 + 돌파 확인 필수.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e상승 삼각형 (Ascending Triangle):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e수평 저항선 + 올라오는 지지선. 상향 돌파 가능성이 높다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e하락 삼각형 (Descending Triangle):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e수평 지지선 + 내려오는 저항선. 하향 이탈 가능성이 높다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e12. 지표 조합 전략 (실전 시스템)\u003c/h2\u003e\n\u003cp\u003e지표가 많다고 좋은 것이 아니다. 오히려 지표를 너무 많이 쓰면 서로 상충되는 신호가 발생해 판단을 방해한다. 실전 트레이더가 지표를 선택하는 원칙과 검증된 조합을 소개한다.\u003c/p\u003e\n\u003ch3\u003e12-1. 지표 선택의 원칙: 다른 종류를 쓸 것\u003c/h3\u003e\n\u003cp\u003e같은 종류의 지표를 여러 개 쓰는 것은 의미가 없다. RSI와 CCI를 동시에 쓰는 것은 비슷한 정보를 두 번 보는 것에 불과하다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e지표를 세 가지 카테고리로 분류하고 각 카테고리에서 하나씩 고른다:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e카테고리\u003c/th\u003e\n\u003cth\u003e역할\u003c/th\u003e\n\u003cth\u003e예시 지표\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e추세 지표\u003c/td\u003e\n\u003ctd\u003e현재 추세의 방향과 강도\u003c/td\u003e\n\u003ctd\u003e이동평균, 일목균형표, MACD, Parabolic SAR\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e모멘텀 지표\u003c/td\u003e\n\u003ctd\u003e추세의 속도와 과열 여부\u003c/td\u003e\n\u003ctd\u003eRSI, 스토캐스틱, CCI\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e변동성 지표\u003c/td\u003e\n\u003ctd\u003e가격 범위와 변동성 크기\u003c/td\u003e\n\u003ctd\u003e볼린저 밴드, 켈트너 채널, ATR\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e12-2. 추천 조합 1: 일목균형표 + MACD + 거래량 (추세 추종)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e전략 개요:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e일목균형표로 추세 방향을 확인한다 (구름 위/아래, 삼역호전 여부).\u003c/li\u003e\n\u003cli\u003eMACD로 단기 모멘텀 전환을 포착한다 (MACD선이 시그널선 상향 돌파).\u003c/li\u003e\n\u003cli\u003e거래량(또는 OBV)으로 신호를 검증한다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e매수 조건 예시:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e주가가 구름 위에 있다 (일목균형표)\u003c/li\u003e\n\u003cli\u003eMACD선이 시그널선을 상향 돌파했다\u003c/li\u003e\n\u003cli\u003e거래량이 20일 평균보다 높다\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e매도/손절 조건:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e전환선이 기준선 아래로 내려오거나, MACD 데드크로스 발생 시 부분 매도.\u003c/li\u003e\n\u003cli\u003e구름 아래로 주가가 내려오면 전량 매도.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e이 조합이 잘 작동하는 시장:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e명확한 중장기 상승 추세가 있는 종목\u003c/li\u003e\n\u003cli\u003e박스권 돌파 후 추세가 형성될 때\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e12-3. 추천 조합 2: 스토캐스틱 + 피보나치 + 볼린저 밴드 (역추세/눌림 매매)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e전략 개요:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e피보나치로 지지 레벨을 미리 파악한다 (38.2%~61.8% 되돌림 구간).\u003c/li\u003e\n\u003cli\u003e볼린저 밴드로 과매도 구간을 시각적으로 확인한다 (하단 밴드 근접).\u003c/li\u003e\n\u003cli\u003e스토캐스틱으로 반등 타이밍을 잡는다 (과매도 구간에서 %K가 %D 상향 돌파).\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e매수 조건 예시:\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e상승 추세 후 조정이 피보나치 38.2%~61.8% 구간에 진입\u003c/li\u003e\n\u003cli\u003e볼린저 밴드 하단 근처에서 주가가 머무는 중\u003c/li\u003e\n\u003cli\u003e슬로우 스토캐스틱이 20 이하에서 %K \u003e %D 상향 돌파\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e손절 설정:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e피보나치 61.8% 아래로 종가가 내려오면 손절 (추세 전환 가능성)\u003c/li\u003e\n\u003cli\u003eATR × 1.5를 추가로 손절 범위로 활용\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e이 조합이 잘 작동하는 시장:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e강한 상승 추세 중의 단기 조정 구간\u003c/li\u003e\n\u003cli\u003e종목보다 지수(코스피, 나스닥)에서 더 신뢰도가 높다\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e12-4. 지표 과적재(Over-fitting) 경고\u003c/h3\u003e\n\u003cp\u003e지표를 10개 이상 사용하는 트레이더의 성과가 3개를 사용하는 트레이더보다 좋다는 통계적 증거는 없다. 오히려 지표가 많아질수록:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e분석 마비(Analysis Paralysis)\u003c/strong\u003e: 신호가 서로 충돌하면 진입하지 못한다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e과최적화 오류\u003c/strong\u003e: 과거 데이터에 모든 지표가 맞도록 설정하면, 미래에는 작동하지 않는다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e확증 편향\u003c/strong\u003e: 미리 정한 방향에 맞는 지표 신호만 보게 된다.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e실용적인 원칙\u003c/strong\u003e: 지표는 3~5개로 제한하고, 나머지 판단은 가격 행동(Price Action)과 거래량으로 한다.\u003c/p\u003e\n\u003ch3\u003e12-5. 시스템 트레이딩 vs 재량 트레이딩\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e장점\u003c/th\u003e\n\u003cth\u003e단점\u003c/th\u003e\n\u003cth\u003e적합한 지표\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e시스템 트레이딩\u003c/td\u003e\n\u003ctd\u003e감정 배제, 일관된 규칙\u003c/td\u003e\n\u003ctd\u003e시장 변화에 유연성 부족\u003c/td\u003e\n\u003ctd\u003e이동평균, MACD, Parabolic SAR (수식화 쉬움)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e재량 트레이딩\u003c/td\u003e\n\u003ctd\u003e상황에 따른 유연한 대응\u003c/td\u003e\n\u003ctd\u003e심리적 편향 개입 위험\u003c/td\u003e\n\u003ctd\u003e일목균형표, 피보나치, 추세선 (경험과 판단 필요)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e두 방식을 결합하는 것이 현실적이다: \u003cstrong\u003e시스템으로 방향을 정하고, 재량으로 타이밍을 조율한다.\u003c/strong\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리: 지표보다 중요한 것\u003c/h2\u003e\n\u003cp\u003e15년간 트레이딩을 하면서 가장 확실하게 깨달은 것은, 지표 자체보다 \u003cstrong\u003e지표를 어떻게 해석하느냐가 더 중요하다\u003c/strong\u003e는 것이다. 같은 지표를 쓰더라도 어떤 맥락(추세장인지 횡보장인지, 어떤 섹터인지, 시장 전체 분위기는 어떤지)에서 보느냐에 따라 결론이 달라진다.\u003c/p\u003e\n\u003cp\u003e지표는 도구다. 망치를 가지고 있다고 모든 것이 못처럼 보여서는 안 된다. 먼저 \u003cstrong\u003e가격이 어디서 왔고 어디로 가고 있는지\u003c/strong\u003e를 파악하고, 그 다음에 지표를 통해 신호를 검증하는 순서를 지키는 것이 지표 공부의 올바른 방향이다.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e작성일: 2026-03-14 | 카테고리: stock\u003c/em\u003e\u003c/p\u003e"])</script><script>
