e이익 대비 주가가 저렴\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e높을수록\u003c/td\u003e\n\u003ctd\u003e성장 기대감이 반영된 상태\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e활용법\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e동종 업종 평균 PER\u003c/strong\u003e과 비교. 업종 평균이 15배인데 해당 기업이 8배라면 상대적 저평가.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e과거 자사 PER 밴드\u003c/strong\u003e와 비교. 역사적 최저 PER 구간 진입 시 주목.\u003c/li\u003e\n\u003cli\u003e적자 기업에는 사용 불가.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003ePER만으로 판단하면 위험. '이익이 일회성인지', '이익 감소 추세인지' 반드시 확인.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. PBR (주가순자산비율)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePBR\u003c/span\u003e = 주가 / BPS(주당순자산)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e기업 청산 시 돌려받을 수 있는 순자산 대비 주가 수준.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003ePBR\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1 미만\u003c/td\u003e\n\u003ctd\u003e청산가치 이하 (극단적 저평가 가능성)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1~2\u003c/td\u003e\n\u003ctd\u003e적정 수준\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2 이상\u003c/td\u003e\n\u003ctd\u003e브랜드·기술력 등 무형자산 반영\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e주의사항\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e제조업·금융업에 적합. IT·바이오처럼 무형자산 비중이 높은 업종에는 부적합.\u003c/li\u003e\n\u003cli\u003e부채가 많은 기업은 PBR 1 미만이어도 위험할 수 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3. EV/EBITDA\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eEV\u003c/span\u003e = 시가총액 + 순부채(총부채 - 현금)\n\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = 영업이익 + 감가상각비\nEV/\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = EV / EBITDA\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e부채까지 포함한 기업 전체 가치를 영업 현금흐름으로 나눈 값. M\u0026#x26;A 시 많이 쓰임.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e낮을수록\u003c/strong\u003e 저평가 (통상 10배 이하면 저평가 구간)\u003c/li\u003e\n\u003cli\u003ePER과 달리 감가상각비·세금·이자 영향을 배제해 업종 간 비교에 유리\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e4. PSR (주가매출비율)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePSR\u003c/span\u003e = 시가총액 / 연간 매출액\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e아직 적자인 성장주 평가에 사용. 매출은 있지만 이익이 없을 때 유용.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e1 미만이면 저평가로 볼 수 있으나 업종별 편차가 크다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. PEG (성장조정 PER)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePEG\u003c/span\u003e = PER / 이익성장률(%)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e성장률을 감안한 PER. 고성장 기업의 고PER이 합리적인지 판단.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003ePEG\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1 미만\u003c/td\u003e\n\u003ctd\u003e성장 대비 저평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e성장과 가격이 균형\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1 초과\u003c/td\u003e\n\u003ctd\u003e성장 대비 고평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e저평가 체크리스트\u003c/h2\u003e\n\u003cp\u003e단순히 숫자가 낮다고 저평가가 아니다. 다음을 함께 확인해야 한다.\u003c/p\u003e\n\u003ch3\u003e재무 건전성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 부채비율 100% 이하 (업종 평균 이하)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 유동비율 100% 이상 (단기 상환 능력)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익률이 최근 3년간 유지 또는 개선\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e이익 품질\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익과 순이익의 방향 일치 (일회성 이익 제외)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업현금흐름 \u003e 순이익 (이익의 현금화 확인)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e ROE(자기자본이익률) 10% 이상 지속\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e저평가 이유 파악\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 일시적 이슈인가? (실적 쇼크, 업황 부진, 시장 공포)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 구조적 문제인가? (사업 경쟁력 약화, 업종 자체 쇠퇴)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e저평가 이유가 일시적이면 매수 기회. 구조적이면 가치 함정(Value Trap).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 스크리닝 예시\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e조건\u003c/th\u003e\n\u003cth\u003e값\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ePER\u003c/td\u003e\n\u003ctd\u003e동종 업종 하위 30%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePBR\u003c/td\u003e\n\u003ctd\u003e1.5 이하\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부채비율\u003c/td\u003e\n\u003ctd\u003e100% 이하\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eROE\u003c/td\u003e\n\u003ctd\u003e10% 이상\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영업이익 증가율\u003c/td\u003e\n\u003ctd\u003e최근 2년 연속 플러스\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e위 조건을 모두 만족하는 종목을 1차 스크리닝 후, 사업 내용과 경쟁 우위를 직접 분석하는 것이 2차 단계.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e결론\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"가격은 당신이 지불하는 것이고, 가치는 당신이 얻는 것이다.\" — 워런 버핏\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e저평가 투자의 핵심은 \u003cstrong\u003e숫자 + 사업 이해\u003c/strong\u003e다. 지표가 낮아 보여도 왜 낮은지 이유를 모르면 투자하지 않는 것이 낫다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$L10\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L11\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"기업 저평가 판단하는 법\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$12\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"13:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\na:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"기업 저평가 판단하는 법 | midasworld
