03ctr\u003e\n\u003ctd\u003e상대 가치 평가\u003c/td\u003e\n\u003ctd\u003e비슷한 기업과 비교\u003c/td\u003e\n\u003ctd\u003ePER, PBR, EV/EBITDA, PSR, PEG\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e절대 가치 평가\u003c/td\u003e\n\u003ctd\u003e기업 자체의 현금흐름 분석\u003c/td\u003e\n\u003ctd\u003eDCF(할인현금흐름), DDM\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e1. PER (주가수익비율)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePER\u003c/span\u003e = 주가 / EPS(주당순이익)\n    = 시가총액 / 당기순이익\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e현재 주가가 연간 순이익의 몇 배인지를 나타낸다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003ePER\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e낮을수록\u003c/td\u003e\n\u003ctd\u003e이익 대비 주가가 저렴\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e높을수록\u003c/td\u003e\n\u003ctd\u003e성장 기대감이 반영된 상태\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e활용법\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e동종 업종 평균 PER\u003c/strong\u003e과 비교. 업종 평균이 15배인데 해당 기업이 8배라면 상대적 저평가.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e과거 자사 PER 밴드\u003c/strong\u003e와 비교. 역사적 최저 PER 구간 진입 시 주목.\u003c/li\u003e\n\u003cli\u003e적자 기업에는 사용 불가.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e코스피 업종별 적정 PER 기준 (참고치)\u003c/h3\u003e\n\u003cp\u003e업종 평균 PER은 경기 상황에 따라 변하지만, 장기적 참고 기준으로 활용할 수 있다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e업종\u003c/th\u003e\n\u003cth\u003e참고 PER 범위\u003c/th\u003e\n\u003cth\u003e특이사항\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체\u003c/td\u003e\n\u003ctd\u003e10~20배\u003c/td\u003e\n\u003ctd\u003e실적 사이클 강해 고점에서 PER 낮아 보이는 함정 주의\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e자동차\u003c/td\u003e\n\u003ctd\u003e5~10배\u003c/td\u003e\n\u003ctd\u003e전통적 저PER 업종. 전기차 전환기 프리미엄 반영 여부 주목\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융·은행\u003c/td\u003e\n\u003ctd\u003e4~8배\u003c/td\u003e\n\u003ctd\u003e저PER이 정상. 금리 환경에 민감\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소비재·유통\u003c/td\u003e\n\u003ctd\u003e10~20배\u003c/td\u003e\n\u003ctd\u003e안정적 이익 구조\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e바이오·헬스케어\u003c/td\u003e\n\u003ctd\u003e30~100배 이상\u003c/td\u003e\n\u003ctd\u003e이익보다 파이프라인 가치가 지배\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e건설\u003c/td\u003e\n\u003ctd\u003e4~8배\u003c/td\u003e\n\u003ctd\u003e수주잔고와 부채 수준 함께 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eIT서비스·플랫폼\u003c/td\u003e\n\u003ctd\u003e20~50배\u003c/td\u003e\n\u003ctd\u003e성장성 프리미엄\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e이 수치는 절대적 기준이 아니다. 금리, 경기 사이클, 기업 성장 단계에 따라 크게 달라진다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003ePER 함정: 초보자가 자주 빠지는 오해\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e일회성 이익으로 PER이 낮아 보이는 경우\u003c/strong\u003e: 부동산 매각, 자회사 지분 처분, 보험금 수령 등으로 당해 연도 순이익이 비정상적으로 높으면 PER이 실제보다 낮아 보인다. 반드시 \u003cstrong\u003e영업이익 기준 PER\u003c/strong\u003e도 같이 확인할 것.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e이익 감소 추세\u003c/strong\u003e: PER이 8배라도 내년 이익이 반토막이 되면 내년 PER은 16배가 된다. 이익 방향이 중요하다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e경기민감주의 바닥 착시\u003c/strong\u003e: 철강, 조선, 화학 같은 경기민감주는 업황 고점에서 이익이 최대이고 PER이 가장 낮게 보인다. 이때 \"싸다\"고 매수하면 이익이 꺾이는 시점에 물린다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003ePER만으로 판단하면 위험. '이익이 일회성인지', '이익 감소 추세인지' 반드시 확인.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. PBR (주가순자산비율)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003ePBR = 주가 / \u003cspan class=\"hljs-built_in\"\u003eBPS\u003c/span\u003e(주당순자산)\n    = 시가총액 / 자기자본(순자산)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e기업 청산 시 돌려받을 수 있는 순자산 대비 주가 수준.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003ePBR\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1 미만\u003c/td\u003e\n\u003ctd\u003e청산가치 이하 (극단적 저평가 가능성)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1~2\u003c/td\u003e\n\u003ctd\u003e적정 수준\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2 이상\u003c/td\u003e\n\u003ctd\u003e브랜드·기술력 등 무형자산 반영\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e코리아 디스카운트\u003c/h3\u003e\n\u003cp\u003e한국 주식 시장은 구조적으로 글로벌 동종업계 대비 PBR이 낮다. 코스피 평균 PBR은 오랫동안 0.8\u003cdel\u003e1.2배 수준에 머물렀는데, 이는 같은 업종의 미국·일본 기업 대비 20\u003c/del\u003e50% 할인된 수치다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e코리아 디스카운트의 주요 원인\u003c/strong\u003e:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e낮은 주주환원율\u003c/strong\u003e: 배당성향이 선진국 대비 낮고, 자사주 매입 후 소각보다 보유가 일반적이었다. 최근 2024년 기업밸류업 프로그램 도입 이후 개선 중.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e복잡한 지배구조\u003c/strong\u003e: 순환출자, 오너 일가 지배 구조에서 소수주주 권리 침해 우려.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e지정학적 리스크\u003c/strong\u003e: 북한 리스크, 미·중 갈등의 중간에 위치한 지리적 특성.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e회계 투명성 우려\u003c/strong\u003e: 대기업 집단의 내부거래, 분식회계 사건들이 신뢰도를 낮춤.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e외국인 투자 제약\u003c/strong\u003e: 과거 외환 위기 트라우마, 환율 리스크.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e코리아 디스카운트 해소 기대주 발굴법\u003c/strong\u003e: PBR 1배 미만이면서 ROE가 꾸준히 10% 이상인 기업 중, 배당·자사주 소각 정책을 강화하고 있는 기업은 코리아 디스카운트 해소 수혜 후보다.\u003c/p\u003e\n\u003ch3\u003e주의사항\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e제조업·금융업에 적합. IT·바이오처럼 무형자산 비중이 높은 업종에는 부적합.\u003c/li\u003e\n\u003cli\u003e부채가 많은 기업은 PBR 1 미만이어도 위험할 수 있다.\u003c/li\u003e\n\u003cli\u003e자산 재평가를 통해 순자산을 인위적으로 높인 경우, BPS가 실질 가치를 과장할 수 있다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3. EV/EBITDA\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003eEV\u003c/span\u003e = 시가총액 + 순부채(총부채 - 현금 및 현금성 자산)\n\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = 영업이익 + 감가상각비(D\u0026#x26;A)\nEV/\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = EV / EBITDA\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e부채까지 포함한 기업 전체 가치를 영업 현금흐름으로 나눈 값. M\u0026#x26;A 시 많이 쓰임.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e낮을수록\u003c/strong\u003e 저평가 (통상 10배 이하면 저평가 구간으로 보나 업종별 편차 큼)\u003c/li\u003e\n\u003cli\u003ePER과 달리 감가상각비·세금·이자 영향을 배제해 업종 간 비교에 유리\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eEV/EBITDA 업종별 참고치\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e업종\u003c/th\u003e\n\u003cth\u003e참고 EV/EBITDA\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체·장비\u003c/td\u003e\n\u003ctd\u003e8~15배\u003c/td\u003e\n\u003ctd\u003e설비 투자 큰 업종\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e통신\u003c/td\u003e\n\u003ctd\u003e5~8배\u003c/td\u003e\n\u003ctd\u003e안정적 현금흐름\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e에너지·정유\u003c/td\u003e\n\u003ctd\u003e4~8배\u003c/td\u003e\n\u003ctd\u003e원유 가격에 연동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소매·유통\u003c/td\u003e\n\u003ctd\u003e6~12배\u003c/td\u003e\n\u003ctd\u003e—\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e미디어·엔터\u003c/td\u003e\n\u003ctd\u003e10~20배\u003c/td\u003e\n\u003ctd\u003e콘텐츠 자산 가치\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e주의사항\u003c/h3\u003e\n\u003cp\u003e감가상각비가 많은 장치산업(철강, 조선, 반도체 팹)은 EBITDA가 실제 현금창출능력을 과대평가할 수 있다. Capex(설비 투자)를 차감한 \u003cstrong\u003eEV/EBIT\u003c/strong\u003e 또는 **EV/(EBITDA - Capex)**도 함께 확인하는 것이 좋다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. PSR (주가매출비율)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePSR\u003c/span\u003e = 시가총액 / 연간 매출액\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e아직 적자인 성장주 평가에 사용. 매출은 있지만 이익이 없을 때 유용.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e1 미만이면 저평가로 볼 수 있으나 업종별 편차가 크다.\u003c/li\u003e\n\u003cli\u003e적자 바이오·SaaS·플랫폼 기업 분석에 많이 사용.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e단점\u003c/strong\u003e: 매출이 높아도 마진이 없으면 기업 가치가 없다. PSR 단독 사용은 위험하며, 매출총이익률(Gross Margin) 추이를 함께 봐야 한다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e5. PEG (성장조정 PER)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePEG\u003c/span\u003e = PER / 이익성장률(%)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e성장률을 감안한 PER. 고성장 기업의 고PER이 합리적인지 판단.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003ePEG\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1 미만\u003c/td\u003e\n\u003ctd\u003e성장 대비 저평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e성장과 가격이 균형\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1 초과\u003c/td\u003e\n\u003ctd\u003e성장 대비 고평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e예시\u003c/strong\u003e: PER 30배, 이익성장률 30% → PEG = 1.0 (균형). PER 30배, 이익성장률 50% → PEG = 0.6 (성장 대비 저평가).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e주의\u003c/strong\u003e: 이익성장률 추정치는 애널리스트 컨센서스를 쓰는 경우가 많은데, 성장주의 컨센서스는 낙관적으로 편향되는 경향이 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e6. DCF (할인현금흐름) — 절대 가치 평가\u003c/h2\u003e\n\u003cp\u003e상대 지표들이 \"다른 기업과 비교\"하는 방법이라면, DCF는 기업 자체의 미래 현금흐름을 현재 가치로 환산하는 \u003cstrong\u003e절대 가치 평가\u003c/strong\u003e법이다.\u003c/p\u003e\n\u003ch3\u003e기본 구조\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e기업가치 = Σ \u003cspan class=\"hljs-section\"\u003e[ FCFt / (1 + WACC)^t ]\u003c/span\u003e + 터미널 가치\n\n\u003cspan class=\"hljs-attr\"\u003eFCF\u003c/span\u003e  = 잉여현금흐름 (영업현금흐름 - Capex)\n\u003cspan class=\"hljs-attr\"\u003eWACC\u003c/span\u003e = 가중평균자본비용 (요구수익률)\n\u003cspan class=\"hljs-attr\"\u003et\u003c/span\u003e    = 연도\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e단계별 계산 개요\u003c/strong\u003e:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eFCF 예측\u003c/strong\u003e: 향후 5~10년간 잉여현금흐름 추정\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e할인율(WACC) 산정\u003c/strong\u003e: 보통 7~12% 사용. 금리가 높을수록 WACC가 올라가 기업가치가 내려간다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e터미널 가치\u003c/strong\u003e: 예측 기간 이후 영구 성장을 가정한 잔존 가치. 전체 기업가치의 60~80%를 차지하는 경우가 많다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e순부채 차감\u003c/strong\u003e: EV에서 순부채를 빼면 주주 가치(Equity Value)가 된다.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e주당 내재가치\u003c/strong\u003e: 주주 가치를 발행주식수로 나눔.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eDCF의 핵심 민감도\u003c/h3\u003e\n\u003cp\u003eDCF는 가정에 따라 결과가 크게 달라지는 \"쓰레기가 들어가면 쓰레기가 나온다(GIGO)\"의 전형적 사례다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e가정 변수\u003c/th\u003e\n\u003cth\u003e내재가치에 미치는 영향\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eWACC 1%p 상승\u003c/td\u003e\n\u003ctd\u003e기업가치 10~20% 하락\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e성장률 1%p 상승\u003c/td\u003e\n\u003ctd\u003e기업가치 5~15% 상승\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e터미널 성장률 변화\u003c/td\u003e\n\u003ctd\u003e가장 민감한 변수\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e실전 DCF 활용법\u003c/strong\u003e: DCF를 정밀 계산기로 쓰기보다 \"이 가정이 현실적인가?\"를 검증하는 도구로 사용한다. \"현재 주가가 맞으려면 앞으로 10년간 매년 20% 성장해야 한다\"는 식의 역산(Reverse DCF)이 특히 유용하다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eDCF 단독으로는 매우 부정확하다. 여러 시나리오(강세/기본/약세)로 범위를 구한 후, 상대 지표(PER, EV/EBITDA)와 비교해 크로스체크하는 것이 전문가의 방식이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e7. SOTP (Sum of Parts, 부분합 가치평가)\u003c/h2\u003e\n\u003cp\u003e복수의 사업부를 가진 지주회사·대기업에 적합한 방법. 각 사업부를 독립적으로 평가한 후 합산한다.\u003c/p\u003e\n\u003ch3\u003e개념\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e기업 전체 가치 = 사업부 \u003cspan class=\"hljs-selector-tag\"\u003eA\u003c/span\u003e 가치 + 사업부 \u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e 가치 + 사업부 C 가치 + 보유 지분 가치\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e예시: 가상의 지주회사 K홀딩스\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구성 요소\u003c/th\u003e\n\u003cth\u003e평가 방법\u003c/th\u003e\n\u003cth\u003e추정 가치\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체 자회사 지분 60%\u003c/td\u003e\n\u003ctd\u003eEV/EBITDA 12배 적용\u003c/td\u003e\n\u003ctd\u003e1조 2,000억원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유통 자회사 지분 100%\u003c/td\u003e\n\u003ctd\u003ePER 10배 적용\u003c/td\u003e\n\u003ctd\u003e3,000억원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e보유 상장주식\u003c/td\u003e\n\u003ctd\u003e시가 반영\u003c/td\u003e\n\u003ctd\u003e1,000억원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e순현금\u003c/td\u003e\n\u003ctd\u003e장부가\u003c/td\u003e\n\u003ctd\u003e500억원\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e합계\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e1조 6,500억원\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e현재 시가총액\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e1조 2,000억원\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e지주회사 할인율\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e약 27%\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e한국 지주회사는 구조적으로 10~30%의 지주회사 할인이 적용되는 경향이 있다. 이 할인이 역사적 평균 이상으로 벌어지면 저평가 기회, 축소되면 고평가 구간으로 볼 수 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e가치 함정(Value Trap)의 유형\u003c/h2\u003e\n\u003cp\u003e\"싸 보이지만 계속 싸거나 더 싸지는\" 종목. 저평가 투자에서 가장 조심해야 할 함정이다.\u003c/p\u003e\n\u003ch3\u003e유형 1: 경기민감주 고점 착시\u003c/h3\u003e\n\u003cp\u003e앞서 언급한 철강·조선·화학처럼, 사이클 고점에서 이익이 피크이고 PER이 낮아 보인다. 이후 업황이 꺾이면서 이익이 급감하고 주가도 폭락한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e예시\u003c/strong\u003e: 2021\u003cdel\u003e2022년 해운 업황 호황기 때 여러 해운사가 PER 1\u003c/del\u003e2배로 \"극단적 저평가\"처럼 보였지만, 이후 운임 급락과 함께 이익이 수백 퍼센트 감소했다.\u003c/p\u003e\n\u003ch3\u003e유형 2: 쇠퇴 산업 (구조적 하락)\u003c/h3\u003e\n\u003cp\u003e단순히 업황이 나쁜 게 아니라 산업 자체가 사라지거나 축소되는 경우. 신문·인쇄, 오프라인 DVD 대여, 내연기관 부품 전문 기업 등이 해당한다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e아무리 PBR이 낮아도 자산이 계속 감가하면 BPS 자체가 줄어든다.\u003c/li\u003e\n\u003cli\u003e\"망하지 않을 것 같다\"와 \"주가가 오를 것이다\"는 다른 문제다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e유형 3: 오너 리스크·지배구조 문제\u003c/h3\u003e\n\u003cp\u003e대주주가 회사 자금을 유용하거나, 일감 몰아주기, 사익 편취가 지속되는 기업. 아무리 저평가여도 주주 가치 제고 의지가 없으면 저평가 해소가 일어나지 않는다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e확인 방법\u003c/strong\u003e: DART에서 특수관계인 거래 내역, 주주총회 안건 부결 이력, CEO·CFO의 교체 빈도 확인.\u003c/p\u003e\n\u003ch3\u003e유형 4: 분식회계·이익 과장\u003c/h3\u003e\n\u003cp\u003e실제 이익보다 과장된 이익을 기반으로 PER이 낮아 보이는 경우. 이후 회계 처리 변경이나 감사 의견 거절 시 주가가 한순간에 폭락한다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e경고 신호\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e영업현금흐름 \u0026#x3C; 순이익 (이익이 현금화되지 않음)\u003c/li\u003e\n\u003cli\u003e매출채권·재고자산이 매출보다 빠르게 증가\u003c/li\u003e\n\u003cli\u003e감사인 교체 빈번\u003c/li\u003e\n\u003cli\u003e비적정 감사의견\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e유형 5: 자본 잠식 진행형\u003c/h3\u003e\n\u003cp\u003e부채비율이 계속 올라가고 영업이익으로 이자도 못 내는(이자보상배율 1 미만) 기업은 PER·PBR이 낮아도 생존 리스크가 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e코스피 업종별 밸류에이션 지표 적합성\u003c/h2\u003e\n\u003cp\u003e모든 지표가 모든 업종에 동일하게 적합하지 않다. 업종별로 주로 사용하는 지표가 다르다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e업종\u003c/th\u003e\n\u003cth\u003e주 사용 지표\u003c/th\u003e\n\u003cth\u003e이유\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체·전자\u003c/td\u003e\n\u003ctd\u003eEV/EBITDA, PBR\u003c/td\u003e\n\u003ctd\u003e설비 투자 크고 이익 사이클성 강함\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e은행·금융\u003c/td\u003e\n\u003ctd\u003ePBR, ROE\u003c/td\u003e\n\u003ctd\u003e레버리지 사업 특성, EV 개념 적용 어려움\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e바이오\u003c/td\u003e\n\u003ctd\u003ePSR, 파이프라인 DCF\u003c/td\u003e\n\u003ctd\u003e이익 없는 경우 많음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유통·소비재\u003c/td\u003e\n\u003ctd\u003ePER, EV/EBITDA\u003c/td\u003e\n\u003ctd\u003e안정적 이익 구조\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e건설·부동산\u003c/td\u003e\n\u003ctd\u003ePBR, 수주잔고 배수\u003c/td\u003e\n\u003ctd\u003e자산 가치 중요\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e플랫폼·IT\u003c/td\u003e\n\u003ctd\u003ePSR, PEG, EV/EBITDA\u003c/td\u003e\n\u003ctd\u003e고성장 초기엔 이익 없음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e지주회사\u003c/td\u003e\n\u003ctd\u003eSOTP\u003c/td\u003e\n\u003ctd\u003e복수 자회사 구조\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e통신\u003c/td\u003e\n\u003ctd\u003eEV/EBITDA, 배당수익률\u003c/td\u003e\n\u003ctd\u003e안정적 현금흐름, 고배당\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e저평가 체크리스트\u003c/h2\u003e\n\u003cp\u003e단순히 숫자가 낮다고 저평가가 아니다. 다음을 함께 확인해야 한다.\u003c/p\u003e\n\u003ch3\u003e재무 건전성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 부채비율 100% 이하 (업종 평균 이하)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 유동비율 100% 이상 (단기 상환 능력)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 이자보상배율 3배 이상 (영업이익 / 이자비용)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익률이 최근 3년간 유지 또는 개선\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e이익 품질\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익과 순이익의 방향 일치 (일회성 이익 제외)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업현금흐름 \u003e 순이익 (이익의 현금화 확인)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출채권 회전일수가 과도하게 증가하지 않는지\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e ROE(자기자본이익률) 10% 이상 지속\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e성장성\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 매출 성장률이 업종 평균 이상\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 영업이익 성장률이 매출 성장률 이상 (레버리지 효과)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 신규 사업이나 제품 파이프라인 존재\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e저평가 이유 파악\u003c/h3\u003e\n\u003cul class=\"contains-task-list\"\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 일시적 이슈인가? (실적 쇼크, 업황 부진, 시장 공포, 악재 선반영)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 구조적 문제인가? (사업 경쟁력 약화, 업종 자체 쇠퇴, 지배구조 문제)\u003c/li\u003e\n\u003cli class=\"task-list-item\"\u003e\u003cinput type=\"checkbox\" disabled\u003e 촉매(Catalyst)가 있는가? (실적 개선 시점, 배당 정책 변화, 자사주 소각 계획)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e저평가 이유가 일시적이면 매수 기회. 구조적이면 가치 함정(Value Trap). 촉매가 없으면 저평가가 해소되지 않고 방치될 수 있다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 스크리닝 도구\u003c/h2\u003e\n\u003ch3\u003e1. 네이버 증권 (finance.naver.com)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e종목 발굴 → 조건 검색\u003c/strong\u003e: PER, PBR, ROE 등 수치 기반 조건 검색 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e업종 분석\u003c/strong\u003e: 업종별 평균 PER, PBR을 확인해 상대 비교\u003c/li\u003e\n\u003cli\u003e무료이며 접근이 쉬워 초보자 1차 스크리닝에 적합\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e2. FnGuide (\u003ca href=\"http://www.fnguide.com\"\u003ewww.fnguide.com\u003c/a\u003e)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e기관 투자자와 애널리스트가 사용하는 전문 데이터베이스\u003c/li\u003e\n\u003cli\u003e컨센서스 EPS, 목표주가, 12개월 포워드 PER 등 미래 추정치 확인 가능\u003c/li\u003e\n\u003cli\u003e유료 구독 필요 (일부 기능은 무료)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e3. DART (dart.fss.or.kr)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e금융감독원 전자공시시스템. 모든 상장사의 사업보고서, 분기보고서, 공시 조회\u003c/li\u003e\n\u003cli\u003e특수관계인 거래, 주요주주 지분 변동, 유상증자 등 핵심 정보\u003c/li\u003e\n\u003cli\u003e무료. 저평가 이유 파악과 지배구조 확인에 필수.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e4. KIND (kind.krx.co.kr)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e한국거래소 기업공시채널. 실시간 공시 알림 설정 가능\u003c/li\u003e\n\u003cli\u003e자사주 취득 공시, 배당 공시 등 주주환원 관련 정보 빠르게 파악\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e5. 증권사 HTS/MTS 조건 검색\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e키움 영웅문, 미래에셋 m.STOCK 등 대형 증권사 HTS에는 멀티팩터 조건 검색 기능이 내장\u003c/li\u003e\n\u003cli\u003ePER + PBR + ROE + 부채비율 등 복수 조건을 동시에 적용해 스크리닝 가능\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e실전 스크리닝 예시\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003e1단계: 정량 스크리닝 (숫자로 걸러내기)\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e조건\u003c/th\u003e\n\u003cth\u003e값\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ePER\u003c/td\u003e\n\u003ctd\u003e동종 업종 하위 30%\u003c/td\u003e\n\u003ctd\u003e절대값 아닌 상대 비교\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePBR\u003c/td\u003e\n\u003ctd\u003e1.5 이하\u003c/td\u003e\n\u003ctd\u003e코리아 디스카운트 감안\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부채비율\u003c/td\u003e\n\u003ctd\u003e100% 이하\u003c/td\u003e\n\u003ctd\u003e업종 평균 이하\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eROE\u003c/td\u003e\n\u003ctd\u003e10% 이상\u003c/td\u003e\n\u003ctd\u003e자본 효율성 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영업이익 증가율\u003c/td\u003e\n\u003ctd\u003e최근 2년 연속 플러스\u003c/td\u003e\n\u003ctd\u003e이익 방향성 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영업현금흐름\u003c/td\u003e\n\u003ctd\u003e순이익 이상\u003c/td\u003e\n\u003ctd\u003e이익 품질 확인\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e2단계: 정성 분석 (직접 파악)\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eDART 사업보고서 정독 — 사업 구조, 경쟁 우위, 위험 요인\u003c/li\u003e\n\u003cli\u003e최근 3년 IR 자료 또는 애널리스트 리포트 확인\u003c/li\u003e\n\u003cli\u003e경쟁사 대비 시장점유율 추이\u003c/li\u003e\n\u003cli\u003e주요주주 지분 변동 (대주주 매도는 경고 신호)\u003c/li\u003e\n\u003cli\u003e저평가의 구체적 이유와 해소 촉매 파악\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e3단계: 밸류에이션 크로스체크\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePER, PBR, EV/EBITDA 중 2개 이상에서 저평가 확인\u003c/li\u003e\n\u003cli\u003e가능하다면 간이 DCF로 역산하여 현재 주가가 함의하는 성장률이 과도하게 낮은지 확인\u003c/li\u003e\n\u003cli\u003e목표 주가 = 업종 평균 PER × 예상 EPS (1년 뒤 기준)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e결론\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"가격은 당신이 지불하는 것이고, 가치는 당신이 얻는 것이다.\" — 워런 버핏\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e저평가 투자의 핵심은 \u003cstrong\u003e숫자 + 사업 이해 + 촉매\u003c/strong\u003e다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e숫자만 봐서는 가치 함정에 빠진다.\u003c/li\u003e\n\u003cli\u003e사업을 이해하지 못하면 저평가 이유가 일시적인지 구조적인지 판단할 수 없다.\u003c/li\u003e\n\u003cli\u003e촉매 없이 기다리면 자본의 기회비용이 낭비된다.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e지표가 낮아 보여도 왜 낮은지 이유를 모르면 투자하지 않는 것이 낫다. 그리고 이유를 알았더라도, 그 이유가 해소될 시점과 근거가 명확하지 않다면 포지션 크기를 최소화해야 한다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-06\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"기업 저평가 판단하는 법\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"16:I[27201,[\"/_next/static/chunks/ff1a16fafef87110.js\",\"/_next/static/chunks/2b423cf30d3964a3.js\"],\"IconMark\"]\ne:null\n12:[[\"$\",\"title\",\"0\",{\"children\":\"기업 저평가 판단하는 법 | midasworld (Private)\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"서버 개발 학습 블로그\"}],[\"$\
