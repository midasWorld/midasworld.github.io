003c/span\u003e  \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e  \u003cspan class=\"hljs-variable\"\u003e$0\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e~\u003c/span\u003e\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e    \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e  직접환전\u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e   \u003cspan class=\"hljs-operator\"\u003e★★★\u003c/span\u003e   \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e  \u003cspan class=\"hljs-variable\"\u003e$0\u003c/span\u003e      \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e 전문가용 \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e\n\u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e \u003cspan class=\"hljs-type\"\u003eBrokers\u003c/span\u003e(\u003cspan class=\"hljs-type\"\u003eIB\u003c/span\u003e)  \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e  \u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003e거래   \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e  필요없음\u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e          \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e          \u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e 수수료최저\u003cspan class=\"hljs-operator\"\u003e│\u003c/span\u003e\n\u003cspan class=\"hljs-operator\"\u003e└──────────────┴──────────┴──────────┴──────────┴──────────┴──────────┘\u003c/span\u003e\n\n\u003cspan class=\"hljs-operator\"\u003e※\u003c/span\u003e 수수료는 변경될 수 있으므로 개설 전 반드시 확인\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1.2 초보자 추천 선택 기준\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌────────────────────────────────────────────┐\n│           어떤 증권사를 골라야 할까?        │\n├────────────────────────────────────────────┤\n│                                            │\n│  📱 앱이 쉬워야 해  →  토스증권, 신한SOL  │\n│                                            │\n│  💰 수수료 아끼고 싶어 →  키움, IB        │\n│                                            │\n│  📊 리서치 보고 싶어 →  미래에셋          │\n│                                            │\n│  💵 소액 (\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e만원 미만) →  토스, 신한SOL  │\n│                                            │\n│  💰 대액 (\u003cspan class=\"hljs-number\"\u003e1000\u003c/span\u003e만원 이상) →  IB 고려       │\n│                                            │\n└────────────────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e초보자라면 토스증권 또는 신한 SOL을 추천한다.\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e앱 인터페이스가 단순하고 직관적\u003c/li\u003e\n\u003cli\u003e비대면 계좌 개설 10분 이내\u003c/li\u003e\n\u003cli\u003e분할 매수(1주 미만 소수점 투자) 지원\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e1.3 Interactive Brokers (IB)는 언제 고려하나?\u003c/h3\u003e\n\u003cp\u003eIB는 전 세계 투자자가 쓰는 글로벌 브로커리지다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e장점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e수수료 최저 (주당 $0.005 또는 거래금액의 0.1%, 최소 $1)\u003c/li\u003e\n\u003cli\u003e환전 스프레드 거의 없음 (은행 대비 압도적으로 유리)\u003c/li\u003e\n\u003cli\u003e옵션, 선물, 외국 ETF 등 다양한 상품 접근\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e단점:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e한국어 지원 미흡\u003c/li\u003e\n\u003cli\u003e초보자가 쓰기에 UI가 복잡\u003c/li\u003e\n\u003cli\u003e해외 금융기관이므로 예금자 보호법 미적용\u003c/li\u003e\n\u003cli\u003e세금 신고를 직접 해야 함\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e결론:\u003c/strong\u003e 투자금 3,000만원 이상, 해외주식 경험 1년 이상이면 IB 이전을 고려하자.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 계좌 개설 실전 — 신한 SOL 기준\u003c/h2\u003e\n\u003cp\u003e모든 증권사 프로세스는 거의 동일하다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────┐\n│                비대면 계좌 개설 단계                     │\n└─────────────────────────────────────────────────────────┘\n\n  \u003cspan class=\"hljs-selector-attr\"\u003e[앱 다운로드]\u003c/span\u003e\n       │\n       ▼\n  \u003cspan class=\"hljs-selector-attr\"\u003e[개인정보 입력]\u003c/span\u003e\n  이름 / 주민번호 / 연락처\n       │\n       ▼\n  \u003cspan class=\"hljs-selector-attr\"\u003e[신분증 촬영]\u003c/span\u003e\n  주민등록증 또는 운전면허증\n       │\n       ▼\n  \u003cspan class=\"hljs-selector-attr\"\u003e[본인 인증]\u003c/span\u003e\n  ① 계좌 인증 (기존 은행 계좌)\n  ② 영상통화 인증 (일부 증권사)\n       │\n       ▼\n  \u003cspan class=\"hljs-selector-attr\"\u003e[계좌 종류 선택]\u003c/span\u003e\n  ✅ 종합위탁계좌 (일반)\n  ✅ ISA 계좌 (세금 혜택, 연 \u003cspan class=\"hljs-number\"\u003e2000\u003c/span\u003e만원 한도)\n       │\n       ▼\n  \u003cspan class=\"hljs-selector-attr\"\u003e[해외주식 거래 신청]\u003c/span\u003e\n  ← 이 단계 반드시 체크!\n       │\n       ▼\n  \u003cspan class=\"hljs-selector-attr\"\u003e[완료]\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e분 소요\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e주의:\u003c/strong\u003e \"해외주식 거래 신청\"을 별도로 해야 하는 경우가 많다.\n계좌 개설 완료 후 앱에서 \"해외주식 \u003e 거래 신청\" 메뉴를 확인하자.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 환전 — 언제, 어떻게 달러를 바꿀까?\u003c/h2\u003e\n\u003ch3\u003e3.1 환전의 기본 개념\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e┌───────────────────────────────────────────────────────────────┐\n│                      환전 비용 구조                            │\n└───────────────────────────────────────────────────────────────┘\n\n  실제 환율 (은행 기준): 1달러 = 1,300원\n                              │\n              ┌───────────────┼───────────────┐\n              │               │               │\n        살 때(매수)     팔 때(매도)        우대환율\n        1,330원         1,270원           1,300원\n              │               │\n           스프레드: 30원     스프레드: 30원\n          (2.3% 손실)        (2.3% 손실)\n\n  ──────────────────────────────────────────────────────────────\n  증권사 우대 90% 적용 시:\n    우대 금액: 30원 × 90% = 27원 할인\n    실제 매수 환율: 1,330 - \u003cspan class=\"hljs-attr\"\u003e27\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e303\u003c/span\u003e원\n    (0.23% 비용으로 줄어듦!)\n  ──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3.2 환전 우대 신청하기\u003c/h3\u003e\n\u003cp\u003e증권사마다 \"환전 우대\" 이벤트를 한다. 놓치지 말자.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e방법\u003c/th\u003e\n\u003cth\u003e우대율\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e기본 환율\u003c/td\u003e\n\u003ctd\u003e0%\u003c/td\u003e\n\u003ctd\u003e증권사 기본 제공 (비쌈)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e앱 내 환전 신청\u003c/td\u003e\n\u003ctd\u003e50~70%\u003c/td\u003e\n\u003ctd\u003e버튼 클릭만으로\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e이벤트 신청\u003c/td\u003e\n\u003ctd\u003e90~95%\u003c/td\u003e\n\u003ctd\u003e기간 한정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e환전 예약\u003c/td\u003e\n\u003ctd\u003e90%\u003c/td\u003e\n\u003ctd\u003e목표 환율 도달 시 자동\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e실전 팁:\u003c/strong\u003e 신한 SOL, 키움증권 앱에서 \"환전 우대\" 또는 \"환율 우대 신청\" 탭을 찾아보자.\u003c/p\u003e\n\u003ch3\u003e3.3 환전 타이밍 전략\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌───────────────────────────────────────────────────────────────┐\n│                   환전 타이밍 전략                             │\n└───────────────────────────────────────────────────────────────┘\n\n  전략 1: 분할 환전 (초보자 추천)\n  ────────────────────────────────\n  목표 투자금: 300만원\n\n  1월  환전: 100만원 → 환율 1,350원 → \u003cspan class=\"hljs-variable\"\u003e$740\u003c/span\u003e\n  2월  환전: 100만원 → 환율 1,300원 → \u003cspan class=\"hljs-variable\"\u003e$769\u003c/span\u003e\n  3월  환전: 100만원 → 환율 1,280원 → \u003cspan class=\"hljs-variable\"\u003e$781\u003c/span\u003e\n\n  평균 환율: 1,310원 (환율 리스크 분산)\n\n  ──────────────────────────────────────────────────────────────\n\n  전략 2: 달러 저축 (장기투자자)\n  ────────────────────────────────\n  매월 고정 금액(예: 50만원)을 달러로 환전\n  → 달러-코스트 평균법 (DCA) 효과\n  → 환율 예측 필요 없음\n\n  ──────────────────────────────────────────────────────────────\n\n  전략 3: 환율 목표 설정\n  ────────────────────────\n  \u003cspan class=\"hljs-string\"\u003e\"달러가 1,280원 이하로 내려오면 환전\"\u003c/span\u003e\n  → 환전 예약 기능 활용\n  → 단, 언제 내려올지 모름 (예측 불가)\n\n  ──────────────────────────────────────────────────────────────\n\n  ❌ 피해야 할 행동\n  \u003cspan class=\"hljs-string\"\u003e\"환율이 떨어지기를 기다리며 계속 미루기\"\u003c/span\u003e\n  → 주가도 오를 수 있어 기회 비용 발생\n  → 환율 + 주가 동시 예측은 불가능\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 원칙:\u003c/strong\u003e 환율 타이밍보다 \u003cstrong\u003e분할 환전 + 분할 매수\u003c/strong\u003e가 훨씬 중요하다.\n환율 예측으로 수익 내는 사람은 거의 없다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 미국 주식 거래 시간 — 한국 시각 기준\u003c/h2\u003e\n\u003ch3\u003e4.1 정규장 시간\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│              미국 주식 거래 시간 (한국 기준)                     │\n└─────────────────────────────────────────────────────────────────┘\n\n  ☀️ 여름 (서머타임, \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 둘째 주 일요일 ~ \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e월 첫째 주 일요일)\n  ┌──────────────────────────────────────────────────────────────┐\n  │  프리마켓   │    정규장    │  애프터마켓  │      야간      │\n  │  \u003cspan class=\"hljs-number\"\u003e21\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e     │   \u003cspan class=\"hljs-number\"\u003e22\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e     │    \u003cspan class=\"hljs-number\"\u003e05\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e    │              │\n  │    ~       │     ~       │     ~       │              │\n  │  \u003cspan class=\"hljs-number\"\u003e22\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e     │   \u003cspan class=\"hljs-number\"\u003e05\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e     │    \u003cspan class=\"hljs-number\"\u003e09\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e    │              │\n  └──────────────────────────────────────────────────────────────┘\n  한국 시각   \u003cspan class=\"hljs-number\"\u003e21\u003c/span\u003e시          \u003cspan class=\"hljs-number\"\u003e22\u003c/span\u003e시\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e분        \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e시           \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e시\n\n  ❄️ 겨울 (서머타임 없음)\n  ┌──────────────────────────────────────────────────────────────┐\n  │  프리마켓   │    정규장    │  애프터마켓  │      야간      │\n  │  \u003cspan class=\"hljs-number\"\u003e22\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e     │   \u003cspan class=\"hljs-number\"\u003e23\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e     │    \u003cspan class=\"hljs-number\"\u003e06\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e    │              │\n  │    ~       │     ~       │     ~       │              │\n  │  \u003cspan class=\"hljs-number\"\u003e23\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e     │   \u003cspan class=\"hljs-number\"\u003e06\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e     │    \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e    │              │\n  └──────────────────────────────────────────────────────────────┘\n  한국 시각   \u003cspan class=\"hljs-number\"\u003e22\u003c/span\u003e시          \u003cspan class=\"hljs-number\"\u003e23\u003c/span\u003e시\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e분        \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e시           \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e시\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e4.2 프리마켓 / 애프터마켓 주의사항\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│              프리마켓 / 애프터마켓 특징                          │\n└─────────────────────────────────────────────────────────────────┘\n\n  정규장                프리마켓/애프터마켓\n  ──────                ────────────────────\n  유동성 매우 높음      유동성 낮음\n  가격 안정적           가격 변동성 극심\n  대부분 주문 체결      지정가만 가능 (일부 증권사)\n  스프레드 좁음         스프레드 넓음\n\n  ⚠️  실적 발표는 정규장 후 (After Hours)에 많이 나온다\n      → Apple 실적 발표 → 애프터마켓에서 급등/급락\n      → 다음날 정규장 시작 때 반영\n\n  💡 초보자는 정규장(\u003cspan class=\"hljs-number\"\u003e22\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e05\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e 여름 기준)에서만 거래하자\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e4.3 공휴일\u003c/h3\u003e\n\u003cp\u003e미국 주식 시장은 미국 공휴일에 쉰다. 한국 공휴일과 다르다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-python\"\u003e미국 주요 주식 시장 휴장일 (연간)\n──────────────────────────────────\n\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e월  \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e일     New Yea\u003cspan class=\"hljs-string\"\u003er's Day (새해)\n1월  3째 월  Martin Luther King Jr. Day\n2월  3째 월  Presidents'\u003c/span\u003e Day\n\u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e월  성금요일 Good Friday (부활절 전)\n\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e월  마지막 월 Memorial Day\n\u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e월  \u003cspan class=\"hljs-number\"\u003e19\u003c/span\u003e일    Juneteenth\n\u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e월  \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e일     Independence Day (독립기념일)\n\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e월  첫째 월  Labor Day\n\u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e월 \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e째 목  Thanksgiving Day\n\u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e월 \u003cspan class=\"hljs-number\"\u003e25\u003c/span\u003e일    Christmas Day\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 세금 완벽 정리 — 가장 중요한 부분\u003c/h2\u003e\n\u003ch3\u003e5.1 미국 주식 세금 종류\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│                 미국 주식 관련 세금 \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e가지                        │\n└─────────────────────────────────────────────────────────────────┘\n\n  ┌──────────────────────┐    ┌──────────────────────┐\n  │   양도소득세          │    │   배당소득세          │\n  │   (매매차익)          │    │   (배당금)            │\n  └──────────────────────┘    └──────────────────────┘\n          │                           │\n  주식 팔아서 번 돈               배당금 받을 때\n  연 \u003cspan class=\"hljs-number\"\u003e250\u003c/span\u003e만원 공제                 \u003cspan class=\"hljs-number\"\u003e15%\u003c/span\u003e 원천징수\n  초과분 × \u003cspan class=\"hljs-number\"\u003e22%\u003c/span\u003e                    (자동 차감)\n  연 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e회 신고                     별도 신고 필요시\n  (\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e월 종합소득세)                (금융소득종합과세)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5.2 양도소득세 상세 계산\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│                   양도소득세 계산 예시                           │\n└─────────────────────────────────────────────────────────────────┘\n\n  예시 1: 수익 200만원 → 세금 0원\n  ─────────────────────────────────\n  Apple(AAPL) 매수: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 (2025년)\n  Apple(AAPL) 매도: \u003cspan class=\"hljs-variable\"\u003e$11\u003c/span\u003e,538 (2026년)\n  환율 1,300원 적용\n\n  매매차익: (\u003cspan class=\"hljs-variable\"\u003e$11\u003c/span\u003e,538 - \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000) × 1,300원 = 2,000,000원\n  기본공제: -2,500,000원 (250만원)\n  과세표준: 0원 (공제 후 마이너스)\n  세금: 0원 ✅\n\n  ──────────────────────────────────────────────────────────────\n\n  예시 2: 수익 700만원 → 세금 99만원\n  ─────────────────────────────────────\n  Microsoft(MSFT) 매수: \u003cspan class=\"hljs-variable\"\u003e$15\u003c/span\u003e,000\n  Microsoft(MSFT) 매도: \u003cspan class=\"hljs-variable\"\u003e$20\u003c/span\u003e,385\n  환율 1,300원 적용\n\n  매매차익: (\u003cspan class=\"hljs-variable\"\u003e$20\u003c/span\u003e,385 - \u003cspan class=\"hljs-variable\"\u003e$15\u003c/span\u003e,000) × 1,300원 = 7,000,500원\n  기본공제: -2,500,000원\n  과세표준: 4,500,500원\n  세금: 4,500,500 × 22% = 990,110원 💸\n\n  ──────────────────────────────────────────────────────────────\n\n  ⚠️  중요: 연간 모든 해외주식 손익을 합산한다\n\n  AAPL 수익: +500만원\n  TSLA 손실: -200만원\n  합산 수익:  300만원\n  공제 후:    50만원\n  세금: 50만원 × 22% = 11만원\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5.3 절세 전략\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e┌─────────────────────────────────────────────────────────────────┐\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e                    \u003cspan class=\"hljs-string\"\u003e연말\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e절세\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e체크리스트\u003c/span\u003e                          \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e└─────────────────────────────────────────────────────────────────┘               │\n  │                                                             │\n  │  장점: 즉시 체결                                            │\n  │  단점: 원하는 가격 보장 안 됨 (슬리피지 발생)              │\n  │                                                             │\n  │  사용 시기: 급하게 사야 할 때, 유동성 높은 대형주           │\n  │  예시: \u003cspan class=\"hljs-string\"\u003e\"AAPL 10주 시장가 매수\"\u003c/span\u003e → 현재가 $\u003cspan class=\"hljs-number\"\u003e185\u003c/span\u003e로 즉시 체결   │\n  └─────────────────────────────────────────────────────────────┘\n\n  ┌─────────────────────────────────────────────────────────────┐\n  │ \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e. 지정가 주문 (Limit \u003cspan class=\"hljs-keyword\"\u003eOrder\u003c/span\u003e) ← 초보자 추천                  │\n  │                                                             │\n  │  \u003cspan class=\"hljs-string\"\u003e\"이 가격 이하(매수) 또는 이상(매도)일 때만 사줘\"\u003c/span\u003e           │\n  │                                                             │\n  │  장점: 원하는 가격에 거래 가능                              │\n  │  단점: 원하는 가격에 도달하지 않으면 미체결                 │\n  │                                                             │\n  │  사용 시기: 항상 (특히 변동성 클 때)                        │\n  │  예시: \u003cspan class=\"hljs-string\"\u003e\"AAPL $183 이하로 10주 매수\"\u003c/span\u003e → $\u003cspan class=\"hljs-number\"\u003e183\u003c/span\u003e 이하일 때 체결  │\n  └─────────────────────────────────────────────────────────────┘\n\n  ┌─────────────────────────────────────────────────────────────┐\n  │ \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e. 손절 주문 (\u003cspan class=\"hljs-keyword\"\u003eStop\u003c/span\u003e Loss \u003cspan class=\"hljs-keyword\"\u003eOrder\u003c/span\u003e)                              │\n  │                                                             │\n  │  \u003cspan class=\"hljs-string\"\u003e\"이 가격 아래로 떨어지면 자동으로 팔아줘\"\u003c/span\u003e                  │\n  │                                                             │\n  │  장점: 감정 없이 손실 제한                                  │\n  │  단점: 일시적 하락 시에도 매도됨                            │\n  │                                                             │\n  │  사용 시기: 손실 제한이 필요할 때                           │\n  │  예시: \u003cspan class=\"hljs-string\"\u003e\"$170 이하면 AAPL 자동 매도\"\u003c/span\u003e → 하락 방어            │\n  └─────────────────────────────────────────────────────────────┘\n\n  ┌─────────────────────────────────────────────────────────────┐\n  │ \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e. \u003cspan class=\"hljs-keyword\"\u003eStop\u003c/span\u003e Limit \u003cspan class=\"hljs-keyword\"\u003eOrder\u003c/span\u003e                                         │\n  │                                                             │\n  │  \u003cspan class=\"hljs-keyword\"\u003eStop\u003c/span\u003e 가격 도달 시 → Limit 주문으로 전환                    │\n  │  갭다운 시 원치 않는 가격에 팔리는 것 방지                  │\n  └─────────────────────────────────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6.2 실전 주문 시뮬레이션 — Apple(AAPL) 첫 매수\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│            AAPL 10주 지정가 매수 시뮬레이션                     │\n└─────────────────────────────────────────────────────────────────┘\n\n  현재 상황:\n  - AAPL 현재가: \u003cspan class=\"hljs-variable\"\u003e$185\u003c/span\u003e.20\n  - 내가 원하는 가격: \u003cspan class=\"hljs-variable\"\u003e$184\u003c/span\u003e.00\n  - 매수 수량: 10주\n\n  Step 1. 앱 실행 → 해외주식 탭\n  Step 2. AAPL 검색 → Apple Inc 선택\n  Step 3. 매수 버튼 클릭\n\n  주문 화면:\n  ┌───────────────────────────────┐\n  │  AAPL (Apple Inc.)           │\n  │  현재가: \u003cspan class=\"hljs-variable\"\u003e$185\u003c/span\u003e.20             │\n  │                               │\n  │  주문 유형: [지정가 ▼]       │\n  │  주문 수량: [10    ]         │\n  │  주문 가격: [\u003cspan class=\"hljs-variable\"\u003e$184\u003c/span\u003e.00]        │\n  │                               │\n  │  예상 금액: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,840.00        │\n  │  (원화 환산: ₩2,392,000)     │\n  │                               │\n  │      [매수 확인]              │\n  └───────────────────────────────┘\n\n  Step 4. \u003cspan class=\"hljs-string\"\u003e\"매수 확인\"\u003c/span\u003e 클릭\n  Step 5. 비밀번호 / 생체인증 입력\n  Step 6. 완료!\n\n  이후:\n  - AAPL이 \u003cspan class=\"hljs-variable\"\u003e$184\u003c/span\u003e.00 이하로 내려오면 → 자동 체결 ✅\n  - 오늘 장 마감까지 안 내려오면 → 미체결 (취소 또는 재주문)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6.3 체결 후 확인사항\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│                  매수 체결 후 확인 체크리스트                   │\n└─────────────────────────────────────────────────────────────────┘\n\n  ✅  체결 수량 확인 (10주 맞는지)\n  ✅  체결 가격 확인 (\u003cspan class=\"hljs-variable\"\u003e$184\u003c/span\u003e.00 이하인지)\n  ✅  수수료 확인 (0.25% 적용됐는지)\n  ✅  잔고 확인 (달러 잔고 차감 확인)\n  ✅  포트폴리오에 AAPL 표시 확인\n\n  수수료 계산:\n  \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,840 × 0.25% = \u003cspan class=\"hljs-variable\"\u003e$4\u003c/span\u003e.60\n  총 비용: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,844.60\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e7. 소수점 투자 (1주 미만 매수)\u003c/h2\u003e\n\u003cp\u003e국내 일부 증권사는 1주 미만의 소수점 투자를 지원한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│                소수점 투자 예시                                  │\n└─────────────────────────────────────────────────────────────────┘\n\n  Amazon(AMZN) 현재가: \u003cspan class=\"hljs-variable\"\u003e$186\u003c/span\u003e.00\n\n  소수점 없이: 최소 \u003cspan class=\"hljs-variable\"\u003e$186\u003c/span\u003e 필요 (약 24만원)\n  소수점 지원: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e으로 0.054주 매수 가능!\n\n  지원 증권사:\n  ✅ 토스증권 (0.001주 단위)\n  ✅ 신한 SOL (0.01주 단위)\n  ✅ 키움증권 (일부 종목)\n  ❌ IB (소수점 지원 없음, 단 ETF는 가능)\n\n  장점: 초기 소액으로 다양한 주식 경험\n  단점: 의결권 없음, 현금 배당만 지급\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 첫 투자를 위한 실전 체크리스트\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────┐\n│              미국 주식 첫 투자 준비 완료 체크                   │\n└─────────────────────────────────────────────────────────────────┘\n\n  계좌 준비\n  ─────────\n  □ 증권사 앱 설치 완료\n  □ 비대면 계좌 개설 완료\n  □ 해외주식 거래 신청 완료\n  □ 환전 우대 신청 완료\n\n  자금 준비\n  ─────────\n  □ 투자 가능 금액 결정 (잃어도 되는 돈)\n  □ 원화 입금 완료\n  □ 달러 환전 완료\n\n  공부\n  ────\n  □ 관심 종목 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e개 선정 (예: AAPL, MSFT, SPY)\n  □ 거래 시간 확인 (여름/겨울 구분)\n  □ 세금 구조 이해 (\u003cspan class=\"hljs-number\"\u003e250\u003c/span\u003e만원 공제)\n\n  첫 주문\n  ────────\n  □ 지정가 주문으로 소량(\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e주) 매수\n  □ 체결 확인\n  □ 수수료 확인\n\n  마음가짐\n  ─────────\n  □ 단기 손익에 흔들리지 않기로 결심\n  □ 최소 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e년 장기 보유 계획\n  □ 추가 매수를 위한 여유 자금 확보\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 자주 묻는 질문 (FAQ)\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eQ. 미국 주식은 1주씩만 살 수 있나요?\u003c/strong\u003e\nA. 아니다. 수량 제한 없다. 0.001주도 가능한 증권사가 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ. 달러가 없어도 되나요?\u003c/strong\u003e\nA. 증권사 앱에서 원화로 환전할 수 있다. 자동 환전 서비스도 있다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ. 밤새워서 미국 주식 봐야 하나요?\u003c/strong\u003e\nA. 장기투자라면 필요 없다. 지정가 주문을 걸어두면 자고 일어나서 체결 확인만 하면 된다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ. 미국 주식도 상한가/하한가가 있나요?\u003c/strong\u003e\nA. 없다. 단, 서킷브레이커(Circuit Breaker)는 있다. S\u0026#x26;P500이 7%, 13%, 20% 이상 하락 시 거래 일시 정지.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ. 세금 신고는 어떻게 하나요?\u003c/strong\u003e\nA. 매년 5월 홈택스에서 해외주식 양도소득세 신고. 증권사에서 손익 내역서를 발급해준다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ. ISA 계좌에서도 미국 주식 살 수 있나요?\u003c/strong\u003e\nA. 직접 미국 주식은 불가. 단, 미국 주식 담은 ETF(예: TIGER 미국S\u0026#x26;P500)는 가능.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e10. 다음 편 예고\u003c/h2\u003e\n\u003cp\u003e이제 계좌도 열었고 환전도 했고 첫 주문도 했다.\n다음은 \"어떤 주식을 살까?\"가 고민일 것이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e미국 주식 투자 입문 시리즈\n──────────────────────────────────────────────────\n✅ \u003cspan class=\"hljs-number\"\u003e01\u003c/span\u003e편: 계좌 개설부터 첫 주문까지 (지금 읽는 중)\n📌 \u003cspan class=\"hljs-number\"\u003e02\u003c/span\u003e편: 미국 시장 구조 — NYSE, NASDAQ, S\u003cspan class=\"hljs-operator\"\u003e\u0026#x26;\u003c/span\u003eP500\n📌 \u003cspan class=\"hljs-number\"\u003e03\u003c/span\u003e편: 어떤 주식 살까 — 기업 분석 첫걸음\n📌 \u003cspan class=\"hljs-number\"\u003e04\u003c/span\u003e편: 재무제표 읽기 (애플 사례)\n📌 \u003cspan class=\"hljs-number\"\u003e05\u003c/span\u003e편: 주가 가치평가 — \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e, PBR, EV\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003eEBITDA\n📌 \u003cspan class=\"hljs-number\"\u003e06\u003c/span\u003e편: 성장주 vs 가치주 선택법\n📌 \u003cspan class=\"hljs-number\"\u003e07\u003c/span\u003e편: ETF로 분산투자하기\n📌 \u003cspan class=\"hljs-number\"\u003e08\u003c/span\u003e편: 채권과 미국 국채 (TLT)\n📌 \u003cspan class=\"hljs-number\"\u003e09\u003c/span\u003e편: 매수\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003e매도 타이밍\n📌 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e편: 포트폴리오 구성과 리밸런싱\n📌 \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e편: 거시경제와 국제 시사가 주가를 움직인다\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e투자 원칙 한 줄 요약:\u003c/strong\u003e\n처음엔 무조건 소액으로 시작하라. $100으로 경험한 1%의 손실이\n$10,000으로 경험한 1%의 손실보다 백만 배 교육적이다.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",nul
