u003e50\u003c/span\u003e조)\n          ┌─────────────────────────────────┐\n          │                                 │\n    ┌─────┴─────┐                   ┌───────┴────────┐\n    │   NYSE    │                   │    NASDAQ      │\n    │ (전통 대형주)│                   │ (기술·성장주)    │\n    │  ~\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e400\u003c/span\u003e개  │                   │   ~\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e600\u003c/span\u003e개     │\n    └─────┬─────┘                   └───────┬────────┘\n          │                                 │\n          └──────────────┬──────────────────┘\n                         │\n              ┌──────────┼──────────┐\n              │          │          │\n         S\u0026#x26;\u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e     나스닥\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e    다우존스\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e\n         (\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e종목)   (\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e종목)    (\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e종목)\n              │\n         \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e개 섹터\n    (IT/헬스/금융/소비재/에너지 등)\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 미국 주요 거래소 — NYSE vs NASDAQ\u003c/h2\u003e\n\u003cp\u003e미국에는 수십 개의 증권거래소가 있지만, 실질적으로 전 세계 투자자가 주목하는 거래소는 두 곳이다.\u003c/p\u003e\n\u003ch3\u003e1-1. NYSE (뉴욕증권거래소)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eNew York Stock Exchange\u003c/strong\u003e. 월스트리트 11번지에 위치한 세계 최대 거래소다. 1792년에 설립되어 230년이 넘는 역사를 자랑한다. 우리가 영화에서 보는 커다란 객장(trading floor)과 개장 벨이 바로 NYSE의 것이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-java\"\u003e[NYSE 건물 위치 — 월스트리트]\n\n         ★ NYSE\n         ↓\n┌────────────────────────────────┐\n│  Wall Street, New York City    │\n│                                │\n│  설립: \u003cspan class=\"hljs-number\"\u003e1792\u003c/span\u003e년 (부탄나무 아래 협약) │\n│  상장 기업: 약 \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e400\u003c/span\u003e개           │\n│  시가총액: 약 $\u003cspan class=\"hljs-number\"\u003e28\u003c/span\u003e조              │\n│  특징: 실물 객장 + 전자 거래 혼합  │\n└────────────────────────────────┘\n\n대표 상장 기업:\n  JPMorgan \u003cspan class=\"hljs-title function_\"\u003eChase\u003c/span\u003e \u003cspan class=\"hljs-params\"\u003e(JPM)\u003c/span\u003e — 미국 최대 은행\n  Coca-Cola (KO)        — \u003cspan class=\"hljs-number\"\u003e135\u003c/span\u003e년 역사 소비재 기업\n  Nike (NKE)            — 스포츠웨어 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e위\n  ExxonMobil (XOM)      — 석유메이저\n  Berkshire \u003cspan class=\"hljs-title function_\"\u003eHathaway\u003c/span\u003e \u003cspan class=\"hljs-params\"\u003e(BRK.B)\u003c/span\u003e — 버핏의 투자회사\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1-2. NASDAQ\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eNational Association of Securities Dealers Automated Quotations\u003c/strong\u003e. 1971년 세계 최초의 전자 거래소로 출발했다. 실물 객장이 없이 전산으로만 거래가 이루어진다. 기술주 중심의 거래소로 성장해 시가총액 기준으로는 NYSE와 어깨를 나란히 한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[NASDAQ 특징]\n\n┌────────────────────────────────────────┐\n│  설립: 1971년 (세계 최초 전자 거래소)    │\n│  위치: 물리적 객장 없음 (전산 거래 100%) │\n│  상장 기업: 약 3,600개                  │\n│  시가총액: 약 \u003cspan class=\"hljs-variable\"\u003e$25\u003c/span\u003e조                     │\n│  특징: 기술/성장 기업 중심              │\n└────────────────────────────────────────┘\n\n대표 상장 기업:\n  Apple (AAPL)        — 시총 \u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e조 (세계 1위)\n  Microsoft (MSFT)    — 시총 \u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e조 (세계 2위)\n  Nvidia (NVDA)       — AI GPU 패권자\n  Amazon (AMZN)       — 이커머스 + AWS\n  Meta (META)         — Facebook, Instagram\n  Alphabet (GOOGL)    — Google, YouTube\n  Tesla (TSLA)        — 전기차 선두주자\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1-3. NYSE vs NASDAQ 완전 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003eNYSE\u003c/th\u003e\n\u003cth\u003eNASDAQ\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e설립 연도\u003c/td\u003e\n\u003ctd\u003e1792년\u003c/td\u003e\n\u003ctd\u003e1971년\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e위치\u003c/td\u003e\n\u003ctd\u003e뉴욕 월스트리트 11번지\u003c/td\u003e\n\u003ctd\u003e전자 거래 (물리적 객장 없음)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e거래 방식\u003c/td\u003e\n\u003ctd\u003e마켓 메이커 + 전자 혼합\u003c/td\u003e\n\u003ctd\u003e순수 전자 거래\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e상장 기준\u003c/td\u003e\n\u003ctd\u003e엄격 (최소 시총·수익 요건 높음)\u003c/td\u003e\n\u003ctd\u003e상대적으로 유연 (성장 기업 허용)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주력 업종\u003c/td\u003e\n\u003ctd\u003e금융, 에너지, 제조, 소비재\u003c/td\u003e\n\u003ctd\u003eIT, 바이오, 성장 기업\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e대표 상장 기업\u003c/td\u003e\n\u003ctd\u003eJPM, KO, NKE, XOM, BRK.B\u003c/td\u003e\n\u003ctd\u003eAAPL, MSFT, NVDA, AMZN, META\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e티커 특징\u003c/td\u003e\n\u003ctd\u003e1~3자리 알파벳 선호\u003c/td\u003e\n\u003ctd\u003e4~5자리 알파벳 (일반적)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e상장 기업 수\u003c/td\u003e\n\u003ctd\u003e약 2,400개\u003c/td\u003e\n\u003ctd\u003e약 3,600개\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e시가총액\u003c/td\u003e\n\u003ctd\u003e약 $28조\u003c/td\u003e\n\u003ctd\u003e약 $25조\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 포인트\u003c/strong\u003e: 어느 거래소에 상장되어 있든 개인 투자자는 동일한 증권사 앱에서 동일하게 거래할 수 있다. 거래소 차이는 상장 기업의 성격과 역사적 배경의 차이이지, 투자자 입장에서 매매 방식이 달라지지는 않는다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 주요 지수 완전 비교 — S\u0026#x26;P500, 나스닥100, 다우존스\u003c/h2\u003e\n\u003cp\u003e미국 주식시장의 상태를 표현하는 대표 지수는 세 가지다. 뉴스에서 \"다우가 올랐다\", \"나스닥이 빠졌다\"라는 말을 들을 때 무슨 의미인지 정확히 이해해야 한다.\u003c/p\u003e\n\u003ch3\u003e2-1. 세 가지 주요 지수 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003eS\u0026#x26;P 500\u003c/th\u003e\n\u003cth\u003e나스닥 100 (NDX)\u003c/th\u003e\n\u003cth\u003e다우존스 (DJIA)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e정식 명칭\u003c/td\u003e\n\u003ctd\u003eStandard \u0026#x26; Poor's 500\u003c/td\u003e\n\u003ctd\u003eNasdaq-100\u003c/td\u003e\n\u003ctd\u003eDow Jones Industrial Average\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e구성 종목 수\u003c/td\u003e\n\u003ctd\u003e500개\u003c/td\u003e\n\u003ctd\u003e100개\u003c/td\u003e\n\u003ctd\u003e30개\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e가중 방식\u003c/td\u003e\n\u003ctd\u003e시가총액 가중\u003c/td\u003e\n\u003ctd\u003e시가총액 가중\u003c/td\u003e\n\u003ctd\u003e주가 가중 (특이)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e관리 기관\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P Dow Jones Indices\u003c/td\u003e\n\u003ctd\u003eNasdaq\u003c/td\u003e\n\u003ctd\u003eS\u0026#x26;P Dow Jones Indices\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e설립 연도\u003c/td\u003e\n\u003ctd\u003e1957년\u003c/td\u003e\n\u003ctd\u003e1985년\u003c/td\u003e\n\u003ctd\u003e1896년\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e포함 업종\u003c/td\u003e\n\u003ctd\u003e전 업종 (11개 섹터)\u003c/td\u003e\n\u003ctd\u003eIT·통신·소비재 중심 (금융 제외)\u003c/td\u003e\n\u003ctd\u003e전 업종 (대형 우량주)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e대표 종목\u003c/td\u003e\n\u003ctd\u003eAAPL, MSFT, NVDA, AMZN, GOOGL\u003c/td\u003e\n\u003ctd\u003eAAPL, MSFT, NVDA, AMZN, META\u003c/td\u003e\n\u003ctd\u003eAAPL, MSFT, Goldman Sachs, UnitedHealth\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e미국 시장 대표성\u003c/td\u003e\n\u003ctd\u003e★★★★★ (가장 대표적)\u003c/td\u003e\n\u003ctd\u003e★★★★ (기술주 대표)\u003c/td\u003e\n\u003ctd\u003e★★★ (전통적 상징성)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e주요 ETF\u003c/td\u003e\n\u003ctd\u003eSPY, VOO, IVV\u003c/td\u003e\n\u003ctd\u003eQQQ\u003c/td\u003e\n\u003ctd\u003eDIA\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e2-2. S\u0026#x26;P500 vs 나스닥100 장기 성과 비교\u003c/h3\u003e\n\u003cp\u003e실제 데이터로 두 지수의 장기 성과를 비교해보자.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[S\u0026#x26;P500 vs 나스닥100 수익률 비교]\u003c/span\u003e\n\n─── \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년 성과 (\u003cspan class=\"hljs-number\"\u003e2015\u003c/span\u003e → \u003cspan class=\"hljs-number\"\u003e2024\u003c/span\u003e, 개략치) ───────────────\n\n  S\u0026#x26;P500 (SPY)    나스닥\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e (QQQ)\n  ┌──────────┐    ┌───────────────┐\n  │ +\u003cspan class=\"hljs-number\"\u003e230%\u003c/span\u003e    │    │    +\u003cspan class=\"hljs-number\"\u003e420%\u003c/span\u003e      │\n  │ (연평균   │    │ (연평균 약 \u003cspan class=\"hljs-number\"\u003e18%\u003c/span\u003e)│\n  │ 약 \u003cspan class=\"hljs-number\"\u003e13%\u003c/span\u003e)  │    │               │\n  └──────────┘    └───────────────┘\n\n─── \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e년 성과 (\u003cspan class=\"hljs-number\"\u003e2005\u003c/span\u003e → \u003cspan class=\"hljs-number\"\u003e2024\u003c/span\u003e, 개략치) ───────────────\n\n  S\u0026#x26;P500 (SPY)    나스닥\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e (QQQ)\n  ┌──────────┐    ┌───────────────┐\n  │ +\u003cspan class=\"hljs-number\"\u003e550%\u003c/span\u003e    │    │   +\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e400%\u003c/span\u003e     │\n  │ (연평균   │    │ (연평균 약 \u003cspan class=\"hljs-number\"\u003e15%\u003c/span\u003e)│\n  │ 약 \u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e)  │    │               │\n  └──────────┘    └───────────────┘\n\n─── 주요 하락 구간 비교 ────────────────────────────\n\n  구간                 S\u0026#x26;P500    나스닥\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n  닷컴버블 (\u003cspan class=\"hljs-number\"\u003e2000\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e2002\u003c/span\u003e)  -\u003cspan class=\"hljs-number\"\u003e49%\u003c/span\u003e      -\u003cspan class=\"hljs-number\"\u003e83%\u003c/span\u003e\n  금융위기 (\u003cspan class=\"hljs-number\"\u003e2007\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e2009\u003c/span\u003e)  -\u003cspan class=\"hljs-number\"\u003e57%\u003c/span\u003e      -\u003cspan class=\"hljs-number\"\u003e54%\u003c/span\u003e\n  코로나 (\u003cspan class=\"hljs-number\"\u003e2020.2\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e)     -\u003cspan class=\"hljs-number\"\u003e34%\u003c/span\u003e      -\u003cspan class=\"hljs-number\"\u003e28%\u003c/span\u003e\n  긴축충격 (\u003cspan class=\"hljs-number\"\u003e2022\u003c/span\u003e)       -\u003cspan class=\"hljs-number\"\u003e19%\u003c/span\u003e      -\u003cspan class=\"hljs-number\"\u003e33%\u003c/span\u003e\n\n→ 나스닥은 상승폭도 크고, 하락폭도 훨씬 크다\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 포인트\u003c/strong\u003e: 나스닥100은 20년 장기로 보면 S\u0026#x26;P500보다 훨씬 높은 수익률을 기록했다. 하지만 2000~2002년 닷컴 버블 붕괴 때 -83% 하락했다. 변동성을 감당할 수 있는 투자자에게만 적합하다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e2-3. 역사적 연평균 수익률 정리\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e지수\u003c/th\u003e\n\u003cth\u003e10년 연평균 (배당 포함)\u003c/th\u003e\n\u003cth\u003e20년 연평균\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eS\u0026#x26;P 500\u003c/td\u003e\n\u003ctd\u003e약 13%\u003c/td\u003e\n\u003ctd\u003e약 10%\u003c/td\u003e\n\u003ctd\u003e가장 균형잡힌 수익률\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e나스닥 100\u003c/td\u003e\n\u003ctd\u003e약 18%\u003c/td\u003e\n\u003ctd\u003e약 15%\u003c/td\u003e\n\u003ctd\u003e높은 수익, 높은 변동성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e다우존스\u003c/td\u003e\n\u003ctd\u003e약 11%\u003c/td\u003e\n\u003ctd\u003e약 9%\u003c/td\u003e\n\u003ctd\u003e30개 우량주, 안정적\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e2-4. 시가총액 가중 방식 시각화\u003c/h3\u003e\n\u003cp\u003eS\u0026#x26;P500과 나스닥100은 \u003cstrong\u003e시가총액 가중\u003c/strong\u003e 방식으로 지수를 계산한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[S\u0026#x26;P 500 내 상위 7개 종목 비중 (2025년 기준, 개략치)]\u003c/span\u003e\n\n전체 \u003cspan class=\"hljs-selector-tag\"\u003eS\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e (\u003cspan class=\"hljs-number\"\u003e100%\u003c/span\u003e)\n┌─────────────────────────────────────────────────────┐\n│ \u003cspan class=\"hljs-selector-tag\"\u003eAAPL\u003c/span\u003e │ \u003cspan class=\"hljs-selector-tag\"\u003eMSFT\u003c/span\u003e │ \u003cspan class=\"hljs-selector-tag\"\u003eNVDA\u003c/span\u003e │ \u003cspan class=\"hljs-selector-tag\"\u003eAMZN\u003c/span\u003e │ \u003cspan class=\"hljs-selector-tag\"\u003eGOOGL\u003c/span\u003e│ \u003cspan class=\"hljs-selector-tag\"\u003eMETA\u003c/span\u003e │ \u003cspan class=\"hljs-selector-tag\"\u003eTSLA\u003c/span\u003e │나머지│\n│  \u003cspan class=\"hljs-number\"\u003e7%\u003c/span\u003e  │  \u003cspan class=\"hljs-number\"\u003e7%\u003c/span\u003e  │  \u003cspan class=\"hljs-number\"\u003e6%\u003c/span\u003e  │  \u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e  │  \u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e  │  \u003cspan class=\"hljs-number\"\u003e3%\u003c/span\u003e  │  \u003cspan class=\"hljs-number\"\u003e2%\u003c/span\u003e  │ \u003cspan class=\"hljs-number\"\u003e67%\u003c/span\u003e │\n└─────────────────────────────────────────────────────┘\n        ↑ 상위 \u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e개만으로 전체의 \u003cspan class=\"hljs-number\"\u003e33%\u003c/span\u003e 차지\n\n\u003cspan class=\"hljs-selector-attr\"\u003e[시가총액 가중 계산 원리]\u003c/span\u003e\n\n종목\u003cspan class=\"hljs-selector-tag\"\u003eA\u003c/span\u003e 시총: \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e조 달러  → 지수 비중 = \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e조 / 전체합 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n종목\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e 시총: \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e조 달러  → 지수 비중 = \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e조 / 전체합 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n종목\u003cspan class=\"hljs-selector-tag\"\u003eC\u003c/span\u003e 시총: \u003cspan class=\"hljs-number\"\u003e0.5\u003c/span\u003e조 달러 → 지수 비중 = \u003cspan class=\"hljs-number\"\u003e0.5\u003c/span\u003e조 / 전체합 × \u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e\n\n종목\u003cspan class=\"hljs-selector-tag\"\u003eA\u003c/span\u003e가 \u003cspan class=\"hljs-number\"\u003e5%\u003c/span\u003e 상승하면 지수에 미치는 영향:\n  \u003cspan class=\"hljs-number\"\u003e5%\u003c/span\u003e × \u003cspan class=\"hljs-number\"\u003e7%\u003c/span\u003e(비중) = +\u003cspan class=\"hljs-number\"\u003e0.35\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003ep\u003c/span\u003e 기여\n\n종목\u003cspan class=\"hljs-selector-tag\"\u003eC\u003c/span\u003e가 \u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e 상승해도:\n  \u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e × \u003cspan class=\"hljs-number\"\u003e0.5%\u003c/span\u003e(비중) = +\u003cspan class=\"hljs-number\"\u003e0.05\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003ep\u003c/span\u003e 기여\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-5. 다우존스의 독특한 주가 가중 방식\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[주가 가중 방식의 문제점]\n\nUnitedHealth (UNH) 주가: \u003cspan class=\"hljs-variable\"\u003e$500\u003c/span\u003e, 실제 시총: 약 \u003cspan class=\"hljs-variable\"\u003e$4\u003c/span\u003e,700억\nGoldman Sachs (GS)  주가: \u003cspan class=\"hljs-variable\"\u003e$470\u003c/span\u003e, 실제 시총: 약 \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,700억\nApple (AAPL)        주가: \u003cspan class=\"hljs-variable\"\u003e$200\u003c/span\u003e, 실제 시총: 약 \u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e조\n\n→ 다우 지수에서는 UNH ≈ GS \u003e AAPL 순서로 영향력\n→ 실제 시장 영향력은 AAPL \u003e\u003e UNH \u003e GS 순서\n\n이 때문에 다우존스는 \u003cspan class=\"hljs-string\"\u003e\"전통적 상징성\"\u003c/span\u003e은 있으나\n시장 대표 지수로서는 S\u0026#x26;P500이 더 정확하다고 평가받는다.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e투자자에게 가장 중요한 지수\u003c/strong\u003e: S\u0026#x26;P500. 미국 상위 500개 기업 전반을 포괄하며, 전 세계 기관투자자들이 벤치마크로 삼는 지수다. \"시장 수익률\"이라 하면 보통 S\u0026#x26;P500 수익률을 의미한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. GICS 11개 섹터 완전 정리\u003c/h2\u003e\n\u003cp\u003e**GICS(Global Industry Classification Standard)**는 S\u0026#x26;P와 MSCI가 공동으로 만든 산업 분류 체계다. 전 세계 주식을 11개 섹터로 분류한다.\u003c/p\u003e\n\u003cp\u003e섹터를 이해하면 \"지금 어느 분야에 돈이 몰리는가\", \"경기 사이클에 따라 어떤 섹터가 강세인가\"를 파악할 수 있다.\u003c/p\u003e\n\u003ch3\u003e3-1. 11개 섹터 × 대표 기업 3개 완전표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e#\u003c/th\u003e\n\u003cth\u003e섹터 (영문)\u003c/th\u003e\n\u003cth\u003e한국어\u003c/th\u003e\n\u003cth\u003e대표 기업 3개\u003c/th\u003e\n\u003cth\u003e경기 민감도\u003c/th\u003e\n\u003cth\u003e특징\u003c/th       \u003cspan class=\"hljs-number\"\u003e13\u003c/span\u003e%\n경기소비재   ██████████                 \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e%\n통신서비스   ████████                    \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e%\n산업재       ████████                    \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e%\n필수소비재   █████                       \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e%\n에너지       ████                        \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e%\n부동산       ██                          \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e%\n소재         ██                          \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e%\n유틸리티     ██                          \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e%\n            \u003cspan class=\"hljs-number\"\u003e0\u003c/span\u003e    \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e    \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e25\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e%\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3-3. 경기 사이클과 섹터 로테이션\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[경기 사이클에 따른 섹터 강세 패턴]\u003c/span\u003e\n\n경기 회복기 (Expansion)\n┌──────────────────────────────────────────┐\n│  강세: 경기소비재, 산업재, IT, 금융       │\n│  약세: 유틸리티, 필수소비재              │\n│  대표 종목: Amazon, Tesla, Boeing        │\n└──────────────────────────────────────────┘\n           ↓\n경기 호황기 (Peak)\n┌──────────────────────────────────────────┐\n│  강세: 에너지, 소재, IT                  │\n│  약세: 부동산, 유틸리티                  │\n│  대표 종목: ExxonMobil, Nvidia           │\n└──────────────────────────────────────────┘\n           ↓\n경기 침체기 (Recession)\n┌──────────────────────────────────────────┐\n│  강세: 필수소비재, 헬스케어, 유틸리티    │\n│  약세: 경기소비재, 금융, 산업재          │\n│  대표 종목: Coca-Cola, J\u0026#x26;J, Duke Energy  │\n└──────────────────────────────────────────┘\n           ↓\n경기 저점기 (Trough)\n┌──────────────────────────────────────────┐\n│  강세: 금융, IT (회복 선반영)            │\n│  약세: 에너지, 소재                      │\n│  대표 종목: JPMorgan, Microsoft          │\n└──────────────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 활용\u003c/strong\u003e: 섹터 ETF를 활용하면 특정 섹터에 집중 투자할 수 있다. XLK(IT), XLV(헬스케어), XLF(금융), XLE(에너지), XLP(필수소비재) 등이 대표적인 SPDR 섹터 ETF다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e3-4. 방어주 vs 공격주 구분\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[방어주 (Defensive) vs 공격주 (Cyclical)]\u003c/span\u003e\n\n방어주 (경기침체에 강함)           공격주 (경기회복에 강함)\n━━━━━━━━━━━━━━━━━━━━━           ━━━━━━━━━━━━━━━━━━━━━\n• 필수소비재 (Staples)              • IT/기술\n  Coca-Cola, \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e\u0026#x26;\u003cspan class=\"hljs-selector-tag\"\u003eG\u003c/span\u003e, Walmart          Apple, Nvidia, Microsoft\n\n• 헬스케어                         • 경기소비재 (Discretionary)\n  J\u0026#x26;J, Eli Lilly, UNH              Amazon, Tesla, Nike\n\n• 유틸리티                         • 금융\n  NextEra, Duke Energy             JPMorgan, Goldman Sachs\n\n특징: 배당 높음, 변동성 낮음        특징: 배당 낮음, 변동성 높음\n     경기 무관 수요                      경기 따라 실적 변동\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 시가총액 등급 — Mega cap부터 Micro cap까지\u003c/h2\u003e\n\u003cp\u003e시가총액(Market Capitalization = 주가 × 발행 주식 수)에 따라 기업을 분류하는 기준이 있다.\u003c/p\u003e\n\u003ch3\u003e4-1. 시가총액 등급 완전 비교표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e등급\u003c/th\u003e\n\u003cth\u003e시가총액 기준\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e리스크\u003c/th\u003e\n\u003cth\u003e대표 ETF\u003c/th\u003e\n\u003cth\u003e예시 기업\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eMega cap\u003c/td\u003e\n\u003ctd\u003e$2,000억+\u003c/td\u003e\n\u003ctd\u003e초대형 우량주. 안정성 최고. 변동성 낮음\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003eVOO, SPY\u003c/td\u003e\n\u003ctd\u003eApple, Microsoft, Nvidia\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eLarge cap\u003c/td\u003e\n\u003ctd\u003e$100억~$2,000억\u003c/td\u003e\n\u003ctd\u003e우량 대형주. S\u0026#x26;P500 대부분 해당\u003c/td\u003e\n\u003ctd\u003e낮음~중간\u003c/td\u003e\n\u003ctd\u003eSPY, VOO, IVV\u003c/td\u003e\n\u003ctd\u003eSalesforce, Adobe, Netflix\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMid cap\u003c/td\u003e\n\u003ctd\u003e$20억~$100억\u003c/td\u003e\n\u003ctd\u003e성장 잠재력과 안정성의 균형\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003eIJH, VO, MDY\u003c/td\u003e\n\u003ctd\u003eDatadog, Palantir(초기)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSmall cap\u003c/td\u003e\n\u003ctd\u003e$3억~$20억\u003c/td\u003e\n\u003ctd\u003e고성장 가능성, 높은 변동성\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003eIWM, VB, IJR\u003c/td\u003e\n\u003ctd\u003e성장 초기 기업들\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMicro cap\u003c/td\u003e\n\u003ctd\u003e$5,000만~$3억\u003c/td\u003e\n\u003ctd\u003e초기 기업, 리스크 매우 높음\u003c/td\u003e\n\u003ctd\u003e매우 높음\u003c/td\u003e\n\u003ctd\u003eIWC\u003c/td\u003e\n\u003ctd\u003e스타트업 수준 상장사\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eNano cap\u003c/td\u003e\n\u003ctd\u003e$5,000만 미만\u003c/td\u003e\n\u003ctd\u003e투기적 성격, 유동성 낮음\u003c/td\u003e\n\u003ctd\u003e극도로 높음\u003c/td\u003e\n\u003ctd\u003e거의 없음\u003c/td\u003e\n\u003ctd\u003e페니스탁 수준\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e4-2. 시총 등급별 특성 심층 비교\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[시가총액 등급별 투자 특성 비교]\n\n                Mega \u003cspan class=\"hljs-built_in\"\u003ecap\u003c/span\u003e    Large \u003cspan class=\"hljs-built_in\"\u003ecap\u003c/span\u003e   Mid \u003cspan class=\"hljs-built_in\"\u003ecap\u003c/span\u003e     Small \u003cspan class=\"hljs-built_in\"\u003ecap\u003c/span\u003e\n안정성          ★★★★★       ★★★★        ★★★         ★★\n성장 잠재력     ★★          ★★★         ★★★★        ★★★★★\n유동성          ★★★★★       ★★★★★       ★★★         ★★\n배당 수준       ★★★         ★★★         ★★          ★\n애널리스트 커버리지 ★★★★★   ★★★★        ★★★         ★★\n정보 접근성     ★★★★★       ★★★★        ★★★         ★★\n기관 투자 비중  90%+        70%+        50%+        30%+\n개인 발굴 기회  낮음        낮음        중간        높음\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e4-3. Magnificent 7 — 시장을 지배하는 메가캡 7총사\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[2024~2025년 기준 Magnificent 7 개요]\n\n┌──────────────────────────────────────────────────────────────┐\n│                    Magnificent 7                             │\n├──────────┬───────┬────────────┬──────────────────────────────┤\n│  기업명   │ 티커  │ 시총(개략)  │ 핵심 사업                    │\n├──────────┼───────┼────────────┼──────────────────────────────┤\n│ Apple    │ AAPL  │ ~\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e조      │ iPhone, Mac, 서비스 (30%+ 마진)│\n│ Microsoft│ MSFT  │ ~\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e조      │ Azure, Office, Copilot AI    │\n│ Nvidia   │ NVDA  │ ~\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e.5조    │ AI GPU H100/H200, CUDA생태계 │\n│ Alphabet │ GOOGL │ ~\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e조      │ Google 검색 91%점유, YouTube │\n│ Amazon   │ AMZN  │ ~\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e조      │ AWS 32%점유, 이커머스, 광고  │\n│ Meta     │ META  │ ~\u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.5조    │ Facebook+Instagram 30억 유저  │\n│ Tesla    │ TSLA  │ ~\u003cspan class=\"hljs-variable\"\u003e$0\u003c/span\u003e.8조    │ 전기차, FSD, 에너지 저장      │\n└──────────┴───────┴────────────┴──────────────────────────────┘\n\nS\u0026#x26;P500 전체 시총 대비 Magnificent 7 비중: 약 30~35%\n\n[시각화]\n전체 S\u0026#x26;P500 (500개 기업)\n████████████████████████████████░░░░░░░░░░░░░░░░░░░░░░░░░░░░\n←──────── Mag7 (30~35%) ─────────→←── 나머지 493개 기업 ──→\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e입문자 주의\u003c/strong\u003e: Mag7 비중이 높기 때문에 S\u0026#x26;P500 ETF를 샀다고 해서 \"500개 기업에 골고루 분산\"된 것은 아니다. 상위 10개 종목이 전체의 35% 이상을 차지한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 정규장·프리마켓·애프터마켓 — 시간외 거래 완전 가이드\u003c/h2\u003e\n\u003ch3\u003e5-1. 미국 주식 거래 시간 구조\u003c/h3\u003e\n\u003cp\u003e미국 주식시장의 하루는 세 구간으로 나뉜다. 정규장(Regular Hours)만이 아니라 개장 전 프리마켓(Pre-Market)과 장 후 애프터마켓(After-Hours)에도 거래가 가능하다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[미국 동부시간(ET) 기준 하루 거래 구조]\u003c/span\u003e\n\n  \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e AM ──────────────────── Pre-Market 시작\n              프리마켓\n              (Pre-Market)\n              • 유동성 낮음\n              • 실적 발표 반응\n              • 전문 투자자 중심\n  \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e AM ──────────────────── 정규장 개장 (Opening Bell)\n              정규장\n              (Regular Market)\n              • 유동성 최고\n              • 가장 좁은 스프레드\n              • 모든 주문 유형 가능\n  \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e PM ──────────────────── 정규장 마감 (Closing Bell)\n              애프터마켓\n              (After-Hours)\n              • 유동성 감소\n              • 실적 발표 반응\n              • 기업 발표 직후 반응\n  \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e PM ──────────────────── 애프터마켓 종료\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-2. 한국 투자자가 반드시 알아야 할 시간대 (ET → KST 변환)\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e⚠️ 주의사항\u003c/strong\u003e: 미국은 서머타임(DST, Daylight Saving Time)을 적용하므로 한국 시간이 계절에 따라 달라진다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch4\u003e서머타임 적용 기간 (3월 둘째 일요일 ~ 11월 첫째 일요일)\u003c/h4\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e[서머타임 기간 — 한국 시간(KST)]\n\n미국 ET          한국 KST\n─────────────    ─────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e4:00 AM  →  오후 5:00 PM  (프리마켓 시작)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e9:30 AM  →  오후 10:30 PM (정규장 개장) ★★★\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e4:00 PM  →  오전 5:00 AM  (정규장 마감) ★★★\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e8:00 PM  →  오전 9:00 AM  (애프터마켓 종료)\u003c/span\u003e\n\n→ 정규장: 한국 시간 밤 10:30 PM ~ 새벽 5:00 AM\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch4\u003e서머타임 미적용 기간 (11월 ~ 3월)\u003c/h4\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e[서머타임 없는 기간 — 한국 시간(KST)]\n\n미국 ET          한국 KST\n─────────────    ─────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e4:00 AM  →  오후 6:00 PM  (프리마켓 시작)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e9:30 AM  →  오후 11:30 PM (정규장 개장) ★★★\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e4:00 PM  →  오전 6:00 AM  (정규장 마감) ★★★\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e8:00 PM  →  오전 10:00 AM (애프터마켓 종료)\u003c/span\u003e\n\n→ 정규장: 한국 시간 밤 11:30 PM ~ 새벽 6:00 AM\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-3. 프리마켓 \u0026#x26; 애프터마켓 활용 전략\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[시간외 거래 특성 비교]\u003c/span\u003e\n\n                프리마켓          정규장          애프터마켓\n─────────────────────────────────────────────────────────\n거래 시간       \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e AM ET     \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e PM ET    \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e PM ET\n한국(서머타임)  오후 \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e시~\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003ePM 오후 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e~새벽\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e  새벽\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e~오전\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e\n유동성          낮음 (\u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e30%\u003c/span\u003e)    최고 (\u003cspan class=\"hljs-number\"\u003e100%\u003c/span\u003e)     중간 (\u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e50%\u003c/span\u003e)\n스프레드        넓음             좁음            중간\n주요 이벤트     경제 지표 발표   모든 뉴스        어닝 발표 (AMC)\n               (CPI, NFP 등)                    기업 발표문\n\n시간외 거래 시 주의사항:\n  ❌ 유동성 낮아 원하는 가격에 거래 어려움\n  ❌ 호가 스프레드 넓어 거래 비용 증가\n  ❌ 큰 뉴스 직후에는 가격 급등락 → 정규장에서 반전 자주 발생\n  ✅ 실적 발표 후 반응 미리 파악 가능\n  ✅ 뉴스에 빠르게 대응 가능\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-4. 실적 발표 타이밍과 한국 투자자 대응 전략\u003c/h3\u003e\n\u003cp\u003e미국 기업들은 실적을 크게 두 가지 타이밍에 발표한다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-section\"\u003e[실적 발표 타이밍 — BMO vs AMC]\u003c/span\u003e\n\nBMO (Before Market Open, 장 전 발표)\n  발표 시간: 오전 6:00~9:00 AM ET\n  한국 시간(서머타임): 오후 7:00~10:00 PM KST\n  대
