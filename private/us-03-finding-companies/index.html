s-number\"\u003e000\u003c/span\u003e개+ 미국 상장 종목\n                   │\n          ┌────────┴────────┐\n          │                 │\n       탑다운             바텀업\n   (매크로→섹터→종목)    (일상→기업→분석)\n          │                 │\n          └────────┬────────┘\n                   │\n           후보 \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e개 추출\n                   │\n           ┌───────┼───────┐\n           │       │       │\n        Finviz   Yahoo   Simply\n       스크리닝  Finance  Wall St\n           │       │       │\n           └───────┼───────┘\n                   │\n           \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e개 이하 압축\n                   │\n           ┌───────┼───────┐\n           │       │       │\n        레드플래그 SEC   Seeking\n         \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e개 체크 EDGAR  Alpha\n           │       │       │\n           └───────┼───────┘\n                   │\n           \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e개 워치리스트 등록\n                   │\n           매수 기준 충족 대기\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 종목 발굴 두 가지 접근법\u003c/h2\u003e\n\u003ch3\u003e1-1. 탑다운(Top-Down) 접근법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e큰 그림 → 섹터 → 개별 종목\u003c/strong\u003e 순서로 좁혀가는 방식이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[탑다운 분석 흐름도]\u003c/span\u003e\n\n매크로 환경 분석\n      │\n      ▼\n┌──────────────────────────────────────────────────┐\n│  거시 지표 파악                                    │\n│  - 금리 방향: 인상? 동결? 인하?                    │\n│  - 경제 성장률 (GDP 전망)                          │\n│  - 인플레이션 (CPI 추세)                           │\n│  - 주요 테마: AI 붐, 친환경, 바이오 혁신 등         │\n└──────────────────────────────────────────────────┘\n      │\n      ▼\n유망 섹터/테마 선정\n      │\n      ▼\n┌────────────── "hljs-string\"\u003eAI\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eGPU\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e시장\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e플레이어:\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e┌────────────────────────────────────────────────┐\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eNvidia (NVDA):\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eAI\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eGPU\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e시장\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e점유율\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e80\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%+\u003c/span\u003e         \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eAMD (AMD):\u003c/span\u003e     \u003cspan class=\"hljs-string\"\u003eGPU/CPU\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e통합,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e대안\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e공급업체\u003c/span\u003e     \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eIntel (INTC):\u003c/span\u003e  \u003cspan class=\"hljs-string\"\u003e데이터센터\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eCPU,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eAI\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e후발주자\u003c/span\u003e     \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eTSMC (TSM):\u003c/span\u003e    \u003cspan class=\"hljs-string\"\u003e파운드리,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e모든\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e칩\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e생산\u003c/span\u003e          \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e└────────────────────────────────────────────────┘\u003c/span\u003e\n\n\u003cspan class=\"hljs-string\"\u003eStep\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e.\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e심층\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e분석\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e대상\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e선정\u003c/span\u003e\n  \u003cspan class=\"hljs-attr\"\u003eNvidia:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eAI\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e가속기\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eH100/H200\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e독점적\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e지위\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eCUDA\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e생태계로\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e강력한\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e해자\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e형성\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e최종\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e선정\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e종목:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eNVDA\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1-2. 바텀업(Bottom-Up) 접근법\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e일상 경험 → 기업 발견 → 기업 분석\u003c/strong\u003e 순서로 진행하는 방식이다. 피터 린치(Peter Lynch)가 \"당신이 아는 것에 투자하라(Invest in What You Know)\"로 유명하게 만든 접근법이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[바텀업 발굴 경로 예시]\u003c/span\u003e\n\n일상 경험 관찰\n      │\n      ├── 마트에서 줄이 점점 길어지는 Costco\n      │       → Costco Wholesale (COST) 조사\n      │\n      ├── 스타벅스 앱으로 미리 주문하는 사람 급증\n      │       → Starbucks (SBUX) 조사\n      │\n      ├── 주변 모든 사람이 iPhone 쓰고, 앱스토어 결제\n      │       → Apple (AAPL) 조사\n      │\n      ├── Apple Pay, 삼성페이 등 간편결제 확산\n      │       → Visa (V), Mastercard (MA) 조사\n      │\n      ├── 지인이 Tesla 사서 \"충전비 거의 \u003cspan class=\"hljs-number\"\u003e0\u003c/span\u003e원\"이라 자랑\n      │       → Tesla (TSLA) 조사\n      │\n      └── 회사 동료가 \"AWS 없으면 서버 못 유지\"라고 말함\n              → Amazon (AMZN) 조사\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e탑다운 vs 바텀업\u003c/strong\u003e: 두 접근법은 대립이 아니라 상호 보완 관계다. 바텀업으로 관심 기업을 발견하고, 탑다운 관점에서 해당 섹터가 지금 좋은 환경인지 확인하는 방식으로 결합하면 더 효과적이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 실화 — Warren Buffett은 어떻게 Coca-Cola를 발굴했나\u003c/h2\u003e\n\u003cp\u003e이 스토리는 바텀업 투자의 교과서적 사례다.\u003c/p\u003e\n\u003ch3\u003e2-1. 발굴 배경 — 1988년 월스트리트의 공황\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[1987년 블랙 먼데이 이후 상황]\n\n1987년 10월 19일\n  - 다우존스 하루 -22.6% 폭락 (\u003cspan class=\"hljs-string\"\u003e\"블랙 먼데이\"\u003c/span\u003e)\n  - 역사상 단일 최대 하락폭\n  - 대부분 투자자: \u003cspan class=\"hljs-string\"\u003e\"이제 주식은 끝났다\"\u003c/span\u003e\n  - 공포 지수 폭등, 모든 우량주 폭락\n\n1988년 초 — 버핏의 결정:\n  버크셔 해서웨이, Coca-Cola 주식 대량 매수 시작\n  매수 가격: 주당 \u003cspan class=\"hljs-variable\"\u003e$5\u003c/span\u003e.22 (분할 조정 기준)\n  총 투자액: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e억 2,300만 (엄청난 금액)\n  버크셔 순자산 대비 약 25% 베팅\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-2. 버핏이 코카콜라에서 발견한 것들\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e[버핏의 코카콜라 분석 노트 — 재구성]\n\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 브랜드 파워 (전 세계 1등 음료 브랜드)\n   ─────────────────────────────────────\n   \"코카콜라 공장을 모두 불태워도\n\u003cspan class=\"hljs-code\"\u003e    Coca-Cola 브랜드와 레시피만 있으면\n    은행에서 돈을 빌려 다시 세울 수 있다\"\n   — 버핏의 실제 발언\n\u003c/span\u003e\n   정량 지표:\n   • 코카콜라 하루 판매량: 20억 잔+ (전 세계)\n   • 200개국 이상 판매\n   • 경쟁사(Pepsi)가 수십 년 도전해도 1위 유지\n\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 소비자 독점 (Consumer Monopoly)\n   ─────────────────────────────────────\n   • 음식점, 극장, 편의점 어디서나 Coke를 파는 이유:\n\u003cspan class=\"hljs-code\"\u003e     \"소비자가 원하기 때문\"\n   • 레시피 비밀 유지 100년+\n   • 전 세계 배급 네트워크 → 경쟁사 따라올 수 없음\n\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 탁월한 수익성 (ROE 30%+)\n   ─────────────────────────────────────\n   • 코카콜라는 설탕물에 브랜드를 팔아\n\u003cspan class=\"hljs-code\"\u003e     30%+ ROE를 유지\n   • 자본투자 거의 없이 현금 창출\n   • 매년 배당 증가 (배당 귀족주)\n\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e 이해하기 쉬운 사업\n   ─────────────────────────────────────\n   버핏의 원칙: \"내가 이해하지 못하는 사업엔 투자 안 함\"\n   → \"음료수 원액을 만들어 병입자에게 팔고\n\u003cspan class=\"hljs-code\"\u003e      소비자가 마신다\" — 완벽히 이해 가능\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-3. 결과 — 바텀업 투자의 완벽한 성공\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[버핏의 코카콜라 투자 성과]\n\n매수 기간: 1988~1989년\n평균 매수가: 주당 약 \u003cspan class=\"hljs-variable\"\u003e$5\u003c/span\u003e.22 (분할 조정)\n총 투자액: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e억 2,300만\n현재 보유 주식 수: 약 4억 주 (버크셔)\n\n2024년 기준:\n  현재 주가: 약 \u003cspan class=\"hljs-variable\"\u003e$60\u003c/span\u003e~65\n  배당 연간 수령액: 약 \u003cspan class=\"hljs-variable\"\u003e$7\u003c/span\u003e억 7,600만 (연간!)\n  투자원금 대비 배당 수익률: 75%/년\n\n가치 증가:\n  1988년: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e억 투자\n  2024년: 주식 가치 약 \u003cspan class=\"hljs-variable\"\u003e$250\u003c/span\u003e억+\n  → 36년간 약 24배 수익\n\n핵심 교훈:\n  \u003cspan class=\"hljs-string\"\u003e\"블랙 먼데이 공황\"\u003c/span\u003e 때 모든 사람이 팔 때,\n  버핏은 \u003cspan class=\"hljs-string\"\u003e\"좋은 기업이 싸게 나왔다\"\u003c/span\u003e고 판단하고 샀다.\n  바텀업 분석 → 사업 이해 → 공황에도 흔들리지 않는 신념\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 포인트\u003c/strong\u003e: 버핏은 코카콜라를 발굴하기 위해 복잡한 모델을 쓰지 않았다. 매일 마시는 음료수, 세계 어디서나 파는 음료수, 100년 넘은 브랜드 — 이 단순한 관찰에서 시작했다. 바텀업의 본질이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. Finviz 스크리너 실전 완전 가이드\u003c/h2\u003e\n\u003cp\u003e**Finviz(finviz.com)**는 미국 투자자들이 가장 많이 사용하는 무료 주식 스크리닝 도구다.\u003c/p\u003e\n\u003ch3\u003e3-1. Finviz 스크리너 접근 방법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[Finviz 화면 구성 — 단계별 사용법]\u003c/span\u003e\n\n\u003cspan class=\"hljs-selector-tag\"\u003efinviz\u003c/span\u003e\u003cspan class=\"hljs-selector-class\"\u003e.com\u003c/span\u003e 접속\n       │\n       ▼\n상단 메뉴 \"\u003cspan class=\"hljs-selector-tag\"\u003eScreener\u003c/span\u003e\" 클릭\n       │\n       ▼\n┌──────────────────────────────────────────────────────────┐\n│  탭 선택:                                                  │\n│  \u003cspan class=\"hljs-selector-attr\"\u003e[Descriptive]\u003c/span\u003e \u003cspan class=\"hljs-selector-attr\"\u003e[Fundamental]\u003c/span\u003e \u003cspan class=\"hljs-selector-attr\"\u003e[Technical]\u003c/span\u003e \u003cspan class=\"hljs-selector-attr\"\u003e[All]\u003c/span\u003e            │\n│                                                            │\n│  ┌──────────────────────────────────────────────────┐    │\n│  │  \u003cspan class=\"hljs-selector-tag\"\u003eDescriptive\u003c/span\u003e 탭: 기본 정보 필터                    │    │\n│  │  \u003cspan class=\"hljs-selector-tag\"\u003e-\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eExchange\u003c/span\u003e (NYSE/NASDAQ)                        │    │\n│  │  \u003cspan class=\"hljs-selector-tag\"\u003e-\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eMarket\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u00 │\n   │   (성장성)      (과거 실적)              │\n   │        ╲    ╱                           │\n   │         ★ Health                        │\n   │      (재무 건전성)                       │\n   │         │                               │\n   │        Dividends                        │\n   │         (배당)                          │\n   └─────────────────────────────────────────┘\n   → 각 꼭지점이 클수록 해당 영역 우수\n   → 한눈에 기업의 \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e개 차원 비교 가능\n\n\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e. 공정가치 추정 (Fair Value)\n   → 현재 주가 vs 추정 적정가치 비교\n   → \"\u003cspan class=\"hljs-number\"\u003e20%\u003c/span\u003e 저평가\", \"\u003cspan class=\"hljs-number\"\u003e35%\u003c/span\u003e 고평가\" 등 직관적 표시\n\n\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e. 위험 요소 자동 체크\n   → 재무 위험 자동 감지\n   → 예: \u003cspan class=\"hljs-string\"\u003e\"부채가 자기자본의 3배\"\u003c/span\u003e, \u003cspan class=\"hljs-string\"\u003e\"배당 커버리지 낮음\"\u003c/span\u003e\n\n\u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e. 경쟁사 자동 비교\n   → 동일 섹터 경쟁사 재무 지표 비교 테이블\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e4-2. Simply Wall St 활용 전략\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기능\u003c/th\u003e\n\u003cth\u003e활용 방법\u003c/th\u003e\n\u003cth\u003e장점\u003c/th\u003e\n\u003cth\u003e한계\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eSnowflake 다이어그램\u003c/td\u003e\n\u003ctd\u003e5개 차원 한눈에 비교\u003c/td\u003e\n\u003ctd\u003e직관적, 초보 친화적\u003c/td\u003e\n\u003ctd\u003e깊이 부족\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e공정가치 추정\u003c/td\u003e\n\u003ctd\u003e스크리닝 후 빠른 확인\u003c/td\u003e\n\u003ctd\u003e자동 계산\u003c/td\u003e\n\u003ctd\u003eDCF 가정 불투명\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e위험 요소 체크\u003c/td\u003e\n\u003ctd\u003e레드플래그 초기 발견\u003c/td\u003e\n\u003ctd\u003e빠른 스크리닝\u003c/td\u003e\n\u003ctd\u003eFalse positive 존재\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e경쟁사 비교\u003c/td\u003e\n\u003ctd\u003e동일 섹터 상대 평가\u003c/td\u003e\n\u003ctd\u003e빠른 벤치마킹\u003c/td\u003e\n\u003ctd\u003e섹터 선택이 중요\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e⚠️ 주의사항\u003c/strong\u003e: Simply Wall St의 공정가치 추정은 참고용이다. 실제 투자 결정에 맹신하면 안 된다. 어디까지나 \"첫 번째 필터\"로 활용하고, 반드시 SEC EDGAR 원본 자료로 검증해야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e5. Seeking Alpha — 심층 분석의 허브\u003c/h2\u003e\n\u003cp\u003e**Seeking Alpha(seekingalpha.com)**는 전문 투자자와 애널리스트들이 심층 분석 아티클을 올리는 플랫폼이다.\u003c/p\u003e\n\u003ch3\u003e5-1. Seeking Alpha 핵심 콘텐츠\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e[Seeking Alpha 주요 콘텐츠 유형]\n\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 분석 아티클 (Articles)\n   ─────────────────────────────────────────\n   • 전문 기고자(Pro Contributors)가 작성\n   • 종목별 심층 분석\n   • 장기 투자 아이디어 제시\n   무료: 월 10개까지 읽기 가능\n   유료(Premium): 월 $24~$29\n\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e Quant Rating 시스템\n   ─────────────────────────────────────────\n   • 알고리즘 기반 자동 평가\n   • Valuation / Growth / Profitability /\n\u003cspan class=\"hljs-code\"\u003e     Momentum / Revision 5개 영역 점수화\n   • Strong Buy / Buy / Hold / Sell / Strong Sell\n\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 어닝 분석 \u0026#x26; 트랜스크립트\n   ─────────────────────────────────────────\n   • 실적 발표 후 빠른 요약\n   • 어닝 콜 전체 내용 무료 열람\n   → CEO가 직접 한 말을 읽을 수 있음\n\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e 배당 분석\n   ─────────────────────────────────────────\n   • 배당 지속 가능성 분석\n   • 배당 히스토리 시각화\n   • 배당 삭감 위험 경고\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-2. Seeking Alpha Quant Rating 활용법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[Seeking Alpha Quant Rating 해석]\u003c/span\u003e\n\n예시: -tag\"\u003eBuy\u003c/span\u003e (\u003cspan class=\"hljs-number\"\u003e4.1\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e)\n\n해석:\n  → 밸류에이션은 비싸지만 (D+)\n  → 성장성, 수익성이 탁월해서 (A+)\n  → 종합 \u003cspan class=\"hljs-selector-tag\"\u003eBuy\u003c/span\u003e 등급\n\n→ \u003cspan class=\"hljs-selector-tag\"\u003eValuation\u003c/span\u003e 낮음 = 이미 비쌈 → 매수 타이밍 주의\n→ \u003cspan class=\"hljs-selector-tag\"\u003eProfitability\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eA\u003c/span\u003e+ = 사업 자체는 탁월\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-3. Seeking Alpha 무료 vs 유료 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기능\u003c/th\u003e\n\u003cth\u003e무료\u003c/th\u003e\n\u003cth\u003e프리미엄 ($24/월)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e아티클 읽기\u003c/td\u003e\n\u003ctd\u003e월 10개\u003c/td\u003e\n\u003ctd\u003e무제한\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eQuant Rating\u003c/td\u003e\n\u003ctd\u003e기본\u003c/td\u003e\n\u003ctd\u003e상세 + 필터링\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e어닝 트랜스크립트\u003c/td\u003e\n\u003ctd\u003e무료\u003c/td\u003e\n\u003ctd\u003e무료\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e포트폴리오 추적\u003c/td\u003e\n\u003ctd\u003e제한적\u003c/td\u003e\n\u003ctd\u003e전체\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e뉴스 알림\u003c/td\u003e\n\u003ctd\u003e기본\u003c/td\u003e\n\u003ctd\u003e고급 필터\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e6. Motley Fool — 장기 성장주 발굴의 보고\u003c/h2\u003e\n\u003cp\u003e**Motley Fool(fool.com)**은 장기 성장주 투자에 특화된 투자 미디어다. 창업자 Tom Gardner와 David Gardner가 1993년 설립했다.\u003c/p\u003e\n\u003ch3\u003e6-1. Motley Fool 주요 서비스\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[Motley Fool 서비스 라인업]\n\n1. Stock Advisor (유료, 연 \u003cspan class=\"hljs-variable\"\u003e$199\u003c/span\u003e)\n   ─────────────────────────────────────────\n   • 매월 2개의 \u003cspan class=\"hljs-string\"\u003e\"Best Buy\"\u003c/span\u003e 종목 추천\n   • 누적 수익률: 창립 이래 S\u0026#x26;P500 대비 4~5배 이상 성과\n   • 대표 추천 종목: Netflix(2004), Amazon(2002), Tesla(2012)\n\n   성과 예시:\n   • Amazon 2002년 추천 (\u003cspan class=\"hljs-variable\"\u003e$15\u003c/span\u003e) → 2024년 \u003cspan class=\"hljs-variable\"\u003e$185\u003c/span\u003e+ → 12배+\n   • Netflix 2004년 추천 (\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e) → 2024년 \u003cspan class=\"hljs-variable\"\u003e$650\u003c/span\u003e+ → 200배+\n\n2. 무료 콘텐츠 (fool.com)\n   ─────────────────────────────────────────\n   • 일간 종목 분석 기사\n   • \u003cspan class=\"hljs-string\"\u003e\"Why I Bought [종목명]\"\u003c/span\u003e 시리즈\n   • 기업 실적 요약\n   • 초보자 투자 교육\n\n3. Rule Breakers (유료)\n   ─────────────────────────────────────────\n   • 고성장·파괴적 혁신 기업 발굴 특화\n   • 더 높은 위험, 더 높은 수익 추구\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6-2. Motley Fool 활용 전략 (무료)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e[Motley Fool 무료 활용 방법]\n\n\u003cspan class=\"hljs-section\"\u003e1단계: fool.com 접속\u003c/span\u003e\n   → 검색창에 관심 종목명 입력 (예: \u003cspan class=\"hljs-string\"\u003e\"Apple\"\u003c/span\u003e)\n\n\u003cspan class=\"hljs-section\"\u003e2단계: 최신 분석 기사 읽기\u003c/span\u003e\n   → \u003cspan class=\"hljs-string\"\u003e\"Is Apple Stock a Buy Right Now?\"\u003c/span\u003e 류의 기사\n   → 작성자의 주요 논리와 리스크 파악\n\n\u003cspan class=\"hljs-section\"\u003e3단계: 커뮤니티 Discussion 확인\u003c/span\u003e\n   → 다른 투자자들의 의견 교차 검증\n\n\u003cspan class=\"hljs-section\"\u003e4단계: \"5 Companies...\" 시리즈 참고\u003c/span\u003e\n   → \u003cspan class=\"hljs-string\"\u003e\"Top 5 AI Stocks to Buy Now\"\u003c/span\u003e 등\n   → 아이디어 발굴용으로만 활용\n   → ⚠️ 무조건 따르지 말고 자체 분석 필수\n\n핵심 활용법:\n  Motley Fool = 아이디어 발굴의 도구\n  자체 분석 = 반드시 직접 수행해야 함\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e7. SEC EDGAR에서 10-K 찾는 법 (단계별)\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003e10-K\u003c/strong\u003e는 미국 기업이 매년 SEC(증권거래위원회)에 제출하는 연간 보고서다.\u003c/p\u003e\n\u003ch3\u003e7-1. EDGAR 실전 가이드\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-vbnet\"\u003e[Apple(AAPL) \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e-K 찾는 실전 과정]\n\n\u003cspan class=\"hljs-keyword\"\u003eStep\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e. sec.gov/edgar 접속\n\n\u003cspan class=\"hljs-keyword\"\u003eStep\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e. 회사 검색\n   → \u003cspan class=\"hljs-string\"\u003e\"Company Search\"\u003c/span\u003e → \u003cspan class=\"hljs-string\"\u003e\"Apple Inc\"\u003c/span\u003e 입력\n   → CIK 번호로 검색 (Apple CIK: \u003cspan class=\"hljs-number\"\u003e0000320193\u003c/span\u003e)\n\n\u003cspan class=\"hljs-keyword\"\u003eStep\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e. 공시 필터링\n   ┌────────────────────────────────────────────┐\n   │ Filing Type: \u003cspan class=\"hljs-string\"\u003e\"10-K\"\u003c/span\u003e 입력 후 Search 클릭    │\n   │ → 연도별 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e-K 목록 표시                    │\n   └────────────────────────────────────────────┘\n\n\u003cspan class=\"hljs-keyword\"\u003eStep\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e. 최신 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e-K 열기\n   → 가장 최근 날짜 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e-K 클릭\n   → Documents 탭 → \u003cspan class=\"hljs-string\"\u003e\"10-K\"\u003c/span\u003e 링크 클릭\n\n\u003cspan class=\"hljs-keyword\"\u003eStep\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e. 핵심 섹션 찾기\n   ┌────────────────────────────────────────────┐\n   │ Item \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e.   Business        → 사업 개요      │\n   │ Item \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003eA.  Risk Factors    → 위험 요소      │\n   │
