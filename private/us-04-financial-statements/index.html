ljs-number\"\u003e90\u003c/span\u003eB+         м•„м§Ғ м—ҶмқҢ\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n\nм–ҙл–Ө нҲ¬мһҗмһҗм—җкІҢ?\nApple:    м•Ҳм •м Ғ мҲҳмқөкіј мЈјмЈј нҷҳмӣҗмқ„ мӣҗн•ҳлҠ” ліҙмҲҳм Ғ нҲ¬мһҗмһҗ\nPalantir: AI/лҚ°мқҙн„° л¶„м•јмқҳ м„ұмһҘм—җ л°°нҢ…н•ҳлҠ” кіөкІ©м Ғ нҲ¬мһҗмһҗ\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e7. мһ¬л¬ҙм ңн‘ң н•Ём • вҖ” мқҙлҹ° кё°м—… мЎ°мӢ¬н•ҳлқј\u003c/h2\u003e\n\u003ch3\u003eрҹҡЁ л Ҳл“ң н”Ңлһҳк·ё 10к°Җм§Җ\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e мҲңмқҙмқөмқҖ мҰқк°Җн•ҳлҠ”лҚ° FCFлҠ” к°җмҶҢ\n   вҶ’ нҡҢкі„мғҒ мқҙмқөмқ„ л¶Җн’ҖлҰҙ к°ҖлҠҘм„ұ (мҲҳмқө мЎ°кё° мқёмӢқ л“ұ)\n\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e мһ¬кі к°Җ л§Өм¶ңліҙлӢӨ л№ лҘҙкІҢ мҰқк°Җ\n   вҶ’ л¬јкұҙмқҙ м•Ҳ нҢ”лҰ¬кі  мһҲлҠ” мӢ нҳё\n\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e л§Өм¶ңмұ„к¶Ңмқҙ л§Өм¶ңліҙлӢӨ л№ лҘҙкІҢ мҰқк°Җ\n   вҶ’ нҳ„кёҲмқ„ лӘ» л°ӣкі  мһҲкұ°лӮҳ кіөкІ©м Ғ нҡҢкі„ мІҳлҰ¬\n\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e л°ҳліөм Ғмқё \"мқјнҡҢм„ұ л№„мҡ©\" мІҳлҰ¬\n   вҶ’ л§Өл…„ мқјнҡҢм„ұ мҶҗмӢӨмқҙ лӮҳмҳӨл©ҙ мӮ¬мӢӨмғҒ мқјмғҒм Ғ л№„мҡ©\n\n\u003cspan class=\"hljs-bullet\"\u003e5.\u003c/span\u003e к°җмӮ¬ мқҳкІ¬м—җ \"кі„мҶҚкё°м—… кҙҖл Ё мӨ‘мҡ”н•ң л¶Ҳнҷ•мӢӨм„ұ\"\n   вҶ’ нҡҢмӮ¬к°Җ л§қн•  мҲҳлҸ„ мһҲлӢӨлҠ” лң»\n\n\u003cspan class=\"hljs-bullet\"\u003e6.\u003c/span\u003e мһ„мӣҗмқҳ м§ҖмҶҚм Ғ мЈјмӢқ л§ӨлҸ„\n   вҶ’ лӮҙл¶Җмһҗл“Өмқҙ лҜёлһҳлҘј л¶Җм •м ҒмңјлЎң ліёлӢӨлҠ” мӢ нҳё\n\n\u003cspan class=\"hljs-bullet\"\u003e7.\u003c/span\u003e л¶Җмұ„к°Җ кёүкІ©нһҲ мҰқк°Җн•ҳл©ҙм„ң FCFлҠ” м •мІҙ\n   вҶ’ л№ҡмңјлЎң м„ұмһҘмқ„ мң м§Җн•ҳлҠ” кө¬мЎ°\n\n\u003cspan class=\"hljs-bullet\"\u003e8.\u003c/span\u003e м—¬лҹ¬ лІҲмқҳ CFO/CEO көҗмІҙ\n   вҶ’ лӮҙл¶Җ л¬ём ңк°Җ мһҲмқ„ к°ҖлҠҘм„ұ\n\n\u003cspan class=\"hljs-bullet\"\u003e9.\u003c/span\u003e к°җмӮ¬лІ•мқё көҗмІҙ\n   вҶ’ мқҙм „ к°җмӮ¬лІ•мқёкіј мқҳкІ¬ м¶©лҸҢ к°ҖлҠҘм„ұ\n\n\u003cspan class=\"hljs-bullet\"\u003e10.\u003c/span\u003e кҙҖл Ё лӢ№мӮ¬мһҗ кұ°лһҳк°Җ л§ҺмқҢ (Related Party Transactions)\n\u003cspan class=\"hljs-code\"\u003e    вҶ’ мҳӨл„Ҳ мқјк°ҖмҷҖмқҳ л¶ҲнҲ¬лӘ…н•ң кұ°лһҳ к°ҖлҠҘм„ұ\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003eм •лҰ¬ вҖ” мһ¬л¬ҙм ңн‘ң мқҪкё° н•ҷмҠө лЎңл“ңл§ө\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003eмһ¬л¬ҙм ңн‘ң л¶„м„қ м—ӯлҹү н–ҘмғҒ лӢЁкі„\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nStep 1: Yahoo Financeм—җм„ң кҙҖмӢ¬ кё°м—…мқҳ 5л…„ л§Өм¶ң/мқҙмқө м¶”м„ё нҷ•мқё\n\u003cspan class=\"hljs-code\"\u003e        (30л¶„ нҲ¬мһҗ, л°”лЎң мӢңмһ‘ к°ҖлҠҘ)\n\u003c/span\u003e\nStep 2: н•ҙлӢ№ кё°м—…мқҳ кІҪмҹҒмӮ¬ 1-2к°ңмҷҖ мЈјмҡ” м§Җн‘ң л№„көҗ\n\u003cspan class=\"hljs-code\"\u003e        (лҲ„к°Җ лҚ” нҡЁмңЁм Ғмқёк°Җ?)\n\u003c/span\u003e\nStep 3: SEC EDGARм—җм„ң 10-K к°ңмҡ” м„№м…ҳ мқҪкё°\n\u003cspan class=\"hljs-code\"\u003e        (лҰ¬мҠӨнҒ¬ мҡ”мқёкіј мӮ¬м—… лӘЁлҚё нҢҢм•…)\n\u003c/span\u003e\nStep 4: FCF 5л…„ м¶”м„ё м§Ғм ‘ кі„мӮ°н•ҙліҙкё°\n\u003cspan class=\"hljs-code\"\u003e        (мҳҒм—…нҳ„кёҲнқҗлҰ„ - CAPEX)\n\u003c/span\u003e\nStep 5: м•һм„ң л°°мҡҙ л°ёлҘҳм—җмқҙм…ҳ м§Җн‘ң(5нҺё)мҷҖ м—°кІ°н•ҙм„ң л¶„м„қ\n\u003cspan class=\"hljs-code\"\u003e        (FCF кё°л°ҳ DCF кі„мӮ°)\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp
