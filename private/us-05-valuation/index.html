pan class=\"hljs-string\"\u003e이후\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e년간\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e이익이\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e아무리\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e좋아도\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e주가는\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e하락할\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e수밖에\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e없었다\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 교훈\u003c/strong\u003e: 밸류에이션을 모르고 사면 좋은 기업에서도 큰 손해를 볼 수 있다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e[밸류에이션 지표 전체 지도]\n\n                  기업 가치 평가 도구\n                         │\n         ┌───────────────┼───────────────┐\n         │               │               │\n     이익 기반        매출 기반        자산 기반\n         │               │               │\n    ┌────┴────┐      ┌────┴────┐     ┌───┴───┐\n    │    │   │      │         │     │       │\n   \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e  PEG EV\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003e    PSR      DCF    P\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003eB   EV\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003eSales\n       EBITDA\n         │\n    ┌────┴────┐\n    │         │\n \u003cspan class=\"hljs-keyword\"\u003eTrailing\u003c/span\u003e  Forward\n   \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e       \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e1. PER (Price-to-Earnings Ratio) 완전 정리\u003c/h2\u003e\n\u003ch3\u003e1-1. 기본 계산법과 의미\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePER\u003c/span\u003e = 주가 ÷ 주당순이익(EPS)\n\n예시) Apple 2024년\n  주가: $185\n  EPS: $6.43\n  \u003cspan class=\"hljs-attr\"\u003ePER\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e185\u003c/span\u003e ÷ \u003cspan class=\"hljs-number\"\u003e6.43\u003c/span\u003e ≈ \u003cspan class=\"hljs-number\"\u003e28.8\u003c/span\u003e배\n\n의미: \"현재 이익 기준으로 주가를 회수하는 데 28.8년 소요\"\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1-2. 섹터별 평균 PER (2024년 기준)\u003c/h3\u003e\n\u003cp\u003e섹터마다 적정 PER 범위가 다르다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e섹터\u003c/th\u003e\n\u003cth\u003e평균 PER\u003c/th\u003e\n\u003cth\u003e왜 이 수준인가\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eIT (정보기술)\u003c/td\u003e\n\u003ctd\u003e28~35배\u003c/td\u003e\n\u003ctd\u003e고성장, 높은 마진, 미래 기대감\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e헬스케어\u003c/td\u003e\n\u003ctd\u003e22~28배\u003c/td\u003e\n\u003ctd\u003e안정 성장, 방어적 특성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e통신서비스\u003c/td\u003e\n\u003ctd\u003e20~28배\u003c/td\u003e\n\u003ctd\u003e광고+구독 혼합, 성장 기대\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소비재 (필수)\u003c/td\u003e\n\u003ctd\u003e18~24배\u003c/td\u003e\n\u003ctd\u003e경기 방어주, 안정적\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소비재 (임의)\u003c/td\u003e\n\u003ctd\u003e20~30배\u003c/td\u003e\n\u003ctd\u003e경기 민감, 변동성 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금융\u003c/td\u003e\n\u003ctd\u003e10~15배\u003c/td\u003e\n\u003ctd\u003e규제 산업, 성장 제한\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유틸리티\u003c/td\u003e\n\u003ctd\u003e14~18배\u003c/td\u003e\n\u003ctd\u003e배당 중심, 저성장\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e에너지\u003c/td\u003e\n\u003ctd\u003e8~14배\u003c/td\u003e\n\u003ctd\u003e원자재 의존, 사이클 산업\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e부동산(REITs)\u003c/td\u003e\n\u003ctd\u003e20~35배\u003c/td\u003e\n\u003ctd\u003eP/FFO로 보는 게 더 정확\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 포인트\u003c/strong\u003e: 금융주 PER 12배는 \"싸다\"고 볼 수 있지만, IT주 PER 12배는 \"뭔가 문제가 있는 것 아닌가?\" 의심해야 한다. PER은 반드시 같은 섹터 내에서 비교해야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e1-3. Trailing PER vs Forward PER\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e정의\u003c/th\u003e\n\u003cth\u003e장점\u003c/th\u003e\n\u003cth\u003e단점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eTrailing PER\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e과거 12개월 실제 EPS 기준\u003c/td\u003e\n\u003ctd\u003e확정된 수치, 신뢰성 높음\u003c/td\u003e\n\u003ctd\u003e과거 데이터, 미래 반영 불가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eForward PER\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e향후 12개월 예상 EPS 기준\u003c/td\u003e\n\u003ctd\u003e미래 성장성 반영\u003c/td\u003e\n\u003ctd\u003e애널리스트 추정, 빗나갈 수 있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e[\u003cspan class=\"hljs-keyword\"\u003eTrailing\u003c/span\u003e vs Forward \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 비교 실전 예시]\n\nNvidia (NVDA) \u003cspan class=\"hljs-number\"\u003e2024\u003c/span\u003e년 초\n  주가: $\u003cspan class=\"hljs-number\"\u003e490\u003c/span\u003e\n  최근 \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e개월 EPS: $\u003cspan class=\"hljs-number\"\u003e12.96\u003c/span\u003e\n  \u003cspan class=\"hljs-keyword\"\u003eTrailing\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-operator\"\u003e=\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e490\u003c/span\u003e ÷ \u003cspan class=\"hljs-number\"\u003e12.96\u003c/span\u003e ≈ \u003cspan class=\"hljs-number\"\u003e37.8\u003c/span\u003e배\n\n  향후 \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e개월 예상 EPS: $\u003cspan class=\"hljs-number\"\u003e24.58\u003c/span\u003e (AI 수요 급증 반영)\n  Forward \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-operator\"\u003e=\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e490\u003c/span\u003e ÷ \u003cspan class=\"hljs-number\"\u003e24.58\u003c/span\u003e ≈ \u003cspan class=\"hljs-number\"\u003e19.9\u003c/span\u003e배\n\n→ \u003cspan class=\"hljs-keyword\"\u003eTrailing\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e37.8\u003c/span\u003e배 \u003cspan class=\"hljs-operator\"\u003e=\u003c/span\u003e 비싸 보임\n→ Forward \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e19.9\u003c/span\u003e배 \u003cspan class=\"hljs-operator\"\u003e=\u003c/span\u003e 성장 감안하면 합리적\n\n빠르게 성장하는 기업일수록\n\u003cspan class=\"hljs-keyword\"\u003eTrailing\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e과 Forward \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 사이 차이가 크다.\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1-4. Apple PER 2020~2024 추이 분석\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e연도\u003c/th\u003e\n\u003cth\u003e주가 (연말)\u003c/th\u003e\n\u003cth\u003eEPS\u003c/th\u003e\n\u003cth\u003eTrailing PER\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2020\u003c/td\u003e\n\u003ctd\u003e$132\u003c/td\u003e\n\u003ctd\u003e$3.28\u003c/td\u003e\n\u003ctd\u003e40.2배\u003c/td\u003e\n\u003ctd\u003e코로나 회복 기대감\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2021\u003c/td\u003e\n\u003ctd\u003e$178\u003c/td\u003e\n\u003ctd\u003e$5.61\u003c/td\u003e\n\u003ctd\u003e31.7배\u003c/td\u003e\n\u003ctd\u003e실적 개선으로 PER 정상화\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022\u003c/td\u003e\n\u003ctd\u003e$130\u003c/td\u003e\n\u003ctd\u003e$6.11\u003c/td\u003e\n\u003ctd\u003e21.3배\u003c/td\u003e\n\u003ctd\u003e금리 인상 → 밸류에이션 압박\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023\u003c/td\u003e\n\u003ctd\u003e$193\u003c/td\u003e\n\u003ctd\u003e$6.13\u003c/td\u003e\n\u003ctd\u003e31.5배\u003c/td\u003e\n\u003ctd\u003eAI 기대감 반영\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2024\u003c/td\u003e\n\u003ctd\u003e$185\u003c/td\u003e\n\u003ctd\u003e$6.43\u003c/td\u003e\n\u003ctd\u003e28.8배\u003c/td\u003e\n\u003ctd\u003e성장 둔화 우려 반영\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e투자 시사점\u003c/strong\u003e: 2022년 말 PER 21배가 Apple 5년 최저였다. 당시 매수했다면 이후 50% 수익 가능했다. PER 추이를 이해하면 상대적으로 저렴한 구간을 파악할 수 있다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. PEG Ratio — \"성장을 감안한 PER\"\u003c/h2\u003e\n\u003ch3\u003e2-1. PEG 계산법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003ePEG\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e=\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e÷\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e연간\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eEPS\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e성장률(%)\u003c/span\u003e\n\n\u003cspan class=\"hljs-string\"\u003ePEG\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e\u0026#x3C;\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003e1.0:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e저평가\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(성장\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e대비\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e싸다)\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003ePEG\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1.0\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e~\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003e1.5:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e적정\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e평가\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003ePEG\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1.5\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e~\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003e2.5:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e약간\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e고평가\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003ePEG\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e\u003e\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003e2.5:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e고평가\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e주의\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-2. 왜 성장주에 PEG가 필요한가\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e┌──────────────────────────────────────────────────────────┐\n│                    두 기업 비교                           │\n│                                                          │\n│  기업 A (전통 제조업)      기업 B (고성장 테크)           │\n│  PER: 10배                PER: 40배                     │\n│  연간 성장률: 5%           연간 성장률: 35%              │\n│  \u003cspan class=\"hljs-attr\"\u003ePEG\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e÷\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e2.0\u003c/span\u003e        PEG = \u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e÷\u003cspan class=\"hljs-number\"\u003e35\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e1.14\u003c/span\u003e            │\n│                                                          │\n│  → PER만 보면 A가 훨씬 싸 보인다                         │\n│  → PEG로 보면 B가 성장 대비 더 합리적 가격               │\n│                                                          │\n│  10년 후 예상 이익:                                       │\n│  A: $100 × (1.05)^\u003cspan class=\"hljs-attr\"\u003e10\u003c/span\u003e = \u003cspan class=\"hljs-variable\"\u003e$163\u003c/span\u003e (\u003cspan class=\"hljs-number\"\u003e1.6\u003c/span\u003e배)                    │\n│  B: $100 × (1.35)^\u003cspan class=\"hljs-attr\"\u003e10\u003c/span\u003e = \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e058\u003c/span\u003e (\u003cspan class=\"hljs-number\"\u003e20.6\u003c/span\u003e배)                 │\n└──────────────────────────────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-3. 빅테크 PEG 비교표 (2024년 기준)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기업\u003c/th\u003e\n\u003cth\u003ePER\u003c/th\u003e\n\u003cth\u003eEPS 성장률\u003c/th\u003e\n\u003cth\u003ePEG\u003c/th\u003e\n\u003cth\u003e평가\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eNvidia (NVDA)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e65배\u003c/td\u003e\n\u003ctd\u003e120%+\u003c/td\u003e\n\u003ctd\u003e0.54\u003c/td\u003e\n\u003ctd\u003e성장 감안 시 저평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMeta (META)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e26배\u003c/td\u003e\n\u003ctd\u003e20%+\u003c/td\u003e\n\u003ctd\u003e1.3\u003c/td\u003e\n\u003ctd\u003e적정 평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eAlphabet (GOOGL)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e24배\u003c/td\u003e\n\u003ctd\u003e17%+\u003c/td\u003e\n\u003ctd\u003e1.4\u003c/td\u003e\n\u003ctd\u003e적정 평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMicrosoft (MSFT)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e35배\u003c/td\u003e\n\u003ctd\u003e15%\u003c/td\u003e\n\u003ctd\u003e2.3\u003c/td\u003e\n\u003ctd\u003e약간 고평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eApple (AAPL)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e29배\u003c/td\u003e\n\u003ctd\u003e8%\u003c/td\u003e\n\u003ctd\u003e3.6\u003c/td\u003e\n\u003ctd\u003e성장 대비 고평가\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eJohnson \u0026#x26; Johnson\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e15배\u003c/td\u003e\n\u003ctd\u003e4%\u003c/td\u003e\n\u003ctd\u003e3.75\u003c/td\u003e\n\u003ctd\u003e성장 없이 PER만 낮음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eExxon Mobil (XOM)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e12배\u003c/td\u003e\n\u003ctd\u003e2%\u003c/td\u003e\n\u003ctd\u003e6.0\u003c/td\u003e\n\u003ctd\u003e성장 없는 저PER\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 포인트\u003c/strong\u003e: 2024년 Nvidia는 PER만 보면 65배로 엄청나게 비싸 보였지만, AI 수요로 인한 폭발적 성장을 감안하면 PEG 0.54로 오히려 저평가 구간이었다. PEG가 성장주 분석의 핵심인 이유다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. EV/EBITDA — 부채까지 고려한 기업 가치\u003c/h2\u003e\n\u003ch3\u003e3-1. EV/EBITDA가 필요한 이유\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[PER의 한계 — 부채를 무시한다]\n\n기업 A: 시총 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e억, 순이익 \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e억, 부채 \u003cspan class=\"hljs-variable\"\u003e$0\u003c/span\u003e\n기업 B: 시총 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e억, 순이익 \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e억, 부채 \u003cspan class=\"hljs-variable\"\u003e$80\u003c/span\u003e억\n\nPER로 보면: 둘 다 10배로 동일 → 비교 불가\nEV/EBITDA로 보면:\n  기업 A: EV = \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e억, EBITDA = \u003cspan class=\"hljs-variable\"\u003e$12\u003c/span\u003e억, EV/EBITDA = 8.3배\n  기업 B: EV = \u003cspan class=\"hljs-variable\"\u003e$180\u003c/span\u003e억, EBITDA = \u003cspan class=\"hljs-variable\"\u003e$12\u003c/span\u003e억, EV/EBITDA = 15배\n         (부채 \u003cspan class=\"hljs-variable\"\u003e$80\u003c/span\u003e억 포함)\n  → 기업 B가 훨씬 비싸다는 것이 드러남\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3-2. EV/EBITDA 계산\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003eEV (기업가치) = 시가총액 + 순부채(부채 - 현금)\n\n\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = 이자·세금·감가상각 차감 전 이익\n       = 영업이익 + 감가상각비(D\u0026#x26;A)\n\nEV/\u003cspan class=\"hljs-attr\"\u003eEBITDA\u003c/span\u003e = EV ÷ EBITDA\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3-3. Amazon — EV/EBITDA가 필수인 이유\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003eAmazon (AMZN) 2022년 사례\n────────────────────────────────────────\nTrailing PER: 적자에 가까움 (또는 수백 배)\nEV/EBITDA: 20~25배\n\n이유:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e Amazon은 물류·AWS 인프라에 천문학적 CAPEX 투자\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 감가상각비가 순이익을 압도적으로 잠식\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 실제 영업 현금창출력(EBITDA)은 탄탄하지만\n\u003cspan class=\"hljs-code\"\u003e    PER만 보면 상장 불가능해 보이는 수준\n\u003c/span\u003e\n결론:\n  Amazon 같은 CAPEX 집약적 기업은\n  PER이 아닌 EV/EBITDA 또는 FCF(자유현금흐름)로 평가해야\n  실제 가치를 파악할 수 있다\n────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3-4. 섹터별 적정 EV/EBITDA\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e섹터\u003c/th\u003e\n\u003cth\u003e적정 EV/EBITDA\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eSaaS/클라우드 소프트웨어\u003c/td\u003e\n\u003ctd\u003e20~40배\u003c/td\u003e\n\u003ctd\u003e고마진, 반복 수익\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e테크 하드웨어\u003c/td\u003e\n\u003ctd\u003e15~25배\u003c/td\u003e\n\u003ctd\u003e사이클 존재\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e헬스케어\u003c/td\u003e\n\u003ctd\u003e15~25배\u003c/td\u003e\n\u003ctd\u003e안정적 마진\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e소비재\u003c/td\u003e\n\u003ctd\u003e12~18배\u003c/td\u003e\n\u003ctd\u003e브랜드 기업\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e통신\u003c/td\u003e\n\u003ctd\u003e6~10배\u003c/td\u003e\n\u003ctd\u003e부채 많음, 저성장\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e에너지\u003c/td\u003e\n\u003ctd\u003e5~8배\u003c/td\u003e\n\u003ctd\u003e원자재 의존\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유틸리티\u003c/td\u003e\n\u003ctd\u003e8~12배\u003c/td\u003e\n\u003ctd\u003e규제 수익 구조\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e4. PSR (Price-to-Sales Ratio) — 적자 기업의 구원투수\u003c/h2\u003e\n\u003ch3\u003e4-1. 언제 PSR을 쓰는가\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-attr\"\u003ePSR\u003c/span\u003e = 시가총액 ÷ 연간 매출액\n\n사용 조건:\n  ✓ 이익이 없는(적자) 초기 성장 기업\n  ✓ 이익은 있지만 극히 적어 PER이 수백 배인 기업\n  ✓ 사업 초기라 이익보다 매출 성장이 더 중요한 기업\n\n예시: Airbnb 상장 초기 (2020~2021)\n  연간 매출: $3.4B (회복 중)\n  순손실: -$1.6B\n  시가총액: $85B\n  PER → 계산 불가 (적자)\n  \u003cspan class=\"hljs-attr\"\u003ePSR\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e85\u003c/span\u003eB ÷ \u003cspan class=\"hljs-number\"\u003e3.4\u003c/span\u003eB = \u003cspan class=\"hljs-number\"\u003e25\u003c/span\u003e배\n  → 고성장 플랫폼 기업 PSR 20~30배 범위 내 → 비교 가능\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e4-2. PSR 섹터별 기준\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e섹터\u003c/th\u003e\n\u003cth\u003e적정 PSR\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eSaaS/클라우드 소프트웨어\u003c/td\u003e\n\u003ctd\u003e8~20배\u003c/td\u003e\n\u003ctd\u003e높은 마진율 정당화\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e반도체\u003c/td\u003e\n\u003ctd\u003e6~12배\u003c/td\u003e\n\u003ctd\u003e사이클 존재, 변동 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e바이오테크 (적자)\u003c/td\u003e\n\u003ctd\u003e5~15배\u003c/td\u003e\n\u003ctd\u003e파이프라인 가치 포함\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e전통 소매업\u003c/td\u003e\n\u003ctd\u003e0.3~1배\u003c/td\u003e\n\u003ctd\u003e박리다매, 저마진\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e에너지\u003c/td\u003e\n\u003ctd\u003e0.5~1.5배\u003c/td\u003e\n\u003ctd\u003e원자재 매출 규모 큼\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e4-3. PSR의 함정 — 마진과 함께 봐야 한다\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-section\"\u003e[PSR 함정 사례]\u003c/span\u003e\n\n회사 A: PSR 3배, 매출총이익률(Gross Margin) 70%\n  → 고마진 SaaS 기업 → 3배 \u003cspan class=\"hljs-attr\"\u003ePSR\u003c/span\u003e = 저렴\n  → 이익으로 전환 가능성 높음\n\n회사 B: PSR 3배, 매출총이익률 10%\n  → 저마진 리테일 기업 → 3배 \u003cspan class=\"hljs-attr\"\u003ePSR\u003c/span\u003e = 매우 비쌈\n  → 이익 창출 가능성 낮음\n\n\u003cspan class=\"hljs-section\"\u003e[PSR + Gross Margin 조합 분석]\u003c/span\u003e\n\n  SaaS 기업 (Gross Margin 70%+)\n  PSR ≤ 10배 → 저평가 가능성\n  PSR 15~25배 → 적정 (고성장 전제)\n  PSR 30배+ → 고평가 주의\n\n  리테일/에너지 (Gross Margin 20% 미만)\n  PSR ≤ 0.5배 → 저평가 가능성\n  PSR 1배+ → 고평가\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e⚠️ 주의사항\u003c/strong\u003e: PSR은 수익성을 무시한다. 매출이 아무리 높아도 영원히 적자인 기업은 결국 자금이 소진된다. PSR은 반드시 Gross Margin, 현금 소진율(Burn Rate)과 함께 봐야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e5. P/B (Price-to-Book) — 자산 가치 대비 주가\u003c/h2\u003e\n\u003ch3\u003e5-1. P/B 계산과 의미\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-css\"\u003e\u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e = 주가 ÷ 주당 순자산(BPS)\n\n또는\n\n\u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e = 시가총액 ÷ 자기자본(Book Value)\n\n\u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e배 = 주가가 순자산과 동일\n\u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e배 미만 = 순자산보다 싸게 거래 (자산주)\n\u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e 높음 = 시장이 자산 이상의 가치를 인정\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-2. P/B는 언제 유용한가\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[P/B 활용이 유효한 섹터]\u003c/span\u003e\n\n적합한 섹터:\n  ✓ 금융 (은행, 보험): 자산이 수익의 핵심\n    \u003cspan class=\"hljs-selector-tag\"\u003eJPMorgan\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e: \u003cspan class=\"hljs-number\"\u003e1.8\u003c/span\u003e배 (\u003cspan class=\"hljs-number\"\u003e2024\u003c/span\u003e년)\n    \u003cspan class=\"hljs-selector-tag\"\u003eBank\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eof\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eAmerica\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e: \u003cspan class=\"hljs-number\"\u003e1.1\u003c/span\u003e배\n    → 금융주에서 \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1.0\u003c/span\u003e 이하면 저평가 신호\n\n  ✓ 부동산 (REITs): 실물 자산 중심\n  ✓ 소재/에너지: 유형 자산 보유\n\n적합하지 않은 섹터:\n  ✗ \u003cspan class=\"hljs-selector-tag\"\u003eIT\u003c/span\u003e/소프트웨어: 자산이 주로 무형자산 (브랜드, 특허)\n    \u003cspan class=\"hljs-selector-tag\"\u003eApple\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e: \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e배+ (자사주 매입으로 자본 작음)\n    \u003cspan class=\"hljs-selector-tag\"\u003eMicrosoft\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e: \u003cspan class=\"hljs-number\"\u003e13\u003c/span\u003e배\n    → \u003cspan class=\"hljs-selector-tag\"\u003eIT\u003c/span\u003e기업 \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e는 높아도 정상, 의미가 낮음\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-3. P/B 실전 사례 — 금융 위기 시 활용\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[2008~2009 금융위기 때 P/B 활용]\u003c/span\u003e\n\n\u003cspan class=\"hljs-number\"\u003e2009\u003c/span\u003e년 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 (금융위기 저점)\n  \u003cspan class=\"hljs-selector-tag\"\u003eBank\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eof\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eAmerica\u003c/span\u003e: \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.2\u003c/span\u003e배\n  \u003cspan class=\"hljs-selector-tag\"\u003eCitigroup\u003c/span\u003e: \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.3\u003c/span\u003e배\n  \u003cspan class=\"hljs-selector-tag\"\u003eJPMorgan\u003c/span\u003e: \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e0.6\u003c/span\u003e배\n\n의미: 시장이 이 은행들이 파산할 거라 생각\n      순자산의 \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e60%\u003c/span\u003e로 거래\n\n결과: 파산하지 않고 회복 →\n  \u003cspan class=\"hljs-selector-tag\"\u003eBank\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eof\u003c/span\u003e \u003cspan class=\"hljs-selector-tag\"\u003eAmerica\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e년 후 주가 \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e배\n  \u003cspan class=\"hljs-selector-tag\"\u003eJPMorgan\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e년 후 주가 \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e배\n\n교훈:\n  위기 때 \u003cspan class=\"hljs-selector-tag\"\u003eP\u003c/span\u003e/\u003cspan class=\"hljs-selector-tag\"\u003eB\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e배 미만은 강력한 저평가 신호\n  단, 파산하지 않는다는 전제가 필수\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e6. DCF (현금흐름 할인법) — 본질적 가치 계산\u003c/h2\u003e\n\u003ch3\u003e6-1. DCF 개념 이해\u003c/h3\u003e\n\u003cp\u003eDCF(Discounted Cash Flow)는 \u003cstrong\u003e기업이 미래에 창출할 모든 현금흐름을 현재가치로 할인\u003c/strong\u003e하여 주식의 내재가치를 계산하는 방법이다. 이론적으로 가장 정확하지만, 가정에 따라 결과가 크게 달라진다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e\u003cspan class=\"hljs-section\"\u003e[DCF의 핵심 원리]\u003c/span\u003e\n\n오늘의 $100 \u003e 1년 후의 $100\n\n왜?\n  오늘 $100을 투자하면 1년 후 $110이 된다 (10% 수익률 가정)\n  → 1년 후의 $\u003cspan class=\"hljs-attr\"\u003e110\u003c/span\u003e = 오늘의 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e (현재가치)\n  → 1년 후의 $\u003cspan class=\"hljs-attr\"\u003e100\u003c/span\u003e = 오늘의 \u003cspan class=\"hljs-variable\"\u003e$90\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e (현재가치)\n\n수식:\n  \u003cspan class=\"hljs-attr\"\u003ePV\u003c/span\u003e = FCF₁/(\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e+r)¹ + FCF₂/(\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e+r)² + ... + FCFₙ/(\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e+r)ⁿ\n\n  PV: 현재가치 (적정 주가 × 주식 수)\n  FCF: 자유현금흐름 (영업현금흐름 - 설비투자)\n  r: 할인율 (가중평균자본비용, WACC)\n  n: 예측 기간 (보통 5~10년)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6-2. Apple DCF 간이 계산 실습\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[Apple 5년 간이 DCF 계산 (교육 목적)]\n\n기본 데이터 (2024년 기준):\n  현재 FCF: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억 (연간 약 \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억 내외)\n  예상 FCF 성장률: 연 10% (서비스 성장 반영)\n  할인율(r): 9% (WACC 추정)\n  터미널 성장률: 3% (장기 성장)\n  발행 주식 수: 약 153억 주\n\n5년 FCF 예측:\n  Year 1: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억 × 1.10¹ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,100억\n  Year 2: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억 × 1.10² = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,210억\n  Year 3: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억 × 1.10³ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,331억\n  Year 4: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억 × 1.10⁴ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,464억\n  Year 5: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억 × 1.10⁵ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,611억\n\n현재가치로 할인 (r=9%):\n  Year 1: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,100억 / 1.09¹ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,009억\n  Year 2: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,210억 / 1.09² = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,019억\n  Year 3: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,331억 / 1.09³ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,028억\n  Year 4: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,464억 / 1.09⁴ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,037억\n  Year 5: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,611억 / 1.09⁵ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,047억\n  5년 FCF 합계: \u003cspan class=\"hljs-variable\"\u003e$5\u003c/span\u003e,140억\n\n터미널 가치 (5년 이후 모든 현금흐름):\n  TV = FCF₅ × (1+g) / (r-g)\n     = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,611억 × 1.03 / (0.09-0.03)\n     = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,659억 / 0.06\n     = \u003cspan class=\"hljs-variable\"\u003e$27\u003c/span\u003e,650억\n\n터미널 가치 현재가치:\n  TV_PV = \u003cspan class=\"hljs-variable\"\u003e$27\u003c/span\u003e,650억 / 1.09⁵ = \u003cspan class=\"hljs-variable\"\u003e$17\u003c/span\u003e,978억\n\n기업 내재가치 = \u003cspan class=\"hljs-variable\"\u003e$5\u003c/span\u003e,140억 + \u003cspan class=\"hljs-variable\"\u003e$17\u003c/span\u003e,978억 = \u003cspan class=\"hljs-variable\"\u003e$23\u003c/span\u003e,118억\n주당 내재가치 = \u003cspan class=\"hljs-variable\"\u003e$23\u003c/span\u003e,118억 / 153억 주 = \u003cspan class=\"hljs-variable\"\u003e$151\u003c/span\u003e\n\n※ 2024년 실제 주가 \u003cspan class=\"hljs-variable\"\u003e$185\u003c/span\u003e → DCF 기준 약 22% 고평가\n※ 단, 성장률을 12%로 올리면 \u003cspan class=\"hljs-variable\"\u003e$190\u003c/span\u003e+ 나옴 → 가정이 핵심\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e⚠️ 주의사항\u003c/strong\u003e: DCF는 가정에 매우 민감하다. 성장률 1% 변화, 할인율 0.5% 변화가 결과를 20~30% 바꿀 수 있다. DCF는 \"정확한 답\"이 아니라 \"합리적인 범위\"를 제시하는 도구로 활용해야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e6-3. DCF를 간편하게 역산하는 법\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e[역DCF — \u003cspan class=\"hljs-string\"\u003e\"이 주가는 얼마의 성장을 가정하는가\"\u003c/span\u003e]\n\n역DCF 질문: \u003cspan class=\"hljs-string\"\u003e\"현재 주가가 정당화되려면 몇 % 성장이 필요한가?\"\u003c/span\u003e\n\nApple 예시:\n  현재 주가: \u003cspan class=\"hljs-variable\"\u003e$185\u003c/span\u003e\n  현재 FCF: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000억\n  할인율: 9%, 터미널 성장률: 3%\n\n  역산 결과:\n  → \u003cspan class=\"hljs-variable\"\u003e$185\u003c/span\u003e를 정당화하려면 연 FCF 성장률 12% 필요\n  → \u003cspan class=\"hljs-string\"\u003e\"Apple이 앞으로 5년간 매년 12% FCF 성장 가능한가?\"\u003c/span\u003e\n  → 이것이 YES/NO의 판단 문제가 된다\n\n  Nvidia 예시:\n  현재 주가: \u003cspan class=\"hljs-variable\"\u003e$800\u003c/span\u003e (2024년 고점 기준)\n  → 역산 결과: 연 40%+ FCF 성장 필요\n  → \u003cspan class=\"hljs-string\"\u003e\"AI 수요가 계속 폭발적으로 성장하면 가능\"\u003c/span\u003e\n  → 이것이 AI 프리미엄 논쟁의 핵심\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e7. Nvidia 2024년 PER 급등과 AI 프리미엄 분석\u003c/h2\u003e\n\u003ch3\u003e7-1. Nvidia PER의 놀라운 변화\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e[Nvidia \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 변화 타임라인]\n\n\u003cspan class=\"hljs-number\"\u003e2019\u003c/span\u003e년: \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e~\u003c/span\u003e\u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e배 (게이밍 GPU 기업)\n\u003cspan class=\"hljs-number\"\u003e2020\u003c/span\u003e년: \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e~\u003c/span\u003e\u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e배 (데이터센터 성장 기대)\n\u003cspan class=\"hljs-number\"\u003e2022\u003c/span\u003e년: \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e배 (금리 인상, 반도체 침체)\n\u003cspan class=\"hljs-number\"\u003e2023\u003c/span\u003e년 초: \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e배 (AI 붐 시작)\n\u003cspan class=\"hljs-number\"\u003e2023\u003c/span\u003e년 중반: \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e배\u003cspan class=\"hljs-operator\"\u003e+\u003c/span\u003e (ChatGPT 이후 폭발)\n\u003cspan class=\"hljs-number\"\u003e2024\u003c/span\u003e년: \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e~\u003c/span\u003e\u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e배 (이익 폭증으로 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 정상화)\n         ↑\n         이익이 너무 빠르게 늘어서 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e이 다시 낮아짐\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e7-2. Nvidia AI 프리미엄이 정당화되는 이유\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e[\u003cspan class=\"hljs-string\"\u003eNvidia\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e이익\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e성장\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e속도\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e—\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e전례\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e없는\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e수준\u003c/span\u003e]\n\n\u003cspan class=\"hljs-string\"\u003e분기별\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eEPS\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e추이:\u003c/span\u003e\n  \u003cspan class=\"hljs-attr\"\u003e2023 Q1:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e$0.88\u003c/span\u003e\n  \u003cspan class=\"hljs-attr\"\u003e2023 Q2:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e$2.70\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(+207%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eYoY)\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e—\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eAI\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e수요\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e폭발\u003c/span\u003e\n  \u003cspan cl ss=\"hljs-number\"\u003e2021\u003c/span\u003e년):\n  Tesla \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e배\n  ✗ 성장률이 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e에 한참 못 미침 (PEG \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e+\u003c/span\u003e)\n  ✗ 이미 모든 낙관론이 반영됨\n  ✗ 경쟁사 전기차 진입 가속화\n  → 결과: 이후 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e년간 \u003cspan class=\"hljs-number\"\u003e-73\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e%\u003c/span\u003e 폭락\n\n사도 되는 고\u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e (\u003cspan class=\"hljs-number\"\u003e2023\u003c/span\u003e년):\n  Nvidia \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e65\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e~\u003c/span\u003e\u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e배\n  ✓ AI GPU 독점 \u003cspan class=\"hljs-number\"\u003e80\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e%\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e+\u003c/span\u003e\n  ✓ EPS 성장 \u003cspan class=\"hljs-number\"\u003e120\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e%\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e+\u003c/span\u003e → PEG \u003cspan class=\"hljs-operator\"\u003e\u0026#x3C;\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e\n  ✓ CUDA 생태계 대체 불가\n  ✓ 데이터센터 TAM 수백 조 원 규모\n  → 결과: 이후 \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e년간 주가 \u003cspan class=\"hljs-number\"\u003e400\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e%\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e+\u003c/span\u003e 상승\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 실전 빅테크 밸류에이션 완전 비교표 (2024년 기준)\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u0  결합\n\n\u003cspan class=\"hljs-section\"\u003eApple: ROE 160%+ 압도적 자본 효율성\u003c/span\u003e\n → 자사주 매입으로 자기자본 감소 + 높은 이익\n → 성장은 느리지만 주주환원 최강\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e10. 밸류에이션 3대 함정\u003c/h2\u003e\n\u003ch3\u003e함정 1 — 저PER 함정 (Value Trap)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e저PER 함정 예시\n\n기업: 미국 대형 백화점 체인 (Macy's, M)\nPER: 5배 (엄청나게 싸 보임!)\n\n하지만:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 이커머스에 시장 점유율 계속 빼앗김\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 매출과 이익이 매년 감소 추세\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 부채 증가, 점포 폐쇄 가속화\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e PER 5배에 샀는데 이익이 반으로 줄면\n\u003cspan class=\"hljs-code\"\u003e    실제로는 PER 10배에 산 셈\n\u003c/span\u003e\n결과: 주가 계속 하락 → \"저PER 함정\"\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e교훈\u003c/strong\u003e: PER이 낮은 이유가 \"시장이 놓쳤기 때문\"인지, \"진짜 구조적 문제가 있기 때문\"인지 반드시 확인해야 한다.\u003c/p\u003e\n\u003ch3\u003e함정 2 — 섹터 간 비교 실수\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e❌ 잘못된 비교\n\"JP \u003cspan class=\"hljs-built_in\"\u003eMorgan\u003c/span\u003e(금융) PER \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e배 vs Apple PER \u003cspan class=\"hljs-number\"\u003e29\u003c/span\u003e배\n → JP Morgan이 훨씬 싸다!\"\n\n이건 사과와 오렌지를 비교하는 것\n\n✅ 올바른 비교\nJP Morgan vs Bank of America vs Wells Fargo\n(같은 은행 섹터 내 비교)\n\nApple vs Microsoft vs Google\n(같은 빅테크 섹터 내 비교)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e함정 3 — 일회성 이익 착시\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e일회성 이익으로 PER이 낮아 보이는 경우:\n\n기업: XYZ Corp\n올해 순이익: \u003cspan class=\"hljs-variable\"\u003e$5\u003c/span\u003e억 (매우 좋아 보임)\n주가: \u003cspan class=\"hljs-variable\"\u003e$50\u003c/span\u003e, EPS: \u003cspan class=\"hljs-variable\"\u003e$5\u003c/span\u003e, PER = 10배 (저렴해 보임!)\n\n그런데:\n  정상 영업이익: \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e억\n  공장 매각 이익 (일회성): \u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e억\n  ──────────────────────────\n  총 순이익: \u003cspan class=\"hljs-variable\"\u003e$5\u003c/span\u003e억\n\n조정 EPS: \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e (일회성 제거)\n조정 PER: \u003cspan class=\"hljs-variable\"\u003e$50\u003c/span\u003e ÷ \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e = 25배 (전혀 싸지 않음)\n\n확인 방법:\n  → Non-GAAP EPS (조정 EPS) vs GAAP EPS 비교\n  → 일회성 항목을 제거한 \u003cspan class=\"hljs-string\"\u003e\"정상 이익\"\u003c/span\u003e 기준 분석\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e11. 실전 밸류에이션 체크리스트 (8개 항목)\u003c/h2\u003e\n\u003cp\u003e투자 결정 전 반드시 이 8개 항목을 체크하자.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e[밸류에이션 최종 체크리스트]\n\n체크 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e: 섹터 대비 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 위치는?\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ 해당 섹터 평균 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 확인\n□ 현재 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e이 섹터 평균의 몇 배인가?\n□ 그 차이를 정당화할 근거가 있는가?\n\n체크 \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e: PEG로 성장 감안 시 합리적인가?\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ PEG \u003cspan class=\"hljs-number\"\u003e1.5\u003c/span\u003e 이하: 성장 대비 합리적\n□ PEG \u003cspan class=\"hljs-number\"\u003e2.5\u003c/span\u003e 이상: 고평가 주의\n□ EPS 성장률이 지속 가능한가?\n\n체크 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e: \u003cspan class=\"hljs-keyword\"\u003eTrailing\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e vs Forward \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 차이는?\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ Forward \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e이 크게 낮으면 이익 급증 기대\n□ 그 기대가 현실적인가?\n□ 애널리스트 컨센서스 EPS 성장률 확인\n\n체크 \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e: 부채가 많다면 EV\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003eEBITDA 확인\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ Debt\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003eEBITDA \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e배 이상이면 위험\n□ EV\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003eEBITDA가 섹터 평균 내에 있는가?\n□ 현금흐름으로 이자 충분히 감당 가능한가?\n\n체크 \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e: FCF(자유현금흐름)가 이익과 일치하는가?\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ FCF \u003cspan class=\"hljs-operator\"\u003e=\u003c/span\u003e 영업현금흐름 \u003cspan class=\"hljs-operator\"\u003e-\u003c/span\u003e CAPEX\n□ FCF가 순이익의 \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e\u003cspan class=\"hljs-operator\"\u003e%\u003c/span\u003e 이상인가?\n□ FCF 마진이 개선 중인가?\n\n체크 \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e: 역사적 밸류에이션 범위 내에 있는가?\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ 최근 \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e년 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 최고\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003e최저\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003e평균 확인\n□ 현재 \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e이 역사적 범위의 어디에 있나?\n□ 과거 고\u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e 시기와 현재 차이점은?\n\n체크 \u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e: 경쟁사 대비 밸류에이션은?\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ 동일 섹터 경쟁사 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e개 이상 비교\n□ 프리미엄이 붙어 있다면 그 이유는?\n□ 경쟁사 대비 성장률·수익성 우위 확인\n\n체크 \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e: \"지금 사야 하는가, 기다려야 하는가\"\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n□ DCF 기준 내재가치 대비 현재가 위치\n□ 분할 매수 계획 수립 여부\n□ 시장 환경 (VIX, 금리 방향) 고려\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e12. 밸류에이션 실전 5단계 워크플로우\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e[밸류에이션 분석 5단계]\n\n\u003cspan class=\"hljs-section\"\u003e1단계: 섹터 확인\u003c/span\u003e\n  → 해당 섹터의 평균 PER/EV/EBITDA 파악\n  → 경기 사이클에서 이 섹터의 위치\n\n\u003cspan class=\"hljs-section\"\u003e2단계: PER 체크\u003c/span\u003e\n  → Trailing PER이 섹터 평균보다 높은가 낮은가?\n  → Forward PER과의 차이 (성장 기대치 확인)\n\n\u003cspan class=\"hljs-section\"\u003e3단계: 성장성 확인\u003c/span\u003e\n  → PEG \u0026#x3C; 1.5 이하인가?\n  → EPS 성장률의 질(매출 성장 vs 비용 절감) 확인\n\n\u003cspan class=\"hljs-section\"\u003e4단계: 재무 건전성\u003c/span\u003e\n  → 부채 많으면 EV/EBITDA로 재확인\n  → FCF가 순이익과 함께 증가하는가?\n\n\u003cspan class=\"hljs-section\"\u003e5단계: 경쟁사 비교\u003c/span\u003e\n  → 동일 섹터 내 최소 3개 기업과 비교\n  → 고평가라면 그 이유(해자·성장)가 명확한가?\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e마무리 — 밸류에이션은 과학이 아닌 예술\u003c/h2\u003e\n\u003cp\u003e밸류에이션 지표들은 \"이 주가가 싼지 비싼지\"를 판단하는 \u003cstrong\u003e도구\u003c/strong\u003e다. 절대적 답이 아니다.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePER 5배도 함정일 수 있고 (가치 함정)\u003c/li\u003e\n\u003cli\u003ePER 100배도 정당화될 수 있다 (고성장 + 해자)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e중요한 것은 \u003cstrong\u003e왜 이 밸류에이션인가\u003c/strong\u003e를 이해하는 것이다. 그 \"왜\"를 찾는 여정이 바로 투자 분석의 본질이다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-selector-attr\"\u003e[밸류에이션 핵심 공식]\u003c/span\u003e\n\n합리적 투자 =\n  현재 밸류에이션 지표 분석\n  + 미래 성장성 예측 (PEG, DCF)\n  + 경제적 해자 강도 평가\n  + 섹터/거시 환경 고려\n\n절대 하지 말아야 할 것:\n  ✗ \u003cspan class=\"hljs-string\"\u003e\"이미 많이 올랐으니 비쌀 것\"\u003c/span\u003e (전제 없는 판단)\n  ✗ \u003cspan class=\"hljs-string\"\u003e\"PER이 낮으니 싸다\"\u003c/span\u003e (섹터 무시)\n  ✗ \u003cspan class=\"hljs-string\"\u003e\"유명한 회사니까 괜찮겠지\"\u003c/span\u003e (분석 생략)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e다음 편에서는 이 밸류에이션이 정당화되는 조건, 즉 **성장성과 경제적 해자(Economic Moat)**를 깊이 파헤쳐보자.\u003c/p\u003e\n\u003chr\u003e\n\u003cblockquote\u003e\n\u003cp\u003e이 글의 수치는 2024년 기준 추정치이며, 실제 투자 결정 전 최신 데이터를 반드시 확인하세요.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":
