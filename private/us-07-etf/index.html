──────────────────────────────────────────────────────\n일반 주식형 펀드 (액티브)        ETF (패시브)\n──────────────────────────────────────────────────────────────\n매니저가 종목 선택               지수를 그대로 추종\n연 수수료 1-2%                   연 수수료 0.03-0.2%\n장 마감 기준 1회 거래            장중 실시간 거래 가능\n과거 10년: 80%+ 가 지수 못 이김  지수 수익률 그대로 획득\n──────────────────────────────────────────────────────────────\n수수료 차이의 복리 효과 (30년, 연 8% 수익 가정, 초기 \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000):\n  수수료 0.03%: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 → \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e,107  (+900%)\n  수수료 1.50%: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 →  \u003cspan class=\"hljs-variable\"\u003e$59\u003c/span\u003e,083  (+491%)\n  차이: \u003cspan class=\"hljs-variable\"\u003e$41\u003c/span\u003e,024 (ETF가 40% 더 많이 번다)\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e1. ETF란 무엇인가\u003c/h2\u003e\n\u003ch3\u003e1-1. ETF 구조\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eETF (Exchange Traded Fund) 구조\n────────────────────────────────────────────────────────────────────\n\n  투자자가 VOO를 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e주 산다\n           ↓\n  VOO \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e주 = S\u0026#x26;P500 \u003cspan class=\"hljs-number\"\u003e503\u003c/span\u003e개 기업 주식을 모두 조금씩 보유\n           ↓\n  ┌─────────────────────────────────────────────────────┐\n  │  Apple \u003cspan class=\"hljs-number\"\u003e7%\u003c/span\u003e  Microsoft \u003cspan class=\"hljs-number\"\u003e6.5%\u003c/span\u003e  Nvidia \u003cspan class=\"hljs-number\"\u003e6%\u003c/span\u003e  Amazon \u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e   │\n  │  Google \u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e Meta \u003cspan class=\"hljs-number\"\u003e2.5%\u003c/span\u003e  Berkshire \u003cspan class=\"hljs-number\"\u003e1.8%\u003c/span\u003e Visa \u003cspan class=\"hljs-number\"\u003e1.4%\u003c/span\u003e    │\n  │  ... (\u003cspan class=\"hljs-number\"\u003e490\u003c/span\u003e개 이상의 기업 나머지 비중)                │\n  └─────────────────────────────────────────────────────┘\n           ↓\n  S\u0026#x26;P500 지수가 \u003cspan class=\"hljs-number\"\u003e1%\u003c/span\u003e 오르면 VOO도 거의 \u003cspan class=\"hljs-number\"\u003e1%\u003c/span\u003e 오른다\n  분산 투자 효과: 한 기업이 파산해도 포트폴리오 타격 미미\n\n────────────────────────────────────────────────────────────────────\n핵심 장점:\n  ✓ \u003cspan class=\"hljs-number\"\u003e504\u003c/span\u003e개 기업을 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e주로 동시 보유\n  ✓ 주식처럼 장중 실시간 매수/매도\n  ✓ 뮤추얼 펀드 대비 세금 효율적\n  ✓ 배당금 자동 수령\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1-2. ETF vs 개별주 vs 뮤추얼 펀드 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003e개별주\u003c/th\u003e\n\u003cth\u003eETF\u003c/th\u003e\n\u003cth\u003e뮤추얼 펀드\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e분산 효과\u003c/td\u003e\n\u003ctd\u003e없음 (직접 구성)\u003c/td\u003e\n\u003ctd\u003e자동 분산\u003c/td\u003e\n\u003ctd\u003e자동 분산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e수수료\u003c/td\u003e\n\u003ctd\u003e0%\u003c/td\u003e\n\u003ctd\u003e0.03-0.8%\u003c/td\u003e\n\u003ctd\u003e0.5-2%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e거래 방식\u003c/td\u003e\n\u003ctd\u003e장중 실시간\u003c/td\u003e\n\u003ctd\u003e장중 실시간\u003c/td\u003e\n\u003ctd\u003e하루 1회 (장 마감)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e종목 선택\u003c/td\u003e\n\u003ctd\u003e직접 해야 함\u003c/td\u003e\n\u003ctd\u003e지수 자동 추종\u003c/td\u003e\n\u003ctd\u003e매니저가 선택\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e세금 효율\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e초보 적합성\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 시장 전체 지수 ETF — 핵심 4종\u003c/h2\u003e\n\u003ch3\u003e2-1. VOO — S\u0026#x26;P500 추종 (최고 인기)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003eVOO (Vanguard S\u0026#x26;P 500 ETF)\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e운용사:   Vanguard\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e추종지수: S\u0026#x26;P 500 (미국 대형주 500개)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e수수료:   연 0.03% (업계 최저 수준)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003eAUM:      $1조+ (세계 최대 ETF 중 하나)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e배당:     분기 배당 (연 ~1.3%)\u003c/span\u003e\n\nTop 10 구성 (2024년 기준, 변동 있음):\n  Apple (AAPL)      7.1%\n  Microsoft (MSFT)  6.5%\n  Nvidia (NVDA)     5.9%\n  Amazon (AMZN)     3.7%\n  Alphabet (GOOGL)  2.1%\n  Meta (META)       2.5%\n  Berkshire (BRK.B) 1.8%\n  Tesla (TSLA)      1.7%\n  Eli Lilly (LLY)   1.6%\n  JPMorgan (JPM)    1.4%\n\n10년 연평균 수익률: ~13% (2014-2024)\n20년 연평균 수익률: ~10% (2004-2024)\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e누구에게?: 미국 시장 전체에 분산하고 싶은 모든 투자자\u003c/span\u003e\n           \u003cspan class=\"hljs-string\"\u003e\"미국 경제가 성장하면 나도 성장한다\"\u003c/span\u003e는 철학\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-2. QQQ — Nasdaq 100 추종 (기술주 집중)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003eQQQ (Invesco QQQ Trust)\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e운용사:   Invesco\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e추종지수: Nasdaq 100 (비금융 대형주 100개)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e수수료:   연 0.20%\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e특징:     기술주 비중 50%+, 금융주 제외\u003c/span\u003e\n\nVOO vs QQQ 비교:\n  VOO: 미국 전체 경제 대표 (밸런스 있음)\n  QQQ: AI/기술 성장에 집중 베팅 (변동성 높음)\n\n수익률 비교 (2014-2024):\n  VOO 10년: +240%\n  QQQ 10년: +370%  ← 기술주 호황으로 압도\n  하지만 2022년:\n  VOO: -18.1%\n  QQQ: -32.6%  ← 금리 인상 때 더 많이 떨어짐\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e누구에게?: AI·기술 성장에 강하게 베팅하는 공격적 투자자\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e주의:      변동성이 VOO보다 40-50% 높다\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-3. VTI — 미국 전체 시장\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003eVTI (Vanguard Total Stock Market ETF)\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e추종지수: CRSP US Total Market (약 4,000개 기업)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e수수료:   연 0.03%\u003c/span\u003e\n\nVOO vs VTI 차이:\n  VOO: S\u0026#x26;P500 (대형주 503개)\n  VTI: 미국 전체 (대형주 + 중형주 + 소형주 4,000개)\n\n성과 차이: 장기적으로 거의 동일\n소형주 포함 → 대형주보다 변동성 약간 높음\n하지만 소형주 강세장에서 VTI가 앞서기도 함\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e누구에게?: 미국 전체 시장에 완전한 분산 원하는 투자자\u003c/span\u003e\n           VOO vs VTI 선택은 사실상 큰 차이 없음\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e2-4. 해외 분산 ETF\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e해외 주식 ETF\n──────────────────────────────────────────────────────────────\nVEA (Vanguard Developed Markets ETF)\n  → 미국 제외 선진국 (유럽, 일본, 캐나다, 호주 등)\n  → 수수료 \u003cspan class=\"hljs-number\"\u003e0.05%\u003c/span\u003e, PER 낮아서 밸류에이션 매력적\n  → 미국 집중 리스크 분산에 활용\n\nVWO (Vanguard Emerging Markets ETF)\n  → 신흥국 (중국, 인도, 브라질, 대만 등)\n  → 수수료 \u003cspan class=\"hljs-number\"\u003e0.08%\u003c/span\u003e, 성장 잠재력 높음\n  → 정치 리스크, 통화 리스크 주의\n\nVXUS (Vanguard Total International Stock ETF)\n  → 미국 제외 전 세계 (선진국 + 신흥국 통합)\n  → \"VTI + VXUS\" = 글로벌 전체 포트폴리오\n──────────────────────────────────────────────────────────────\n한국 투자자 주의: 해외 ETF 내에 한국 비중 있음\n                  환율 변동이 추가 리스크\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 섹터 ETF — 특정 업종에 집중 투자\u003c/h2\u003e\n\u003cp\u003e11개 섹터 각각에 투자하는 ETF가 있다. 경기 사이클에 따라 강한 섹터가 다르다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003eSPDR 섹터 ETF 목록 (State Street 운용)\n────────────────────────────────────────────────────────────────────\n섹터 ETF  │ 섹터명          │ 특징                │ 대표 기업\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLK       │ Information     │ AI, 반도체, 소프트웨어│ MSFT, AAPL, NVDA\n          │ Technology      │ 금리에 민감          │\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLV       │ Healthcare      │ 방어적, 인구 고령화  │ JNJ, UNH, PFE\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLF       │ Financials      │ 금리 인상 수혜       │ JPM, BAC, WFC\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLE       │ Energy          │ 원유 가격 연동        │ XOM, CVX\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLU       │ Utilities       │ 배당주, 금리에 민감  │ NEE, DUK\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLP       │ Consumer        │ 방어주, 경기침체 강함│ PG, KO, WMT\n          │ Staples         │                     │\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLY       │ Consumer        │ 경기 민감, 성장 연동 │ AMZN, TSLA\n          │ Discretionary   │                     │\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLI       │ Industrials     │ 제조업, 인프라 투자  │ CAT, HON, UPS\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLB       │ Materials       │ 원자재, 인플레 수혜  │ LIN, APD, FCX\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLRE      │ Real Estate     │ 리츠, 금리에 민감    │ PLD, AMT, EQIX\n──────────┼─────────────────┼─────────────────────┼─────────────\nXLC       │ Communication   │ 미디어, SNS, 통신    │ GOOGL, META, T\n          │ Services        │                     │\n────────────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e수수료: 모두 연 0.10-0.13%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e섹터 로테이션 전략 활용\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e경기 사이클에 따른 강한 섹터\n────────────────────────────────────────────────────────────\n경기 확장 초기     → 금융(XLF), 소비재(XLY), 기술(XLK)\n경기 확장 후기     → 에너지(XLE), 원자재(XLB), 산업재(XLI)\n경기 수축/침체     → 헬스케어(XLV), 필수소비재(XLP), 유틸리티(XLU)\n경기 회복          → 기술(XLK), 소비재(XLY), 부동산(XLRE)\n────────────────────────────────────────────────────────────\n주의: 섹터 로테이션 타이밍 잡기는 어렵다.\n      초보는 VOO 기본 보유 + 소량 섹터 ETF로 시작 권장\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 배당 ETF — 현금흐름을 만드는 투자\u003c/h2\u003e\n\u003ch3\u003e4-1. 주요 배당 ETF 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eETF\u003c/th\u003e\n\u003cth\u003e전략\u003c/th\u003e\n\u003cth\u003e배당수익률\u003c/th\u003e\n\u003cth\u003e배당 성장\u003c/th\u003e\n\u003cth\u003e10년 총수익\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSCHD\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e배당 성장\u003c/td\u003e\n\u003ctd\u003e~3.5%\u003c/td\u003e\n\u003ctd\u003e연 ~12%\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eVYM\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e고배당\u003c/td\u003e\n\u003ctd\u003e~3.2%\u003c/td\u003e\n\u003ctd\u003e연 ~6%\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eDGRO\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e배당 성장\u003c/td\u003e\n\u003ctd\u003e~2.3%\u003c/td\u003e\n\u003ctd\u003e연 ~10%\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eDVY\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e고배당\u003c/td\u003e\n\u003ctd\u003e~4.5%\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eVIG\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e배당 귀족\u003c/td\u003e\n\u003ctd\u003e~1.8%\u003c/td\u003e\n\u003ctd\u003e연 ~8%\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e4-2. SCHD — 가장 인기 있는 배당 성장 ETF\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003eSCHD (Schwab U.S. Dividend Equity ETF)\n──────────────────────────────────────────────────────────────\n추종지수: Dow Jones U.S. Dividend 100 Index\n수수료:   연 0.06%\n전략:     높은 배당수익률 + 배당 성장 역사 + 재무 건전성\n\n선정 기준:\n  ✓ 10년 연속 배당 지급 기록\n  ✓ 현금흐름 대비 배당 지불 능력\n  ✓ 배당수익률 상위\n  ✓ ROE, 부채비율 등 재무 건전성\n\n배당 실적:\n  2014: \u003cspan class=\"hljs-variable\"\u003e$0\u003c/span\u003e.85/주 (연배당)\n  2019: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.84/주\n  2024: \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e.72/주  ← 10년간 배당이 3배 성장!\n\n연 \u003cspan class=\"hljs-variable\"\u003e$500\u003c/span\u003e 배당 SCHD 매월 재투자 시 복리 시뮬레이션:\n  10년 후: 약 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e,000 → 연 배당 \u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e,500\n  20년 후: 약 \u003cspan class=\"hljs-variable\"\u003e$380\u003c/span\u003e,000 → 연 배당 \u003cspan class=\"hljs-variable\"\u003e$13\u003c/span\u003e,300\n  30년 후: 약 \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,200,000 → 연 배당 \u003cspan class=\"hljs-variable\"\u003e$42\u003c/span\u003e,000  ← 은퇴 생활비\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e💡 배당 재투자의 마법\u003c/strong\u003e: 배당금을 현금으로 받지 않고 같은 ETF를 재매수하면 복리 효과가 발생한다. 30년 후 차이는 엄청나다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 채권 ETF — 포트폴리오의 안전판\u003c/h2\u003e\n\u003ch3\u003e5-1. 주요 채권 ETF\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e채권 ETF 종류별 특성\n────────────────────────────────────────────────────────────────────\nETF    │ 만기      │ 금리민감도 │ 배당수익률 │ 특징\n───────┼───────────┼──────────┼──────────┼─────────────────────────\nSHY   │ 단기 1-3년 │ 낮음       │ 4-5%     │ 안정적, 금리 거의 무관\nIEF   │ 중기 7-10년│ 중간       │ 3-4%     │ 균형형\nTLT   │ 장기 20+년 │ 높음       │ 4-5%     │ 금리 하락 시 큰 수익\nBND   │ 미국 전체  │ 중간       │ 3-4%     │ 총 채권 시장 분산\nTIPS  │ 10년 TIPS  │ 중간       │ 낮음     │ 인플레 연동, CPI 헤지\nHYG   │ 하이일드   │ 낮음       │ 6-7%     │ 높은 수익률, 신용 위험\n────────────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-2. 금리와 채권 ETF 관계\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e금리 변화 → 채권 ETF 가격\n──────────────────────────────────────────────────────────────\n금리 인상 (↑)  →  채권 가격 하락 (↓)  →  채권 ETF 하락\n금리 인하 (↓)  →  채권 가격 상승 (↑)  →  채권 ETF 상승\n\n만기가 길수록 금리 변화에 더 민감하다!\n  SHY (단기): 금리 \u003cspan class=\"hljs-number\"\u003e1%\u003c/span\u003e 변동 → 가격 약 ±\u003cspan class=\"hljs-number\"\u003e2%\u003c/span\u003e 변동\n  TLT (장기): 금리 \u003cspan class=\"hljs-number\"\u003e1%\u003c/span\u003e 변동 → 가격 약 ±\u003cspan class=\"hljs-number\"\u003e16%\u003c/span\u003e 변동\n\n\u003cspan class=\"hljs-number\"\u003e2022\u003c/span\u003e년 금리 인상 사이클 실제 피해:\n  TLT (\u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e년 이상 국채 ETF): -\u003cspan class=\"hljs-number\"\u003e45.2%\u003c/span\u003e\n  IEF (\u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년 국채 ETF): -\u003cspan class=\"hljs-number\"\u003e18.1%\u003c/span\u003e\n  SHY (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e년 국채 ETF): -\u003cspan class=\"hljs-number\"\u003e4.2%\u003c/span\u003e  ← 피해 최소\n──────────────────────────────────────────────────────────────\n교훈: 채권 ETF도 위험할 수 있다.\n      특히 금리 상승기에 장기채 ETF 투자는 주의!\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5-3. TIPS — 인플레이션 헤지\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eTIPS (Treasury Inflation-Protected Securities) ETF\n──────────────────────────────────────────────────────────────\n특징: 원금이 \u003cspan class=\"hljs-built_in\"\u003eCPI\u003c/span\u003e(소비자물가지수)에 연동\n  → 인플레이션 오르면 원금도 오른다\n  → 디플레이션 오면 원금 감소 (하한선: 최초 원금)\n\nETF: TIP, SCHP, \u003cspan class=\"hljs-built_in\"\u003eSTIP\u003c/span\u003e(단기)\n\n언제 유용한가:\n  ✓ 인플레이션 우려가 높은 시기\n  ✓ 장기 보유로 구매력 유지 목적\n  ✓ 전통 채권 + TIPS 혼합으로 헤지\n\n\u003cspan class=\"hljs-number\"\u003e2021\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e2022\u003c/span\u003e 인플레이션 폭발 시기:\n  일반 TLT: -\u003cspan class=\"hljs-number\"\u003e45%\u003c/span\u003e\n  \u003cspan class=\"hljs-built_in\"\u003eTIPS\u003c/span\u003e(TIP): -\u003cspan class=\"hljs-number\"\u003e14%\u003c/span\u003e  ← 상대적으로 훨씬 덜 피해\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 테마 ETF와 레버리지 ETF — 주의 필요\u003c/h2\u003e\n\u003ch3\u003e6-1. 테마 ETF의 함정\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003eARK Innovation ETF (ARKK) — 교훈적 사례\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e운용사: ARK Invest (Cathie Wood)\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e전략:  미래 혁신 기업에 집중 투자 (테슬라, Zoom, Roku 등)\u003c/span\u003e\n\n\u003cspan class=\"hljs-section\"\u003e성과:\u003c/span\u003e\n  2019-2020: +170%  ← 성장주 호황\n  2021년 2월: $159 (최고점)\n  2022년 12월: $30 (-81%!)  ← 금리 인상 직격탄\n  2024년 현재: $50대 회복 중 (최고점 대비 -70%)\n\n\u003cspan class=\"hljs-section\"\u003e문제:\u003c/span\u003e\n  높은 수수료 (0.75%)\n  집중 투자 → 변동성 극대화\n  테마 유행이 식으면 장기 부진 가능\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e교훈: 테마 ETF는 타이밍이 맞으면 큰 수익이지만,\u003c/span\u003e\n      잘못 들어가면 회복하기까지 수년이 걸린다.\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6-2. 레버리지 ETF — 절대 장기 보유 금지\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e레버리지 ETF의 수학적 함정\n──────────────────────────────────────────────────────────────\nSOXL (반도체 3배 레버리지 ETF) 예시:\n\n  날 1: 지수 +5% → SOXL +15%  (\u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e → \u003cspan class=\"hljs-variable\"\u003e$115\u003c/span\u003e)\n  날 2: 지수 -5% → SOXL -15%  (\u003cspan class=\"hljs-variable\"\u003e$115\u003c/span\u003e → \u003cspan class=\"hljs-variable\"\u003e$97\u003c/span\u003e.75)\n  순 결과: 지수 +0% (원점), SOXL -2.25%\n\n  이것이 \u003cspan class=\"hljs-string\"\u003e\"변동성 붕괴 (Volatility Decay)\"\u003c/span\u003e다\n\n  SOXS (반도체 -3배)와 SOXL을 동시에 보유하면?\n  → 둘 다 잃는다! (변동성 붕괴 때문에)\n\n실제 데이터:\n  2021년 11월 SOXL 고점: ~\u003cspan class=\"hljs-variable\"\u003e$74\u003c/span\u003e\n  2022년 10월 SOXL 저점: ~\u003cspan class=\"hljs-variable\"\u003e$6\u003c/span\u003e  (-92% 폭락)\n  기초지수 (SOXX) 하락: -50%\n  레버리지는 하락을 훨씬 더 증폭시켰다\n──────────────────────────────────────────────────────────────\n규칙: 레버리지 ETF는 단기 트레이딩 목적으로만\n      절대로 장기 보유하지 말 것!\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e7. ETF 선택 체크리스트\u003c/h2\u003e\n\u003cp\u003e새로운 ETF를 매수하기 전에 반드시 확인하라.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003eETF 매수 전 체크리스트\n──────────────────────────────────────────────────────────────\n□ 1. AUM(운용자산) $1B 이상인가?\n\u003cspan class=\"hljs-code\"\u003e      → 너무 작은 ETF는 운용 중단 위험, 스프레드 넓음\n\u003c/span\u003e\n□ 2. 하루 평균 거래량이 충분한가?\n\u003cspan class=\"hljs-code\"\u003e      → 거래량 적으면 매도 시 불리한 가격에 팔 수 있음\n\u003c/span\u003e\n□ 3. 운용보수(Expense Ratio)가 0.2% 이하인가?\n\u003cspan class=\"hljs-code\"\u003e      → 지수 ETF는 0.03-0.1%, 섹터/테마는 0.1-0.5%\n\u003c/span\u003e\n□ 4. 추종하는 지수가 명확하고 신뢰할 수 있는가?\n\u003cspan class=\"hljs-code\"\u003e      → S\u0026#x26;P500, Russell 2000 등 공인된 지수 \u003e 자체 구성\n\u003c/span\u003e\n□ 5. 배당 정책을 이해하는가?\n\u003cspan class=\"hljs-code\"\u003e      → 분기/월배당 여부, 배당 재투자 방법\n\u003c/span\u003e\n□ 6. 레버리지/인버스 ETF가 아닌가?\n\u003cspan class=\"hljs-code\"\u003e      → 일반 투자자는 레버리지/인버스 피할 것\n\u003c/span\u003e\n□ 7. 설정 이후 기초지수 대비 추적 오차가 낮은가?\n\u003cspan class=\"hljs-code\"\u003e      → Yahoo Finance ETF 페이지에서 확인 가능\n──────────────────────────────────────────────────────────────\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 실전 — 연령별 ETF 포트폴리오 예시\u003c/h2\u003e\n\u003ch3\u003e20대: 공격적 성장 포트폴리오\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e20대 ETF 포트폴리오 (월 \u003cspan class=\"hljs-variable\"\u003e$500\u003c/span\u003e 투자 기준)\n──────────────────────────────────────────────────────────────\nVOO   60%  (\u003cspan class=\"hljs-variable\"\u003e$300\u003c/span\u003e)   미국 S\u0026#x26;P500 핵심\nQQQ   25%  (\u003cspan class=\"hljs-variable\"\u003e$125\u003c/span\u003e)   기술주 성장 베팅\nVWO   15%  (\u003cspan class=\"hljs-variable\"\u003e$75\u003c/span\u003e)    신흥국 분산\n\n논리:\n  - 투자 기간이 30년+ → 단기 변동성 감수 가능\n  - 채권 비중 없음 → 최대 성장 추구\n  - 신흥국 포함 → 글로벌 분산\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e30-40대: 성장 + 배당 균형 포트폴리오\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e30-40대 ETF 포트폴리오\n──────────────────────────────────────────────────────────────\nVOO   50%   미국 대형주 핵심\nQQQ   20%   기술주 성장\nSCHD  20%   배당 성장 (현금흐름 창출)\nVEA   10%   선진국 분산\n\n논리:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 성장과 안정의 균형\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e SCHD로 배당 현금흐름 창출 시작\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 해외 분산으로 달러 집중 리스크 완화\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e50-60대: 보전 + 배당 포트폴리오\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e50-60대 ETF 포트폴리오\n──────────────────────────────────────────────────────────────\nVOO   40%   핵심 주식 보유\nSCHD  25%   고배당 성장\nBND   20%   채권 완충제\nTIP   10%   인플레이션 헤지\nVEA    5%   해외 분산\n\n논리:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 채권 비중 30% → 변동성 완화\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 배당으로 생활비 일부 충당\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e TIPS로 은퇴 후 구매력 보호\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e9. ETF 자주 묻는 질문\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eQ. VOO와 SPY 중 어느 것이 좋은가?\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eSPY(수수료 0.09%)보다 VOO(수수료 0.03%)가 장기 투자에 유리하다. 단, 기관투자자는 유동성 때문에 SPY를 선호한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eQ. 배당 ETF와 성장 ETF 중 어느 것이 총 수익이 더 높은가?\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e장기적으로는 성장 ETF(VOO, QQQ)가 총 수익이 높은 경향이 있다. 배당 ETF는 현금흐름을 원하는 투자자에게 적합하다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eQ. ETF도 파산할 수 있나?\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e운용사가 파산해도 ETF 자산(주식)은 분리 보관된다. 다만 너무 작은 ETF는 운용 중단 후 청산될 수 있다 (원금 손실 없이 현금으로 돌려받음).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eQ. 분기 배당 vs 월 배당 ETF, 어느 것이 좋은가?\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e총 수익률 차이는 거의 없다. 월 배당은 현금흐름 관리가 편리하지만, 복리 관점에서는 재투자 주기 차이가 미미하다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e정리 — ETF 투자 핵심 원칙\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003eETF 투자 5대 원칙\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 핵심은 VOO (또는 VTI) 먼저\n   → 복잡하게 구성하기 전에 S\u0026#x26;P500부터 시작\n\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 수수료 0.2% 이하 고집\n   → 30년 복리에서 수수료 차이가 수천만 원\n\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 레버리지/인버스 ETF는 장기 보유 금지\n   → 단기 트레이딩 도구, 초보는 건드리지 말 것\n\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e 리밸런싱은 연 1-2회\n   → 설정한 비중에서 5%+ 벗어나면 조정\n\n\u003cspan class=\"hljs-bullet\"\u003e5.\u003c/span\u003e 시장 타이밍 대신 꾸준한 투자 (DCA)\n   → 매월 일정액 자동 투자 \u003e 타이밍 맞추기 시도\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e다음 편(8편)에서는 포트폴리오의 안전판인 \u003cstrong\u003e채권과 미국 국채의 모든 것\u003c/strong\u003e을 다룬다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-26\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-gray-100\",\"children\":\"미국 주식 투자 입문 (7) — ETF 완전 정복: 개별주 없이도 시장 전체를 산다\"}]]}],[\"$\",\"article\",null,{\"className\":\"prose prose-gray dark:prose-invert max-w-none prose-headings:font-bold prose-a:text-red-600 dark:prose-a:text-red-400 prose-img:rounded-lg prose-pre:bg-gray-900 dark:prose-pre:bg-gray-950\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, init
