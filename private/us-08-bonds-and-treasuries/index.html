ass=\"hljs language-scss\"\u003e        ① 채권 발행 (돈 빌림)\n┌─────────────────────────────────────────────────┐\n│                                                 │\n│  투자자              →→→→→          발행자       │\n│ (채권 구매자)        돈 지급      (정부 · 기업)   │\n│                                                 │\n│  투자자              ←←←←←          발행자       │\n│                    이자(쿠폰)                    │\n│                    반기마다                      │\n│                                                 │\n│  투자자              ←←←←←          발행자       │\n│                    만기 시                       │\n│                  원금(액면가) 상환               │\n└─────────────────────────────────────────────────┘\n\n  ② 이자 수령 (매 \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e개월)\n  ③ 만기 시 원금 상환\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e미국 국채를 예로 들면: 미국 정부가 돈이 필요할 때 국채를 발행합니다. 투자자는 국채를 사서 정부에 돈을 빌려주고, 정부는 6개월마다 이자(쿠폰)를 지급하고 만기에 원금을 돌려줍니다.\u003c/p\u003e\n\u003ch3\u003e채권 vs 주식 비교 표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e채권\u003c/th\u003e\n\u003cth\u003e주식\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e본질\u003c/td\u003e\n\u003ctd\u003e채권자 (돈 빌려준 사람)\u003c/td\u003e\n\u003ctd\u003e주주 (회사 소유자)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e수익 방식\u003c/td\u003e\n\u003ctd\u003e이자 + 매매차익\u003c/td\u003e\n\u003ctd\u003e배당 + 주가 상승\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e위험 수준\u003c/td\u003e\n\u003ctd\u003e낮음 (국채 기준)\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e만기\u003c/td\u003e\n\u003ctd\u003e있음 (1개월~30년)\u003c/td\u003e\n\u003ctd\u003e없음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e파산 시 우선권\u003c/td\u003e\n\u003ctd\u003e주주보다 먼저 상환받음\u003c/td\u003e\n\u003ctd\u003e채권자 상환 후 남은 것만\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e기대 수익률\u003c/td\u003e\n\u003ctd\u003e낮음 (2~6%, 국채 기준)\u003c/td\u003e\n\u003ctd\u003e높음 (장기 평균 7~10%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e가격 변동성\u003c/td\u003e\n\u003ctd\u003e낮음~중간 (만기에 따라)\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e인플레이션\u003c/td\u003e\n\u003ctd\u003e취약 (TIPS 제외)\u003c/td\u003e\n\u003ctd\u003e상대적으로 강함\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e채권의 핵심 용어\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e액면가 (Face Value / Par Value)\u003c/strong\u003e\n채권에 적힌 금액으로, 만기에 돌려받는 원금입니다. 미국 국채는 보통 $1,000 단위입니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e쿠폰 (Coupon)\u003c/strong\u003e\n채권이 지급하는 이자율입니다. 액면가 $1,000에 쿠폰 4%라면 매년 $40, 6개월마다 $20씩 지급합니다. 옛날에는 종이 채권에 쿠폰을 잘라 은행에 제출했기 때문에 이 이름이 붙었습니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e만기 (Maturity)\u003c/strong\u003e\n채권이 끝나는 날짜입니다. 만기가 되면 발행자는 액면가를 돌려줍니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eYTM (Yield to Maturity, 만기수익률)\u003c/strong\u003e\n지금 이 채권을 사서 만기까지 보유했을 때의 연평균 수익률입니다. 채권 가격이 액면가보다 낮으면 YTM이 쿠폰율보다 높아지고, 액면가보다 높으면 YTM이 낮아집니다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 미국 국채의 종류: T-Bills vs T-Notes vs T-Bonds\u003c/h2\u003e\n\u003cp\u003e미국 국채(US Treasury)는 미국 정부가 발행하는 채권으로, 세계에서 가장 안전한 자산으로 여겨집니다. 만기에 따라 세 가지로 구분됩니다.\u003c/p\u003e\n\u003ch3\u003e미국 국채 종류 상세 비교 표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e종류\u003c/th\u003e\n\u003cth\u003e영문명\u003c/th\u003e\n\u003cth\u003e만기\u003c/th\u003e\n\u003cth\u003e이자 지급\u003c/th\u003e\n\u003cth\u003e최소 투자금\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003cth\u003e대표 ETF\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eT-Bill\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eTreasury Bill\u003c/td\u003e\n\u003ctd\u003e4주 / 8주 / 13주 / 26주 / 52주\u003c/td\u003e\n\u003ctd\u003e없음 (할인 발행)\u003c/td\u003e\n\u003ctd\u003e$100\u003c/td\u003e\n\u003ctd\u003e현금에 가장 가까운 안전자산, 이자 없이 할인가에 매수 후 액면가 상환\u003c/td\u003e\n\u003ctd\u003eSGOV, BIL\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eT-Note\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eTreasury Note\u003c/td\u003e\n\u003ctd\u003e2년 / 3년 / 5년 / 7년 / 10년\u003c/td\u003e\n\u003ctd\u003e6개월마다 쿠폰 지급\u003c/td\u003e\n\u003ctd\u003e$100\u003c/td\u003e\n\u003ctd\u003e가장 일반적인 국채, \u003cstrong\u003e10년물이 전 세계 금융의 기준금리\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eIEF (7\u003cdel\u003e10년), SHY (1\u003c/del\u003e3년), VGIT\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eT-Bond\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eTreasury Bond\u003c/td\u003e\n\u003ctd\u003e20년 / 30년\u003c/td\u003e\n\u003ctd\u003e6개월마다 쿠폰 지급\u003c/td\u003e\n\u003ctd\u003e$100\u003c/td\u003e\n\u003ctd\u003e금리 민감도 가장 높음, 가격 변동 가장 큼, 장기 투자자 or 금리 방향에 베팅\u003c/td\u003e\n\u003ctd\u003eTLT (20년+), VGLT\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eTIPS\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eTreasury Inflation-Protected Securities\u003c/td\u003e\n\u003ctd\u003e5년 / 10년 / 30년\u003c/td\u003e\n\u003ctd\u003e6개월마다 (물가 연동 원금 기반)\u003c/td\u003e\n\u003ctd\u003e$100\u003c/td\u003e\n\u003ctd\u003e원금이 CPI에 연동 → 인플레이션 자동 방어\u003c/td\u003e\n\u003ctd\u003eTIP, SCHP\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eI-Bond\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eSeries I Savings Bond\u003c/td\u003e\n\u003ctd\u003e최대 30년\u003c/td\u003e\n\u003ctd\u003e없음 (복리 축적)\u003c/td\u003e\n\u003ctd\u003e$25\u003c/td\u003e\n\u003ctd\u003e인플레 연동 저축채, 개인 $10,000/년 한도, 1년 lock-up\u003c/td\u003e\n\u003ctd\u003e없음 (TreasuryDirect 직접 구매만)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e각 국채 종류 상세 설명\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eT-Bill (재무부 단기채권)\u003c/strong\u003e\n4주\u003cdel\u003e52주 단기 국채입니다. 이자를 따로 주지 않는 대신, 액면가보다 낮은 가격에 발행됩니다. 예를 들어 $980에 사서 26주 후 $1,000을 받는 방식입니다. 현재 금리가 높을 때는 연 4\u003c/del\u003e5%대 수익도 가능합니다. 머니마켓 펀드(MMF)의 주요 투자 대상이기도 합니다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003eT-Bill 수익 구조 예시 (26주, 연 5% 환경)\n\n발행가:  \u003cspan class=\"hljs-variable\"\u003e$975\u003c/span\u003e.61  ← 할인 발행\n26주 후: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000.00  ← 액면가 상환\n수익:      \u003cspan class=\"hljs-variable\"\u003e$24\u003c/span\u003e.39\n연환산 수익률: ~5.0%\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003eT-Note (재무부 중기채권)\u003c/strong\u003e\n2년~10년 중기 국채입니다. 특히 \u003cstrong\u003e10년물 국채 금리(10-Year Treasury Yield)는 전 세계 금융의 기준점\u003c/strong\u003e으로 쓰입니다. 주택담보대출, 기업 대출 금리의 기준이 됩니다. 주가 밸류에이션(PER)에도 영향을 주어, 10년물 금리가 오르면 성장주가 하락하는 경향이 있습니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eT-Bond (재무부 장기채권)\u003c/strong\u003e\n20년~30년 장기 국채입니다. 금리 변화에 가장 민감하게 반응합니다. TLT ETF가 대표적입니다. 금리가 1% 하락하면 20% 이상 오를 수 있고, 금리가 1% 상승하면 20% 이상 떨어질 수 있습니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTIPS (물가연동국채)\u003c/strong\u003e\n원금이 소비자물가지수(CPI)에 연동됩니다. 인플레이션이 올라가면 원금도 따라 올라가서 구매력을 지킬 수 있습니다. 단, 디플레이션 시에는 원금이 줄어들지 않고 액면가를 보장합니다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 핵심: 금리와 채권 가격은 반대로 움직인다\u003c/h2\u003e\n\u003cp\u003e채권 투자에서 가장 중요하고 처음에 가장 헷갈리는 개념입니다. \u003cstrong\u003e금리가 오르면 기존 채권 가격이 내려갑니다.\u003c/strong\u003e 왜 그럴까요?\u003c/p\u003e\n\u003ch3\u003e직관적 예시\u003c/h3\u003e\n\u003cp\u003e당신이 작년에 연 2% 쿠폰의 10년 국채를 $1,000에 샀다고 합시다.\u003c/p\u003e\n\u003cp\u003e그런데 올해 새로 나오는 국채는 연 4% 쿠폰을 줍니다.\u003c/p\u003e\n\u003cp\u003e지금 당신의 채권을 사려는 사람은 생각합니다: \"새 채권은 4%를 주는데, 이 채권은 2%밖에 안 주네. 그러면 $1,000을 줄 이유가 없지. 더 싸게 사야 본전이야.\"\u003c/p\u003e\n\u003cp\u003e결국 당신의 채권은 $1,000보다 낮은 가격에서 거래됩니다. 금리가 2%에서 4%로 두 배 오르면, 기존 채권 가격은 크게 하락합니다.\u003c/p\u003e\n\u003ch3\u003e금리-채권가격 반비례 시각화\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e채권 가격\n  \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,200 │\n         │  ╲\n  \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,100 │   ╲\n         │    ╲\n  \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000 │─────╲────────  ← 액면가 (금리=쿠폰율일 때)\n         │      ╲\n   \u003cspan class=\"hljs-variable\"\u003e$900\u003c/span\u003e  │       ╲\n         │        ╲\n   \u003cspan class=\"hljs-variable\"\u003e$800\u003c/span\u003e  │         ╲\n         │          ╲___\n   \u003cspan class=\"hljs-variable\"\u003e$700\u003c/span\u003e  │\n         └──────────────────────────────────\n         1%    2%    3%    4%    5%    6%\n                      금리 (시장 금리)\n\n  금리↑ → 채권가격↓  (반비례)\n  금리↓ → 채권가격↑  (반비례)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e듀레이션: 금리 민감도의 척도\u003c/h3\u003e\n\u003cp\u003e듀레이션(Duration)은 금리가 1% 변할 때 채권 가격이 몇 % 변하는지를 나타냅니다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e듀레이션과 금리 민감도\n\n단기채 (1~3년)          중기채 (7~10년)         장기채 (20~30년)\n  듀레이션 ≈ 2년           듀레이션 ≈ 8년           듀레이션 ≈ 18년\n\n  금리 1% 상승 시:         금리 1% 상승 시:         금리 1% 상승 시:\n  가격 ≈ -2%               가격 ≈ -8%               가격 ≈ -18%\n\n  \u003cspan class=\"hljs-section\"\u003e[안정적]\u003c/span\u003e                 \u003cspan class=\"hljs-section\"\u003e[중간]\u003c/span\u003e                   \u003cspan class=\"hljs-section\"\u003e[변동 큼!]\u003c/span\u003e\n  SHY ETF                  IEF ETF                  TLT ETF\n  현금 대안                균형형                   금리 방향 베팅\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e핵심 규칙\u003c/strong\u003e: 만기가 길수록 금리 변화에 더 민감합니다. 금리 상승 시기에는 장기채가 가장 큰 손실을 봅니다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 수익률 곡선 (Yield Curve): 경기 예측의 바로미터\u003c/h2\u003e\n\u003cp\u003e수익률 곡선은 만기별 국채 금리를 그래프로 나타낸 것입니다. 단순한 차트처럼 보이지만, 경기 침체를 예고하는 강력한 도구입니다.\u003c/p\u003e\n\u003ch3\u003e정상적인 수익률 곡선 vs 역전된 수익률 곡선\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e정상 수익률 곡선 (Upward Slope)      역전 수익률 곡선 (Inverted Yield Curve)\n\n금리                                  금리\n\u003cspan class=\"hljs-number\"\u003e6%\u003c/span\u003e │                    ●            \u003cspan class=\"hljs-number\"\u003e6%\u003c/span\u003e │  ●\n   │                 ●               \u003cspan class=\"hljs-number\"\u003e5%\u003c/span\u003e │     ●\n\u003cspan class=\"hljs-number\"\u003e5%\u003c/span\u003e │             ●                   \u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e │         ●\n   │          ●                      \u003cspan class=\"hljs-number\"\u003e3%\u003c/span\u003e │              ●\n\u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e │       ●                         \u003cspan class=\"hljs-number\"\u003e2%\u003c/span\u003e │                   ●\n   │    ●                            \u003cspan class=\"hljs-number\"\u003e1%\u003c/span\u003e │\n\u003cspan class=\"hljs-number\"\u003e3%\u003c/span\u003e │  ●                              \u003cspan class=\"hljs-number\"\u003e0%\u003c/span\u003e └──────────────────────\n   │●                                    \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003eM \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003eM \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003eM \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003eY\n\u003cspan class=\"hljs-number\"\u003e2%\u003c/span\u003e └─────────────────────\n    \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003eM \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003eM \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003eM \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003eY \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003eY          단기금리 \u003e 장기금리\n                                        → 역전 (Inverted)!\n   단기금리 \u0026#x3C; 장기금리\n   → 정상 (Normal)                   \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003eY-\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003eY 스프레드 = 음수(-)\n                                      → 경기침체 신호!\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e역수익률 곡선이 경기침체를 예고하는 이유\u003c/h3\u003e\n\u003cp\u003e역수익률 곡선(Inverted Yield Curve)은 \u003cstrong\u003e2년물 금리가 10년물 금리보다 높아지는 현상\u003c/strong\u003e입니다. 이는 매우 비정상적인 상황이며, 역사적으로 경기침체를 예고해왔습니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e왜 경기침체 신호인가?\u003c/strong\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e단기 금리가 높다 = 연준이 금리를 인위적으로 높이 올렸다 = 경기 과열을 식히려는 긴축\u003c/li\u003e\n\u003cli\u003e장기 금리가 낮다 = 시장이 미래 성장을 비관적으로 본다 = 경기 침체 예상\u003c/li\u003e\n\u003cli\u003e은행 수익성 악화: 은행은 단기로 빌려서 장기로 빌려주는데, 역전되면 마진이 없어져 대출이 줄어든다\u003c/li\u003e\n\u003cli\u003e대출 감소 → 기업 투자 감소 → 경기 침체\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e역수익률 곡선과 경기침체 메커니즘\n\n단기금리↑ (연준 긴축)\n\u003cspan class=\"hljs-code\"\u003e    │\n    ├── 은행 대출 마진 축소\n    │       │\n    │       └── 기업 대출 감소 → 투자 위축\n    │\n    └── 소비자 대출 비용↑ → 소비 위축\n             │\n             └── 기업 실적 악화 → 고용 감소\n                      │\n                      └── 소비 추가 감소 → 경기침체!\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e역전 사례 3가지\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e사례 1: 2006~2007년 역전 → 2008년 금융위기\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시점\u003c/th\u003e\n\u003cth\u003e2년물 금리\u003c/th\u003e\n\u003cth\u003e10년물 금리\u003c/th\u003e\n\u003cth\u003e스프레드\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2006년 초\u003c/td\u003e\n\u003ctd\u003e4.5%\u003c/td\u 03e장기채는 안전자산이 아닐 수 있다\u003c/td\u003e\n\u003ctd\u003e금리 급등기에 TLT는 나스닥만큼 폭락. \"채권 = 안전\"은 무조건 참이 아님\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e단기채는 상대적으로 안전\u003c/td\u003e\n\u003ctd\u003eSHY는 -3.7%에 그침. 금리 상승기에는 단기채가 유일한 피난처\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e금리 방향을 보고 만기를 선택해야\u003c/td\u003e\n\u003ctd\u003e금리 상승기 → 단기채(SHY, SGOV) / 금리 하락기 → 장기채(TLT)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTIPS도 완벽하지 않다\u003c/td\u003e\n\u003ctd\u003e인플레 방어라지만 금리 급등기엔 손실 발생 (-11%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022년은 이례적\u003c/td\u003e\n\u003ctd\u003e인플레 원인 위기에서만 주식-채권 동반 하락. 대부분 위기에선 역상관 유효\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 채권 ETF 완전 비교: BND, TLT, IEF, SHY, TIPS, HYG\u003c/h2\u003e\n\u003cp\u003e직접 국채를 사려면 TreasuryDirect.gov를 이용해야 하지만, ETF로 훨씬 쉽게 투자할 수 있습니다.\u003c/p\u003e\n\u003ch3\u003e주요 채권 ETF 종합 비교 표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eETF\u003c/th\u003e\n\u003cth\u003e정식 명칭\u003c/th\u003e\n\u003cth\u003e만기 구간\u003c/th\u003e\n\u003cth\u003e운용사\u003c/th\u003e\n\u003cth\u003e운용보수\u003c/th\u003e\n\u003cth\u003e듀레이션\u003c/th\u003e\n\u003cth\u003e현재 YTM\u003c/th\u003e\n\u003cth\u003e특징\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eBND\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eVanguard Total Bond Market\u003c/td\u003e\n\u003ctd\u003e단기~장기 혼합\u003c/td\u003e\n\u003ctd\u003eVanguard\u003c/td\u003e\n\u003ctd\u003e0.03%\u003c/td\u003e\n\u003ctd\u003e~6.2년\u003c/td\u003e\n\u003ctd\u003e~4.8%\u003c/td\u003e\n\u003ctd\u003e미국 전체 투자등급 채권 1만개+\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eTLT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eiShares 20+ Year Treasury\u003c/td\u003e\n\u003ctd\u003e20년+\u003c/td\u003e\n\u003ctd\u003eBlackRock\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003ctd\u003e~16.5년\u003c/td\u003e\n\u003ctd\u003e~4.7%\u003c/td\u003e\n\u003ctd\u003e금리 하락 베팅용, 변동성 최대\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eIEF\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eiShares 7-10 Year Treasury\u003c/td\u003e\n\u003ctd\u003e7~10년\u003c/td\u003e\n\u003ctd\u003eBlackRock\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003ctd\u003e~7.5년\u003c/td\u003e\n\u003ctd\u003e~4.5%\u003c/td\u003e\n\u003ctd\u003e중기 국채, 균형형\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSHY\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eiShares 1-3 Year Treasury\u003c/td\u003e\n\u003ctd\u003e1~3년\u003c/td\u003e\n\u003ctd\u003eBlackRock\u003c/td\u003e\n\u003ctd\u003e0.15%\u003c/td\u003e\n\u003ctd\u003e~1.9년\u003c/td\u003e\n\u003ctd\u003e~4.9%\u003c/td\u003e\n\u003ctd\u003e현금 대안, 안정적\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSGOV\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eiShares 0-3 Month Treasury\u003c/td\u003e\n\u003ctd\u003e0~3개월\u003c/td\u003e\n\u003ctd\u003eBlackRock\u003c/td\u003e\n\u003ctd\u003e0.09%\u003c/td\u003e\n\u003ctd\u003e~0.1년\u003c/td\u003e\n\u003ctd\u003e~5.2%\u003c/td\u003e\n\u003ctd\u003eT-Bill ETF, 가장 안전\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eTIP\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eiShares TIPS Bond\u003c/td\u003e\n\u003ctd\u003e혼합 (TIPS)\u003c/td\u003e\n\u003ctd\u003eBlackRock\u003c/td\u003e\n\u003ctd\u003e0.19%\u003c/td\u003e\n\u003ctd\u003e~7.3년\u003c/td\u003e\n\u003ctd\u003e실질 ~1.8%\u003c/td\u003e\n\u003ctd\u003e인플레이션 방어, 원금 CPI 연동\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSCHP\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eSchwab US TIPS ETF\u003c/td\u003e\n\u003ctd\u003e혼합 (TIPS)\u003c/td\u003e\n\u003ctd\u003eSchwab\u003c/td\u003e\n\u003ctd\u003e0.03%\u003c/td\u003e\n\u003ctd\u003e~7.6년\u003c/td\u003e\n\u003ctd\u003e실질 ~1.8%\u003c/td\u003e\n\u003ctd\u003e저비용 TIPS ETF\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eHYG\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eiShares High Yield Corp Bond\u003c/td\u003e\n\u003ctd\u003e혼합 (하이일드)\u003c/td\u003e\n\u003ctd\u003eBlackRock\u003c/td\u003e\n\u003ctd\u003e0.48%\u003c/td\u003e\n\u003ctd\u003e~3.8년\u003c/td\u003e\n\u003ctd\u003e~7.2%\u003c/td\u003e\n\u003ctd\u003e정크본드, 고수익·고위험\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eLQD\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eiShares Investment Grade Corp\u003c/td\u003e\n\u003ctd\u003e혼합 (투자등급)\u003c/td\u003e\n\u003ctd\u003eBlackRock\u003c/td\u003e\n\u003ctd\u003e0.14%\u003c/td\u003e\n\u003ctd\u003e~8.3년\u003c/td\u003e\n\u003ctd\u003e~5.5%\u003c/td\u003e\n\u003ctd\u003e우량 기업 회사채\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e각 ETF 특징 상세\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eBND (Vanguard Total Bond Market ETF)\u003c/strong\u003e\n미국 투자등급 채권 1만 개 이상을 담습니다. 국채(약 65%), 회사채(약 25%), 모기지채(약 10%) 등 전방위 분산입니다. 운용보수 0.03%는 채권 ETF 중 최저 수준. 주식의 VTI처럼, 채권의 BND가 대표 종합 ETF입니다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eBND 포트폴리오 구성\n\n국채·정부채  ████████████████████████████████ \u003cspan class=\"hljs-number\"\u003e65%\u003c/span\u003e\n회사채(BBB+) █████████████ \u003cspan class=\"hljs-number\"\u003e25%\u003c/span\u003e\n모기지채     ████ \u003cspan class=\"hljs-number\"\u003e8%\u003c/span\u003e\n기타         ██   \u003cspan class=\"hljs-number\"\u003e2%\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003eTLT (iShares 20+ Year Treasury Bond ETF)\u003c/strong\u003e\n만기 20년 이상 미국 장기 국채만 담습니다. 듀레이션이 약 16~18년으로 금리 민감도가 매우 높습니다. 연준이 금리를 낮출 것으로 예상될 때 강한 수익을 기대할 수 있습니다. 반대로 금리 상승기에는 큰 손실을 봅니다. 2020년 COVID 위기 때 +25% 상승했습니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSHY (iShares 1-3 Year Treasury Bond ETF)\u003c/strong\u003e\n만기 1~3년 단기 국채입니다. 금리 민감도가 낮아 가격이 거의 안 움직입니다. 비상금을 굴리거나 시장 불확실성이 높을 때 주차 용도로 씁니다.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTIP (iShares TIPS Bond ETF)\u003c/strong\u003e\n물가연동국채(TIPS) ETF입니다. 인플레이션이 올라가면 원금이 따라서 커집니다. YTM이 \"실질 금리\"를 나타내므로, 실질 YTM이 높을수록 좋은 매수 기회입니다.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e7. 하이일드 채권(HYG)과 신용 스프레드: 시장 불안 측정계\u003c/h2\u003e\n\u003cp\u003eHYG는 단순한 고수익 채권 ETF가 아닙니다. \u003cstrong\u003e금융 시장의 위험 온도계\u003c/strong\u003e 역할을 합니다.\u003c/p\u003e\n\u003ch3\u003e신용 스프레드(Credit Spread)란?\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e신용 스프레드 = 하이일드 채권 금리 - 미국 국채 금리\n\n\u003cspan class=\"hljs-section\"\u003e예시:\u003c/span\u003e\nHYG (정크본드 평균 금리): 8.0%\n10년물 국채 금리:          4.5%\n신용 스프레드:             3.5% (=350bp)\n\n\u003cspan class=\"hljs-section\"\u003e해석:\u003c/span\u003e\n스프레드 좁음 (2~3%): 투자자들이 위험자산 선호 → 낙관적 시장\n스프레드 넓음 (6~10%+): 투자자들이 안전자산 도피 → 위기 신호!\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e역사적 신용 스프레드 추이\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e시기\u003c/th\u003e\n\u003cth\u003e신용 스프레드\u003c/th\u003e\n\u003cth\u003e시장 상황\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e평상시 (강세장)\u003c/td\u003e\n\u003ctd\u003e2~4%\u003c/td\u003e\n\u003ctd\u003e정상, 낙관적\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2008년 리먼 사태\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e21%\u003c/strong\u003e 이상\u003c/td\u003e\n\u003ctd\u003e금융 공황\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2011년 유럽 재정위기\u003c/td\u003e\n\u003ctd\u003e8~9%\u003c/td\u003e\n\u003ctd\u003e경계 상태\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2016년 에너지 위기\u003c/td\u003e\n\u003ctd\u003e8~9%\u003c/td\u003e\n\u003ctd\u003e원유 폭락, 경기 우려\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2020년 3월 COVID\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e10~11%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e급격한 공황\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2022년 긴축기\u003c/td\u003e\n\u003ctd\u003e5~6%\u003c/td\u003e\n\u003ctd\u003e위험 신호 증가\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-shell\"\u003e신용 스프레드 모니터링 방법\n\nFRED (연준 경제데이터)에서 무료로 확인:\nfred.stlouisfed.org\n검색어: \"ICE BofA US High Yield Option-Adjusted Spread\"\n\n스프레드 해석 기준:\n\u0026#x3C; 3%    ████████████ 매우 낙관적 (과열 주의)\n\u003cspan class=\"hljs-meta prompt_\"\u003e3~5% \u003c/span\u003e\u003cspan class=\"bash\"\u003e   ████████     정상 범위\u003c/span\u003e\n\u003cspan class=\"hljs-meta prompt_\"\u003e5~7% \u003c/span\u003e\u003cspan class=\"bash\"\u003e   ████         경계 신호\u003c/span\u003e\n\u003cspan class=\"hljs-meta prompt_\"\u003e7~10% \u003c/span\u003e\u003cspan class=\"bash\"\u003e  ██           위험 신호, 포지션 점검\u003c/span\u003e\n\u003cspan class=\"hljs-meta prompt_\"\u003e\u003e \u003c/span\u003e\u003cspan class=\"bash\"\u003e10%   ●            공황, 매수 기회 탐색 시작\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eHYG가 하락할 때 주식도 하락하는 이유\u003c/h3\u003e\n\u003cp\u003e하이일드 채권 투자자와 주식 투자자는 모두 \"위험 자산\"을 선호하는 투자자들입니다. 경기가 나빠질 것 같으면 두 자산 모두에서 빠져나옵니다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e위기 시 자금 흐름\n\n위험자산 (주식, HYG)\n        ↓ 팔기\n        ↓\n현금, 국채 (T-Bill, SHY)\n        ↑ 사기\n\n→ 주식↓ + HYG↓ + 국채↑\n   신용 스프레드↑ = 시장 스트레스 신호\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 활용\u003c/strong\u003e: HYG가 갑자기 -5% 이상 하락하면, 주식 시장도 1~2주 내로 하락 가능성이 높습니다. 선행 지표로 활용하세요.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e8. TreasuryDirect.gov에서 직접 국채 사는 방법\u003c/h2\u003e\n\u003cp\u003e미국 재무부가 운영하는 공식 국채 직접 구매 사이트입니다. ETF보다 복잡하지만, 수수료 없이 액면가 그대로 투자할 수 있습니다.\u003c/p\u003e\n\u003ch3\u003eTreasuryDirect.gov 이용 가이드\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003eStep 1: 계좌 개설\n────────────────────────────────────────────\n  웹사이트: www.treasurydirect.gov\n  필요 서류:\n\u003cspan class=\"hljs-bullet\"\u003e    -\u003c/span\u003e 미국 사회보장번호(SSN) 또는 납세자번호(ITIN)\n\u003cspan class=\"hljs-bullet\"\u003e    -\u003c/span\u003e 미국 은행 계좌 (ACH 이체 가능)\n\u003cspan class=\"hljs-bullet\"\u003e    -\u003c/span\u003e 유효한 이메일 주소\n\n  ※ 한국 거주자: SSN/ITIN 없으면 이용 불가\n\u003cspan class=\"hljs-code\"\u003e     → 미국 증권사(Fidelity, IBKR) 채권 ETF 이용 권장\n\u003c/span\u003e\nStep 2: 경매 일정 확인\n────────────────────────────────────────────\n  T-Bill (단기채):\n\u003cspan class=\"hljs-code\"\u003e    4주물:  매주 화요일 경매\n    8주물:  매주 화요일 경매\n    13주물: 매주 월요일 경매\n    26주물: 매주 월요일 경매\n    52주물: 4주마다 화요일 경매\n\u003c/span\u003e\n  T-Note (중기채):\n\u003cspan class=\"hljs-code\"\u003e    2년물:  매월 말 경매\n    5년물:  매월 말 경매\n    10년물: 분기 리옥션 + 새 발행\n\u003c/span\u003e\n  T-Bond (장기채):\n\u003cspan class=\"hljs-code\"\u003e    20년물: 격월 경매\n    30년물: 분기마다\n\u003c/span\u003e\nStep 3: 비경쟁 입찰 (개인 투자자 방법)\n────────────────────────────────────────────\n  비경쟁 입찰이란:\n\u003cspan class=\"hljs-bullet\"\u003e    -\u003c/span\u003e 경매에서 결정된 금리를 그대로 받겠다는 신청\n\u003cspan class=\"hljs-bullet\"\u003e    -\u003c/span\u003e 개인 투자자가 이용하는 방식\n\u003cspan class=\"hljs-bullet\"\u003e    -\u003c/span\u003e 경쟁 입찰(기관)처럼 금리를 지정할 필요 없음\n\n  한도: 비경쟁 입찰 최대 $10,000,000/경매\n\nStep 4: 만기 시 처리\n────────────────────────────────────────────\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 연결 은행 계좌로 자동 입금 (원금+이자)\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 자동 롤오버 설정 가능 (만기 → 새 T-Bill 자동 재투자)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eTreasuryDirect vs 증권사 ETF 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003eTreasuryDirect (직접 구매)\u003c/th\u003e\n\u003cth\u003e채권 ETF (증권사)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e최소 투자금\u003c/td\u003e\n\u003ctd\u003e$100\u003c/td\u003e\n\u003ctd\u003eETF 1주 ($80~$100)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e수수료\u003c/td\u003e\n\u003ctd\u003e없음\u003c/td\u003e\n\u003ctd\u003e운용보수 0.03~0.20%/년\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e분산\u003c/td\u003e\n\u003ctd\u003e없음 (단일 채권)\u003c/td\u003e\n\u003ctd\u003e수백~수천 개 자동 분산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e만기\u003c/td\u003e\n\u003ctd\u003e있음 (만기에 원금 확정 회수)\u003c/td\u003e\n\u003ctd\u003e없음 (롤오버 지속)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e세금\u003c/td\u003e\n\u003ctd\u003e이자: 연방세 과세, 주세 면제\u003c/td\u003e\n\u003ctd\u003e주식과 동일 처리\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e편의성\u003c/td\u003e\n\u003ctd\u003e별도 계정, 복잡, 미국 SS 필요\u003c/td\u003e\n\u003ctd\u003e기존 계좌에서 즉시 거래\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e가격 변동성\u003c/td\u003e\n\u003ctd\u003e만기 보유 시 원금 보장\u003c/td\u003e\n\u003ctd\u003e중간에 팔면 가격 변동 있음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e추천 대상\u003c/td\u003e\n\u003ctd\u003e만기까지 보유 확실 + SSN 있음\u003c/td\u003e\n\u003ctd\u003e대부분의 개인 투자자\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 수익률 곡선 전체 시각화\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-shell\"\u003e정상 수익률 곡선 (경기 정상)\n금리\n\u003cspan class=\"hljs-meta prompt_\"\u003e5% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│                                      ●●●\u003c/span\u003e\n   │                               ●●\n\u003cspan class=\"hljs-meta prompt_\"\u003e4% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│                         ●●\u003c/span\u003e\n   │                    ●●\n\u003cspan class=\"hljs-meta prompt_\"\u003e3% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│              ●●\u003c/span\u003e\n   │        ●●\n\u003cspan class=\"hljs-meta prompt_\"\u003e2% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│   ●●\u003c/span\u003e\n\u003cspan class=\"hljs-meta prompt_\"\u003e1% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│●\u003c/span\u003e\n   └─────────────────────────────────────────────\n    1M  3M  6M  1Y  2Y  3Y  5Y  7Y 10Y 20Y 30Y\n\n    해석: 단기금리 낮음 \u0026#x3C; 장기금리 높음 = 정상\n          경기 성장 기대 = 주식 투자 좋음\n\n평탄한 수익률 곡선 (경기 전환점)\n금리\n\u003cspan class=\"hljs-meta prompt_\"\u003e5% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│          ●●●●●●●●●●●●●●●●●●●\u003c/span\u003e\n   │    ●●●\n\u003cspan class=\"hljs-meta prompt_\"\u003e4% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│●\u003c/span\u003e\n   └─────────────────────────────────────────────\n    1M  3M  6M  1Y  2Y  3Y  5Y  7Y 10Y 20Y 30Y\n\n    해석: 단기 ≈ 장기 금리 = 경기 방향 불확실\n          주의 신호\n\n역전 수익률 곡선 (경기침체 전조)\n금리\n\u003cspan class=\"hljs-meta prompt_\"\u003e6% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│●●●●●●\u003c/span\u003e\n\u003cspan class=\"hljs-meta prompt_\"\u003e5% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│         ●●●●●●\u003c/span\u003e\n\u003cspan class=\"hljs-meta prompt_\"\u003e4% \u003c/span\u003e\u003cspan class=\"bash\"\u003e│                    ●●●●●●●●●●●●●●●\u003c/span\u003e\n   └─────────────────────────────────────────────\n    1M  3M  6M  1Y  2Y  3Y  5Y  7Y 10Y 20Y 30Y\n\n    해석: 단기금리 \u003e 장기금리 = DANGER!\n          과거 7번 중 6번 경기침체로 이어짐\n          (평균 12~24개월 시차)\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e10. 주식-채권 상관관계\u003c/h2\u003e\n\u003ch3\u003e왜 채권을 섞는가\u003c/h3\u003e\n\u003cp\u003e포트폴리오에 채권을 넣는 핵심 이유는 \u003cstrong\u003e주식과 반대로 움직여 손실을 줄이기 때문\u003c/strong\u003e입니다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e전통적 역상관 관계 (\u003cspan class=\"hljs-number\"\u003e2000\u003c/span\u003e년대~\u003cspan class=\"hljs-number\"\u003e2010\u003c/span\u003e년대)\n\n주식 시장 공황 (금리 하락)\n    주가 ↓↓           채권 가격 ↑↑ (금리 하락 → 채권 오름)\n    ──────────────────────────────\n    전체 포트폴리오 손실 완화!\n\n경기 호황 (금리 상승)\n    주가 ↑↑           채권 가격 ↓ (금리 상승 → 채권 내림)\n    ──────────────────────────────\
