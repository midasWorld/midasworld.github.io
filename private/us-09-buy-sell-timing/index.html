/tbody\u003e\n\u003c/table\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e2020년 3월 COVID 폭락 사례\n\nS\u0026#x26;P 500 가격:\n\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e,400 │●\n\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e,000 │  ●\n\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,600 │   ●\n\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,400 │    ●\n\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,200 │     ●●\n\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,200 │        ● ← 2020년 3월 23일 바닥 (\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,191)\n\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,100 │                                   ↑\n                              공포\u0026#x26;탐욕지수 = 2~3!\n\n이후:\n\u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,800 │         ●●\n\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e,200 │            ●●●●\n\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e,500 │                 ●●●●●\n\u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e,900 │                        → 1년 후 +60%\n\n교훈: 극도 공포(F\u0026#x26;G = 2~3)에서 매수한 사람들이\n      1년 만에 60% 수익\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e공포\u0026#x26;탐욕지수 활용 전략\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-less\"\u003e활용 전략 (역발상 투자)\n\n\u003cspan class=\"hljs-selector-tag\"\u003eF\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eG\u003c/span\u003e \u0026#x3C; \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e (극도 공포):\n  → 시장이 과도하게 두려워하는 상태\n  → 분할 매수 시작 (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e 투입)\n  → 역사적으로 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e년 후 수익률 평균 +\u003cspan class=\"hljs-number\"\u003e25\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e40%\u003c/span\u003e\n\n\u003cspan class=\"hljs-selector-tag\"\u003eF\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eG\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e (공포):\n  → 추가 매수 기회\n  → 기존 보유 종목 추가 매수 검토\n\n\u003cspan class=\"hljs-selector-tag\"\u003eF\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eG\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e (중립):\n  → 정상적 \u003cspan class=\"hljs-selector-tag\"\u003eDCA\u003c/span\u003e 유지\n  → 특별한 액션 없음\n\n\u003cspan class=\"hljs-selector-tag\"\u003eF\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eG\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e80\u003c/span\u003e (탐욕):\n  → 신규 대규모 진입 자제\n  → 기존 수익 일부 실현 검토\n\n\u003cspan class=\"hljs-selector-tag\"\u003eF\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003e\u0026#x26;\u003c/span\u003e\u003cspan class=\"hljs-selector-tag\"\u003eG\u003c/span\u003e \u003e \u003cspan class=\"hljs-number\"\u003e80\u003c/span\u003e (극도 탐욕):\n  → 신규 매수 최소화\n  → 보유 포지션 일부 정리\n  → 현금 비중 높이기\n  → 버핏의 말: \"남들이 탐욕스러울 때 두려워하라\"\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e확인 방법\u003c/strong\u003e: CNN Fear \u0026#x26; Greed Index (edition.cnn.com/markets/fear-and-greed)에서 실시간 확인 가능합니다. 매일 체크하면 시장 분위기를 빠르게 파악할 수 있습니다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 이동평균선 (Moving Average)\u003c/h2\u003e\n\u003cp\u003e이동평균선은 일정 기간 동안의 주가 평균값을 선으로 이은 것입니다. 주가의 노이즈를 제거하고 추세를 보여줍니다.\u003c/p\u003e\n\u003ch3\u003e주요 이동평균선의 의미\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e이동평균선\u003c/th\u003e\n\u003cth\u003e의미\u003c/th\u003e\n\u003cth\u003e용도\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e20일 MA\u003c/td\u003e\n\u003ctd\u003e단기 추세 (~한 달)\u003c/td\u003e\n\u003ctd\u003e단기 매매 타이밍, 단기 지지/저항\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e50일 MA\u003c/td\u003e\n\u003ctd\u003e중기 추세 (~2개월)\u003c/td\u003e\n\u003ctd\u003e중기 추세 판단, 골든크로스 기준\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e200일 MA\u003c/td\u003e\n\u003ctd\u003e장기 추세 (~10개월)\u003c/td\u003e\n\u003ctd\u003e상승장/하락장 구분선, 핵심 지지선\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003e200일 이동평균선의 중요성\u003c/strong\u003e: 시장 참가자 대부분이 주시합니다. 주가가 200일 MA 위에 있으면 강세 국면, 아래에 있으면 약세 국면으로 판단합니다.\u003c/p\u003e\n\u003ch3\u003e골든크로스와 데드크로스 (ASCII 다이어그램)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e골든크로스 (매수 신호)               데드크로스 (매도 신호)\n\n주가                                  주가\n  │    /─── \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e일 MA                    │  \\─── \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e일 MA\n  │   /                                │   \\\n  │  /  ↗ 골든크로스!                  │    \\ ↘ 데드크로스!\n  │ / ╱                                │     ╲ \\\n  │/─/── \u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e일 MA                      │      ──\\── \u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e일 MA\n  └────────────────────                └──────────\\───────\n  시간 →                               시간 →\n\n  \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e일 MA가 \u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e일 MA를                 \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e일 MA가 \u003cspan class=\"hljs-number\"\u003e200\u003c/span\u003e일 MA를\n  아래에서 위로 돌파                    위에서 아래로 돌파\n  → 상승 추세 시작 신호                → 하락 추세 시작 신호\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eApple 2023년 골든크로스 사례\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003eAAPL 차트 (2022~2023)\n\n\u003cspan class=\"hljs-variable\"\u003e$200\u003c/span\u003e │                              ╱─────\n\u003cspan class=\"hljs-variable\"\u003e$180\u003c/span\u003e │                         ╱───\n\u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e │              ──────────       ← 50일 MA\n\u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e │──────────╱─────────────       ← 200일 MA\n\u003cspan class=\"hljs-variable\"\u003e$140\u003c/span\u003e │        ╱\n\u003cspan class=\"hljs-variable\"\u003e$130\u003c/span\u003e │ 골든크로스\n\u003cspan class=\"hljs-variable\"\u003e$120\u003c/span\u003e │    │\n     └────┼──────────────────────────\n         Jan 2023\n\n2023년 1월: AAPL 골든크로스 발생 (\u003cspan class=\"hljs-variable\"\u003e$130\u003c/span\u003e 근처)\n2023년 12월: AAPL \u003cspan class=\"hljs-variable\"\u003e$190\u003c/span\u003e 돌파\n수익률: +46%\n\n골든크로스만 믿고 샀어도 좋은 수익!\n(단, 모든 골든크로스가 성공하지는 않음)\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e4. RSI (상대강도지수)\u003c/h2\u003e\n\u003cp\u003eRSI(Relative Strength Index)는 최근 주가 상승과 하락의 강도를 0~100 사이 숫자로 나타냅니다.\u003c/p\u003e\n\u003ch3\u003eRSI 구간 시각화\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003eRSI \u003cspan class=\"hljs-number\"\u003e0\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e 구간\n\n\u003cspan class=\"hljs-number\"\u003e100\u003c/span\u003e │──────────────── 극단적 과매수 (버블 신호)\n \u003cspan class=\"hljs-number\"\u003e80\u003c/span\u003e │\n \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e │──────────────── 과매수 (Overbought) → 매도 고려\n    │\n \u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e │──────────────── 중립선 (상승/하락 추세 구분)\n    │\n \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e │──────────────── 과매도 (Oversold) → 매수 고려\n \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e │\n  \u003cspan class=\"hljs-number\"\u003e0\u003c/span\u003e │──────────────── 극단적 과매도 (공황 신호)\n\n  해석:\n  RSI \u003e \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\"너무 많이 올랐다\"\u003c/span\u003e → 단기 조정 가능성\n  RSI \u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e: 중립 구간\n  RSI \u0026#x3C; \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\"너무 많이 떨어졌다\"\u003c/span\u003e → 반등 가능성\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eRSI 활용 시 주의사항\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e상황\u003c/th\u003e\n\u003cth\u003e해석\u003c/th\u003e\n\u003cth\u003e주의점\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eRSI \u003e 70 (과매수)\u003c/td\u003e\n\u003ctd\u003e단기 조정 가능성\u003c/td\u003e\n\u003ctd\u003e강한 상승 추세에서는 70 이상 수개월 유지 가능 (NVDA 2023년)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eRSI \u0026#x3C; 30 (과매도)\u003c/td\u003e\n\u003ctd\u003e반등 가능성\u003c/td\u003e\n\u003ctd\u003e강한 하락 추세에서는 30 이하 지속 가능\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eRSI 다이버전스\u003c/td\u003e\n\u003ctd\u003e추세 전환 신호\u003c/td\u003e\n\u003ctd\u003e주가는 고점 갱신, RSI는 낮아지면 하락 예고\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003eRSI 혼자 쓰지 마세요\u003c/strong\u003e: RSI가 70 이상이어도 AI 붐 같은 강한 추세에서 NVDA는 몇 달을 80~90에서 머물며 계속 올랐습니다. 반드시 다른 지표와 함께 확인하세요.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e5. 지지선과 저항선\u003c/h2\u003e\n\u003ch3\u003e지지선과 저항선 개념 (ASCII 다이어그램)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e주가\n\u003cspan class=\"hljs-variable\"\u003e$180\u003c/span\u003e │         ╱────────────── 저항선 (Resistance)\n     │        ╱ ↑ 주가가 뚫으려 시도\n\u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e │──╲────╱───────────────  ← 저항선\n     │   ╲  ╱\n\u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e │    ╲╱              ← 전저점이 저항선이 됨\n     │\n\u003cspan class=\"hljs-variable\"\u003e$140\u003c/span\u003e │─────────────────────── 지지선 (Support)\n     │  주가가 여러 번 이 가격에서 반등!\n\u003cspan class=\"hljs-variable\"\u003e$130\u003c/span\u003e │\n     └─────────────────────────────\n\n지지선: 주가가 반복적으로 하락을 멈추는 가격대\n저항선: 주가가 반복적으로 상승을 멈추는 가격대\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e저항선 돌파의 의미\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e저항선 돌파 시나리오\n\n    \u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e 저항선 돌파 전:          \u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e 돌파 후:\n\n         ↓↑↓↑↓                      ──────────────╱──\n    \u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e ────────── (저항)     \u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e ─────────────╱─── (이제 지지선!)\n         ↑                              주가\n    ─────────────── (지지)\n    \u003cspan class=\"hljs-variable\"\u003e$140\u003c/span\u003e\n\n    \u003cspan class=\"hljs-string\"\u003e\"저항선이 지지선으로 바뀐다\"\u003c/span\u003e = 심리적 전환점\n    거래량 동반 돌파 = 더 강한 신호\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 분할 매수 전략 실전 시뮬레이션: AAPL $10,000 투자\u003c/h2\u003e\n\u003cp\u003e$10,000을 AAPL에 투자한다고 가정하고, \u003cstrong\u003e4회 분할 매수 vs 일괄 매수\u003c/strong\u003e를 비교합니다.\u003c/p\u003e\n\u003ch3\u003e시나리오 설정\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e투자 시점: 2022년 1월 (하락장 진입 시점)\n투자 금액: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000\nAAPL 주가:\n  2022년 1월:  \u003cspan class=\"hljs-variable\"\u003e$180\u003c/span\u003e\n  2022년 3월:  \u003cspan class=\"hljs-variable\"\u003e$170\u003c/span\u003e\n  2022년 6월:  \u003cspan class=\"hljs-variable\"\u003e$148\u003c/span\u003e\n  2022년 9월:  \u003cspan class=\"hljs-variable\"\u003e$155\u003c/span\u003e\n  2023년 1월:  \u003cspan class=\"hljs-variable\"\u003e$145\u003c/span\u003e (최저점 근처)\n  2023년 7월:  \u003cspan class=\"hljs-variable\"\u003e$195\u003c/span\u003e (회복)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e전략 A: 일괄 매수 ($10,000 전액을 2022년 1월에 투자)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e2022년 1월: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 투자 → \u003cspan class=\"hljs-variable\"\u003e$180\u003c/span\u003e × 55.6주 = 55.6주 매수\n\n2023년 7월 기준:\n  보유 주식: 55.6주\n  주가: \u003cspan class=\"hljs-variable\"\u003e$195\u003c/span\u003e\n  평가액: 55.6 × \u003cspan class=\"hljs-variable\"\u003e$195\u003c/span\u003e = \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,842\n  수익률: +8.4%\n\n중간 과정:\n  2022년 6월 최저점: 55.6 × \u003cspan class=\"hljs-variable\"\u003e$148\u003c/span\u003e = \u003cspan class=\"hljs-variable\"\u003e$8\u003c/span\u003e,229 (-17.7%)  ← 공포 극심\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e전략 B: 4회 분할 매수 ($2,500씩 나눠서)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e분할 매수 계획 (하락 시 추가 매수)\n────────────────────────────────────────────\n시점         주가      투자금    매수 주수   누적 주수\n────────────────────────────────────────────\n2022년 1월   \u003cspan class=\"hljs-variable\"\u003e$180\u003c/span\u003e      \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,500   13.9주      13.9주\n2022년 3월   \u003cspan class=\"hljs-variable\"\u003e$170\u003c/span\u003e      \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,500   14.7주      28.6주  ← 하락 시 매수\n2022년 6월   \u003cspan class=\"hljs-variable\"\u003e$148\u003c/span\u003e      \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,500   16.9주      45.5주  ← 더 많이 매수\n2023년 1월   \u003cspan class=\"hljs-variable\"\u003e$145\u003c/span\u003e      \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,500   17.2주      62.7주  ← 최저점 매수\n────────────────────────────────────────────\n총 투자금:   \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000\n총 매수 주수: 62.7주\n평균 매수 단가: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 ÷ 62.7주 = \u003cspan class=\"hljs-variable\"\u003e$159\u003c/span\u003e.5/주\n────────────────────────────────────────────\n\n2023년 7월 기준:\n  보유 주식: 62.7주\n  주가: \u003cspan class=\"hljs-variable\"\u003e$195\u003c/span\u003e\n  평가액: 62.7 × \u003cspan class=\"hljs-variable\"\u003e$195\u003c/span\u003e = \u003cspan class=\"hljs-variable\"\u003e$12\u003c/span\u003e,227\n  수익률: +22.3%\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e두 전략 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003e일괄 매수\u003c/th\u003e\n\u003cth\u003e4회 분할 매수\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e투자 방식\u003c/td\u003e\n\u003ctd\u003e2022년 1월 전액 투자\u003c/td\u003e\n\u003ctd\u003e4회에 걸쳐 균등 투자\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e평균 매수 단가\u003c/td\u003e\n\u003ctd\u003e$180\u003c/td\u003e\n\u003ctd\u003e$159.5\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e최종 보유 주식 수\u003c/td\u003e\n\u003ctd\u003e55.6주\u003c/td\u003e\n\u003ctd\u003e62.7주\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2023년 7월 평가액\u003c/td\u003e\n\u003ctd\u003e$10,842\u003c/td\u003e\n\u003ctd\u003e$12,227\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003e최종 수익률\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e+8.4%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e+22.3%\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e최대 평가손실 (공포 구간)\u003c/td\u003e\n\u003ctd\u003e-17.7%\u003c/td\u003e\n\u003ctd\u003e-9.2% (심리적 부담 적음)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e심리적 안정성\u003c/td\u003e\n\u003ctd\u003e낮음 (고점 매수 후 계속 손실)\u003c/td\u003e\n\u003ctd\u003e높음 (하락 시 기회로 인식)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e분할 매수 핵심 원리\n\n    하락할 때 → 같은 돈으로 더 많은 주 구매\n    상승할 때 → 같은 돈으로 더 적은 주 구매\n    결과: 평균 매수 단가가 자연스럽게 낮아짐\n\n\u003cspan class=\"hljs-variable\"\u003e$180\u003c/span\u003e ─────●\n\u003cspan class=\"hljs-variable\"\u003e$170\u003c/span\u003e ─────────●\n\u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e ──────────────\n\u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e ──────────────────●●  ← 더 많이 살수록 평균 단가↓\n\u003cspan class=\"hljs-variable\"\u003e$140\u003c/span\u003e ──────────────────────────●●●\n\n분할 횟수: 4회\n최저점을 정확히 맞출 필요 없음 → 심리 부담 제거\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e중요\u003c/strong\u003e: 개별 주식 분할 매수는 기업이 근본적으로 좋다는 확신이 있을 때만 유효합니다. 망해가는 기업에 분할 매수는 \"떨어지는 칼을 잡는 행위\"가 될 수 있습니다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e7. 손절의 기술: -8% 기계적 손절 vs 펀더멘털 기반 손절\u003c/h2\u003e\n\u003cp\u003e가장 어려운 것이 손절입니다. 손실을 확정짓는 행위이기 때문에 심리적으로 극도로 어렵습니다.\u003c/p\u003e\n\u003ch3\u003e손실 회피 심리 (Loss Aversion)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e행동경제학 연구 (카너먼 \u0026#x26; 트버스키):\n\u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e 이익의 기쁨 \u0026#x3C; \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e 손실의 고통 (약 2.5배)\n\n투자자 심리:\n\u003cspan class=\"hljs-string\"\u003e\"지금 팔면 손해 확정이야, 좀 더 기다리면 오르겠지...\"\u003c/span\u003e\n→ 결과: 작은 손실이 큰 손실로 커짐\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e손실 크기에 따른 회복 필요 수익률\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e손실\u003c/th\u003e\n\u003cth\u003e원금 회복에 필요한 수익률\u003c/th\u003e\n\u003cth\u003e체감 난이도\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e-5%\u003c/td\u003e\n\u003ctd\u003e+5.3%\u003c/td\u003e\n\u003ctd\u003e매우 쉬움\u003 lass=\"hljs-variable\"\u003e$170\u003c/span\u003e │   ●\n\u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e │    ●\n\u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e │     ●──────────── 200일 MA\n\u003cspan class=\"hljs-variable\"\u003e$148\u003c/span\u003e │            ●\n\u003cspan class=\"hljs-variable\"\u003e$145\u003c/span\u003e │              ●  ← 200일 MA 이탈!\n                         여기서 매도 신호\n\n결정 기준:\n  200일 MA 위 → 보유\n  200일 MA 아래 → 매도 검토 (최소 포지션 축소)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e방법 3: 펀더멘털 기반 손절 (가장 정교한 방법)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e투자 논리(thesis)가 훼손되었을 때 매도\n\nNFLX (넷플릭스) 2022년 사례:\n\n투자 이유:\n  \"구독자 성장 지속 + 콘텐츠 독점력\"\n\n훼손 신호:\n  2022년 4월: 구독자 최초 감소 발표 (-20만 명)\n  → 성장 스토리 붕괴 → 가격 불문 즉시 매도 신호\n  결과: 발표 당일 -35% 하락\n\n펀더멘털 손절 기준:\n  \u003cspan class=\"hljs-section\"\u003e[ ]\u003c/span\u003e 매출 성장률이 3분기 연속 하락\n  \u003cspan class=\"hljs-section\"\u003e[ ]\u003c/span\u003e 경쟁사가 핵심 시장 점유율 20%+ 빼앗음\n  \u003cspan class=\"hljs-section\"\u003e[ ]\u003c/span\u003e CEO 또는 핵심 경영진 갑작스런 교체\n  \u003cspan class=\"hljs-section\"\u003e[ ]\u003c/span\u003e 회계 부정 또는 SEC 조사 개시\n  → 위 항목 해당 시 가격 불문 매도\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e두 방법 비교\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e구분\u003c/th\u003e\n\u003cth\u003e기계적 손절 (-8%)\u003c/th\u003e\n\u003cth\u003e펀더멘털 기반 손절\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e적용 대상\u003c/td\u003e\n\u003ctd\u003e기술적 트레이더, 단기 투자자\u003c/td\u003e\n\u003ctd\u003e가치투자자, 장기 투자자\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e감정 배제\u003c/td\u003e\n\u003ctd\u003e완전 배제 (기계적)\u003c/td\u003e\n\u003ctd\u003e판단 필요 (주관성 있음)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e일시적 조정에 강함\u003c/td\u003e\n\u003ctd\u003e약함 (자주 손절 가능)\u003c/td\u003e\n\u003ctd\u003e강함 (펀더멘털 유지 시 보유)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e장기 투자 적합성\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e높음\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e실수 방지\u003c/td\u003e\n\u003ctd\u003e큰 손실 방지 효과 탁월\u003c/td\u003e\n\u003ctd\u003e논리 점검 필요\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e워런 버핏 방식\u003c/td\u003e\n\u003ctd\u003e아님\u003c/td\u003e\n\u003ctd\u003e맞음\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 매수/매도 의사결정 플로우차트 (ASCII 다이어그램)\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e매수 의사결정 플로우차트\n\nSTART\n  │\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[이 기업의 사업 모델을 이해하는가?]\u003c/span\u003e\n  │ 아니오 → \u003cspan class=\"hljs-selector-attr\"\u003e[공부 후 재판단]\u003c/span\u003e → START\n  │ 예\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[최근 3분기 이상 실적 성장 중인가?]\u003c/span\u003e\n  │ 아니오 → \u003cspan class=\"hljs-selector-attr\"\u003e[패스 또는 Watch List]\u003c/span\u003e\n  │ 예\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[현재 PER이 업종 평균 2배 미만인가?]\u003c/span\u003e\n  │ 아니오 → \u003cspan class=\"hljs-selector-attr\"\u003e[고평가 주의, 소량만 or 패스]\u003c/span\u003e\n  │ 예\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[주가가 200일 MA 위에 있는가?]\u003c/span\u003e\n  │ 아니오 → \u003cspan class=\"hljs-selector-attr\"\u003e[매수 보류, 200일 MA 위 돌파 확인 후]\u003c/span\u003e\n  │ 예\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[RSI가 70 이상 과매수인가?]\u003c/span\u003e\n  │ 예 → \u003cspan class=\"hljs-selector-attr\"\u003e[조정 기다리기]\u003c/span\u003e\n  │ 아니오\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[F\u0026#x26;G 지수가 70 이상 극도 탐욕인가?]\u003c/span\u003e\n  │ 예 → \u003cspan class=\"hljs-selector-attr\"\u003e[신규 매수 자제]\u003c/span\u003e\n  │ 아니오\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[손절가와 목표가를 설정했는가?]\u003c/span\u003e\n  │ 아니오 → \u003cspan class=\"hljs-selector-attr\"\u003e[설정 후 재판단]\u003c/span\u003e\n  │ 예\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[✓ 매수 실행!]\u003c/span\u003e\n\n\n매도 의사결정 플로우차트\n\nSTART (보유 중인 종목)\n  │\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[손절가에 도달했는가?]\u003c/span\u003e\n  │ 예 → \u003cspan class=\"hljs-selector-attr\"\u003e[즉시 매도!]\u003c/span\u003e\n  │ 아니오\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[투자 논리(thesis)가 훼손되었는가?]\u003c/span\u003e\n  │ 예 → \u003cspan class=\"hljs-selector-attr\"\u003e[즉시 매도! (가격 불문)]\u003c/span\u003e\n  │ 아니오\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[목표가에 도달했는가?]\u003c/span\u003e\n  │ 예 → \u003cspan class=\"hljs-selector-attr\"\u003e[1/3 ~ 1/2 매도 후 나머지 보유]\u003c/span\u003e\n  │ 아니오\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[더 좋은 투자처를 발견했는가?]\u003c/span\u003e\n  │ 예 → \u003cspan class=\"hljs-selector-attr\"\u003e[교체 매매 검토]\u003c/span\u003e\n  │ 아니오\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[F\u0026#x26;G가 80+ 극도 탐욕인가?]\u003c/span\u003e\n  │ 예 → \u003cspan class=\"hljs-selector-attr\"\u003e[일부 차익 실현 검토]\u003c/span\u003e\n  │ 아니오\n  ▼\n\u003cspan class=\"hljs-selector-attr\"\u003e[✓ 계속 보유]\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 거래량: 신뢰도를 높이는 지표\u003c/h2\u003e\n\u003cp\u003e차트에서 가격만 보면 안 됩니다. \u003cstrong\u003e거래량은 가격 움직임의 신뢰도를 보여줍니다.\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e거래량과 주가의 4가지 조합\n\n조합 1: 주가↑ + 거래량↑ = 강한 상승 신호 (매수세 강함)\n\u003cspan class=\"hljs-code\"\u003e        거래량: ████████████████ (평균보다 높음)\n        주가: ↑↑↑↑↑\n        의미: 기관 투자자가 적극 매수 중\n\u003c/span\u003e\n조합 2: 주가↑ + 거래량↓ = 약한 상승 (속임수 가능성)\n\u003cspan class=\"hljs-code\"\u003e        거래량: ████ (평균보다 낮음)\n        주가: ↑↑↑\n        의미: 소수 세력의 인위적 상승 가능, 주의!\n\u003c/span\u003e\n조합 3: 주가↓ + 거래량↑ = 강한 하락 신호 (매도 고려)\n\u003cspan class=\"hljs-code\"\u003e        거래량: ████████████████ (평균보다 높음)\n        주가: ↓↓↓↓↓\n        의미: 기관이 대규모 매도 중, 추세 하락 신호\n\u003c/span\u003e\n조합 4: 주가↓ + 거래량↓ = 약한 하락 (조정 후 반등 가능성)\n\u003cspan class=\"hljs-code\"\u003e        거래량: ████ (평균보다 낮음)\n        주가: ↓↓↓\n        의미: 일시적 조정일 수 있음, 매도 서두르지 말 것\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e10. 피라미딩 (Pyramiding): 수익 나는 포지션 늘리기\u003c/h2\u003e\n\u003cp\u003e피라미딩은 \u003cstrong\u003e이미 수익이 나고 있는 포지션을 단계적으로 늘리는\u003c/strong\u003e 투자 기법입니다. 손실 나는 포지션에 추가 매수하는 \"물타기\"와 반대 개념입니다.\u003c/p\u003e\n\u003ch3\u003e피라미딩 원리\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e피라미딩 vs 물타기 비교\n\n물타기 (Wrong Way):                피라미딩 (Right Way):\n매수가 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e                        매수가 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e\n주가 \u003cspan class=\"hljs-variable\"\u003e$80\u003c/span\u003e으로 하락 (-20%)           주가 \u003cspan class=\"hljs-variable\"\u003e$120\u003c/span\u003e으로 상승 (+20%)\n→ 추가 \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e 매수 (평단낮추기)      → 확인 후 추가 \u003cspan class=\"hljs-variable\"\u003e$50\u003c/span\u003e 매수\n주가 \u003cspan class=\"hljs-variable\"\u003e$60\u003c/span\u003e으로 추가 하락             주가 \u003cspan class=\"hljs-variable\"\u003e$140\u003c/span\u003e으로 추가 상승\n→ 또 추가 매수...                 → 또 추가 \u003cspan class=\"hljs-variable\"\u003e$25\u003c/span\u003e 매수\n결과: 손실 눈덩이                  결과: 수익 극대화\n\n원칙: 시장이 \u003cspan class=\"hljs-string\"\u003e\"맞다\"\u003c/span\u003e고 증명했을 때만 베팅 키우기\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e피라미딩 실전 전략\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e피라미딩 3단계 예시 (총 \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 투자)\n\n1단계: 초기 매수 (리스크 작게)\n  주가: \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e\n  투자: \u003cspan class=\"hljs-variable\"\u003e$4\u003c/span\u003e,000 → 40주 매수\n  근거: 기술적 패턴 형성 + 펀더멘털 좋음\n\n2단계: 상승 확인 후 추가 매수\n  주가: \u003cspan class=\"hljs-variable\"\u003e$120\u003c/span\u003e (+20%)\n  투자: \u003cspan class=\"hljs-variable\"\u003e$3\u003c/span\u003e,000 → 25주 추가 매수 (2단계)\n  근거: 200일 MA 위 + 실적 서프라이즈 확인\n  누적: 65주, 평균 단가 \u003cspan class=\"hljs-variable\"\u003e$107\u003c/span\u003e.7\n\n3단계: 추세 강화 확인 후 마지막 추가\n  주가: \u003cspan class=\"hljs-variable\"\u003e$140\u003c/span\u003e (+40%)\n  투자: \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,000 → 14.3주 추가 매수\n  근거: 골든크로스 + 기관 매수 증가\n  누적: 79.3주, 평균 단가 \u003cspan class=\"hljs-variable\"\u003e$126\u003c/span\u003e (현재가 \u003cspan class=\"hljs-variable\"\u003e$140\u003c/span\u003e, 이미 +11%)\n\n나머지 \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000: 비상금/손절 여유\n────────────────────────────────────\n총 투자: \u003cspan class=\"hljs-variable\"\u003e$9\u003c/span\u003e,000 (1,000은 여유)\n보유 주식: 79.3주\n평균 단가: ~\u003cspan class=\"hljs-variable\"\u003e$113\u003c/span\u003e.5\n\n만약 \u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e까지 상승하면:\n  평가액: 79.3 × \u003cspan class=\"hljs-variable\"\u003e$160\u003c/span\u003e = \u003cspan class=\"hljs-variable\"\u003e$12\u003c/span\u003e,688\n  수익률: +41% (원금 \u003cspan class=\"hljs-variable\"\u003e$9\u003c/span\u003e,000 대비)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e피라미딩 핵심 규칙\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e규칙\u003c/th\u003e\n\u003cth\u003e내용\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e추가 매수는 상승 확인 후만\u003c/td\u003e\n\u003ctd\u003e하락 시 추가 매수 = 물타기 (금지)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e추가량은 초기보다 적게\u003c/td\u003e\n\u003ctd\u003e피라미드 모양 (초기 크고 추가 작게)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e각 추가 매수에 손절선 설정\u003c/td\u003e\n\u003ctd\u003e전체 포지션에 -10~15% 손절 설정\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e추세 이탈 시 전체 정리\u003c/td\u003e\n\u003ctd\u003e200일 MA 이탈 = 피라미딩 해제\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e피라미딩 포지션 크기 시각화\n\n초기 매수  ████████████████████ \u003cspan class=\"hljs-number\"\u003e40%\u003c/span\u003e\n\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e차 추가   ████████████████     \u003cspan class=\"hljs-number\"\u003e30%\u003c/span\u003e (초기보다 작게)\n\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e차 추가   ████████████         \u003cspan class=\"hljs-number\"\u003e20%\u003c/span\u003e (더 작게)\n비상금     ████                 \u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e\n                                  ↑\n                     피라미드 모양 = 위험 관리\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e11. 실적 발표 전날 vs 당일 매매 전략\u003c/h2\u003e\n\u003cp\u003e분기별 실적 발표(Earnings Release)는 주가의 변동성이 가장 큰 이벤트입니다.\u003c/p\u003e\n\u003ch3\u003e실적 발표 주변 주가 패턴\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e실적 발표 전 패턴 (Earnings Anticipation Run-up)\n\n  실적 발표 \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e주 전    발표 전날      발표 당일\n       ↓                  ↓              ↓\n       ●──────────────────●             ●── (호실적: +\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e15%\u003c/span\u003e)\n       │ 기대감으로 상승        발표     │\n       │ (\"Earnings Run-up\")   ↓        ●── (어닝쇼크: -\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e20%\u003c/span\u003e)\n       │                 불확실성\n       │                 극대화\n\n\"호재는 소문에 사고 뉴스에 팔아라\" (Buy the rumor, sell the news)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e전략 A: 실적 발표 전날 매수 (적극적 전략)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e장점:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 실적이 좋으면 발표 다음 날 큰 수익\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 실적 기대감이 이미 주가에 일부 반영되어 있음\n\n단점:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 어닝 쇼크 시 하룻밤 사이 -10~20% 손실 가능\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e \"베팅\"에 가까움\n\n적합한 상황:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 애널리스트 예상치 대비 \"어닝 서프라이즈\" 패턴이 반복되는 기업\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 최근 3~4분기 연속 어닝 비트(Beat) 기록한 기업\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 산업 전체 긍정적 시그널이 있을 때\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e전략 B: 실적 발표 당일 매도 (안전한 전략)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e장점:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 사전에 오른 수익 확정\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 어닝 쇼크 리스크 완전 회피\n\n단점:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 호실적 이후 추가 상승 놓침\n\n적합한 상황:\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 포지션이 이미 크게 수익 난 상태\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 시장 전반적으로 불확실성 높을 때\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 해당 기업의 실적 예측이 어려울 때\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e실적 발표 주요 ETF별 예상 반응 (2024년 기준)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e기업\u003c/th\u003e\n\u003cth\u003e발표 시즌\u003c/th\u003e\n\u003cth\u003e어닝 서프라이즈 패턴\u003c/th\u003e\n\u003cth\u003e평균 실적 발표일 주가 변동\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eAAPL\u003c/td\u003e\n\u003ctd\u003e1월, 4월, 7월, 10월\u003c/td\u003e\n\u003ctd\u003e비교적 안정적\u003c/td\u003e\n\u003ctd\u003e±3~7%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eNVDA\u003c/td\u003e\n\u003ctd\u003e2월, 5월, 8월, 11월\u003c/td\u003e\n\u003ctd\u003eAI 붐 이후 극적\u003c/td\u003e\n\u003ctd\u003e±10~25%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMSFT\u003c/td\u003e\n\u003ctd\u003e1월, 4월, 7월, 10월\u003c/td\u003e\n\u003ctd\u003e꾸준한 서프라이즈\u003c/td\u003e\n\u003ctd\u003e±4~8%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMETA\u003c/td\u003e\n\u003ctd\u003e2월, 4월, 7월, 10월\u003c/td\u003e\n\u003ctd\u003e부활 후 변동 큼\u003c/td\u003e\n\u003ctd\u003e±8~15%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTSLA\u003c/td\u003e\n\u003ctd\u003e1월, 4월, 7월, 10월\u003c/td\u003e\n\u003ctd\u003e변동성 극대\u003c/td\u003e\n\u003ctd\u003e±8~20%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e권장 전략\u003c/strong\u003e: 대부분의 개인 투자자에게는 \u003cstrong\u003e실적 발표 직전 대규모 포지션을 피하는\u003c/strong\u003e 것이 최선입니다. 이미 보유 중이라면 포지션의 50%를 발표 전날 매도해 리스크 헤지를 검토하세요.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e12. 세금 고려한 매도 타이밍: 1년 보유의 마법\u003c/h2\u003e\n\u003cp\u003e미국 주식 매도 시 세금은 보유 기간에 따라 크게 달라집니다.\u003c/p\u003e\n\u003ch3\u003e미국 자본이득세 (Capital Gains Tax)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e보유 기간\u003c/th\u003e\n\u003cth\u003e과세 방식\u003c/th\u003e\n\u003cth\u003e세율\u003c/th\u003e\n\u003cth\u003e비고\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1년 미만 (단기)\u003c/td\u003e\n\u003ctd\u003e단기 자본이득세\u003c/td\u003e\n\u003ctd\u003e일반 소득세율과 동일 (10~37%)\u003c/td\u003e\n\u003ctd\u003e급여 소득과 합산\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1년 이상 (장기)\u003c/td\u003e\n\u003ctd\u003e장기 자본이득세\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0%, 15%, 20%\u003c/strong\u003e (소득에 따라)\u003c/td\u003e\n\u003ctd\u003e훨씬 낮은 세율!\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e세금 차이 시뮬레이션 (\u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 이익 발생 시)\n\n투자자 소득: \u003cspan class=\"hljs-variable\"\u003e$80\u003c/span\u003e,000/년 (미국 거주자 기준)\n\n단기 매도 (1년 미만):\n  세율: 22% (소득세 22% 구간)\n  세금: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 × 22% = \u003cspan class=\"hljs-variable\"\u003e$2\u003c/span\u003e,200\n  실수령 이익: \u003cspan class=\"hljs-variable\"\u003e$7\u003c/span\u003e,800\n\n장기 매도 (1년 이상):\n  세율: 15% (장기 자본이득세)\n  세금: \u003cspan class=\"hljs-variable\"\u003e$10\u003c/span\u003e,000 × 15% = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,500\n  실수령 이익: \u003cspan class=\"hljs-variable\"\u003e$8\u003c/span\u003e,500\n\n차이: \u003cspan class=\"hljs-variable\"\u003e$700\u003c/span\u003e (세금 절약!)\n→ 단지 몇 주 더 기다려서 1년을 넘기면\n  세금을 \u003cspan class=\"hljs-variable\"\u003e$700\u003c/span\u003e 절약\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e한국 거주자의 세금 구조\u003c/h3\u003e\n\u003cp\u003e한국 거주자가 미국 주식에 투자할 경우:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e한국 거주자 해외 주식 양도소득세\n\n과세 기준: 연간 수익 250만원 초과분\n세율: 22% (지방소득세 포함)\n\n예시:\n  연간 수익: 1,250만원\n  공제: 250만원\n  과세 대상: 1,000만원\n  세금: 1,000만원 × 22% = 220만원\n\n절세 팁:\n\u003cspan class=\"hljs-bullet\"\u003e  1.\u003c/span\u003e 손실 종목 매도로 수익 상쇄 (Tax Loss Harvesting)\n\u003cspan class=\"hljs-code\"\u003e     수익: 1,000만원 - 손실: 400만원 = 600만원 수익\n     공제: 250만원\n     과세: 350만원 × 22% = 77만원 (원래 165만원 → 88만원 절약)\n\u003c/span\u003e\n\u003cspan class=\"hljs-bullet\"\u003e  2.\u003c/span\u003e 연말(12월) 전에 세금 계획\n\u003cspan class=\"hljs-code\"\u003e     수익이 250만원 초과하면 내년으로 매도 이연 검토\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e13. 실전 시나리오 3가지\u003c/h2\u003e\n\u003cp\u003e가장 자주 접하는 투자 상황을 구체적으로 다룹니다.\u003c/p\u003e\n\u003ch3\u003e시나리오 1: \"NVDA를 $400에 샀는데 $300으로 떨어졌다. 어떻게?\"\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e상황:\n  매수가: \u003cspan class=\"hljs-variable\"\u003e$400\u003c/span\u003e\n  현재가: \u003cspan class=\"hljs-variable\"\u003e$300\u003c/span\u003e (-25% 손실)\n\n질문 1: NVDA의 투자 논리(thesis)는 여전히 유효한가?\n  → AI GPU 수요, 데이터센터 성장, CUDA 생태계 독점\n  → 만약 이 논리가 유지되고 있다면?\n\n질문 2: 왜 \u003cspan class=\"hljs-variable\"\u003e$300\u003c/span\u003e으로 떨어졌는가?\n  A. 시장 전체 하락 (S\u0026#x26;P 500도 -20%)\n     → NVDA만의 문제 아님 → 보유 or 추가 매수 검토\n  B. NVDA 자체 악재 (실적 쇼크, 경쟁자 등장)\n     → 투자 논리 훼손 → 손절 검토\n\n결정:\n  [A의 경우]\n  ① 손절 기준(-25%)에 도달했으므로 기계적 손절 원칙이라면 매도\n  ② 또는 분할 추가 매수 (비중 5% 이하 유지 조건)\n     \u003cspan class=\"hljs-variable\"\u003e$300\u003c/span\u003e에 추가 매수 → 평균 단가 \u003cspan class=\"hljs-variable\"\u003e$350\u003c/span\u003e으로 낮춤\n\n  [B의 경우]\n  → 추가 하락 전에 즉시 손절! 더 큰 손실 방지\n\n핵심 교훈: 감정이 아닌 \u003cspan class=\"hljs-string\"\u003e\"논리 유효성\"\u003c/span\u003e으로 판단하라\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e시나리오 2: \"AAPL이 +30% 올랐다. 지금 팔아야 하나?\"\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e상황:\n  매수가: $150\n  현재가: $195 (+30% 수익)\n\n판단 기준 체크리스트:\n\n펀더멘털:\n  \u003cspan class=\"hljs-section\"\u003e[✓]\u003c/span\u003e 실적 계속 성장 중? → 보유 이유 있음\n  \u003cspan class=\"hljs-section\"\u003e[?]\u003c/span\u003e 현재 PER이 역사적 고점? → PER 30배 = 고평가 경계선\n  \u003cspan class=\"hljs-section\"\u003e[✓]\u003c/span\u003e AI 서비스 사업 아직 성장 초기? → 성장 스토리 살아있음\n\n기술적:\n  \u003cspan class=\"hljs-section\"\u003e[?]\u003c/span\u003e RSI가 75 이상? → 단기 과매수, 조정 가능성\n  \u003cspan class=\"hljs-section\"\u003e[✓]\u003c/span\u003e 200일 MA 위 유지? → 상승 추세 유효\n  \u003cspan class=\"hljs-section\"\u003e[?]\u003c/span\u003e F\u0026#x26;G 지수 80+? → 시장 전체 과열\n\n결정:\n  → 1/3 매도 (수익 확정): $195에 33주 매도\n  → 나머지 2/3 보유: 트레일링 스탑 -15% 설정 ($195 × \u003cspan class=\"hljs-attr\"\u003e0.85\u003c/span\u003e = \u003cspan class=\"hljs-variable\"\u003e$165\u003c/span\u003e)\n  → 결과: 수익의 일부 확정 + 추가 상승 참여\n\n핵심 교훈: 완벽한 고점은 알 수 없다. 분할 매도로 후회 최소화\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e시나리오 3: \"시장 전체가 -20% 떨어졌다. 어떻게?\"\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e상황:\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003eS\u0026#x26;P\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e기준\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e-20\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e하락\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(베어마켓\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e진입\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e기준)\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e보유\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e포트폴리오도\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e-15\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e~20%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e하락\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e뉴스:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e경기침체\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e우려,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e공포\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e극심\u003c/span\u003e\n\n\u003cspan class=\"hljs-string\"\u003e감정\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003evs\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e이성:\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e감정:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e\"더 떨어지기 전에 팔아야 해!\"\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e이성:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e역사적으로\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e-20\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%는\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e'매수 기회'\u003c/span\u003e\n\n\u003cspan class=\"hljs-string\"\u003e역사적\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e데이터:\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e┌─────────────────────────────────────────────┐\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eS\u0026#x26;P\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e-20\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e이상\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e하락\u003c/span\u003e \u003cspan class=\"hljs-string\"\u0 3c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e현재 PER이 업종 평균 대비 합리적인가?\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e주가가 200일 이동평균선 위에 있는가?\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003ctd\u003eRSI가 70 이상 과매수 구간은 아닌가?\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e6\u003c/td\u003e\n\u003ctd\u003e공포\u0026#x26;탐욕지수가 70 이하인가? (극도 탐욕 아닌가?)\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e7\u003c/td\u003e\n\u003ctd\u003e최근 실적 발표 내용을 확인했는가?\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e8\u003c/td\u003e\n\u003ctd\u003e내가 감당할 수 있는 금액인가? (포트폴리오 5~10%)\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e9\u003c/td\u003e\n\u003ctd\u003e손절 가격을 미리 정했는가? (-8~15%)\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e10\u003c/td\u003e\n\u003ctd\u003e목표 매도가를 미리 정했는가?\u003c/td\u003e\n\u003ctd\u003e☐\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch3\u003e매도 트리거 5가지\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e번호\u003c/th\u003e\n\u003cth\u003e매도 트리거\u003c/th\u003e\n\u003cth\u003e설명\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e목표가 달성\u003c/td\u003e\n\u003ctd\u003e사전에 정한 목표가 도달 → 1/3~1/2 매도\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e손절가 터치\u003c/td\u003e\n\u003ctd\u003e-8~15%, 또는 200일 MA 이탈\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e투자 논리 훼손\u003c/td\u003e\n\u003ctd\u003e사업 모델 변화, 경쟁자 등장, 부정 회계\u003c/td\u003e\n\u003c/tr\u003e\
