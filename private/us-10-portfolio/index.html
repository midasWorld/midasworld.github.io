ng\"\u003e최고의\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e수익이\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e목표가\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e아니라,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e목표를\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e달성할\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e확률을\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e높이는\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e것\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 자산배분의 핵심 원리 — 왜 섞는가\u003c/h2\u003e\n\u003ch3\u003e1-1. 상관관계(Correlation)의 마법\u003c/h3\u003e\n\u003cp\u003e서로 반대로 움직이는 자산을 섞으면 전체 변동성이 줄어든다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e자산 간 상관관계 (평균적 수치)\n──────────────────────────────────────────────────────────────────────\n                  미국주식  국제주식  채권  금    원자재  리츠\n미국주식 (VOO)     \u003cspan class=\"hljs-number\"\u003e1.00\u003c/span\u003e     \u003cspan class=\"hljs-number\"\u003e0.75\u003c/span\u003e    -\u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e  \u003cspan class=\"hljs-number\"\u003e0.10\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e0.30\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e0.60\u003c/span\u003e\n국제주식 (VEA)     \u003cspan class=\"hljs-number\"\u003e0.75\u003c/span\u003e     \u003cspan class=\"hljs-number\"\u003e1.00\u003c/span\u003e    -\u003cspan class=\"hljs-number\"\u003e0.10\u003c/span\u003e  \u003cspan class=\"hljs-number\"\u003e0.15\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e0.40\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e0.55\u003c/span\u003e\n채권 (BND)        -\u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e    -\u003cspan class=\"hljs-number\"\u003e0.10\u003c/span\u003e    \u003cspan class=\"hljs-number\"\u003e1.00\u003c/span\u003e  \u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e  -\u003cspan class=\"hljs-number\"\u003e0.10\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e\n금 (GLD)           \u003cspan class=\"hljs-number\"\u003e0.10\u003c/span\u003e     \u003cspan class=\"hljs-number\"\u003e0.15\u003c/span\u003e    \u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e  \u003cspan class=\"hljs-number\"\u003e1.00\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e0.30\u003c/span\u003e   \u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e\n──────────────────────────────────────────────────────────────────────\n→ 주식과 채권은 음의 상관관계 (-\u003cspan class=\"hljs-number\"\u003e0.20\u003c/span\u003e)\n→ 주식이 폭락할 때 채권이 오르는 경향이 있어서 포트폴리오 완충\n\n단, \u003cspan class=\"hljs-number\"\u003e2022\u003c/span\u003e년처럼 인플레이션 폭발 시에는\n주식(-\u003cspan class=\"hljs-number\"\u003e18%\u003c/span\u003e)과 채권(-\u003cspan class=\"hljs-number\"\u003e13%\u003c/span\u003e)이 동시에 떨어지기도 한다.\n→ 완벽한 헤지는 없다\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e1-2. 리스크와 수익의 트레이드오프\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e자산별 역사적 평균 수익률 vs 변동성 (연간 기준)\n──────────────────────────────────────────────────────────────\n자산                    연평균 수익률    변동성(표준편차)\n──────────────────────────────────────────────────────────────\n미국 소형주              ~\u003cspan class=\"hljs-number\"\u003e12%\u003c/span\u003e           ~\u003cspan class=\"hljs-number\"\u003e22%\u003c/span\u003e  ← 고위험/고수익\n미국 대형주(S\u0026#x26;P500)      ~\u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e           ~\u003cspan class=\"hljs-number\"\u003e15%\u003c/span\u003e\n국제 선진국 주식          ~\u003cspan class=\"hljs-number\"\u003e7%\u003c/span\u003e           ~\u003cspan class=\"hljs-number\"\u003e18%\u003c/span\u003e\n신흥국 주식              ~\u003cspan class=\"hljs-number\"\u003e9%\u003c/span\u003e           ~\u003cspan class=\"hljs-number\"\u003e25%\u003c/span\u003e\n부동산(리츠)              ~\u003cspan class=\"hljs-number\"\u003e9%\u003c/span\u003e           ~\u003cspan class=\"hljs-number\"\u003e18%\u003c/span\u003e\n장기 국채 (TLT)           ~\u003cspan class=\"hljs-number\"\u003e5%\u003c/span\u003e           ~\u003cspan class=\"hljs-number\"\u003e14%\u003c/span\u003e\n중기 국채                 ~\u003cspan class=\"hljs-number\"\u003e4%\u003c/span\u003e            ~\u003cspan class=\"hljs-number\"\u003e8%\u003c/span\u003e\n단기 국채 (SHY)           ~\u003cspan class=\"hljs-number\"\u003e3%\u003c/span\u003e            ~\u003cspan class=\"hljs-number\"\u003e3%\u003c/span\u003e  ← 저위험/저수익\n현금/예금                 ~\u003cspan class=\"hljs-number\"\u003e1%\u003c/span\u003e            ~\u003cspan class=\"hljs-number\"\u003e0%\u003c/span\u003e\n──────────────────────────────────────────────────────────────\n→ 수익률이 높을수록 변동성도 높다 (공짜 점심은 없다)\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e2. 생애주기별 자산배분 — 나이가 답을 알려준다\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003e원칙\u003c/strong\u003e: 나이가 젊을수록 주식 비중 높게, 은퇴에 가까울수록 채권/현금 비중 높게.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e생애주기별 권장 자산배분\n──────────────────────────────────────────────────────────────────────\n                  20대      30대      40대      50대      60대+\n──────────────────────────────────────────────────────────────────────\n주식 (국내+해외)   90%       80%       70%       60%       50%\n  └ 미국주식       70%       60%       50%       40%       35%\n  └ 해외주식       20%       20%       20%       20%       15%\n채권               5%        15%       25%       30%       35%\n현금/안전자산      5%         5%        5%        10%       15%\n──────────────────────────────────────────────────────────────────────\n\n\u003cspan class=\"hljs-section\"\u003e이유:\u003c/span\u003e\n  20대: 투자 기간 40년+ → 시장 폭락도 회복 시간 충분\n  30-40대: 자산 형성 최대 활용 기간\n  50대: 은퇴 10-15년 전, 리스크 완화 시작\n  60대+: 원금 보전과 현금흐름이 더 중요\n──────────────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-string\"\u003e\"100 - 나이 = 주식 비중\"\u003c/span\u003e 규칙 (간단한 출발점)\n  30세: 70% 주식 / 30% 채권\n  50세: 50% 주식 / 50% 채권\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e💡 주의\u003c/strong\u003e: 이는 일반적인 가이드라인이다. 개인 상황(부채 유무, 직업 안정성, 위험 허용 한도)에 따라 달라져야 한다. 밤에 잠 못 잘 정도로 불안하다면 주식 비중이 너무 높은 것이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e3. 유명 포트폴리오 전략 비교\u003c/h2\u003e\n\u003ch3\u003e3-1. 전통 60/40 포트폴리오\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e60/40 포트폴리오\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e구성: 주식 60% + 채권 40%\u003c/span\u003e\nETF 예시: VOO 60% + BND 40%\n\n\u003cspan class=\"hljs-section\"\u003e장점:\u003c/span\u003e\n  ✓ 단순하고 이해하기 쉬움\n  ✓ 80년+ 역사적 데이터로 검증됨\n  ✓ 주식 폭락 시 채권이 완충\n\n\u003cspan class=\"hljs-section\"\u003e단점:\u003c/span\u003e\n  ✗ 인플레이션 높은 시기에 채권+주식 동반 하락 가능\n  ✗ 2022년: 60/40 포트폴리오 -16% (최악의 해 중 하나)\n\n역사적 성과 (1976-2023):\n  연평균 수익률: ~8.8%\n  최대 낙폭(MDD): -27% (2008년 금융위기)\n  vs S\u0026#x26;P500 단독 MDD: -55%\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3-2. 올웨더 포트폴리오 (Ray Dalio)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e올웨더(All Weather) 포트폴리오\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e개념: 어떤 경제 환경에서도 버티도록 설계\u003c/span\u003e\n      (성장/침체 × 인플레/디플레 4가지 상황 모두 대비)\n\n\u003cspan class=\"hljs-section\"\u003e구성:\u003c/span\u003e\n  미국 주식 (VTI/VOO)       30%\n  장기 국채 (TLT)           40%\n  중기 국채 (IEF)           15%\n  금 (GLD/IAU)               7.5%\n  원자재 (DJP/PDBC)          7.5%\n\n역사적 성과 (2005-2023):\n  연평균 수익률: ~7.5%\n  최대 낙폭: -12% (매우 낮음)\n  2022년: -21% (채권+금 동반 하락으로 올웨더도 타격 받음)\n\n\u003cspan class=\"hljs-section\"\u003e단점:\u003c/span\u003e\n  채권 비중 55% → 금리 상승기 취약\n  성장 시기 수익률 S\u0026#x26;P500 보다 낮음\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3-3. 영구 포트폴리오 (Harry Browne)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e영구(Permanent) 포트폴리오\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-section\"\u003e개념: 4개 자산 균등 배분, 리밸런싱 최소화\u003c/span\u003e\n\n\u003cspan class=\"hljs-section\"\u003e구성:\u003c/span\u003e\n  주식 25%   (성장 시기 강함)\n  장기 채권 25% (디플레/위기 강함)\n  금 25%     (인플레/지정학 강함)\n  현금 25%   (침체기 안정)\n\n\u003cspan class=\"hljs-section\"\u003e장점:\u003c/span\u003e\n  극도로 단순\n  최대 낙폭 매우 낮음 (-15% 이하)\n\n\u003cspan class=\"hljs-section\"\u003e단점:\u003c/span\u003e\n  성장 시기 주식 100% 대비 현저히 낮은 수익\n  장기 복리 축적에는 불리\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3-4. 워런 버핏 유언장 포트폴리오\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e버핏 유언장 포트폴리오 (가장 단순)\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-string\"\u003e\"내가 죽으면 재산의:\n  90% → S\u0026#x26;P500 인덱스 펀드 (Vanguard)\n  10% → 단기 국채\"\u003c/span\u003e\n         — Warren Buffett\n\nETF 구성:\n  VOO 90% + SHY or BIL 10%\n\n\u003cspan class=\"hljs-section\"\u003e이유:\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e\"대부분의 기관 투자자와 개인 투자자가\n   액티브 운용보다 S\u0026#x26;P500을 장기 보유했을 때 더 좋은 결과를 얻는다\"\u003c/span\u003e\n\n역사적 성과:\n  단순하지만 강력\n  장기 투자자에게 최적\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e포트폴리오 전략 비교 표\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e전략\u003c/th\u003e\n\u003cth\u003e연평균 수익률\u003c/th\u003e\n\u003cth\u003e최대 낙폭\u003c/th\u003e\n\u003cth\u003e복잡도\u003c/th\u003e\n\u003cth\u003e적합한 투자자\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eS\u0026#x26;P500 100%\u003c/td\u003e\n\u003ctd\u003e~10%\u003c/td\u003e\n\u003ctd\u003e-55%\u003c/td\u003e\n\u003ctd\u003e매우 낮음\u003c/td\u003e\n\u003ctd\u003e젊은 장기 투자자\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e버핏 유언장 90/10\u003c/td\u003e\n\u003ctd\u003e~9.5%\u003c/td\u003e\n\u003ctd\u003e-48%\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e장기 투자 + 최소 안전장치\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e전통 60/40\u003c/td\u003e\n\u003ctd\u003e~8.8%\u003c/td\u003e\n\u003ctd\u003e-27%\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e균형형\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e올웨더\u003c/td\u003e\n\u003ctd\u003e~7.5%\u003c/td\u003e\n\u003ctd\u003e-12%\u003c/td\u003e\n\u003ctd\u003e중간\u003c/td\u003e\n\u003ctd\u003e안정성 중시\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e영구 포트폴리오\u003c/td\u003e\n\u003ctd\u003e~6.5%\u003c/td\u003e\n\u003ctd\u003e-15%\u003c/td\u003e\n\u003ctd\u003e낮음\u003c/td\u003e\n\u003ctd\u003e보수적, 은퇴자\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 실전 포트폴리오 — ETF로만 구성\u003c/h2\u003e\n\u003ch3\u003e포트폴리오 A: 완전 입문자 (3 ETF)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e입문자 포트폴리오 (핵심 3 ETF)\n──────────────────────────────────────────────────────────────\nVOO   80%   미국 S\u0026#x26;P500\nBND   15%   미국 전체 채권\nVEA    5%   선진국 분산\n\n월 \u003cspan class=\"hljs-variable\"\u003e$300\u003c/span\u003e 투자 시:\n  VOO: \u003cspan class=\"hljs-variable\"\u003e$240\u003c/span\u003e\n  BND:  \u003cspan class=\"hljs-variable\"\u003e$45\u003c/span\u003e\n  VEA:  \u003cspan class=\"hljs-variable\"\u003e$15\u003c/span\u003e\n\n특징:\n  최대한 단순하게 시작\n  S\u0026#x26;P500 위주 성장 + 채권 완충\n  해외 최소 분산\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e포트폴리오 B: 성장 지향 (5 ETF)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e성장 포트폴리오 (5 ETF)\n──────────────────────────────────────────────────────────────\nVOO   50%   미국 S\u0026#x26;P500 핵심\nQQQ   20%   기술주 성장 베팅\nSCHD  15%   배당 성장\nVEA   10%   선진국 분산\nBND    5%   최소 안전장치\n\n\u003cspan class=\"hljs-section\"\u003e적합: 30-40대, 공격적 성장 원하는 투자자\u003c/span\u003e\n\u003cspan class=\"hljs-section\"\u003e목표: 장기 연평균 10%+ 수익\u003c/span\u003e\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e포트폴리오 C: 배당+성장 균형 (6 ETF)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-makefile\"\u003e배당+성장 균형 포트폴리오\n──────────────────────────────────────────────────────────────\nVOO   35%   미국 S\u0026#x26;P500\nSCHD  25%   배당 성장\nQQQ   15%   기술주 성장\nVEA   10%   선진국\nTLT   10%   장기 국채\nTIPS   5%   인플레이션 헤지\n\n\u003cspan class=\"hljs-section\"\u003e목표:\u003c/span\u003e\n  배당 현금흐름: 연 2-3%\n  자본 성장: 연 7-8%\n  총 기대 수익: 연 9-11%\n\n\u003cspan class=\"hljs-section\"\u003e적합: 현금흐름도 원하는 40대 투자자\u003c/span\u003e\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e5. DCA vs 일괄 투자 (Lump Sum)\u003c/h2\u003e\n\u003cp\u003e돈이 생겼을 때 한 번에 다 투자해야 할까, 나눠서 투자해야 할까?\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e\u003cspan class=\"hljs-built_in\"\u003eDCA\u003c/span\u003e(달러 코스트 평균화) vs 일괄 투자 비교\n──────────────────────────────────────────────────────────────\nDCA (Dollar Cost Averaging)\n  → 매월 일정 금액을 꾸준히 투자\n  → 예: 월급날 매월 $\u003cspan class=\"hljs-number\"\u003e500\u003c/span\u003e씩 VOO 자동 매수\n\n  장점: 고점 매수 위험 분산, 심리적 편안함\n  단점: 시장이 계속 오를 때 성과 불리\n\n일괄 투자 (Lump Sum)\n  → 여유 자금이 생기면 즉시 전액 투자\n  → 예: $\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e,\u003cspan class=\"hljs-number\"\u003e000\u003c/span\u003e 생겼을 때 바로 VOO 매수\n\n  장점: 시장 참여 기간 최대화\n  단점: 고점 매수 시 단기 손실 감수 필요\n\nVanguard 연구 결과 (\u003cspan class=\"hljs-number\"\u003e1926\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e2022\u003c/span\u003e):\n  일괄 투자가 DCA 대비:\n  - \u003cspan class=\"hljs-number\"\u003e68%\u003c/span\u003e의 경우에서 \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e개월 성과 우수\n  - 평균 초과 수익: +\u003cspan class=\"hljs-number\"\u003e2.4%\u003c/span\u003e\n\n  이유: \u003cspan class=\"hljs-string\"\u003e\"시장은 장기적으로 오르는 경향\"\u003c/span\u003e\n       → 늦게 투자할수록 불리한 기간 존재\n──────────────────────────────────────────────────────────────\n결론:\n  ✓ 여유 자금이 생기면: 일괄 투자 (이론적으로 유리)\n  ✓ 매월 저축으로 투자: DCA (자동 습관 형성)\n  ✓ 심리적으로 불안하다면: DCA (스트레스 감소가 우선)\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 리밸런싱 — 포트폴리오를 유지하는 방법\u003c/h2\u003e\n\u003ch3\u003e6-1. 리밸런싱이 왜 필요한가\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e리밸런싱\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e없을\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e때의\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e포트폴리오\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e변화\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e──────────────────────────────────────────────────────────────\u003c/span\u003e\n\u003cspan class=\"hljs-number\"\u003e2020\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e년\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e초\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e설정:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eVOO\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e+\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eBND\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e\n\n\u003cspan class=\"hljs-number\"\u003e2021\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e년\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e말\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(주식\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e강세):\u003c/span\u003e\n  \u003cspan class=\"hljs-attr\"\u003eVOO:\u003c/span\u003e \u003cspan c n class=\"hljs-string\"\u003e예:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eVOO\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e목표\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e60\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e65\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e이상이면\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e매도,\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e55\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e%\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e이하면\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e매수\u003c/span\u003e\n\n\u003cspan class=\"hljs-string\"\u003e방법\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003e3:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e새\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e투자금으로\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e리밸런싱\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(세금\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e효율적)\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e매월\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e투자할\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e때\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e비중이\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e낮은\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e자산에만\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e매수\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e기존\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e보유분\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e팔\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e필요\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e없음\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e→\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e양도세\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e최소화\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e──────────────────────────────────────────────────────────────\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e권장:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e방법\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e+3\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e혼합\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e(임계치\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e+\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e새\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e투자금\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e활용)\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6-3. 세금 효율적 리밸런싱 (한국 투자자)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e한국 투자자 리밸런싱 세금 팁\n──────────────────────────────────────────────────────────────\n한국 해외주식 양도세:\n  연간 양도차익 250만원까지 비과세\n  초과분: 22% 세금\n\n리밸런싱 세금 전략:\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 연말에 손실난 종목 매도 → 손익 통산 (Tax Loss Harvesting)\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 250만원 한도 내에서 이익 실현 + 재매수\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 새 투자금으로만 리밸런싱 → 기존 보유분 매도 최소화\n\n예시:\n  VOO +300만원 이익, QQQ -100만원 손실인 경우\n  QQQ 손절 후 VOO 이익 실현 → 실질 과세 양도차익 200만원 (비과세!)\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e7. 포트폴리오 성과 측정\u003c/h2\u003e\n\u003ch3\u003e7-1. 샤프 비율 (Sharpe Ratio)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e샤프 비율 = (포트폴리오 수익률 - 무위험 수익률) / 변동성\n\n높을수록 좋다 (위험 대비 수익이 높다)\n\n기준:\n  1.0 이상 → 양호\n  2.0 이상 → 우수\n  3.0 이상 → 매우 우수\n\n예시:\n  포트폴리오 수익률: 12%\n  무위험 수익률(국채): 4%\n  변동성(표준편차): 15%\n  샤프 비율: (12-4)/\u003cspan class=\"hljs-attr\"\u003e15\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e0.53\u003c/span\u003e → 보통\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e7-2. 최대 낙폭 (MDD, Maximum Drawdown)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e최대 낙폭 = 고점 대비 최저점 하락률\n\n예시:\n  포트폴리오 고점: \u003cspan class=\"hljs-variable\"\u003e$100\u003c/span\u003e,000\n  최저점: \u003cspan class=\"hljs-variable\"\u003e$70\u003c/span\u003e,000\n  MDD = -30%\n\n각 전략별 역사적 MDD:\n  S\u0026#x26;P500 100%:    -55% (2008년)\n  60/40 포트폴리오: -27% (2008년)\n  올웨더 포트폴리오: -12% (2020년)\n  현금 100%:       0% (but 인플레이션으로 구매력 -3%/년)\n\n\u003cspan class=\"hljs-string\"\u003e\"MDD가 30%를 넘으면 버티기 너무 힘들어 결국 손절하게 된다\"\u003c/span\u003e\n→ 자신이 감내할 수 있는 MDD를 먼저 파악하고 포트폴리오 설계\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 실전 체크리스트 — 포트폴리오 시작하기\u003c/h2\u003e\n\u003ch3\u003eStep 1: 투자 목적 명확화\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e□ 나의 투자 목적은? (노후, 주택 구입, 자녀 교육, 자산 증식)\n□ 투자 기간은? (\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e년 미만 / \u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e년 / \u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e년+)\n□ 감내 가능한 최대 손실은? (-\u003cspan class=\"hljs-number\"\u003e10%\u003c/span\u003e / -\u003cspan class=\"hljs-number\"\u003e20%\u003c/span\u003e / -\u003cspan class=\"hljs-number\"\u003e30%\u003c/span\u003e / -\u003cspan class=\"hljs-number\"\u003e50%\u003c/span\u003e)\n□ 현금흐름이 필요한가? (배당 필요 vs 성장만 추구)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eStep 2: 자산배분 결정\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e□ 생애주기별 권장 비중 참고 (\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e번 섹션)\n□ 위험 허용 한도로 채권 비중 조정\n□ 핵심 ETF (VOO/VTI) + 부가 ETF (\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e개 최대)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eStep 3: 실행 및 자동화\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e□ 증권사 계좌 개설 및 달러 환전\n□ 매월 자동 이체 설정 (월급날 다음날)\n□ 리밸런싱 캘린더 설정 (연 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e회 날짜 고정)\n□ 성과 측정 기준 설정 (벤치마크: 보통 S\u0026#x26;P500)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eStep 4: 유지 원칙\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e□ 시장 폭락 시 '매도' 충동 억제 (공황 매도 금지)\n□ 뉴스에 흔들리지 않기 (장기 투자 원칙 유지)\n□ 연 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e회 포트폴리오 검토 (목적이 바뀌었는가?)\n□ 세금 최적화 (손익 통산, \u003cspan class=\"hljs-number\"\u003e250\u003c/span\u003e만원 한도 활용)\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 흔한 실수 10가지 — 이것만 피해도 상위 30%\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e포트폴리오 구성 흔한 실수\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e \"지금 핫한 테마\"에 전부 투자 (ARKK, 메타버스 등)\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 레버리지 ETF를 장기 보유\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 리밸런싱을 한 번도 안 함 (비중 왜곡 심해짐)\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e 시장 폭락 시 공황 매도 후 회복 시작할 때 다시 매수\n\u003cspan class=\"hljs-bullet\"\u003e5.\u003c/span\u003e 수수료 높은 액티브 펀드로 전환 (1-2% 수수료 복리 손실)\n\u003cspan class=\"hljs-bullet\"\u003e6.\u003c/span\u003e 배당 받으면 그냥 계좌에 방치 (재투자 안 함)\n\u003cspan class=\"hljs-bullet\"\u003e7.\u003c/span\u003e 모든 자산을 달러로만 보유 (환율 집중 리스크)\n\u003cspan class=\"hljs-bullet\"\u003e8.\u003c/span\u003e 세금 고려 없이 연말 전 이익 전부 실현\n\u003cspan class=\"hljs-bullet\"\u003e9.\u003c/span\u003e 포트폴리오가 너무 복잡 (ETF 20개 이상 → 관리 불가)\n\u003cspan class=\"hljs-bullet\"\u003e10.\u003c/span\u003e 남의 포트폴리오 그대로 복사 (목적/나이/상황이 다름)\n──────────────────────────────────────────────────────────────\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e정리 — 포트폴리오의 황금 원칙\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e포트폴리오 5대 황금 원칙\n──────────────────────────────────────────────────────────────\n\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e 단순하게 시작한다\n   → VOO + BND 2개로도 충분히 강력한 포트폴리오\n\n\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e 목적에 맞게 설계한다\n   → 30년 후 노후자금 ≠ 5년 후 집 살 돈 → 다른 포트폴리오\n\n\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e 꾸준히 투자한다 (DCA)\n   → 타이밍 맞추려 하지 말고 매월 일정액 자동 투자\n\n\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e 리밸런싱으로 유지한다\n   → 연 1-2회 원래 비중으로 되돌리기\n\n\u003cspan class=\"hljs-bullet\"\u003e5.\u003c/span\u003e 감정을 제거한다\n   → 시장이 -30% 떨어져도 팔지 않는 비중으로 설계\n──────────────────────────────────────────────────────────────\n\"주식 시장에서 돈을 잃는 것은 어렵지 않다.\n 하지만 20년간 보유하는 것도 어렵지 않다.\n 문제는 대부분이 그 사이에 뭔가를 하려 한다는 것이다.\"\n\u003cspan class=\"hljs-code\"\u003e                              — Peter Lynch\n──────────────────────────────────────────────────────────────\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이것으로 미국 주식 투자 입문 10편 시리즈가 완성됐다. 11편(거시경제와 국제 시사)에서는 뉴스와 경제 지표가 포트폴리오에 어떤 영향을 미치는지 배운다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-12\",\"children\":[[\"$\",\"$L14\",null,{\"href\":\"/private\",\"className\":\"text-sm text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors mb-8 inline-block\",\"children\":\"← Private 목록으로\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center gap-2 mb-3\",\"children\":[[\"$\",\"span\",null,{\"className\":\"text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400\",\"children\":\"stock\"}],[\"$\",\"span\",null,{\"className\":\"text-xs text-gray-400\",\"children\":\"2026-03-26\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold text-gray-900 dark:text-g
