         거시경제 → 주가 영향 지도                         │\n└─────────────────────────────────────────────────────────────────────┘\n\n  \u003cspan class=\"hljs-selector-attr\"\u003e[연준(Fed)]\u003c/span\u003e ──금리결정──▶ \u003cspan class=\"hljs-selector-attr\"\u003e[채권 수익률]\u003c/span\u003e ──할인율 상승──▶ \u003cspan class=\"hljs-selector-attr\"\u003e[주가 하락]\u003c/span\u003e\n       │                         │\n       │                    \u003cspan class=\"hljs-selector-attr\"\u003e[달러 강세]\u003c/span\u003e\n       │                         │\n  \u003cspan class=\"hljs-selector-attr\"\u003e[인플레이션]\u003c/span\u003e ──CPI 발표──▶ \u003cspan class=\"hljs-selector-attr\"\u003e[금리 예측]\u003c/span\u003e  \u003cspan class=\"hljs-selector-attr\"\u003e[다국적기업 실적 악화]\u003c/span\u003e\n       │                         │\n  \u003cspan class=\"hljs-selector-attr\"\u003e[고용지표]\u003c/span\u003e                \u003cspan class=\"hljs-selector-attr\"\u003e[신흥국 자금 이탈]\u003c/span\u003e\n       │\n  \u003cspan class=\"hljs-selector-attr\"\u003e[GDP 성장]\u003c/span\u003e\n       │\n  \u003cspan class=\"hljs-selector-attr\"\u003e[기업 실적]\u003c/span\u003e ──EPS 서프라이즈──▶ \u003cspan class=\"hljs-selector-attr\"\u003e[개별 주가 급등/급락]\u003c/span\u003e\n       │\n  \u003cspan class=\"hljs-selector-attr\"\u003e[지정학 리스크]\u003c/span\u003e ──전쟁/제재──▶ \u003cspan class=\"hljs-selector-attr\"\u003e[에너지·방산주 급등]\u003c/span\u003e\n                                  \u003cspan class=\"hljs-selector-attr\"\u003e[항공·기술주 급락]\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e1. 금리와 주가의 관계 — 투자자가 반드시 이해해야 할 핵심\u003c/h2\u003e\n\u003ch3\u003e1.1 연준(Fed)은 어떻게 금리를 결정하나\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│                  연준 금리 결정 메커니즘                              │\n└─────────────────────────────────────────────────────────────────────┘\n\n  \u003cspan class=\"hljs-selector-attr\"\u003e[경제 데이터 수집]\u003c/span\u003e\n  \u003cspan class=\"hljs-built_in\"\u003eCPI\u003c/span\u003e(물가) + 고용지표 + GDP + \u003cspan class=\"hljs-built_in\"\u003ePCE\u003c/span\u003e(연준 선호 물가)\n          │\n          ▼\n  \u003cspan class=\"hljs-selector-attr\"\u003e[FOMC 위원 회의]\u003c/span\u003e ← 연 \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e회 개최\n  \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e명의 위원이 투표\n  (의장 포함, 지역 연준 총재 순환)\n          │\n          ▼\n  판단: 경제 과열?    vs    경제 침체?\n          │                     │\n    인플레이션 우려           실업 급증\n          │                     │\n    금리 인상 ↑               금리 인하 ↓\n          │                     │\n    ──────▼─────────────────────▼──────\n                   발표\n    \u003cspan class=\"hljs-string\"\u003e\"기준금리를 0.25%p 인상합니다\"\u003c/span\u003e\n    (또는 동결, 또는 인하)\n          │\n          ▼\n    즉각 시장 반응 (발표 후 수 분 이내)\n    → 예상과 다르면 주식/채권/달러 동시 급변동\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003e연준 의장의 말 한마디가 시장 전체를 흔든다.\u003c/strong\u003e\n제롬 파월(Jerome Powell) 의장의 발표 시간에는 변동성이 극도로 커진다.\u003c/p\u003e\n\u003ch3\u003e1.2 금리 인상이 주가를 떨어뜨리는 이유 — DCF 모델\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-ini\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│          DCF(현금흐름할인) 모델로 이해하는 금리-주가 역관계          │\n└─────────────────────────────────────────────────────────────────────┘\n\n  주가 = 미래 이익들의 현재 가치 합계\n\n  현재 가치 공식:\n  \u003cspan class=\"hljs-attr\"\u003ePV\u003c/span\u003e = Future Cash Flow ÷ (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e + 할인율)^n\n\n  ──────────────────────────────────────────────────────────────────\n\n  사례: Apple이 향후 3년간 매년 $10 EPS 예상\n\n  금리 3% (낮을 때):                금리 7% (높을 때):\n  ─────────────────                 ─────────────────\n  1년후 $10 → \u003cspan class=\"hljs-attr\"\u003ePV\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e1.03\u003c/span\u003e  = \u003cspan class=\"hljs-variable\"\u003e$9\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e71\u003c/span\u003e  \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e1.07\u003c/span\u003e  = \u003cspan class=\"hljs-variable\"\u003e$9\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e35\u003c/span\u003e\n  2년후 $10 → \u003cspan class=\"hljs-attr\"\u003ePV\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e1.06\u003c/span\u003e  = \u003cspan class=\"hljs-variable\"\u003e$9\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e43\u003c/span\u003e  \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e1.14\u003c/span\u003e  = \u003cspan class=\"hljs-variable\"\u003e$8\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e73\u003c/span\u003e\n  3년후 $10 → \u003cspan class=\"hljs-attr\"\u003ePV\u003c/span\u003e = \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e1.09\u003c/span\u003e  = \u003cspan class=\"hljs-variable\"\u003e$9\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e15\u003c/span\u003e  \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e1.23\u003c/span\u003e  = \u003cspan class=\"hljs-variable\"\u003e$8\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e16\u003c/span\u003e\n                            ──────                  ──────\n              합계 현재가치: $28.29                  $26.24\n\n  금리 3% → 7%  :  주가 이론값 7.2% 하락!\n\n  ──────────────────────────────────────────────────────────────────\n\n  특히 성장주(미래 이익 비중 높음)에 타격 더 큼!\n\n  가치주: 이미 이익 내는 회사 → 금리 영향 상대적 작음\n  성장주: 10년 후 이익 기대 → 할인율 상승 시 현재가치 폭락!\n\n         금리 인상\n            │\n     ┌──────┴──────┐\n     │             │\n  성장주           가치주\n  -30% ~ -50%    -10% ~ -20%\n  (TSLA, NVDA)   (JPM, XOM)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch                          │\n└─────────────────────────────────────────────────────────────────────┘\n\n  \u003cspan class=\"hljs-attr\"\u003eDXY\u003c/span\u003e = 달러의 강도를 주요 \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e개 통화 대비 측정한 지수\n\n  구성 통화:\n  ┌──────────────┬──────────┬──────────────────────────────┐\n  │ 통화          │ 비중     │ 설명                         │\n  ├──────────────┼──────────┼──────────────────────────────┤\n  │ 유로 (EUR)   │  57.6%   │ 가장 큰 비중                 │\n  │ 일본 엔 (JPY)│  13.6%   │                              │\n  │ 영국 파운드  │  11.9%   │                              │\n  │ 캐나다 달러  │   9.1%   │                              │\n  │ 스웨덴 크로나│   4.2%   │                              │\n  │ 스위스 프랑  │   3.6%   │                              │\n  └──────────────┴──────────┴──────────────────────────────┘\n\n  기준값: 100 (1973년 기준)\n  현재 DXY 값:\n  \u003e 100: 달러 강세 (역사적 평균 대비 강함)\n  \u0026#x3C; 100: 달러 약세\n\n  DXY ↑ (달러 강세) 시나리오:\n  미국 금리 인상 → 전 세계 자금 미국으로 이동 → 달러 수요 증가 → DXY 상승\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3.2 달러 강세 → 다국적 기업 실적 타격 메커니즘\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│           달러 강세 → Apple 실적 타격 경로                           │\n└─────────────────────────────────────────────────────────────────────┘\n\n  Apple 매출 구조 (해외 비중 ~60%):\n  미국:   40%\n  유럽:   24%   ← 유로화 수입\n  중국:   19%   ← 위안화 수입\n  기타:   17%   ← 각국 통화 수입\n\n  달러 약세 시 (유럽에서 1억 유로 매출):\n  1€ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.10  → \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e억 1,000만 달러로 환산 ✅\n\n  달러 강세 시 (유럽에서 동일 1억 유로 매출):\n  1€ = \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.00  → \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e억 달러로 환산 ❌\n                  (\u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e,000만 달러 손실! 유럽 판매량 그대로인데!)\n\n  ──────────────────────────────────────────────────────────────────\n\n  2022년 실제 Apple 사례:\n  ┌─────────────────────────────────────────────────────────────────┐\n  │  2022년 Q3 실적 발표 (2022년 7월 28일)                         │\n  │                                                                 │\n  │  매출: \u003cspan class=\"hljs-variable\"\u003e$828\u003c/span\u003e억 (예상 \u003cspan class=\"hljs-variable\"\u003e$828\u003c/span\u003e억 - 딱 맞음)                          │\n  │                                                                 │\n  │  팀 쿡 코멘트:                                                  │\n  │  \u003cspan class=\"hljs-string\"\u003e\"달러 강세로 약 \u003cspan class=\"hljs-variable\"\u003e$600\u003c/span\u003e억의 매출 환산 손실 발생\"\u003c/span\u003e                │\n  │  \u003cspan class=\"hljs-string\"\u003e\"환율 영향 없었다면 매출 성장률 +5% 더 높았을 것\"\u003c/span\u003e            │\n  │                                                                 │\n  │  DXY 2022년: 95 → 114 (20% 달러 강세)                         │\n  │  AAPL 2022년 주가: \u003cspan class=\"hljs-variable\"\u003e$182\u003c/span\u003e → \u003cspan class=\"hljs-variable\"\u003e$130\u003c/span\u003e (28% 하락)                      │\n  └─────────────────────────────────────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e3.3 한국 투자자의 이중 환율 리스크\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│               한국 투자자만의 이중 환율 리스크                       │\n└─────────────────────────────────────────────────────────────────────┘\n\n  한국 투자자가 Apple 주식 보유 시:\n\n  수익/손실 = 주가 변동 × 환율 변동\n\n  시나리오 A: 주가 상승 + 달러 약세 (최악)\n  ───────────────────────────────────────\n  AAPL: \u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e → \u003cspan class=\"hljs-variable\"\u003e$165\u003c/span\u003e (+10%)\n  USD/KRW: 1,300 → 1,200 (-7.7% 원화 강세)\n  원화 기준 실제 수익:\n    매수: \u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e × 1,300 = ₩195,000\n    매도: \u003cspan class=\"hljs-variable\"\u003e$165\u003c/span\u003e × 1,200 = ₩198,000\n    수익: +₩3,000 (= +1.5%)  ← 주가는 10% 올랐는데!\n\n  시나리오 B: 주가 상승 + 달러 강세 (최고)\n  ───────────────────────────────────────\n  AAPL: \u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e → \u003cspan class=\"hljs-variable\"\u003e$165\u003c/span\u003e (+10%)\n  USD/KRW: 1,300 → 1,400 (+7.7% 원화 약세)\n  원화 기준 실제 수익:\n    매수: \u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e × 1,300 = ₩195,000\n    매도: \u003cspan class=\"hljs-variable\"\u003e$165\u003c/span\u003e × 1,400 = ₩231,000\n    수익: +₩36,000 (= +18.5%)  ← 주가는 10%인데 18.5% 수익!\n\n  시나리오 C: 주가 하락 + 달러 강세\n  ───────────────────────────────────\n  AAPL: \u003cspan class=\"hljs-variable\"\u003e$150\u003c/span\u003e → \u003cspan class=\"hljs-variable\"\u003e$135\u003c/span\u003e (-10%)\n  USD/KRW: 1,300 → 1,400 (+7.7%)\n  원화 기준:\n    매수: ₩195,000\n    매도: \u003cspan class=\"hljs-variable\"\u003e$135\u003c/span\u003e × 1,400 = ₩189,000\n    손실: -₩6,000 (= -3%)  ← 달러 강세가 손실 일부 상쇄\n\n  ──────────────────────────────────────────────────────────────────\n  환율 헤지 방법:\n  - 환헤지 ETF 사용 (예: KODEX 미국S\u0026#x26;P500(H) - 환헤지 버전)\n  - 달러 자산 보유 (이미 달러로 투자하면 자연 헤지 효과)\n  - 달러 예금 / 달러 RP (단기 달러 자산)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 체크포인트\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e달러 강세(DXY 상승) 구간에서 미국 주식을 사면, 주가 수익에 환율 수익까지 더블로 날 수 있다. 반면 달러 약세 시에는 주가 수익이 환율 손실로 깎인다. 장기 투자자라면 환율 헤지 없이 그냥 보유하는 것이 일반적으로 더 유리하다 (비용 절감).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e4. 지정학적 리스크 — 전쟁과 제재가 주가를 어떻게 흔드나\u003c/h2\u003e\n\u003ch3\u003e4.1 러시아-우크라이나 전쟁 (2022년 2월)\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e┌─────────────────────────────────────────────────────────────────────┐\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e         \u003cspan class=\"hl                               │\n└─────────────────────────────────────────────────────────────────────┘\n\n  매월 정기 발표 (미국 동부 시각 기준, 한국 시각은 여름 +\u003cspan class=\"hljs-number\"\u003e13\u003c/span\u003eh):\n\n  ┌────────────────────┬───────────────────┬───────────────────────┐\n  │ 지표                │ 발표 시기          │ 한국 시각 (여름)     │\n  ├────────────────────┼───────────────────┼───────────────────────┤\n  │ ISM 제조업 PMI     │ 매월 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e일          │ 오후 \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e            │\n  │ NFP (비농업취업자) │ 매월 첫째 금요일  │ 오후 \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e             │\n  │ ISM 서비스 PMI     │ 매월 첫째 화요일  │ 오후 \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e            │\n  │ CPI (소비자물가)   │ 매월 둘째 수요일  │ 오후 \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e             │\n  │ PPI (생산자물가)   │ 매월 둘째 목요일  │ 오후 \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e             │\n  │ 소매판매           │ 매월 중순         │ 오후 \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e             │\n  │ PCE (연준선호물가) │ 매월 말일         │ 오후 \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e             │\n  ├────────────────────┼───────────────────┼───────────────────────┤\n  │ GDP (예비치)       │ 분기 첫째달 마지막│ 오후 \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e             │\n  │ FOMC 결정          │ 연 \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e회            │ 새벽 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e00\u003c/span\u003e (여름)      │\n  │ 연준 의장 기자회견 │ FOMC 다음날       │ 새벽 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e:\u003cspan class=\"hljs-number\"\u003e30\u003c/span\u003e (여름)      │\n  └────────────────────┴───────────────────┴───────────────────────┘\n\n  ──────────────────────────────────────────────────────────────────\n\n  실전 월별 체크리스트 (예: \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월):\n  ┌────────────────────────────────────────────────────────────────┐\n  │  \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e일 (금요일 예외적 빠름): ISM 제조업                     │\n  │  \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 \u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e일 (목요일):             NFP 고용지표 ← 가장 중요!     │\n  │  \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e일 (화요일):            CPI 소비자물가 ← 두번째 중요!│\n  │  \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 \u003cspan class=\"hljs-number\"\u003e19\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e20\u003c/span\u003e일:                  FOMC 회의 ← 시장 최대 이벤트 │\n  │  \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 \u003cspan class=\"hljs-number\"\u003e28\u003c/span\u003e일:                     PCE 물가                       │\n  └────────────────────────────────────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e5.2 지표별 주가 반응 매트릭스\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│           경제 지표 발표 결과별 주가 반응                            │\n└─────────────────────────────────────────────────────────────────────┘\n\n  ┌──────────────────┬───────────────────────┬───────────────────────┐\n  │ 지표              │ 예상보다 강하게 나옴  │ 예상보다 약하게 나옴  │\n  ├──────────────────┼───────────────────────┼───────────────────────┤\n  │ NFP (고용)        │ 혼재                  │ 혼재                  │\n  │                  │ 경제 좋음 ↑           │ 경기 침체 우려 ↓      │\n  │                  │ But 금리 인상 우려 ↓  │ But 금리 인하 기대 ↑  │\n  ├──────────────────┼───────────────────────┼───────────────────────┤\n  │ CPI (물가)        │ 주식 ↓↓              │ 주식 ↑↑               │\n  │                  │ 금리 인상 우려 증가   │ 금리 인하 기대 증가   │\n  ├──────────────────┼───────────────────────┼───────────────────────┤\n  │ GDP               │ 주식 ↑               │ 주식 ↓                │\n  │                  │ 경제 성장 좋은 신호   │ 경기 침체 우려        │\n  ├──────────────────┼───────────────────────┼───────────────────────┤\n  │ 소매판매          │ 주식 ↑               │ 주식 ↓                │\n  │                  │ 소비 건전 신호        │ 소비 감소 우려        │\n  ├──────────────────┼───────────────────────┼───────────────────────┤\n  │ ISM PMI           │ 주식 ↑               │ 주식 ↓                │\n  │                  │ (\u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e 이상 = 확장)      │ (\u003cspan class=\"hljs-number\"\u003e50\u003c/span\u003e 이하 = 수축)      │\n  └──────────────────┴───────────────────────┴───────────────────────┘\n\n  ⚠️  고용지표는 '역설'이 있다:\n  고용이 너무 좋음 → 연준이 금리 내리지 않겠다 → 주식 하락\n  고용이 약함    → 연준이 금리 내릴 것 → 주식 상승\n  (\u003cspan class=\"hljs-number\"\u003e2023\u003c/span\u003e~\u003cspan class=\"hljs-number\"\u003e2024\u003c/span\u003e년 이 패턴 반복됨)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 체크포인트\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e경제 지표 발표일 전날은 포지션을 크게 늘리지 않는 것이 좋다. 특히 CPI와 FOMC는 시장 변동성을 극도로 높인다. Investing.com의 \"경제 캘린더\"를 북마크해두자.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e6. 실적 시즌 — 분기마다 오는 주가 폭풍\u003c/h2\u003e\n\u003ch3\u003e6.1 실적 발표 일정과 의미\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│               실적 시즌 (Earnings Season) 캘린더                     │\n└─────────────────────────────────────────────────────────────────────┘\n\n  분기     발표 기간         주요 발표 기업 (예시)\n  ──────────────────────────────────────────────────────────────────\n  Q4      \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e월 둘째주~\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e월    JPM (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e월 초), AAPL, MSFT (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e월 말)\n  (\u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e월 실적)\n\n  Q1      \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e월 둘째주~\u003cspan class=\"hljs-number\"\u003e5\u003c/span\u003e월    대형 금융주 시작, 빅테크 순서로\n  (\u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e월 실적)\n\n  Q2      \u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e월 둘째주~\u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e월    여름 시즌 실적, 반도체 중간 점검\n  (\u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e월 실적)\n\n  Q3      \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e월 둘째주~\u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e월  연말 소비 시즌 전망 포함\n  (\u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e-\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e월 실적)\n\n  ──────────────────────────────────────────────────────────────────\n\n  주요 기업 발표 순서 (통상적):\n  Week \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e: JPMorgan, Goldman Sachs (금융주)\n  Week \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e: Netflix, Tesla\n  Week \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e: Apple, Microsoft, Meta, Alphabet, Amazon\n  Week \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e: 중소형주 마무리\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6.2 EPS 서프라이즈 vs 실적 쇼크\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│                  실적 발표 결과 유형별 반응                           │\n└─────────────────────────────────────────────────────────────────────┘\n\n  EPS (Earnings Per Share) = 주당순이익\n  \u003cspan class=\"hljs-string\"\u003e\"컨센서스\"\u003c/span\u003e = 애널리스트 평균 예상치\n\n  유형 1: 어닝 서프라이즈 (Beat)\n  ─────────────────────────────\n  예상: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.50 EPS\n  실제: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.80 EPS (+20% 상회)\n  → 즉각 5~15% 주가 상승 (애프터마켓)\n\n  유형 2: 인라인 (In-line)\n  ─────────────────────────\n  예상: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.50 EPS\n  실제: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.52 EPS (딱 부합)\n  → 큰 변동 없음 (이미 가격에 반영됨)\n\n  유형 3: 어닝 쇼크 (Miss)\n  ─────────────────────────\n  예상: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.50 EPS\n  실제: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.20 EPS (-20% 하회)\n  → 즉각 10~30% 주가 하락\n\n  ──────────────────────────────────────────────────────────────────\n\n  ⚠️  \u003cspan class=\"hljs-string\"\u003e\"실적은 좋은데 주가는 왜 떨어져?\"\u003c/span\u003e 현상\n\n  이유: 실적 발표 전에 이미 주가가 기대감으로 올라있었음\n  \u003cspan class=\"hljs-string\"\u003e\"Buy the rumor, Sell the news\"\u003c/span\u003e (소문에 사서 뉴스에 팔아라)\n\n  가이던스(Guidance)가 더 중요:\n  Q2 실적이 좋아도 Q3 전망이 나쁘면 → 주가 하락\n  Q2 실적이 나빠도 Q3 전망이 좋으면 → 주가 상승\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6.3 실제 사례: Meta 2022년 어닝 쇼크\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-bash\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│         Meta (FB) 2022년 Q3 실적 쇼크 — 하루 -26%                   │\n└─────────────────────────────────────────────────────────────────────┘\n\n  날짜: 2022년 10월 26일 (장 마감 후 실적 발표)\n\n  발표 내용:\n  ┌─────────────────────────────────────────────────────────────────┐\n  │  Q3 매출: \u003cspan class=\"hljs-variable\"\u003e$277\u003c/span\u003e억 (예상 \u003cspan class=\"hljs-variable\"\u003e$275\u003c/span\u003e억 - 소폭 상회)                    │\n  │  Q3 EPS: \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.64 (예상 \u003cspan class=\"hljs-variable\"\u003e$1\u003c/span\u003e.88 - 13% 하회!)                      │\n  │                                                                 │\n  │  충격 요인:                                                     │\n  │  1. 메타버스(Reality Labs) 사업 손실 \u003cspan class=\"hljs-variable\"\u003e$36\u003c/span\u003e억                     │\n  │  2. Q4 매출 가이던스: \u003cspan class=\"hljs-variable\"\u003e$300\u003c/span\u003e~325억 (예상 \u003cspan class=\"hljs-variable\"\u003e$326\u003c/span\u003e억 하회)            │\n  │  3. 2023년도 비용 \u003cspan class=\"hljs-variable\"\u003e$960\u003c/span\u003e~1,010억 예고 (투자 확대)                │\n  └─────────────────────────────────────────────────────────────────┘\n\n  시장 반응:\n  발표 전 주가:  \u003cspan class=\"hljs-variable\"\u003e$128\u003c/span\u003e\n  다음날 시가:   \u003cspan class=\"hljs-variable\"\u003e$104\u003c/span\u003e  (-18.7%)\n  다음날 종가:   \u003cspan class=\"hljs-variable\"\u003e$97\u003c/span\u003e   (-24.2%)  ← 하루에 -26%!\n\n  시가총액 손실: 약 \u003cspan class=\"hljs-variable\"\u003e$800\u003c/span\u003e억 (하루 만에!)\n\n  한국 투자자 손실 계산 (Meta 1000만원 보유 시):\n  1000만원 → 740만원  (하루 만에 -260만원)\n\n  ──────────────────────────────────────────────────────────────────\n\n  교훈:\n  - 실적 발표 직전에 개별 종목 단기 베팅은 위험\n  - 가이던스 악화가 실적 서프라이즈보다 더 중요\n  - 단일 종목 집중 투자의 리스크 (분산 투자 필요성)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e6.4 실적 발표 전략\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│                 실적 시즌 투자 전략                                   │\n└─────────────────────────────────────────────────────────────────────┘\n\n  전략 1: 실적 발표 전 매도 (안전 우선)\n  ──────────────────────────────────────\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 실적 1~2주 전에 일부 수익 실현\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 불확실성 제거\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 단점: 어닝 서프라이즈 수혜 놓침\n\n  전략 2: 실적 후 반응 보고 매수\n  ────────────────────────────────\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 실적 발표 후 애프터마켓 반응 확인\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 쇼크로 급락했지만 펀더멘털 좋으면 매수 기회\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 2022년 Meta 쇼크 → 2023년 +194% 반등!\n\n  전략 3: 실적 중립 (장기 보유)\n  ──────────────────────────────\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 분기 실적에 흔들리지 않고 보유\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 10년 이상 장기 투자자에게 가장 이상적\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e Warren Buffett 스타일\n\n  ──────────────────────────────────────────────────────────────────\n\n  실적 발표 때 확인해야 할 3가지:\n  ┌────────────────────────────────────────────────────────────────┐\n  │  1. EPS: 예상 대비 몇 % 상회/하회?                           │\n  │  2. 매출: 예상 대비 성장세 유지?                              │\n  │  3. 가이던스: 다음 분기 전망이 컨센서스 대비 어떤가?         │\n  └────────────────────────────────────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 체크포인트\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eEarnings Whispers (earningswhispers.com) 또는 Seeking Alpha에서 실적 발표 일정과 컨센서스를 미리 확인하자. 특히 보유 종목의 실적 발표일은 반드시 캘린더에 표시해두어야 한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e7. 섹터 로테이션 — 경기 사이클에 따라 강한 섹터가 바뀐다\u003c/h2\u003e\n\u003ch3\u003e7.1 경기 사이클 시계\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│                경기 사이클 시계 (Clock Model)                        │\n└─────────────────────────────────────────────────────────────────────┘\n\n                     \u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e시 (경기 정점)\n                    에너지·원자재\n                    /\n               \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e시                 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e시\n         소재·산업재             금융·부동산\n              /                         \\\n         \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e시                             \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e시\n       기술·임의소비재               경기방어·유틸리티\n              \\                         /\n               \u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e시                  \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e시\n         (경기 저점)              헬스케어\n                   \\           /\n                    \u003cspan class=\"hljs-number\"\u003e8\u003c/span\u003e시    \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e시\n                      \\ \u003cspan class=\"hljs-number\"\u003e7\u003c/span\u003e시 /\n                       \u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e시 (경기 저점)\n                    채권·현금·금\n\n  경기 확장기(\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e시→\u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e시):   기술주, 임의소비재, 금융\n  경기 정점기(\u003cspan class=\"hljs-number\"\u003e12\u003c/span\u003e시→\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e시):   에너지, 원자재, 산업재\n  경기 수축기(\u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e시→\u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e시):    방어주(헬스케어, 유틸리티, 필수소비재)\n  경기 저점기(\u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e시→\u003cspan class=\"hljs-number\"\u003e9\u003c/span\u003e시):    채권, 금, 이후 기술주 반등 시작\n\n  ──────────────────────────────────────────────────────────────────\n\n  대표 ETF로 보는 섹터:\n  ┌──────────────────┬──────────┬────────────────────────────────┐\n  │ 섹터              │ ETF     │ 대표 종목                       │\n  ├──────────────────┼──────────┼────────────────────────────────┤\n  │ 기술 (XLK)        │ XLK     │ AAPL, MSFT, NVDA               │\n  │ 헬스케어 (XLV)    │ XLV     │ JNJ, UNH, PFE                  │\n  │ 금융 (XLF)        │ XLF     │ JPM, BAC, WFC                  │\n  │ 에너지 (XLE)      │ XLE     │ XOM, CVX, SLB                  │\n  │ 임의소비재(XLY)   │ XLY     │ AMZN, TSLA, HD                 │\n  │ 필수소비재(XLP)   │ XLP     │ PG, KO, WMT                    │\n  │ 유틸리티(XLU)     │ XLU     │ NEE, DUK, SO                   │\n  │ 원자재(XLB)       │ XLB     │ LIN, APD, ECL                  │\n  │ 산업재(XLI)       │ XLI     │ RTX, UPS, CAT                  │\n  │ 부동산(XLRE)      │ XLRE    │ AMT, PLD, CCI                  │\n  │ 통신(XLC)         │ XLC     │ GOOG, META, VZ                 │\n  └──────────────────┴──────────┴────────────────────────────────┘\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e7.2 방어주 vs 성장주의 금리 민감도\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-markdown\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│              방어주 vs 성장주 금리 민감도 비교                       │\n└─────────────────────────────────────────────────────────────────────┘\n\n  방어주 특징:\n  ──────────\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 경기 무관 꾸준한 이익 (음식, 약, 전기)\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 높은 배당률 (3~5%)\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 금리 상승 시: 채권 대비 매력도 하락 → 주가 하락\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 금리 하락 시: 채권 대비 매력도 상승 → 주가 상승\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 예: KO (코카콜라), PG (P\u0026#x26;G), JNJ (존슨앤존슨)\n\n  성장주 특징:\n  ────────────\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 현재 이익보다 미래 성장 기대\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 낮은 배당(또는 무배당)\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 금리 상승 시: DCF 할인율 급상승 → 주가 폭락\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 금리 하락 시: 미래 이익 현재가치 급상승 → 주가 폭등\n\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e 예: NVDA, TSLA, AMZN, META\n\n  금리 인상 1%p당 예상 주가 영향:\n  방어주 (유틸리티, 필수소비재): -5% ~ -10%\n  가치주 (금융, 에너지):          -2% ~ +5%\n  성장주 (기술, 임의소비재):     -15% ~ -30%\n\n  ──────────────────────────────────────────────────────────────────\n\n  실전 응용:\n\n  연준 금리 인상 사이클 진입 신호 시\n  → 성장주 비중 줄이고 가치주·에너지 비중 확대\n\n  연준 금리 인하 신호 (or 경기 침체 공포) 시\n  → 방어주·채권 비중 확대, 이후 성장주 재편입\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 체크포인트\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e섹터 로테이션을 실행하는 가장 간단한 방법: SPDR의 섹터 ETF (XLK, XLV, XLF 등)를 활용해 경기 사이클에 맞게 비중을 조절한다. 매월 각 섹터 ETF의 상대적 강도를 비교해보자.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e8. 공포 지수 VIX — 시장의 체온계\u003c/h2\u003e\n\u003ch3\u003e8.1 VIX란 무엇인가\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-yaml\"\u003e\u003cspan class=\"hljs-string\"\u003e┌─────────────────────────────────────────────────────────────────────┐\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e                      \u003cspan class=\"hljs-string\"\u003eVIX\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e지수\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e완전\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e해부\u003c/span\u003e                              \u003cspan class=\"hljs-string\"\u003e│\u003c/span\u003e\n\u003cspan class=\"hljs-string\"\u003e└─────────────────────────────────────────────────────────────────────┘\u003c/span\u003e\n\n  \u003cspan class=\"hljs-string\"\u003eVIX\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e=\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eCBOE\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eVolatility\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eIndex\u003c/span\u003e\n  \u003cspan class=\"hljs-string\"\u003e=\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eS\u0026#x26;P500\u003c/span\u003e \u003cspan c ng\"\u003e,\u003c/span\u003e \u003cspan class=\"hljs-number\"\u003e70\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e각\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e구간에서\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e분할\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e매수\u003c/span\u003e\n    \u003cspan class=\"hljs-string\"\u003e(한\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e번에\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e몰빵하지\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e말고\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e나눠서\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e사는\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003e전략)\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e실전 체크포인트\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eVIX를 매일 체크하는 습관을 들이자. Google에서 \"CBOE VIX\" 검색하거나, 증권사 앱에서 VIX 시세를 확인할 수 있다. VIX가 20을 넘으면 조심하고, 30을 넘으면 분할 매수 계획을 세우기 시작하자.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2\u003e9. 모든 것을 통합하는 투자 프레임워크\u003c/h2\u003e\n\u003ch3\u003e9.1 거시경제 + 지정학 종합 판단 체계\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│               거시경제 종합 판단 대시보드                            │\n└─────────────────────────────────────────────────────────────────────┘\n\n  매월 체크해야 할 7가지 지표:\n\n  지표 1. 연준 금리 방향성\n  ─────────────────────────\n  □ 금리 인상 사이클 → 성장주 비중 축소, 가치주·배당주 확대\n  □ 금리 동결 → 현 포트폴리오 유지\n  □ 금리 인하 사이클 → 성장주·장기채 비중 확대\n\n  지표 2. CPI 트렌드\n  ─────────────────────────\n  □ CPI 상승 중 → 에너지·원자재·TIPS 비중 확대\n  □ CPI 하락 중 → 기술주·성장주 비중 확대 시작\n\n  지표 3. 경기선행지수 (LEI)\n  ─────────────────────────\n  □ 3개월 연속 하락 → 방어적 포트폴리오로 전환\n  □ 반등 신호 → 경기민감주(산업재, 기술주) 선취매\n\n  지표 4. 달러 인덱스 (DXY)\n  ─────────────────────────\n  □ DXY 상승 → 다국적 기업 실적 주의, 원자재 약세 가능\n  □ DXY 하락 → 신흥국, 원자재, 다국적 기업 수혜\n\n  지표 5. VIX 레벨\n  ─────────────────────────\n  □ VIX \u0026#x3C; 20 → 정상 투자\n  □ VIX 20~30 → 일부 현금 확보\n  □ VIX \u003e 30 → 분할 매수 시작\n  □ VIX \u003e 40 → 적극 매수 (역발상)\n\n  지표 6. 지정학 리스크 온도\n  ─────────────────────────\n  □ 고조 → 에너지·방산·금 비중 확대\n  □ 완화 → 기술·소비주로 이동\n\n  지표 7. 실적 시즌 컨센서스\n  ─────────────────────────\n  □ 어닝 서프라이즈 연속 → 강세 신호\n  □ 가이던스 하향 연속 → 매도 준비\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003e9.2 초보 투자자를 위한 단순화된 규칙\u003c/h3\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-scss\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│                  초보자 거시경제 대응 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e원칙                           │\n└─────────────────────────────────────────────────────────────────────┘\n\n  원칙 \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e. 연준을 거스르지 마라 (Don't Fight the Fed)\n  ──────────────────────────────────────────────────\n  연준이 금리 올리는 동안 → 성장주 묻지마 매수 금지\n  연준이 금리 내리는 동안 → 성장주 보유 및 추가 매수 긍정적\n\n  원칙 \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e. VIX \u003cspan class=\"hljs-number\"\u003e40\u003c/span\u003e 이상 = 매수 기회\n  ──────────────────────────────────────────────────\n  패닉이 정점일 때가 실은 매수 적기\n  단, 반드시 분할 매수 (전체 자금의 \u003cspan class=\"hljs-number\"\u003e20%\u003c/span\u003e씩 \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e번 나눠서)\n\n  원칙 \u003cspan class=\"hljs-number\"\u003e3\u003c/span\u003e. 지정학 이슈로 급락한 펀더멘털 좋은 기업 = 기회\n  ──────────────────────────────────────────────────\n  전쟁이나 제재로 주가가 급락해도\n  해당 기업의 사업 자체가 타격받지 않았다면\n  → 단기 과잉 반응 → 매수 기회\n\n  \u003cspan class=\"hljs-number\"\u003e2022\u003c/span\u003e년 NVDA 미중 갈등 급락 → \u003cspan class=\"hljs-number\"\u003e2023\u003c/span\u003e년 +\u003cspan class=\"hljs-number\"\u003e239%\u003c/span\u003e 사례가 대표적\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2\u003e10. 시리즈 마무리\u003c/h2\u003e\n\u003cpre\u003e\u003ccode class=\"hljs language-sql\"\u003e┌─────────────────────────────────────────────────────────────────────┐\n│              미국 주식 투자 입문 시리즈 완성                         │\n└─────────────────────────────────────────────────────────────────────┘\n\n  ✅ \u003cspan class=\"hljs-number\"\u003e01\u003c/span\u003e편: 계좌 개설부터 첫 주문까지\n  ✅ \u003cspan class=\"hljs-number\"\u003e02\u003c/span\u003e편: 미국 시장 구조 — NYSE, NASDAQ, S\u003cspan class=\"hljs-operator\"\u003e\u0026#x26;\u003c/span\u003eP500\n  ✅ \u003cspan class=\"hljs-number\"\u003e03\u003c/span\u003e편: 어떤 주식 살까 — 기업 분석 첫걸음\n  ✅ \u003cspan class=\"hljs-number\"\u003e04\u003c/span\u003e편: 재무제표 읽기 (애플 사례)\n  ✅ \u003cspan class=\"hljs-number\"\u003e05\u003c/span\u003e편: 주가 가치평가 — \u003cspan class=\"hljs-keyword\"\u003ePER\u003c/span\u003e, PBR, EV\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003eEBITDA\n  ✅ \u003cspan class=\"hljs-number\"\u003e06\u003c/span\u003e편: 성장주 vs 가치주 선택법\n  ✅ \u003cspan class=\"hljs-number\"\u003e07\u003c/span\u003e편: ETF로 분산투자하기\n  ✅ \u003cspan class=\"hljs-number\"\u003e08\u003c/span\u003e편: 채권과 미국 국채 (TLT)\n  ✅ \u003cspan class=\"hljs-number\"\u003e09\u003c/span\u003e편: 매수\u003cspan class=\"hljs-operator\"\u003e/\u003c/span\u003e매도 타이밍\n  ✅ \u003cspan class=\"hljs-number\"\u003e10\u003c/span\u003e편: 포트폴리오 구성과 리밸런싱\n  ✅ \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e편: 거시경제와 국제 시사가 주가를 움직인다 (지금 읽는 중)\n\n  ──────────────────────────────────────────────────────────────────\n\n  \u003cspan class=\"hljs-number\"\u003e11\u003c/span\u003e편을 마치며:\n\n  주식 투자는 결국 \"세상이 어떻게 돌아가는지\" 이해하는 것이다.\n  연준 의장의 발언 한 마디, 러시아의 군사 행동, 중국의 반도체 정책,\n  이 모든 것이 당신이 보유한 Apple, NVIDIA, Microsoft 주가에 연결되어 있다.\n\n  뉴스를 그냥 뉴스로 보지 말고,\n  \"이게 어떤 섹터에 유리한가? 어떤 섹터에 불리한가?\"를\n  항상 생각하는 습관을 들이자.\n\n  그것이 아마추어와 프로를 가르는 가장 중요한 차이다.\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e최종 투자 원칙:\u003c/strong\u003e\n거시경제를 알면 시장의 흐름이 보인다.\n그러나 정확한 타이밍은 아무도 모른다.\n알게 된 지식은 더 나은 매수 기회 포착에, 불필요한 패닉 매도 방지에 쓰자.\n결국 장기 투자 + 분산 투자 + 정기 매수가 가장 검증된 전략이다.\u003c/p\u003e\n\u003c/blockquote\u003e"])</script><script>self.
